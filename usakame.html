*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;height:100%;height:100dvh;overflow:hidden}

#L{display:flex;align-items:center;justify-content:center;height:100%;font-size:24px;color:#5D4037;background:linear-gradient(180deg,#87CEEB 0%,#B8E6FF 40%,#90EE90 65%,#4CAF50 100%)}

@keyframes sleepShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.tap-btn{transition:transform .08s}.tap-btn:active{transform:scale(.92)!important}

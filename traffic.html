<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#BFE6F2">
<title>こうつう あんぜん ゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#BFE6F2; --sky2:#EAF7FC; --paper:#FFFDF7; --ink:#46403A;
    --leaf:#37C98E; --leaf-d:#23A877; --coral:#FF6F6B; --coral-d:#E8504C;
    --sun:#FFD23F; --grape:#7C5CFF; --pink:#FF6F91; --line:#F0E6D6;
    --shadow:0 14px 30px rgba(70,64,58,.14), 0 4px 10px rgba(70,64,58,.08);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    font-family:"M PLUS Rounded 1c",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, #FFFFFF55, transparent),
      linear-gradient(180deg,var(--sky1) 0%, var(--sky2) 60%, #FFF6E9 100%);
    min-height:100svh; display:flex; align-items:center; justify-content:center;
    padding:14px;
  }
  /* soft floating clouds in the page bg */
  .bg-cloud{position:fixed; border-radius:50%; background:#ffffffcc; filter:blur(.5px); pointer-events:none; z-index:0}
  .stage{position:relative; z-index:1; width:100%; max-width:760px}

  .screen{display:none; animation:rise .45s cubic-bezier(.2,.8,.25,1)}
  .screen.active{display:block}
  @keyframes rise{from{opacity:0; transform:translateY(14px)}to{opacity:1; transform:none}}

  /* ---------- TITLE ---------- */
  .title-card{
    background:var(--paper); border-radius:34px; box-shadow:var(--shadow);
    padding:30px 24px 26px; text-align:center; position:relative; overflow:hidden;
    border:3px solid #fff;
  }
  .title-card::before{content:""; position:absolute; inset:-2px; border-radius:34px;
    background:linear-gradient(180deg,#FFFFFF, transparent 30%); pointer-events:none}
  h1.title{font-family:"Mochiy Pop One",sans-serif; font-weight:400;
    font-size:clamp(30px,7.5vw,50px); line-height:1.15; margin:6px 0 2px; color:#3E96BC;
    text-shadow:0 3px 0 #D6EEF7}
  h1.title .pop{color:var(--coral); text-shadow:0 3px 0 #FFD9D7}
  .subtitle{font-weight:700; color:#8A8377; font-size:clamp(14px,3.6vw,17px); margin:0 0 6px}
  .mascot-wrap{width:min(220px,52vw); margin:2px auto 6px}
  .mascot-wrap svg{display:block; width:100%; height:auto; animation:bob 3s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-8px) rotate(1.5deg)}}
  .pick-label{font-weight:800; font-size:clamp(16px,4.2vw,20px); margin:10px 0 12px; color:var(--ink)}
  .modes{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .mode{
    border:none; cursor:pointer; border-radius:22px; padding:18px 12px 16px; color:#fff;
    font-family:"M PLUS Rounded 1c"; font-weight:800; font-size:clamp(17px,4.6vw,21px);
    box-shadow:0 8px 0 rgba(0,0,0,.12), var(--shadow); transition:transform .08s, box-shadow .08s;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .mode .ico{width:64px; height:64px}
  .mode small{font-weight:700; font-size:13px; opacity:.95}
  .mode.walk{background:linear-gradient(180deg,#5CC8F0,#3E9FD0)}
  .mode.car{background:linear-gradient(180deg,#9D86FF,#7C5CFF)}
  .mode.all{background:linear-gradient(180deg,#FFB13C,#FF8F2E); grid-column:1 / -1; flex-direction:row; justify-content:center}
  .mode.all .ico{width:46px;height:46px}
  .mode:active{transform:translateY(6px); box-shadow:0 2px 0 rgba(0,0,0,.12), var(--shadow)}
  .foot-note{margin-top:16px; font-size:12.5px; color:#A59C8C; font-weight:700; line-height:1.5}
  .foot-note svg{vertical-align:-3px; margin-right:3px}

  /* ---------- QUIZ ---------- */
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:12px}
  .iconbtn{width:48px; height:48px; flex:0 0 auto; border:none; border-radius:16px; background:#FFFFFFEE;
    box-shadow:var(--shadow); cursor:pointer; display:grid; place-items:center; transition:transform .08s}
  .iconbtn:active{transform:scale(.92)}
  .stars{flex:1; display:flex; gap:5px; justify-content:center; align-items:center}
  .stars svg{width:clamp(20px,5vw,26px); height:clamp(20px,5vw,26px)}
  .scene{position:relative; width:100%; aspect-ratio:8/5; border-radius:28px; overflow:hidden;
    box-shadow:var(--shadow); border:3px solid #fff; background:var(--sky1)}
  .scene > svg{display:block; width:100%; height:100%}
  .stamp{position:absolute; inset:0; display:grid; place-items:center; pointer-events:none;
    opacity:0; transform:scale(.3) rotate(-18deg)}
  .stamp.show{animation:stamp .5s cubic-bezier(.2,1.4,.4,1) forwards}
  @keyframes stamp{to{opacity:1; transform:scale(1) rotate(-8deg)}}
  .stamp svg{width:46%; height:46%; filter:drop-shadow(0 8px 14px rgba(0,0,0,.22))}

  .bubble{position:relative; background:var(--paper); border-radius:22px; box-shadow:var(--shadow);
    margin:16px 0 0; padding:18px 56px 18px 20px; border:3px solid #fff}
  .bubble::after{content:""; position:absolute; top:-13px; left:40px; width:26px; height:18px;
    background:var(--paper); border-radius:0 0 0 16px; transform:rotate(0);
    clip-path:polygon(0 100%,100% 100%,50% 0); border-top:none}
  .q-text{font-weight:800; font-size:clamp(18px,4.8vw,24px); line-height:1.5; margin:0}
  .replay{position:absolute; right:12px; top:50%; transform:translateY(-50%);
    width:42px; height:42px; border:none; border-radius:13px; background:#FFF1D6; cursor:pointer;
    display:grid; place-items:center; box-shadow:0 4px 0 #F2D89A; transition:transform .08s}
  .replay:active{transform:translateY(-50%) translateY(3px); box-shadow:0 1px 0 #F2D89A}

  .answers{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px}
  .ans{border:none; cursor:pointer; border-radius:24px; padding:18px 8px 16px; color:#fff;
    font-family:"Mochiy Pop One"; font-weight:400; font-size:clamp(20px,5.4vw,26px);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    box-shadow:0 9px 0 rgba(0,0,0,.14), var(--shadow); transition:transform .09s, box-shadow .09s, filter .15s}
  .ans .gly{width:62px; height:62px}
  .ans.maru{background:linear-gradient(180deg,#46D89C,var(--leaf-d))}
  .ans.batsu{background:linear-gradient(180deg,#FF8682,var(--coral-d))}
  .ans:active{transform:translateY(7px); box-shadow:0 2px 0 rgba(0,0,0,.14), var(--shadow)}
  .ans:disabled{cursor:default}
  .answers.locked .ans{filter:grayscale(.55) opacity(.55)}
  .answers.locked .ans.picked{filter:none; outline:5px solid #ffffff; outline-offset:-5px}

  /* explanation */
  .explain{margin-top:16px; display:none; animation:rise .4s ease}
  .explain.show{display:block}
  .ex-row{display:flex; gap:14px; align-items:flex-start;
    background:var(--paper); border-radius:24px; box-shadow:var(--shadow); padding:16px; border:3px solid #fff}
  .ex-badge{flex:0 0 auto; width:84px; height:84px; border-radius:50%; overflow:hidden;
    background:radial-gradient(circle at 50% 35%,#FFF6E2,#FFE9C2); border:3px solid #fff; box-shadow:0 4px 10px rgba(0,0,0,.12)}
  .ex-badge svg{width:100%; height:100%; transform:translateY(6px) scale(1.18)}
  .ex-head{font-family:"Mochiy Pop One"; font-size:clamp(17px,4.4vw,21px); margin:2px 0 6px}
  .ex-head.ok{color:var(--leaf-d)} .ex-head.no{color:var(--coral-d)}
  .ex-text{font-weight:700; font-size:clamp(15px,4vw,18px); line-height:1.55; margin:0}
  .next{margin-top:14px; width:100%; border:none; cursor:pointer; border-radius:22px; padding:18px;
    color:#fff; font-family:"Mochiy Pop One"; font-size:clamp(18px,4.8vw,22px);
    background:linear-gradient(180deg,#FFC04A,#FF9A2E);
    box-shadow:0 8px 0 #E07F1E, var(--shadow); transition:transform .08s, box-shadow .08s;
    display:flex; align-items:center; justify-content:center; gap:10px}
  .next:active{transform:translateY(5px); box-shadow:0 3px 0 #E07F1E, var(--shadow)}

  /* ---------- RESULT ---------- */
  .result-card{background:var(--paper); border-radius:34px; box-shadow:var(--shadow);
    padding:28px 24px; text-align:center; border:3px solid #fff}
  .result-card .mascot-wrap{width:min(200px,46vw)}
  .res-title{font-family:"Mochiy Pop One"; font-size:clamp(24px,6.4vw,34px); color:#3E96BC; margin:4px 0 2px}
  .res-stars{display:flex; gap:8px; justify-content:center; margin:10px 0 4px; flex-wrap:wrap}
  .res-stars svg{width:38px; height:38px; animation:pop .4s backwards}
  @keyframes pop{from{transform:scale(0)}60%{transform:scale(1.25)}to{transform:scale(1)}}
  .res-line{font-weight:800; font-size:clamp(16px,4.4vw,20px); color:#8A8377; margin:6px 0 18px}
  .res-btns{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .res-btns button{border:none; cursor:pointer; border-radius:22px; padding:18px 10px; color:#fff;
    font-family:"M PLUS Rounded 1c"; font-weight:800; font-size:clamp(16px,4.4vw,20px);
    box-shadow:0 7px 0 rgba(0,0,0,.13), var(--shadow); transition:transform .08s, box-shadow .08s;
    display:flex; align-items:center; justify-content:center; gap:8px}
  .res-btns .again{background:linear-gradient(180deg,#46D89C,var(--leaf-d))}
  .res-btns .home{background:linear-gradient(180deg,#7FB7E8,#4F8FD0)}
  .res-btns button:active{transform:translateY(4px); box-shadow:0 3px 0 rgba(0,0,0,.13), var(--shadow)}

  /* confetti */
  #confetti{position:fixed; inset:0; pointer-events:none; z-index:50; overflow:hidden}
  .confetti-bit{position:absolute; will-change:transform; border-radius:3px}

  :focus-visible{outline:4px solid #2E78C7; outline-offset:3px; border-radius:14px}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important}
    .mascot-wrap svg{animation:none}
  }
</style>
</head>
<body>
  <div class="bg-cloud" style="width:160px;height:60px;top:8%;left:6%"></div>
  <div class="bg-cloud" style="width:120px;height:46px;top:16%;right:8%"></div>
  <div class="bg-cloud" style="width:200px;height:70px;bottom:10%;left:-3%;opacity:.7"></div>

  <div class="stage">
    <!-- TITLE -->
    <section id="screen-title" class="screen active">
      <div class="title-card">
        <p class="subtitle">よんさい から の</p>
        <h1 class="title">こうつう <span class="pop">あんぜん</span><br>ゲーム</h1>
        <div class="mascot-wrap" id="title-mascot"></div>
        <p class="pick-label">どれで あそぶ？</p>
        <div class="modes">
          <button class="mode walk" data-mode="walk">
            <span class="ico" id="ico-walk"></span>あるく とき<small>みち・しんごう</small>
          </button>
          <button class="mode car" data-mode="car">
            <span class="ico" id="ico-car"></span>くるまの とき<small>シートベルト</small>
          </button>
          <button class="mode all" data-mode="all">
            <span class="ico" id="ico-all"></span>ぜんぶ やってみる！
          </button>
        </div>
        <p class="foot-note">
          <span id="ico-ear"></span>もんだいは こえで よみあげます。タップで あそべます。<br>
          おとなの かたと いっしょに あそんでね。
        </p>
      </div>
    </section>

    <!-- QUIZ -->
    <section id="screen-quiz" class="screen">
      <div class="topbar">
        <button class="iconbtn" id="btn-home" aria-label="さいしょに もどる"></button>
        <div class="stars" id="stars"></div>
        <button class="iconbtn" id="btn-sound" aria-label="おとの オンオフ"></button>
      </div>
      <div class="scene" id="scene">
        <div class="stamp" id="stamp"></div>
      </div>
      <div class="bubble">
        <p class="q-text" id="q-text"></p>
        <button class="replay" id="btn-replay" aria-label="もういちど きく"></button>
      </div>
      <div class="answers" id="answers">
        <button class="ans maru" data-choice="true"><span class="gly" id="gly-maru"></span>まる</button>
        <button class="ans batsu" data-choice="false"><span class="gly" id="gly-batsu"></span>ばつ</button>
      </div>
      <div class="explain" id="explain">
        <div class="ex-row">
          <div class="ex-badge" id="ex-badge"></div>
          <div>
            <p class="ex-head" id="ex-head"></p>
            <p class="ex-text" id="ex-text"></p>
          </div>
          <button class="replay" id="btn-replay2" style="position:static; align-self:center" aria-label="かいせつを もういちど きく"></button>
        </div>
        <button class="next" id="btn-next"></button>
      </div>
    </section>

    <!-- RESULT -->
    <section id="screen-result" class="screen">
      <div class="result-card">
        <div class="mascot-wrap" id="result-mascot"></div>
        <h2 class="res-title" id="res-title"></h2>
        <div class="res-stars" id="res-stars"></div>
        <p class="res-line" id="res-line"></p>
        <div class="res-btns">
          <button class="again" id="btn-again"><span id="ico-replay-s"></span>もういちど</button>
          <button class="home" id="btn-home2"><span id="ico-home-s"></span>おうちへ</button>
        </div>
      </div>
    </section>
  </div>

  <div id="confetti"></div>

<script>
"use strict";
/* ============================ COLOR TOKENS ============================ */
const C = {
  TAN:"#E9A85B", TAN_D:"#D8923F", CREAM:"#FBEBCB", BLUSH:"#F6A8A0",
  CAP:"#FFD23F", CAP_D:"#F2B705", SKIN:"#FBD3A6", HAIR:"#5A3B2E",
  DRESS:"#FF6F91", DRESS2:"#E85C7B", INK:"#3A3530",
  ROAD:"#6E7A86", CURB:"#C9CFD6", WALK:"#F3F4F6", GRASS:"#9FD86B",
  HOUSE1:"#FFC4A3", ROOF1:"#E07A5F", HOUSE2:"#A8D8E8", ROOF2:"#5C8A9A",
  GLASS:"#CDEBF5", TIRE:"#3A3530", SEAT:"#7C5CFF", SEAT2:"#9D86FF",
  CARTEAL:"#4FB3D9", CARTEAL_D:"#3E96BC", HUB:"#D7DEE4", BELT:"#FF8C42", SUN:"#FFE08A"
};

/* ============================ SHARED SVG PARTS ============================ */
function sun(x,y,r){return `<circle cx="${x}" cy="${y}" r="${r}" fill="${C.SUN}"/>`;}
function cloud(x,y,s=1){return `<g transform="translate(${x},${y}) scale(${s})"><ellipse cx="0" cy="0" rx="34" ry="16" fill="#fff" opacity=".92"/><ellipse cx="26" cy="-6" rx="24" ry="14" fill="#fff" opacity=".92"/></g>`;}
function house(x,body,roof,w=80,h=70){const top=120-h;return `<g transform="translate(${x},0)">
  <rect x="0" y="${top}" width="${w}" height="${h}" rx="6" fill="${body}"/>
  <path d="M-8 ${top} L${w/2} ${top-34} L${w+8} ${top} Z" fill="${roof}"/>
  <rect x="${w*0.18}" y="${top+16}" width="16" height="16" rx="3" fill="#fff" opacity=".85"/>
  <rect x="${w*0.62}" y="${top+16}" width="16" height="16" rx="3" fill="#fff" opacity=".85"/>
  <rect x="${w*0.4}" y="${120-30}" width="18" height="30" rx="4" fill="${roof}" opacity=".55"/></g>`;}
function curbRoad(){return `<rect x="0" y="200" width="480" height="100" fill="${C.ROAD}"/><rect x="0" y="200" width="480" height="8" fill="${C.CURB}"/>`;}
function stripes(){let s="";for(let i=0;i<5;i++)s+=`<rect x="${150+i*40}" y="208" width="22" height="84" rx="3" fill="${C.WALK}"/>`;return s;}
function trafficLight(active){
  const r=active==="red"?"#FF5A4D":"#5B2A26", y=active==="yellow"?"#FFC83D":"#5B4A1E", g=active==="green"?"#36C98E":"#1E5240";
  let glow="";
  if(active==="red") glow=`<circle cx="33" cy="28" r="22" fill="#FF5A4D" opacity=".25"/>`;
  if(active==="green") glow=`<circle cx="33" cy="120" r="22" fill="#36C98E" opacity=".25"/>`;
  return `<g transform="translate(388,22)">
    <rect x="26" y="150" width="14" height="86" fill="#7E8794"/><rect x="22" y="150" width="22" height="10" rx="3" fill="#6b7480"/>
    <rect x="0" y="0" width="66" height="150" rx="18" fill="#414C57"/>${glow}
    <circle cx="33" cy="28" r="16" fill="${r}"/><circle cx="33" cy="74" r="16" fill="${y}"/><circle cx="33" cy="120" r="16" fill="${g}"/></g>`;
}
/* consistent kid face (front) */
function kidFace(cx,cy,r){return `
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="${C.SKIN}"/>
  <path d="M${cx-r} ${cy} q${-r*0.06} ${-r*1.2} ${r} ${-r*1.24} q${r*1.06} ${r*0.04} ${r} ${r*1.24} q${-r*0.13} ${-r*0.55} ${-r} ${-r*0.55} q${-r*0.87} 0 ${-r} ${r*0.55} z" fill="${C.HAIR}"/>
  <circle cx="${cx-r*0.3}" cy="${cy+r*0.04}" r="${r*0.12}" fill="${C.INK}"/>
  <circle cx="${cx+r*0.3}" cy="${cy+r*0.04}" r="${r*0.12}" fill="${C.INK}"/>
  <circle cx="${cx-r*0.26}" cy="${cy}" r="${r*0.045}" fill="#fff"/><circle cx="${cx+r*0.34}" cy="${cy}" r="${r*0.045}" fill="#fff"/>
  <ellipse cx="${cx-r*0.62}" cy="${cy+r*0.22}" rx="${r*0.16}" ry="${r*0.1}" fill="${C.BLUSH}" opacity=".7"/>
  <ellipse cx="${cx+r*0.62}" cy="${cy+r*0.22}" rx="${r*0.16}" ry="${r*0.1}" fill="${C.BLUSH}" opacity=".7"/>
  <path d="M${cx-r*0.2} ${cy+r*0.28} q${r*0.2} ${r*0.18} ${r*0.4} 0" fill="none" stroke="${C.INK}" stroke-width="${r*0.1}" stroke-linecap="round"/>`;}

/* kid in poses; drawn within ~90x150, feet near y=146, head center near (45,64) */
function kid(pose="stand"){
  const legs=`<rect x="34" y="112" width="9" height="30" rx="4.5" fill="${C.SKIN}"/><rect x="48" y="112" width="9" height="30" rx="4.5" fill="${C.SKIN}"/>
    <ellipse cx="38" cy="144" rx="8" ry="4.5" fill="${C.DRESS2}"/><ellipse cx="53" cy="144" rx="8" ry="4.5" fill="${C.DRESS2}"/>`;
  const body=`<path d="M24 86 q21 -12 42 0 l8 36 q-29 12 -58 0 z" fill="${C.DRESS}"/>`;
  const head=kidFace(45,64,27);
  if(pose==="reach"){ /* inner arm reaches LEFT to hold an adult hand */
    return `<g>${legs}${body}
      <path d="M28 92 q-16 0 -26 6" fill="none" stroke="${C.SKIN}" stroke-width="11" stroke-linecap="round"/>
      <circle cx="2" cy="98" r="8" fill="${C.SKIN}"/>
      <path d="M70 90 q12 6 12 24" fill="none" stroke="${C.SKIN}" stroke-width="11" stroke-linecap="round"/>
      ${head}</g>`;
  }
  if(pose==="step"){ /* walking stride */
    return `<g>
      <ellipse cx="45" cy="146" rx="30" ry="6" fill="#000" opacity=".08"/>
      <rect x="30" y="110" width="9" height="30" rx="4.5" fill="${C.SKIN}" transform="rotate(-14 34 112)"/>
      <rect x="52" y="110" width="9" height="30" rx="4.5" fill="${C.SKIN}" transform="rotate(16 56 112)"/>
      <ellipse cx="30" cy="143" rx="8" ry="4.5" fill="${C.DRESS2}"/><ellipse cx="62" cy="146" rx="8" ry="4.5" fill="${C.DRESS2}"/>
      ${body}
      <path d="M70 88 q14 -2 22 -14" fill="none" stroke="${C.SKIN}" stroke-width="11" stroke-linecap="round"/>
      <path d="M24 90 q-12 2 -16 16" fill="none" stroke="${C.SKIN}" stroke-width="11" stroke-linecap="round"/>
      ${head}</g>`;
  }
  /* stand + small wave */
  return `<g>
    <ellipse cx="45" cy="146" rx="30" ry="6" fill="#000" opacity=".08"/>${legs}${body}
    <path d="M16 88 q-10 6 -12 22" fill="none" stroke="${C.SKIN}" stroke-width="11" stroke-linecap="round"/>
    <path d="M74 88 q12 4 14 -10" fill="none" stroke="${C.SKIN}" stroke-width="11" stroke-linecap="round"/>
    <circle cx="88" cy="76" r="8" fill="${C.SKIN}"/>
    ${head}</g>`;
}

function adultHand(){ /* big guiding hand + sleeve from left, meeting child's left hand near (x=2,y=98 in kid local) */
  return `<g>
    <rect x="-30" y="120" width="40" height="120" rx="14" fill="#6FA8DC"/>
    <path d="M-30 150 q60 -60 70 -52" fill="none" stroke="#5C8FC0" stroke-width="20" stroke-linecap="round"/>
    <circle cx="44" cy="100" r="15" fill="${C.SKIN_ADULT||'#F2C49B'}"/>
    <ellipse cx="44" cy="118" rx="13" ry="9" fill="${'#F2C49B'}"/>
  </g>`;
}
function ball(x,y){return `<g transform="translate(${x},${y})">
  <circle cx="0" cy="0" r="26" fill="#fff"/>
  <path d="M0 -26 A26 26 0 0 1 24 10 L0 0 Z" fill="#FF6F6B"/>
  <path d="M24 10 A26 26 0 0 1 -18 19 L0 0 Z" fill="#FFD23F"/>
  <path d="M-18 19 A26 26 0 0 1 -24 -10 L0 0 Z" fill="#5CC8F0"/>

let soundOn = true;
let queue = [], idx = 0, results = [];

/* ============================ AUDIO ============================ */
let actx = null;
function initAudio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); }
function tone(freq, t0, dur, type="sine", vol=0.18){
  if(!actx) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(actx.destination);
  const now=actx.currentTime+t0;
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(vol, now+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
  o.start(now); o.stop(now+dur+0.05);
}
function chime(kind){
  if(!soundOn||!actx) return;
  if(kind==="good"){ tone(660,0,.18,"triangle",.2); tone(880,.10,.20,"triangle",.2); tone(1175,.20,.28,"triangle",.18); }
  else if(kind==="bad"){ tone(330,0,.18,"sine",.16); tone(247,.12,.26,"sine",.16); }
  else { tone(520,0,.06,"square",.08); }
}
/* ---- speech ---- */
let jaVoice=null;
function pickVoice(){ try{ const vs=speechSynthesis.getVoices(); jaVoice=vs.find(v=>/ja|JP/i.test(v.lang))||null; }catch(e){} }
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){
  if(!soundOn||!("speechSynthesis" in window)) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.replace(/[『』]/g,""));
    u.lang="ja-JP"; u.rate=0.92; u.pitch=1.12; if(jaVoice) u.voice=jaVoice;
    speechSynthesis.speak(u);
  }catch(e){}
}
function stopSpeak(){ try{ speechSynthesis.cancel(); }catch(e){} }

/* ============================ CONFETTI ============================ */
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function confetti(){
  if(reduceMotion) return;
  const host=document.getElementById("confetti");
  const colors=["#FFD23F","#FF6F91","#37C98E","#5CC8F0","#7C5CFF","#FF8F2E"];
  const N=46;
  for(let i=0;i<N;i++){
    const b=document.createElement("div");
    b.className="confetti-bit";
    const size=8+Math.random()*8;
    b.style.width=size+"px"; b.style.height=(size*0.6)+"px";
    b.style.background=colors[i%colors.length];
    b.style.left=(48+Math.random()*4)+"%"; b.style.top="22%";
    if(Math.random()<.4) b.style.borderRadius="50%";
    host.appendChild(b);
    const ang=Math.random()*Math.PI*2, dist=120+Math.random()*220;
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist*0.6+260+Math.random()*120;
    const rot=(Math.random()*720-360);
    b.animate(
      [{transform:"translate(0,0) rotate(0)", opacity:1},
       {transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`, opacity:0}],
      {duration:1100+Math.random()*500, easing:"cubic-bezier(.2,.6,.3,1)", fill:"forwards"}
    );
    setTimeout(()=>b.remove(),1700);
  }
}

/* ============================ RENDER / FLOW ============================ */
const $=id=>document.getElementById(id);
function show(screen){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); $("screen-"+screen).classList.add("active"); }

function buildTitle(){
  $("title-mascot").innerHTML = shibaFull("happy");
  $("ico-walk").innerHTML=ICON.walk; $("ico-car").innerHTML=ICON.car; $("ico-all").innerHTML=ICON.all;
  $("ico-ear").innerHTML=ICON.ear;
  $("gly-maru").innerHTML=ICON.maru; $("gly-batsu").innerHTML=ICON.batsu;
  $("btn-home").innerHTML=ICON.home; $("btn-replay").innerHTML=ICON.replay; $("btn-replay2").innerHTML=ICON.replay;
  $("ico-replay-s").innerHTML=ICON.replayS; $("ico-home-s").innerHTML=ICON.homeW;
  updateSoundIcon();
}
function updateSoundIcon(){ $("btn-sound").innerHTML = soundOn?ICON.soundOn:ICON.soundOff; }

function startMode(mode){
  initAudio();
  let pool;
  if(mode==="walk") pool=QUESTIONS.filter(q=>q.cat==="walk").map(q=>QUESTIONS.indexOf(q));
  else if(mode==="car") pool=QUESTIONS.filter(q=>q.cat==="car").map(q=>QUESTIONS.indexOf(q));
  else pool=QUESTIONS.map((q,i)=>i);
  // light shuffle
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  queue=pool; idx=0; results=new Array(queue.length).fill(null); window._lastMode=mode;
  show("quiz"); renderQuestion();
}

function renderStars(){
  const host=$("stars"); host.innerHTML="";
  for(let i=0;i<queue.length;i++){
    const span=document.createElement("span");
    span.style.opacity = (results[i]===null && i!==idx) ? ".4" : "1";
    span.innerHTML = ICON.star(results[i]===true);
    host.appendChild(span);
  }
}

function renderQuestion(){
  answered=false;
  const q=QUESTIONS[queue[idx]];
  $("scene").innerHTML = `<div class="stamp" id="stamp"></div>` + SCENES[q.scene]();
  // re-grab stamp (innerHTML replaced)
  $("q-text").textContent = q.q;
  const ans=$("answers"); ans.classList.remove("locked");
  ans.querySelectorAll(".ans").forEach(b=>{ b.disabled=false; b.classList.remove("picked"); });
  $("explain").classList.remove("show");
  renderStars();
  // read the question aloud
  setTimeout(()=>speak(q.q), 350);
}

function onAnswer(choice){
  if(answered) return; answered=true;
  const q=QUESTIONS[queue[idx]];
  const correct = (choice===q.a);
  results[idx]=correct;
  // lock buttons
  const ans=$("answers"); ans.classList.add("locked");
  ans.querySelectorAll(".ans").forEach(b=>{ b.disabled=true; if((b.dataset.choice==="true")===choice) b.classList.add("picked"); });
  // stamp
  const st=$("stamp");
  st.innerHTML = correct?ICON.stampMaru:ICON.stampBatsu;
  void st.offsetWidth; st.classList.add("show");
  // sound + confetti
  if(correct){ chime("good"); confetti(); } else { chime("bad"); }
  renderStars();
  // explanation
  $("ex-badge").innerHTML = shibaBadge(correct?"happy":"gentle");
  const head=$("ex-head");
  head.textContent = correct?"せいかい！🎉".replace("🎉","")+" やったね！" : "おしいっ！いっしょに おぼえよう";
  head.className = "ex-head " + (correct?"ok":"no");
  $("ex-text").textContent = q.e;
  const isLast = idx===queue.length-1;
  $("btn-next").innerHTML = (isLast?"けっかを みる":"つぎへ") + ` <span style="display:inline-flex">${ICON.arrow}</span>`;
  $("explain").classList.add("show");
  // speak explanation after a beat
  setTimeout(()=>speak((correct?"せいかい！":"おしいっ。")+q.e), 650);
  // scroll explanation into view on small screens
  setTimeout(()=>$("explain").scrollIntoView({behavior:"smooth", block:"end"}), 200);
}

function nextQuestion(){
  stopSpeak();
  if(idx<queue.length-1){ idx++; renderQuestion(); window.scrollTo({top:0,behavior:"smooth"}); }
  else renderResult();
}

function renderResult(){
  stopSpeak();
  const score=results.filter(r=>r===true).length, total=queue.length;
  $("result-mascot").innerHTML = shibaFull("cheer");
  $("res-title").textContent = "よく がんばったね！";
  const rs=$("res-stars"); rs.innerHTML="";
  for(let i=0;i<total;i++){ const s=document.createElement("span"); s.style.animationDelay=(i*0.08)+"s"; s.innerHTML=ICON.star(i<score); rs.appendChild(s); }
  let line;
  if(score===total) line=`ぜんぶ せいかい！ ${total}こ ぜんぶ できたよ！すごい！`;
  else if(score>=Math.ceil(total/2)) line=`${total}もん ちゅう ${score}もん せいかい！ もういちど やってみよう。`;
  else line=`${total}もん ちゅう ${score}もん せいかい。 だいじょうぶ、また あそべば おぼえられるよ！`;
  $("res-line").textContent=line;
  show("result");
  setTimeout(()=>speak("よく がんばったね。"+line), 500);
}

function goHome(){ stopSpeak(); show("title"); window.scrollTo({top:0}); }

/* ============================ EVENTS ============================ */
document.querySelectorAll(".mode").forEach(b=> b.addEventListener("click",()=>{ initAudio(); startMode(b.dataset.mode); }));
$("answers").addEventListener("click", e=>{ const b=e.target.closest(".ans"); if(!b) return; chime("tap"); onAnswer(b.dataset.choice==="true"); });
$("btn-next").addEventListener("click", nextQuestion);
$("btn-home").addEventListener("click", goHome);
$("btn-home2").addEventListener("click", goHome);
$("btn-again").addEventListener("click", ()=>startMode(window._lastMode||"all"));
$("btn-sound").addEventListener("click", ()=>{ soundOn=!soundOn; updateSoundIcon(); if(!soundOn) stopSpeak(); else initAudio(); });
$("btn-replay").addEventListener("click", ()=>{ initAudio(); speak(QUESTIONS[queue[idx]].q); });
$("btn-replay2").addEventListener("click", ()=>{ initAudio(); const q=QUESTIONS[queue[idx]]; speak((results[idx]?"せいかい！":"おしいっ。")+q.e); });

buildTitle();
</script>
</body>
</html>

function mixKey(a, b) {
  return [a, b].sort().join('+');
}
function mixColors(c1, c2) {
  if (c1.id === c2.id) return {
    ...c1,
    isKnown: true,
    same: true
  };
  const known = MIX_TABLE[mixKey(c1.id, c2.id)];
  if (known) return {
    ...known,
    isKnown: true,
    same: false
  };

  // フォールバック:RGB平均
  const hex2rgb = hex => [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
  const [r1, g1, b1] = hex2rgb(c1.hex);
  const [r2, g2, b2] = hex2rgb(c2.hex);
  const r = Math.round((r1 + r2) / 2);
  const g = Math.round((g1 + g2) / 2);
  const b = Math.round((b1 + b2) / 2);
  const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
  return {
    name: `${c1.name}と${c2.name}`,
    hex,
    isKnown: false,
    same: false
  };
}

/* 明るい色かどうかを判定(文字色を決めるため) */
function isLight(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 160;
}

/* =========================================================
   音(Tone.js)
   ========================================================= */
const useSound = () => {
  const synthRef = useRef(null);
  const sparkleRef = useRef(null);
  const initialized = useRef(false);
  const init = useCallback(async () => {
    if (initialized.current) return;
    await Tone.start();
    synthRef.current = new Tone.Synth({
      oscillator: {
        type: 'sine'
      },
      envelope: {
        attack: 0.005,
        decay: 0.15,
        sustain: 0,
        release: 0.1
      }
    }).toDestination();
    synthRef.current.volume.value = -10;
    sparkleRef.current = new Tone.PolySynth(Tone.Synth, {
      oscillator: {
        type: 'triangle'
      },
      envelope: {
        attack: 0.005,
        decay: 0.3,
        sustain: 0,
        release: 0.2
      }
    }).toDestination();
    sparkleRef.current.volume.value = -14;
    initialized.current = true;
  }, []);
  const pop = useCallback(async () => {
    await init();
    const notes = ['C5', 'D5', 'E5', 'G5', 'A5'];
    synthRef.current.triggerAttackRelease(notes[Math.floor(Math.random() * notes.length)], '16n');
  }, [init]);
  const swoosh = useCallback(async () => {
    await init();
    synthRef.current.triggerAttackRelease('C4', '8n');
    setTimeout(() => synthRef.current.triggerAttackRelease('E4', '8n'), 100);
    setTimeout(() => synthRef.current.triggerAttackRelease('G4', '8n'), 200);
  }, [init]);
  const sparkle = useCallback(async () => {
    await init();
    sparkleRef.current.triggerAttackRelease(['C6', 'E6', 'G6'], '8n');
    setTimeout(() => sparkleRef.current.triggerAttackRelease(['E6', 'G6', 'C7'], '8n'), 150);
  }, [init]);
  return {
    pop,
    swoosh,
    sparkle
  };
};

}

  showLoaderError('スクリプト エラー', (e.message || 'unknown') + ' @ ' + (e.filename || ''));
});

// 8秒経っても React/ReactDOM が来なかったら CDN ブロックを表示
setTimeout(function() {
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    showLoaderError(
      'ライブラリが読み込めません',
      'React: ' + typeof React + ' / ReactDOM: ' + typeof ReactDOM + ' — ネット接続か CDN ブロック設定をご確認ください'
    );
    return;
  }
  // React は来ているのに描画されていない=未マウント可能性
  if (document.getElementById('root').childElementCount === 0) {
    try { mountApp(); } catch(e) {}
  }
}, 8000);

if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') {
  mountApp();
} else {
  // 念のため load イベントで再試行
  window.addEventListener('load', function() {
    if (document.getElementById('root').childElementCount === 0 &&
        typeof React !== 'undefined' && typeof ReactDOM !== 'undefined') {
      mountApp();
    }
  });
}
</script>
</body>
</html>

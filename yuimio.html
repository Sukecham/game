setupBtn('btnA','attack');setupBtn('btnB','jump');setupBtn('btnSP','special');setupBtn('btnSwitch','switch');document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')input.left=true;if(e.key==='ArrowRight')input.right=true;if(e.key==='ArrowUp')input.up=true;if(e.key==='z'||e.key==='Z')input.attack=true;if(e.key==='x'||e.key==='X')input.jump=true;if(e.key==='c'||e.key==='C')input.special=true;if(e.key==='v'||e.key==='V')input.switch=true;if(e.key==='Enter'||e.key===' '){if(gameState===0)gameState=1;else if(gameState===1){selectedChar=0;initGame();}}});document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')input.left=false;if(e.key==='ArrowRight')input.right=false;if(e.key==='ArrowUp')input.up=false;if(e.key==='z'||e.key==='Z')input.attack=false;if(e.key==='x'||e.key==='X')input.jump=false;if(e.key==='c'||e.key==='C')input.special=false;if(e.key==='v'||e.key==='V')input.switch=false;});let AC=null;function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}

function playSound(type){try{const ac=getAC();if(!ac)return;if(ac.state==='suspended')ac.resume();const osc=ac.createOscillator();const gain=ac.createGain();osc.connect(gain);gain.connect(ac.destination);const t=ac.currentTime;switch(type){case'attack':osc.type='sawtooth';osc.frequency.setValueAtTime(280,t);osc.frequency.exponentialRampToValueAtTime(120,t+0.12);gain.gain.setValueAtTime(0.15,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);osc.start();osc.stop(t+0.15);break;case'hit':osc.type='square';osc.frequency.setValueAtTime(180,t);osc.frequency.exponentialRampToValueAtTime(60,t+0.1);gain.gain.setValueAtTime(0.2,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);osc.start();osc.stop(t+0.12);break;case'jump':osc.type='sine';osc.frequency.setValueAtTime(300,t);osc.frequency.exponentialRampToValueAtTime(600,t+0.15);gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.2);osc.start();osc.stop(t+0.2);break;case'special':osc.type='triangle';osc.frequency.setValueAtTime(200,t);osc.frequency.linearRampToValueAtTime(1200,t+0.4);gain.gain.setValueAtTime(0.25,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);osc.start();osc.stop(t+0.5);break;case'enemy_die':osc.type='square';osc.frequency.setValueAtTime(400,t);osc.frequency.exponentialRampToValueAtTime(50,t+0.3);gain.gain.setValueAtTime(0.18,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);osc.start();osc.stop(t+0.3);break;case'damage':osc.type='sawtooth';osc.frequency.setValueAtTime(100,t);gain.gain.setValueAtTime(0.2,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.2);osc.start();osc.stop(t+0.2);break;case'wave_clear':[0,0.1,0.2,0.3].forEach(function(dt,i){const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=[523,659,784,1047][i];g.gain.setValueAtTime(0.15,t+dt);g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.2);o.start(t+dt);o.stop(t+dt+0.25);});break;case'switch':osc.type='sine';osc.frequency.setValueA const particles=[];function spawnParticles(x,y,color,count,type='burst'){for(let i=0;i<count;i++){const angle=(Math.PI*2/count)*i+Math.random()*0.5;const speed=type==='burst'?3+Math.random()*4:1+Math.random()*3;const size=type==='sparkle'?3+Math.random()*5:2+Math.random()*6;particles.push({x,y,vx:Math.cos(angle)*speed*(type==='burst'?1:0.5),vy:Math.sin(angle)*speed-(type==='burst'?2:1),color,size,life:1,decay:0.02+Math.random()*0.03,type,gravity:type==='burst'?0.15:0.05,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.3,});}}

function drawParticles(){for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.translate(p.x,p.y);ctx.rotate(p.rotation);if(p.type==='sparkle'){ctx.fillStyle=p.color;const s=p.size*p.life;ctx.beginPath();for(let j=0;j<4;j++){const a=(Math.PI/2)*j;if(j===0)ctx.moveTo(Math.cos(a)*s,Math.sin(a)*s);else ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);ctx.lineTo(Math.cos(a+Math.PI/4)*s*0.3,Math.sin(a+Math.PI/4)*s*0.3);}

ctx.save();ctx.fillStyle='#0d1a30';ctx.beginPath();ctx.moveTo(0,GROUND_Y-80);ctx.lineTo(40,GROUND_Y-140);ctx.lineTo(90,GROUND_Y-90);ctx.lineTo(140,GROUND_Y-160);ctx.lineTo(200,GROUND_Y-100);ctx.lineTo(250,GROUND_Y-180);ctx.lineTo(310,GROUND_Y-120);ctx.lineTo(360,GROUND_Y-150);ctx.lineTo(GW,GROUND_Y-90);ctx.lineTo(GW,GROUND_Y);ctx.lineTo(0,GROUND_Y);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(200,230,255,0.25)';ctx.beginPath();ctx.moveTo(130,GROUND_Y-160);ctx.lineTo(140,GROUND_Y-172);ctx.lineTo(150,GROUND_Y-158);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(240,GROUND_Y-180);ctx.lineTo(250,GROUND_Y-196);ctx.lineTo(262,GROUND_Y-178);ctx.closePath();ctx.fill();ctx.restore();drawBuildings();const groundGrad=ctx.createLinearGradient(0,GROUND_Y-10,0,FIELD_TOP+FIELD_H);groundGrad.addColorStop(0,'#c8e8f8');groundGrad.addColorStop(0.1,'#d8f0ff');groundGrad.addColorStop(1,'#b8d8ee');ctx.fillStyle=groundGrad;ctx.fillRect(0,GROUND_Y-10,GW,FIELD_TOP+FIELD_H-GROUND_Y+20);ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(0,GROUND_Y-10,GW,4);ctx.fillStyle='rgba(220,240,255,0.7)';ctx.beginPath();ctx.arc(-20,GROUND_Y-5,45,Math.PI,0);ctx.fill();ctx.beginPath();ctx.arc(80,GROUND_Y-3,38,Math.PI,0);ctx.fill();ctx.beginPath();ctx.arc(200,GROUND_Y-8,55,Math.PI,0);ctx.fill();ctx.beginPath();ctx.arc(340,GROUND_Y-4,42,Math.PI,0);ctx.fill();ctx.beginPath();ctx.arc(420,GROUND_Y-6,50,Math.PI,0);ctx.fill();drawSnowman(30,GROUND_Y-2,0.7);drawSnowman(70,GROUND_Y-2,0.55);drawSnowman(350,GROUND_Y-2,0.65);}

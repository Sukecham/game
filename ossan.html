<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>終電サラリーマンRPG - 酔拳おっさん都市サバイバル</title>
<style>
  :root{ --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); --safe-left: env(safe-area-inset-left); --safe-right: env(safe-area-inset-right); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{ margin:0; width:100%; height:100%; overflow:hidden; background:#070910; touch-action:none; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; }
  #wrap{ position:fixed; inset:0; overflow:hidden; background:#070910; }
  canvas{ position:absolute; inset:0; width:100%; height:100%; image-rendering:pixelated; image-rendering:crisp-edges; }
  .hud{ position:absolute; top:calc(9px + var(--safe-top)); left:calc(9px + var(--safe-left)); right:calc(9px + var(--safe-right)); display:grid; grid-template-columns:1fr auto; gap:8px; color:#fff; pointer-events:none; }
  .panel{ background:rgba(5,7,12,.64); border:1px solid rgba(255,255,255,.14); box-shadow:0 8px 24px rgba(0,0,0,.27); backdrop-filter:blur(9px); border-radius:14px; padding:9px 10px; font-size:11px; line-height:1.32; }
  .title{ font-weight:900; font-size:13px; letter-spacing:.02em; }
  .muted{ color:rgba(255,255,255,.72); }
  .bars{ display:grid; grid-template-columns:48px 1fr 38px; align-items:center; gap:5px; margin-top:5px; }
  .bar{ height:8px; border-radius:999px; background:rgba(255,255,255,.15); overflow:hidden; border:1px solid rgba(255,255,255,.16); }
  .bar > i{ display:block; height:100%; width:0%; border-radius:999px; transition:width .08s linear; }
  #hpBar{ background:linear-gradient(90deg,#6cff9f,#2fc96f); }
  #drunkBar{ background:linear-gradient(90deg,#ffd76b,#ff795c,#c15cff); }
  #staminaBar{ background:linear-gradient(90deg,#61c8ff,#4d7dff); }
  .mission{ font-weight:800; color:#ffe88b; }
  #joystick{ position:absolute; left:calc(18px + var(--safe-left)); bottom:calc(24px + var(--safe-bottom)); width:132px; height:132px; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,.15),rgba(255,255,255,.05)); border:1px solid rgba(255,255,255,.18); box-shadow:0 10px 28px rgba(0,0,0,.35); touch-action:none; }
  #stick{ position:absolute; left:41px; top:41px; width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,.84); border:2px solid rgba(0,0,0,.25); box-shadow:0 5px 14px rgba(0,0,0,.35); }
  .buttons{ position:absolute; right:calc(14px + var(--safe-right)); bottom:calc(22px + var(--safe-bottom)); display:grid; grid-template-columns:72px 72px; grid-template-rows:72px 72px; gap:11px; align-items:center; justify-items:center; touch-action:none; }
  .btn{ width:72px; height:72px; border-radius:23px; display:flex; align-items:center; justify-content:center; text-align:center; color:#fff; font-weight:900; font-size:12px; background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08)); border:1px solid rgba(255,255,255,.18); box-shadow:0 10px 28px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.22); backdrop-filter:blur(8px); }
  .btn:active,.btn.active{ transform:translateY(2px) scale(.98); background:linear-gradient(180deg,rgba(255,255,255,.30),rgba(255,255,255,.12)); }
  #attack{ grid-column:2; grid-row:1; width:82px; height:82px; border-radius:28px; background:linear-gradient(180deg,rgba(255,94,94,.94),rgba(143,30,46,.88)); }
  #dash{ grid-column:1; grid-row:2; }
  #water{ grid-column:2; grid-row:2; background:linear-gradient(180deg,rgba(96,190,255,.85),rgba(45,88,164,.82)); }
  .tip{ position:absolute; left:50%; transform:translateX(-50%); bottom:calc(168px + var(--safe-bottom)); color:rgba(255,255,255,.88); font-size:11px; padding:7px 10px; border-radius:999px; background:rgba(0,0,0,.40); pointer-events:none; white-space:nowrap; }
  #overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:24px; background:radial-gradient(circle at 50% 35%,rgba(42,55,82,.62),rgba(4,5,9,.88)); color:#fff; z-index:5; }
  .card{ max-width:430px; width:min(92vw,430px); border-radius:24px; background:rgba(5,8,15,.78); border:1px solid rgba(255,255,255,.16); box-shadow:0 24px 80px rgba(0,0,0,.45); padding:22px; backdrop-filter:blur(12px); }
  .card h1{ font-size:24px; margin:0 0 8px; line-height:1.18; }
  .card p{ margin:7px 0; color:rgba(255,255,255,.82); font-size:13px; line-height:1.55; }
  .card .rule{ background:rgba(255,255,255,.07); border-radius:14px; padding:10px; margin:10px 0; }
  #startBtn{ margin-top:14px; width:100%; height:52px; border:0; border-radius:16px; color:#1c1010; font-weight:900; font-size:16px; background:linear-gradient(180deg,#ffe88b,#ff9c56); box-shadow:0 12px 30px rgba(0,0,0,.35); }
  @media (max-width:390px){ #joystick{ width:118px;height:118px;} #stick{ left:36px;top:36px;width:46px;height:46px;} .buttons{ grid-template-columns:66px 66px; grid-template-rows:66px 66px; gap:9px; } .btn{ width:66px;height:66px;border-radius:21px;font-size:11px;} #attack{ width:74px;height:74px;} .panel{font-size:10.5px;} .tip{font-size:10.5px;} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="panel">
      <div class="title">終電サラリーマンRPG</div>
      <div class="mission" id="mission">企画書を集めて駅へ向かえ</div>
      <div class="bars"><span>体力</span><div class="bar"><i id="hpBar"></i></div><b id="hpTxt">100</b></div>
      <div class="bars"><span>酔い</span><div class="bar"><i id="drunkBar"></i></div><b id="drunkTxt">0</b></div>
      <div class="bars"><span>気力</span><div class="bar"><i id="staminaBar"></i></div><b id="staminaTxt">100</b></div>
    </div>
    <div class="panel" id="scorePanel">loading...</div>
  </div>
  <div id="joystick"><div id="stick"></div></div>
  <div class="buttons">
    <div class="btn" id="attack">書類<br>アタック</div>
    <div class="btn" id="dash">DASH</div>
    <div class="btn" id="water">お冷<br>0</div>
  </div>
  <div class="tip">酒はパワー。飲みすぎは記憶喪失。水で整えて終電へ。</div>
  <div id="overlay">
    <div class="card">
      <h1 id="ovTitle">終電サラリーマンRPG</h1>
      <p id="ovLead">都会をさまようサラリーマンおっさん。終電までに企画書を6枚回収し、駅へたどり着け。</p>
      <div class="rule" id="ovRules">
        <p>🍺 ビール・日本酒：酔いゲージ上昇。速度と書類アタックが強化。</p>
        <p>💧 お冷：酔いを下げて体力回復。飲みすぎ事故を防ぐ。</p>
        <p>👔 上司・締切モンスター：接触で体力低下。書類アタックで撃退。</p>
        <p>🚕 車：道路を走る危険物。避けるか、酔拳で切り抜けろ。</p>
      </div>
      <button id="startBtn">ゲーム開始</button>
    </div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const hpBar = document.getElementById('hpBar'), drunkBar = document.getElementById('drunkBar'), staminaBar = document.getElementById('staminaBar');
  const hpTxt = document.getElementById('hpTxt'), drunkTxt = document.getElementById('drunkTxt'), staminaTxt = document.getElementById('staminaTxt');
  const scorePanel = document.getElementById('scorePanel'), missionEl = document.getElementById('mission');
  const overlay = document.getElementById('overlay'), ovTitle = document.getElementById('ovTitle'), ovLead = document.getElementById('ovLead'), ovRules = document.getElementById('ovRules'), startBtn = document.getElementById('startBtn');
  const waterBtn = document.getElementById('water');

  const FRAME = 128, BLOCK = 520, ROAD = 150;
  const rowOf = { down:0, left:1, right:2, up:3 };
  const directions = ['down','left','right','up'];
  const anims = {
    idle:{block:0,frames:4,fps:4,loop:true},
    walk:{block:1,frames:6,fps:8,loop:true},
    attack:{block:2,frames:5,fps:11,loop:false},
    hurt:{block:3,frames:3,fps:7,loop:false},
    dead:{block:4,frames:4,fps:5,loop:false}
  };
  const rowsPerAnim = 4;
  const sheetCanvas = document.createElement('canvas');
  sheetCanvas.width = 6 * FRAME;
  sheetCanvas.height = Object.keys(anims).length * rowsPerAnim * FRAME;
  const sctx = sheetCanvas.getContext('2d');
  sctx.imageSmoothingEnabled = false;

  const pal = { outline:'#23201e', hair:'#302a23', skin:'#e5b184', shirt:'#eeeee8', suit:'#2d3a4e', suit2:'#1e2737', tie:'#8f222c', shoe:'#191716', bag:'#5c3a20', paper:'#fafaf5', glass:'#f6f8ff' };
  const rect=(c,x,y,w,h,color)=>{ c.fillStyle=color; c.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); };
  const line=(c,x1,y1,x2,y2,color,w=2)=>{ c.strokeStyle=color; c.lineWidth=w; c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke(); };

  function drawSalaryman(c, direction, anim, fi, ox, oy){
    const cfg=anims[anim]; let bob=0,sway=0,arm=0,leg=0;
    if(anim==='walk'){ const ph=fi/cfg.frames*Math.PI*2; bob=Math.sin(ph)*2; sway=Math.sin(ph)*3; arm=Math.sin(ph)*6; leg=Math.sin(ph)*5; }
    if(anim==='idle') bob=(fi===1||fi===2)?1:0;
    if(anim==='attack'){ arm=[0,6,13,7,0][fi]; sway=[0,2,5,2,0][fi]; }
    if(anim==='hurt'){ sway=[-5,5,0][fi]; bob=-2; }
    if(anim==='dead'){
      c.fillStyle='rgba(0,0,0,.25)'; c.beginPath(); c.ellipse(ox+64,oy+103,34,8,0,0,Math.PI*2); c.fill();
      rect(c,ox+39,oy+75,52,20,pal.outline); rect(c,ox+42,oy+77,45,14,pal.suit);
      rect(c,ox+74,oy+65,28,24,pal.outline); rect(c,ox+77,oy+68,21,17,pal.skin); rect(c,ox+78,oy+66,20,7,pal.hair);
      rect(c,ox+31,oy+86,14,14,pal.outline); rect(c,ox+84,oy+88,20,12,pal.shoe); return;
    }
    const cx=ox+64+sway, cy=oy+60+bob; const back=direction==='up', side=direction==='left'||direction==='right';
    c.fillStyle='rgba(0,0,0,.28)'; c.beginPath(); c.ellipse(cx,cy+52,29,7,0,0,Math.PI*2); c.fill();
    if(direction==='down'||direction==='up'){
      rect(c,cx-18-leg/2,cy+40,13,31,pal.outline); rect(c,cx-16-leg/2,cy+42,8,25,pal.suit2);
      rect(c,cx+6+leg/2,cy+40,13,31,pal.outline); rect(c,cx+8+leg/2,cy+42,8,25,pal.suit2);
      rect(c,cx-21-leg/2,cy+68,18,9,pal.shoe); rect(c,cx+4+leg/2,cy+68,18,9,pal.shoe);
    } else {
      rect(c,cx-8+leg/2,cy+40,14,30,pal.outline); rect(c,cx-6+leg/2,cy+42,9,25,pal.suit2);
      rect(c,cx-2-leg/2,cy+42,15,29,pal.outline); rect(c,cx,cy+44,10,23,pal.suit); rect(c,cx-14,cy+68,24,9,pal.shoe);
    }
    rect(c,cx-25,cy+7,50,42,pal.outline); rect(c,cx-22,cy+10,44,37,pal.suit);
    if(!back){ rect(c,cx-9,cy+12,18,31,pal.shirt); rect(c,cx-3,cy+14,6,30,pal.tie); rect(c,cx-18,cy+12,9,32,pal.suit2); rect(c,cx+9,cy+12,9,32,pal.suit2); }
    else { rect(c,cx-20,cy+12,40,33,pal.suit2); rect(c,cx-15,cy+10,30,7,pal.suit); }
    if(direction==='right'){
      rect(c,cx+20,cy+25+arm/2,15,33,pal.outline); rect(c,cx+23,cy+29+arm/2,10,25,pal.bag); rect(c,cx-30,cy+16-arm/2,12,33,pal.outline); rect(c,cx-28,cy+19-arm/2,7,27,pal.suit);
    } else if(direction==='left'){
      rect(c,cx-35,cy+25+arm/2,15,33,pal.outline); rect(c,cx-32,cy+29+arm/2,10,25,pal.bag); rect(c,cx+18,cy+16-arm/2,12,33,pal.outline); rect(c,cx+21,cy+19-arm/2,7,27,pal.suit);
    } else {
      rect(c,cx-36,cy+16+arm/2,12,33,pal.outline); rect(c,cx-34,cy+19+arm/2,7,27,pal.suit); rect(c,cx+24,cy+16-arm/2,12,33,pal.outline); rect(c,cx+27,cy+19-arm/2,7,27,pal.suit); if(direction==='down'){ rect(c,cx+31,cy+44-arm/2,17,23,pal.outline); rect(c,cx+34,cy+48-arm/2,11,16,pal.bag); }
    }
    if(anim==='attack'&&(fi===2||fi===3)){
      if(direction==='right'){ rect(c,cx+38,cy+18,22,15,pal.outline); rect(c,cx+40,cy+20,18,11,pal.paper); }
      if(direction==='left'){ rect(c,cx-60,cy+18,22,15,pal.outline); rect(c,cx-58,cy+20,18,11,pal.paper); }
      if(direction==='down'){ rect(c,cx-10,cy+54,23,19,pal.outline); rect(c,cx-8,cy+56,19,15,pal.paper); }
      if(direction==='up'){ rect(c,cx-10,cy-1,23,17,pal.outline); rect(c,cx-8,cy+1,19,13,pal.paper); }
    }
    rect(c,cx-18,cy-25,37,35,pal.outline);
    if(side){
      rect(c,cx-15,cy-22,31,30,pal.skin); const sign=direction==='right'?1:-1; rect(c,cx+sign*10-(sign<0?10:0),cy-12,10,11,pal.outline); rect(c,cx+sign*11-(sign<0?9:0),cy-10,8,8,pal.skin); rect(c,cx-16,cy-24,31,10,pal.hair); rect(c,cx-14,cy-25,12,5,pal.hair); rect(c,cx+sign*8,cy-8,3,3,pal.outline); rect(c,cx+sign*10,cy+1,7,2,pal.outline);
    } else if(back){ rect(c,cx-16,cy-22,33,30,pal.skin); rect(c,cx-18,cy-25,37,16,pal.hair); rect(c,cx-13,cy-23,27,10,pal.hair); }
    else { rect(c,cx-16,cy-22,33,30,pal.skin); rect(c,cx-17,cy-25,35,10,pal.hair); rect(c,cx-15,cy-19,8,9,pal.hair); rect(c,cx+8,cy-19,8,9,pal.hair); rect(c,cx-6,cy-24,13,4,pal.skin); rect(c,cx-12,cy-9,9,7,pal.outline); rect(c,cx-10,cy-7,5,3,pal.glass); rect(c,cx+4,cy-9,9,7,pal.outline); rect(c,cx+6,cy-7,5,3,pal.glass); line(c,cx-3,cy-6,cx+4,cy-6,pal.outline,1); rect(c,cx-8,cy+2,17,3,pal.hair); rect(c,cx-5,cy+5,11,2,pal.outline); }
  }
  function buildSheet(){ Object.keys(anims).forEach(anim=>directions.forEach(dir=>{ for(let i=0;i<anims[anim].frames;i++) drawSalaryman(sctx,dir,anim,i,i*FRAME,(anims[anim].block*rowsPerAnim+rowOf[dir])*FRAME); })); }
  buildSheet();

  const input={x:0,y:0,active:false};
  const keys={};
  const state={ mode:'title', x:0,y:0, dir:'down', anim:'idle', frame:0,timer:0, hp:100, drunk:0, stamina:100, waters:0, docs:0, docsNeed:6, score:0, time:180000, distance:0, dash:false, inv:0, attackTimer:0, attackCooldown:0, message:'', msgT:0, shake:0, blackout:0, kills:0 };
  const station={x:1520,y:1180};
  const items=[], enemies=[], particles=[], floats=[];

  function rnd(seed){ return (Math.sin(seed*127.1+311.7)*43758.5453123)%1; }
  function arnd(seed){ return Math.abs(rnd(seed)); }
  function resetGame(){
    Object.assign(state,{mode:'play',x:0,y:0,dir:'down',anim:'idle',frame:0,timer:0,hp:100,drunk:0,stamina:100,waters:0,docs:0,score:0,time:180000,distance:0,dash:false,inv:0,attackTimer:0,attackCooldown:0,message:'企画書を6枚集めて駅へ',msgT:2200,shake:0,blackout:0,kills:0});
    items.length=0; enemies.length=0; particles.length=0; floats.length=0;
    seedItems();
    for(let i=0;i<4;i++) spawnEnemy(true);
    overlay.style.display='none';
  }
  function seedItems(){
    const docs=[[-620,-420],[620,-360],[-760,610],[640,690],[1180,-720],[-1120,120]];
    docs.forEach((p,i)=>items.push({type:'doc',x:p[0],y:p[1],got:false,id:'d'+i}));
    let id=0;
    for(let gx=-4;gx<=5;gx++) for(let gy=-4;gy<=5;gy++){
      const bx=gx*420+arnd(id+1)*170-85, by=gy*420+arnd(id+2)*170-85;
      const r=arnd(id+3); let type=r<.36?'beer':r<.58?'sake':r<.78?'water':r<.90?'coffee':'yakitori';
      items.push({type,x:bx,y:by,got:false,id:'i'+id,spin:arnd(id+8)*6.28}); id++;
    }
  }
  function spawnEnemy(initial=false){
    const ang=arnd(enemies.length+state.time/1000+7)*Math.PI*2;
    const dist=initial?520+arnd(enemies.length+2)*620:520+arnd(enemies.length+3)*420;
    const type=arnd(enemies.length*9+4)<.38?'boss':(arnd(enemies.length*5+3)<.55?'deadline':'email');
    enemies.push({type,x:state.x+Math.cos(ang)*dist,y:state.y+Math.sin(ang)*dist,hp:type==='boss'?3:2,stun:0,hit:0,phase:arnd(enemies.length+11)*6.28});
  }

  function resize(){ const dpr=Math.min(window.devicePixelRatio||1,2); canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); ctx.imageSmoothingEnabled=false; }
  addEventListener('resize',resize,{passive:false}); resize();

  const joy=document.getElementById('joystick'), stick=document.getElementById('stick'); let joyId=null;
  function setStick(clientX,clientY){ const r=joy.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2; let dx=clientX-cx, dy=clientY-cy; const max=r.width*.33; const len=Math.hypot(dx,dy)||1; if(len>max){dx=dx/len*max; dy=dy/len*max;} input.x=dx/max; input.y=dy/max; input.active=true; stick.style.transform=`translate(${dx}px,${dy}px)`; }
  function resetStick(){ input.x=0; input.y=0; input.active=false; joyId=null; stick.style.transform='translate(0,0)'; }
  joy.addEventListener('pointerdown',e=>{ if(state.mode!=='play') return; joyId=e.pointerId; joy.setPointerCapture(joyId); setStick(e.clientX,e.clientY); });
  joy.addEventListener('pointermove',e=>{ if(e.pointerId===joyId) setStick(e.clientX,e.clientY); });
  joy.addEventListener('pointerup',resetStick); joy.addEventListener('pointercancel',resetStick);
  document.getElementById('dash').addEventListener('pointerdown',e=>{ e.preventDefault(); state.dash=true; e.currentTarget.classList.add('active'); });
  document.getElementById('dash').addEventListener('pointerup',e=>{ state.dash=false; e.currentTarget.classList.remove('active'); });
  document.getElementById('dash').addEventListener('pointercancel',e=>{ state.dash=false; e.currentTarget.classList.remove('active'); });
  document.getElementById('attack').addEventListener('pointerdown',e=>{ e.preventDefault(); attack(); });
  waterBtn.addEventListener('pointerdown',e=>{ e.preventDefault(); useWater(); });
  startBtn.addEventListener('pointerdown',e=>{ e.preventDefault(); resetGame(); });
  addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; if(e.key===' ') attack(); if(e.key.toLowerCase()==='e') useWater(); });
  addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
  document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

  function attack(){
    if(state.mode!=='play' || state.attackCooldown>0) return;
    state.anim='attack'; state.frame=0; state.timer=0; state.attackTimer=430; state.attackCooldown=620; state.stamina=Math.max(0,state.stamina-8); spawnBurst(state.x,state.y,'paper');
  }
  function useWater(){
    if(state.mode!=='play' || state.waters<=0) return;
    state.waters--; state.drunk=Math.max(0,state.drunk-32); state.hp=Math.min(100,state.hp+18); state.message='お冷で整った。酔い -32 / 体力回復'; state.msgT=1800; floatText(state.x,state.y-35,'整った!', '#9ee8ff');
  }
  function inputVector(){
    let vx=input.x, vy=input.y;
    if(keys['arrowleft']||keys['a']) vx-=1; if(keys['arrowright']||keys['d']) vx+=1; if(keys['arrowup']||keys['w']) vy-=1; if(keys['arrowdown']||keys['s']) vy+=1;
    const len=Math.hypot(vx,vy); if(len>1){vx/=len; vy/=len;}
    // 酔いが高いほど入力に揺らぎが出る。メリットだけでなくリスクを作る。
    if(state.drunk>55 && len>.1){ const wob=Math.sin(performance.now()/260)*(state.drunk-55)/230; const cs=Math.cos(wob), sn=Math.sin(wob); const ox=vx, oy=vy; vx=ox*cs-oy*sn; vy=ox*sn+oy*cs; }
    return {vx,vy,len:Math.hypot(vx,vy)};
  }
  function inputToDir(vx,vy){ if(Math.abs(vx)>Math.abs(vy)) return vx>0?'right':'left'; return vy>0?'down':'up'; }

  function update(dt){
    if(state.mode!=='play') return;
    state.time-=dt; state.inv=Math.max(0,state.inv-dt); state.attackTimer=Math.max(0,state.attackTimer-dt); state.attackCooldown=Math.max(0,state.attackCooldown-dt); state.msgT=Math.max(0,state.msgT-dt);

  function drawFloats(){ ctx.font='bold 13px -apple-system'; ctx.textAlign='center'; for(const f of floats){ const p=worldToScreen(f.x,f.y); ctx.globalAlpha=Math.max(0,f.life/900); ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillText(f.text,p.x+1,p.y+1); ctx.fillStyle=f.color; ctx.fillText(f.text,p.x,p.y); ctx.globalAlpha=1; } ctx.textAlign='left'; }
  function drawPlayer(){ const a=anims[state.anim]; const sx=state.frame*FRAME, sy=(a.block*rowsPerAnim+rowOf[state.dir])*FRAME; const size=Math.max(82,Math.min(108,innerWidth*.25)); const x=innerWidth/2-size/2, y=innerHeight*.50-size*.76; if(state.inv>0 && Math.floor(performance.now()/80)%2===0) ctx.globalAlpha=.45; if(state.drunk>48){ ctx.save(); ctx.globalAlpha=.18; ctx.drawImage(sheetCanvas,sx,sy,FRAME,FRAME,Math.round(x-4),Math.round(y+2),Math.round(size),Math.round(size)); ctx.restore(); } ctx.drawImage(sheetCanvas,sx,sy,FRAME,FRAME,Math.round(x),Math.round(y),Math.round(size),Math.round(size)); ctx.globalAlpha=1; const aura=state.drunk/100; if(aura>.05){ ctx.strokeStyle=`rgba(255,210,90,${0.22+aura*.25})`; ctx.lineWidth=2+aura*5; ctx.beginPath(); ctx.ellipse(innerWidth/2, y+size*.82, 26+aura*18, 9+aura*6, 0,0,Math.PI*2); ctx.stroke(); } }
  function drawAttackHint(){ if(state.attackTimer<=0) return; const p=1+state.drunk/70, cx=innerWidth/2, cy=innerHeight*.50-6; ctx.save(); ctx.globalAlpha=.22; ctx.fillStyle='#fff2a0'; const len=70+32*p, wide=42+10*p; if(state.dir==='right')ctx.fillRect(cx+24,cy-wide/2,len,wide); if(state.dir==='left')ctx.fillRect(cx-24-len,cy-wide/2,len,wide); if(state.dir==='down')ctx.fillRect(cx-wide/2,cy+24,wide,len); if(state.dir==='up')ctx.fillRect(cx-wide/2,cy-24-len,wide,len); ctx.restore(); }
  function drawArrow(){ const target = nearestTarget(); const dx=target.x-state.x, dy=target.y-state.y, d=Math.hypot(dx,dy)||1; if(d<160) return; const cx=innerWidth/2, cy=innerHeight*.50, ang=Math.atan2(dy,dx); const r=Math.min(innerWidth,innerHeight)*.38; const x=cx+Math.cos(ang)*r, y=cy+Math.sin(ang)*r; ctx.save(); ctx.translate(x,y); ctx.rotate(ang); ctx.fillStyle=target.kind==='station'?'#ffe88b':'#9ed4ff'; ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-10,-10); ctx.lineTo(-5,0); ctx.lineTo(-10,10); ctx.closePath(); ctx.fill(); ctx.restore(); ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(x-32,y+16,64,18); ctx.fillStyle='#fff'; ctx.font='10px -apple-system'; ctx.textAlign='center'; ctx.fillText(target.kind==='station'?'駅':'企画書',x,y+29); ctx.textAlign='left'; }
  function nearestTarget(){ if(state.docs>=state.docsNeed) return {x:station.x,y:station.y,kind:'station'}; let best=null,bd=1e9; for(const it of items){ if(it.got||it.type!=='doc')continue; const d=(it.x-state.x)**2+(it.y-state.y)**2; if(d<bd){bd=d; best=it;} } return best?{x:best.x,y:best.y,kind:'doc'}:{x:station.x,y:station.y,kind:'station'}; }
  function drawMessage(){ if(state.msgT<=0) return; ctx.fillStyle='rgba(0,0,0,.48)'; ctx.fillRect(innerWidth/2-139, innerHeight*.125, 278, 31); ctx.fillStyle='#fff'; ctx.font='13px -apple-system'; ctx.textAlign='center'; ctx.fillText(state.message, innerWidth/2, innerHeight*.125+21); ctx.textAlign='left'; }
  function drawMiniMap(){ const x=innerWidth-104, y=innerHeight-104, s=86; ctx.fillStyle='rgba(0,0,0,.42)'; ctx.fillRect(x,y,s,s); ctx.strokeStyle='rgba(255,255,255,.24)'; ctx.strokeRect(x,y,s,s); const scale=0.018; const drawDot=(wx,wy,col,r=3)=>{ const px=x+s/2+(wx-state.x)*scale, py=y+s/2+(wy-state.y)*scale; if(px<x||py<y||px>x+s||py>y+s)return; ctx.fillStyle=col; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill(); }; drawDot(station.x,station.y,'#ffe88b',4); for(const it of items) if(!it.got&&it.type==='doc') drawDot(it.x,it.y,'#9ed4ff',2.5); drawDot(state.x,state.y,'#ffffff',3.5); }
  function drawVignette(){ const danger=state.drunk>75 || state.hp<30; const g=ctx.createRadialGradient(innerWidth/2,innerHeight*.5,90,innerWidth/2,innerHeight*.5,innerHeight*.78); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,danger?'rgba(95,0,70,.38)':'rgba(0,0,0,.34)'); ctx.fillStyle=g; ctx.fillRect(0,0,innerWidth,innerHeight); }

  function updateHUD(){
    hpBar.style.width=Math.max(0,state.hp)+'%'; drunkBar.style.width=Math.max(0,state.drunk)+'%'; staminaBar.style.width=Math.max(0,state.stamina)+'%'; hpTxt.textContent=Math.max(0,Math.round(state.hp)); drunkTxt.textContent=Math.round(state.drunk); staminaTxt.textContent=Math.round(state.stamina); waterBtn.innerHTML=`お冷<br>${state.waters}`;
    const sec=Math.max(0,Math.ceil(state.time/1000)); const m=Math.floor(sec/60), s=String(sec%60).padStart(2,'0');
    const power=(1+state.drunk/70).toFixed(1);
    scorePanel.innerHTML=`<b>${m}:${s}</b><br><span class="muted">企画書 ${state.docs}/${state.docsNeed}<br>Power x${power}<br>Score ${state.score}</span>`;
    missionEl.textContent=state.docs>=state.docsNeed?'駅へ向かえ。終電に乗れ!':`企画書を集めろ ${state.docs}/${state.docsNeed}`;
  }

  let last=performance.now();
  function loop(now){ const dt=Math.min(40,now-last); last=now; update(dt); draw(); updateHUD(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);
})();
</script>

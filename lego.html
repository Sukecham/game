<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BRICK STUDIO ｜ 立体ブロック工房</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#21262b; --sub:#5d666e; --line:#e4e7ea;
    --panel:rgba(255,255,255,.82); --panel-solid:#ffffff;
    --accent:#ff5a3c; --accent-ink:#fff;
    --shadow:0 12px 30px rgba(28,38,48,.16), 0 2px 6px rgba(28,38,48,.08);
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:"M PLUS Rounded 1c",sans-serif;color:var(--ink);}
  #app{position:fixed;inset:0;background:#dfe4e9;}
  canvas{display:block;touch-action:none;}

  /* ---- top HUD ---- */
  .hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:flex-start;
       justify-content:space-between;padding:16px 18px;pointer-events:none;z-index:5;}
  .brand{display:flex;flex-direction:column;line-height:1;}
  .logo{font-weight:800;font-size:22px;letter-spacing:.06em;
         display:flex;align-items:center;gap:9px;color:var(--ink);}
  .logo .pip{width:18px;height:18px;border-radius:5px;background:var(--accent);
             box-shadow:inset 0 -4px 0 rgba(0,0,0,.18), inset 0 5px 6px rgba(255,255,255,.45);position:relative;}
  .logo .pip::after{content:"";position:absolute;inset:auto 0 0 0;top:3px;left:50%;
             width:8px;height:8px;border-radius:50%;transform:translateX(-50%);
             background:radial-gradient(circle at 40% 35%, rgba(255,255,255,.8), rgba(255,255,255,0) 60%), var(--accent);
             box-shadow:0 1px 1px rgba(0,0,0,.2);}
  .tag{margin-top:6px;font-size:12px;font-weight:500;color:var(--sub);letter-spacing:.04em;}
  .counter{pointer-events:auto;background:var(--panel);backdrop-filter:blur(10px);
           border:1px solid rgba(255,255,255,.6);border-radius:999px;padding:8px 15px;
           font-size:12px;font-weight:700;color:var(--sub);box-shadow:var(--shadow);}
  .counter b{color:var(--ink);font-size:15px;margin-left:5px;}

  /* ---- hint ---- */
  .hint{position:fixed;left:50%;top:74px;transform:translateX(-50%);z-index:4;
        font-size:11.5px;font-weight:500;color:var(--sub);background:var(--panel);
        backdrop-filter:blur(8px);padding:6px 13px;border-radius:999px;
        border:1px solid rgba(255,255,255,.6);box-shadow:0 4px 14px rgba(28,38,48,.10);
        white-space:nowrap;}

  /* ---- bottom dock ---- */
  .dock{position:fixed;left:8px;right:8px;bottom:8px;margin:0 auto;max-width:600px;z-index:6;
        background:var(--panel);backdrop-filter:blur(16px);
        border:1px solid rgba(255,255,255,.65);border-radius:20px;
        box-shadow:var(--shadow);overflow:hidden;}
  .dock-handle{position:relative;width:100%;border:0;background:transparent;cursor:pointer;
        font-family:inherit;font-weight:700;font-size:11px;letter-spacing:.06em;color:var(--sub);
        padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
  .dock-handle::before{content:"";position:absolute;top:6px;left:50%;transform:translateX(-50%);
        width:38px;height:4px;border-radius:99px;background:#cfd5da;}
  .dock-handle .chev{font-size:13px;transition:transform .22s;color:var(--sub);}
  .dock.collapsed .chev{transform:rotate(180deg);}
  .dock-handle .live{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--ink);}
  .dock-handle .live .dot{width:15px;height:15px;border-radius:50%;border:1.5px solid #fff;
        box-shadow:0 0 0 1px rgba(0,0,0,.12), inset 0 -2px 3px rgba(0,0,0,.25);}
  .dock-body{display:flex;flex-direction:column;gap:8px;padding:3px 11px 12px;
        transition:max-height .26s ease,opacity .2s,padding .26s;max-height:340px;opacity:1;}
  .dock.collapsed .dock-body{max-height:0;opacity:0;padding-top:0;padding-bottom:0;}

  .rowwrap{display:flex;align-items:center;gap:9px;min-width:0;}
  .label{flex:0 0 auto;font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.06em;width:32px;}
  .row{display:flex;align-items:center;gap:7px;flex-wrap:nowrap;}
  .scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
        scrollbar-width:none;padding:2px 1px;min-width:0;flex:1 1 auto;}
  .scroll::-webkit-scrollbar{height:0;display:none;}

  /* segmented */
  .seg-wrap{display:flex;flex:0 0 auto;background:#eef1f4;border-radius:12px;padding:3px;gap:3px;}
  .seg{border:0;background:transparent;font-family:inherit;font-weight:700;font-size:13px;
       white-space:nowrap;color:var(--sub);padding:8px 13px;border-radius:9px;cursor:pointer;transition:.15s;}
  .seg.active{background:#fff;color:var(--ink);box-shadow:0 2px 5px rgba(28,38,48,.12);}

  /* action buttons */
  .action{flex:0 0 auto;border:0;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);
          white-space:nowrap;background:#f1f3f5;padding:9px 14px;border-radius:12px;cursor:pointer;
          box-shadow:inset 0 -3px 0 rgba(0,0,0,.07);transition:transform .08s, background .15s;}
  .action:active{transform:translateY(2px);box-shadow:inset 0 -1px 0 rgba(0,0,0,.07);}
  .action.danger{color:#c8372a;background:#fdecea;box-shadow:inset 0 -3px 0 rgba(200,55,42,.12);}

  /* size chips */
  .size{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:10px;
        padding:8px 12px;cursor:pointer;font-weight:800;font-size:13px;color:var(--sub);
        white-space:nowrap;transition:.13s;}
  .size.active{border-color:var(--accent);background:#fff6f3;color:var(--accent);}

  /* color chips */
  .chip{flex:0 0 auto;width:27px;height:27px;border-radius:50%;cursor:pointer;border:2px solid #fff;
        box-shadow:0 0 0 1px rgba(0,0,0,.12), inset 0 -3px 4px rgba(0,0,0,.22),
        inset 0 4px 5px rgba(255,255,255,.45);position:relative;transition:transform .1s;}
  .chip::after{content:"";position:absolute;top:4px;left:6px;width:9px;height:6px;border-radius:50%;
        background:rgba(255,255,255,.55);filter:blur(.5px);}
  .chip.active{box-shadow:0 0 0 3px var(--accent), inset 0 -3px 4px rgba(0,0,0,.22),
        inset 0 4px 5px rgba(255,255,255,.45);transform:scale(1.1);}

  /* ---- placement pad (always visible while building) ---- */
  .pad{position:fixed;right:14px;bottom:104px;z-index:5;display:grid;
       grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px);gap:6px;}
  .pad.hidden{display:none;}
  .padbtn,.placebtn{border:0;font-family:inherit;cursor:pointer;border-radius:14px;
       box-shadow:var(--shadow);transition:transform .08s, background .15s, filter .15s;
       display:flex;align-items:center;justify-content:center;}
  .padbtn{background:var(--panel-solid);color:#3a4248;font-size:15px;font-weight:700;
       border:1px solid rgba(255,255,255,.6);}
  .padbtn:active{transform:scale(.9);background:#eef1f4;}
  .padbtn.up{grid-area:1/2/2/3;} .padbtn.left{grid-area:2/1/3/2;}
  .padbtn.right{grid-area:2/3/3/4;} .padbtn.down{grid-area:3/2/4/3;}
  .placebtn{grid-area:2/2/3/3;background:var(--accent);color:#fff;font-size:13px;font-weight:800;
       box-shadow:0 8px 18px rgba(255,90,60,.4), inset 0 -3px 0 rgba(0,0,0,.14);}
  .placebtn:active{transform:scale(.9);filter:brightness(.95);}

  @media (max-width:560px){
    .hint{display:none;}
    .seg{padding:7px 11px;font-size:12px;}
    .action{padding:8px 12px;font-size:12px;}
    .pad{bottom:92px;right:10px;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(3,50px);}
  }
</style>
</head>
<body>
<div id="app"></div>

<div class="hud">
  <div class="brand">
    <span class="logo"><span class="pip"></span>BRICK STUDIO</span>
    <span class="tag">レゴ風・立体ブロック工房</span>
  </div>
  <div class="counter">ブロック<b id="count">0</b></div>
</div>

<div class="hint">ドラッグ＝視点回転　・　ホイール＝ズーム　・　クリック / 矢印キーで照準　・　クリック・Enter・「設置」で配置</div>

<div class="dock" id="dock">
  <button class="dock-handle" id="dockHandle" aria-label="ツールを開閉">
    <span class="live"><span class="dot" id="liveColor"></span><span id="liveSize">2×4</span>・<span id="liveType">ブロック</span></span>
    <span class="chev">▾</span>
  </button>
  <div class="dock-body">
    <div class="row scroll">
      <div class="seg-wrap" id="modes">
        <button class="seg active" data-mode="build">組み立て</button>
        <button class="seg" data-mode="erase">こわす</button>
      </div>
      <div class="seg-wrap" id="types">
        <button class="seg active" data-type="brick">ブロック</button>
        <button class="seg" data-type="plate">プレート</button>
      </div>
      <button class="action" id="rotate">回転 ⟳</button>
    </div>
    <div class="rowwrap"><span class="label">サイズ</span><div class="row scroll" id="sizes"></div></div>
    <div class="rowwrap"><span class="label">カラー</span><div class="row scroll" id="colors"></div></div>
    <div class="row scroll">
      <button class="action" id="undo">もどす</button>
      <button class="action" id="save">保存</button>
      <button class="action" id="load">読込</button>
      <button class="action danger" id="clear">全消去</button>
    </div>
  </div>
</div>

<div class="pad" id="pad">
  <button class="padbtn up"    data-dir="up"    aria-label="奥へ">▲</button>
  <button class="padbtn left"  data-dir="left"  aria-label="左へ">◀</button>
  <button class="placebtn" id="place">設置</button>
  <button class="padbtn right" data-dir="right" aria-label="右へ">▶</button>
  <button class="padbtn down"  data-dir="down"  aria-label="手前へ">▼</button>
</div>
<input id="file" type="file" accept="application/json" hidden>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

/* ===== constants ===== */
const N = 32;            // baseplate studs per side
const P = 1;             // stud pitch (world units)
const U = 0.4;           // one plate height (brick = 3U, plate = 1U)
const STUD_R = 0.30, STUD_H = 0.20;
const GAP = 0.012;       // tiny seam between adjacent bricks
const BRICK_U = 3, PLATE_U = 1;

const COLORS = [
  ["赤","#d01a17"],["だいだい","#e8701b"],["黄","#f6c01e"],["黄緑","#79c043"],
  ["緑","#1f7a44"],["水色","#5cb6df"],["青","#0a63ad"],["紫","#6c3fa3"],
  ["ピンク","#e85aa0"],["茶","#7a4a2b"],["白","#f3f3f1"],["黒","#1c2024"],
  ["明灰","#9aa1a4"],["濃灰","#4d555a"]
];
const SIZES = [[1,1],[1,2],[1,3],[1,4],[2,2],[2,3],[2,4],[1,6],[2,6],[2,8]];

const state = { mode:"build", type:"brick", size:[2,4], colorHex:"#d01a17" };

/* ===== scene ===== */
const app = document.getElementById("app");
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = gradientTexture("#eef2f6","#d4dae0");

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(N*0.85, N*0.78, N*1.05);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1.2, 0);
controls.minDistance = 8;
controls.maxDistance = 95;
controls.maxPolarAngle = Math.PI*0.495;

/* lights */
scene.add(new THREE.HemisphereLight(0xffffff, 0x9aa0a6, 0.55));
const sun = new THREE.DirectionalLight(0xfff4e6, 2.0);
sun.position.set(22, 34, 16);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
const s = N*0.85;
Object.assign(sun.shadow.camera, { left:-s, right:s, top:s, bottom:-s, near:1, far:120 });
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.03;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

/* floor */
const floorMat = new THREE.MeshStandardMaterial({ color:0xb9bfc4, roughness:0.95 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(600,600), floorMat);
floor.rotation.x = -Math.PI/2; floor.position.y = -U - 0.001;
floor.receiveShadow = true; scene.add(floor);

/* baseplate */
const plateW = N*P;
const baseMat = new THREE.MeshStandardMaterial({ color:0xc9cdc8, roughness:0.6, metalness:0.0 });
const base = new THREE.Mesh(new THREE.BoxGeometry(plateW, U, plateW), baseMat);
base.position.y = -U/2; base.receiveShadow = true; base.castShadow = false; scene.add(base);

// baseplate studs (instanced)
const studGeo = new THREE.CylinderGeometry(STUD_R, STUD_R, STUD_H, 18);
const baseStuds = new THREE.InstancedMesh(studGeo, baseMat, N*N);
baseStuds.receiveShadow = true; baseStuds.castShadow = true;
const dummy = new THREE.Object3D();
let k = 0;
for (let i=0;i<N;i++) for (let j=0;j<N;j++){
  dummy.position.set(cellCenter(i), STUD_H/2 - 0.001, cellCenter(j));
  dummy.updateMatrix(); baseStuds.setMatrixAt(k++, dummy.matrix);
}
baseStuds.instanceMatrix.needsUpdate = true;
scene.add(baseStuds);

/* ===== helpers ===== */
function cellCenter(i){ return (i - N/2 + 0.5)*P; }            // center of stud index i
function gridYUnits(u){ return u*U; }                          // plate-units -> world Y
function gradientTexture(top, bottom){
  const c = document.createElement("canvas"); c.width=2; c.height=256;
  const g = c.getContext("2d").createLinearGradient(0,0,0,256);
  g.addColorStop(0,top); g.addColorStop(1,bottom);
  const ctx=c.getContext("2d"); ctx.fillStyle=g; ctx.fillRect(0,0,2,256);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

const matCache = new Map();
function baseMaterial(hex){
  if(!matCache.has(hex))
    matCache.set(hex, new THREE.MeshStandardMaterial({
      color:new THREE.Color(hex), roughness:0.38, metalness:0.0, envMapIntensity:0.9 }));
  return matCache.get(hex);
}

// build a merged brick geometry (centered at origin) for footprint w×d and height in plate-units
function brickGeometry(w, d, hUnits){
  const h = hUnits*U;
  const parts = [];
  const body = new THREE.BoxGeometry(w*P - GAP, h, d*P - GAP);
  body.translate(0, h/2, 0);
  parts.push(body);
  for (let i=0;i<w;i++) for (let j=0;j<d;j++){
    const stud = new THREE.CylinderGeometry(STUD_R, STUD_R, STUD_H, 18);
    stud.translate((i-(w-1)/2)*P, h + STUD_H/2 - 0.002, (j-(d-1)/2)*P);
    parts.push(stud);
  }
  return mergeGeometries(parts, false);
}

/* ===== brick registry ===== */
const bricks = [];                 // {id,x0,z0,w,d,type,colorHex,baseUnits,heightUnits,mesh}
const brickMeshes = [];            // for erase raycast
const history = [];                // {action:'add'|'remove', data}
let idSeq = 1;
const countEl = document.getElementById("count");

function brickWorldPos(x0,z0,w,d,baseUnits){
  return new THREE.Vector3(
    (x0 - N/2 + w/2)*P,
    gridYUnits(baseUnits),
    (z0 - N/2 + d/2)*P
  );
}

function supportUnits(x0,z0,w,d){
  let m = 0;
  for (const b of bricks){
    if (x0 < b.x0+b.w && x0+w > b.x0 && z0 < b.z0+b.d && z0+d > b.z0)
      m = Math.max(m, b.baseUnits + b.heightUnits);
  }
  return m;
}

function makeBrick(data, record=true){
  const geo = brickGeometry(data.w, data.d, data.heightUnits);
  const mesh = new THREE.Mesh(geo, baseMaterial(data.colorHex).clone());
  mesh.castShadow = true; mesh.receiveShadow = true;
  const p = brickWorldPos(data.x0, data.z0, data.w, data.d, data.baseUnits);
  mesh.position.copy(p);
  mesh.userData.id = data.id;
  scene.add(mesh);

  const rec = { ...data, mesh };
  bricks.push(rec); brickMeshes.push(mesh);
  if (record) history.push({ action:"add", data:{...data} });

  // pop-in animation
  mesh.scale.set(1,0.001,1);
  const t0 = performance.now();
  (function grow(){
    const e = Math.min(1,(performance.now()-t0)/140);
    mesh.scale.y = 0.001 + (1-0.001)*(1-(1-e)*(1-e));
    if(e<1) requestAnimationFrame(grow); else mesh.scale.y = 1;
  })();
  updateCount();
  return rec;
}

function removeBrickRec(rec, record=true){
  scene.remove(rec.mesh);
  rec.mesh.geometry.dispose();
  bricks.splice(bricks.indexOf(rec),1);
  brickMeshes.splice(brickMeshes.indexOf(rec.mesh),1);
  if (record) history.push({ action:"remove", data:{ x0:rec.x0,z0:rec.z0,w:rec.w,d:rec.d,
    type:rec.type, colorHex:rec.colorHex, baseUnits:rec.baseUnits, heightUnits:rec.heightUnits } });
  updateCount();
}

function updateCount(){ countEl.textContent = bricks.length; }

/* ===== ghost (placement preview) ===== */
const liveColor = document.getElementById("liveColor");
const liveSize  = document.getElementById("liveSize");
const liveType  = document.getElementById("liveType");
function updateLive(){
  liveColor.style.background = state.colorHex;
  liveSize.textContent = `${state.size[0]}×${state.size[1]}`;
  liveType.textContent = state.type==="brick" ? "ブロック" : "プレート";
}

const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
let hoverBrick = null;

// persistent placement cursor — decoupled from view dragging
const cursor = { x0: Math.round(N/2 - 1), z0: Math.round(N/2 - 2) };

// flat footprint marker drawn on the baseplate (shows the ground target)
const markerGeo = new THREE.PlaneGeometry(P, P); markerGeo.rotateX(-Math.PI/2);
const marker = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({
  color:0xff5a3c, transparent:true, opacity:0.34, depthWrite:false }));
marker.renderOrder = 1; scene.add(marker);

let ghost = null;
function rebuildGhost(){
  if (ghost){ scene.remove(ghost); ghost.geometry.dispose(); ghost.material.dispose(); ghost=null; }
  const [w,d] = state.size;
  const h = state.type==="brick"?BRICK_U:PLATE_U;
  const g = brickGeometry(w,d,h);
  const m = new THREE.MeshStandardMaterial({
    color:new THREE.Color(state.colorHex), roughness:0.4, transparent:true,
    opacity:0.55, depthWrite:false });
  ghost = new THREE.Mesh(g,m);
  ghost.renderOrder = 2;
  scene.add(ghost);
  updateLive();
  refreshGhost();
}

// position the ghost + marker at the current cursor (height auto-stacks)
function refreshGhost(){
  const [w,d] = state.size;
  cursor.x0 = Math.max(0, Math.min(N-w, cursor.x0));
  cursor.z0 = Math.max(0, Math.min(N-d, cursor.z0));
  const show = state.mode==="build";
  if (ghost) ghost.visible = show;
  marker.visible = show;
  if (!show) return;
  const baseUnits = supportUnits(cursor.x0, cursor.z0, w, d);
  ghost.position.copy(brickWorldPos(cursor.x0, cursor.z0, w, d, baseUnits));
  marker.position.set((cursor.x0 - N/2 + w/2)*P, 0.03, (cursor.z0 - N/2 + d/2)*P);
  marker.scale.set(w, 1, d);
}

function setCursor(x0, z0){ cursor.x0 = x0; cursor.z0 = z0; refreshGhost(); }

function pointerToNDC(e){
  ndc.x = (e.clientX/innerWidth)*2 - 1;
  ndc.y = -(e.clientY/innerHeight)*2 + 1;
}

// raycast the ground and return a footprint origin centered under the pointer
function pointToCell(e){
  pointerToNDC(e);
  raycaster.setFromCamera(ndc, camera);
  const pt = new THREE.Vector3();
  if (!raycaster.ray.intersectPlane(groundPlane, pt)) return null;
  const [w,d] = state.size;
  return {
    x0: Math.max(0, Math.min(N-w, Math.round(pt.x/P + N/2 - w/2))),
    z0: Math.max(0, Math.min(N-d, Math.round(pt.z/P + N/2 - d/2)))
  };
}

// place the current brick at the cursor
function placeAtCursor(){
  if (state.mode!=="build") return;
  const [w,d] = state.size;
  const baseUnits = supportUnits(cursor.x0, cursor.z0, w, d);
  makeBrick({ id:idSeq++, x0:cursor.x0, z0:cursor.z0, w, d,
    type:state.type, colorHex:state.colorHex,
    baseUnits, heightUnits: state.type==="brick"?BRICK_U:PLATE_U });
  refreshGhost();          // ghost rises to rest on what we just placed
}

// move the cursor one stud, relative to the current view direction
function nudge(dir){
  const f = new THREE.Vector3(); camera.getWorldDirection(f); f.y = 0;
  if (f.lengthSq() < 1e-6) f.set(0,0,-1);
  f.normalize();
  const r = new THREE.Vector3().crossVectors(f, new THREE.Vector3(0,1,0)).normalize();
  let v;
  if (dir==="up") v = f; else if (dir==="down") v = f.clone().negate();
  else if (dir==="right") v = r; else v = r.clone().negate();
  const dx = Math.abs(v.x) >= Math.abs(v.z) ? Math.sign(v.x) : 0;
  const dz = Math.abs(v.x) >= Math.abs(v.z) ? 0 : Math.sign(v.z);
  setCursor(cursor.x0 + dx, cursor.z0 + dz);
}

rebuildGhost();   // initial ghost + marker at center

function clearHoverBrick(){
  if (hoverBrick){ hoverBrick.material.emissive.setHex(0x000000); hoverBrick.material.emissiveIntensity=0; }
  hoverBrick = null;
}
function updateEraseHover(e){
  clearHoverBrick();
  pointerToNDC(e);
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(brickMeshes, false);
  if (hits.length){
    hoverBrick = hits[0].object;
    hoverBrick.material.emissive.setHex(0xff3b2f);
    hoverBrick.material.emissiveIntensity = 0.5;
  }
}

/* ===== input: view-drag and aim/place are kept separate ===== */
let downX=0, downY=0, moved=false, downType="mouse";
const dom = renderer.domElement;

dom.addEventListener("pointerdown", e=>{ downX=e.clientX; downY=e.clientY; moved=false; downType=e.pointerType; });
dom.addEventListener("pointermove", e=>{
  if (e.buttons!==0){                          // finger/button held = view move only
    if (Math.abs(e.clientX-downX)>6 || Math.abs(e.clientY-downY)>6) moved=true;
    return;
  }
  // hover (mouse/pen only — touch never hovers)
  if (state.mode==="build"){ const c=pointToCell(e); if(c) setCursor(c.x0,c.z0); }
  else updateEraseHover(e);
});
dom.addEventListener("pointerup", e=>{
  if (e.button!==0) return;
  if (moved){ moved=false; return; }           // it was a view drag → do nothing
  if (state.mode==="build"){
    const c = pointToCell(e);
    if (downType==="touch"){ if(c) setCursor(c.x0,c.z0); }    // tap = aim only; use 設置 to place
    else { if(c) setCursor(c.x0,c.z0); placeAtCursor(); }     // mouse click = place at cursor
  } else {
    updateEraseHover(e);
    if (hoverBrick){
      const rec = bricks.find(b=>b.mesh===hoverBrick);
      clearHoverBrick();
      if (rec) removeBrickRec(rec);
    }
  }
});
dom.addEventListener("pointerleave", ()=> clearHoverBrick());   // leave the ghost where it is

/* ===== UI wiring ===== */
// sizes
const sizesEl = document.getElementById("sizes");
SIZES.forEach(([w,d])=>{
  const b = document.createElement("button");
  b.className = "size" + (w===state.size[0]&&d===state.size[1]?" active":"");
  b.textContent = `${w}×${d}`;
  b.onclick = ()=>{
    state.size = [w,d];
    [...sizesEl.children].forEach(c=>c.classList.remove("active"));
    b.classList.add("active"); rebuildGhost();
  };
  sizesEl.appendChild(b);
});
// colors
const colorsEl = document.getElementById("colors");
COLORS.forEach(([name,hex])=>{
  const c = document.createElement("button");
  c.className = "chip" + (hex===state.colorHex?" active":"");
  c.style.background = hex; c.title = name;
  c.onclick = ()=>{
    state.colorHex = hex;
    [...colorsEl.children].forEach(x=>x.classList.remove("active"));
    c.classList.add("active"); rebuildGhost();
  };
  colorsEl.appendChild(c);
});
// mode / type segmented
document.getElementById("modes").addEventListener("click", e=>{
  const btn = e.target.closest("button"); if(!btn) return;
  state.mode = btn.dataset.mode;
  [...e.currentTarget.children].forEach(c=>c.classList.toggle("active", c===btn));
  clearHoverBrick();
  document.getElementById("pad").classList.toggle("hidden", state.mode!=="build");
  refreshGhost();
});
document.getElementById("types").addEventListener("click", e=>{
  const btn = e.target.closest("button"); if(!btn) return;
  state.type = btn.dataset.type;
  [...e.currentTarget.children].forEach(c=>c.classList.toggle("active", c===btn));
  rebuildGhost();
});
// rotate
function rotateSel(){
  state.size = [state.size[1], state.size[0]];
  [...sizesEl.children].forEach(c=>c.classList.remove("active")); // base sizes list won't match rotated, leave none active
  // re-highlight if rotated matches a listed size
  [...sizesEl.children].forEach((c,i)=>{
    if (SIZES[i][0]===state.size[0] && SIZES[i][1]===state.size[1]) c.classList.add("active");
  });
  rebuildGhost();
}
document.getElementById("rotate").onclick = rotateSel;
// collapse / expand dock
const dockEl = document.getElementById("dock");
document.getElementById("dockHandle").onclick = ()=> dockEl.classList.toggle("collapsed");
if (innerWidth < 700) dockEl.classList.add("collapsed");   // スマホは初期は閉じて作業エリアを広く
// placement pad: arrows nudge the cursor, 設置 places
document.getElementById("place").onclick = placeAtCursor;
document.getElementById("pad").addEventListener("click", e=>{
  const b = e.target.closest(".padbtn"); if(!b) return;
  nudge(b.dataset.dir);
});
// undo
function undo(){
  const last = history.pop(); if(!last) return;
  if (last.action==="add"){
    const rec = bricks.find(b=>b.id===last.data.id) || bricks[bricks.length-1];
    if (rec) removeBrickRec(rec, false);
  } else { // restore removed
    makeBrick({ id:idSeq++, ...last.data }, false);
  }
}
document.getElementById("undo").onclick = undo;
// clear
document.getElementById("clear").onclick = ()=>{
  if (!bricks.length) return;
  if (!confirm("作品をすべて消去します。よろしいですか？")) return;
  [...bricks].forEach(b=>removeBrickRec(b,false));
  history.length = 0;
};
// save
document.getElementById("save").onclick = ()=>{
  const data = bricks.map(b=>({x0:b.x0,z0:b.z0,w:b.w,d:b.d,type:b.type,
    colorHex:b.colorHex,baseUnits:b.baseUnits,heightUnits:b.heightUnits}));
  const blob = new Blob([JSON.stringify({version:1,bricks:data},null,0)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "brick-studio-" + new Date().toISOString().slice(0,10) + ".json";
  a.click(); URL.revokeObjectURL(a.href);
};
// load
const fileInput = document.getElementById("file");
document.getElementById("load").onclick = ()=> fileInput.click();
fileInput.onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const j = JSON.parse(r.result);
      [...bricks].forEach(b=>removeBrickRec(b,false));
      history.length = 0;
      (j.bricks||[]).forEach(d=> makeBrick({ id:idSeq++, ...d }, false));
    }catch(err){ alert("読み込みに失敗しました。ファイル形式を確認してください。"); }
  };
  r.readAsText(f); fileInput.value = "";
};
// keyboard
addEventListener("keydown", e=>{
  if (e.target.tagName==="INPUT") return;
  if (e.key==="r"||e.key==="R") rotateSel();
  else if (e.key==="b"||e.key==="B") document.querySelector('[data-mode="build"]').click();
  else if (e.key==="e"||e.key==="E") document.querySelector('[data-mode="erase"]').click();
  else if ((e.ctrlKey||e.metaKey) && (e.key==="z"||e.key==="Z")){ e.preventDefault(); undo(); }
  else if (e.key==="ArrowUp"){ e.preventDefault(); nudge("up"); }
  else if (e.key==="ArrowDown"){ e.preventDefault(); nudge("down"); }
  else if (e.key==="ArrowLeft"){ e.preventDefault(); nudge("left"); }
  else if (e.key==="ArrowRight"){ e.preventDefault(); nudge("right"); }
  else if ((e.key===" "||e.key==="Enter") && state.mode==="build"){ e.preventDefault(); placeAtCursor(); }
});

/* ===== loop ===== */
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
(function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>たからばこ コレクション</title>
<style>
  :root{
    --p1:#ffd6ec; --p2:#f6b8e4; --p3:#c79af0; --p4:#a37ce0;
    --gold:#ffd24d; --gold-d:#e8a800; --gold-l:#ffe892;
    --pink:#ff5fa8; --pink-d:#e0408a; --cream:#fff8fc;
    --txt:#7a3a78;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{ width:100%; height:100%; overflow:hidden; touch-action:manipulation;
    font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN","Rounded Mplus 1c",system-ui,sans-serif;
    background:linear-gradient(165deg, #ffe1f1 0%, var(--p2) 38%, var(--p3) 72%, var(--p4) 100%);
    color:var(--txt);
  }
  #stars{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star{ position:absolute; animation:tw 2.6s ease-in-out infinite; }
  .star.dot{ background:#fff; border-radius:50%; }
  @keyframes tw{ 0%,100%{opacity:.3; transform:scale(.7)} 50%{opacity:.95; transform:scale(1.15)} }
  .floaty{ position:fixed; pointer-events:none; z-index:0; opacity:.5; animation:floaty 9s ease-in-out infinite; }
  @keyframes floaty{ 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-22px) rotate(10deg)} }

  .screen{ position:fixed; inset:0; z-index:1; display:none; flex-direction:column; }
  .screen.active{ display:flex; animation:fade .35s ease; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }

  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px 6px; gap:10px; }
  .game-title{ font-size:clamp(22px,6.5vw,40px); font-weight:800; color:#fff;
    text-shadow:0 2px 0 var(--pink), 0 4px 0 var(--pink-d), 0 7px 10px rgba(120,40,110,.3); letter-spacing:1px; }
  .pill{ display:inline-flex; align-items:center; gap:6px; background:var(--gold);
    color:#8a5400; font-weight:800; font-size:clamp(15px,4.4vw,21px);
    padding:7px 16px; border-radius:999px; box-shadow:0 4px 0 var(--gold-d); white-space:nowrap; }
  .icon-btn{ background:#fff; border:none; color:var(--pink); font-weight:800;
    font-size:clamp(14px,4vw,19px); padding:9px 16px; border-radius:999px;
    box-shadow:0 4px 0 #ffbce0; cursor:pointer; white-space:nowrap; }
  .icon-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #ffbce0; }
  .subtitle{ text-align:center; font-size:clamp(15px,4.5vw,22px); font-weight:800;
    color:#fff; margin:2px 0 4px; text-shadow:0 2px 5px rgba(150,50,130,.35); }

  .grid-wrap{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:8px 14px 28px; }
  /* ホーム画面の宝箱一覧：iPhone縦1画面にスクロールなしで収める */
  .chest-wrap{ flex:1; min-height:0; overflow:hidden; padding:6px 16px 14px;
    display:flex; align-items:center; justify-content:center; }
  .chest-grid{ display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:1fr;
    gap:clamp(10px,3vw,18px); width:100%; aspect-ratio:3/3.4; max-width:520px;
    max-height:100%; margin:0 auto; }
  .chest-card{ position:relative; border-radius:clamp(16px,4.5vw,24px); cursor:pointer; min-height:0;
    background:linear-gradient(170deg, rgba(255,255,255,.42), rgba(255,255,255,.12));
    border:3px solid rgba(255,255,255,.6);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 18px rgba(120,40,110,.22); transition:transform .12s; overflow:hidden; }
  .chest-card::after{ content:""; position:absolute; top:-40%; left:-60%; width:50%; height:200%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent); transform:rotate(20deg);
    animation:shine 4.5s ease-in-out infinite; }
  @keyframes shine{ 0%,70%{left:-60%} 85%,100%{left:130%} }
  .chest-card:active{ transform:scale(.93); }
  .chest-card svg{ width:80%; height:80%; filter:drop-shadow(0 5px 5px rgba(150,60,120,.28)); position:relative; z-index:1; }

  #open-screen{ align-items:center; justify-content:center; }
  #open-stage{ position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  #big-chest-wrap{ position:relative; cursor:pointer; }
  #big-chest{ width:clamp(220px,64vw,360px); height:auto;
    filter:drop-shadow(0 16px 12px rgba(120,40,110,.35)); display:block; }
  #big-chest-wrap.shake{ animation:shake .35s; }
  @keyframes shake{ 0%,100%{transform:translateX(0) rotate(0)}
    20%{transform:translateX(-13px) rotate(-4deg)} 40%{transform:translateX(13px) rotate(4deg)}
    60%{transform:translateX(-8px) rotate(-2deg)} 80%{transform:translateX(8px) rotate(2deg)} }
  #big-lid{ transform-origin:50% 100%; transition:transform .55s cubic-bezier(.34,1.56,.64,1); }
  #big-chest-wrap.open #big-lid{ transform:translateY(-10px) rotate(-3deg); }

  #hint{ position:absolute; bottom:-58px; left:50%; transform:translateX(-50%);
    font-size:clamp(18px,5.4vw,28px); color:var(--pink); font-weight:800;
    background:#fff; padding:9px 26px; border-radius:999px; box-shadow:0 5px 0 #ffbce0; white-space:nowrap;
    animation:pop 1s ease-in-out infinite; }
  @keyframes pop{ 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.12)} }

  #prize{ position:absolute; left:50%; top:48%; transform:translate(-50%,-50%);
    width:clamp(150px,42vw,260px); height:clamp(150px,42vw,260px); opacity:0; pointer-events:none; z-index:5; }
  #prize.show{ animation:jump 1s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes jump{
    0%{ opacity:0; transform:translate(-50%,12%) scale(.2) rotate(-20deg); }
    55%{ opacity:1; transform:translate(-50%,-128%) scale(1.18) rotate(8deg); }
    75%{ transform:translate(-50%,-108%) scale(1) rotate(-4deg); }
    100%{ opacity:1; transform:translate(-50%,-114%) scale(1.06) rotate(0); } }
  #halo{ position:absolute; left:50%; top:48%; width:clamp(220px,60vw,360px); height:clamp(220px,60vw,360px);
    transform:translate(-50%,-150%) scale(0); opacity:0; pointer-events:none; z-index:4;
    background:radial-gradient(circle, rgba(255,240,180,.85) 0%, rgba(255,200,240,.4) 40%, transparent 68%); }
  #halo.show{ animation:halo 1.3s ease-out forwards .2s; }
  @keyframes halo{ 0%{transform:translate(-50%,-150%) scale(0); opacity:0}
    40%{opacity:1} 100%{transform:translate(-50%,-150%) scale(1.1); opacity:.9} }

  #prize-name{ position:absolute; top:17vh; left:50%; transform:translateX(-50%) scale(0);
    font-size:clamp(28px,8vw,52px); font-weight:800; color:#fff;
    -webkit-text-stroke:2px var(--pink-d); text-shadow:0 4px 0 var(--pink-d); white-space:nowrap; pointer-events:none; z-index:6; }
  #prize-name.show{ animation:namePop 1.4s ease forwards; }
  @keyframes namePop{ 0%{transform:translateX(-50%) scale(0) rotate(-12deg); opacity:0}
    35%{transform:translateX(-50%) scale(1.18) rotate(4deg); opacity:1}
    50%{transform:translateX(-50%) scale(1) rotate(0)} 100%{transform:translateX(-50%) scale(1); opacity:1} }

  .bottom-btns{ position:absolute; bottom:5vh; left:0; right:0;
    display:flex; gap:14px; justify-content:center; opacity:0; pointer-events:none; z-index:6; }
  .bottom-btns.show{ animation:btnIn .4s ease .35s forwards; }
  @keyframes btnIn{ to{ opacity:1; pointer-events:auto; } }
  .big-btn{ font-size:clamp(18px,5vw,26px); font-weight:800; color:#fff; border:none;
    padding:15px 30px; border-radius:999px; cursor:pointer; }
  .big-btn.gold{ background:linear-gradient(180deg,var(--gold-l),#ff9d2e); box-shadow:0 6px 0 #d67d10; }
  .big-btn.pink{ background:linear-gradient(180deg,#ffaad8,#ff5fa8); box-shadow:0 6px 0 #d63f88; }
  .big-btn:active{ transform:translateY(4px); }
  .big-btn.gold:active{ box-shadow:0 2px 0 #d67d10; }
  .big-btn.pink:active{ box-shadow:0 2px 0 #d63f88; }

  .coll-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:600px; margin:0 auto; }
  @media(min-width:520px){ .coll-grid{ grid-template-columns:repeat(4,1fr); } }
  .coll-cell{ aspect-ratio:1/1; border-radius:20px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.28); border:2.5px solid rgba(255,255,255,.5); position:relative; }
  .coll-cell.got{ background:linear-gradient(170deg,#fff8fc,#ffe0f2); border-color:var(--gold);
    box-shadow:0 5px 12px rgba(150,50,120,.25); }
  .coll-cell svg{ width:76%; height:76%; }
  .coll-cell.locked svg{ opacity:.2; filter:grayscale(1) brightness(1.1) contrast(.6); }
  .coll-cell .q{ position:absolute; font-size:34px; font-weight:800; color:rgba(255,255,255,.85);
    text-shadow:0 2px 4px rgba(150,60,130,.3); }
  #coll-count{ text-align:center; font-size:clamp(16px,4.6vw,22px); font-weight:800; color:#fff;
    margin:4px 0 6px; text-shadow:0 2px 5px rgba(150,50,130,.35); }

  #allclear{ position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    flex-direction:column; background:linear-gradient(165deg, rgba(255,200,235,.95), rgba(180,130,230,.95)); }
  #allclear.show{ display:flex; animation:fade .4s; }
  #allclear .msg{ font-size:clamp(30px,9vw,60px); font-weight:800; color:#fff;
    -webkit-text-stroke:2px var(--pink-d); text-shadow:0 4px 0 var(--pink-d); text-align:center; line-height:1.3; }
  .particle{ position:fixed; pointer-events:none; z-index:20; will-change:transform,opacity; }
</style>
</head>
<body>
<div id="stars"></div>

<section id="home-screen" class="screen active">
  <div class="topbar">
    <div class="game-title">たからばこ</div>
    <button class="icon-btn" id="to-coll">👑 たからもの</button>
  </div>
  <div class="subtitle">すきな はこを えらんでね</div>
  <div class="chest-wrap"><div class="chest-grid" id="chest-grid"></div></div>
</section>

<section id="open-screen" class="screen">
  <div class="topbar">
    <button class="icon-btn" id="back-home">← もどる</button>
    <div class="pill"><span>⭐</span><span id="score">0</span></div>
  </div>
  <div id="open-stage">
    <div id="prize-name"></div>
    <div id="halo"></div>
    <svg id="prize" viewBox="0 0 100 100"></svg>
    <div id="big-chest-wrap">
      <svg id="big-chest" viewBox="0 0 300 260"></svg>
      <div id="hint">タッチ！</div>
    </div>
    <div class="bottom-btns" id="open-btns">
      <button class="big-btn pink" id="open-back">おうちへ</button>
      <button class="big-btn gold" id="open-next">つぎのはこ →</button>
    </div>
  </div>
</section>

<section id="coll-screen" class="screen">
  <div class="topbar">
    <button class="icon-btn" id="coll-back">← もどる</button>
    <div class="game-title" style="font-size:clamp(20px,5.8vw,34px)">たからもの</div>
    <div style="width:54px"></div>
  </div>
  <div id="coll-count"></div>
  <div class="grid-wrap"><div class="coll-grid" id="coll-grid"></div></div>
</section>

<div id="allclear"><div class="msg">🎉 ぜんぶ あつめたね！<br>すごーい！ 🎉</div></div>

let collected = {};
try{ const s = localStorage.getItem(SAVE_KEY); if(s) collected = JSON.parse(s); }catch(e){}
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(collected)); }catch(e){} }

let score = Object.keys(collected).length;
let currentItem = null;
let chestOpened = false;

const $ = s => document.querySelector(s);
function wrapSvg(inner){ return '<svg viewBox="0 0 100 100">'+inner+'</svg>'; }

/* ===== ふわふわ背景（星・ハート・きらきら） ===== */
(function decoBg(){
  const box=$("#stars");
  for(let i=0;i<40;i++){ const s=document.createElement("div"); s.className="star dot";
    const sz=1+Math.random()*2.6; s.style.width=sz+"px"; s.style.height=sz+"px";
    s.style.left=Math.random()*100+"%"; s.style.top=Math.random()*100+"%";
    s.style.animationDelay=(Math.random()*2.6)+"s"; box.appendChild(s); }
  const marks=["♡","✦","♡","✿","✦"];
  for(let i=0;i<10;i++){ const f=document.createElement("div"); f.className="floaty";
    f.textContent=marks[i%marks.length];
    f.style.left=Math.random()*92+"%"; f.style.top=Math.random()*88+"%";
    f.style.fontSize=(14+Math.random()*22)+"px";
    f.style.color=["#fff","#ffd24d","#ff9ed8"][i%3];
    f.style.animationDelay=(Math.random()*9)+"s"; box.appendChild(f); }
})();

   +'<ellipse cx="60" cy="102" rx="46" ry="6" fill="rgba(150,60,120,.15)"/>'
   +'<rect x="14" y="48" width="92" height="52" rx="9" fill="'+skin.body+'"/>'
   +'<rect x="14" y="48" width="92" height="52" rx="9" fill="url(#cg)"/>'
   +'<rect x="22" y="56" width="76" height="38" rx="5" fill="rgba(255,255,255,.28)"/>'
   +'<rect x="52" y="62" width="16" height="24" rx="3" fill="'+skin.metal+'"/>'
   +'<circle cx="60" cy="70" r="6" fill="'+skin.metal+'" stroke="rgba(180,120,0,.35)" stroke-width="1.5"/>'
   +'<path d="M14 52 Q14 22 60 22 Q106 22 106 52 Z" fill="'+skin.lid+'"/>'
   +'<path d="M14 52 Q14 22 60 22 Q106 22 106 52 Z" fill="url(#cg)"/>'
   +'<rect x="16" y="44" width="88" height="9" rx="3" fill="'+skin.metal+'"/>'
   +'<rect x="52" y="38" width="16" height="14" rx="3" fill="'+skin.metal+'"/>'
   +'<path d="M60 30 L62 35 L67 36 L63 39 L64 44 L60 41 L56 44 L57 39 L53 36 L58 35 Z" fill="#fff" opacity=".75"/>'
   +'<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">'
   +'<stop offset="0" stop-color="#fff" stop-opacity=".4"/><stop offset="1" stop-color="#a0408a" stop-opacity=".12"/>'
   +'</linearGradient></defs></svg>';
}
/* あける画面用の大きな宝箱（同じskin色で描画。ふたは #big-lid グループ） */
function bigChestSvg(skin){
  return ''
   +'<ellipse cx="150" cy="246" rx="120" ry="12" fill="rgba(150,60,120,.2)"/>'
   +'<rect x="30" y="112" width="240" height="128" rx="18" fill="'+skin.body+'"/>'
   +'<rect x="30" y="112" width="240" height="128" rx="18" fill="url(#bw)"/>'
   +'<rect x="44" y="124" width="212" height="104" rx="10" fill="rgba(255,255,255,.25)"/>'
   +'<rect x="135" y="150" width="30" height="52" rx="6" fill="'+skin.metal+'"/>'
   +'<circle cx="150" cy="166" r="14" fill="'+skin.metal+'" stroke="rgba(180,120,0,.4)" stroke-width="4"/>'
   +'<circle cx="150" cy="166" r="5" fill="rgba(140,80,0,.5)"/>'
   +'<rect x="40" y="136" width="11" height="100" fill="'+skin.metal+'"/>'
   +'<rect x="249" y="136" width="11" height="100" fill="'+skin.metal+'"/>'
   +'<g id="big-lid">'
   +'<path d="M30 122 Q30 48 150 48 Q270 48 270 122 Z" fill="'+skin.lid+'"/>'
   +'<path d="M30 122 Q30 48 150 48 Q270 48 270 122 Z" fill="url(#bw)"/>'
   +'<rect x="40" y="100" width="220" height="22" rx="7" fill="'+skin.metal+'"/>'
   +'<rect x="135" y="90" width="30" height="36" rx="7" fill="'+skin.metal+'"/>'
   +'<path d="M150 60 L154 70 L165 71 L157 78 L159 89 L150 83 L141 89 L143 78 L135 71 L146 70 Z" fill="#fff" opacity=".8"/>'
   +'<circle cx="80" cy="86" r="3" fill="#fff"/><circle cx="220" cy="86" r="3" fill="#fff"/>'
   +'</g>'
   +'<defs><linearGradient id="bw" x1="0" y1="0" x2="0" y2="1">'
   +'<stop offset="0" stop-color="#fff" stop-opacity=".4"/><stop offset="1" stop-color="#a0408a" stop-opacity=".12"/>'
   +'</linearGradient></defs>';
}

let currentSkin = CHEST_SKINS[0];

const NUM_CHESTS=9;
function buildChestGrid(){
  const grid=$("#chest-grid"); grid.innerHTML="";
  for(let i=0;i<NUM_CHESTS;i++){
    const card=document.createElement("div"); card.className="chest-card";
    const skin=CHEST_SKINS[i%CHEST_SKINS.length];
    card.innerHTML=chestSvg(skin);
    card.addEventListener("click", function(){ goOpen(skin); });
    grid.appendChild(card);
  }
}

let actx=null;
function AC(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function beep(f,t0,dur,type,vol){ type=type||"sine"; vol=vol||.25;
  const c=AC(),o=c.createOscillator(),g=c.createGain();
  o.type=type; o.frequency.value=f; o.connect(g); g.connect(c.destination);
  const t=c.currentTime+t0; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t); o.stop(t+dur+.05); }
function fanfare(){ [523,659,784,1046].forEach((f,i)=>beep(f,i*.09,.34,"triangle",.3)); beep(1318,.45,.5,"sine",.25); }
function sparkleSound(){ [880,1175,1568].forEach((f,i)=>beep(f,i*.06,.2,"sine",.18)); }
function knock(){ beep(180,0,.12,"sine",.16); }
function blip(){ beep(740,0,.13,"sine",.18); }
function tada(){ [659,784,988,1318,1568].forEach((f,i)=>beep(f,i*.12,.4,"triangle",.28)); }

const SP=["✨","⭐","🌟","💖","💕","🎀","🌸","💫","👑"];
function burst(cx,cy,n){ n=n||30;
  for(let i=0;i<n;i++){ const p=document.createElement("div"); p.className="particle";
    p.textContent=SP[(Math.random()*SP.length)|0];
    p.style.left=cx+"px"; p.style.top=cy+"px"; p.style.fontSize=(16+Math.random()*28)+"px";
    document.body.appendChild(p);
    const a=Math.random()*Math.PI*2, d=80+Math.random()*240;
    const dx=Math.cos(a)*d, dy=Math.sin(a)*d-120, rot=Math.random()*720-360;
    p.animate([
      {transform:"translate(-50%,-50%) scale(.4) rotate(0)",opacity:1},
      {transform:"translate(calc(-50% + "+dx+"px),calc(-50% + "+dy+"px)) scale(1.2) rotate("+rot+"deg)",opacity:1,offset:.7},
      {transform:"translate(calc(-50% + "+(dx*1.2)+"px),calc(-50% + "+(dy+280)+"px)) scale(.6) rotate("+rot+"deg)",opacity:0}
    ],{duration:1100+Math.random()*600,easing:"cubic-bezier(.2,.7,.3,1)"}).onfinish=function(){p.remove();};
  }
}

function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); $(id).classList.add("active"); }
function pickItem(){ const notYet=ITEMS.filter(it=>!collected[it.id]); const pool=notYet.length?notYet:ITEMS; return pool[(Math.random()*pool.length)|0]; }

/* 宝箱を選んだら、その色を大きい宝箱に引き継いで表示 */
function goOpen(skin){
  blip();
  currentSkin = skin || currentSkin;
  $("#big-chest").innerHTML = bigChestSvg(currentSkin);
  currentItem=pickItem();
  resetOpenScreen();
  show("#open-screen");
}
function resetOpenScreen(){
  chestOpened=false; $("#big-chest-wrap").classList.remove("open");
  $("#prize").classList.remove("show"); $("#prize").innerHTML="";
  $("#prize-name").classList.remove("show"); $("#prize-name").textContent="";
  $("#halo").classList.remove("show");
  $("#open-btns").classList.remove("show"); $("#hint").style.display="";
}
function doOpen(){
  if(chestOpened) return; chestOpened=true;
  if(AC().resume) AC().resume();
  $("#hint").style.display="none";
  const wrap=$("#big-chest-wrap"); wrap.classList.add("shake"); knock(); setTimeout(knock,130);
  setTimeout(function(){
    wrap.classList.remove("shake"); wrap.classList.add("open"); fanfare(); sparkleSound();
    const r=wrap.getBoundingClientRect(); burst(r.left+r.width/2, r.top+r.height*0.4, 38);
    $("#halo").classList.add("show");
    $("#prize").innerHTML=currentItem.svg; $("#prize").classList.add("show");
    $("#prize-name").textContent=currentItem.name; $("#prize-name").classList.add("show");
    const isNew=!collected[currentItem.id]; collected[currentItem.id]=true; save();
    score=Object.keys(collected).length; $("#score").textContent=score;
    $("#open-btns").classList.add("show");
    if(score===ITEMS.length && isNew) setTimeout(showAllClear,900);
  },420);
}

function buildCollection(){
  const grid=$("#coll-grid"); grid.innerHTML="";
  ITEMS.forEach(function(it){
    const cell=document.createElement("div"); const got=!!collected[it.id];
    cell.className="coll-cell "+(got?"got":"locked");
    cell.innerHTML = got ? wrapSvg(it.svg) : (wrapSvg(it.svg)+'<span class="q">?</span>');
    if(got){ cell.addEventListener("click", function(){ blip();
      const r=cell.getBoundingClientRect(); burst(r.left+r.width/2, r.top+r.height/2, 14); }); }
    grid.appendChild(cell);
  });
  $("#coll-count").textContent="あつめた かず　"+score+" / "+ITEMS.length;
}

function showAllClear(){ $("#allclear").classList.add("show"); tada();
  let t=0; const iv=setInterval(function(){ burst(Math.random()*window.innerWidth, Math.random()*window.innerHeight*0.6, 18);
    if(++t>8) clearInterval(iv); },220);
}
$("#allclear").addEventListener("click", function(){ $("#allclear").classList.remove("show"); });

$("#big-chest-wrap").addEventListener("click", doOpen);
$("#open-next").addEventListener("click", function(e){ e.stopPropagation(); currentItem=pickItem(); resetOpenScreen(); blip(); });
$("#open-back").addEventListener("click", function(e){ e.stopPropagation(); show("#home-screen"); });
$("#back-home").addEventListener("click", function(){ show("#home-screen"); });
$("#to-coll").addEventListener("click", function(){ buildCollection(); show("#coll-screen"); });
$("#coll-back").addEventListener("click", function(){ show("#home-screen"); });

buildChestGrid(); $("#score").textContent=score;
</script>
</body>
</html>

/* ═══════════════ MAIN COMPONENT ═══════════════ */
function OokiinaKabuGame() {
  /*
   * State machine: title → intro → playing → failing → playing → ... → victory → celebrate
   * "locked" flag prevents any input during transitions
   */
  const [phase, setPhase] = useState("title");
  const [stageIdx, setStageIdx] = useState(0);
  const [power, setPower] = useState(0);
  const [isPulling, setIsPulling] = useState(false);
  const [turnipY, setTurnipY] = useState(0);
  const [isShaking, setIsShaking] = useState(false);
  const [narr, setNarr] = useState("");
  const [callout, setCallout] = useState("");
  const [showConfetti, setShowConfetti] = useState(false);
  const [showDirt, setShowDirt] = useState(false);
  const [locked, setLocked] = useState(false);

  /* Refs for values accessed inside rAF / timers */
  const phaseRef = useRef("title");
  const stageRef = useRef(0);
  const powerRef = useRef(0);
  const pullingRef = useRef(false);
  const lockedRef = useRef(false);
  const rafRef = useRef(null);
  const narrTimerRef = useRef(null);

  /* Sync refs */
  useEffect(() => { phaseRef.current = phase; }, [phase]);
  useEffect(() => { stageRef.current = stageIdx; }, [stageIdx]);
  useEffect(() => { lockedRef.current = locked; }, [locked]);

  const charCount = Math.min(stageIdx + 1, 6);
  const isFinal = stageIdx === 5;

  /* ─── Narration helper ─── */
  const showNarr = useCallback((text, dur = 2500) => {
    if (narrTimerRef.current) clearTimeout(narrTimerRef.current);
    setNarr(text);
    narrTimerRef.current = setTimeout(() => setNarr(""), dur);
  }, []);

  /* ─── Transition: stage failed → next character joins ─── */
  const triggerFail = useCallback((currentStage) => {
    setLocked(true);
    lockedRef.current = true;
    setIsPulling(false);
    pullingRef.current = false;
    setIsShaking(true);
    setCallout(STORY[currentStage].call);

    // After callout: show fail narration
    setTimeout(() => {
      setIsShaking(false);
      setCallout("");
      showNarr(STORY[currentStage].fail, 3000);
    }, 1300);

    // After narration: advance stage
    setTimeout(() => {
      const nextStage = currentStage + 1;
      setStageIdx(nextStage);
      stageRef.current = nextStage;
      setPower(0);
      powerRef.current = 0;
      setTurnipY(0);
      setPhase("playing");
      phaseRef.current = "playing";
      showNarr(STORY[nextStage].text, 2500);
      setLocked(false);
      lockedRef.current = false;
    }, 4000);
  }, [showNarr]);

  /* ─── Transition: victory! ─── */
  const triggerVictory = useCallback(() => {
    setLocked(true);
    lockedRef.current = true;
    setIsPulling(false);
    pullingRef.current = false;
    setCallout("ぽーん！！");
    setPhase("victory");
    phaseRef.current = "victory";
    setTurnipY(-240);

    setTimeout(() => {
      setCallout("");
      setShowConfetti(true);
      setPhase("celebrate");
      phaseRef.current = "celebrate";
      showNarr("やっと かぶは ぬけました！\nみんなで ばんざい！", 5000);
      // Unlock so tap can restart
      setLocked(false);
      lockedRef.current = false;
    }, 1400);
  }, [showNarr]);

  /* ─── Game loop using requestAnimationFrame ─── */
  const lastTickRef = useRef(0);

  const gameLoop = useCallback((timestamp) => {
    if (!pullingRef.current || phaseRef.current !== "playing" || lockedRef.current) {
      rafRef.current = null;
      return;
    }

    // Throttle updates to ~15fps for smooth but controlled progress
    if (timestamp - lastTickRef.current < 66) {
      rafRef.current = requestAnimationFrame(gameLoop);
      return;
    }
    lastTickRef.current = timestamp;

    const currentStage = stageRef.current;
    const currentFinal = currentStage === 5;
    const newPower = Math.min(powerRef.current + 2.5, 100);
    powerRef.current = newPower;
    setPower(newPower);
    setTurnipY(-newPower * 0.6);
    setShowDirt(true);

    // Shake when getting close
    if (newPower > 55) {
      setIsShaking(true);
    }

    // Non-final stage: cap at 80 and fail
    if (!currentFinal && newPower >= 80) {
      setIsShaking(false);
      setShowDirt(false);
      triggerFail(currentStage);
      rafRef.current = null;
      return;
    }

    // Final stage: victory at 100
    if (currentFinal && newPower >= 100) {
      setIsShaking(false);
      setShowDirt(false);
      triggerVictory();
      rafRef.current = null;
      return;
    }

    rafRef.current = requestAnimationFrame(gameLoop);
  }, [triggerFail, triggerVictory]);

  /* ─── Input handlers ─── */
  const handleDown = useCallback(() => {
    if (lockedRef.current) return;

    if (phaseRef.current === "title") {
      startGame();
      return;
    }
    if (phaseRef.current === "celebrate") {
      restartGame();
      return;
    }
    if (phaseRef.current !== "playing") return;

    pullingRef.current = true;
    setIsPulling(true);
    lastTickRef.current = 0;
    if (!rafRef.current) {
      rafRef.current = requestAnimationFrame(gameLoop);
    }
  }, [gameLoop]);

  const handleUp = useCallback(() => {
    pullingRef.current = false;
    setIsPulling(false);
    setShowDirt(false);
    setIsShaking(false);

    // Slide back slightly when releasing
    if (phaseRef.current === "playing" && !lockedRef.current) {
      const newP = Math.max(powerRef.current - 8, 0);
      powerRef.current = newP;
      setPower(newP);
      setTurnipY(-newP * 0.6);
    }
  }, []);

  const startGame = useCallback(() => {
    setLocked(true);
    lockedRef.current = true;
    setPhase("intro");
    phaseRef.current = "intro";
    setStageIdx(0);
    stageRef.current = 0;
    setPower(0);
    powerRef.current = 0;
    setTurnipY(0);
    setShowConfetti(false);
    setCallout("");
    setShowDirt(false);
    setIsShaking(false);

    showNarr("むかしむかし\nおじいさんが かぶの たねを\nまきました", 3200);
    setTimeout(() => showNarr("かぶは ぐんぐん\nとんでもなく おおきくなりました！", 2800), 3500);
    setTimeout(() => {
      setPhase("playing");
      phaseRef.current = "playing";
      showNarr(STORY[0].text, 2500);
      setLocked(false);
      lockedRef.current = false;
    }, 6500);
  }, [showNarr]);

  const restartGame = useCallback(() => {
    setPhase("title");
    phaseRef.current = "title";
    setStageIdx(0);
    stageRef.current = 0;
    setPower(0);
    powerRef.current = 0;
    setTurnipY(0);
    setShowConfetti(false);
    setShowDirt(false);
    setIsShaking(false);
    setCallout("");
    setNarr("");
    setLocked(false);
    lockedRef.current = false;
  }, []);

  /* Cleanup */
  useEffect(() => {
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      if (narrTimerRef.current) clearTimeout(narrTimerRef.current);
    };
  }, []);

  /* ─── Render: TITLE ─── */
  if (phase === "title") {
    return (
      <div onClick={startGame} style={{ position: "fixed", inset: 0, overflow: "hidden", fontFamily: "'M PLUS Rounded 1c',sans-serif", cursor: "pointer", userSelect: "none" }}>

          </svg>
        ))}
        <svg style={{ position: "absolute", top: "4%", right: "6%", animation: "float 4s ease-in-out infinite" }} width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="26" fill="#FFD54F" /><circle cx="40" cy="40" r="20" fill="#FFEE58" />
          {[0, 1, 2, 3, 4, 5, 6, 7].map(i => <line key={i} x1="40" y1="40" x2={40 + Math.cos(i * Math.PI / 4) * 38} y2={40 + Math.sin(i * Math.PI / 4) * 38} stroke="#FFD54F" strokeWidth="3" strokeLinecap="round" opacity=".6" />)}
        </svg>
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "48%", background: "linear-gradient(180deg,#81C784 0%,#66BB6A 12%,#6D4C41 12%,#4E342E 100%)" }}>

            {Array.from({ length: 50 }, (_, i) => <ellipse key={i} cx={i * 8 + 4} cy="14" rx="7" ry="14" fill={`hsl(${110 + (i * 7) % 20},${45 + (i * 11) % 25}%,${33 + (i * 5) % 15}%)`} />)}

        <svg style={{ position: "absolute", bottom: "44%", left: "50%", transform: "translateX(-50%)", animation: "sway 3s ease-in-out infinite", overflow: "visible" }} width="140" height="190" viewBox="-70 -95 140 190">
          <defs>

          </g>

          <path d="M0,64 Q2,76 0,82" stroke="#D7CCC8" strokeWidth="3" fill="none" strokeLinecap="round" />
        </svg>
        <div style={{ position: "absolute", top: "6%", left: "50%", transform: "translateX(-50%)", textAlign: "center", zIndex: 10, paddingTop: "env(safe-area-inset-top,0)" }}>

            <stop offset="0%" stopColor="#81C784" />
            <stop offset="100%" stopColor="#388E3C" />
          </radialGradient>
        </defs>

        {/* Ground cracks — visibility controlled by opacity, no re-mount */}
        {CRACK_DATA.map((c, i) => (
          <line key={i} x1={c.sx} y1={c.sy} x2={c.ex} y2={c.ey}
            stroke="#3E2723" strokeWidth="1.2" strokeLinecap="round"
            opacity={i < charCount * 3 ? 0.15 + charCount * 0.04 : 0}
          />
        ))}

        {/* Turnip — CSS transform for movement, no state-driven re-mount */}
        <g style={{
          transform: phase === "victory" || phase === "celebrate"
            ? "translateY(-240px)"
            : `translateY(${turnipY}px)`,
          transition: phase === "victory"
            ? "transform 0.8s cubic-bezier(0.34,1.56,0.64,1)"
            : "transform 0.12s linear",
        }}>
          <g style={{
            transform: isShaking ? "translate(-3px,-1px) rotate(-1.5deg)" : "translate(0,0) rotate(0deg)",
            transition: "transform 0.08s ease-in-out",
          }}>
            <TurnipSVG />
          </g>
        </g>

        {/* Dirt particles — always mounted, visibility toggled via opacity */}
        {DIRT_POSITIONS.map((d, i) => (
          <circle key={i} cx={d.cx} cy={d.cy} r={d.r}
            fill={`hsl(${d.hue},${d.sat}%,${d.light}%)`}
            style={{
              opacity: showDirt ? 0 : 0,
              animation: showDirt ? `dirtAnim 0.5s ease-out ${d.delay}s` : "none",
              transform: showDirt ? `translate(${d.tx}px, ${d.ty}px)` : "translate(0,0)",
              transition: showDirt ? `transform 0.5s ease-out ${d.delay}s, opacity 0.5s ease-out ${d.delay}s` : "none",
            }}
          />
        ))}
        {/* Simple visual dirt feedback: small brown circles that appear near ground during pull */}
        {isPlayPulling && Array.from({ length: 6 }, (_, i) => (
          <circle key={`pd${i}`}
            cx={-30 + i * 12} cy={80 + (i % 3) * 5}
            r={2 + (i % 3)}
            fill={`hsl(${28 + i * 3},50%,${35 + i * 4}%)`}
            opacity={0.5 + (i % 3) * 0.15}
          >
            <animate attributeName="cy" from={`${80 + (i % 3) * 5}`} to={`${55 + (i % 3) * 8}`} dur="0.6s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="0.7" to="0" dur="0.6s" repeatCount="indefinite" />
          </circle>
        ))}

        {/* Rope from turnip to first character */}
        {charCount > 0 && (
          <path
            d={`M0,${-50 + turnipY} Q${-30},${-20 + turnipY / 2} ${-CHAR_SPACING[charCount - 1] / 2 - 20},${-30}`}
            stroke="#8D6E63" strokeWidth="3" fill="none" strokeLinecap="round" strokeDasharray="8,4" opacity=".7"
          />
        )}

        {/* Characters */}
        <g transform={`translate(${-CHAR_SPACING[charCount - 1] / 2 - 25}, 0)`}>
          {Array.from({ length: charCount }, (_, i) => {
            const Comp = CHAR_COMPS[i];
            const xPos = CHAR_SPACING[i];
            return (
              <g key={i}>
                {i > 0 && (
                  <path
                    d={`M${CHAR_SPACING[i - 1] + 16},${-16} Q${(CHAR_SPACING[i - 1] + xPos) / 2},${-8} ${xPos - 16},${-16}`}
                    stroke="#8D6E63" strokeWidth="2.5" fill="none" strokeDasharray="6,3" opacity=".6"
                  />
                )}
                <Comp x={xPos} y={0} scale={0.78} pulling={isPlayPulling} celebrating={isCelebrating} />
              </g>
            );
          })}
        </g>
      </svg>

      {/* Narration */}
      {narr && (
        <div key={narr} style={{
          position: "absolute", top: "env(safe-area-inset-top,10px)", left: "50%", transform: "translateX(-50%)",
          background: "rgba(255,255,255,0.94)", borderRadius: 26, padding: "14px 28px", maxWidth: "88%",
          textAlign: "center", fontWeight: 800, fontSize: 17, color: "#3E2723", lineHeight: 1.75,
          letterSpacing: 1.5, boxShadow: "0 6px 30px rgba(0,0,0,0.12)", zIndex: 100,
          animation: "slideIn 0.4s ease-out", whiteSpace: "pre-line", marginTop: 48,
        }}>{narr}</div>
      )}

      {/* Callout */}
      {callout && (
        <div key={callout} style={{
          position: "absolute", top: "36%", left: "50%", transform: "translate(-50%,-50%)",
          fontSize: 32, fontWeight: 900, color: "#E65100",
          textShadow: "0 3px 14px rgba(0,0,0,0.15), 0 0 40px rgba(255,167,38,0.3)",
          animation: "fadeCallout 1.3s ease-out forwards",
          zIndex: 120, whiteSpace: "pre-line", textAlign: "center", letterSpacing: 2, lineHeight: 1.5,
          pointerEvents: "none",
        }}>{callout}</div>
      )}

      {/* Pull prompt */}
      {showPullPrompt && (
        <div style={{
          position: "absolute", bottom: "16%", left: "50%", transform: "translateX(-50%)",
          display: "flex", flexDirection: "column", alignItems: "center",
          animation: "bob 1.2s ease-in-out infinite", zIndex: 80, pointerEvents: "none",
        }}>
          <svg width="52" height="52" viewBox="0 0 52 52">
            <circle cx="26" cy="26" r="24" fill="rgba(255,255,255,0.92)" stroke="#E65100" strokeWidth="2" />
            <path d="M26,14 L26,36 M19,28 L26,36 L33,28" stroke="#E65100" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          <div style={{
            background: "rgba(255,255,255,0.92)", borderRadius: 22, padding: "8px 22px",
            fontSize: 16, fontWeight: 800, color: "#4E342E", marginTop: 8, letterSpacing: 2,
            boxShadow: "0 4px 16px rgba(0,0,0,0.1)",
          }}>おして ひっぱろう！</div>
        </div>
      )}

      {/* Progress bar */}
      {phase === "playing" && !locked && (
        <div style={{
          position: "absolute", bottom: "calc(41% - 14px)", left: "8%", width: "84%",
          height: 10, background: "rgba(0,0,0,0.1)", borderRadius: 5, overflow: "hidden", zIndex: 30,
        }}>
          <div style={{
            height: "100%", width: `${power}%`,
            background: isFinal
              ? "linear-gradient(90deg,#66BB6A,#43A047,#2E7D32)"
              : "linear-gradient(90deg,#FFB74D,#FFA726,#FF9800)",
            borderRadius: 5, transition: "width 0.1s linear",
            boxShadow: isFinal ? "0 0 14px rgba(76,175,80,0.5)" : "0 0 14px rgba(255,152,0,0.4)",
          }} />
        </div>
      )}

      {/* Stage indicator */}
      <div style={{
        position: "absolute", top: "env(safe-area-inset-top,10px)", left: 14,
        background: "rgba(255,255,255,0.88)", borderRadius: 22, padding: "7px 16px",
        boxShadow: "0 3px 14px rgba(0,0,0,0.08)", zIndex: 90, marginTop: 48,
      }}>
        <span style={{ fontSize: 14, fontWeight: 800, color: "#5D4037" }}>なかま {charCount}/6</span>
      </div>

      {/* Celebration */}
      {isCelebrating && (
        <div style={{
          position: "absolute", bottom: "8%", left: "50%", transform: "translateX(-50%)",
          display: "flex", flexDirection: "column", alignItems: "center", zIndex: 150,
        }}>
          <div style={{ fontSize: 50, animation: "celebBounce 1s ease-in-out infinite" }}>🎊</div>
          <div style={{ marginTop: 6, fontSize: 16, fontWeight: 800, color: "#5D4037", textAlign: "center", lineHeight: 1.6 }}>
            みんなで おいしく<br />かぶを たべました
          </div>
          <div style={{
            background: "linear-gradient(135deg,#FF7043,#F4511E)", borderRadius: 40,
            padding: "16px 40px", fontSize: 20, fontWeight: 900, color: "white",
            boxShadow: "0 6px 24px rgba(244,81,30,0.4),inset 0 2px 4px rgba(255,255,255,0.3)",
            marginTop: 14, letterSpacing: 2, whiteSpace: "nowrap",
          }}>もういっかい！</div>
        </div>
      )}

      {/* Confetti */}
      {showConfetti && (
        <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 200, overflow: "hidden" }}>
          {CONFETTI_DATA.map((p, i) => (
            <div key={i} style={{
              position: "absolute", left: `${p.left}%`, top: -20,
              width: p.size, height: p.size * 0.6,
              background: p.color, borderRadius: p.size > 12 ? "50%" : "2px",
              animation: `confettiFall ${p.dur}s ease-in ${p.delay}s forwards`,
              "--drift": `${p.drift}px`, "--rot": `${p.rot}deg`, opacity: 0,
            }} />
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OokiinaKabuGame />);
</script>
</body>
</html>

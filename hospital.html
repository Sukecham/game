<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#05070a" />
<title>深夜病棟 — しんやびょうとう</title>
<style>
  :root{
    --ink:#cdd6dc; --sick:#9fb39a; --blood:#b3201f; --glow:#cfe3ff;
    --panel:rgba(8,10,14,0.55); --stroke:rgba(150,180,190,0.16);
    --font:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    --font-ui:"Hiragino Sans","Yu Gothic",-apple-system,sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; background:#020305; }
  body{ font-family:var(--font-ui); color:var(--ink); -webkit-user-select:none; user-select:none; touch-action:none; }
  #scene{ position:fixed; inset:0; display:block; }

  #grain{ position:fixed; inset:0; pointer-events:none; z-index:4; opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  #scanlines{ position:fixed; inset:0; pointer-events:none; z-index:5; opacity:.10;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.5) 3px, rgba(0,0,0,0) 4px); }

  #hud{ position:fixed; inset:0; z-index:10; pointer-events:none; }
  .panel{ background:var(--panel); border:1px solid var(--stroke); border-radius:10px;
    backdrop-filter:blur(6px) saturate(.9); -webkit-backdrop-filter:blur(6px) saturate(.9); }

  #quest{ position:absolute; top:calc(env(safe-area-inset-top) + 14px); left:14px; padding:10px 14px 11px; max-width:62vw;
    opacity:0; transform:translateY(-6px); transition:opacity 1s, transform 1s; }
  #quest .label{ font-size:10px; letter-spacing:.34em; color:var(--sick); opacity:.8; }
  #quest .obj{ font-family:var(--font); font-size:15px; margin-top:3px; line-height:1.45; }

  #status{ position:absolute; top:calc(env(safe-area-inset-top) + 14px); right:14px; padding:9px 13px; text-align:right; opacity:0; transition:opacity 1s; }
  #clock{ font-family:var(--font); font-size:12px; letter-spacing:.2em; color:var(--sick); }
  #keys{ margin-top:5px; font-size:14px; display:flex; align-items:center; gap:7px; justify-content:flex-end; }
  #keys .k{ width:9px; height:9px; border-radius:2px; background:#3a3f44; box-shadow:inset 0 0 3px #000; transition:background .4s, box-shadow .4s; }
  #keys .k.on{ background:#e8c659; box-shadow:0 0 8px 2px rgba(232,198,89,.8); }

  #toast{ position:absolute; left:50%; top:62%; transform:translate(-50%,-50%);
    font-family:var(--font); font-size:17px; line-height:1.8; text-align:center; padding:16px 24px; max-width:80vw; letter-spacing:.05em;
    color:#e7eef2; background:rgba(6,8,12,0.72); border:1px solid rgba(150,180,190,0.18); border-radius:12px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); box-shadow:0 10px 40px rgba(0,0,0,.6);
    text-shadow:0 1px 10px rgba(0,0,0,.7); opacity:0; transition:opacity .5s; pointer-events:none; }

  #joybase{ position:absolute; width:118px; height:118px; border-radius:50%; border:1.5px solid rgba(150,180,190,0.22); background:rgba(10,12,16,0.2);
    z-index:11; opacity:0; transition:opacity .2s; pointer-events:none; backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); }
  #joystick{ position:absolute; width:54px; height:54px; border-radius:50%;
    background:radial-gradient(circle at 38% 35%, rgba(220,230,236,.85), rgba(150,180,190,.5)); box-shadow:0 0 14px rgba(120,150,160,.4);
    z-index:12; opacity:0; transition:opacity .2s; pointer-events:none; transform:translate(-50%,-50%); }
  #hint{ position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom) + 18px); transform:translateX(-50%); z-index:11; opacity:.5; transition:opacity .6s;
    font-size:11px; letter-spacing:.18em; color:var(--ink); text-align:center; pointer-events:none; text-shadow:0 1px 8px rgba(0,0,0,.9); }

  #action{ position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom) + 56px); transform:translateX(-50%) scale(.9); z-index:13;
    padding:12px 28px; border-radius:999px; pointer-events:auto; font-family:var(--font); font-size:16px; letter-spacing:.08em; color:#0a0c0e;
    background:linear-gradient(180deg,#cdd6dc,#9fb0b8); border:1px solid rgba(255,255,255,.4);
    box-shadow:0 6px 24px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.5); opacity:0; transition:opacity .25s, transform .25s; cursor:pointer; display:none; }
  #action.show{ opacity:1; transform:translateX(-50%) scale(1); display:block; }
  #action:active{ transform:translateX(-50%) scale(.95); }

  #topbtns{ position:absolute; top:calc(env(safe-area-inset-top) + 14px); left:50%; transform:translateX(-50%); z-index:12; display:flex; gap:9px; pointer-events:none; opacity:0; transition:opacity 1s; }
  .iconbtn{ pointer-events:auto; height:38px; min-width:38px; padding:0 12px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; letter-spacing:.08em; color:var(--ink); }
  .iconbtn:active{ transform:scale(.92); }

  /* ジャンプスケア */
  #jumpscare{ position:fixed; inset:0; z-index:50; pointer-events:none; opacity:0; background:#000;
    background-size:cover; background-position:center; }
  #jumpscare.show{ opacity:1; }
  #redflash{ position:fixed; inset:0; z-index:49; pointer-events:none; opacity:0; background:radial-gradient(120% 100% at 50% 50%, rgba(140,0,0,0) 30%, rgba(120,0,0,.7) 100%); }

  #title{ position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    background:radial-gradient(130% 100% at 50% 30%, #10141c 0%, #07090f 50%, #020305 100%); transition:opacity 1.6s ease; }
  #title .kanji{ font-family:var(--font); font-size:clamp(48px,15vw,104px); font-weight:400; letter-spacing:.22em; color:#d7dee4; text-indent:.22em;
    text-shadow:0 0 30px rgba(120,150,170,.25), 0 4px 30px rgba(0,0,0,.7); animation:flickerIn 3s steps(1) both; }
  #title .romaji{ font-size:11px; letter-spacing:.55em; color:var(--sick); margin-top:10px; text-indent:.55em; opacity:.8; animation:fade 3s 1.2s both; }
  #title .sub{ font-family:var(--font); font-size:14px; color:rgba(205,214,220,.6); margin-top:34px; line-height:2; letter-spacing:.1em; animation:fade 3s 1.6s both; }
  #start{ margin-top:46px; padding:14px 44px; border-radius:999px; cursor:pointer; font-family:var(--font); font-size:17px; letter-spacing:.18em; color:#0a0c0e; text-indent:.18em;
    background:linear-gradient(180deg,#cdd6dc,#94a3ab); border:1px solid rgba(255,255,255,.4);
    box-shadow:0 8px 30px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.5); animation:fade 3s 2s both, breathe 4s 3s ease-in-out infinite; }
  #start:active{ transform:scale(.96); }
  #warn{ position:absolute; bottom:64px; font-size:10.5px; letter-spacing:.18em; color:rgba(180,80,80,.7); }
  #loadnote{ position:absolute; bottom:34px; font-size:11px; letter-spacing:.2em; color:rgba(205,214,220,.4); }
  @keyframes flickerIn{ 0%{opacity:0} 10%{opacity:.4} 12%{opacity:0} 20%{opacity:.7} 24%{opacity:.1} 30%{opacity:1} 40%{opacity:.3} 44%{opacity:1} 100%{opacity:1} }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  @keyframes breathe{ 0%,100%{box-shadow:0 8px 30px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.5)} 50%{box-shadow:0 8px 40px rgba(120,150,170,.35),inset 0 1px 0 rgba(255,255,255,.5)} }

  #fade{ position:fixed; inset:0; background:#000; z-index:25; pointer-events:none; opacity:0; transition:opacity 1.6s ease; }
  #endtext{ position:fixed; inset:0; z-index:26; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity 2s ease;
    font-family:var(--font); font-size:19px; color:#c9d2d8; text-align:center; line-height:2; letter-spacing:.08em; padding:30px; text-shadow:0 0 20px rgba(0,0,0,.8); }
  #err{ position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center; background:#07090f; color:#cdd6dc; font-family:var(--font); font-size:16px; text-align:center; padding:30px; line-height:1.9; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="scanlines"></div>
<div id="grain"></div>
<div id="redflash"></div>
<div id="jumpscare"></div>

<div id="hud">
  <div id="quest" class="panel"><div class="label">深夜0時 ・ 旧病棟</div><div class="obj" id="quest-text">出口の鍵を 3つ 探す</div></div>
  <div id="status" class="panel"><div id="clock">00:00</div><div id="keys"><span class="k" id="k0"></span><span class="k" id="k1"></span><span class="k" id="k2"></span></div></div>
  <div id="topbtns"><div class="iconbtn panel" id="qualityBtn">画質 高</div><div class="iconbtn panel" id="muteBtn">♪</div></div>
  <div id="toast"></div>
  <div id="joybase"></div><div id="joystick"></div>
  <button id="action"></button>
  <div id="hint">左で歩く ・ 右をなぞって見まわす ・ 懐中電灯で照らす</div>
</div>

<div id="fade"></div>
<div id="endtext"></div>

<div id="title">
  <div class="kanji">深夜病棟</div>
  <div class="romaji">MIDNIGHT WARD</div>
  <div class="sub">点滴の音だけが、廊下に響いている。<br>誰もいないはずの、夜の病院。<br>出口の鍵は、3つ。</div>
  <button id="start">中へ入る</button>
  <div id="warn">※ 大きな音・暗い画面・突然の演出があります。音量にご注意ください。</div>
  <div id="loadnote">読み込み中…</div>
</div>

<div id="err">お使いの環境では 3D 表示（WebGL）が利用できないようです。<br>別のブラウザでお試しください。</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

/* ============================================================
   深夜病棟 — 一人称ホラー / 鍵を3つ集めて脱出
   ============================================================ */

let renderer, scene, camera, composer, gradePass, bloomPass, smaaPass;
const clock = new THREE.Clock();
const U = { uTime:{ value:0 } };
let MAX_ANISO = 4;

const IS_MOBILE = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (('ontouchstart' in window) && Math.min(innerWidth,innerHeight) < 820);
const Q = {
  high: !IS_MOBILE,
  dpr: IS_MOBILE ? 1.5 : 2,
  shadow: IS_MOBILE ? 1024 : 2048,
};

const H = 3.2;              // 天井高
const EYE = 1.55;
let started = false;

const player = { pos:new THREE.Vector3(0,EYE,15.5), yaw:Math.PI, pitch:-0.02, speed:3.5, bob:0, moveX:0, moveZ:0, stepDist:0 };

const colliders = [];      // {minX,maxX,minZ,maxZ}
const interactables = [];  // {type,x,z,r,label,action,once}
const doors = [];
const flickerLights = [];
const ghosts = [];         // 出現する霊たち
const roamers = [];        // 徘徊する影

let keysFound = 0; const KEY_GOAL = 3; let escaped = false;
let fear = 0;              // 恐怖メーター（演出用）
let shake = 0;            // 画面ゆれ

const sunDir = new THREE.Vector3(0,-1,0);

/* ============================================================
   プロシージャル・テクスチャ
   ============================================================ */
function cv(size){ const c=document.createElement('canvas'); c.width=c.height=size; return c; }
function fbmInto(ctx, size, layers){
  ctx.save(); ctx.imageSmoothingEnabled=true;
  layers.forEach(L=>{
    const g=cv(L.cells), gc=g.getContext('2d'); const img=gc.createImageData(L.cells,L.cells);
    for(let i=0;i<L.cells*L.cells;i++){ const v=Math.floor(Math.random()*255); img.data[i*4]=v; img.data[i*4+1]=v; img.data[i*4+2]=v; img.data[i*4+3]=255; }
    gc.putImageData(img,0,0); ctx.globalAlpha=L.alpha; ctx.globalCompositeOperation=L.mode||'overlay'; ctx.drawImage(g,0,0,size,size);
  });
  ctx.restore();
}
function heightToNormal(srcCanvas, strength){
  const s=srcCanvas.width, sc=srcCanvas.getContext('2d'), data=sc.getImageData(0,0,s,s).data;
  const out=cv(s), oc=out.getContext('2d'), od=oc.createImageData(s,s);
  const Hf=(x,y)=>{ x=(x+s)%s; y=(y+s)%s; return data[(y*s+x)*4]/255; };
  for(let y=0;y<s;y++) for(let x=0;x<s;x++){
    const dx=(Hf(x-1,y)-Hf(x+1,y))*strength, dy=(Hf(x,y-1)-Hf(x,y+1))*strength, nz=1, len=Math.hypot(dx,dy,nz), i=(y*s+x)*4;
    od.data[i]=((dx/len)*.5+.5)*255; od.data[i+1]=((dy/len)*.5+.5)*255; od.data[i+2]=((nz/len)*.5+.5)*255; od.data[i+3]=255;
  }
  oc.putImageData(od,0,0); return out;
}
function tex(canvas, rep){ const t=new THREE.CanvasTexture(canvas); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=MAX_ANISO; if(rep) t.repeat.set(rep,rep); t.colorSpace=THREE.SRGBColorSpace; return t; }
function texLin(canvas, rep){ const t=tex(canvas,rep); t.colorSpace=THREE.NoColorSpace; return t; }

const TEX={};
function buildTextures(){
  // 病院の壁（病的なクリーム/緑、塗装の剥がれ・染み）
  (function(){
    const S=512,c=cv(S),x=c.getContext('2d');
    x.fillStyle='#b9bdaa'; x.fillRect(0,0,S,S);
    // 上下で色分け（腰壁）
    x.fillStyle='#8a9384'; x.fillRect(0,S*0.62,S,S*0.38);
    x.strokeStyle='rgba(40,46,40,.6)'; x.lineWidth=4; x.beginPath(); x.moveTo(0,S*0.62); x.lineTo(S,S*0.62); x.stroke();
    fbmInto(x,S,[{cells:64,alpha:.22},{cells:200,alpha:.14}]);
    // 水染み
    for(let i=0;i<14;i++){ x.globalAlpha=.10+Math.random()*.12; const gx=Math.random()*S, gy=Math.random()*S*0.6, r=20+Math.random()*70;
      const g=x.createRadialGradient(gx,gy,0,gx,gy,r); g.addColorStop(0,'#5b5237'); g.addColorStop(1,'rgba(91,82,55,0)'); x.fillStyle=g; x.beginPath(); x.arc(gx,gy,r,0,7); x.fill(); }
    // 剥がれ
    x.globalAlpha=1;
    for(let i=0;i<26;i++){ x.fillStyle='rgba(120,110,90,.4)'; x.beginPath(); const px=Math.random()*S,py=Math.random()*S,r=4+Math.random()*16; x.moveTo(px,py);
      for(let a=0;a<7;a+=1){ x.lineTo(px+Math.cos(a)*r*(.6+Math.random()*.6), py+Math.sin(a)*r*(.6+Math.random()*.6)); } x.fill(); }
    TEX.wallMap=tex(c);
    const h=cv(S),hx=h.getContext('2d'); hx.fillStyle='#808080'; hx.fillRect(0,0,S,S); fbmInto(hx,S,[{cells:128,alpha:.45}]);
    hx.fillStyle='#aaa'; hx.fillRect(0,S*0.615,S,4);
    TEX.wallNrm=texLin(heightToNormal(h,0.9));
  })();

  // 床（汚れたリノリウム/タイル）
  (function(){
    const S=512,c=cv(S),x=c.getContext('2d');
    x.fillStyle='#5a5f5c'; x.fillRect(0,0,S,S);
    const tiles=4, t=S/tiles;
    for(let i=0;i<tiles;i++) for(let j=0;j<tiles;j++){ const v=Math.random()*16-8; x.fillStyle=`rgb(${88+v},${92+v},${88+v})`; x.fillRect(i*t+1,j*t+1,t-2,t-2); }
    x.strokeStyle='rgba(20,24,22,.7)'; x.lineWidth=3;
    for(let i=0;i<=tiles;i++){ x.beginPath(); x.moveTo(i*t,0); x.lineTo(i*t,S); x.stroke(); x.beginPath(); x.moveTo(0,i*t); x.lineTo(S,i*t); x.stroke(); }
    fbmInto(x,S,[{cells:96,alpha:.3},{cells:24,alpha:.22}]);
    // 染み・足跡っぽい汚れ
    for(let i=0;i<10;i++){ x.globalAlpha=.10+Math.random()*.14; const gx=Math.random()*S,gy=Math.random()*S,r=20+Math.random()*60; const g=x.createRadialGradient(gx,gy,0,gx,gy,r); g.addColorStop(0,'#2a2620'); g.addColorStop(1,'rgba(42,38,32,0)'); x.fillStyle=g; x.beginPath(); x.arc(gx,gy,r,0,7); x.fill(); }
    x.globalAlpha=1;
    TEX.floorMap=tex(c);
    const h=cv(S),hx=h.getContext('2d'); hx.fillStyle='#888'; hx.fillRect(0,0,S,S);
    hx.strokeStyle='#222'; hx.lineWidth=4; for(let i=0;i<=tiles;i++){ hx.beginPath(); hx.moveTo(i*t,0); hx.lineTo(i*t,S); hx.stroke(); hx.beginPath(); hx.moveTo(0,i*t); hx.lineTo(S,i*t); hx.stroke(); }
    fbmInto(hx,S,[{cells:128,alpha:.3}]);
    TEX.floorNrm=texLin(heightToNormal(h,1.1));
  })();

  // 天井（吸音タイル・染み・抜け）
  (function(){
    const S=512,c=cv(S),x=c.getContext('2d');
    x.fillStyle='#9a9f98'; x.fillRect(0,0,S,S);
    const tiles=4,t=S/tiles;
    for(let i=0;i<tiles;i++) for(let j=0;j<tiles;j++){ const v=Math.random()*10; x.fillStyle=`rgb(${150-v},${155-v},${150-v})`; x.fillRect(i*t+2,j*t+2,t-4,t-4);
      x.fillStyle='rgba(0,0,0,.05)'; for(let k=0;k<40;k++) x.fillRect(i*t+2+Math.random()*(t-4), j*t+2+Math.random()*(t-4),1,1); }
    x.strokeStyle='rgba(40,44,40,.6)'; x.lineWidth=4; for(let i=0;i<=tiles;i++){ x.beginPath(); x.moveTo(i*t,0); x.lineTo(i*t,S); x.stroke(); x.beginPath(); x.moveTo(0,i*t); x.lineTo(S,i*t); x.stroke(); }
    for(let i=0;i<6;i++){ x.globalAlpha=.18; const gx=Math.random()*S,gy=Math.random()*S,r=30+Math.random()*60; const g=x.createRadialGradient(gx,gy,0,gx,gy,r); g.addColorStop(0,'#6a5a3a'); g.addColorStop(1,'rgba(106,90,58,0)'); x.fillStyle=g; x.beginPath(); x.arc(gx,gy,r,0,7); x.fill(); }
    x.globalAlpha=1; TEX.ceilMap=tex(c);
  })();

  // 金属（ベッド・車椅子・ロッカー）
  (function(){
    const S=256,c=cv(S),x=c.getContext('2d'); x.fillStyle='#aeb5ba'; x.fillRect(0,0,S,S);
    fbmInto(x,S,[{cells:64,alpha:.2}]);
    for(let i=0;i<40;i++){ x.strokeStyle='rgba(120,128,134,.25)'; x.lineWidth=1; x.beginPath(); const y=Math.random()*S; x.moveTo(0,y); x.lineTo(S,y); x.stroke(); }
    // 錆
    for(let i=0;i<10;i++){ x.globalAlpha=.12; x.fillStyle='#7a4a2a'; x.beginPath(); x.arc(Math.random()*S,Math.random()*S,3+Math.random()*10,0,7); x.fill(); }
    x.globalAlpha=1; TEX.metalMap=tex(c);
  })();

  // ドア
  (function(){
    const S=256,c=cv(S),x=c.getContext('2d'); x.fillStyle='#c8c3b2'; x.fillRect(0,0,S,S);
    fbmInto(x,S,[{cells:48,alpha:.18}]);
    x.fillStyle='#a8a292'; x.fillRect(20,20,S-40,S-40);
    x.strokeStyle='rgba(60,56,46,.5)'; x.lineWidth=3; x.strokeRect(20,20,S-40,S-40);
    // 小窓
    x.fillStyle='#10151c'; x.fillRect(S*0.32,28,S*0.36,70);
    x.strokeStyle='#7a7464'; x.lineWidth=4; x.strokeRect(S*0.32,28,S*0.36,70);
    for(let i=0;i<6;i++){ x.fillStyle='rgba(20,24,30,.4)'; x.fillRect(S*0.32,28+i*12,S*0.36,1); }
    TEX.doorMap=tex(c);
  })();

  // 霊（暗がりに立つ生身の人間風）— 写実寄り
  function _strand(ctx,x0,y0,x1,y1,ccx,ccy,w,col){ ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x0,y0); ctx.quadraticCurveTo(ccx,ccy,x1,y1); ctx.stroke(); }

/* ============================================================
   初期化
   ============================================================ */
function init(){
  const canvas=document.getElementById('scene');
  try{ renderer=new THREE.WebGLRenderer({ canvas, antialias:false, powerPreference:'high-performance' }); }
  catch(e){ document.getElementById('err').style.display='flex'; return false; }
  renderer.setPixelRatio(Math.min(devicePixelRatio,Q.dpr));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  MAX_ANISO=renderer.capabilities.getMaxAnisotropy();

  buildTextures();

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x020305);
  scene.fog=new THREE.FogExp2(0x05070b, 0.085);
  camera=new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.05, 200);

  buildLights();
  buildShell();
  buildCorridorLights();
  buildRooms();
  buildExitDoor();
  buildGhosts();
  buildDust();

  buildComposer();
  // ジャンプスケア画像
  document.getElementById('jumpscare').style.backgroundImage=`url(${TEX.faceURL})`;

  window.addEventListener('resize', onResize);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) clock.getDelta(); });
  return true;
}

/* ---------------- ライト ---------------- */
let flashlight, ambient, hemi;
function buildLights(){
  ambient=new THREE.AmbientLight(0x2a3340, 0.10); scene.add(ambient);
  hemi=new THREE.HemisphereLight(0x2c3848, 0x05070a, 0.18); scene.add(hemi);

  // 懐中電灯（カメラに追従するスポット）
  flashlight=new THREE.SpotLight(0xfff0d8, 14, 24, 0.52, 0.45, 1.4);
  flashlight.castShadow=true;
  flashlight.shadow.mapSize.set(Q.shadow,Q.shadow);
  flashlight.shadow.camera.near=0.4; flashlight.shadow.camera.far=24; flashlight.shadow.bias=-0.0004; flashlight.shadow.normalBias=0.03;
  scene.add(flashlight); scene.add(flashlight.target);

  // ほんのり手元灯（プレイヤー近傍）
  const hand=new THREE.PointLight(0x88a0c0, 0.5, 5, 2); flashlight.userData.hand=hand; scene.add(hand);
}

/* ---------------- 壁ヘルパ ---------------- */
let wallMat, floorMat, ceilMat;
function tileBoxUV(geo,w,h,d,tile){
  const uv=geo.attributes.uv, dims=[[d,h],[d,h],[w,d],[w,d],[w,h],[w,h]];
  for(let f=0;f<6;f++){ const [fw,fh]=dims[f]; for(let i=0;i<4;i++){ const idx=f*4+i; uv.setXY(idx, uv.getX(idx)*fw/tile, uv.getY(idx)*fh/tile); } }
  uv.needsUpdate=true;
}
function wall(x1,z1,x2,z2,h=H,thick=0.28){
  const minX=Math.min(x1,x2)-thick/2, maxX=Math.max(x1,x2)+thick/2, minZ=Math.min(z1,z2)-thick/2, maxZ=Math.max(z1,z2)+thick/2;
  const w=maxX-minX, d=maxZ-minZ;
  const geo=new THREE.BoxGeometry(w,h,d); tileBoxUV(geo,w,h,d,2.6);
  const m=new THREE.Mesh(geo, wallMat); m.position.set((minX+maxX)/2,h/2,(minZ+maxZ)/2); m.castShadow=true; m.receiveShadow=true; scene.add(m);
  colliders.push({minX,maxX,minZ,maxZ}); return m;
}
function box(minX,maxX,minZ,maxZ){ colliders.push({minX,maxX,minZ,maxZ}); }

/* ---------------- 外殻・廊下 ---------------- */
function buildShell(){
  wallMat=new THREE.MeshStandardMaterial({ map:TEX.wallMap, normalMap:TEX.wallNrm, roughness:0.95, metalness:0.0 });
  floorMat=new THREE.MeshStandardMaterial({ map:TEX.floorMap, normalMap:TEX.floorNrm, roughness:0.7, metalness:0.05 });
  ceilMat=new THREE.MeshStandardMaterial({ map:TEX.ceilMap, roughness:1.0, metalness:0.0 });

  TEX.floorMap.repeat.set(10,16); TEX.floorNrm.repeat.set(10,16);
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(20,52), floorMat);
  floor.rotation.x=-Math.PI/2; floor.position.set(0,0,-6); floor.receiveShadow=true; scene.add(floor);

  TEX.ceilMap.repeat.set(8,18);
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(20,52), ceilMat);
  ceil.rotation.x=Math.PI/2; ceil.position.set(0,H,-6); ceil.receiveShadow=true; scene.add(ceil);

  // 外壁
  wall(-10,18.5,-10,-31);   // 左外
  wall(10,18.5,10,-31);     // 右外

/* ---------------- ドア ---------------- */
function makeDoor(wallX, gapZ, openInto, opts){
  // wallX: 廊下壁のX（-2.7 or 2.7）、gapZ: 開口の中心Z、openInto: +1/-1 = 部屋側（開く方向, world X）
  opts=opts||{};
  const W=1.5, Hd=2.5, T=0.08;
  const closedRot=-Math.PI/2;                          // 閉時：扉の幅をZ軸に沿わせ、壁面と面一に
  const openRot = closedRot + openInto*(Math.PI*0.5);  // 90°、部屋側へ開く
  const hingeZ = gapZ - 0.75;                          // 蝶番は開口の-Z端
  const hinge=new THREE.Group(); hinge.position.set(wallX, 0, hingeZ); hinge.rotation.y=closedRot;
  const door=new THREE.Mesh(new THREE.BoxGeometry(W,Hd,T), new THREE.MeshStandardMaterial({ map:TEX.doorMap, roughness:0.78, metalness:0.05 }));
  door.position.set(W/2, Hd/2, 0); door.castShadow=true; door.receiveShadow=true; hinge.add(door);
  // ドアノブ（両面）
  const knob=new THREE.Mesh(new THREE.SphereGeometry(0.045,12,10), metalMat(0x6a6f73)); knob.position.set(W-0.16, Hd*0.45, T*0.5+0.05); hinge.add(knob);
  const knob2=knob.clone(); knob2.position.z=-(T*0.5+0.05); hinge.add(knob2);
  scene.add(hinge);
  // まぐさ（扉上部のすき間を壁で塞ぐ）
  const headerH=H-Hd, hg=new THREE.BoxGeometry(0.26, headerH, 1.8); tileBoxUV(hg,0.26,headerH,1.8,2.6);
  const header=new THREE.Mesh(hg, wallMat); header.position.set(wallX, Hd+headerH/2, gapZ); header.castShadow=true; header.receiveShadow=true; scene.add(header);
  const o={ hinge, open:false, closedRot, openRot, target:closedRot, locked:!!opts.locked, slam:!!opts.slam, x:wallX, z:gapZ };
  doors.push(o);
  interactables.push({ type:'door', x: wallX - openInto*0.45, z:gapZ, r:2.2, label:'扉を開ける', _door:o, action:()=>toggleDoor(o) });
  return o;
}
function toggleDoor(o){
  if(o.locked){ audio&&audio.rattle(); showToast('鍵がかかっている。'); return; }
  o.open=!o.open; o.target = o.open ? o.openRot : o.closedRot;
  audio&&audio.creak();
  if(o.slam && o.open){ o.slam=false; setTimeout(()=>{ audio&&audio.distantBang(); fear=Math.min(1,fear+0.35); }, 600); }
}

const _toGhost=new THREE.Vector3(), _fwd=new THREE.Vector3();
function updateGhosts(dt){
  camera.getWorldDirection(_fwd);
  let nearFear=0;
  for(const gh of ghosts){
    gh.t+=dt;
    _toGhost.copy(gh.sp.position).sub(camera.position);
    const dist=_toGhost.length(); _toGhost.normalize();
    const facing=_toGhost.dot(_fwd); // 1=正面
    let want=0;

    if(gh.mode==='stare' || gh.mode==='mirror'){
      // 見つめると ゆっくり現れる。近距離で正面なら濃く。
      const inRange = dist<11 && dist>1.0;
      const looking = facing>0.86;
      if(inRange && looking){ want = THREE.MathUtils.clamp((facing-0.86)/0.12,0,1) * THREE.MathUtils.clamp((11-dist)/8,0.2,1); }
      // 見続けると最後にスッと近づいて消える
      if(want>0.7){ gh.state+=dt; } else gh.state=Math.max(0,gh.state-dt*0.5);
      if(gh.state>2.4 && gh.cooldown<=0){
        gh.cooldown=14;
        // 一瞬寄ってから消える
        const dir=_toGhost.clone().multiplyScalar(-1);
        gh.sp.position.addScaledVector(dir, Math.min(dist-0.8, 3.0));
        audio&&audio.whisperHit(); fear=Math.min(1,fear+0.4); gh.state=0;
        setTimeout(()=>{ gh.op=0; gh.sp.position.copy(gh.home); }, 180);
      }
    }
    else if(gh.mode==='endfig'){
      // 廊下を見通すと立っている。近づくと薄れて消え、別の場所へ。
      const inView = facing>0.8 && dist<26;
      if(inView){ want = THREE.MathUtils.clamp((dist-4)/10,0,1)*0.9; }
      if(dist<5){ // 近づきすぎたら消える
        if(gh.cooldown<=0){ gh.cooldown=10; audio&&audio.whisperHit(); fear=Math.min(1,fear+0.3);
          // 廊下の別位置へ
          gh.home.set((Math.random()-0.5)*1.4, 1.55, -8 - Math.random()*18); gh.sp.position.copy(gh.home); gh.op=0; }
      }
    }

    if(gh.cooldown>0) gh.cooldown-=dt;
    // 透明度補間
    gh.op += (want-gh.op)*Math.min(dt*2.2,1);
    // ゆらぎ
    const flick = gh.mode==='endfig' ? (0.7+0.3*Math.sin(gh.t*1.3)) : (0.6+0.4*Math.sin(gh.t*2.0));
    gh.mat.opacity = Math.max(0, gh.op) * flick * 0.9;
    gh.sp.position.y = gh.home.y + Math.sin(gh.t*0.8)*0.04;
    // 体の浮遊（ゆっくり左右）
    gh.sp.position.x = gh.home.x + Math.sin(gh.t*0.5)*0.05;

    if(gh.mat.opacity>0.25 && dist<9) nearFear=Math.max(nearFear, gh.mat.opacity*(1-dist/9));
  }
  // 恐怖の自然減衰＋霊の近さ
  fear = Math.max(fear*Math.pow(0.4,dt), nearFear*0.7);
}

/* ============================================================
   徘徊する影（ローマー）
   ============================================================ */
function roamerSpawn(x,z){
  const mat=new THREE.SpriteMaterial({ map:TEX.ghost[0], color:0x10131a, transparent:true, opacity:0, depthWrite:false, fog:true });
  const sp=new THREE.Sprite(mat); sp.scale.set(1.5,2.4,1); sp.position.set(x,1.55,z); scene.add(sp);
  roamers.push({ sp, mat, home:new THREE.Vector3(x,1.55,z), active:false, timer:4+Math.random()*8, op:0, litTime:0 });
}
const _r2p=new THREE.Vector3();
function updateRoamers(dt){
  camera.getWorldDirection(_fwd);
  for(const r of roamers){
    if(!r.active){
      r.timer-=dt;
      if(r.timer<=0){ // プレイヤーが近くの病棟にいる時だけ起動
        const d=Math.hypot(r.home.x-player.pos.x, r.home.z-player.pos.z);
        if(d<16 && d>4){ r.active=true; r.sp.position.copy(r.home); r.op=0; r.litTime=0; audio&&audio.lowGrowl(); }
        else r.timer=3+Math.random()*5;
      }
      r.op+=(0-r.op)*Math.min(dt*2,1); r.mat.opacity=Math.max(0,r.op)*0.8; continue;
    }
    // プレイヤーへゆっくり接近
    _r2p.set(player.pos.x-r.sp.position.x, 0, player.pos.z-r.sp.position.z);
    const dist=_r2p.length(); _r2p.normalize();
    r.sp.position.addScaledVector(_r2p, dt*0.9);
    r.sp.position.y=1.5+Math.sin(U.uTime.value*3)*0.05;
    r.op+=(1-r.op)*Math.min(dt*1.5,1); r.mat.opacity=Math.max(0,r.op)*0.85;
    fear=Math.min(1, Math.max(fear, (1-dist/14)));

    // 懐中電灯の中心で照らし続けると消える
    _toGhost.copy(r.sp.position).sub(camera.position).normalize();
    const lit = _toGhost.dot(_fwd) > 0.985;
    if(lit){ r.litTime+=dt; if(r.litTime>1.1){ r.active=false; r.timer=10+Math.random()*10; r.op=0; r.mat.opacity=0; r.sp.position.copy(r.home); audio&&audio.dissipate(); } }
    else r.litTime=Math.max(0,r.litTime-dt*0.6);

    // 捕まると（脱出してなければ）ジャンプスケアして離れる
    if(dist<1.4){ jumpScare(); fear=1; r.active=false; r.timer=12+Math.random()*8; r.op=0; r.mat.opacity=0;
      // プレイヤーをわずかに後退
      const back=_r2p.clone().multiplyScalar(-1.2); player.pos.x+=back.x; player.pos.z+=back.z; r.sp.position.copy(r.home); }
  }
}

function tryEscape(){

  if(keysFound<KEY_GOAL){ audio&&audio.rattle(); showToast(`鍵が足りない。（あと ${KEY_GOAL-keysFound} 本）`); return; }
  escaped=true; audio&&audio.doorOpen();
  setQuest('深夜0時 ・ 旧病棟','――外へ');
  // 演出：明るくなって脱出…と思いきや
  const f=document.getElementById('fade'); f.style.transition='opacity 2.2s'; f.style.opacity='1';
  setTimeout(()=>{ if(audio) audio.fadeOut(); }, 600);

let dustPts=null, dustVel=null;
function buildDust(){
  const N=IS_MOBILE?180:340, pos=new Float32Array(N*3); dustVel=[];
  for(let i=0;i<N;i++){ pos[i*3]=(Math.random()-0.5)*18; pos[i*3+1]=Math.random()*H; pos[i*3+2]=-6+(Math.random()-0.5)*48; dustVel.push(new THREE.Vector3((Math.random()-0.5)*0.1,(Math.random()-0.5)*0.05,(Math.random()-0.5)*0.1)); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({ map:TEX.glow, color:0x8fa0b0, size:0.05, transparent:true, opacity:0.35, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true, fog:true });
  dustPts=new THREE.Points(g,m); dustPts.frustumCulled=false; scene.add(dustPts);
}
function updateDust(dt){
  if(!dustPts) return; const p=dustPts.geometry.attributes.position.array;
  for(let i=0;i<dustVel.length;i++){ const v=dustVel[i];
    p[i*3]+=v.x*dt; p[i*3+1]+=v.y*dt; p[i*3+2]+=v.z*dt;
    const dx=p[i*3]-player.pos.x, dz=p[i*3+2]-player.pos.z;
    if(p[i*3+1]>H) p[i*3+1]=0; if(p[i*3+1]<0) p[i*3+1]=H;
    if(dx*dx+dz*dz>200){ p[i*3]=player.pos.x+(Math.random()-0.5)*16; p[i*3+2]=player.pos.z+(Math.random()-0.5)*16; }
  }
  dustPts.geometry.attributes.position.needsUpdate=true;
}

/* ============================================================
   ポストプロセス
   ============================================================ */
function buildComposer(){
  composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  bloomPass=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.5, 0.6, 0.85);
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());
  try{ smaaPass=new SMAAPass(innerWidth,innerHeight); composer.addPass(smaaPass); }catch(e){ smaaPass=null; }
  gradePass=new ShaderPass({
    uniforms:{ tDiffuse:{value:null}, uTime:{value:0}, uRes:{value:new THREE.Vector2(innerWidth,innerHeight)}, uVig:{value:0.5}, uFear:{value:0} },
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`
      uniform sampler2D tDiffuse; uniform float uTime,uVig,uFear; uniform vec2 uRes; varying vec2 vUv;
      float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
      void main(){
        vec2 uv=vUv; vec2 cc=uv-0.5; float r2=dot(cc,cc);
        // 恐怖時に揺れる色収差
        float ca=0.006 + uFear*0.02;
        vec2 off=cc*r2*ca;
        vec3 col;
        col.r=texture2D(tDiffuse, uv-off).r;
        col.g=texture2D(tDiffuse, uv).g;
        col.b=texture2D(tDiffuse, uv+off).b;
        // 寒色シャドウ＋恐怖の赤
        float l=dot(col,vec3(0.299,0.587,0.114));
        vec3 shadowTint=mix(vec3(0.78,0.88,1.02), vec3(1.1,0.7,0.7), uFear*0.6);
        col*=mix(shadowTint, vec3(1.04,1.0,0.96), smoothstep(0.1,0.8,l));
        // コントラスト＋わずかに脱色
        col=(col-0.5)*1.1+0.5;
        float g2=dot(col,vec3(0.299,0.587,0.114));
        col=mix(vec3(g2), col, 0.82);
        col=clamp(col,0.0,1.0);
        // ビネット（恐怖で強まる）
        float vig=smoothstep(1.0,0.12,r2*(2.0+uFear*1.6));
        col*=mix(1.0-uVig-uFear*0.2, 1.0, vig);
        // 粒状ノイズ（恐怖で増加）
        float gr=hash(uv*uRes+fract(uTime)*vec2(53.0,97.0));
        col+=(gr-0.5)*(0.02+uFear*0.05);
        gl_FragColor=vec4(col,1.0);
      }`
  });
  composer.addPass(gradePass);
  composer.setSize(innerWidth,innerHeight);
}

/* ============================================================
   プレイヤー移動
   ============================================================ */
const keys={};
const fwd=new THREE.Vector3(), right=new THREE.Vector3();
function updatePlayer(dt){
  let mx=player.moveX, mz=player.moveZ;
  if(keys['KeyW']) mz+=1; if(keys['KeyS']) mz-=1; if(keys['KeyA']) mx-=1; if(keys['KeyD']) mx+=1;
  if(keys['ArrowLeft']) player.yaw+=dt*1.5; if(keys['ArrowRight']) player.yaw-=dt*1.5;
  const len=Math.hypot(mx,mz), moving=len>0.06;
  if(moving){ if(len>1){ mx/=len; mz/=len; }
    fwd.set(Math.sin(player.yaw),0,Math.cos(player.yaw)); right.set(-Math.cos(player.yaw),0,Math.sin(player.yaw));
    let px=player.pos.x+(fwd.x*mz+right.x*mx)*player.speed*dt;
    let pz=player.pos.z+(fwd.z*mz+right.z*mx)*player.speed*dt;
    const R=0.4;
    // AABB 押し出し
    for(const c of colliders){
      const cx=Math.max(c.minX,Math.min(px,c.maxX)), cz=Math.max(c.minZ,Math.min(pz,c.maxZ));
      const dx=px-cx, dz=pz-cz, d2=dx*dx+dz*dz;
      if(d2<R*R){ if(d2>1e-6){ const d=Math.sqrt(d2), push=R-d; px+=dx/d*push; pz+=dz/d*push; }
        else { // 中心が内部
          const toL=px-c.minX, toR=c.maxX-px, toB=pz-c.minZ, toT=c.maxZ-pz, mn=Math.min(toL,toR,toB,toT);
          if(mn===toL) px=c.minX-R; else if(mn===toR) px=c.maxX+R; else if(mn===toB) pz=c.minZ-R; else pz=c.maxZ+R;
        } }
    }
    px=THREE.MathUtils.clamp(px,-9.5,9.5); pz=THREE.MathUtils.clamp(pz,-30.4,18.2);
    player.pos.x=px; player.pos.z=pz; player.bob+=dt*8; player.stepDist+=player.speed*dt;
    if(player.stepDist>1.5){ player.stepDist=0; audio&&audio.footstep(); }
  } else player.bob+=dt*1.5;

  const bobY=moving?Math.sin(player.bob)*0.04:Math.sin(player.bob*0.5)*0.008;
  // 画面ゆれ
  let sx=0, sy=0; if(shake>0){ sx=(Math.random()-0.5)*shake*0.12; sy=(Math.random()-0.5)*shake*0.12; shake=Math.max(0,shake-dt*2.2); }
  camera.position.set(player.pos.x+sx, EYE+bobY+sy, player.pos.z);
  const dir=new THREE.Vector3(Math.sin(player.yaw)*Math.cos(player.pitch), Math.sin(player.pitch), Math.cos(player.yaw)*Math.cos(player.pitch));
  camera.lookAt(camera.position.x+dir.x, camera.position.y+dir.y, camera.position.z+dir.z);

  // 懐中電灯をカメラ前方へ
  flashlight.position.copy(camera.position);
  flashlight.target.position.copy(camera.position).add(dir);
  flashlight.userData.hand.position.copy(camera.position);
}

/* ---------------- 点滅灯 ---------------- */
function updateFlicker(dt){
  for(const o of flickerLights){ o.t+=dt;
    if(o.dead){ // たまにバチッと一瞬だけ点く
      if(Math.random()<0.004){ o.light.intensity=2.2; o.tube.material.emissiveIntensity=2.5; audio&&audio.zap(); }
      else { o.light.intensity*=0.85; o.tube.material.emissiveIntensity*=0.85; }
      continue;
    }
    if(o.mode==='on'){ const v=0.9+Math.sin(o.t*40)*0.03; o.light.intensity=o.base*v; o.tube.material.emissiveIntensity=1.6*v; }
    else { // flicker
      const n=Math.sin(o.t*23.0)+Math.sin(o.t*7.3+1.0)+Math.sin(o.t*53.0);
      const on = n>-0.4;
      const v = on ? (0.7+Math.random()*0.5) : (Math.random()<0.3?0.15:0.0);
      o.light.intensity=o.base*v; o.tube.material.emissiveIntensity=1.6*v;
      if(on && Math.random()<0.01) audio&&audio.zap();
    }
  }
  // 懐中電灯のわずかな明滅（恐怖時に強まる）
  const fl=0.85+Math.sin(U.uTime.value*30)*0.05 - fear*(Math.random()*0.5);
  flashlight.intensity=Math.max(2, 14*fl);
}

/* ---------------- 車椅子が勝手に動く演出 ---------------- */
function updateProps(dt){
  for(const w of wheelchairs){
    const d=Math.hypot(w.x-player.pos.x, w.z-player.pos.z);
    if(!w.rolled && d<5 && d>3 && Math.random()<0.004*dt*60){
      w.rolled=true; audio&&audio.creakRoll();
      const dir = (w.x<player.pos.x)? -1: 1;
      // ゆっくり数十cm転がす
      const target=w.g.position.x + dir*0.8;
      const id=setInterval(()=>{ w.g.position.x += (target-w.g.position.x)*0.1; if(Math.abs(target-w.g.position.x)<0.02) clearInterval(id); }, 30);
    }
  }
}

/* ============================================================
   オーディオ（不気味）
   ============================================================ */
let audio=null;
class AudioM{

    const C=window.AudioContext||window.webkitAudioContext; this.ctx=new C();

    this.rev=this.ctx.createGain(); this.rev.gain.value=0.35;

    this.fb=this.ctx.createGain(); this.fb.gain.value=0.45;

    this.rev.connect(this.dl); this.dl.connect(this.fb); this.fb.connect(this.lp); this.lp.connect(this.dl); this.lp.connect(this.master);
    this.muted=false;
    this._drone(); this._heart(); this._scheduleWhisper(); this._scheduleDrip();
  }
  send(node, amt){ const g=this.ctx.createGain(); g.gain.value=amt; node.connect(g); g.connect(this.rev); }

    freqs.forEach((f,i)=>{ const o=this.ctx.createOscillator(); o.type=i===2?'triangle':'sawtooth'; o.frequency.value=f;
      const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=300;
      const g=this.ctx.createGain(); g.gain.value=0.0; o.connect(lp); lp.connect(g); g.connect(this.master);
      const lfo=this.ctx.createOscillator(); lfo.frequency.value=0.05+i*0.03; const lg=this.ctx.createGain(); lg.gain.value=0.03; lfo.connect(lg); lg.connect(g.gain); lfo.start();
      o.start(); g.gain.setTargetAtTime(0.10,this.ctx.currentTime,3); this.droneGains.push(g); });

    const sub=this.ctx.createOscillator(); sub.type='sine'; sub.frequency.value=33; const sg=this.ctx.createGain(); sg.gain.value=0.0; sub.connect(sg); sg.connect(this.master); sub.start(); sg.gain.setTargetAtTime(0.08,this.ctx.currentTime,4);
  }

    s.connect(bp); bp.connect(g); this.send(g,0.5); g.connect(this.master); s.start(t); s.stop(t+dur); lfo.stop(t+dur); }

  drip(){ const t=this.ctx.currentTime; const o=this.ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(300,t+0.08); const g=this.ctx.createGain(); g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18); o.connect(g); this.send(g,0.6); g.connect(this.master); o.start(t); o.stop(t+0.2); }

  creak(){ const t=this.ctx.currentTime; const o=this.ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(120,t); o.frequency.linearRampToValueAtTime(70,t+0.6); const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=400; bp.Q.value=3; const g=this.ctx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.08,t+0.05); g.gain.exponentialRampToValueAtTime(0.001,t+0.7); o.connect(bp); bp.connect(g); this.send(g,0.5); g.connect(this.master); o.start(t); o.stop(t+0.7); }

  distantBang(){ const t=this.ctx.currentTime; const s=this._noise(0.4); const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=500; const g=this.ctx.createGain(); g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4); s.connect(lp); lp.connect(g); this.send(g,0.8); g.connect(this.master); s.start(t); s.stop(t+0.4); }
  lowGrowl(){ const t=this.ctx.currentTime; const o=this.ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(48,t); o.frequency.linearRampToValueAtTime(40,t+1.5); const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=200; const g=this.ctx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.12,t+0.3); g.gain.linearRampToValueAtTime(0,t+1.5); o.connect(lp); lp.connect(g); this.send(g,0.5); g.connect(this.master); o.start(t); o.stop(t+1.5); }
  dissipate(){ const t=this.ctx.currentTime; const s=this._noise(0.8); const hp=this.ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.setValueAtTime(800,t); hp.frequency.exponentialRampToValueAtTime(6000,t+0.8); const g=this.ctx.createGain(); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.8); s.connect(hp); hp.connect(g); this.send(g,0.6); g.connect(this.master); s.start(t); s.stop(t+0.8); }
  pickup(){ const t=this.ctx.currentTime; [660,990].forEach((f,i)=>{ const o=this.ctx.createOscillator(); o.type='sine'; o.frequency.value=f; const g=this.ctx.createGain(); g.gain.setValueAtTime(0,t+i*0.08); g.gain.linearRampToValueAtTime(0.12,t+i*0.08+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.4); o.connect(g); g.connect(this.master); o.start(t+i*0.08); o.stop(t+i*0.08+0.45); }); }
  doorOpen(){ const t=this.ctx.currentTime; const o=this.ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(60,t); o.frequency.linearRampToValueAtTime(180,t+1.0); const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=300; const g=this.ctx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.1,t+0.1); g.gain.linearRampToValueAtTime(0,t+1.2); o.connect(bp); bp.connect(g); this.send(g,0.7); g.connect(this.master); o.start(t); o.stop(t+1.2); }
  sting(){ const t=this.ctx.currentTime;
    // 不協和の高音クラスタ
    [1200,1270,1810,2350].forEach(f=>{ const o=this.ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=f; const g=this.ctx.createGain(); g.gain.setValueAtTime(0.0,t); g.gain.linearRampToValueAtTime(0.14,t+0.005); g.gain.exponentialRampToValueAtTime(0.001,t+0.7); o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.75); });
    // 下降スイープ
    const sw=this.ctx.createOscillator(); sw.type='square'; sw.frequency.setValueAtTime(900,t); sw.frequency.exponentialRampToValueAtTime(60,t+0.5); const sg=this.ctx.createGain(); sg.gain.setValueAtTime(0.18,t); sg.gain.exponentialRampToValueAtTime(0.001,t+0.6); sw.connect(sg); sg.connect(this.master); sw.start(t); sw.stop(t+0.6);
    // ノイズバースト
    const s=this._noise(0.6); const g2=this.ctx.createGain(); g2.gain.setValueAtTime(0.25,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.5); s.connect(g2); this.send(g2,0.8); g2.connect(this.master); s.start(t); s.stop(t+0.55);
    // 心音ブースト
    this._thump();
  }
  fadeOut(){ this.master.gain.setTargetAtTime(0.0, this.ctx.currentTime, 1.5); }
  toggle(){ this.muted=!this.muted; this.master.gain.setTargetAtTime(this.muted?0:0.5,this.ctx.currentTime,0.2); return this.muted; }
}
document.getElementById('muteBtn').addEventListener('click',()=>{ if(!audio) return; const m=audio.toggle(); const b=document.getElementById('muteBtn'); b.textContent=m?'♪ オフ':'♪'; b.style.opacity=m?'0.5':'1'; });

/* ---------------- 画質トグル ---------------- */
document.getElementById('qualityBtn').addEventListener('click',()=>{
  Q.high=!Q.high; Q.dpr = Q.high ? (IS_MOBILE?1.75:2) : (IS_MOBILE?1.0:1.4); Q.shadow = Q.high ? (IS_MOBILE?1024:2048) : 512;
  renderer.setPixelRatio(Math.min(devicePixelRatio,Q.dpr));
  flashlight.shadow.mapSize.set(Q.shadow,Q.shadow); if(flashlight.shadow.map){ flashlight.shadow.map.dispose(); flashlight.shadow.map=null; }
  onResize();
  document.getElementById('qualityBtn').textContent = Q.high?'画質 高':'画質 低';
});

/* ============================================================
   ループ
   ============================================================ */
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05); U.uTime.value+=dt;
  if(gradePass){ gradePass.uniforms.uTime.value=U.uTime.value; }
  if(started && !escaped){
    updatePlayer(dt); updateFlicker(dt); updateGhosts(dt); updateRoamers(dt); updateProps(dt); updateDust(dt); updateInteract();
    if(audio) audio.setFear();
  } else if(escaped){ updateDust(dt); }
  for(const d of doors){ const cur=d.hinge.rotation.y; d.hinge.rotation.y = cur + (d.target - cur)*0.12; } // ドア開閉補間
  if(gradePass) gradePass.uniforms.uFear.value += (fear - gradePass.uniforms.uFear.value)*Math.min(dt*4,1);
  composer.render();
}
function onResize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); if(gradePass) gradePass.uniforms.uRes.value.set(innerWidth,innerHeight); if(bloomPass) bloomPass.setSize(innerWidth,innerHeight); }

/* ============================================================
   時刻表示（演出）
   ============================================================ */
function tickClock(){ if(!started) return; const base=new Date(2000,0,1,0,0,0); base.setSeconds(Math.floor(U.uTime.value*8)); const hh=String(base.getHours()).padStart(2,'0'), mm=String(base.getMinutes()).padStart(2,'0'); document.getElementById('clock').textContent=`${hh}:${mm}`; }
setInterval(tickClock, 500);

/* ============================================================
   開始
   ============================================================ */
function startGame(){
  if(started) return; started=true;
  try{ audio=new AudioM(); if(audio.ctx.state==='suspended') audio.ctx.resume(); }catch(e){}
  const title=document.getElementById('title'); title.style.opacity='0'; setTimeout(()=>title.style.display='none',1600);
  ['quest','status','topbtns'].forEach(id=>document.getElementById(id).style.opacity='1');
  updateKeyHUD();
  setTimeout(()=>document.getElementById('hint').style.opacity='0',10000);
  // 開始直後にひとつ気配
  setTimeout(()=>{ audio&&audio.distantBang(); }, 3500);
}
document.getElementById('start').addEventListener('click',startGame);

/* ============================================================
   起動
   ============================================================ */
if(init()){ document.getElementById('loadnote').textContent='タップして はじめる'; document.getElementById('qualityBtn').textContent = Q.high?'画質 高':'画質 低'; animate(); }
</script>

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<title>ゲーム一覧</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  max-width:640px;
  margin:0 auto;
  padding:2rem 1rem;
  background:#fafafa;
  color:#222;
  line-height:1.5;
}
h1{font-size:1.4rem;margin:0 0 1.25rem}
ul{list-style:none;padding:0;margin:0}
li{margin:0 0 .6rem}
a{
  display:block;
  padding:1rem 1.2rem;
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
  text-decoration:none;
  color:#222;
  font-size:1.05rem;
}
a:hover,a:focus{background:#eef4ff;border-color:#8ab}
.status{color:#888;text-align:center;padding:1rem;font-size:.95rem}
.status.error{color:#c33}
</style>
</head>
<body>

<h1>ゲーム一覧</h1>

<ul id="list">
  <li class="status">読み込み中…</li>
</ul>

<script>
(async () => {
  const list = document.getElementById('list');

  // GitHub PagesのURLからユーザー名・リポジトリ名を自動判定
  // 例: https://username.github.io/repo/  → username, repo
  const host = location.hostname;
  const username = host.split('.')[0];
  const pathParts = location.pathname.split('/').filter(Boolean);
  const repo = pathParts[0] || `${username}.github.io`;

  // HTMLエスケープ
  const esc = s => String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));

  try {
    // GitHub APIでリポジトリ直下のファイル一覧を取得
    const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/`;
    const res = await fetch(apiUrl);
    if (!res.ok) throw new Error('API ' + res.status);
    const files = await res.json();

    // index.html以外の.htmlファイルだけを抽出
    const htmlFiles = files
      .filter(f => f.type === 'file'
                && f.name.toLowerCase().endsWith('.html')
                && f.name.toLowerCase() !== 'index.html')
      .sort((a, b) => a.name.localeCompare(b.name, 'ja'));

    if (htmlFiles.length === 0) {
      list.innerHTML = '<li class="status">HTMLファイルが見つかりません</li>';
      return;
    }

    // 各HTMLファイルから<title>タグを読み取って表示名にする
    const items = await Promise.all(htmlFiles.map(async f => {
      try {
        const r = await fetch(f.name);
        const t = await r.text();
        const m = t.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
        const title = m ? m[1].replace(/\s+/g, ' ').trim() : f.name;
        return { name: f.name, title: title || f.name };
      } catch {
        return { name: f.name, title: f.name };
      }
    }));

    list.innerHTML = items
      .map(i => `<li><a href="${esc(i.name)}">${esc(i.title)}</a></li>`)
      .join('');
  } catch (e) {
    list.innerHTML = '<li class="status error">読み込みに失敗しました</li>';
    console.error(e);
  }
})();
</script>

</body>
</html>

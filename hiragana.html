@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes wiggle { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
@keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
@keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); } 100% { box-shadow: 0 0 0 24px rgba(239,68,68,0); } }
@keyframes sparkle { 0%,100% { transform: scale(1) rotate(0); opacity: 0.6; } 50% { transform: scale(1.3) rotate(180deg); opacity: 0.9; } }
@keyframes float-up { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
@keyframes wave { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }
@keyframes match-glow {
  0% { color: #1f2937; text-shadow: none; transform: scale(1); }
  30% { color: #10b981; text-shadow: 0 0 24px rgba(16,185,129,0.7); transform: scale(1.05); }
  70% { color: #10b981; text-shadow: 0 0 24px rgba(16,185,129,0.7); transform: scale(1.05); }
  100% { color: #1f2937; text-shadow: none; transform: scale(1); }
}
@keyframes match-pop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes stars-float {
  0% { transform: translateY(0) scale(0); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP";
  u.rate = 0.85; u.pitch = 1.15; u.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const pref =
    voices.find(v => v.lang === "ja-JP" && v.name.includes("Kyoko")) ||
    voices.find(v => v.lang === "ja-JP" && v.name.includes("Otoya")) ||
    voices.find(v => v.lang === "ja-JP" && v.localService) ||
    voices.find(v => v.lang === "ja-JP") ||
    voices.find(v => v.lang && v.lang.startsWith("ja"));
  if (pref) u.voice = pref;
  u.onstart = () => { state.speaking = true; updateSpeakBtn(); };
  u.onend = () => { state.speaking = false; updateSpeakBtn(); };
  u.onerror = () => { state.speaking = false; updateSpeakBtn(); };
  window.speechSynthesis.speak(u);
}

function updateSpeakBtn() {
  const btn = document.getElementById("speakBtn");

  else { btn.classList.remove("anim-pulse-ring"); label.textContent = "きいてみよう！"; }
}

// ============================================================
// 正規化とマッチング
// ============================================================
function kataToHira(s) {
  return s.replace(/[\u30a1-\u30f6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}
function cleanString(s) {
  return s
    .replace(/[\s\u3000]/g, "")
    .replace(/[。、・！？!?\.,'"「」『』（）()\[\]【】〜ー～…]/g, "")
    .toLowerCase();
}
function normalize(s) {
  if (!s) return "";
  return cleanString(kataToHira(s));
}

function levenshtein(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;
  const dp = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0));
  for (let i = 0; i <= a.length; i++) dp[i][0] = i;
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
    }
  }
  return dp[a.length][b.length];
}
function similarity(a, b) {
  if (!a && !b) return 1;
  if (!a || !b) return 0;
  return 1 - levenshtein(a, b) / Math.max(a.length, b.length);
}

function matchScore(recognized, acceptList) {
  if (!recognized) return 0;
  const normRec = normalize(recognized);
  if (!normRec) return 0;

  let best = 0;
  for (const acc of acceptList) {
    const normAcc = normalize(acc);
    if (!normAcc) continue;
    if (normRec === normAcc) return 1.0;
    if (normRec.includes(normAcc)) best = Math.max(best, 0.92);
    if (normAcc.includes(normRec) && normRec.length >= normAcc.length * 0.7) best = Math.max(best, 0.88);
    best = Math.max(best, similarity(normRec, normAcc));

    if (/[\u4e00-\u9faf]/.test(acc)) {
      let kanjiHit = 0, kanjiTotal = 0;
      for (const ch of acc) {
        if (/[\u4e00-\u9faf]/.test(ch)) { kanjiTotal++; if (recognized.includes(ch)) kanjiHit++; }
      }
      if (kanjiTotal > 0 && kanjiHit / kanjiTotal >= 0.7) {
        best = Math.max(best, 0.75 + (kanjiHit / kanjiTotal) * 0.2);
      }
    }
  }
  return best;
}

// ============================================================
// ★重要★ 表示用テキストを「ひらがな」に変換する
// マッチした場合はその問題のひらがな版(item.text)を返す
// マッチしなかった場合は、カタカナをひらがなに変換し、
// 漢字が残っていたら表示しない（ひらがな学習を妨げないため）
// ============================================================
function getDisplayHiragana(recognized, score, item) {
  // 明らかに正解に近い → 画面に表示されているひらがなをそのまま見せる
  // （内部で漢字認識されても、子供には "じてんしゃ" として見える）
  if (score >= 0.5) {
    return { text: item.text, isMatched: true };
  }

  // マッチしなかった場合：カタカナ→ひらがな変換を試みる
  const hiragana = kataToHira(recognized);

  // 漢字が残っていたら、ひらがな学習の妨げになるので表示しない
  if (/[\u4e00-\u9faf]/.test(hiragana)) {
    return { text: null, isMatched: false };
  }

  // 純粋なひらがな/カタカナのみなら表示する
  return { text: hiragana, isMatched: false };
}

// ============================================================
// 音声認識
// ============================================================
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showFeedback("info", "このブラウザでは おしゃべりチャレンジは つかえないよ。Safariで ためしてみてね！");
    return;
  }

  if (!localStorage.getItem("micIntroShown")) {
    document.getElementById("micModal").classList.remove("hidden");
    return;
  }

  if (state.recognition) {
    try { state.recognition.abort(); } catch(e) {}
    state.recognition = null;
  }

  const recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 5;
  state.recognition = recognition;
  state.finalTranscript = "";
  state.interimTranscript = "";
  state.lastFinals = [];

  recognition.onstart = () => {
    state.listening = true;
    updateMicBtn();
    clearFeedback();
    clearRecog();
    showListeningUI();
    if (state.recognitionTimer) clearTimeout(state.recognitionTimer);
    state.recognitionTimer = setTimeout(() => {
      try { recognition.stop(); } catch(e) {}
    }, 10000);
  };

  recognition.onresult = (event) => {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const res = event.results[i];
      if (res.isFinal) {
        for (let j = 0; j < res.length; j++) {
          state.lastFinals.push(res[j].transcript);
        }
        state.finalTranscript += res[0].transcript;
      } else {
        interim += res[0].transcript;
      }
    }
    state.interimTranscript = interim;
  };

  recognition.onerror = (e) => {
    state.listening = false;
    updateMicBtn();
    hideListeningUI();
    if (state.recognitionTimer) clearTimeout(state.recognitionTimer);
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      showFeedback("info", "マイクの きょかが ひつようだよ。Safariの アドレスバー ちかくの 「あぁ」を タップして、マイクを 「きょか」に してね。");
    } else if (e.error === "no-speech") {
      showFeedback("info", "こえが きこえなかったよ。もういちど はなしてみてね！");
    } else if (e.error === "network") {
      showFeedback("info", "インターネットが ひつようだよ。でんぱを たしかめてね。");
    } else if (e.error === "aborted") {
      // 無視
    } else {
      showFeedback("info", "うまく ききとれなかったよ。もういちど ためしてみてね！");
    }
  };

  recognition.onend = () => {
    state.listening = false;
    updateMicBtn();
    hideListeningUI();
    if (state.recognitionTimer) clearTimeout(state.recognitionTimer);

    const candidates = [];
    if (state.lastFinals && state.lastFinals.length > 0) candidates.push(...state.lastFinals);
    if (state.finalTranscript) candidates.push(state.finalTranscript);
    if (state.interimTranscript) candidates.push(state.interimTranscript);

    state.lastFinals = [];

    if (candidates.length === 0 || candidates.every(c => !c || !c.trim())) {
      showFeedback("info", "こえが うまく ききとれなかったよ。もうすこし おおきな こえで はなしてみてね！");
      return;
    }
    evaluateCandidates(candidates);
  };

  try {
    recognition.start();
  } catch (err) {
    state.listening = false;
    updateMicBtn();
    hideListeningUI();
    showFeedback("info", "まだ まえの おしゃべりが おわっていないみたい。1びょう まってから もういちど おしてね。");
  }
}

function evaluateCandidates(candidates) {
  const current = content[state.level].items[state.index];
  const accepts = current.accept || [current.text];

  let bestScore = 0;
  let bestHeard = candidates[0] || "";

  for (const cand of candidates) {
    if (!cand || !cand.trim()) continue;
    const score = matchScore(cand, accepts);
    if (score > bestScore) {
      bestScore = score;
      bestHeard = cand;
    }
  }

  // ★ ひらがな表記に変換して表示 ★
  const display = getDisplayHiragana(bestHeard, bestScore, current);

  if (bestScore >= 0.7) {
    // 大正解：ひらがな表示 + 上下の文字が一致している視覚演出
    showRecog(display.text, true);
    triggerMatchAnimation();
    showFeedback("great", "すっごく じょうず！ばっちり よめたね！🎉");
  } else if (bestScore >= 0.5) {
    // かなり惜しい：まだマッチ扱い
    showRecog(display.text, true);
    showFeedback("nice", "じょうず！もういっかい よむと もっと きれいに なるよ！");
  } else if (bestScore >= 0.3) {
    // ちょっとだけ惜しい
    if (display.text) {
      showRecog(display.text, false);
    } else {
      showRecogNoText();
    }
    showFeedback("nice", "おしい！もういっかい チャレンジ してみよう！");
  } else {
    // 大きく外れた
    if (display.text) {
      showRecog(display.text, false);
    } else {
      showRecogNoText();
    }
    showFeedback("retry", "スピーカーボタンで ききなおして、まねっこ してみよう！");
  }
}

function stopListening() {
  if (state.recognition) {
    try { state.recognition.stop(); } catch(e) {}
  }
  if (state.recognitionTimer) clearTimeout(state.recognitionTimer);
}

function updateMicBtn() {
  const btn = document.getElementById("micBtn");
  const label = document.getElementById("micLabel");
  if (state.listening) {
    btn.classList.add("listening", "anim-pulse-ring");
    label.textContent = "とめる";
  } else {
    btn.classList.remove("listening", "anim-pulse-ring");
    label.textContent = "おしゃべり チャレンジ";
  }
}

function showListeningUI() {
  const w = document.getElementById("listeningWrap");
  w.innerHTML = `
    <div class="listening-indicator anim-float-up">
      <div class="wave-bars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="listening-text">🎤 きいてるよ... はなしてね！</div>
    </div>`;
}
function hideListeningUI() { document.getElementById("listeningWrap").innerHTML = ""; }

// マッチしたら大きなひらがなで表示、マッチしなかったら控えめに
function showRecog(text, isMatched) {
  const w = document.getElementById("recogWrap");
  const lvClass = `lv${state.level}`;
  const matchedClass = isMatched ? " matched" : "";
  const check = isMatched ? `<div class="match-check">✅</div>` : "";
  w.innerHTML = `<div class="recog-result anim-float-up${matchedClass}">
    ${check}
    <div class="recog-label">きこえた こえ：</div>
    <div class="recog-text ${lvClass}" id="recogTextEl">${escapeHtml(text)}</div>
  </div>`;
}
// 漢字のみで変換できない場合：テキストなしでメッセージ
function showRecogNoText() {
  const w = document.getElementById("recogWrap");
  w.innerHTML = `<div class="recog-result anim-float-up">
    <div class="recog-label">きこえた こえ：</div>
    <div class="recog-text" style="font-size:16px; color:#6b7280;">ちがう ことばに きこえたみたい…</div>
  </div>`;
}
function clearRecog() { document.getElementById("recogWrap").innerHTML = ""; }

// ★ マッチ成功時の演出：上の問題文と「きこえた こえ」が同時に緑色に光る ★
function triggerMatchAnimation() {
  const cardText = document.getElementById("cardText");
  const recogText = document.getElementById("recogTextEl");
  cardText.classList.remove("match-glow"); void cardText.offsetWidth; cardText.classList.add("match-glow");
  if (recogText) {
    recogText.classList.remove("match-glow"); void recogText.offsetWidth; recogText.classList.add("match-glow");
  }

  // 星を舞わせる
  const card = document.getElementById("card");
  const stars = ["⭐","✨","🌟","💫","🎉"];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement("div");
    s.className = "floating-stars";
    s.textContent = stars[Math.floor(Math.random() * stars.length)];
    s.style.left = `${10 + Math.random() * 80}%`;
    s.style.top = `${40 + Math.random() * 20}%`;
    s.style.animationDelay = `${i * 0.08}s`;
    card.appendChild(s);
    setTimeout(() => s.remove(), 1500);
  }
}

function showFeedback(type, msg) {
  const w = document.getElementById("feedbackWrap");
  const icons = { great: "🎉 ", nice: "😊 ", retry: "🦊 ", info: "💡 " };
  const shake = type === "retry" ? " anim-shake" : "";
  w.innerHTML = `<div class="feedback fb-${type} anim-float-up${shake}">${icons[type]||""}${escapeHtml(msg)}</div>`;
}
function clearFeedback() { document.getElementById("feedbackWrap").innerHTML = ""; }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

function renderGame() {
  const data = content[state.level];
  const item = data.items[state.index];
  const total = data.items.length;

  const game = document.getElementById("game");
  game.className = `lv${state.level}`;

  const dots = document.getElementById("progressDots");
  dots.style.color = data.accent;
  let dotsHtml = "";
  for (let i = 0; i < total; i++) {
    const cls = i === state.index ? "active" : i < state.index ? "done" : "";
    dotsHtml += `<div class="progress-dot ${cls}"></div>`;
  }
  dots.innerHTML = dotsHtml;

  const count = document.getElementById("progressCount");
  count.textContent = `${state.index + 1} / ${total}`;
  count.style.color = data.accent;

  const homeBtn = document.getElementById("homeBtn");
  homeBtn.style.border = `4px solid ${data.accent}`;
  homeBtn.style.boxShadow = `0 4px 0 ${data.accent}`;
  homeBtn.style.color = data.accent;

  const badge = document.getElementById("lvBadge");
  badge.textContent = `レベル${state.level}`;
  badge.style.color = data.accent;
  badge.style.border = `4px solid ${data.accent}`;
  badge.style.boxShadow = `0 4px 0 ${data.accent}`;

  const card = document.getElementById("card");
  card.style.border = `5px solid ${data.accent}`;
  card.style.boxShadow = `0 8px 0 ${data.accent}, 0 20px 40px rgba(0,0,0,0.1)`;
  card.classList.remove("anim-pop"); void card.offsetWidth; card.classList.add("anim-pop");

  document.getElementById("cardEmoji").textContent = item.emoji;
  const text = document.getElementById("cardText");
  text.textContent = item.text;
  text.className = `card-text lv${state.level}`;

  const hintWrap = document.getElementById("hintWrap");
  hintWrap.innerHTML = item.hint
    ? `<div class="hint-pill" style="background:${data.accent}20; color:${data.accent};">💡 ヒント：${item.hint}</div>`
    : "";

  clearRecog(); clearFeedback(); hideListeningUI();

  const speakBtn = document.getElementById("speakBtn");
  speakBtn.style.color = data.accent;
  speakBtn.style.border = `5px solid ${data.accent}`;
  speakBtn.style.boxShadow = `0 6px 0 ${data.accent}`;

  const nextBtn = document.getElementById("nextBtn");
  nextBtn.style.background = data.accent;
}

function startLevel(lv) {
  state.level = lv; state.index = 0;
  document.getElementById("home").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  renderGame();
}
function goHome() {
  window.speechSynthesis.cancel();
  stopListening();
  state.speaking = false; updateSpeakBtn();
  state.index = 0;
  document.getElementById("game").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}
function nextItem() {
  stopListening();
  const total = content[state.level].items.length;
  state.index = (state.index + 1) % total;
  renderGame();
}
function prevItem() {
  stopListening();
  const total = content[state.level].items.length;
  state.index = (state.index - 1 + total) % total;
  renderGame();
}

document.getElementById("speakBtn").addEventListener("click", () => {
  const item = content[state.level].items[state.index];
  speak(item.text);
});
document.getElementById("micBtn").addEventListener("click", () => {
  if (state.listening) stopListening(); else startListening();
});
document.getElementById("homeBtn").addEventListener("click", goHome);
document.getElementById("prevBtn").addEventListener("click", prevItem);
document.getElementById("nextBtn").addEventListener("click", nextItem);
document.getElementById("modalOkBtn").addEventListener("click", () => {
  localStorage.setItem("micIntroShown", "1");
  document.getElementById("micModal").classList.add("hidden");
  setTimeout(startListening, 300);
});

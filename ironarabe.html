<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>いろならべ ✦ マジカル・カラーズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yusei+Magic&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  /* === RULE 10: iOS default behavior suppression === */
  *, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #ffd9ec;
    background: linear-gradient(160deg, #ffd9ec 0%, #ffeeb6 30%, #cce8ff 65%, #e0c7ff 100%);
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    color: #3a1840;
  }

/* === RULE 4: Fixed flex template === */
#app {
width: 100%;
/* height set by JS in setAppHeight() */
position: relative;
overflow: hidden;
display: flex;
flex-direction: column;
}
#topbar {
flex-shrink: 0;
padding-top: max(0px, env(safe-area-inset-top, 0px));
padding-left: max(0px, env(safe-area-inset-left, 0px));
padding-right: max(0px, env(safe-area-inset-right, 0px));
z-index: 5;
position: relative;
}
#content {
flex: 1;
min-height: 0;
position: relative;
overflow: hidden;
}
#bottombar {
flex-shrink: 0;
padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
padding-left: max(0px, env(safe-area-inset-left, 0px));
padding-right: max(0px, env(safe-area-inset-right, 0px));
z-index: 5;
position: relative;
}

/* === Background layers (absolute inside #app) === */
.bg-rainbow {
position: absolute;
bottom: -45vw;
left: 50%;
transform: translateX(-50%);
width: 130vw;
height: 130vw;
border-radius: 50%;
background-color: transparent;
background:
radial-gradient(circle, transparent 60%,
#ff7eb6 60%, #ff7eb6 64%,
#ffb14a 64%, #ffb14a 68%,
#ffe65a 68%, #ffe65a 72%,
#6fdc6a 72%, #6fdc6a 76%,
#5cc8ff 76%, #5cc8ff 80%,
#c89cff 80%, #c89cff 84%,
transparent 84%);
opacity: .55;
z-index: 0;
pointer-events: none;
}
.bg-clouds {
position: absolute;
inset: 0;
pointer-events: none;
z-index: 0;
overflow: hidden;
}
.cloud {
position: absolute;
background-color: rgba(255,255,255,.85);
background: rgba(255,255,255,.85);
border-radius: 50%;
box-shadow:
30px 8px 0 -4px rgba(255,255,255,.85),
60px 0 0 -2px rgba(255,255,255,.85),
-30px 6px 0 -4px rgba(255,255,255,.85),
0 -10px 0 -6px rgba(255,255,255,.85);
filter: blur(1px) drop-shadow(0 6px 12px rgba(180,140,200,.25));
animation: float-cloud 30s linear infinite;
}
@keyframes float-cloud {
from { transform: translateX(-200px); }
to   { transform: translateX(calc(100vw + 200px)); }
}
.bg-stars {
position: absolute;
inset: 0;
pointer-events: none;
z-index: 0;
overflow: hidden;
}
.bg-stars i {
position: absolute;
width: 14px;
height: 14px;
background-color: #fff8a0;
background: radial-gradient(circle, #fff 0%, #fff8a0 40%, transparent 65%);
filter: drop-shadow(0 0 8px rgba(255,255,150,.85));
animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
0%, 100% { opacity: .3; transform: scale(.7) rotate(0deg); }
50% { opacity: 1; transform: scale(1.2) rotate(45deg); }
}

/* === Screens (absolute inside #content) === */
.screen {
position: absolute;
inset: 0;
overflow: hidden;
transition: opacity .5s ease, transform .5s ease;
z-index: 10;
}
.screen.hide {
opacity: 0;
pointer-events: none;
transform: scale(.94);
}

/* === Title screen === */
#titleScreen {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 16px 16px;
overflow-y: auto;
}

.mascot-row {
display: flex;
gap: 10px;
margin-bottom: 14px;
flex-shrink: 0;
}
.mascot {
width: 58px;
height: 58px;
animation: bob 2.4s ease-in-out infinite;
}
.mascot:nth-child(1) { animation-delay: 0s; }
.mascot:nth-child(2) { animation-delay: .3s; }
.mascot:nth-child(3) { animation-delay: .6s; }
.mascot:nth-child(4) { animation-delay: .9s; }
@keyframes bob {
0%, 100% { transform: translateY(0) rotate(-3deg); }
50% { transform: translateY(-10px) rotate(3deg); }
}

.logo {
text-align: center;
margin-bottom: 22px;
position: relative;
flex-shrink: 0;
}
.logo .kanji {
font-family: “Mochiy Pop One”, “Zen Maru Gothic”, sans-serif;
font-size: 64px;
line-height: 1;
letter-spacing: .03em;
display: inline-block;
}
.logo .kanji span {
display: inline-block;
transform-origin: center;
-webkit-text-stroke: 4px #fff;
paint-order: stroke fill;
text-shadow:
0 4px 0 #6a2d80,
0 8px 0 #4a1c5a,
0 14px 14px rgba(80,30,100,.4);
animation: dance 2.2s ease-in-out infinite;
}
.logo .kanji span:nth-child(1) { color: #ff5cb8; animation-delay: 0s; }
.logo .kanji span:nth-child(2) { color: #76ee5c; animation-delay: .15s; }
.logo .kanji span:nth-child(3) { color: #3acaf6; animation-delay: .3s; }
.logo .kanji span:nth-child(4) { color: #ffae3a; animation-delay: .45s; }
.logo .kanji span:nth-child(5) { color: #c89cff; animation-delay: .6s; }
@keyframes dance {
0%, 100% { transform: translateY(0) rotate(-4deg); }
50% { transform: translateY(-6px) rotate(4deg); }
}
.logo .sparkle {
position: absolute;
font-size: 22px;
animation: spin-pop 2s ease-in-out infinite;
}
.logo .sparkle.s1 { top: -10px; left: -8px; animation-delay: 0s; }
.logo .sparkle.s2 { top: -16px; right: 6px; animation-delay: .8s; }
.logo .sparkle.s3 { bottom: -8px; left: 30%; animation-delay: 1.4s; }
@keyframes spin-pop {
0%, 100% { transform: scale(.6) rotate(0deg); opacity: .7; }
50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
}
.logo .sub {
font-family: “Yusei Magic”, “Zen Maru Gothic”, sans-serif;
color: #6a2d80;
font-size: 14px;
letter-spacing: .14em;
margin-top: 14px;
text-shadow: 0 2px 0 #fff, 0 3px 6px rgba(0,0,0,.15);
}

.mode-grid {
display: grid;
grid-template-columns: repeat(2, minmax(140px, 1fr));
gap: 12px;
width: 100%;
max-width: 480px;
flex-shrink: 0;
}
.mode-card {
position: relative;
border: none;
cursor: pointer;
padding: 14px 12px 12px;
border-radius: 22px;
background-color: #fff;
background: linear-gradient(180deg, #fff, #ffeeff);
border: 4px solid #fff;
box-shadow:
0 6px 0 #c97abe,
0 14px 20px rgba(190,100,170,.35);
color: #5a1f6a;
font-family: “Mochiy Pop One”, “Zen Maru Gothic”, sans-serif;
font-weight: 900;
font-size: 17px;
transition: transform .12s ease, box-shadow .12s ease;
text-align: center;
overflow: hidden;
min-height: 110px;
}
.mode-card::before {
content: “”;
position: absolute;
inset: 0;
background:
radial-gradient(circle at 20% 20%, rgba(255,200,240,.5), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(200,230,255,.5), transparent 40%);
pointer-events: none;
}
.mode-card:active {
transform: translateY(4px);
box-shadow: 0 2px 0 #c97abe, 0 6px 10px rgba(190,100,170,.35);
}
.mode-card .pcs {
display: flex;
gap: 5px;
justify-content: center;
margin-bottom: 6px;
}
.mode-card .pcs .mini {
width: 28px;
height: 28px;
}
.mode-card .desc {
font-size: 11px;
font-weight: 500;
color: #8a4a7a;
margin-top: 3px;
font-family: “Zen Maru Gothic”, sans-serif;
}
.mode-card .badge {
position: absolute;
top: -8px;
right: -8px;
background-color: #ffaa3a;
background: linear-gradient(180deg, #ffe65a, #ff9420);
color: #5a1f00;
font-family: “Mochiy Pop One”, sans-serif;
font-size: 10px;
padding: 4px 8px;
border-radius: 999px;
border: 2px solid #fff;
transform: rotate(8deg);
box-shadow: 0 3px 0 rgba(180,80,0,.5);
}

.credit {
margin-top: 22px;
color: #8a4a7a;
font-family: “Yusei Magic”, sans-serif;
font-size: 12px;
letter-spacing: .1em;
text-shadow: 0 1px 0 #fff;
text-align: center;
flex-shrink: 0;
}

/* === Game screen === */
#gameScreen {
display: flex;
flex-direction: column;
align-items: center;
padding: 8px 8px 0;
}

.game-topbar {
width: 100%;
max-width: 720px;
display: flex;
align-items: center;
justify-content: space-between;
gap: 6px;
padding: 4px 4px;
margin-bottom: 4px;
flex-shrink: 0;
}
.turn-pill {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
padding: 8px 12px;
background-color: rgba(255,255,255,.8);
background: rgba(255,255,255,.8);
border: 3px solid #fff;
border-radius: 999px;
color: #5a1f6a;
font-family: “Mochiy Pop One”, “Zen Maru Gothic”, sans-serif;
font-weight: 900;
font-size: 14px;
backdrop-filter: blur(6px);
box-shadow: 0 4px 10px rgba(180,100,180,.3);
min-height: 44px;
}
.turn-pill .mini-mascot {
width: 28px;
height: 28px;
flex-shrink: 0;
}
.icon-btn {
width: 44px;
height: 44px;
border: 3px solid #fff;
border-radius: 14px;
background-color: #ffe0f5;
background: linear-gradient(180deg, #fff, #ffe0f5);
box-shadow: 0 4px 0 #c97abe, 0 6px 10px rgba(190,100,170,.35);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
font-size: 18px;
flex-shrink: 0;
}
.icon-btn:active {
transform: translateY(3px);
box-shadow: 0 1px 0 #c97abe, 0 3px 6px rgba(190,100,170,.35);
}

.players {
width: 100%;
max-width: 720px;
display: flex;
gap: 6px;
justify-content: center;
padding: 4px 6px 0;
flex-wrap: wrap;
flex-shrink: 0;
}
.player-card {
flex: 1 1 0;
min-width: 70px;
background-color: rgba(255,255,255,.92);
background: rgba(255,255,255,.92);
border-radius: 18px;
padding: 6px 4px 8px;
border: 3px solid #fff;
color: #5a1f6a;
font-family: “Mochiy Pop One”, “Zen Maru Gothic”, sans-serif;
text-align: center;
box-shadow: 0 4px 0 rgba(180,100,180,.4), 0 8px 14px rgba(120,40,120,.25);
transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
position: relative;
}
.player-card.active {
transform: translateY(-4px) scale(1.04);
border-color: #ffe65a;
box-shadow: 0 6px 0 rgba(255,180,40,.5), 0 12px 18px rgba(120,40,120,.35), 0 0 0 3px rgba(255,225,100,.5);
}
.player-card.active::before {
content: “▼”;
position: absolute;
top: -16px;
left: 50%;
transform: translateX(-50%);
color: #ffd45a;
text-shadow: 0 1px 0 #fff, 0 2px 4px rgba(0,0,0,.25);
font-size: 16px;
animation: bounce-down .8s ease-in-out infinite;
}
@keyframes bounce-down {
0%, 100% { transform: translateX(-50%) translateY(0); }
50% { transform: translateX(-50%) translateY(4px); }
}
.player-card .avatar {
width: 32px;
height: 32px;
margin: 0 auto 2px;
}
.player-card .name {
font-size: 12px;
letter-spacing: .04em;
color: #5a1f6a;
}
.player-card .count {
font-size: 24px;
font-family: “Mochiy Pop One”, sans-serif;
margin-top: 0;
line-height: 1;
color: #8a2da0;
}
.player-card .count small {
font-size: 0.45em;
opacity: .6;
font-family: “Zen Maru Gothic”, sans-serif;
margin-left: 1px;
}
.player-card .phase {
font-size: 10px;
color: #a55a8a;
margin-top: 1px;
font-family: “Zen Maru Gothic”, sans-serif;
}

/* === Board === */
.board-wrap {
position: relative;
/* width & height set by JS in fitBoard() */
margin: 8px auto;
flex-shrink: 0;
}
.board-frame {
position: absolute;
inset: -14px;
border-radius: 26px;
background-color: #ff8ed2;
background: linear-gradient(135deg, #ff8ed2, #ffe65a 50%, #6fdc6a, #5cc8ff);
padding: 6px;
box-shadow: 0 12px 30px rgba(120,40,120,.4),
inset 0 2px 4px rgba(255,255,255,.5),
inset 0 -3px 4px rgba(0,0,0,.15);
}
.board-frame::before {
content: “”;
position: absolute;
inset: 6px;
border-radius: 20px;
background-color: #fff7e0;
background: linear-gradient(135deg, #fff7e0, #ffe0f0);
}
.board-frame::after {
content: “”;
position: absolute;
inset: 12px;
border-radius: 16px;
border: 2px dashed rgba(180,100,150,.3);
pointer-events: none;
}
.board {
position: absolute;
inset: 0;
border-radius: 16px;
display: grid;
background-color: #fff7e0;
background:
radial-gradient(circle at 1px 1px, rgba(180,100,150,.18) 1px, transparent 1.5px) 0 0/22px 22px,
radial-gradient(ellipse at 30% 25%, rgba(255,250,240,.5), transparent 65%),
linear-gradient(160deg, #fff7e0, #ffe7c4 60%, #ffd2c6);
overflow: hidden;
box-shadow: inset 0 0 0 3px #fff,
inset 0 0 25px rgba(150,80,120,.18);
}
.cell {
position: relative;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
}
.cell.legal-place::before {
content: “”;
position: absolute;
inset: 26%;
border-radius: 50%;
background-color: rgba(255,255,255,.5);
background: rgba(255,255,255,.5);
border: 2px dashed rgba(255,180,210,.7);
pointer-events: none;
animation: gentle-pulse 1.8s ease-in-out infinite;
}
@keyframes gentle-pulse {
0%, 100% { transform: scale(.95); opacity: .6; }
50% { transform: scale(1.05); opacity: 1; }
}
.cell.legal-move::before {
content: “✦”;
position: absolute;
inset: 20%;
border-radius: 50%;
background-color: rgba(255,200,80,.4);
background: radial-gradient(circle, rgba(255,250,150,.8), rgba(255,200,80,.4) 60%, transparent);
border: 2px solid rgba(255,220,80,.9);
color: #ff9420;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
font-weight: bold;
pointer-events: none;
animation: pulse-bright 1.2s ease-in-out infinite;
}
@keyframes pulse-bright {
0%, 100% { transform: scale(1) rotate(0deg); opacity: .8; }
50% { transform: scale(1.18) rotate(180deg); opacity: 1; }
}
.cell.removable .tile-svg {
filter: drop-shadow(0 0 12px #fff) drop-shadow(0 0 22px #ffe85a);
animation: jiggle .55s ease-in-out infinite;
}
@keyframes jiggle {
0%, 100% { transform: rotate(-3deg) scale(1.04); }
50% { transform: rotate(3deg) scale(1.08); }
}

.tile {
width: 92%;
height: 92%;
position: relative;
animation: drop .45s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes drop {
0% { transform: translateY(-40px) rotate(-25deg) scale(.5); opacity: 0; }
60% { transform: translateY(4px) rotate(8deg) scale(1.12); opacity: 1; }
80% { transform: translateY(-2px) rotate(-3deg) scale(.97); }
100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
}
.tile-svg {
width: 100%;
height: 100%;
display: block;
}

.sparkle-burst {
position: absolute;
inset: 0;
pointer-events: none;
}
.sparkle-burst i {
position: absolute;
left: 50%;
top: 50%;
width: 10px;
height: 10px;
background-color: #ffe85a;
background: radial-gradient(circle, #fff 0%, #ffe85a 50%, transparent 70%);
border-radius: 50%;
/* Inline transform/animation-name is set per-element via JS using direct style writes */
}

.cell.win .tile-svg {
animation: winflash .8s ease-in-out infinite;
}
@keyframes winflash {
0%, 100% { filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 18px #ffe85a) drop-shadow(0 0 28px #ff8ed2); transform: scale(1); }
50%     { filter: drop-shadow(0 0 16px #fff) drop-shadow(0 0 30px #ffe85a) drop-shadow(0 0 42px #ff8ed2); transform: scale(1.12); }
}

/* === Hint banner === */
.hint {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%) scale(.6) rotate(-6deg);
background-color: #fff;
background: linear-gradient(180deg, #fff, #fff8d6);
color: #5a1f6a;
font-family: “Mochiy Pop One”, “Zen Maru Gothic”, sans-serif;
font-size: 18px;
padding: 14px 22px;
border-radius: 16px;
border: 4px solid #ffd45a;
box-shadow: 0 12px 24px rgba(120,40,120,.45),
inset 0 2px 0 #fff;
pointer-events: none;
opacity: 0;
transition: opacity .25s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
z-index: 50;
text-align: center;
line-height: 1.3;
}
.hint.show {
opacity: 1;
transform: translate(-50%, -50%) scale(1) rotate(0deg);
}

/* === リーチ! splash (absolute inside #content) === */
#reachSplash {
position: absolute;
left: 50%;
top: 35%;
transform: translate(-50%, -50%) scale(.4) rotate(-15deg);
font-family: “Mochiy Pop One”, sans-serif;
font-size: 64px;
-webkit-text-stroke: 6px #fff;
paint-order: stroke fill;
color: #ff3aa8;
text-shadow: 0 4px 0 #6a2d80, 0 8px 0 #4a1c5a, 0 14px 18px rgba(80,30,100,.5);
pointer-events: none;
opacity: 0;
z-index: 100;
transition: opacity .3s ease, transform .5s cubic-bezier(.34,1.56,.64,1);
white-space: nowrap;
}
#reachSplash.show {
opacity: 1;
transform: translate(-50%, -50%) scale(1) rotate(0deg);
animation: reach-wobble .6s ease-in-out infinite;
}
@keyframes reach-wobble {
0%, 100% { rotate: -3deg; }
50% { rotate: 3deg; }
}

/* === Win modal (absolute inside #app, on top of everything) === */
#winModal {
position: absolute;
inset: 0;
background-color: rgba(20,0,30,.7);
background: radial-gradient(ellipse at 50% 50%, rgba(40,10,60,.5), rgba(20,0,30,.85));
display: flex;
align-items: center;
justify-content: center;
z-index: 200;
opacity: 0;
pointer-events: none;
transition: opacity .4s ease;
padding: 20px;
}
#winModal.show {
opacity: 1;
pointer-events: auto;
}
.modal-card {
background-color: #fff;
background: linear-gradient(180deg, #fff, #ffeeff);
border-radius: 28px;
padding: 24px 22px;
text-align: center;
border: 5px solid #fff;
box-shadow:
0 0 0 3px #ffd45a,
0 0 0 6px #ff7eb6,
0 0 0 9px #5cc8ff,
0 24px 50px rgba(0,0,0,.6);
max-width: 360px;
transform: scale(.5) rotate(-15deg);
transition: transform .6s cubic-bezier(.34,1.56,.64,1);
position: relative;
}
#winModal.show .modal-card {
transform: scale(1) rotate(0deg);
}
.modal-card h2 {
font-family: “Mochiy Pop One”, sans-serif;
font-size: 36px;
margin: 0 0 4px;
color: #ff3aa8;
-webkit-text-stroke: 4px #fff;
paint-order: stroke fill;
text-shadow: 0 4px 0 #6a2d80, 0 8px 12px rgba(80,30,100,.4);
}
.modal-card .winner-tile {
width: 110px;
height: 110px;
margin: 16px auto 8px;
filter: drop-shadow(0 8px 14px rgba(0,0,0,.4)) drop-shadow(0 0 20px #ffe85a);
animation: winnerSpin 1.6s ease-in-out infinite;
}
@keyframes winnerSpin {
0%, 100% { transform: rotate(-12deg) scale(1); }
50% { transform: rotate(12deg) scale(1.12); }
}
.modal-card .msg {
font-family: “Mochiy Pop One”, sans-serif;
font-size: 20px;
color: #5a1f6a;
margin-bottom: 6px;
}
.modal-card .sub {
font-size: 13px;
color: #8a4a7a;
margin-bottom: 16px;
font-family: “Zen Maru Gothic”, sans-serif;
}
.modal-card .btn-row {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
}
.btn {
border: 3px solid #fff;
padding: 12px 20px;
border-radius: 16px;
font-family: “Mochiy Pop One”, sans-serif;
font-weight: 900;
font-size: 15px;
cursor: pointer;
background-color: #ff3aa8;
background: linear-gradient(180deg, #ff7eb6, #ff3aa8);
color: #fff;
box-shadow: 0 5px 0 #a02568, 0 8px 14px rgba(0,0,0,.35);
transition: transform .12s ease, box-shadow .12s ease;
-webkit-text-stroke: 1px #6a1840;
paint-order: stroke fill;
min-height: 44px;
min-width: 100px;
}
.btn:active {
transform: translateY(3px);
box-shadow: 0 2px 0 #a02568, 0 4px 8px rgba(0,0,0,.35);
}
.btn.ghost {
background-color: #fff;
background: linear-gradient(180deg, #fff, #d8c8ff);
color: #5a1f6a;
-webkit-text-stroke: 0;

<script>
/* =========================================================
   いろならべ ✦ マジカル・カラーズ (v3 - implements 12 rules)
   ========================================================= */

/* === RULE 3: Set app height via JS, not via 100vh/100dvh === */
function setAppHeight() {
  var h = window.innerHeight;
  document.body.style.height = h + 'px';
  var app = document.getElementById('app');
  if (app) app.style.height = h + 'px';
  // also adjust board after height change
  fitBoard();
}
setAppHeight();
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', function () {
  setTimeout(setAppHeight, 100);
  setTimeout(setAppHeight, 500);
});
window.addEventListener('load', function () {
  setTimeout(setAppHeight, 300);
});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', setAppHeight);
  window.visualViewport.addEventListener('scroll', setAppHeight);
}

/* === Color & character config (literal hex; NEVER stored in CSS vars) === */
var COLORS = [
  { id:'pink',   light:'#ff8ed2', main:'#ff5cc4', dark:'#9c0058', label:'ピンク',   name:'ピーちゃん', face:'flower' },
  { id:'green',  light:'#9af07c', main:'#66e860', dark:'#147f0a', label:'グリーン', name:'みどりん',   face:'leaf'   },
  { id:'blue',   light:'#7ddfff', main:'#3acdff', dark:'#015c8a', label:'ブルー',   name:'あおまる',   face:'star'   },
  { id:'orange', light:'#ffc070', main:'#ffaa3a', dark:'#9a4500', label:'オレンジ', name:'だいだい',   face:'sun'    }
];

var BOARD_N = 10;
var TILES_PER_PLAYER = 15;
var WIN_LEN = 5;

/* =========================================================
   SVG factories
   ========================================================= */
function mascotSVG(colorIdx) {
  var c = COLORS[colorIdx];
  var id = 'm' + colorIdx + '_' + Math.random().toString(36).slice(2,7);
  return '' +
  '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">' +
    '<defs>' +
      '<radialGradient id="' + id + 'body" cx=".4" cy=".35" r=".75">' +
        '<stop offset="0%" stop-color="' + c.light + '"/>' +
        '<stop offset="60%" stop-color="' + c.main + '"/>' +
        '<stop offset="100%" stop-color="' + c.dark + '"/>' +
      '</radialGradient>' +
      '<radialGradient id="' + id + 'cheek" cx=".5" cy=".5" r=".6">' +
        '<stop offset="0%" stop-color="rgba(255,80,120,.6)"/>' +
        '<stop offset="100%" stop-color="rgba(255,80,120,0)"/>' +
      '</radialGradient>' +
    '</defs>' +
    '<ellipse cx="50" cy="92" rx="22" ry="4" fill="rgba(0,0,0,.18)"/>' +
    '<path d="M 50 12 C 28 12, 14 30, 14 52 C 14 74, 30 88, 50 88 C 70 88, 86 74, 86 52 C 86 30, 72 12, 50 12 Z" fill="url(#' + id + 'body)" stroke="' + c.dark + '" stroke-width="2.5"/>' +
    '<ellipse cx="38" cy="28" rx="14" ry="8" fill="rgba(255,255,255,.55)"/>' +
    '<ellipse cx="30" cy="58" rx="8" ry="5" fill="url(#' + id + 'cheek)"/>' +
    '<ellipse cx="70" cy="58" rx="8" ry="5" fill="url(#' + id + 'cheek)"/>' +
    '<ellipse cx="38" cy="48" rx="5" ry="6" fill="#1b0830"/>' +
    '<ellipse cx="62" cy="48" rx="5" ry="6" fill="#1b0830"/>' +
    '<ellipse cx="40" cy="46" rx="1.8" ry="2" fill="#fff"/>' +
    '<ellipse cx="64" cy="46" rx="1.8" ry="2" fill="#fff"/>' +
    '<path d="M 42 64 Q 50 72 58 64" stroke="#1b0830" stroke-width="2.5" fill="none" stroke-linecap="round"/>' +
    decorationFor(c.face, c.dark) +
  '</svg>';
}
function decorationFor(face, dark) {
  if (face === 'flower') {
    return '<g transform="translate(50,16)">' +
      '<circle cx="0" cy="-4" r="4" fill="#ffe85a" stroke="' + dark + '" stroke-width="1.5"/>' +
      '<circle cx="-6" cy="-1" r="3.5" fill="#fff" stroke="' + dark + '" stroke-width="1.5"/>' +
      '<circle cx="6" cy="-1" r="3.5" fill="#fff" stroke="' + dark + '" stroke-width="1.5"/>' +
      '<circle cx="-3" cy="-7" r="3.5" fill="#fff" stroke="' + dark + '" stroke-width="1.5"/>' +
      '<circle cx="3" cy="-7" r="3.5" fill="#fff" stroke="' + dark + '" stroke-width="1.5"/>' +
      '<circle cx="0" cy="-4" r="2" fill="#ff8e3a"/></g>';
  }
  if (face === 'leaf') {
    return '<path d="M 50 14 Q 56 4 58 14 Q 54 18 50 14 Z" fill="#1f9c12" stroke="' + dark + '" stroke-width="1.5"/>' +
           '<path d="M 53 6 Q 53 12 53 16" stroke="' + dark + '" stroke-width="1" fill="none"/>';
  }
  if (face === 'star') {
    return '<polygon points="50,8 53,16 61,16 55,21 57,29 50,24 43,29 45,21 39,16 47,16" fill="#ffe85a" stroke="' + dark + '" stroke-width="1.5"/>';
  }
  if (face === 'sun') {
    return '<g stroke="' + dark + '" stroke-width="1.5" stroke-linecap="round">' +
      '<line x1="50" y1="2" x2="50" y2="10"/>' +
      '<line x1="38" y1="6" x2="42" y2="13"/>' +
      '<line x1="62" y1="6" x2="58" y2="13"/>' +
      '<line x1="30" y1="14" x2="36" y2="18"/>' +
      '<line x1="70" y1="14" x2="64" y2="18"/></g>';
  }
  return '';
}

function tileSVG(colorIdx) {
  var c = COLORS[colorIdx];
  var id = 'g' + colorIdx + '_' + Math.random().toString(36).slice(2,7);
  return '' +
  '<svg class="tile-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">' +
    '<defs>' +
      '<linearGradient id="' + id + 'face" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="' + c.light + '"/>' +
        '<stop offset="55%" stop-color="' + c.main + '"/>' +
        '<stop offset="100%" stop-color="' + c.dark + '"/>' +
      '</linearGradient>' +
      '<linearGradient id="' + id + 'gloss" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="rgba(255,255,255,.85)"/>' +
        '<stop offset="60%" stop-color="rgba(255,255,255,0)"/>' +
      '</linearGradient>' +
      '<radialGradient id="' + id + 'hole" cx=".5" cy=".4" r=".7">' +
        '<stop offset="0%" stop-color="rgba(0,0,0,.45)"/>' +
        '<stop offset="55%" stop-color="rgba(0,0,0,.65)"/>' +
        '<stop offset="100%" stop-color="' + c.dark + '"/>' +
      '</radialGradient>' +
    '</defs>' +
    '<rect x="4" y="4" width="92" height="92" rx="14" ry="14" fill="' + c.dark + '" opacity=".7"/>' +
    '<rect x="3" y="3" width="92" height="92" rx="14" ry="14" fill="url(#' + id + 'face)" stroke="' + c.dark + '" stroke-width="0.6"/>' +
    '<rect x="3" y="3" width="92" height="92" rx="14" ry="14" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="1.2"/>' +
    '<rect x="7" y="7" width="86" height="86" rx="11" ry="11" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="0.8"/>' +
    '<g font-family="Impact, Arial Black, sans-serif" font-weight="900" fill="' + c.dark + '" opacity=".5" font-size="13" letter-spacing="-0.5">' +
      '<text x="14" y="20" transform="rotate(0,14,20)">O\u00b7K</text>' +
      '<text x="86" y="20" transform="rotate(90,86,20)">O\u00b7K</text>' +
      '<text x="86" y="86" transform="rotate(180,86,86)">O\u00b7K</text>' +
      '<text x="14" y="86" transform="rotate(-90,14,86)">O\u00b7K</text>' +
    '</g>' +
    '<circle cx="50" cy="50" r="16" fill="' + c.dark + '"/>' +
    '<circle cx="50" cy="50" r="15" fill="url(#' + id + 'hole)"/>' +
    '<g>' +
      '<circle cx="46" cy="52" r="2" fill="#fff"/>' +
      '<circle cx="54" cy="52" r="2" fill="#fff"/>' +
      '<circle cx="46.4" cy="52.3" r="1" fill="#1b0830"/>' +
      '<circle cx="54.4" cy="52.3" r="1" fill="#1b0830"/>' +
    '</g>' +
    '<path d="M 14 8 Q 50 4 86 8 Q 76 18 50 18 Q 24 18 14 8 Z" fill="url(#' + id + 'gloss)" opacity=".8"/>' +
    '<path d="M 8 14 Q 6 50 8 86 L 12 80 Q 11 50 12 20 Z" fill="rgba(255,255,255,.22)"/>' +
    '<circle cx="22" cy="22" r="3" fill="rgba(255,255,255,.85)"/>' +
  '</svg>';
}

/* =========================================================
   STATE
   ========================================================= */
var state = {
  mode: 0,
  numPlayers: 0,
  colorIdx: [],
  board: [],
  current: 0,
  placedCounts: [],
  inMovePhase: [],
  pendingMove: null,
  gameOver: false,
  cpu: false,
  cpuPlayerIndex: -1
};

/* === DOM refs === */
var titleScreen = document.getElementById('titleScreen');
var gameScreen = document.getElementById('gameScreen');
var boardEl = document.getElementById('board');
var boardWrap = document.getElementById('boardWrap');
var playersEl = document.getElementById('players');
var turnMascotEl = document.getElementById('turnMascot');
var turnTextEl = document.getElementById('turnText');
var hintEl = document.getElementById('hint');
var winModal = document.getElementById('winModal');
var winTitle = document.getElementById('winTitle');
var winnerTileEl = document.getElementById('winnerTile');
var winMsgEl = document.getElementById('winMsg');
var winSubEl = document.getElementById('winSub');
var confettiEl = document.getElementById('confetti');
var reachSplashEl = document.getElementById('reachSplash');
var mascotRowEl = document.getElementById('mascotRow');

/* =========================================================
   BOOT: build clouds, stars, mascots
   ========================================================= */
function buildBackground() {
  var stars = document.getElementById('stars');
  for (var i = 0; i < 24; i++) {
    var s = document.createElement('i');
    /* RULE 1 / RULE applied: direct style writes, no CSS vars */
    s.style.left = (Math.random() * 100) + 'vw';
    s.style.top = (Math.random() * 100) + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    var scale = 0.6 + Math.random() * 1.2;
    s.style.transform = 'scale(' + scale + ')';
    stars.appendChild(s);
  }
  var clouds = document.getElementById('clouds');
  for (var j = 0; j < 5; j++) {
    var cl = document.createElement('div');
    cl.className = 'cloud';
    var w = 60 + Math.random() * 40;
    cl.style.width = w + 'px';
    cl.style.height = (w * 0.6) + 'px';
    cl.style.top = (5 + Math.random() * 70) + '%';
    cl.style.animationDuration = (28 + Math.random() * 18) + 's';
    cl.style.animationDelay = (-Math.random() * 30) + 's';
    clouds.appendChild(cl);
  }
  for (var k = 0; k < 4; k++) {
    var m = document.createElement('div');
    m.className = 'mascot';
    m.innerHTML = mascotSVG(k);
    mascotRowEl.appendChild(m);
  }
  var modeColors = { 1:[0,2], 2:[0,1], 3:[0,1,2], 4:[0,1,2,3] };
  Object.keys(modeColors).forEach(function (mode) {
    var cols = modeColors[mode];
    var container = document.getElementById('pcs' + mode);
    cols.forEach(function (ci) {
      var d = document.createElement('div');
      d.className = 'mini';
      d.innerHTML = mascotSVG(ci);
      container.appendChild(d);
    });
  });
}
buildBackground();

/* === Event wires === */
var modeCards = document.querySelectorAll('.mode-card');
for (var i = 0; i < modeCards.length; i++) {
  (function (btn) {
    btn.addEventListener('click', function () { startGame(parseInt(btn.getAttribute('data-mode'), 10)); });
  })(modeCards[i]);
}
document.getElementById('btnHome').addEventListener('click', goHome);
document.getElementById('btnReset').addEventListener('click', function () { startGame(state.mode); });
document.getElementById('winHome').addEventListener('click', function () { closeModal(); goHome(); });
document.getElementById('winAgain').addEventListener('click', function () { closeModal(); startGame(state.mode); });

/* =========================================================
   LIFECYCLE
   ========================================================= */
function goHome() {
  gameScreen.classList.add('hide');
  titleScreen.classList.remove('hide');
  closeModal();
}

function startGame(mode) {
  state.mode = mode;
  state.numPlayers = (mode === 1) ? 2 : mode;
  state.cpu = (mode === 1);
  state.cpuPlayerIndex = state.cpu ? 1 : -1;

  if (state.numPlayers === 2) {
    state.colorIdx = [0, 2];
  } else if (state.numPlayers === 3) {
    state.colorIdx = [0, 1, 2];
  } else {
    state.colorIdx = [0, 1, 2, 3];
  }

  state.board = [];
  for (var r = 0; r < BOARD_N; r++) {
    var row = [];
    for (var c = 0; c < BOARD_N; c++) row.push(null);
    state.board.push(row);
  }
  state.placedCounts = [];
  state.inMovePhase = [];
  for (var p = 0; p < state.numPlayers; p++) {
    state.placedCounts.push(0);
    state.inMovePhase.push(false);
  }
  state.current = 0;
  state.pendingMove = null;
  state.gameOver = false;

  titleScreen.classList.add('hide');
  setTimeout(function () {
    gameScreen.classList.remove('hide');
    fitBoard();
    renderAll();
    updateTurnUI();
    showHint('タップ で 1まい おく ✦', 1300);
    maybeRunCPU();
  }, 350);
}

/* =========================================================
   RENDER
   ========================================================= */
function renderAll() {
  renderPlayers();
  renderBoard();
}

function renderPlayers() {
  playersEl.innerHTML = '';
  for (var p = 0; p < state.numPlayers; p++) {
    var c = COLORS[state.colorIdx[p]];
    var card = document.createElement('div');
    card.className = 'player-card' + (p === state.current ? ' active' : '');
    var remaining = TILES_PER_PLAYER - state.placedCounts[p];
    var isCpu = (state.cpu && p === state.cpuPlayerIndex);
    var phaseText = state.inMovePhase[p] ? '◆うごかす' : 'のこり';
    card.innerHTML =
      '<div class="avatar">' + mascotSVG(state.colorIdx[p]) + '</div>' +
      '<div class="name">' + (isCpu ? 'CPU' : 'P' + (p+1)) + ' <span style="color:' + c.dark + '">' + c.name + '</span></div>' +
      '<div class="count">' + remaining + '<small>/15</small></div>' +
      '<div class="phase">' + phaseText + '</div>';
    playersEl.appendChild(card);
  }
}

function renderBoard() {
  boardEl.style.gridTemplateColumns = 'repeat(' + BOARD_N + ', 1fr)';
  boardEl.style.gridTemplateRows = 'repeat(' + BOARD_N + ', 1fr)';
  boardEl.innerHTML = '';
  for (var r = 0; r < BOARD_N; r++) {
    for (var c = 0; c < BOARD_N; c++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.setAttribute('data-r', r);
      cell.setAttribute('data-c', c);
      var tile = state.board[r][c];
      if (tile) {
        cell.classList.add('occupied');
        var t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = tileSVG(state.colorIdx[tile.p]);
        cell.appendChild(t);
      } else {
        cell.classList.add('empty');
      }
      cell.addEventListener('click', onCellClick);
      boardEl.appendChild(cell);
    }
  }
  refreshLegalOverlays();
}

function refreshLegalOverlays() {
  var cells = boardEl.querySelectorAll('.cell');
  for (var i = 0; i < cells.length; i++) {
    cells[i].classList.remove('legal-move', 'removable', 'legal-place');
  }
  if (state.gameOver) return;
  var p = state.current;
  if (state.cpu && p === state.cpuPlayerIndex) return;

  if (state.inMovePhase[p] && !state.pendingMove) {
    for (var r = 0; r < BOARD_N; r++) {
      for (var c = 0; c < BOARD_N; c++) {
        if (state.board[r][c] && state.board[r][c].p === p) {
          boardEl.children[r * BOARD_N + c].classList.add('removable');
        }
      }
    }
  } else if (state.inMovePhase[p] && state.pendingMove) {
    var fr = state.pendingMove.from[0], fc = state.pendingMove.from[1];
    var saved = state.board[fr][fc];
    state.board[fr][fc] = null;
    for (var r2 = 0; r2 < BOARD_N; r2++) {
      for (var c2 = 0; c2 < BOARD_N; c2++) {
        if (isLegalPlacement(r2, c2)) {
          boardEl.children[r2 * BOARD_N + c2].classList.add('legal-move');
        }
      }
    }
    state.board[fr][fc] = saved;
  } else {
    if (!boardIsEmpty()) {
      for (var r3 = 0; r3 < BOARD_N; r3++) {
        for (var c3 = 0; c3 < BOARD_N; c3++) {
          if (isLegalPlacement(r3, c3)) {
            boardEl.children[r3 * BOARD_N + c3].classList.add('legal-place');
          }
        }
      }
    }
  }
}

function updateTurnUI() {
  var p = state.current;
  var c = COLORS[state.colorIdx[p]];
  turnMascotEl.innerHTML = mascotSVG(state.colorIdx[p]);
  var isCpu = (state.cpu && p === state.cpuPlayerIndex);
  var label = isCpu ? ('CPU(' + c.name + ')の ばん') : ('P' + (p+1) + '(' + c.name + ')の ばん');
  if (state.inMovePhase[p]) {
    label += state.pendingMove ? ' ─ おきなおす ばしょ を タップ' : ' ─ うごかす いし を タップ';
  }
  turnTextEl.textContent = label;
  renderPlayers();
}

/* =========================================================
   ADJACENCY / PLACEMENT VALIDATION
   ========================================================= */
var DIRS = [[1,0],[0,1],[1,1],[1,-1]];
function inBounds(r, c) { return r >= 0 && r < BOARD_N && c >= 0 && c < BOARD_N; }
function hasAnyAdjacent(r, c) {
  for (var dr = -1; dr <= 1; dr++) {
    for (var dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      var nr = r + dr, nc = c + dc;
      if (inBounds(nr, nc) && state.board[nr][nc]) return true;
    }
  }
  return false;
}
function boardIsEmpty() {
  for (var r = 0; r < BOARD_N; r++) {
    for (var c = 0; c < BOARD_N; c++) {
      if (state.board[r][c]) return false;
    }
  }
  return true;
}
function isLegalPlacement(r, c) {
  if (!inBounds(r, c)) return false;
  if (state.board[r][c]) return false;
  if (boardIsEmpty()) return true;
  return hasAnyAdjacent(r, c);
}

/* =========================================================
   INTERACTION
   ========================================================= */
function onCellClick(e) {
  if (state.gameOver) return;
  var p = state.current;
  if (state.cpu && p === state.cpuPlayerIndex) return;

  var cell = e.currentTarget;
  var r = parseInt(cell.getAttribute('data-r'), 10);
  var c = parseInt(cell.getAttribute('data-c'), 10);

  if (!state.inMovePhase[p]) {
    if (state.board[r][c]) return;
    if (!isLegalPlacement(r, c)) {
      showHint('となりに 駒のある\nマスにしか おけないよ ✦', 1100);
      return;
    }
    placeTile(p, r, c);
  } else {
    if (!state.pendingMove) {
      var t = state.board[r][c];
      if (!t || t.p !== p) {
        showHint('じぶん の いし を タップ ✦', 900);
        return;
      }
      state.pendingMove = { from: [r, c] };
      refreshLegalOverlays();
      updateTurnUI();
    } else {
      var fr = state.pendingMove.from[0], fc = state.pendingMove.from[1];
      if (state.board[r][c]) {
        if (state.board[r][c].p === p) {
          state.pendingMove = { from: [r, c] };
          refreshLegalOverlays();
        }
        return;
      }
      var saved = state.board[fr][fc];
      state.board[fr][fc] = null;
      var ok = isLegalPlacement(r, c);
      state.board[fr][fc] = saved;
      if (!ok) {
        showHint('となりに 駒のある\nマスにしか おけないよ ✦', 1100);
        return;
      }
      moveTile(p, fr, fc, r, c);
    }
  }
}

function placeTile(p, r, c) {
  state.board[r][c] = { p: p };
  state.placedCounts[p]++;
  var cell = boardEl.children[r * BOARD_N + c];
  var t = document.createElement('div');
  t.className = 'tile';
  t.innerHTML = tileSVG(state.colorIdx[p]);
  cell.classList.remove('empty');
  cell.classList.add('occupied');
  cell.appendChild(t);
  emitSparkles(cell);

  if (state.placedCounts[p] >= TILES_PER_PLAYER) state.inMovePhase[p] = true;

  if (checkWinAt(r, c, p)) { endGame(p); return; }
  if (hasReach(p)) showReachSplash();
  nextTurn();
}

function moveTile(p, fr, fc, tr, tc) {
  state.board[fr][fc] = null;
  state.board[tr][tc] = { p: p };
  state.pendingMove = null;

  var fromCell = boardEl.children[fr * BOARD_N + fc];
  fromCell.innerHTML = '';
  fromCell.classList.remove('occupied', 'win', 'removable');
  fromCell.classList.add('empty');

  var toCell = boardEl.children[tr * BOARD_N + tc];
  toCell.classList.remove('empty', 'legal-move');
  toCell.classList.add('occupied');
  var t = document.createElement('div');
  t.className = 'tile';
  t.innerHTML = tileSVG(state.colorIdx[p]);
  toCell.appendChild(t);
  emitSparkles(toCell);

  refreshLegalOverlays();
  if (checkWinAt(tr, tc, p)) { endGame(p); return; }
  if (hasReach(p)) showReachSplash();
  nextTurn();
}

/* === Sparkles: avoid CSS vars; write directly to style === */
function emitSparkles(cell) {
  var burst = document.createElement('div');
  burst.className = 'sparkle-burst';
  for (var i = 0; i < 8; i++) {
    var s = document.createElement('i');
    var angle = (Math.PI * 2) * (i / 8) + Math.random() * 0.4;
    var dist = 28 + Math.random() * 18;
    var dx = Math.cos(angle) * dist;
    var dy = Math.sin(angle) * dist;
    /* drive animation via inline keyframes-like transition; simpler: set transition+target */
    s.style.transform = 'translate(-50%, -50%) scale(1)';
    s.style.transition = 'transform .7s cubic-bezier(.2,.7,.4,1), opacity .7s ease-out';
    s.style.opacity = '1';
    s.style.transitionDelay = (i * 0.02) + 's';
    burst.appendChild(s);
    /* fire next frame */
    (function (el, dxv, dyv) {
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          el.style.transform = 'translate(calc(-50% + ' + dxv + 'px), calc(-50% + ' + dyv + 'px)) scale(0)';
          el.style.opacity = '0';
        });
      });
    })(s, dx, dy);
  }
  cell.appendChild(burst);
  setTimeout(function () { if (burst.parentNode) burst.parentNode.removeChild(burst); }, 900);
}

function nextTurn() {
  state.current = (state.current + 1) % state.numPlayers;
  state.pendingMove = null;
  refreshLegalOverlays();
  updateTurnUI();
  var p = state.current;
  if (state.inMovePhase[p]) {
    if (!(state.cpu && p === state.cpuPlayerIndex)) {
      showHint('もちごま 0まい\nじぶん の いし を うごかそう! ✦', 1500);
    }
  }
  setTimeout(maybeRunCPU, 400);
}

/* =========================================================
   WIN / REACH DETECTION
   ========================================================= */
function checkWinAt(r, c, p, mark) {
  if (mark === undefined) mark = true;
  for (var d = 0; d < DIRS.length; d++) {
    var dr = DIRS[d][0], dc = DIRS[d][1];
    var count = 1;
    var line = [[r, c]];
    for (var k = 1; k < WIN_LEN; k++) {
      var nr = r + dr * k, nc = c + dc * k;
      if (!inBounds(nr, nc) || !state.board[nr][nc] || state.board[nr][nc].p !== p) break;
      count++; line.push([nr, nc]);
    }
    for (var k2 = 1; k2 < WIN_LEN; k2++) {
      var nr2 = r - dr * k2, nc2 = c - dc * k2;
      if (!inBounds(nr2, nc2) || !state.board[nr2][nc2] || state.board[nr2][nc2].p !== p) break;
      count++; line.push([nr2, nc2]);
    }
    if (count >= WIN_LEN) {
      if (mark) {
        for (var i = 0; i < line.length; i++) {
          boardEl.children[line[i][0] * BOARD_N + line[i][1]].classList.add('win');
        }
      }
      return true;
    }
  }
  return false;
}
function hasReach(p) {
  for (var r = 0; r < BOARD_N; r++) {
    for (var c = 0; c < BOARD_N; c++) {
      if (state.board[r][c]) continue;
      if (!isLegalPlacement(r, c)) continue;
      state.board[r][c] = { p: p };
      var wins = checkWinAt(r, c, p, false);
      state.board[r][c] = null;
      if (wins) return true;
    }
  }
  return false;
}

/* =========================================================
   END GAME
   ========================================================= */
function endGame(winner) {
  state.gameOver = true;
  var c = COLORS[state.colorIdx[winner]];
  winnerTileEl.innerHTML = tileSVG(state.colorIdx[winner]);
  var isCpu = (state.cpu && winner === state.cpuPlayerIndex);
  winTitle.textContent = isCpu ? 'まけちゃった…' : 'やったぁ！';
  winMsgEl.innerHTML = isCpu
    ? 'CPU (' + c.name + ') の しょうり'
    : 'プレイヤー' + (winner+1) + ' (' + c.name + ') の しょうり';
  winSubEl.innerHTML = c.label + ' が 5まい ならんだよ ✦✦✦';
  setTimeout(function () {
    winModal.classList.add('show');
    fireConfetti();
    fireBalloons();
  }, 800);
}
function closeModal() {
  winModal.classList.remove('show');
  confettiEl.innerHTML = '';
}
function fireConfetti() {
  confettiEl.innerHTML = '';
  var palette = ['#ff5cc4', '#66e860', '#3acdff', '#ffaa3a', '#c89cff', '#ffe65a', '#ff8e3a'];
  for (var i = 0; i < 110; i++) {
    var c = document.createElement('i');
    /* RULE 1: direct style writes (no CSS vars) */
    c.style.backgroundColor = palette[i % palette.length];
    c.style.background = palette[i % palette.length];
    c.style.left = (Math.random() * 100) + '%';
    c.style.animationName = 'fall-down';
    c.style.animationDuration = (1.6 + Math.random() * 1.8) + 's';
    c.style.animationTimingFunction = 'linear';
    c.style.animationFillMode = 'forwards';
    c.style.animationDelay = (Math.random() * 0.6) + 's';
    c.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
    confettiEl.appendChild(c);
  }
}
function fireBalloons() {
  var palette = [];
  for (var i = 0; i < state.colorIdx.length; i++) palette.push(COLORS[state.colorIdx[i]].main);
  for (var j = 0; j < 9; j++) {
    var b = document.createElement('i');
    b.className = 'balloon';
    b.style.backgroundColor = palette[j % palette.length];
    b.style.background = palette[j % palette.length];
    b.style.left = (5 + Math.random() * 90) + '%';
    b.style.animationName = 'rise-up';
    b.style.animationDuration = (3.2 + Math.random() * 2.5) + 's';
    b.style.animationTimingFunction = 'linear';
    b.style.animationFillMode = 'forwards';
    b.style.animationDelay = (Math.random() * 0.6) + 's';
    confettiEl.appendChild(b);
  }
}

/* === Hints === */
var hintTimer = null;
function showHint(text, dur) {
  if (dur === undefined) dur = 1200;
  hintEl.innerHTML = text.replace(/\n/g, '<br>');
  hintEl.classList.add('show');
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(function () { hintEl.classList.remove('show'); }, dur);
}
var reachTimer = null;
function showReachSplash() {
  reachSplashEl.classList.add('show');
  if (reachTimer) clearTimeout(reachTimer);
  reachTimer = setTimeout(function () { reachSplashEl.classList.remove('show'); }, 900);
}

/* =========================================================
   CPU AI
   ========================================================= */
function maybeRunCPU() {
  if (state.gameOver) return;
  if (!state.cpu) return;
  if (state.current !== state.cpuPlayerIndex) return;
  setTimeout(runCPU, 700);
}
function runCPU() {
  var p = state.cpuPlayerIndex;
  if (!state.inMovePhase[p]) {
    var mv = bestPlacement(p);
    if (mv) placeTile(p, mv[0], mv[1]);
  } else {
    var m = bestRelocation(p);
    if (m) moveTile(p, m[0], m[1], m[2], m[3]);
  }
}
function bestPlacement(p) {
  var best = null, bestScore = -Infinity;
  for (var r = 0; r < BOARD_N; r++) {
    for (var c = 0; c < BOARD_N; c++) {
      if (!isLegalPlacement(r, c)) continue;
      var s = scoreCell(r, c, p);
      if (s > bestScore) { bestScore = s; best = [r, c]; }
    }
  }
  return best;
}
function bestRelocation(p) {
  var bestMove = null, bestScore = -Infinity;
  var owns = [];
  for (var r = 0; r < BOARD_N; r++) {
    for (var c = 0; c < BOARD_N; c++) {
      if (state.board[r][c] && state.board[r][c].p === p) owns.push([r, c]);
    }
  }
  for (var i = 0; i < owns.length; i++) {
    var fr = owns[i][0], fc = owns[i][1];
    var saved = state.board[fr][fc];
    state.board[fr][fc] = null;
    for (var tr = 0; tr < BOARD_N; tr++) {
      for (var tc = 0; tc < BOARD_N; tc++) {
        if (!isLegalPlacement(tr, tc)) continue;
        if (tr === fr && tc === fc) continue;
        state.board[tr][tc] = { p: p };
        if (checkWinAt(tr, tc, p, false)) {
          state.board[tr][tc] = null;
          state.board[fr][fc] = saved;
          return [fr, fc, tr, tc];
        }
        var s = scoreCell(tr, tc, p) - 0.4 * neighborhoodValue(fr, fc, p);
        state.board[tr][tc] = null;
        if (s > bestScore) { bestScore = s; bestMove = [fr, fc, tr, tc]; }
      }
    }
    state.board[fr][fc] = saved;
  }
  return bestMove;
}
function neighborhoodValue(r, c, p) {
  var v = 0;
  for (var d = 0; d < DIRS.length; d++) {
    var dr = DIRS[d][0], dc = DIRS[d][1];
    var line = 0;
    for (var k = -4; k <= 4; k++) {
      if (k === 0) continue;
      var nr = r + dr * k, nc = c + dc * k;
      if (!inBounds(nr, nc)) continue;
      var t = state.board[nr][nc];
      if (t && t.p === p) line++;
    }
    v += line;
  }
  return v;
}
function scoreCell(r, c, me) {
  var myScore = lineScore(r, c, me);
  var blockScore = 0;
  for (var q = 0; q < state.numPlayers; q++) {
    if (q === me) continue;
    blockScore = Math.max(blockScore, lineScore(r, c, q) * 0.92);
  }
  var center = (BOARD_N - 1) / 2;
  var dist = Math.abs(r - center) + Math.abs(c - center);
  var centerBias = (BOARD_N - dist) * 0.6;
  return Math.max(myScore, blockScore) + centerBias + Math.random() * 0.5;
}
function lineScore(r, c, p) {
  var total = 0;
  for (var d = 0; d < DIRS.length; d++) {
    var dr = DIRS[d][0], dc = DIRS[d][1];
    var win = [];
    for (var k = -4; k <= 4; k++) {
      var nr = r + dr * k, nc = c + dc * k;
      if (!inBounds(nr, nc)) { win.push('#'); continue; }
      if (k === 0) { win.push('M'); continue; }
      var t = state.board[nr][nc];
      if (!t) win.push('.');
      else if (t.p === p) win.push('M');
      else win.push('O');
    }
    total += patternScore(win);
  }
  return total;
}
function patternScore(win) {
  var s = win.join('');
  if (s.indexOf('MMMMM') !== -1) return 1000000;
  if (s.indexOf('.MMMM.') !== -1) return 50000;
  if (/(\.MMMM[O#])|([O#]MMMM\.)/.test(s)) return 5000;
  if (s.indexOf('MMMM') !== -1) return 4500;
  if (s.indexOf('.MMM.') !== -1) return 1500;
  if (/(\.MMM[O#])|([O#]MMM\.)/.test(s)) return 600;
  if (s.indexOf('.MM.') !== -1) return 200;
  if (/(\.MM[O#])|([O#]MM\.)/.test(s)) return 80;
  if (s.indexOf('M') !== -1) return 10;
  return 0;
}

/* =========================================================
   Board fit (size in px set on element)
   ========================================================= */
function fitBoard() {
  if (!boardWrap) return;
  var contentEl = document.getElementById('content');
  if (!contentEl) return;
  var contentH = contentEl.clientHeight;
  var contentW = contentEl.clientWidth;
  /* leaving margins for topbar(game)/players/bottom safe area */
  var headerEstimate = 56 + 76 + 24; /* game-topbar + players + margins */
  var availH = contentH - headerEstimate;
  var availW = contentW - 32;
  var size = Math.min(availH, availW, 720);
  if (size < 200) size = Math.min(contentW - 32, contentH - 120);
  if (size < 160) size = 160;
  boardWrap.style.width = size + 'px';
  boardWrap.style.height = size + 'px';
}
window.addEventListener('resize', fitBoard);
</script>

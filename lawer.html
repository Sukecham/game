<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a14">
<title>ドンキー弁護士 — DONKEY ATTORNEY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Shippori+Mincho:wght@600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #0a0a14;
    --ink-2:      #141424;
    --ink-3:      #1f1f36;
    --parchment:  #e8dcc4;
    --oxblood:    #6b1a1a;
    --oxblood-lt: #8b2525;
    --gold:       #c9a54a;
    --gold-lt:    #e4c76a;
    --gold-dk:    #7a6020;
    --ivory:      #f3ead7;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none; -webkit-user-select: none;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden; position: fixed;
    background: var(--ink);
    overscroll-behavior: none;
    touch-action: none;
    color: var(--ivory);
    font-family: 'Shippori Mincho', 'Cormorant Garamond', 'Hiragino Mincho ProN', serif;
  }
  #app {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    background:
      radial-gradient(ellipse at top, #1a1a30 0%, transparent 55%),
      radial-gradient(ellipse at bottom, #120c1c 0%, transparent 50%),
      #0a0a14;
  }

/* ========== HUD ========== */
#hud {
padding: calc(var(–safe-top) + 10px) 16px 10px;
display: grid; grid-template-columns: 1fr auto 1fr;
align-items: center; gap: 12px;
background:
linear-gradient(180deg, rgba(201,165,74,0.08) 0%, rgba(10,10,20,0) 100%),
linear-gradient(180deg, #16162a 0%, #0a0a14 100%);
border-bottom: 1px solid rgba(201,165,74,0.35);
position: relative; z-index: 5;
}
#hud::after {
content: ‘’; position: absolute; left: 0; right: 0; bottom: -3px; height: 2px;
background: linear-gradient(90deg, transparent, var(–gold) 50%, transparent);
opacity: 0.4;
}
.hud-cell { min-width: 0; }
.hud-cell.right { text-align: right; }
.hud-cell.center { text-align: center; }
.hud-label {
font-family: ‘Cormorant Garamond’, serif;
color: var(–gold);
font-size: 9px; letter-spacing: 3px;
text-transform: uppercase;
opacity: 0.85;
}
.hud-value {
font-family: ‘JetBrains Mono’, monospace;
color: var(–ivory);
font-size: 18px; font-weight: 700;
letter-spacing: 1px; line-height: 1.1;
text-shadow: 0 1px 0 rgba(0,0,0,0.6);
}
.hud-title {
font-family: ‘Shippori Mincho’, serif;
font-weight: 800; font-size: 14px;
letter-spacing: 4px; color: var(–parchment);
line-height: 1;
}
.hud-sub {
font-family: ‘Cormorant Garamond’, serif;
font-style: italic; font-size: 9px;
letter-spacing: 2px; color: var(–gold);
margin-top: 2px; opacity: 0.8;
}

/* ========== GAME CANVAS ========== */
#stage {
flex: 1; position: relative; overflow: hidden;
background:
radial-gradient(ellipse 80% 50% at 50% 30%, rgba(107,26,26,0.15) 0%, transparent 70%),
linear-gradient(180deg, #1a1530 0%, #0c0a18 100%);
}
#stage::before {
content:’’; position:absolute; inset:0;
background-image:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.02) 0%, transparent 40%),
radial-gradient(circle at 80% 60%, rgba(201,165,74,0.03) 0%, transparent 40%);
pointer-events: none;
}
/* film grain */
#stage::after {
content: ‘’; position: absolute; inset: 0;
background-image: url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.9  0 0 0 0 0.85  0 0 0 0 0.7  0 0 0 0.12 0'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>”);
opacity: 0.45; mix-blend-mode: overlay;
pointer-events: none; z-index: 3;
}
canvas {
display: block;
width: 100%; height: 100%;
image-rendering: -webkit-optimize-contrast;
touch-action: none;
}

/* ========== OVERLAY ========== */
#overlay {
position: absolute; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background:
radial-gradient(ellipse at center, rgba(10,10,20,0.85) 0%, rgba(0,0,0,0.95) 100%);
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
z-index: 10; padding: 24px;
animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
#overlay.hidden { display: none; }
.seal {
width: 74px; height: 74px; border-radius: 50%;
border: 2px solid var(–gold);
display: flex; align-items: center; justify-content: center;
margin-bottom: 18px; position: relative;
background: radial-gradient(circle, rgba(201,165,74,0.18), transparent 70%);
box-shadow:
0 0 40px rgba(201,165,74,0.25),
inset 0 0 20px rgba(201,165,74,0.15);
}
.seal::before {
content:’’; position: absolute; inset: 4px;
border: 1px dashed var(–gold);
border-radius: 50%; opacity: 0.5;
}
.seal-icon {
font-family: ‘Shippori Mincho’, serif;
font-size: 28px; font-weight: 800;
color: var(–gold);
text-shadow: 0 0 10px rgba(201,165,74,0.6);
}
#overlay h1 {
font-family: ‘Shippori Mincho’, serif;
font-size: 38px; font-weight: 800;
color: var(–ivory);
letter-spacing: 8px;
text-shadow: 0 2px 20px rgba(201,165,74,0.3);
margin-bottom: 4px;
}
#overlay .subtitle {
font-family: ‘Cormorant Garamond’, serif;
font-style: italic; font-size: 11px;
color: var(–gold);
letter-spacing: 5px; margin-bottom: 28px;
}
.divider {
width: 60%; height: 1px; margin: 0 0 24px;
background: linear-gradient(90deg, transparent, var(–gold) 50%, transparent);
opacity: 0.5;
}
#overlay .message {
font-size: 15px; line-height: 1.9;
text-align: center; color: var(–parchment);
margin-bottom: 30px; letter-spacing: 1.5px;
max-width: 320px;
}
#overlay .message .accent {
color: var(–gold-lt); font-weight: 700;
}
#startBtn {
font-family: ‘Shippori Mincho’, serif;
padding: 16px 44px;
background: linear-gradient(180deg, var(–gold-lt) 0%, var(–gold) 50%, var(–gold-dk) 100%);
color: var(–ink);
border: 1px solid var(–gold-lt);
border-radius: 2px;
font-size: 15px; font-weight: 800;
letter-spacing: 8px;
box-shadow:
0 6px 24px rgba(201,165,74,0.4),
inset 0 1px 0 rgba(255,255,255,0.4),
inset 0 -2px 4px rgba(0,0,0,0.2);
cursor: pointer; position: relative;
transition: transform 0.08s;
}
#startBtn:active { transform: translateY(1px) scale(0.98); }
#startBtn::before, #startBtn::after {
content: ‘’; position: absolute; top: 50%; width: 14px; height: 1px;
background: var(–gold-dk);
}
#startBtn::before { left: 14px; }
#startBtn::after { right: 14px; }

/* ========== CONTROLS ========== */
#controls {
display: flex;
align-items: stretch;
gap: 14px;
padding: 10px 16px calc(var(–safe-bottom) + 12px);
background:
linear-gradient(0deg, #16162a 0%, #0a0a14 100%);
border-top: 1px solid rgba(201,165,74,0.35);
position: relative;
}
#controls::before {
content: ‘’; position: absolute; left: 0; right: 0; top: -3px; height: 2px;
background: linear-gradient(90deg, transparent, var(–gold) 50%, transparent);
opacity: 0.4;
}

/* — D-pad: proper 十字キー layout —
[ ⬆ ]
[◀]    [▶]
[ ⬇ ]
*/
#dpad {
flex: 1.5;
display: grid;
grid-template-columns: repeat(3, 1fr);
grid-template-rows: repeat(3, 1fr);
gap: 5px;
position: relative;
min-height: 168px;
}
/* Subtle brass halo under the cluster - visually unifies as one D-pad */
#dpad::before {
content: ‘’;
position: absolute;
inset: -2px 4px;
background:
radial-gradient(ellipse 70% 80% at 50% 50%, rgba(201,165,74,0.06) 0%, transparent 75%);
pointer-events: none;
border-radius: 20px;
}
/* Center hub dot — like a physical D-pad pivot */
#dpad::after {
content: ‘’;
position: absolute;
top: 50%; left: 50%;
width: 10px; height: 10px;
margin: -5px 0 0 -5px;
border-radius: 50%;
background: radial-gradient(circle, rgba(201,165,74,0.35), rgba(201,165,74,0));
pointer-events: none;
}
#upBtn    { grid-column: 2; grid-row: 1; }
#leftBtn  { grid-column: 1; grid-row: 2; }
#rightBtn { grid-column: 3; grid-row: 2; }
#downBtn  { grid-column: 2; grid-row: 3; }

.dir-btn {
font-size: 20px;
}
/* Direction buttons - shared cool tone */
#upBtn, #leftBtn, #rightBtn, #downBtn {
background: linear-gradient(180deg, #2a2e48 0%, #151828 100%);
}

.btn {
height: auto;
min-height: 56px;
border-radius: 14px;
background:
linear-gradient(180deg, #2a2a4a 0%, #181830 100%);
border: 1px solid rgba(201,165,74,0.25);
color: var(–parchment);
font-family: ‘Shippori Mincho’, serif;
font-size: 22px; font-weight: 700;
display: flex; align-items: center; justify-content: center;
box-shadow:
0 3px 10px rgba(0,0,0,0.5),
inset 0 1px 0 rgba(255,255,255,0.08),
inset 0 -2px 4px rgba(0,0,0,0.3);
transition: transform 0.05s, background 0.05s;
position: relative;
}
.btn-label {
position: absolute; bottom: 3px;
font-family: ‘Cormorant Garamond’, serif;
font-size: 8px; letter-spacing: 2px;
color: var(–gold); opacity: 0.6;
text-transform: uppercase;
}
.btn:active, .btn.pressed {
background: linear-gradient(180deg, var(–gold-lt) 0%, var(–gold) 100%);
color: var(–ink);
transform: translateY(1px);
box-shadow: inset 0 2px 6px rgba(0,0,0,0.25);
}
.btn:active .btn-label, .btn.pressed .btn-label {
color: var(–oxblood);
}
#jumpBtn {
flex: 1;
background: linear-gradient(180deg, #8b2525 0%, #4a1010 100%);
border-color: rgba(228,199,106,0.35);
color: var(–gold-lt);
font-size: 17px;
letter-spacing: 4px;
border-radius: 18px;
flex-direction: column;
gap: 2px;
}
#jumpBtn:active, #jumpBtn.pressed {
background: linear-gradient(180deg, var(–oxblood-lt) 0%, var(–oxblood) 100%);
color: var(–ivory);
}
#jumpBtn .btn-label {
position: static;
bottom: auto;
font-size: 9px;
letter-spacing: 3px;
color: var(–gold-lt);
opacity: 0.7;
}
#jumpBtn:active .btn-label, #jumpBtn.pressed .btn-label {
color: var(–ivory);
}

.toast {
position: absolute; top: 60%; left: 50%;
transform: translate(-50%, -50%);
font-family: ‘Shippori Mincho’, serif;
font-size: 48px; font-weight: 800;
color: var(–gold-lt); letter-spacing: 10px;
text-shadow:
0 0 20px rgba(201,165,74,0.8),
0 4px 0 var(–oxblood);
z-index: 8; pointer-events: none;
opacity: 0; animation: toast 1.2s ease forwards;
}
@keyframes toast {
0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
}
</style>

</head>
<body>
<div id="app">
  <header id="hud">
    <div class="hud-cell">
      <div class="hud-label">訴訟額</div>
      <div class="hud-value" id="score">0</div>
    </div>
    <div class="hud-cell center">
      <div class="hud-title">ドンキー弁護士</div>
      <div class="hud-sub"><span id="courtName">地方裁判所</span> · 第 <span id="level">1</span> 審</div>
    </div>
    <div class="hud-cell right">
      <div class="hud-label">残機</div>
      <div class="hud-value" id="lives">♥♥♥</div>
    </div>
  </header>

  <main id="stage">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div class="seal"><span class="seal-icon">法</span></div>
      <h1>ドンキー弁護士</h1>
      <div class="subtitle">DONKEY ATTORNEY AT LAW</div>
      <div class="divider"></div>
      <p class="message" id="msg">
        法廷最上階で立てこもる<span class="accent">コング弁護士</span>から<br>
        依頼人を救出せよ。<br><br>
        <span class="accent">十字キー</span>で移動・昇降、<br>
        <span class="accent">異議あり</span>で跳躍。<br>
        審を重ねるごとに難易度が上がる。
      </p>
      <button id="startBtn">出 廷</button>
    </div>
  </main>

  <nav id="controls">
    <div id="dpad" role="group" aria-label="方向キー">
      <button class="btn dir-btn" id="upBtn" aria-label="登る">⬆<span class="btn-label">登</span></button>
      <button class="btn dir-btn" id="leftBtn" aria-label="左">◀<span class="btn-label">左</span></button>
      <button class="btn dir-btn" id="rightBtn" aria-label="右">▶<span class="btn-label">右</span></button>
      <button class="btn dir-btn" id="downBtn" aria-label="降りる">⬇<span class="btn-label">降</span></button>
    </div>
    <button class="btn" id="jumpBtn" aria-label="跳躍">異議あり<span class="btn-label">Jump</span></button>
  </nav>
</div>

<script>
(() => {
'use strict';

// ========================================
//  SETUP
// ========================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Virtual coordinate system (fits portrait phone)
const VW = 360;
let VH = 640;   // computed from actual aspect
let W = 0, H = 0, scale = 1, dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  W = Math.max(320, r.width);
  H = Math.max(400, r.height);
  canvas.width  = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  scale = W / VW;
  VH = H / scale;
  if (state.platforms.length === 0) setupLevel();
  else rebuildLevelForSize();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 120));

// ========================================
//  COURT TYPES — each 審 has different kong, weapon, palette
// ========================================
const COURT_TYPES = [
  { // 第1審 — 地方裁判所
    id: 'lawyer',
    court: '地方裁判所',
    kongTitle: 'コング弁護士',
    kongSub: 'ATTORNEY',
    weapon: 'book',
    weaponName: '六法全書',
    throwMin: 1.8, throwMax: 3.0,
    rollBase: 75,
    accent: '#c9a54a',        // gold
    weaponColor: '#6b1a1a',   // oxblood
    bounces: false,
    preview: '法',
  },
  { // 第2審 — 高等裁判所
    id: 'prosecutor',
    court: '高等裁判所',
    kongTitle: 'コング検察官',
    kongSub: 'PROSECUTOR',
    weapon: 'document',
    weaponName: '起訴状',
    throwMin: 1.3, throwMax: 2.3,
    rollBase: 95,
    accent: '#b89038',
    weaponColor: '#2a2a40',
    bounces: false,
    preview: '訴',
  },
  { // 第3審 — 最高裁判所
    id: 'judge',
    court: '最高裁判所',
    kongTitle: 'コング裁判長',
    kongSub: 'CHIEF JUSTICE',
    weapon: 'gavel',
    weaponName: '大 木 槌',
    throwMin: 1.0, throwMax: 1.9,
    rollBase: 110,
    accent: '#a84040',
    weaponColor: '#5a3a1a',
    bounces: true,      // gavels bounce once!
    preview: '判',
  },
];
function currentType() {
  return COURT_TYPES[(state.level - 1) % COURT_TYPES.length];
}

// ========================================
//  DIFFICULTY — scales with level
//  - throwMul:  projectile throw interval multiplier (>1 = slower)
//  - rollMul:   projectile roll-speed multiplier (<1 = slower)
//  - hitInset:  pixels to shrink player hit-box by (larger = more forgiving)
// ========================================
function currentDifficulty() {
  const lv = state.level;
  if (lv === 1)  return { throwMul: 1.9, rollMul: 0.55, hitInset: 6, label: '初心者' };
  if (lv === 2)  return { throwMul: 1.3, rollMul: 0.80, hitInset: 5, label: '見習い' };
  if (lv === 3)  return { throwMul: 1.1, rollMul: 0.95, hitInset: 4, label: '一人前' };
  if (lv === 4)  return { throwMul: 1.0, rollMul: 1.05, hitInset: 3, label: '熟練' };
  if (lv === 5)  return { throwMul: 0.9, rollMul: 1.15, hitInset: 2, label: '凄腕' };
  if (lv === 6)  return { throwMul: 0.8, rollMul: 1.25, hitInset: 1, label: '達人' };
  return         { throwMul: 0.7, rollMul: 1.35, hitInset: 0, label: '神域' };
}

// ========================================
//  STATE
// ========================================
const state = {
  running: false,
  score: 0, lives: 3, level: 1,
  player: {
    x: 40, y: 0, vx: 0, vy: 0,
    w: 16, h: 24,
    onGround: false, onLadder: false,
    facing: 1, anim: 0,
    invuln: 0
  },
  kong:  { x: 0, y: 0, anim: 0, throwT: 0, armT: 0 },
  goal:  { x: 0, y: 0, anim: 0 },
  platforms: [], ladders: [], books: [],
  camShake: 0,
  particles: []
};

const input = { left:false, right:false, up:false, down:false, jump:false, jumpPress:false };

// ========================================
//  LEVEL
// ========================================
function setupLevel() {
  state.platforms = [];
  state.ladders = [];
  state.books = [];

  const floors = 5;
  const topReserve = 80;       // kong area
  const bottomReserve = 40;
  const playArea = VH - topReserve - bottomReserve;
  const gap = playArea / (floors - 1);

  for (let i = 0; i < floors; i++) {
    const baseY = VH - bottomReserve - i * gap;
    // Alternating slope so books zigzag downward
    // Even floors (incl. top at i=4): descends right → books roll right
    // Odd floors: descends left → books roll left
    const slope = (i % 2 === 0) ? 0.025 : -0.025;
    state.platforms.push({
      y: baseY,
      slope: slope,
      x0: 16,
      x1: VW - 16,
      index: i
    });
  }

  // Ladders alternate sides
  for (let i = 0; i < floors - 1; i++) {
    const side = (i % 2 === 0);
    const x = side ? (VW - 44) : 44;
    const top = state.platforms[i+1];
    const bot = state.platforms[i];
    const yTop = getPlatY(top, x);
    const yBot = getPlatY(bot, x);
    state.ladders.push({ x, yTop, yBot, w: 14 });
  }

  // Player at bottom-left
  const p0 = state.platforms[0];
  state.player.x = 36;
  state.player.y = getPlatY(p0, 44) - state.player.h;
  state.player.vx = state.player.vy = 0;
  state.player.invuln = 0;

  // Kong at top-left corner of top platform
  const topPlat = state.platforms[floors-1];
  state.kong.x = 28;
  state.kong.y = getPlatY(topPlat, 60) - 54;
  state.kong.throwT = 1.5;

  // Goal on top platform, right side
  state.goal.x = VW - 64;
  state.goal.y = getPlatY(topPlat, VW - 60) - 30;
}

function rebuildLevelForSize() {
  // Preserve level number, rebuild layout
  setupLevel();
}

function getPlatY(p, x) {
  const mid = (p.x0 + p.x1) / 2;
  return p.y + (x - mid) * p.slope;
}

// ========================================
//  UPDATE
// ========================================
function update(dt) {
  const p = state.player;

  // Ladder detection (is player within any ladder's column & vertical range?)
  let onLadder = null;
  for (const L of state.ladders) {
    const cx = p.x + p.w/2;
    if (cx > L.x - L.w/2 && cx < L.x + L.w/2 &&
        p.y + p.h > L.yTop - 8 && p.y < L.yBot + 8) {
      onLadder = L;
      break;
    }
  }

  // "Ladder top" detection — player is standing ON a platform that has a ladder
  // descending from it. Used when user presses DOWN while on ground.
  let ladderBelow = null;
  if (p.onGround && !p.onLadder) {
    for (const L of state.ladders) {
      const cx = p.x + p.w/2;
      if (cx > L.x - L.w/2 && cx < L.x + L.w/2 &&
          Math.abs((p.y + p.h) - L.yTop) < 6) {
        ladderBelow = L;
        break;
      }
    }
  }

  // Horizontal
  const speed = 85;
  if (input.left) { p.vx = -speed; p.facing = -1; }
  else if (input.right) { p.vx = speed; p.facing = 1; }
  else p.vx = 0;

  // Ladder up
  if (onLadder && input.up) {
    p.onLadder = true;
    p.vy = -70;
    p.x = onLadder.x - p.w/2;
    p.vx = 0;
    p.onGround = false;
  }
  // Ladder down (from ladder body)
  else if (onLadder && input.down) {
    p.onLadder = true;
    p.vy = 75;
    p.x = onLadder.x - p.w/2;
    p.vx = 0;
    p.onGround = false;
  }
  // Enter ladder from above (player standing on platform, pressing down)
  else if (ladderBelow && input.down) {
    p.onLadder = true;
    p.vy = 70;
    p.x = ladderBelow.x - p.w/2;
    p.y = ladderBelow.yTop - p.h + 2; // slip just below platform
    p.vx = 0;
    p.onGround = false;
  }
  // Hanging on ladder with no input → stay still
  else if (p.onLadder && !onLadder) {
    p.onLadder = false;
  } else if (p.onLadder && !input.up && !input.down) {
    p.vy = 0;
  }

  // Jump
  if (input.jumpPress && p.onGround && !p.onLadder) {
    p.vy = -230;
    p.onGround = false;
    spawnDust(p.x + p.w/2, p.y + p.h);
  }
  input.jumpPress = false;

  // Gravity
  if (!p.onLadder) {
    p.vy += 620 * dt;
    if (p.vy > 420) p.vy = 420;
  }

  // Integrate
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // World bounds
  if (p.x < 5) p.x = 5;
  if (p.x > VW - p.w - 5) p.x = VW - p.w - 5;
  if (p.y > VH) { hitPlayer(); return; }

  // Platform collision (only while falling or grounded)
  if (!p.onLadder && p.vy >= 0) {
    let landed = false;
    const cx = p.x + p.w/2;
    for (const pl of state.platforms) {
      if (cx < pl.x0 || cx > pl.x1) continue;
      const py = getPlatY(pl, cx);
      if (p.y + p.h >= py - 2 && p.y + p.h <= py + 10 + Math.abs(p.vy)*dt) {
        p.y = py - p.h;
        p.vy = 0;
        p.onGround = true;
        landed = true;
        break;
      }
    }
    if (!landed) p.onGround = false;
  } else if (p.onLadder) {
    p.onGround = false;
  }

  // Animate player
  if (p.onLadder) p.anim += dt * 6;
  else if (Math.abs(p.vx) > 0.1) p.anim += dt * 10;
  if (p.invuln > 0) p.invuln -= dt;

  // Kong animation + throwing
  const T = currentType();
  const D = currentDifficulty();
  state.kong.anim += dt;
  state.kong.armT = Math.max(0, state.kong.armT - dt * 3);
  state.kong.throwT -= dt;
  if (state.kong.throwT <= 0) {
    // Throw interval: difficulty multiplier slows it down for easy levels
    const base = T.throwMin + Math.random() * (T.throwMax - T.throwMin);
    state.kong.throwT = base * D.throwMul;
    state.kong.armT = 1.0;
    const topPlat = state.platforms[state.platforms.length - 1];
    state.books.push({
      x: state.kong.x + 32,
      y: getPlatY(topPlat, state.kong.x + 32) - 8,
      vx: 0, vy: 0,
      rot: 0,
      plat: topPlat,
      falling: false,
      lastPlatIdx: topPlat.index,
      type: T.weapon,
      bounced: false
    });
    state.camShake = 4;
  }

  // Update books/projectiles
  for (let i = state.books.length - 1; i >= 0; i--) {
    const b = state.books[i];
    b.rot += (b.vx + Math.sign(b.vx) * 30) * dt * 0.2;

    if (!b.falling && b.plat) {
      // === Rolling along a platform ===
      // Direction = down the slope
      const dir = b.plat.slope > 0 ? 1 : -1;
      b.vx = dir * T.rollBase * D.rollMul;
      b.x += b.vx * dt;
      b.y = getPlatY(b.plat, b.x) - 6;
      // Fall off edge: start falling when beyond the edge
      if (b.x <= b.plat.x0 || b.x >= b.plat.x1) {
        b.falling = true;
        b.lastPlatIdx = b.plat.index;
        b.plat = null;
        b.vy = 30;
        // Small horizontal carry-over, but capped so we don't fly off screen
        b.vx = dir * 35;
      }
    } else {
      // === Falling ===
      b.vy += 540 * dt;
      if (b.vy > 420) b.vy = 420;
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      // Keep projectile within play area so it can land on a platform below
      if (b.x < 18) { b.x = 18; b.vx = Math.abs(b.vx) * 0.3; }
      if (b.x > VW - 18) { b.x = VW - 18; b.vx = -Math.abs(b.vx) * 0.3; }

      // Check landing on any platform STRICTLY BELOW last one
      for (const pl of state.platforms) {
        if (pl.index >= b.lastPlatIdx) continue;
        if (b.x < pl.x0 || b.x > pl.x1) continue;
        const py = getPlatY(pl, b.x);
        // Landing window — must cross from above
        if (b.y + 2 >= py - 2 && b.y - b.vy*dt - 2 < py && b.vy > 0) {
          // Judge's gavel bounces ONCE on impact
          if (T.bounces && !b.bounced) {
            b.bounced = true;
            b.vy = -190;
            b.y = py - 8;
            b.vx = (b.plat ? b.plat : pl).slope > 0 ? 90 : -90;
            spawnDust(b.x, py);
            break;
          }
          // Land
          b.y = py - 6;
          b.vy = 0;
          b.vx = 0;
          b.plat = pl;
          b.lastPlatIdx = pl.index;
          b.falling = false;
          b.bounced = false;
          spawnDust(b.x, py);
          break;
        }
      }
    }

    // Off-screen cleanup (only bottom or far sides)
    if (b.y > VH + 20) {
      state.books.splice(i, 1);
      state.score += 15;
      updateHUD();
      continue;
    }

    // Player collision — shrink player hit-box by difficulty's hitInset
    //   Higher inset (easier) → smaller effective hit-box around the player's core.
    //   We also use the actual projectile footprint instead of point-collision.
    if (p.invuln <= 0) {
      const inset = D.hitInset;
      const pL = p.x + inset;
      const pR = p.x + p.w - inset;
      const pT = p.y + inset;
      const pB = p.y + p.h - inset;
      // Projectile half-extents (match visual sprite sizes)
      const bHW = b.type === 'gavel' ? 9 : b.type === 'document' ? 7 : 7;
      const bHH = b.type === 'document' ? 7 : 5;
      if (b.x + bHW > pL && b.x - bHW < pR &&
          b.y + bHH > pT && b.y - bHH < pB) {
        hitPlayer();
        state.books.splice(i, 1);
        continue;
      }
    }
  }

  // Goal reached?
  state.goal.anim += dt;
  if (Math.abs(p.x - state.goal.x) < 18 && Math.abs((p.y + p.h/2) - (state.goal.y + 15)) < 25) {
    winLevel();
  }

  // Particles
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const pt = state.particles[i];
    pt.life -= dt;
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.vy += 100 * dt;
    if (pt.life <= 0) state.particles.splice(i, 1);
  }

  // Camera shake decay
  if (state.camShake > 0) state.camShake = Math.max(0, state.camShake - dt * 30);
}

function spawnDust(x, y) {
  for (let i = 0; i < 4; i++) {
    state.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 50,
      vy: -Math.random() * 40,
      life: 0.4,
      maxLife: 0.4,
      color: 'rgba(201,165,74,0.5)'
    });
  }
}

function hitPlayer() {
  state.lives--;
  state.camShake = 10;
  updateHUD();
  const T = currentType();
  const cry = T.id === 'prosecutor' ? '有罪!' : T.id === 'judge' ? '判決!' : '異議あり!';
  showToast(cry);
  if (state.lives <= 0) return gameOver();
  const p0 = state.platforms[0];
  state.player.x = 36;
  state.player.y = getPlatY(p0, 44) - state.player.h;
  state.player.vx = state.player.vy = 0;
  state.player.invuln = 2;
}

function winLevel() {
  state.running = false;
  state.score += 500 + state.level * 100;
  state.level++;
  const nextT = currentType();
  showOverlay(
    '勝 訴',
    `依頼人の救出に成功。<br>判決により賠償金 <span class="accent">${state.score}</span> を獲得。<br><br>次なる法廷は<br><span class="accent">${nextT.court}</span> — 相手は<br><span class="accent">${nextT.kongTitle}</span>、<br>武器は<span class="accent">${nextT.weaponName}</span>だ。`,
    `第 ${state.level} 審 へ`,
    '勝'
  );
}

function gameOver() {
  state.running = false;
  const T = currentType();
  showOverlay(
    '敗 訴',
    `${T.weaponName}の重圧に屈した…<br>最終スコア <span class="accent">${state.score}</span><br><br>再び法廷に立つか?`,
    '再出廷',
    '敗'
  );
  state.score = 0; state.lives = 3; state.level = 1;
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('stage').appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ========================================
//  RENDER
// ========================================
function render() {
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Camera shake
  let sx = 0, sy = 0;
  if (state.camShake > 0) {
    sx = (Math.random() - 0.5) * state.camShake;
    sy = (Math.random() - 0.5) * state.camShake;
  }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(scale, scale);

  // Background: deep courtroom
  const bgGrad = ctx.createLinearGradient(0, 0, 0, VH);
  bgGrad.addColorStop(0, '#1a1530');
  bgGrad.addColorStop(1, '#08050f');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, VW, VH);

  // Decorative columns
  ctx.save();
  for (let i = 0; i < 5; i++) {
    const x = (i + 0.5) * VW / 5;
    const colGrad = ctx.createLinearGradient(x - 14, 0, x + 14, 0);
    colGrad.addColorStop(0, 'rgba(40,35,60,0)');
    colGrad.addColorStop(0.5, 'rgba(60,55,85,0.4)');
    colGrad.addColorStop(1, 'rgba(40,35,60,0)');
    ctx.fillStyle = colGrad;
    ctx.fillRect(x - 14, 0, 28, VH);
  }
  ctx.restore();

  // Scales of justice watermark
  ctx.save();
  ctx.globalAlpha = 0.07;
  ctx.translate(VW/2, VH * 0.45);
  drawScales(ctx, 100);
  ctx.restore();

  // Platforms
  for (const pl of state.platforms) {
    drawPlatform(pl);
  }

  // Ladders
  for (const L of state.ladders) {
    drawLadder(L);
  }

  // Particles
  for (const pt of state.particles) {
    const a = pt.life / pt.maxLife;
    ctx.fillStyle = pt.color.replace(/[\d.]+\)$/g, a.toFixed(2) + ')');
    ctx.fillRect(pt.x - 1, pt.y - 1, 2, 2);
  }

  // Books / documents / gavels
  for (const b of state.books) {
    drawProjectile(b.x, b.y, b.rot, b.type || 'book');
  }

  // Kong (type varies by court level)
  drawKong(state.kong.x, state.kong.y, state.kong.anim, state.kong.armT, currentType());

  // Goal (client)
  drawClient(state.goal.x, state.goal.y, state.goal.anim);

  // Player
  drawPlayer(state.player);

  ctx.restore();
  ctx.restore();
}

// ----- Kong dispatcher
function drawKong(x, y, t, armT, type) {
  if (type.id === 'prosecutor') drawProsecutorKong(x, y, t, armT);
  else if (type.id === 'judge') drawJudgeKong(x, y, t, armT);
  else drawLawyerKong(x, y, t, armT);
}

// ----- Projectile dispatcher
function drawProjectile(x, y, rot, type) {
  if (type === 'document') drawDocument(x, y, rot);
  else if (type === 'gavel') drawGavel(x, y, rot);
  else drawBook(x, y, rot);
}

// ----- platforms (wooden court floors)
function drawPlatform(pl) {
  const y0 = getPlatY(pl, pl.x0);
  const y1 = getPlatY(pl, pl.x1);
  const thick = 10;
  // shadow
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.moveTo(pl.x0, y0 + thick);
  ctx.lineTo(pl.x1, y1 + thick);
  ctx.lineTo(pl.x1 + 2, y1 + thick + 6);
  ctx.lineTo(pl.x0 + 2, y0 + thick + 6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Main slab
  const grad = ctx.createLinearGradient(0, 0, 0, thick);
  ctx.save();
  ctx.translate(0, 0);
  ctx.beginPath();
  ctx.moveTo(pl.x0, y0);
  ctx.lineTo(pl.x1, y1);
  ctx.lineTo(pl.x1, y1 + thick);
  ctx.lineTo(pl.x0, y0 + thick);
  ctx.closePath();
  const wood = ctx.createLinearGradient(0, (y0+y1)/2, 0, (y0+y1)/2 + thick);
  wood.addColorStop(0, '#5a3a20');
  wood.addColorStop(0.5, '#3a2010');
  wood.addColorStop(1, '#1f100a');
  ctx.fillStyle = wood;
  ctx.fill();

  // Wood grain lines
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 0.6;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(pl.x0, y0 + (thick * i/4));
    ctx.lineTo(pl.x1, y1 + (thick * i/4));
    ctx.stroke();
  }

  // Gold upper trim
  ctx.strokeStyle = '#c9a54a';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(pl.x0, y0);
  ctx.lineTo(pl.x1, y1);
  ctx.stroke();

  // Gold highlight glint
  ctx.strokeStyle = 'rgba(228,199,106,0.4)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(pl.x0, y0 + 1);
  ctx.lineTo(pl.x1, y1 + 1);
  ctx.stroke();
  ctx.restore();
}

// ----- ladders (brass courtroom ladders)
function drawLadder(L) {
  ctx.save();
  // shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(L.x - L.w/2 + 1, L.yTop);
  ctx.lineTo(L.x - L.w/2 + 1, L.yBot);
  ctx.stroke();

  // Rails
  const railGrad = ctx.createLinearGradient(L.x - L.w/2, 0, L.x + L.w/2, 0);
  railGrad.addColorStop(0, '#8a6c28');
  railGrad.addColorStop(0.5, '#e4c76a');
  railGrad.addColorStop(1, '#8a6c28');
  ctx.strokeStyle = railGrad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(L.x - L.w/2, L.yTop);
  ctx.lineTo(L.x - L.w/2, L.yBot);
  ctx.moveTo(L.x + L.w/2, L.yTop);
  ctx.lineTo(L.x + L.w/2, L.yBot);
  ctx.stroke();

  // Rungs
  ctx.strokeStyle = '#c9a54a';
  ctx.lineWidth = 1.4;
  const step = 9;
  for (let y = L.yTop + 5; y < L.yBot - 2; y += step) {
    ctx.beginPath();
    ctx.moveTo(L.x - L.w/2, y);
    ctx.lineTo(L.x + L.w/2, y);
    ctx.stroke();
  }
  ctx.restore();
}

// ----- law book projectile
function drawBook(x, y, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(-9, -6, 18, 12);

  // Cover
  const grad = ctx.createLinearGradient(0, -6, 0, 6);
  grad.addColorStop(0, '#8b2525');
  grad.addColorStop(0.5, '#6b1a1a');
  grad.addColorStop(1, '#3f0b0b');
  ctx.fillStyle = grad;
  ctx.fillRect(-8, -5, 16, 10);

  // Pages (side)
  ctx.fillStyle = '#e8dcc4';
  ctx.fillRect(-8, -1, 16, 2);

  // Gold lines
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(-8, -5, 16, 0.8);
  ctx.fillRect(-8, 4.2, 16, 0.8);
  ctx.fillRect(-7, -3, 14, 0.4);
  ctx.fillRect(-7, 2.6, 14, 0.4);

  // 六法 title
  ctx.fillStyle = '#e4c76a';
  ctx.font = 'bold 4.5px "Shippori Mincho", serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('六法', 0, 0);

  ctx.restore();
}

// ----- Indictment document (起訴状) - prosecutor's weapon
function drawDocument(x, y, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(-8, -8, 16, 16);

  // Paper stack (multiple sheets for depth)
  ctx.fillStyle = '#c8b890';
  ctx.fillRect(-7, -6.5, 14, 13);
  ctx.fillStyle = '#e8dcc4';
  ctx.fillRect(-7, -7, 14, 13);
  ctx.fillStyle = '#f5ead2';
  ctx.fillRect(-7, -7.5, 14, 13);

  // Top corner folded
  ctx.fillStyle = '#c8b890';
  ctx.beginPath();
  ctx.moveTo(4, -7.5); ctx.lineTo(7, -7.5);
  ctx.lineTo(7, -4.5);
  ctx.closePath(); ctx.fill();

  // Lines of text (horizontal strokes)
  ctx.fillStyle = '#1a1a2e';
  for (let i = 0; i < 5; i++) {
    const ly = -5 + i * 2.5;
    ctx.fillRect(-5, ly, 10 - (i===0?3:0), 0.5);
  }

  // Red hanko stamp (official seal)
  ctx.fillStyle = '#b81818';
  ctx.beginPath();
  ctx.arc(4.5, 4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d42020';
  ctx.lineWidth = 0.4;
  ctx.stroke();
  ctx.fillStyle = '#f5ead2';
  ctx.font = 'bold 2.4px "Shippori Mincho", serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('検', 4.5, 4);

  // Title: 起訴状
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 3.2px "Shippori Mincho", serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('起訴状', -1.5, -5.2);

  ctx.restore();
}

// ----- Gavel (木槌) - judge's weapon
function drawGavel(x, y, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, 6, 10, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Handle (wooden)
  const handleGrad = ctx.createLinearGradient(-9, 0, 0, 0);
  handleGrad.addColorStop(0, '#8b5a2b');
  handleGrad.addColorStop(0.5, '#c08040');
  handleGrad.addColorStop(1, '#6b3f1a');
  ctx.fillStyle = handleGrad;
  ctx.fillRect(-10, -1.8, 11, 3.6);

  // Handle grip ridges
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 0.3;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-9 + i*1.5, -1.8);
    ctx.lineTo(-9 + i*1.5, 1.8);
    ctx.stroke();
  }

  // Handle pommel (gold cap)
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(-11, -2.2, 1.5, 4.4);

  // Hammer head (dark wood)
  const headGrad = ctx.createLinearGradient(0, -5, 0, 5);
  headGrad.addColorStop(0, '#5a3a1a');
  headGrad.addColorStop(0.5, '#8b5a2b');
  headGrad.addColorStop(1, '#3a200a');
  ctx.fillStyle = headGrad;
  ctx.fillRect(1, -5, 10, 10);

  // Head gold bands
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(1, -5, 10, 0.8);
  ctx.fillRect(1, 4.2, 10, 0.8);
  ctx.fillRect(1, -0.4, 10, 0.8);

  // Head highlight
  ctx.fillStyle = 'rgba(255,220,160,0.25)';
  ctx.fillRect(2, -4, 8, 1.5);

  // Head edge bevel
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 0.4;
  ctx.strokeRect(1, -5, 10, 10);

  ctx.restore();
}

// ----- Lawyer Kong (the star of the show)
function drawLawyerKong(x, y, t, armT) {
  ctx.save();
  ctx.translate(x, y);
  const breath = Math.sin(t * 2) * 1.5;
  const throwPhase = armT; // 1 = just threw, 0 = neutral

  // ====== Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(28, 58, 26, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // ====== Legs (suit pants)
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.moveTo(8, 40); ctx.lineTo(20, 40);
  ctx.lineTo(22, 58); ctx.lineTo(6, 58);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(36, 40); ctx.lineTo(48, 40);
  ctx.lineTo(50, 58); ctx.lineTo(34, 58);
  ctx.closePath(); ctx.fill();
  // Polished shoes
  ctx.fillStyle = '#0a0a14';
  ctx.beginPath(); ctx.ellipse(12, 58, 10, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(42, 58, 10, 3.5, 0, 0, Math.PI*2); ctx.fill();
  // Shoe shine
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.ellipse(10, 57, 3, 1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(40, 57, 3, 1, 0, 0, Math.PI*2); ctx.fill();

  // ====== Torso - suit jacket (big barrel chest)
  ctx.fillStyle = '#13131f';
  ctx.beginPath();
  ctx.ellipse(28, 32 + breath, 26, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // ====== White dress shirt
  ctx.fillStyle = '#f3ead7';
  ctx.beginPath();
  ctx.moveTo(22, 22 + breath);
  ctx.lineTo(34, 22 + breath);
  ctx.lineTo(33, 44); ctx.lineTo(23, 44);

  // Shirt buttons

  ctx.beginPath(); ctx.arc(28, 32, 0.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(28, 38, 0.8, 0, Math.PI*2); ctx.fill();

  // ====== Lapels
  ctx.fillStyle = '#080810';

  ctx.beginPath();
  ctx.moveTo(38, 24 + breath); ctx.lineTo(34, 28 + breath); ctx.lineTo(39, 28 + breath);

  // Pocket square (red)
  ctx.fillStyle = '#8b2525';
  ctx.beginPath();
  ctx.moveTo(12, 34); ctx.lineTo(18, 32); ctx.lineTo(17, 38); ctx.lineTo(14, 39);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(13, 34, 0.8, 2);
  ctx.fillRect(15, 33, 0.8, 2);

  // ====== Red tie (silk with subtle sheen)
  ctx.fillStyle = '#3a0a0a';
  ctx.beginPath();
  ctx.moveTo(26, 20 + breath); ctx.lineTo(30, 20 + breath);
  ctx.lineTo(31, 25); ctx.lineTo(25, 25);
  ctx.closePath(); ctx.fill(); // knot shadow
  ctx.fillStyle = '#6b1a1a';
  ctx.beginPath();
  ctx.moveTo(25, 24); ctx.lineTo(31, 24);
  ctx.lineTo(33, 44); ctx.lineTo(28, 48); ctx.lineTo(23, 44);
  ctx.closePath(); ctx.fill();
  // Tie sheen
  ctx.fillStyle = 'rgba(255,100,100,0.2)';
  ctx.beginPath();
  ctx.moveTo(26, 26); ctx.lineTo(28, 26);
  ctx.lineTo(29, 42); ctx.lineTo(27, 44);
  ctx.closePath(); ctx.fill();
  // Tie knot
  ctx.fillStyle = '#4a1010';
  ctx.fillRect(24, 21 + breath, 8, 5);

  // Collar edges
  ctx.fillStyle = '#f3ead7';
  ctx.beginPath();
  ctx.moveTo(22, 22 + breath); ctx.lineTo(25, 20 + breath); ctx.lineTo(25, 26);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(34, 22 + breath); ctx.lineTo(31, 20 + breath); ctx.lineTo(31, 26);
  ctx.closePath(); ctx.fill();

  // ====== LEFT ARM (holding gavel/book) - on gorilla's right
  ctx.save();
  ctx.fillStyle = '#13131f';
  ctx.beginPath();
  ctx.ellipse(-4, 32 + breath, 10, 14, -0.15, 0, Math.PI*2);
  ctx.fill();
  // Cuff
  ctx.fillStyle = '#f3ead7';
  ctx.fillRect(-12, 42, 8, 3);
  // Cufflink
  ctx.fillStyle = '#c9a54a';
  ctx.beginPath(); ctx.arc(-5, 43.5, 1, 0, Math.PI*2); ctx.fill();
  // Hand (big brown gorilla hand)
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.ellipse(-11, 48, 8, 6, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.ellipse(-11, 47, 7, 5, 0.2, 0, Math.PI*2); ctx.fill();
  // Gavel in hand
  ctx.save();
  ctx.translate(-11, 48);
  ctx.rotate(0.4);
  ctx.fillStyle = '#5a3a20';
  ctx.fillRect(-1, 0, 1.5, 10);
  ctx.fillStyle = '#8a5a30';
  ctx.fillRect(-4, -2, 8, 4);
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(-4, -2, 8, 0.6);
  ctx.fillRect(-4, 1.4, 8, 0.6);
  ctx.restore();
  ctx.restore();

  // ====== RIGHT ARM (throwing) - animated
  ctx.save();
  const armAngle = -0.5 + throwPhase * -1.2; // winds up on throw
  const armY = 28 + breath - throwPhase * 6;
  ctx.translate(56, armY);
  ctx.rotate(armAngle);
  // Jacket arm
  ctx.fillStyle = '#13131f';
  ctx.beginPath();
  ctx.ellipse(0, 6, 9, 14, 0, 0, Math.PI*2);
  ctx.fill();
  // Cuff
  ctx.fillStyle = '#f3ead7';
  ctx.fillRect(-4, 16, 8, 3);
  ctx.fillStyle = '#c9a54a';
  ctx.beginPath(); ctx.arc(0, 17.5, 1, 0, Math.PI*2); ctx.fill();
  // Hand
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.arc(0, 22, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.arc(0, 21, 5, 0, Math.PI*2); ctx.fill();
  // Book in hand (about to throw, only if arm up)
  if (throwPhase > 0.3) {
    ctx.save();
    ctx.translate(0, 22);
    ctx.rotate(0.3);
    ctx.fillStyle = '#6b1a1a';
    ctx.fillRect(-5, -3, 10, 6);
    ctx.fillStyle = '#c9a54a';
    ctx.fillRect(-5, -3, 10, 0.6);
    ctx.fillRect(-5, 2.4, 10, 0.6);
    ctx.restore();
  }
  ctx.restore();

  // ====== HEAD (the big reveal)
  // Shadow behind head
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(29, 6, 22, 19, 0, 0, Math.PI*2);
  ctx.fill();

  // Skull (brown fur)
  const skullGrad = ctx.createRadialGradient(22, 0, 5, 28, 5, 24);
  skullGrad.addColorStop(0, '#7a4520');
  skullGrad.addColorStop(0.6, '#4a2810');
  skullGrad.addColorStop(1, '#2a1608');
  ctx.fillStyle = skullGrad;
  ctx.beginPath();
  ctx.ellipse(28, 5, 22, 19, 0, 0, Math.PI*2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.arc(6, 3, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(50, 3, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.arc(6, 3, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(50, 3, 3, 0, Math.PI*2); ctx.fill();

  // Face (lighter muzzle area)
  const faceGrad = ctx.createRadialGradient(28, 10, 2, 28, 10, 14);
  faceGrad.addColorStop(0, '#d89468');
  faceGrad.addColorStop(1, '#a0653a');
  ctx.fillStyle = faceGrad;
  ctx.beginPath();
  ctx.ellipse(28, 10, 14, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // Brow ridge (prominent)
  ctx.fillStyle = '#2a1608';
  ctx.beginPath();
  ctx.ellipse(28, 0, 18, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // ====== Angry eyebrows
  ctx.fillStyle = '#0a0a05';
  ctx.beginPath();
  ctx.moveTo(14, -2); ctx.lineTo(25, 3); ctx.lineTo(25, 5); ctx.lineTo(14, 1);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(42, -2); ctx.lineTo(31, 3); ctx.lineTo(31, 5); ctx.lineTo(42, 1);
  ctx.closePath(); ctx.fill();

  // ====== Glasses (round lawyer spectacles)
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(20, 7, 5.5, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(36, 7, 5.5, 0, Math.PI*2); ctx.stroke();
  // Bridge
  ctx.beginPath();
  ctx.moveTo(25.5, 7); ctx.lineTo(30.5, 7); ctx.stroke();
  // Temples
  ctx.beginPath();
  ctx.moveTo(15, 7); ctx.lineTo(11, 5); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(41, 7); ctx.lineTo(45, 5); ctx.stroke();

  // Lens (subtle tint)
  ctx.fillStyle = 'rgba(100,150,200,0.15)';
  ctx.beginPath(); ctx.arc(20, 7, 4.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(36, 7, 4.5, 0, Math.PI*2); ctx.fill();

  // Eyes (small intense)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(20, 7, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(36, 7, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0a05';
  const eyeLook = Math.sin(t * 1.3) * 0.8;
  ctx.beginPath(); ctx.arc(20 + eyeLook, 8, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(36 + eyeLook, 8, 1.2, 0, Math.PI*2); ctx.fill();
  // Lens reflections
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(18, 5, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(34, 5, 1, 0, Math.PI*2); ctx.fill();

  // Nose (big gorilla nose)
  ctx.fillStyle = '#1a0a05';
  ctx.beginPath();
  ctx.ellipse(28, 13, 5, 3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(26, 13, 1, 0, Math.PI*2);
  ctx.arc(30, 13, 1, 0, Math.PI*2);
  ctx.fill();

  // ====== Mouth (snarl showing teeth)
  ctx.fillStyle = '#1a0505';
  ctx.beginPath();
  ctx.ellipse(28, 19, 9, 3.5, 0, 0, Math.PI);
  ctx.fill();
  // Teeth
  ctx.fillStyle = '#f5f0e0';
  ctx.fillRect(23, 17, 2, 4);
  ctx.fillRect(26, 17, 2, 4);
  ctx.fillRect(29, 17, 2, 4);
  ctx.fillRect(32, 17, 2, 4);
  // Fangs
  ctx.fillStyle = '#f5f0e0';
  ctx.beginPath();
  ctx.moveTo(22, 17); ctx.lineTo(24, 17); ctx.lineTo(23, 22);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(32, 17); ctx.lineTo(34, 17); ctx.lineTo(33, 22);
  ctx.closePath(); ctx.fill();

  // Chin fur tuft
  ctx.fillStyle = '#2a1608';
  ctx.beginPath();
  ctx.ellipse(28, 24, 6, 2, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ================================================
//  PROSECUTOR KONG — black robe, purple tie, sharp
// ================================================
function drawProsecutorKong(x, y, t, armT) {
  ctx.save();
  ctx.translate(x, y);
  const breath = Math.sin(t * 2) * 1.2;
  const throwPhase = armT;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(28, 58, 28, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // ===== ROBE base (long black legal robe) =====
  ctx.fillStyle = '#0a0a14';
  ctx.beginPath();
  ctx.moveTo(2, 22 + breath);
  ctx.lineTo(54, 22 + breath);
  ctx.lineTo(58, 58);
  ctx.lineTo(-2, 58);
  ctx.closePath();
  ctx.fill();

  // Robe folds (vertical darker lines for drape)
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(14, 30 + breath); ctx.lineTo(12, 58);
  ctx.moveTo(28, 28 + breath); ctx.lineTo(28, 58);
  ctx.moveTo(42, 30 + breath); ctx.lineTo(44, 58);
  ctx.stroke();

  // Gold piping (prosecutor insignia on edges)
  ctx.strokeStyle = '#b89038';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(2, 22 + breath); ctx.lineTo(-2, 58);
  ctx.moveTo(54, 22 + breath); ctx.lineTo(58, 58);
  ctx.stroke();

  // ===== White clerical band at collar =====
  ctx.fillStyle = '#f3ead7';
  ctx.beginPath();
  ctx.moveTo(22, 20 + breath);
  ctx.lineTo(34, 20 + breath);
  ctx.lineTo(33, 28);
  ctx.lineTo(23, 28);
  ctx.closePath();
  ctx.fill();

  // Two bibs (like clerical/judicial)
  ctx.fillStyle = '#e8dcc4';
  ctx.fillRect(23, 21 + breath, 4, 7);
  ctx.fillRect(29, 21 + breath, 4, 7);
  ctx.strokeStyle = '#b0a078';
  ctx.lineWidth = 0.3;
  ctx.strokeRect(23, 21 + breath, 4, 7);
  ctx.strokeRect(29, 21 + breath, 4, 7);

  // Gold scales pin
  ctx.fillStyle = '#b89038';
  ctx.beginPath();
  ctx.arc(28, 32, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a2a2e';
  ctx.fillRect(27.5, 31, 1, 2);
  ctx.fillStyle = '#b89038';
  ctx.fillRect(25.5, 31.5, 5, 0.4);

  // ===== LEGS under robe barely visible =====
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(14, 54, 10, 4);
  ctx.fillRect(32, 54, 10, 4);
  // Shoes
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(18, 58, 8, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(38, 58, 8, 2.5, 0, 0, Math.PI*2); ctx.fill();

  // ===== LEFT ARM (holding indictment stack) =====
  ctx.save();
  ctx.fillStyle = '#0a0a14';
  ctx.beginPath();
  ctx.ellipse(-2, 34 + breath, 11, 16, -0.1, 0, Math.PI*2);
  ctx.fill();
  // Hand (big brown)
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.ellipse(-9, 48, 8, 6, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.ellipse(-9, 47, 7, 5, 0.2, 0, Math.PI*2); ctx.fill();
  // Stack of documents in hand
  ctx.fillStyle = '#e8dcc4';
  ctx.fillRect(-14, 44, 10, 8);
  ctx.fillStyle = '#f5ead2';
  ctx.fillRect(-14, 43, 10, 8);
  // Red hanko stamp
  ctx.fillStyle = '#b81818';
  ctx.beginPath(); ctx.arc(-6, 47, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ===== RIGHT ARM (throwing) =====
  ctx.save();
  const armAngle = -0.4 + throwPhase * -1.3;
  const armY = 26 + breath - throwPhase * 7;
  ctx.translate(56, armY);
  ctx.rotate(armAngle);
  ctx.fillStyle = '#0a0a14';
  ctx.beginPath();
  ctx.ellipse(0, 6, 10, 15, 0, 0, Math.PI*2);
  ctx.fill();
  // Hand
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.arc(0, 22, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.arc(0, 21, 5, 0, Math.PI*2); ctx.fill();
  // Document in hand (if throwing)
  if (throwPhase > 0.3) {
    ctx.save();
    ctx.translate(0, 22);
    ctx.rotate(0.2);
    ctx.fillStyle = '#f5ead2';
    ctx.fillRect(-5, -4, 10, 8);
    ctx.fillStyle = '#1a1a2e';
    for (let i = 0; i < 3; i++) ctx.fillRect(-4, -2 + i*2, 8, 0.4);
    ctx.fillStyle = '#b81818';
    ctx.beginPath(); ctx.arc(3, 2, 1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // ===== HEAD =====
  // Shadow behind head
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(29, 6, 22, 19, 0, 0, Math.PI*2);
  ctx.fill();

  // Skull
  const skullGrad = ctx.createRadialGradient(22, 0, 5, 28, 5, 24);
  skullGrad.addColorStop(0, '#6a3f1e');
  skullGrad.addColorStop(0.6, '#3a2010');
  skullGrad.addColorStop(1, '#1a0a06');
  ctx.fillStyle = skullGrad;
  ctx.beginPath();
  ctx.ellipse(28, 5, 22, 19, 0, 0, Math.PI*2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.arc(6, 3, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(50, 3, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.arc(6, 3, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(50, 3, 3, 0, Math.PI*2); ctx.fill();

  // Face
  const faceGrad = ctx.createRadialGradient(28, 10, 2, 28, 10, 14);
  faceGrad.addColorStop(0, '#c88550');
  faceGrad.addColorStop(1, '#8a5528');
  ctx.fillStyle = faceGrad;
  ctx.beginPath();
  ctx.ellipse(28, 10, 14, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // Brow ridge (prominent, scowling)
  ctx.fillStyle = '#1a0a06';
  ctx.beginPath();
  ctx.ellipse(28, 0, 18, 4.5, 0, 0, Math.PI*2);
  ctx.fill();

  // Sharp angry eyebrows (v-shape, very sharp)
  ctx.fillStyle = '#050302';
  ctx.beginPath();
  ctx.moveTo(12, -4); ctx.lineTo(25, 4); ctx.lineTo(24, 5); ctx.lineTo(11, -2);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(44, -4); ctx.lineTo(31, 4); ctx.lineTo(32, 5); ctx.lineTo(45, -2);
  ctx.closePath(); ctx.fill();

  // Square lawyer glasses (rectangular, severe)
  ctx.strokeStyle = '#0a0a14';
  ctx.lineWidth = 1.6;
  ctx.strokeRect(15, 3.5, 11, 7);
  ctx.strokeRect(30, 3.5, 11, 7);
  // Bridge
  ctx.beginPath();
  ctx.moveTo(26, 7); ctx.lineTo(30, 7); ctx.stroke();
  // Temples
  ctx.beginPath();
  ctx.moveTo(15, 5); ctx.lineTo(10, 4); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(41, 5); ctx.lineTo(46, 4); ctx.stroke();

  // Lens tint (darker, slightly opaque)
  ctx.fillStyle = 'rgba(50,80,120,0.22)';
  ctx.fillRect(16, 4.3, 9, 5.4);
  ctx.fillRect(31, 4.3, 9, 5.4);

  // Eyes (piercing)
  ctx.fillStyle = '#fff';
  ctx.fillRect(17, 5.5, 6, 3);
  ctx.fillRect(33, 5.5, 6, 3);
  ctx.fillStyle = '#1a0a05';
  const eyeLook = Math.sin(t * 1.3) * 0.6;
  ctx.fillRect(19 + eyeLook, 6, 2, 2);
  ctx.fillRect(35 + eyeLook, 6, 2, 2);
  // Glint
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillRect(19 + eyeLook, 6, 0.6, 0.6);
  ctx.fillRect(35 + eyeLook, 6, 0.6, 0.6);

  // Nose
  ctx.fillStyle = '#1a0a05';
  ctx.beginPath();
  ctx.ellipse(28, 13, 5, 3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(26, 13, 1, 0, Math.PI*2);
  ctx.arc(30, 13, 1, 0, Math.PI*2);
  ctx.fill();

  // Mouth: thin smirk (prosecutor is confident not yelling)
  ctx.strokeStyle = '#1a0505';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(22, 19);
  ctx.quadraticCurveTo(28, 17, 34, 19);
  ctx.stroke();
  // Tiny fang showing
  ctx.fillStyle = '#f5f0e0';
  ctx.beginPath();
  ctx.moveTo(23, 18.5); ctx.lineTo(25, 18.5); ctx.lineTo(24, 21);
  ctx.closePath(); ctx.fill();

  // Slicked-back hair (prosecutor's neat hair)
  ctx.fillStyle = '#050302';
  ctx.beginPath();
  ctx.ellipse(28, -8, 20, 6, 0, 0, Math.PI*2);
  ctx.fill();
  // Hair part
  ctx.strokeStyle = '#c88550';
  ctx.lineWidth = 0.4;
  ctx.beginPath();
  ctx.moveTo(24, -12); ctx.lineTo(22, -4);
  ctx.stroke();

  ctx.restore();
}

// ================================================
//  JUDGE KONG — grand robe, white jabot, giant gavel
// ================================================
function drawJudgeKong(x, y, t, armT) {
  ctx.save();
  ctx.translate(x, y);
  const breath = Math.sin(t * 2) * 1.3;
  const throwPhase = armT;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(28, 58, 32, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // ===== Grand robe (larger, fuller) =====
  // Dark base
  ctx.fillStyle = '#060610';
  ctx.beginPath();
  ctx.moveTo(-2, 22 + breath);
  ctx.lineTo(58, 22 + breath);
  ctx.lineTo(64, 58);
  ctx.lineTo(-8, 58);
  ctx.closePath();
  ctx.fill();

  // Robe velvet sheen
  ctx.fillStyle = 'rgba(60,20,30,0.3)';
  ctx.beginPath();
  ctx.moveTo(6, 26 + breath); ctx.lineTo(20, 26 + breath);
  ctx.lineTo(15, 58); ctx.lineTo(2, 58);
  ctx.closePath(); ctx.fill();

  // Folds
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 0.7;
  for (let i = 0; i < 5; i++) {
    const fx = 8 + i * 10;
    ctx.beginPath();
    ctx.moveTo(fx, 30 + breath); ctx.lineTo(fx + (i-2)*2, 58);
    ctx.stroke();
  }

  // Crimson collar trim (high-status judge)
  ctx.fillStyle = '#a84040';
  ctx.beginPath();
  ctx.moveTo(-2, 22 + breath); ctx.lineTo(14, 24 + breath);
  ctx.lineTo(14, 30); ctx.lineTo(-3, 28);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(58, 22 + breath); ctx.lineTo(42, 24 + breath);
  ctx.lineTo(42, 30); ctx.lineTo(59, 28);
  ctx.closePath(); ctx.fill();
  // Crimson stripe down front
  ctx.fillStyle = '#a84040';
  ctx.fillRect(22, 28, 12, 30);
  ctx.fillStyle = '#c04848';
  ctx.fillRect(22, 28, 1, 30);
  ctx.fillRect(33, 28, 1, 30);

  // ===== White Jabot (frilly collar) =====
  ctx.fillStyle = '#f3ead7';
  // Main jabot base
  ctx.beginPath();
  ctx.moveTo(22, 22 + breath); ctx.lineTo(34, 22 + breath);
  ctx.lineTo(36, 34); ctx.lineTo(28, 40); ctx.lineTo(20, 34);
  ctx.closePath();
  ctx.fill();
  // Frill layers
  ctx.fillStyle = '#e8dcc4';
  ctx.beginPath();
  ctx.moveTo(23, 26 + breath); ctx.lineTo(33, 26 + breath);
  ctx.lineTo(34, 30); ctx.lineTo(22, 30);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#f5ead2';
  ctx.beginPath();
  ctx.moveTo(24, 30); ctx.lineTo(32, 30);
  ctx.lineTo(33, 34); ctx.lineTo(23, 34);
  ctx.closePath(); ctx.fill();
  // Center ribbon
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(27, 22 + breath, 2, 14);

  // ===== Legs barely visible =====
  ctx.fillStyle = '#060610';
  ctx.fillRect(12, 54, 12, 4);
  ctx.fillRect(32, 54, 12, 4);
  // Shoes
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(18, 58, 9, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(38, 58, 9, 3, 0, 0, Math.PI*2); ctx.fill();

  // ===== LEFT ARM (holding book/law) =====
  ctx.save();
  ctx.fillStyle = '#060610';
  ctx.beginPath();
  ctx.ellipse(-4, 34 + breath, 11, 16, -0.1, 0, Math.PI*2);
  ctx.fill();
  // Hand
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.ellipse(-11, 48, 8, 6, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.ellipse(-11, 47, 7, 5, 0.2, 0, Math.PI*2); ctx.fill();
  // Hammer (small, in non-throwing hand)
  ctx.save();
  ctx.translate(-11, 48);
  ctx.rotate(-0.3);
  ctx.fillStyle = '#6b3f1a';
  ctx.fillRect(-2, 0, 2, 10);
  ctx.fillStyle = '#8b5a2b';
  ctx.fillRect(-5, -3, 10, 5);
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(-5, -3, 10, 0.8);
  ctx.fillRect(-5, 1.2, 10, 0.8);
  ctx.restore();
  ctx.restore();

  // ===== RIGHT ARM (throwing the GIANT gavel) =====
  ctx.save();
  const armAngle = -0.5 + throwPhase * -1.4;
  const armY = 26 + breath - throwPhase * 8;
  ctx.translate(56, armY);
  ctx.rotate(armAngle);
  ctx.fillStyle = '#060610';
  ctx.beginPath();
  ctx.ellipse(0, 6, 11, 16, 0, 0, Math.PI*2);
  ctx.fill();
  // Hand
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.arc(0, 24, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.arc(0, 23, 6, 0, Math.PI*2); ctx.fill();
  // Big gavel head in hand
  if (throwPhase > 0.3) {
    ctx.save();
    ctx.translate(0, 24);
    ctx.rotate(0.5);
    // Handle
    ctx.fillStyle = '#6b3f1a';
    ctx.fillRect(-2, -2, 14, 4);
    // Head
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(10, -5, 10, 10);
    ctx.fillStyle = '#c9a54a';
    ctx.fillRect(10, -5, 10, 0.8);
    ctx.fillRect(10, 4.2, 10, 0.8);
    ctx.restore();
  }
  ctx.restore();

  // ===== HEAD =====
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.ellipse(29, 6, 23, 20, 0, 0, Math.PI*2);
  ctx.fill();

  // Skull (older, grayer)
  const skullGrad = ctx.createRadialGradient(22, 0, 5, 28, 5, 25);
  skullGrad.addColorStop(0, '#7a5a40');
  skullGrad.addColorStop(0.6, '#4a3020');
  skullGrad.addColorStop(1, '#1a0a06');
  ctx.fillStyle = skullGrad;
  ctx.beginPath();
  ctx.ellipse(28, 5, 22, 19, 0, 0, Math.PI*2);
  ctx.fill();

  // Gray streaks at temples (distinguished)
  ctx.fillStyle = 'rgba(220,220,220,0.4)';
  ctx.beginPath();
  ctx.ellipse(10, 0, 5, 6, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(46, 0, 5, 6, -0.3, 0, Math.PI*2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#3a1f0c';
  ctx.beginPath(); ctx.arc(6, 3, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(50, 3, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3318';
  ctx.beginPath(); ctx.arc(6, 3, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(50, 3, 3, 0, Math.PI*2); ctx.fill();

  // Face
  const faceGrad = ctx.createRadialGradient(28, 10, 2, 28, 10, 14);
  faceGrad.addColorStop(0, '#d89468');
  faceGrad.addColorStop(1, '#9a6538');
  ctx.fillStyle = faceGrad;
  ctx.beginPath();
  ctx.ellipse(28, 10, 14, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // Deep wrinkles (old wise judge)
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(14, 6); ctx.lineTo(20, 5); // forehead lines
  ctx.moveTo(36, 5); ctx.lineTo(42, 6);
  ctx.moveTo(15, 13); ctx.lineTo(20, 13);
  ctx.moveTo(36, 13); ctx.lineTo(41, 13);
  ctx.stroke();

  // Brow ridge
  ctx.fillStyle = '#1a0a06';
  ctx.beginPath();
  ctx.ellipse(28, 0, 19, 4.5, 0, 0, Math.PI*2);
  ctx.fill();

  // BIG bushy white eyebrows (judge hallmark!)
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath();
  ctx.ellipse(17, 2, 7, 2.5, -0.25, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(39, 2, 7, 2.5, 0.25, 0, Math.PI*2);
  ctx.fill();
  // Darker underside
  ctx.fillStyle = '#a09a88';
  ctx.beginPath();
  ctx.ellipse(17, 3.5, 6, 1, -0.25, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(39, 3.5, 6, 1, 0.25, 0, Math.PI*2);
  ctx.fill();

  // Half-moon spectacles (low on nose)
  ctx.strokeStyle = '#c9a54a';
  ctx.lineWidth = 1.3;
  // Left lens (half circle)
  ctx.beginPath();
  ctx.arc(20, 9, 5, 0, Math.PI);
  ctx.closePath();
  ctx.stroke();
  // Right lens
  ctx.beginPath();
  ctx.arc(36, 9, 5, 0, Math.PI);
  ctx.closePath();
  ctx.stroke();
  // Bridge
  ctx.beginPath();
  ctx.moveTo(25, 9); ctx.lineTo(31, 9);
  ctx.stroke();
  // Temple
  ctx.beginPath();
  ctx.moveTo(15, 9); ctx.lineTo(11, 7);
  ctx.moveTo(41, 9); ctx.lineTo(45, 7);
  ctx.stroke();

  // Lens (transparent, subtle tint)
  ctx.fillStyle = 'rgba(200,180,100,0.12)';
  ctx.beginPath(); ctx.arc(20, 9, 4.5, 0, Math.PI); ctx.fill();
  ctx.beginPath(); ctx.arc(36, 9, 4.5, 0, Math.PI); ctx.fill();

  // Eyes (stern, looking down over glasses)
  ctx.fillStyle = '#1a0a05';
  ctx.beginPath();
  ctx.ellipse(20, 7, 1.8, 1.2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(36, 7, 1.8, 1.2, 0, 0, Math.PI*2);
  ctx.fill();

  // Nose (big, wise)
  ctx.fillStyle = '#1a0a05';
  ctx.beginPath();
  ctx.ellipse(28, 14, 5.5, 3.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(26, 14, 1, 0, Math.PI*2);
  ctx.arc(30, 14, 1, 0, Math.PI*2);
  ctx.fill();

  // Stern flat mouth (serious judge)
  ctx.fillStyle = '#1a0505';
  ctx.fillRect(22, 19, 12, 1.5);
  // Beard (white, distinguished)
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath();
  ctx.moveTo(20, 21); ctx.lineTo(36, 21);
  ctx.quadraticCurveTo(34, 29, 28, 30);
  ctx.quadraticCurveTo(22, 29, 20, 21);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c8c0b0';
  ctx.beginPath();
  ctx.ellipse(28, 27, 4, 1, 0, 0, Math.PI*2); ctx.fill();

  // Mustache
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath();
  ctx.moveTo(22, 18); ctx.quadraticCurveTo(28, 22, 34, 18);
  ctx.quadraticCurveTo(28, 20, 22, 18);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}


function drawPlayer(p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y);
  if (p.invuln > 0 && Math.floor(p.invuln * 10) % 2) ctx.globalAlpha = 0.5;
  ctx.scale(p.facing, 1);
  const walk = Math.sin(p.anim) * 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, p.h, 8, 2, 0, 0, Math.PI*2);
  ctx.fill();

  // Legs (charcoal pants)
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-5, 16, 4, 8 + walk);
  ctx.fillRect(1, 16, 4, 8 - walk);
  // Shoes
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(-6, 22 + walk, 5, 2);
  ctx.fillRect(1, 22 - walk, 5, 2);

  // Body (navy suit)
  ctx.fillStyle = '#1f2540';
  ctx.beginPath();
  ctx.moveTo(-7, 7); ctx.lineTo(7, 7);
  ctx.lineTo(6, 18); ctx.lineTo(-6, 18);
  ctx.closePath(); ctx.fill();

  // Lapels
  ctx.fillStyle = '#141a30';
  ctx.beginPath();
  ctx.moveTo(-7, 7); ctx.lineTo(-2, 9);
  ctx.lineTo(-3, 16); ctx.lineTo(-6, 16);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(7, 7); ctx.lineTo(2, 9);
  ctx.lineTo(3, 16); ctx.lineTo(6, 16);
  ctx.closePath(); ctx.fill();

  // White shirt
  ctx.fillStyle = '#f3ead7';
  ctx.fillRect(-2, 9, 4, 8);

  // Blue tie
  ctx.fillStyle = '#1a4a7a';
  ctx.beginPath();
  ctx.moveTo(-1.5, 8); ctx.lineTo(1.5, 8);
  ctx.lineTo(2, 12); ctx.lineTo(0, 17); ctx.lineTo(-2, 12);
  ctx.closePath(); ctx.fill();

  // Arms
  ctx.fillStyle = '#1f2540';
  ctx.fillRect(-9, 8, 3, 8);
  ctx.fillRect(6, 8, 3, 8);
  // Hands
  ctx.fillStyle = '#e8c6a0';
  ctx.fillRect(-9, 15, 3, 2);
  ctx.fillRect(6, 15, 3, 2);

  // Briefcase in right hand
  ctx.fillStyle = '#3a2510';
  ctx.fillRect(6, 16, 5, 4);
  ctx.strokeStyle = '#c9a54a';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(6, 16, 5, 4);
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(8, 15.5, 1, 0.8);

  // Head
  ctx.fillStyle = '#e8c6a0';
  ctx.beginPath();
  ctx.arc(0, 2, 5.5, 0, Math.PI*2);
  ctx.fill();

  // Hair (neat)
  ctx.fillStyle = '#1a0a05';
  ctx.beginPath();
  ctx.arc(0, -1, 5.5, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-5.5, -1, 11, 2);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(-2.5, 2, 1, 1.5);
  ctx.fillRect(1.5, 2, 1, 1.5);

  // Mouth (determined)
  ctx.strokeStyle = '#5a2a2a';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-1, 5); ctx.lineTo(1, 5);
  ctx.stroke();

  ctx.restore();
}

// ----- Client (goal)
function drawClient(x, y, t) {
  ctx.save();
  ctx.translate(x, y);
  const bob = Math.sin(t * 2) * 1;
  ctx.translate(0, bob);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, 30, 10, 2, 0, 0, Math.PI*2); ctx.fill();

  // Help bubble
  const blink = Math.sin(t * 4);
  if (blink > 0) {
    ctx.fillStyle = '#f3ead7';
    ctx.strokeStyle = '#c9a54a';
    ctx.lineWidth = 0.6;
    const bw = 26, bh = 12;
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(-bw/2, -18, bw, bh, 3);
    } else {
      ctx.rect(-bw/2, -18, bw, bh);
    }
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#6b1a1a';
    ctx.font = 'bold 7px "Shippori Mincho", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('助けて!', 0, -12);
  }

  // Skirt
  ctx.fillStyle = '#2a1f40';
  ctx.beginPath();
  ctx.moveTo(-6, 15); ctx.lineTo(6, 15);
  ctx.lineTo(8, 28); ctx.lineTo(-8, 28);
  ctx.closePath(); ctx.fill();
  // Heels
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(-7, 28, 5, 2);
  ctx.fillRect(2, 28, 5, 2);

  // Blouse (cream)
  ctx.fillStyle = '#f3ead7';
  ctx.beginPath();
  ctx.moveTo(-7, 5); ctx.lineTo(7, 5);
  ctx.lineTo(6, 17); ctx.lineTo(-6, 17);
  ctx.closePath(); ctx.fill();

  // Arms raised
  ctx.fillStyle = '#f3ead7';
  ctx.save();
  ctx.translate(-7, 6);
  ctx.rotate(-0.6 + Math.sin(t*3)*0.1);
  ctx.fillRect(-1, 0, 3, 9);
  ctx.restore();
  ctx.save();
  ctx.translate(7, 6);
  ctx.rotate(0.6 + Math.sin(t*3 + 0.5)*0.1);
  ctx.fillRect(-2, 0, 3, 9);
  ctx.restore();

  // Head
  ctx.fillStyle = '#f0d0a8';
  ctx.beginPath();
  ctx.arc(0, 0, 5.5, 0, Math.PI*2); ctx.fill();

  // Long hair
  ctx.fillStyle = '#3a1a0a';
  ctx.beginPath();
  ctx.arc(0, -1.5, 6.5, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-6.5, -1.5, 2.5, 9);
  ctx.fillRect(4, -1.5, 2.5, 9);

  // Eyes (big, worried)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-2, 1, 1.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, 1, 1.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0a05';
  ctx.beginPath(); ctx.arc(-2, 1, 0.7, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, 1, 0.7, 0, Math.PI*2); ctx.fill();

  // Mouth
  ctx.fillStyle = '#8b2525';
  ctx.beginPath();
  ctx.ellipse(0, 4, 1.2, 1.5, 0, 0, Math.PI*2); ctx.fill();

  // Necklace (gold)
  ctx.strokeStyle = '#c9a54a';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(0, 6, 3, 0, Math.PI);
  ctx.stroke();
  ctx.fillStyle = '#e4c76a';
  ctx.beginPath(); ctx.arc(0, 9, 1, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ----- Scales of justice watermark
function drawScales(ctx, size) {
  ctx.strokeStyle = '#c9a54a';
  ctx.lineWidth = 2;
  // Post
  ctx.beginPath();
  ctx.moveTo(0, -size/2); ctx.lineTo(0, size/2);
  ctx.stroke();
  // Crossbar
  ctx.beginPath();
  ctx.moveTo(-size/2, -size/3);
  ctx.lineTo(size/2, -size/3);
  ctx.stroke();
  // Pans
  ctx.beginPath();
  ctx.arc(-size/2, -size/3 + 15, 12, 0, Math.PI);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(size/2, -size/3 + 15, 12, 0, Math.PI);
  ctx.stroke();
  // Chains
  ctx.beginPath();
  ctx.moveTo(-size/2, -size/3); ctx.lineTo(-size/2, -size/3 + 15);
  ctx.moveTo(size/2, -size/3); ctx.lineTo(size/2, -size/3 + 15);
  ctx.stroke();
  // Base
  ctx.fillStyle = '#c9a54a';
  ctx.fillRect(-15, size/2 - 3, 30, 6);
}

// ========================================
//  UI
// ========================================
function updateHUD() {
  document.getElementById('score').textContent = String(state.score).padStart(5, '0');
  document.getElementById('lives').textContent = '♥'.repeat(Math.max(0, state.lives)) + '♡'.repeat(Math.max(0, 3 - state.lives));
  document.getElementById('level').textContent = state.level;
  const T = currentType();
  const D = currentDifficulty();
  const courtEl = document.getElementById('courtName');
  if (courtEl) courtEl.textContent = T.court + ' · ' + D.label;
}

function showOverlay(title, msg, btn, icon) {
  const o = document.getElementById('overlay');
  o.classList.remove('hidden');
  o.querySelector('h1').textContent = title;
  o.querySelector('.seal-icon').textContent = icon || '法';
  document.getElementById('msg').innerHTML = msg;
  document.getElementById('startBtn').textContent = btn;
}

function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

function startGame() {
  setupLevel();
  state.running = true;
  updateHUD();
  hideOverlay();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('startBtn').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); }, {passive: false});

// ========================================
//  CONTROLS
// ========================================
function bind(id, key) {
  const el = document.getElementById(id);
  const on = (e) => {
    if (e.cancelable) e.preventDefault();
    input[key] = true;
    if (key === 'jump') input.jumpPress = true;
    el.classList.add('pressed');
  };
  const off = (e) => {
    if (e && e.cancelable) e.preventDefault();
    input[key] = false;
    el.classList.remove('pressed');
  };
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('touchend', off, { passive: false });
  el.addEventListener('touchcancel', off, { passive: false });
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bind('leftBtn', 'left');
bind('rightBtn', 'right');
bind('upBtn', 'up');
bind('downBtn', 'down');
bind('jumpBtn', 'jump');

// Keyboard for desktop testing
window.addEventListener('keydown', (e) => {
  if (['ArrowLeft','a','A'].includes(e.key)) input.left = true;
  if (['ArrowRight','d','D'].includes(e.key)) input.right = true;
  if (['ArrowUp','w','W'].includes(e.key)) input.up = true;
  if (['ArrowDown','s','S'].includes(e.key)) input.down = true;
  if (e.key === ' ' || e.key === 'Enter') {
    if (!input.jump) input.jumpPress = true;
    input.jump = true;
  }
});
window.addEventListener('keyup', (e) => {
  if (['ArrowLeft','a','A'].includes(e.key)) input.left = false;
  if (['ArrowRight','d','D'].includes(e.key)) input.right = false;
  if (['ArrowUp','w','W'].includes(e.key)) input.up = false;
  if (['ArrowDown','s','S'].includes(e.key)) input.down = false;
  if (e.key === ' ' || e.key === 'Enter') input.jump = false;
});

// Prevent scroll/pinch on iOS
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
document.addEventListener('dblclick', (e) => e.preventDefault());

// ========================================
//  MAIN LOOP
// ========================================
let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.033);
  last = now;
  if (state.running) update(dt);
  render();
  requestAnimationFrame(loop);
}
resize();
updateHUD();
requestAnimationFrame(loop);

})();
</script>

function doAttack(){if(!S.enemy||S.anim)return;S.anim=true;snd('attack');var stats=getStats(),job=getJob(),sp=job.special,spBonus=getSpBonus();var dmg=Math.max(1,stats.atk-Math.floor(S.enemy.def/((sp==='pierce'||sp==='all')?3:2)));var isCrit=Math.random()<((sp==='crit'||sp==='all')?spBonus/100:0.05);if(isCrit){dmg=Math.floor(dmg*1.5);snd('critical')}var bonus=Math.random()<((sp==='double'||sp==='all')?spBonus/100:0)?Math.floor(dmg*0.5):0;var eDmg=Math.max(1,S.enemy.atk-Math.floor(stats.def/2));var reflect=Math.floor(eDmg*((sp==='counter'||sp==='all')?spBonus/100:0));var heal=Math.floor(stats.mhp*((sp==='heal'||sp==='all')?spBonus/200:0));var newEHp=Math.max(0,S.enemy.hp-dmg-bonus-reflect);var newHp=Math.min(stats.mhp,Math.max(0,S.hp-eDmg+heal));S.log.push((isCrit?'💥クリティカル! ':'')+dmg+(bonus>0?'+'+bonus:'')+'ダメージ！');if(reflect>0)S.log.push('🔄反射'+reflect+'！');if(newEHp<=0){snd('win');var rank=S.enemy.drop[Math.floor(Math.random()*S.enemy.drop.length)];if(Math.random()<((sp==='shell'||sp==='all')?spBonus/100:0))rank=Math.min(5,rank+1);var expRate=(sp==='exp'||sp==='all')?1+spBonus/100:1;var expG=Math.floor(S.enemy.exp*expRate);var nExp=S.player.exp+expG,nLv=S.player.level;while(nExp>=expNext(nLv)){nExp-=expNext(nLv);nLv++}S.log.push('🎉勝利！ '+SHELLS[rank].icon+SHELLS[rank].name+'+1 💫'+expG+'EXP');if(nLv>S.player.level){S.log.push('⬆️ Lv'+nLv+'にアップ！');snd('levelup')}S.player.shells[rank]++;S.player.exp=nExp;S.player.level=nLv;S.hp=newHp;S.enemy=null}else{setTimeout(function(){snd('hit')},200);S.log.push(S.enemy.name+'の反撃！ '+eDmg+'ダメージ！'+(heal>0?' 💚+'+heal:''));if(newHp<=0){S.log.push('💀敗北...');snd('lose');S.hp=0;S.enemy=null}else{S.enemy.hp=newEHp;S.hp=newHp}}S.log=S.log.slice(-5);render();setTimeout(function(){S.anim=false;render()},200)}

    <script>
        let audioCtx = null, soundOn = true;
        
        function initAudio() { 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }

        function playSound(t) {
            if (!soundOn || !audioCtx) return;
            try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (t === 'select') { 
                    o.frequency.setValueAtTime(800, now); 
                    o.frequency.exponentialRampToValueAtTime(1200, now + 0.1); 
                    g.gain.setValueAtTime(0.1, now); 
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.1); 
                    o.start(); o.stop(now + 0.1); 
                }
                else if (t === 'bet') { 
                    o.frequency.setValueAtTime(523, now); 
                    o.frequency.setValueAtTime(659, now + 0.1); 
                    o.frequency.setValueAtTime(784, now + 0.2); 
                    g.gain.setValueAtTime(0.15, now); 
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.3); 
                    o.start(); o.stop(now + 0.3); 
                }
                else if (t === 'fanfare') { 
                    [523, 659, 784, 1047, 784, 1047, 1319].forEach((f, i) => { 
                        const os = audioCtx.createOscillator(), gs = audioCtx.createGain(); 
                        os.connect(gs); gs.connect(audioCtx.destination); 
                        os.type = 'triangle';
                        os.frequency.setValueAtTime(f, now + i * 0.12); 
                        gs.gain.setValueAtTime(0.12, now + i * 0.12); 
                        gs.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.15); 
                        os.start(now + i * 0.12); os.stop(now + i * 0.12 + 0.15); 
                    }); 
                }
                else if (t === 'gallop') { 
                    const n = audioCtx.createBufferSource();
                    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
                    const d = buf.getChannelData(0); 
                    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5; 
                    n.buffer = buf; 
                    const ng = audioCtx.createGain(); 
                    n.connect(ng); ng.connect(audioCtx.destination); 
                    const f = audioCtx.createBiquadFilter();
                    f.type = 'lowpass'; f.frequency.value = 300;
                    n.disconnect(); n.connect(f); f.connect(ng);
                    ng.gain.setValueAtTime(0.2, now); 
                    ng.gain.exponentialRampToValueAtTime(0.01, now + 0.05); 
                    n.start(); 
                }
                else if (t === 'finish') { 
                    o.type = 'square'; 
                    o.frequency.setValueAtTime(880, now); 
                    g.gain.setValueAtTime(0.1, now); 
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.4); 
                    o.start(); o.stop(now + 0.4); 
                }
                else if (t === 'win') { 
                    [523, 659, 784, 1047, 784, 1047, 1319, 1568].forEach((f, i) => { 
                        const os = audioCtx.createOscillator(), gs = audioCtx.createGain(); 
                        os.connect(gs); gs.connect(audioCtx.destination); 
                        os.type = 'triangle'; 
                        os.frequency.setValueAtTime(f, now + i * 0.08); 
                        gs.gain.setValueAtTime(0.15, now + i * 0.08); 
                        gs.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.12); 
                        os.start(now + i * 0.08); os.stop(now + i * 0.08 + 0.12); 
                    }); 
                }
                else if (t === 'lose') { 
                    o.type = 'sawtooth'; 
                    o.frequency.setValueAtTime(200, now); 
                    o.frequency.exponentialRampToValueAtTime(100, now + 0.4); 
                    g.gain.setValueAtTime(0.1, now); 
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.4); 
                    o.start(); o.stop(now + 0.4); 
                }
                else if (t === 'dramatic') { 
                    [392, 440, 392, 523].forEach((f, i) => { 
                        const os = audioCtx.createOscillator(), gs = audioCtx.createGain(); 
                        os.connect(gs); gs.connect(audioCtx.destination); 
                        os.type = 'sawtooth'; 
                        os.frequency.setValueAtTime(f, now + i * 0.15); 
                        gs.gain.setValueAtTime(0.05, now + i * 0.15); 
                        gs.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.12); 
                        os.start(now + i * 0.15); os.stop(now + i * 0.15 + 0.12); 
                    }); 
                }
                else if (t === 'king') {
                    // ゴージャスなファンファーレ
                    [392, 523, 659, 784, 1047, 1318, 1568, 2093].forEach((f, i) => { 
                        const os = audioCtx.createOscillator(), gs = audioCtx.createGain(); 
                        os.connect(gs); gs.connect(audioCtx.destination); 
                        os.type = 'square';
                        os.frequency.setValueAtTime(f, now + i * 0.1); 
                        gs.gain.setValueAtTime(0.15, now + i * 0.1); 
                        gs.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.8); 
                        os.start(now + i * 0.1); os.stop(now + i * 0.1 + 0.8); 
                    });
                }
            } catch(e) { console.error(e); }
        }

        function toggleSound() {

        }

        let balance = 100000, curBet = null, selHorse = null, raceNum = 1, horses = [], racing = false;
        const names = ["サイレントスター", "ミラクルウィンド", "ゴールデンドリーム", "シャドウランナー", "サンダーボルト", "ブレイブハート", "フライングエース", "ロイヤルクラウン", "ダイヤモンドキング", "スピードスター", "ウィンドチェイサー", "ナイトウォリアー", "クリムゾンタイド", "シルバーアロー", "ブラックサンダー", "ゴールドラッシュ", "スカイランナー", "ファイヤーダンス", "オーシャンブルー", "サンライズヒーロー", "ハクバノキセキ", "シロイイナズマ", "ユキノビジン", "ホワイトミラクル"];
        const jockeys = ["武豊", "ルメール", "川田", "横山武", "デムーロ", "福永", "松山", "戸崎"];

        function init() { 
            document.body.addEventListener('touchstart', () => initAudio(), { once: true }); 
            document.body.addEventListener('click', () => initAudio(), { once: true }); 
            genHorses(); 
            render(); 
            updateUI(); 
        }
        
        function genHorses() {
            horses = []; const used = [], str = [];
            for (let i = 0; i < 5; i++) str.push(Math.random() * 100);
            const total = str.reduce((a, b) => a + b, 0);
            
            const whiteHorseIndex = Math.random() < 0.15 ? Math.floor(Math.random() * 5) : -1;
            
            for (let i = 0; i < 5; i++) {
                let n; 
                if (i === whiteHorseIndex) {
                    const whiteNames = ["ハクバノキセキ", "シロイイナズマ", "ユキノビジン", "ホワイトミラクル", "ソダシ", "シラユキヒメ"];
                    n = whiteNames[Math.floor(Math.random() * whiteNames.length)];
                } else {
                    do { n = names[Math.floor(Math.random() * names.length)]; } while (used.includes(n));
                }
                used.push(n);
                
                const p = str[i] / total;
                let odds;
                if (p > 0.35) odds = 1.2 + Math.random() * 0.8;
                else if (p > 0.25) odds = 2.5 + Math.random() * 2;
                else if (p > 0.15) odds = 5 + Math.random() * 5;
                else if (p > 0.08) odds = 10 + Math.random() * 20;
                else odds = 30 + Math.random() * 120;
                
                const styles = ['逃げ', '先行', '差し', '追込'];
                const style = styles[Math.floor(Math.random() * styles.length)];
                
                horses.push({ 
                    id: i + 1,
                    name: n, 
                    jockey: jockeys[Math.floor(Math.random() * jockeys.length)], 
                    odds: Math.round(odds * 10) / 10, 
                    strength: str[i], 
                    pos: 30,
                    style: style,
                    stamina: 0.5 + Math.random() * 0.5,
                    explosive: 0.3 + Math.random() * 0.7,
                    isWhite: i === whiteHorseIndex
                });
            }
            horses.sort((a, b) => a.odds - b.odds);
            horses.forEach((h, i) => h.id = i + 1);
        }
        
        function render() {
            const c = document.getElementById('horses'); c.innerHTML = '';
            horses.forEach(h => {
                const d = document.createElement('div'); d.className = 'horse-card'; d.id = 'card-' + h.id;
                d.onclick = () => selectHorse(h.id);
                const whiteMark = h.isWhite ? '<span class="white-mark">白毛</span>' : '';
                d.innerHTML = '<div class="hnum">' + h.id + '</div><div class="hinfo"><div class="hname">' + h.name + whiteMark + '</div><div class="hjockey"><span>🏇 ' + h.jockey + '</span><span>⚡ ' + h.style + '</span></div></div><div class="hodds"><div class="odds-val">' + h.odds.toFixed(1) + '</div><div class="odds-lbl">倍</div></div>';
                c.appendChild(d);
            });
            
            horses.forEach(h => {
                const el = document.getElementById('horse-' + h.id);
                if (h.isWhite) el.classList.add('white');
                else el.classList.remove('white');
            });
        }
        
        function selectHorse(id) {
            if (racing || curBet) return;
            initAudio(); playSound('select');
            selHorse = horses.find(h => h.id === id);
            document.querySelectorAll('.horse-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('card-' + id).classList.add('selected');
            document.getElementById('bet-btn').disabled = false;
        }
        
        function addBet(v) { 
            if(racing || curBet) return;
            initAudio(); playSound('select'); 
            const input = document.getElementById('bet-input');
            const current = parseInt(input.value) || 0;
            input.value = current + v; 
        }

        function resetBetAmount() {
            if(racing || curBet) return;
            initAudio(); playSound('select');
            document.getElementById('bet-input').value = 0;
        }
        
        function placeBet() {
            if (!selHorse || racing || curBet) return;
            let a = Math.round((parseInt(document.getElementById('bet-input').value) || 0) / 100) * 100;
            if (a < 100) { alert('100円以上で購入してください'); return; }
            if (a > balance) { alert('残高不足です'); return; }
            initAudio();
            playSound('bet');
            balance -= a; updateUI();
            curBet = { horse: selHorse, amount: a };
            document.getElementById('cur-bet').classList.add('show');
            document.getElementById('cur-bet-name').textContent = curBet.horse.id + '番 ' + curBet.horse.name;
            document.getElementById('cur-bet-val').textContent = '¥' + a.toLocaleString() + ' → ¥' + Math.floor(a * curBet.horse.odds).toLocaleString();
            document.getElementById('bet-btn').disabled = true;
            document.querySelectorAll('.horse-card').forEach(c => c.classList.add('disabled'));
            document.getElementById('comment').innerHTML = '<span class="hl">' + curBet.horse.name + '</span>に' + a.toLocaleString() + '円！発走します！';
            
            setTimeout(() => { playSound('fanfare'); setTimeout(runRace, 2000); }, 800);
        }
        
        function runRace() {
            racing = true;
            const trackEl = document.getElementById('track');
            const tw = trackEl.offsetWidth;
            const finish = tw - 55;
            let time = 0; 
            const total = 8000 + Math.random() * 2000;
            
            const rand = Math.random();
            let raceStyle;
            if (rand < 0.12) raceStyle = 'upset';
            else if (rand < 0.22) raceStyle = 'bigEscape';
            else if (rand < 0.35) raceStyle = 'dramaticFinish';
            else if (rand < 0.50) raceStyle = 'comeFromBehind';
            else if (rand < 0.62) raceStyle = 'photoFinish';
            else raceStyle = 'normal';
            
            let upsetHorse = null;
            if (raceStyle === 'upset') {
                const longshots = horses.filter(h => h.odds >= 15);
                if (longshots.length > 0) upsetHorse = longshots[Math.floor(Math.random() * longshots.length)];
            }
            
            let escapeHorse = null;
            if (raceStyle === 'bigEscape') {
                const escapers = horses.filter(h => h.style === '逃げ');
                escapeHorse = escapers.length > 0 ? escapers[0] : horses[Math.floor(Math.random() * horses.length)];
            }
            
            let closerHorse = null;
            if (raceStyle === 'comeFromBehind') {
                const closers = horses.filter(h => h.style === '追込' || h.style === '差し');
                closerHorse = closers.length > 0 ? closers[Math.floor(Math.random() * closers.length)] : horses[Math.floor(Math.random() * horses.length)];
            }
            
            horses.forEach(h => { h.pos = 30; h.speed = (h.strength / 100) * 0.7 + 0.4; h.currentStamina = h.stamina; h.tired = false; });
            
            let lastPhase = -1, gallopCnt = 0, lastDramatic = -1;
            
            const intervalTime = 50;
            const iv = setInterval(() => {
                time += intervalTime;
                const prog = time / total;
                gallopCnt++; 
                if (gallopCnt % 4 === 0) playSound('gallop');
                
                horses.forEach(h => {
                    let speedMod = 1;
                    let r = 0.8 + Math.random() * 0.4;
                    
                    if (h.style === '逃げ') {
                        if (prog < 0.4) speedMod = 1.3;
                        else if (prog > 0.7) speedMod = 0.7 + h.stamina * 0.4;
                    } else if (h.style === '先行') {
                        if (prog < 0.3) speedMod = 1.15;
                        else if (prog > 0.6) speedMod = 0.9 + h.explosive * 0.3;
                    } else if (h.style === '差し') {
                        if (prog < 0.5) speedMod = 0.85;
                        else if (prog > 0.65) speedMod = 1.1 + h.explosive * 0.4;
                    } else if (h.style === '追込') {
                        if (prog < 0.6) speedMod = 0.75;
                        else if (prog > 0.75) speedMod = 1.3 + h.explosive * 0.5;
                    }
                    
                    if (raceStyle === 'upset' && h === upsetHorse) {
                        if (prog > 0.5) speedMod *= 1.4;
                        if (prog > 0.8) speedMod *= 1.3;
                    }
                    
                    if (raceStyle === 'bigEscape' && h === escapeHorse) {
                        if (prog < 0.7) speedMod *= 1.5;
                        else {
                            if (h.stamina < 0.6 && prog > 0.8) { h.tired = true; speedMod *= 0.5; }
                            else speedMod *= 1.1;
                        }
                    }
                    
                    if (raceStyle === 'comeFromBehind' && h === closerHorse) {
                        if (prog < 0.6) speedMod *= 0.7;
                        else speedMod *= 1.6;
                    }
                    
                    if (raceStyle === 'dramaticFinish' && prog > 0.85) r = 0.5 + Math.random() * 1.0;
                    
                    if (raceStyle === 'photoFinish' && prog > 0.7) {
                        const sorted = [...horses].sort((a, b) => b.pos - a.pos);
                        if (sorted.indexOf(h) < 3) {
                            const leader = sorted[0];
                            if (h !== leader && leader.pos - h.pos > 5) speedMod *= 1.15;
                        }
                    }
                    
                    const move = h.speed * r * speedMod * (tw / 250); 
                    h.pos += move;
                    h.pos = Math.min(h.pos, finish);
                    document.getElementById('horse-' + h.id).style.left = h.pos + 'px';
                });
                
                const sorted = [...horses].sort((a, b) => b.pos - a.pos);
                horses.forEach(h => document.getElementById('horse-' + h.id).classList.toggle('leading', h.id === sorted[0].id));
                
                const phase = Math.floor(prog * 8);
                if (phase !== lastPhase) { lastPhase = phase; updateComment(prog, sorted, raceStyle, escapeHorse, upsetHorse, closerHorse); }
                
                if (prog > 0.75 && prog < 0.9 && Math.floor(prog * 20) !== lastDramatic) {
                    lastDramatic = Math.floor(prog * 20);
                    const gap = sorted[0].pos - sorted[1].pos;
                    if (gap < 10) playSound('dramatic');
                }
                
                if (sorted[0].pos >= finish) { clearInterval(iv); playSound('finish'); finishRace(sorted, raceStyle, escapeHorse, upsetHorse); }
            }, intervalTime);
        }
        
        function updateComment(p, s, style, escapeH, upsetH, closerH) {
            const lead = s[0], second = s[1];
            const bet = s.find(h => h.id === curBet.horse.id), bp = s.indexOf(bet) + 1;
            const gap12 = lead.pos - second.pos;
            let t = '';
            
            const whiteHorse = s.find(h => h.isWhite);
            const whitePos = whiteHorse ? s.indexOf(whiteHorse) + 1 : -1;
            
            if (p < 0.12) t = 'スタート！各馬一斉に飛び出した！';
            else if (p < 0.25) {
                if (style === 'bigEscape' && lead === escapeH) t = '<span class="hl">' + lead.name + '</span>が大逃げ！後続を大きく引き離す！';
                else if (whiteHorse && whitePos === 1) t = '白い馬体が先頭！<span class="hl">' + whiteHorse.name + '</span>が飛ばす！';
                else t = '<span class="hl">' + lead.name + '</span>が先頭、' + second.name + 'が2番手';
            } else if (p < 0.4) {
                if (style === 'bigEscape' && gap12 > 30) t = '<span class="hl">' + lead.name + '</span>独走態勢！すごいリード！';
                else if (bp <= 2) t = '<span class="hl">' + bet.name + '</span>は好位置！手応え十分！';
                else if (whiteHorse && whitePos <= 2) t = '白毛の<span class="hl">' + whiteHorse.name + '</span>が好位置につける！';
                else t = '先頭<span class="hl">' + lead.name + '</span>、' + bet.name + 'は' + bp + '番手で待機';
            } else if (p < 0.55) {
                if (bet.style === '追込' && bp >= 4) t = '<span class="hl">' + bet.name + '</span>は後方待機...脚を溜めているか！？';
                else t = '3コーナー！<span class="hl">' + lead.name + '</span>が先頭！';
            } else if (p < 0.7) {
                if (style === 'comeFromBehind' && closerH) { const cp = s.indexOf(closerH) + 1; t = '4コーナー！<span class="hl">' + closerH.name + '</span>が' + cp + '番手から動く！'; }
                else if (style === 'bigEscape' && lead === escapeH && gap12 > 25) t = 'まだ<span class="hl">' + lead.name + '</span>の脚色は衰えない！逃げ切れるか！？';
                else t = '最終コーナー！各馬が仕掛け始める！';
            } else if (p < 0.82) {
                if (style === 'bigEscape' && escapeH && escapeH.tired) t = '<span class="hl">' + escapeH.name + '</span>の脚が上がった！後続が殺到！';
                else if (style === 'upset' && upsetH) { const up = s.indexOf(upsetH) + 1; if (up <= 3) t = 'なんと！大穴<span class="hl">' + upsetH.name + '</span>が' + up + '番手に浮上！'; else t = '直線！<span class="hl">' + lead.name + '</span>が粘る！'; }
                else if (style === 'comeFromBehind' && closerH) { const cp = s.indexOf(closerH) + 1; if (cp <= 2) t = '<span class="hl">' + closerH.name + '</span>が怒涛の追込み！すごい脚！'; else t = '直線！<span class="hl">' + closerH.name + '</span>が外から伸びる！'; }
                else if (whiteHorse && whitePos <= 2) t = '直線！白い馬体<span class="hl">' + whiteHorse.name + '</span>が伸びる！';
                else t = '直線！<span class="hl">' + lead.name + '</span>先頭！' + second.name + 'が追う！';
            } else if (p < 0.92) {
                if (gap12 < 8) t = '大接戦！<span class="hl">' + lead.name + '</span>と<span class="hl">' + second.name + '</span>が並んだ！';
                else if (style === 'upset' && upsetH && s.indexOf(upsetH) === 0) t = '信じられない！<span class="hl">' + upsetH.name + '</span>が先頭だ！大波乱！';
                else if (bp === 1) t = '<span class="hl">' + bet.name + '</span>が先頭！押し切れるか！？';
                else if (bp === 2 && gap12 < 15) t = '<span class="hl">' + bet.name + '</span>が迫る！届くか！？';
                else t = '残り100m！<span class="hl">' + lead.name + '</span>がリード！';
            } else {
                if (gap12 < 5) t = 'ゴール前！<span class="hl">' + lead.name + '</span>と<span class="hl">' + second.name + '</span>！どっちだ！？';
                else if (bp === 1) t = '<span class="hl">' + bet.name + '</span>先頭でゴールへ！！';
                else if (whiteHorse && whitePos === 1) t = '白い稲妻！<span class="hl">' + whiteHorse.name + '</span>がゴールへ！';
                else t = '<span class="hl">' + lead.name + '</span>がゴールに飛び込む！';
            }
            document.getElementById('comment').innerHTML = t;
        }
        
        function finishRace(sorted, style, escapeH, upsetH) {
            const winner = sorted[0], isWin = winner.id === curBet.horse.id, bp = sorted.findIndex(h => h.id === curBet.horse.id) + 1;
            let win = 0, extraMsg = '';
            if (isWin) { win = Math.floor(curBet.amount * curBet.horse.odds); balance += win; updateUI(); }
            if (winner.isWhite) extraMsg = '白毛馬の勝利！';
            else if (style === 'upset' && winner === upsetH) extraMsg = '大波乱！';
            else if (style === 'bigEscape' && winner === escapeH) extraMsg = '見事な逃げ切り！';
            else if (style === 'bigEscape' && escapeH && escapeH.tired && winner !== escapeH) extraMsg = '逃げ馬バテて逆転！';
            else if (winner.style === '追込') extraMsg = '鮮やかな追込み！';
            document.getElementById('comment').innerHTML = extraMsg + '<span class="hl">' + winner.name + '</span>が1着！' + (isWin ? '的中おめでとう！' : curBet.horse.name + 'は' + bp + '着...');
            setTimeout(() => { isWin ? playSound('win') : playSound('lose'); showResult(isWin, winner, win, bp); }, 1200);
        }

            else if (balance < 100 && !isWin) {

                document.getElementById('res-amount').textContent = '+¥' + win.toLocaleString();

                document.getElementById('res-amount').textContent = '-¥' + curBet.amount.toLocaleString(); 
                document.getElementById('res-amount').className = 'res-amount lose'; 
                document.getElementById('modal-btn').textContent = '次のレースへ'; 
                document.getElementById('modal-btn').onclick = nextRace; 
            }
            m.classList.add('show');

        // Confetti Logic

            const container = document.getElementById('confetti-container');

            container.innerHTML = '';

            document.getElementById('modal').classList.remove('show');
            raceNum++; curBet = null; selHorse = null; racing = false;

                el.classList.remove('leading');

            // 金持ち演出

        function resetGame() { 
            balance = 100000; raceNum = 1; curBet = null; selHorse = null; racing = false; 
            document.getElementById('modal').classList.remove('show'); 
            document.getElementById('confetti-container').classList.remove('active');
            horses.forEach(h => { 
                const el = document.getElementById('horse-' + h.id); 
                el.style.left = '30px'; 
                el.classList.remove('leading', 'white'); 
            });

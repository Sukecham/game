  <div id="loadnote">読み込み中…</div>
</div>

/* 赤経赤緯 → 方向ベクトル */
function eqToDir(raH, decDeg){
  const H=THREE.MathUtils.degToRad((LST-raH)*15);
  const dec=THREE.MathUtils.degToRad(decDeg);
  const sinAlt=Math.sin(dec)*Math.sin(PHI)+Math.cos(dec)*Math.cos(PHI)*Math.cos(H);
  const alt=Math.asin(THREE.MathUtils.clamp(sinAlt,-1,1));
  const A=Math.atan2(-Math.cos(dec)*Math.sin(H), Math.sin(dec)*Math.cos(PHI)-Math.cos(dec)*Math.sin(PHI)*Math.cos(H));
  const ce=Math.cos(alt);
  return new THREE.Vector3(ce*Math.sin(A), Math.sin(alt), -ce*Math.cos(A));
}

function init(){
  const canvas=document.getElementById('scene');
  try{ renderer=new THREE.WebGLRenderer({ canvas, antialias:false, powerPreference:'high-performance' }); }
  catch(e){ document.getElementById('err').style.display='flex'; return false; }
  renderer.setPixelRatio(DPR); renderer.setSize(innerWidth,innerHeight);
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
  renderer.outputColorSpace=THREE.SRGBColorSpace;

  buildTextures();
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x06070f, 0.02);
  camera=new THREE.PerspectiveCamera(66, innerWidth/innerHeight, 0.1, 2000);

  buildNightSky();
  buildGround();
  buildHorizonScenery();
  buildSkyBase();        // 背景星 + 季節グループ枠
  buildComposer();

  addEventListener('resize', onResize);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) clock.getDelta(); });
  return true;
}

function buildComposer(){
  composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  bloomPass=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.9, 0.6, 0.55);
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());
  try{ composer.addPass(new SMAAPass(innerWidth,innerHeight)); }catch(e){}
  gradePass=new ShaderPass({
    uniforms:{ tDiffuse:{value:null}, uTime:{value:0}, uRes:{value:new THREE.Vector2(innerWidth,innerHeight)} },
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes; varying vec2 vUv;
      float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
      void main(){ vec2 uv=vUv; vec3 col=texture2D(tDiffuse,uv).rgb; col.b*=1.05; col.r*=0.98; col=(col-0.5)*1.06+0.5;
        float r2=dot(uv-0.5,uv-0.5); col*=mix(0.72,1.0,smoothstep(1.0,0.18,r2*2.2));
        float g=hash(uv*uRes+fract(uTime)*vec2(53.0,97.0)); col+=(g-0.5)*0.012;
        gl_FragColor=vec4(clamp(col,0.0,1.0),1.0); }`
  });
  composer.addPass(gradePass);
  composer.setSize(innerWidth,innerHeight);
}

let skyMat;
function buildNightSky(){
  skyMat=new THREE.ShaderMaterial({ side:THREE.BackSide, depthWrite:false, fog:false,
    uniforms:{ top:{value:new THREE.Color(0x05070f)}, mid:{value:new THREE.Color(0x0a1024)}, hor:{value:new THREE.Color(0x16203c)} },
    vertexShader:`varying vec3 vD; void main(){ vD=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vD; uniform vec3 top,mid,hor;
      void main(){ float h=normalize(vD).y; vec3 c=mix(hor,mid,smoothstep(-0.05,0.35,h)); c=mix(c,top,smoothstep(0.25,0.8,h)); gl_FragColor=vec4(c,1.0);}`
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(900,32,20), skyMat));
}

function buildGround(){
  TEX.ground.repeat.set(40,40);
  const g=new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.MeshStandardMaterial({ map:TEX.ground, color:0x10160f, roughness:1 }));
  g.rotation.x=-Math.PI/2; g.position.y=-0.02; scene.add(g);
  const road=new THREE.Mesh(new THREE.PlaneGeometry(4.2,200), new THREE.MeshStandardMaterial({ color:0x1c1d22, roughness:1 }));
  road.rotation.x=-Math.PI/2; road.position.y=0.01; scene.add(road);
  scene.add(new THREE.HemisphereLight(0x2a3450, 0x05060a, 0.5));
  scene.add(new THREE.AmbientLight(0x223047,0.25));
}

function makePole(x,z){

   ============================================================ */
let starPositions;
function buildSkyBase(){
  skyGroup=new THREE.Group(); scene.add(skyGroup);
  // 背景の微光星（上半球）
  const BN = IS_MOBILE ? 1100 : 1900;
  const bpos=new Float32Array(BN*3), bsz=new Float32Array(BN), bph=new Float32Array(BN), bcol=new Float32Array(BN*3); const tmp=new THREE.Color();
  for(let i=0;i<BN;i++){ let v; do{ v=new THREE.Vector3(Math.random()*2-1,Math.random(),Math.random()*2-1); }while(v.lengthSq()<0.02); v.normalize();
    if(v.y<0.015) v.y=0.015+Math.random()*0.05; v.multiplyScalar(SKY_R*0.99);
    bpos[i*3]=v.x; bpos[i*3+1]=v.y; bpos[i*3+2]=v.z; bsz[i]=0.8+Math.random()*1.6; bph[i]=Math.random()*7;
    const t=Math.random(); tmp.setRGB(0.8+t*0.2,0.85+t*0.12,1.0); bcol[i*3]=tmp.r; bcol[i*3+1]=tmp.g; bcol[i*3+2]=tmp.b; }
  addStarPoints(bpos,bsz,bph,bcol,0.6,skyGroup);
  seasonGroup=new THREE.Group(); skyGroup.add(seasonGroup);
}
function addStarPoints(pos,sz,ph,col,bright,parent){
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
  g.setAttribute('aPhase',new THREE.BufferAttribute(ph,1));
  g.setAttribute('aColor',new THREE.BufferAttribute(col,3));
  const mat=new THREE.ShaderMaterial({ transparent:true, depthWrite:false, depthTest:true, fog:false, blending:THREE.AdditiveBlending,
    uniforms:{ uTime:U.uTime, uTex:{value:TEX.star}, uDpr:{value:DPR}, uBright:{value:bright} },
    vertexShader:`attribute float aSize; attribute float aPhase; attribute vec3 aColor; uniform float uTime,uDpr; varying vec3 vC; varying float vT;
      void main(){ vC=aColor; float tw=0.7+0.3*sin(uTime*1.8+aPhase)+0.12*sin(uTime*5.3+aPhase*2.0); vT=tw;
        vec4 mv=modelViewMatrix*vec4(position,1.0); gl_PointSize=aSize*uDpr*tw; gl_Position=projectionMatrix*mv; }`,
    fragmentShader:`uniform sampler2D uTex; uniform float uBright; varying vec3 vC; varying float vT;
      void main(){ vec4 t=texture2D(uTex,gl_PointCoord); gl_FragColor=vec4(vC,1.0)*t.a*vT*uBright; }`
  });
  const pts=new THREE.Points(g,mat); pts.frustumCulled=false; parent.add(pts);
  return { pts, mat };
}

/* 季節の星座を構築（切替時は前のを破棄） */
function clearSeason(){
  for(let i=seasonGroup.children.length-1;i>=0;i--){ const o=seasonGroup.children[i]; seasonGroup.remove(o); if(o.geometry) o.geometry.dispose(); if(o.material) o.material.dispose(); }
}
function buildSeason(key){
  curSeason=key; const S=SEASONS[key]; LST=S.lst;
  scene.fog.color.set(S.fog); scene.fog.density=S.dens; skyMat.uniforms.hor.value.set(S.hor);
  homeLights.forEach(m=>m.color.set(S.home));
  clearSeason(); constellations.length=0; found=0; ending=false;

  const allPos=[],allSz=[],allPh=[],allCol=[];
  S.keys.forEach(k=>{ const cdef=CONS[k]; if(!cdef) return; const dirs=[];
    cdef.stars.forEach(st=>{ const dir=eqToDir(st[0],st[1]); dirs.push(dir); const p=dir.clone().multiplyScalar(SKY_R);
      const size=THREE.MathUtils.clamp((6.4-st[2])*1.7+1.6,2.0,13.0); const col=new THREE.Color(st[3]!==undefined?st[3]:WHITE);
      allPos.push(p.x,p.y,p.z); allSz.push(size); allPh.push(Math.random()*7); allCol.push(col.r,col.g,col.b); });
    const c=new THREE.Vector3(); dirs.forEach(d=>c.add(d)); c.normalize();
    const lpos=[]; cdef.lines.forEach(([a,b])=>{ const pa=dirs[a].clone().multiplyScalar(SKY_R*0.992),pb=dirs[b].clone().multiplyScalar(SKY_R*0.992); lpos.push(pa.x,pa.y,pa.z,pb.x,pb.y,pb.z); });
    const lg=new THREE.BufferGeometry(); lg.setAttribute('position',new THREE.Float32BufferAttribute(lpos,3));
    const lm=new THREE.LineBasicMaterial({color:0x9fd0ff,transparent:true,opacity:0,fog:false,blending:THREE.AdditiveBlending,depthWrite:false});
    const lines=new THREE.LineSegments(lg,lm); seasonGroup.add(lines);
    constellations.push({def:cdef,centroid:c,lines,lm,opacity:0,found:false}); });
  starPositions=addStarPoints(new Float32Array(allPos),new Float32Array(allSz),new Float32Array(allPh),new Float32Array(allCol),1.0,seasonGroup);
  starPositions._base=null;

  buildMilkyWay(seasonGroup);

  document.getElementById('ccount').textContent=`0 / ${constellations.length}`;
  setQuest('星をさがして ・ '+S.jp, S.headline);
}

function buildMilkyWay(parent){
  const path=[[20.69,45.3],[20.3,38],[19.8,20],[19.4,8],[18.9,-12],[18.4,-29],[17.8,-35]];
  const total = IS_MOBILE ? 44 : 70, per=Math.ceil(total/(path.length-1));
  for(let s=0;s<path.length-1;s++){ for(let k=0;k<per;k++){ const t=k/per;
    const ra=path[s][0]+(path[s+1][0]-path[s][0])*t, dec=path[s][1]+(path[s+1][1]-path[s][1])*t;
    const dir=eqToDir(ra,dec); if(dir.y<0.02) continue;
    const m=new THREE.SpriteMaterial({map:TEX.cloud,color:0x9fb4e0,transparent:true,opacity:0.05+Math.random()*0.05,blending:THREE.AdditiveBlending,depthWrite:false,fog:false});
    const sp=new THREE.Sprite(m); const sc=60+Math.random()*70; sp.scale.set(sc,sc,1);
    sp.position.copy(dir.multiplyScalar(SKY_R*0.985)); sp.position.x+=(Math.random()-0.5)*30; sp.position.z+=(Math.random()-0.5)*30; parent.add(sp); } }
}


/* ============================================================
   星座さがし
   ============================================================ */
const _fwd=new THREE.Vector3(), _proj=new THREE.Vector3();
const RING_LEN = 2*Math.PI*22;
let focusIdx=-1, focusT=0;
const FOCUS_NEED=0.75, FIND_ANGLE=THREE.MathUtils.degToRad(7.5), HINT_ANGLE=THREE.MathUtils.degToRad(15);
let highlightI=-1, highlightAmt=0;

function updateConstellations(dt){
  camera.getWorldDirection(_fwd);
  let bestUnseen=-1,bU=999, bestSeen=-1,bS=999;
  for(let i=0;i<constellations.length;i++){ const c=constellations[i]; const ang=Math.acos(THREE.MathUtils.clamp(_fwd.dot(c.centroid),-1,1));
    if(!c.found && ang<bU){ bU=ang; bestUnseen=i; } if(c.found && ang<bS){ bS=ang; bestSeen=i; }
    const tgt = c.found ? (ang<HINT_ANGLE?0.85:0.30) : 0.0; c.opacity+=(tgt-c.opacity)*Math.min(dt*3,1); c.lm.opacity=c.opacity; }

  const reticle=document.getElementById('reticle'), prog=reticle.querySelector('.prog');
  if(bestUnseen>=0 && bU<FIND_ANGLE){ if(focusIdx!==bestUnseen){ focusIdx=bestUnseen; focusT=0; } focusT+=dt; reticle.style.opacity='1';
    const pr=Math.min(focusT/FOCUS_NEED,1); prog.style.strokeDasharray=RING_LEN; prog.style.strokeDashoffset=RING_LEN*(1-pr); highlightStars(bestUnseen,0.5+0.5*pr);
    if(focusT>=FOCUS_NEED) discover(bestUnseen); }
  else { focusIdx=-1; focusT=0; prog.style.strokeDashoffset=RING_LEN; const hint=(bestUnseen>=0&&bU<HINT_ANGLE); reticle.style.opacity=hint?'0.7':'0.25'; if(hint) highlightStars(bestUnseen,0.35); }

  updateLabel(bestSeen,bS); updateGuide(bestUnseen);
}
function highlightStars(i,amt){ highlightI=i; highlightAmt=amt; }
function discover(i){ const c=constellations[i]; if(c.found) return; c.found=true; found++;
  document.getElementById('ccount').textContent=`${found} / ${constellations.length}`; audio&&audio.chime();
  showToast(`「${c.def.jp}」を見つけた\n${c.def.note}`); focusIdx=-1; focusT=0;
  document.getElementById('reticle').querySelector('.prog').style.strokeDashoffset=RING_LEN;
  if(found>=constellations.length && !ending) triggerEnding(); }

const clabel=document.getElementById('clabel');
function updateLabel(seenIdx,ang){
  if(seenIdx>=0 && constellations[seenIdx].found && ang<HINT_ANGLE){ const c=constellations[seenIdx];
    _proj.copy(c.centroid).multiplyScalar(SKY_R).add(camera.position).project(camera);
    if(_proj.z<1){ clabel.style.left=(_proj.x*0.5+0.5)*innerWidth+'px'; clabel.style.top=(-_proj.y*0.5+0.5)*innerHeight+'px';
      clabel.querySelector('.jp').textContent=c.def.jp; clabel.querySelector('.rom').textContent=c.def.rom; clabel.style.opacity='1'; return; } }
  clabel.style.opacity='0';
}
const guide=document.getElementById('guide');
function updateGuide(unseenIdx){
  if(unseenIdx<0||ending){ guide.style.opacity='0'; return; }
  const c=constellations[unseenIdx]; document.getElementById('guide-name').textContent=' '+c.def.jp;
  _proj.copy(c.centroid).multiplyScalar(SKY_R).add(camera.position).project(camera);
  const behind=_proj.z>1; let x=(_proj.x*0.5+0.5)*innerWidth, y=(-_proj.y*0.5+0.5)*innerHeight; const cx=innerWidth/2,cy=innerHeight/2;
  if(!behind && x>40 && x<innerWidth-40 && y>90 && y<innerHeight-120){ guide.style.opacity='0'; return; }
  let dx=x-cx,dy=y-cy; if(behind){ dx=-dx; dy=-dy; } const len=Math.hypot(dx,dy)||1; dx/=len; dy/=len;
  const rr=Math.min(innerWidth,innerHeight)*0.32; guide.style.left=(cx+dx*rr)+'px'; guide.style.top=(cy+dy*rr)+'px';
  guide.querySelector('.arrow').style.transform=`rotate(${Math.atan2(dy,dx)*180/Math.PI+90}deg)`; guide.style.opacity='0.9';
}
function applyHighlight(){
  if(!starPositions) return; const sizes=starPositions.pts.geometry.getAttribute('aSize');
  if(!starPositions._base){ starPositions._base=Float32Array.from(sizes.array); }
  const base=starPositions._base; for(let i=0;i<sizes.array.length;i++) sizes.array[i]=base[i];
  if(highlightI>=0){ let start=0; for(let k=0;k<highlightI;k++) start+=constellations[k].def.stars.length; const n=constellations[highlightI].def.stars.length;
    for(let k=0;k<n;k++){ const idx=start+k; if(idx<sizes.array.length) sizes.array[idx]=base[idx]*(1.0+highlightAmt*1.4); } }
  sizes.needsUpdate=true; highlightI=-1; highlightAmt=0;
}

/* ============================================================
   プレイヤー
   ============================================================ */
const fwd=new THREE.Vector3(), right=new THREE.Vector3(); const keys={};
function updatePlayer(dt){
  let mx=player.moveX, mz=player.moveZ;
  if(keys['KeyW']) mz+=1; if(keys['KeyS']) mz-=1; if(keys['KeyA']) mx-=1; if(keys['KeyD']) mx+=1;
  if(keys['ArrowLeft']) player.yaw+=dt*1.4; if(keys['ArrowRight']) player.yaw-=dt*1.4;
  if(keys['ArrowUp']) player.pitch=Math.min(player.pitch+dt*1.2,1.5); if(keys['ArrowDown']) player.pitch=Math.max(player.pitch-dt*1.2,-0.35);
  const len=Math.hypot(mx,mz), moving=len>0.06;
  if(moving){ if(len>1){ mx/=len; mz/=len; } fwd.set(Math.sin(player.yaw),0,Math.cos(player.yaw)); right.set(-Math.cos(player.yaw),0,Math.sin(player.yaw));
    let px=player.pos.x+(fwd.x*mz+right.x*mx)*player.speed*dt, pz=player.pos.z+(fwd.z*mz+right.z*mx)*player.speed*dt;
    px=THREE.MathUtils.clamp(px,-90,90); pz=THREE.MathUtils.clamp(pz,-90,90); player.pos.x=px; player.pos.z=pz; player.bob+=dt*8; }
  else player.bob+=dt*1.6;
  const bobY=moving?Math.sin(player.bob)*0.04:Math.sin(player.bob*0.5)*0.008;
  camera.position.set(player.pos.x,EYE+bobY,player.pos.z);
  const d=new THREE.Vector3(Math.sin(player.yaw)*Math.cos(player.pitch),Math.sin(player.pitch),Math.cos(player.yaw)*Math.cos(player.pitch));
  camera.lookAt(camera.position.x+d.x,camera.position.y+d.y,camera.position.z+d.z);
  if(skyGroup) skyGroup.position.set(camera.position.x,0,camera.position.z);
  updateCompass();
}
function updateCompass(){
  const az=(Math.atan2(Math.sin(player.yaw),-Math.cos(player.yaw))*180/Math.PI+360)%360;
  const dirs=[['北',0],['北東',45],['東',90],['南東',135],['南',180],['南西',225],['西',270],['北西',315]];
  let best='北',bd=999; for(const [n,a] of dirs){ const dd=Math.abs(((az-a+540)%360)-180); if(dd<bd){bd=dd;best=n;} }
  document.getElementById('compass').innerHTML=`— <b>${best}</b> —`;
}

/* ============================================================
   UI
   ============================================================ */
let toastTimer=null;
function showToast(t){ const el=document.getElementById('toast'); el.textContent=t; el.style.opacity='1'; clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.style.opacity='0',4200); }
function setQuest(label,obj){ document.querySelector('#quest .label').textContent=label; document.getElementById('quest-text').textContent=obj; }
function triggerEnding(){ ending=true; const S=SEASONS[curSeason]; setQuest('星をさがして ・ '+S.jp,'この季節の星座を、すべて見つけた'); showToast('見上げた夜空の星座を、すべて見つけ出した。\n\n季節がめぐれば、また新しい星が昇る。'); document.getElementById('guide').style.opacity='0'; }

/* 入力 */
const joybase=document.getElementById('joybase'), joystick=document.getElementById('joystick');
let moveId=null, moveOrigin={x:0,y:0}, lookId=null, lookLast={x:0,y:0};
function isUI(t){ return t.closest && t.closest('.iconbtn'); }
function onDown(e){ if(!started||isUI(e.target)) return; const x=e.clientX,y=e.clientY;
  if(x<innerWidth*0.5 && moveId===null){ moveId=e.pointerId; moveOrigin={x,y}; joybase.style.left=(x-59)+'px'; joybase.style.top=(y-59)+'px'; joybase.style.opacity='1'; joystick.style.left=x+'px'; joystick.style.top=y+'px'; joystick.style.opacity='1'; }
  else if(lookId===null){ lookId=e.pointerId; lookLast={x,y}; } }
function onMove(e){ if(!started) return; const x=e.clientX,y=e.clientY;
  if(e.pointerId===moveId){ let dx=x-moveOrigin.x,dy=y-moveOrigin.y; const max=52,l=Math.hypot(dx,dy); if(l>max){dx*=max/l;dy*=max/l;} joystick.style.left=(moveOrigin.x+dx)+'px'; joystick.style.top=(moveOrigin.y+dy)+'px'; player.moveX=dx/max; player.moveZ=-dy/max; }
  else if(e.pointerId===lookId){ const dx=x-lookLast.x,dy=y-lookLast.y; lookLast={x,y}; player.yaw-=dx*0.004; player.pitch=THREE.MathUtils.clamp(player.pitch-dy*0.004,-0.35,1.5); } }
function onUp(e){ if(e.pointerId===moveId){ moveId=null; player.moveX=0; player.moveZ=0; joybase.style.opacity='0'; joystick.style.opacity='0'; } if(e.pointerId===lookId) lookId=null; }
addEventListener('pointerdown',onDown,{passive:false}); addEventListener('pointermove',onMove,{passive:false}); addEventListener('pointerup',onUp); addEventListener('pointercancel',onUp);
addEventListener('keydown',e=>keys[e.code]=true); addEventListener('keyup',e=>keys[e.code]=false);

/* 季節切替 */
const ORDER=['spring','summer','autumn','winter'];
document.getElementById('seasonBtn').addEventListener('click',()=>{ if(!started) return; const i=(ORDER.indexOf(curSeason)+1)%4; const k=ORDER[i]; buildSeason(k); showToast(SEASONS[k].jp+'の星空へ'); });

/* オーディオ */
let audio=null;
class AudioM{
  constructor(){ const C=window.AudioContext||window.webkitAudioContext; this.ctx=new C(); this.master=this.ctx.createGain(); this.master.gain.value=0.2; this.master.connect(this.ctx.destination); this.muted=false; this._insects(); this._wind(); }
  _noise(){ const len=this.ctx.sampleRate*2,b=this.ctx.createBuffer(1,len,this.ctx.sampleRate),d=b.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1; const s=this.ctx.createBufferSource(); s.buffer=b; s.loop=true; s.start(); return s; }
  _insects(){ const s=this._noise(),bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=4600; bp.Q.value=11; const g=this.ctx.createGain(); g.gain.value=0.45;
    const lfo=this.ctx.createOscillator(); lfo.frequency.value=5; const lg=this.ctx.createGain(); lg.gain.value=0.4; lfo.connect(lg); lg.connect(g.gain); lfo.start(); s.connect(bp); bp.connect(g); g.connect(this.master); this.insG=g.gain; this.insLfo=lfo; }
  _wind(){ const s=this._noise(),lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=320; const g=this.ctx.createGain(); g.gain.value=0.1;
    const lfo=this.ctx.createOscillator(); lfo.frequency.value=0.1; const lg=this.ctx.createGain(); lg.gain.value=0.05; lfo.connect(lg); lg.connect(g.gain); lfo.start(); s.connect(lp); lp.connect(g); g.connect(this.master); }
  season(key){ if(!this.insG) return; const t=this.ctx.currentTime;
    // 夏=虫が賑やか / 冬=静かで風 / 春秋=ほどほど
    const lv = key==='summer'?0.55 : key==='winter'?0.12 : 0.35; this.insG.setTargetAtTime(lv,t,1.0);
    const fr = key==='summer'?5.5 : key==='winter'?2.5 : 4.0; this.insLfo.frequency.setTargetAtTime(fr,t,1.0); }
  chime(){ const t=this.ctx.currentTime; [784,1175,1568].forEach((f,i)=>{ const o=this.ctx.createOscillator(); o.type='sine'; o.frequency.value=f; const g=this.ctx.createGain(); g.gain.setValueAtTime(0,t+i*0.06); g.gain.linearRampToValueAtTime(0.16,t+i*0.06+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.06+0.7); o.connect(g); g.connect(this.master); o.start(t+i*0.06); o.stop(t+i*0.06+0.8); }); }
  toggle(){ this.muted=!this.muted; this.master.gain.setTargetAtTime(this.muted?0:0.2,this.ctx.currentTime,0.2); return this.muted; }
}
document.getElementById('muteBtn').addEventListener('click',()=>{ if(!audio) return; const m=audio.toggle(); const b=document.getElementById('muteBtn'); b.textContent=m?'♪ オフ':'♪'; b.style.opacity=m?'0.5':'1'; });

/* ループ */
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05); U.uTime.value+=dt;
  if(gradePass) gradePass.uniforms.uTime.value=U.uTime.value;
  if(started){ updatePlayer(dt); updateConstellations(dt); applyHighlight(); }
  composer.render();
}
function onResize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); if(gradePass) gradePass.uniforms.uRes.value.set(innerWidth,innerHeight); if(bloomPass) bloomPass.setSize(innerWidth,innerHeight); }

/* タイトル → 季節選択 */
(function(){ const d=document.getElementById('star-deco'); for(let i=0;i<60;i++){ const e=document.createElement('div'); e.className='ds'; e.style.left=Math.random()*100+'vw'; e.style.top=Math.random()*70+'vh'; e.style.animationDelay=(Math.random()*3)+'s'; e.style.transform=`scale(${0.5+Math.random()*1.2})`; d.appendChild(e); } })();

function startGame(seasonKey){
  if(started) return; started=true;
  try{ audio=new AudioM(); if(audio.ctx.state==='suspended') audio.ctx.resume(); audio.season(seasonKey); }catch(e){}
  buildSeason(seasonKey);
  const title=document.getElementById('title'); title.style.opacity='0'; setTimeout(()=>title.style.display='none',1500);
  ['quest','status','compass','topbtns'].forEach(id=>document.getElementById(id).style.opacity='1');
  document.getElementById('reticle').style.opacity='0.25';
  setTimeout(()=>document.getElementById('hint').style.opacity='0',9000);
}
document.querySelectorAll('.seasonbtn').forEach(b=> b.addEventListener('click',()=>startGame(b.dataset.s)) );
// 季節切替ボタンでも音色を更新
document.getElementById('seasonBtn').addEventListener('click',()=>{ if(audio) audio.season(curSeason); });

if(init()){ document.getElementById('loadnote').textContent='季節をえらんで はじめる'; animate(); }
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>オノディウス - ONODIUS</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; height:100%; height:100dvh;
    background:#02030a; overflow:hidden;
    font-family:-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Courier New', monospace;
    position:fixed; inset:0; touch-action:none; overscroll-behavior:none;
  }
  #wrap {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 35%, #0a1230 0%, #02030a 75%);
  }
  #game {
    display:block;
    background:#000;
    box-shadow:0 0 50px rgba(40,90,200,0.22), 0 0 0 1px rgba(80,140,255,0.12);
    touch-action:none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>

<script>
"use strict";
/* =========================================================================
   オノディウス ONODIUS  —  縦持ちiPhone向け 横スクロールSTG
   ・縦長キャンバス（敵は右→左へ流れる）
   ・操作：画面のどこをドラッグしても、その指の移動量だけ機体が相対移動
   ・ショット：画面に触れている間ずっと自動連射（指の下に機体を置く必要なし）
   ・UI：スタート/リスタートは pointerdown で確実に発火（Safari対応）
   ・パワーアップ（カプセル取得→自動でSPEED/MISSILE/DOUBLE/OPTION…が付与）
   ========================================================================= */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 内部解像度：縦長（9:16）。表示はCSSで画面にフィット
const W = 360, H = 640;
canvas.width = W; canvas.height = H;

let viewScale = 1, viewLeft = 0, viewTop = 0;
function fitCanvas(){
  const aw = window.innerWidth, ah = window.innerHeight;
  const scale = Math.min(aw / W, ah / H);
  const cw = Math.floor(W*scale), ch = Math.floor(H*scale);
  canvas.style.width = cw+'px';
  canvas.style.height = ch+'px';
  // タッチ座標→内部座標変換のために、実DOM位置を記録
  const r = canvas.getBoundingClientRect();
  viewScale = r.width / W;
  viewLeft = r.left; viewTop = r.top;
}
window.addEventListener('resize', ()=>{ fitCanvas(); });
window.addEventListener('orientationchange', ()=>{ setTimeout(fitCanvas,120); });
fitCanvas();
// レイアウト確定後に再計測（iOSのアドレスバー対策）
setTimeout(fitCanvas, 60);
setTimeout(fitCanvas, 300);

// =========================================================================
// 入力：ポインタ（タッチ/マウス共通）
//   - ドラッグの「移動量」を機体に相対加算
//   - 押している間は shooting=true
// =========================================================================
const ptr = {
  active:false,      // 触れているか（=連射する）
  id:null,
  lastX:0, lastY:0,  // 直近のポインタ位置（内部座標）
  dx:0, dy:0,        // このフレームでの移動量（内部座標）
  tapX:0, tapY:0,    // 押し始めの位置（UIボタン判定用）
  moved:false,
};
function toLocal(clientX, clientY){
  return { x:(clientX - viewLeft)/viewScale, y:(clientY - viewTop)/viewScale };
}
function onDown(clientX, clientY, id){
  ptr.active = true; ptr.id = id;
  const p = toLocal(clientX, clientY);
  ptr.lastX = p.x; ptr.lastY = p.y;
  ptr.tapX = p.x; ptr.tapY = p.y;
  ptr.dx = 0; ptr.dy = 0; ptr.moved = false;
  // UI操作（タイトル/ゲームオーバー/クリア）はここで処理
  handleUITap(p.x, p.y);
}
function onMove(clientX, clientY){
  if(!ptr.active) return;
  const p = toLocal(clientX, clientY);
  ptr.dx += (p.x - ptr.lastX);
  ptr.dy += (p.y - ptr.lastY);
  ptr.lastX = p.x; ptr.lastY = p.y;
  if(Math.abs(p.x-ptr.tapX)>4 || Math.abs(p.y-ptr.tapY)>4) ptr.moved = true;
}
function onUp(){
  ptr.active = false; ptr.id = null; ptr.dx = 0; ptr.dy = 0;
}

// Pointer Events（iOS Safari 13+対応）。無ければTouch/Mouseにフォールバック
if(window.PointerEvent){
  canvas.addEventListener('pointerdown', e=>{ e.preventDefault(); audioResume(); onDown(e.clientX, e.clientY, e.pointerId); }, {passive:false});
  canvas.addEventListener('pointermove', e=>{ e.preventDefault(); if(e.pointerId===ptr.id) onMove(e.clientX, e.clientY); }, {passive:false});
  canvas.addEventListener('pointerup',   e=>{ e.preventDefault(); if(e.pointerId===ptr.id) onUp(); }, {passive:false});
  canvas.addEventListener('pointercancel', e=>{ if(e.pointerId===ptr.id) onUp(); });
} else {
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); audioResume(); const t=e.changedTouches[0]; onDown(t.clientX,t.clientY,t.identifier); }, {passive:false});
  canvas.addEventListener('touchmove',  e=>{ e.preventDefault(); for(const t of e.changedTouches) if(t.identifier===ptr.id) onMove(t.clientX,t.clientY); }, {passive:false});
  canvas.addEventListener('touchend',   e=>{ e.preventDefault(); for(const t of e.changedTouches) if(t.identifier===ptr.id) onUp(); }, {passive:false});
  canvas.addEventListener('touchcancel', e=>{ for(const t of e.changedTouches) if(t.identifier===ptr.id) onUp(); });
  canvas.addEventListener('mousedown', e=>{ audioResume(); onDown(e.clientX,e.clientY,'m'); });
  window.addEventListener('mousemove', e=>{ if(ptr.id==='m') onMove(e.clientX,e.clientY); });
  window.addEventListener('mouseup',   e=>{ if(ptr.id==='m') onUp(); });
}
// キーボード（PCデバッグ用の最小対応）
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key]=true; if(e.key==='Enter'){ handleUITap(-1,-1,true);} });
window.addEventListener('keyup', e=>{ keys[e.key]=false; });

// =========================================================================
// ユーティリティ
// =========================================================================
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndi=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);

// =========================================================================
// 効果音
// =========================================================================
let actx=null;
function audioResume(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx && actx.state==='suspended') actx.resume(); }
function beep(freq,dur,type='square',vol=0.05,slide=0){ const a=actx; if(!a)return; const o=a.createOscillator(),g=a.createGain(); o.type=type;o.frequency.value=freq; if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide),a.currentTime+dur); g.gain.setValueAtTime(vol,a.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur); o.connect(g);g.connect(a.destination); o.start();o.stop(a.currentTime+dur); }
function noise(dur,vol=0.08){ const a=actx; if(!a)return; const n=a.sampleRate*dur; const buf=a.createBuffer(1,n,a.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n); const s=a.createBufferSource();s.buffer=buf; const g=a.createGain();g.gain.value=vol; s.connect(g);g.connect(a.destination); s.start(); }
const sfx={
  shot:()=>beep(880,0.05,'square',0.025,-300),
  laser:()=>beep(1200,0.10,'sawtooth',0.025,-500),
  explode:()=>noise(0.22,0.09),
  hit:()=>beep(200,0.08,'square',0.05,-100),
  power:()=>beep(660,0.10,'triangle',0.06,400),
  equip:()=>{beep(523,0.06,'triangle',0.06);setTimeout(()=>beep(784,0.09,'triangle',0.06),60);},
  pdead:()=>{noise(0.4,0.12);beep(300,0.5,'sawtooth',0.07,-250);},
  boss:()=>beep(110,0.5,'sawtooth',0.08),
};

// =========================================================================
// 背景（縦長・パララックス星 + 横に流れる波）
// =========================================================================
let layers=[];
function initStars(){
  layers=[];
  const conf=[{n:46,sp:22,sz:1,col:'#2a3a66'},{n:34,sp:48,sz:1,col:'#5570aa'},{n:20,sp:90,sz:2,col:'#aac2ff'}];
  for(const c of conf){ const arr=[]; for(let i=0;i<c.n;i++) arr.push({x:rnd(0,W),y:rnd(0,H),sp:c.sp,sz:c.sz,col:c.col}); layers.push(arr); }
}
initStars();
function updateStars(dt){ for(const arr of layers) for(const s of arr){ s.x-=s.sp*dt; if(s.x<0){ s.x=W; s.y=rnd(0,H);} } }
function drawStars(){ for(const arr of layers) for(const s of arr){ ctx.fillStyle=s.col; ctx.fillRect(s.x|0,s.y|0,s.sz,s.sz);} }

let waveT=0;
function drawWaves(){
  waveT+=0.02;
  for(let layer=0;layer<2;layer++){
    const baseY=H-16+layer*8, amp=4-layer, speed=1.4+layer*0.7;
    ctx.strokeStyle=layer===0?'rgba(60,120,200,0.18)':'rgba(40,80,160,0.12)';
    ctx.lineWidth=1; ctx.beginPath();
    for(let x=0;x<=W;x+=6){ const y=baseY+Math.sin(x*0.05+waveT*speed+layer)*amp; if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} ctx.stroke();
  }
}

// =========================================================================
// エンティティ
// =========================================================================
let bullets=[], enemies=[], eBullets=[], particles=[], powerups=[];

const player={
  x:70, y:H/2, w:22, h:16, alive:true, invincible:0,
  speedLv:0, speedMul:1,
  shotLv:0,        // 0=単発, 1=連射UP, 2=さらに連射, 3=貫通
  missileLv:0,     // 0=なし, 1=ミサイル, 2=2連射ミサイル
  doubleShot:false,
  laser:false,
  rear:false,      // 追撃砲（後方ショット）
  options:0,       // 0..4
  barrier:0,
  trail:[], shotCd:0, missileCd:0,
};
const MAX_SPEED=6, MAX_OPTION=4, MAX_SHOT=3, MAX_MISSILE=2;

let score=0, hiScore=0, lives=3, stage=1;
let state='title', stateT=0;
let bossActive=false, boss=null;

// =========================================================================
// パワーアップ：アイテムごとに種類があり、取ると対応する装備が付く
//   多段階強化。DOUBLEとLASERは共存可（二方向レーザーになる）
//   種類: SPEED / SHOT / MISSILE / DOUBLE / LASER / REAR / OPTION / SHIELD / LIFE
//   敵が落とすアイテムは「次に必要な種類」中心。たまにLIFEやランダムも出る
// =========================================================================
const ITEM_TYPES = ['SPEED','SHOT','MISSILE','DOUBLE','LASER','REAR','OPTION','SHIELD','LIFE'];

// このプレイヤーが「次に手に入れると嬉しい」種類を返す（敵のドロップ内容決定に使用）
function nextNeededType(){
  if(player.speedLv===0) return 'SPEED';
  if(player.shotLv===0) return 'SHOT';
  if(player.missileLv===0) return 'MISSILE';
  if(!player.doubleShot) return 'DOUBLE';
  if(!player.laser) return 'LASER';
  if(!player.rear) return 'REAR';
  if(player.options<MAX_OPTION) return 'OPTION';
  if(player.barrier<=0) return 'SHIELD';
  if(player.speedLv<MAX_SPEED) return 'SPEED';
  if(player.shotLv<MAX_SHOT) return 'SHOT';
  if(player.missileLv<MAX_MISSILE) return 'MISSILE';
  return player.barrier<=0 ? 'SHIELD' : 'SPEED';
}

// 指定された種類の装備を実際に付与する。戻り値は表示メッセージ
function applyItem(type){
  switch(type){
    case 'SPEED':
      if(player.speedLv<MAX_SPEED){ player.speedLv++; player.speedMul=1+player.speedLv*0.16; sfx.equip(); return 'SPEED '+player.speedLv; }
      score+=300; sfx.power(); return 'BONUS';
    case 'SHOT':
      if(player.shotLv<MAX_SHOT){ player.shotLv++; sfx.equip(); return player.shotLv===MAX_SHOT?'PIERCE!':'SHOT '+player.shotLv; }
      score+=300; sfx.power(); return 'BONUS';
    case 'MISSILE':
      if(player.missileLv<MAX_MISSILE){ player.missileLv++; sfx.equip(); return player.missileLv===2?'TWIN MISSILE':'MISSILE'; }
      score+=300; sfx.power(); return 'BONUS';
    case 'DOUBLE':
      if(!player.doubleShot){ player.doubleShot=true; sfx.equip(); return player.laser?'DBL LASER':'DOUBLE'; }
      score+=300; sfx.power(); return 'BONUS';
    case 'LASER':
      if(!player.laser){ player.laser=true; sfx.equip(); return player.doubleShot?'DBL LASER':'LASER'; }
      score+=300; sfx.power(); return 'BONUS';
    case 'REAR':
      if(!player.rear){ player.rear=true; sfx.equip(); return 'REAR GUN'; }
      score+=300; sfx.power(); return 'BONUS';
    case 'OPTION':
      if(player.options<MAX_OPTION){ player.options++; sfx.equip(); return 'OPTION '+player.options; }
      score+=300; sfx.power(); return 'BONUS';
    case 'SHIELD':
      player.barrier=4; sfx.equip(); return 'SHIELD';
    case 'LIFE':
      if(lives<6){ lives++; sfx.power(); return '1UP!'; }
      score+=1000; sfx.power(); return '+1000';
  }
  return 'BONUS';
}
let lastUpgradeMsg='', lastUpgradeT=0;

// =========================================================================
// 弾
// =========================================================================
function optionPos(i){ const delay=(i+1)*7; const idx=player.trail.length-1-delay; return idx>=0?player.trail[idx]:null; }

// 1つの発射点(fx,fy)からプレイヤーの現装備に応じた弾を撃つ
function fireFrom(fx, fy){
  const sl = player.shotLv;
  const dmg = 1 + (sl>=1?0:0);      // 基本威力（SHOTは主に連射と貫通で強化）
  const pierce = sl>=MAX_SHOT;       // 最大段で貫通
  // メインショット（段階で太さ・色が変わる）
  bullets.push({x:fx, y:fy, vx:520, vy:0, w:9+sl, h:3, dmg:1+Math.floor(sl/2), type:'shot', pierce, shotLv:sl});
  // DOUBLE：斜め上方向
  if(player.doubleShot){
    bullets.push({x:fx-2, y:fy-2, vx:430, vy:-220, w:7, h:3, dmg:1+Math.floor(sl/2), type:'shot', pierce, shotLv:sl});
  }
  // LASER：太い貫通ビーム（DOUBLEと共存。二方向レーザーになる）
  if(player.laser){
    bullets.push({x:fx, y:fy, vx:680, vy:0, w:28, h:3.5, dmg:2, type:'laser', pierce:true, life:0.5});
    if(player.doubleShot){
      // 二方向目のレーザー（斜め上）
      const a=-0.42, sp=680;
      bullets.push({x:fx, y:fy-2, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, w:24, h:3.5, dmg:2, type:'laser', pierce:true, life:0.5});
    }
  }
}

function playerShoot(){
  // 自機
  fireFrom(player.x+player.w, player.y);
  // 追撃砲（後方へ）
  if(player.rear){
    bullets.push({x:player.x-4, y:player.y, vx:-440, vy:0, w:9, h:3, dmg:1+Math.floor(player.shotLv/2), type:'rear', pierce:player.shotLv>=MAX_SHOT});
  }
  // オプション
  for(let i=0;i<player.options;i++){ const o=optionPos(i); if(o){
    fireFrom(o.x, o.y);
    if(player.rear) bullets.push({x:o.x-4, y:o.y, vx:-440, vy:0, w:9, h:3, dmg:1, type:'rear', pierce:player.shotLv>=MAX_SHOT});
  }}
  if(player.laser) sfx.laser(); else sfx.shot();
}
function playerMissile(){
  const launch=(x,y)=>{
    bullets.push({x:x+4, y:y+6, vx:150, vy:50, w:8, h:4, dmg:3, type:'missile', grav:true});
    if(player.missileLv>=2){ // 2連射：上方にも撃つ
      bullets.push({x:x+4, y:y-6, vx:150, vy:-50, w:8, h:4, dmg:3, type:'missile', grav:true, up:true});
    }
  };
  launch(player.x, player.y);
  for(let i=0;i<player.options;i++){ const o=optionPos(i); if(o) launch(o.x, o.y-6); }
}

// =========================================================================
// 敵
// =========================================================================
function spawnEnemy(type,x,y,opt={}){
  const d = opt.diff || diff();
  const e={x,y,t:0,hp:1,w:18,h:16,type,shootCd:rnd(0.6,1.8),score:100,dead:false};
  e.speedMul = d.enemySpeedMul;
  e.shootProb = d.enemyShootProb;
  e.bulletSpeed = d.enemyBulletSpeed;
  if(type==='fan'){ e.hp=1+d.hpBonus; e.vx=-95; e.score=120; }
  else if(type==='wave'){ e.hp=2+d.hpBonus; e.vx=-75; e.amp=rnd(28,52); e.freq=rnd(2,4); e.baseY=y; e.score=150; }
  else if(type==='diver'){ e.hp=2; e.vx=-65; e.score=160; e.locked=false; }
  else if(type==='bat'){ e.hp=1; e.vx=-120; e.score=130; }
  else if(type==='turret'){ e.hp=3+d.hpBonus; e.vx=-55; e.w=20; e.h=18; e.score=300; }
  else if(type==='carrier'){ e.hp=14+d.hpBonus*2; e.vx=-30; e.w=46; e.h=36; e.score=900; e.shootCd=1.4; e.popCd=2.4; }
  e.dropPower=!!opt.dropPower;
  e.dropLife=!!opt.dropLife;
  enemies.push(e);
}
function spawnSquad(y, d){
  d = d || diff();
  const n = d.squadSize;
  const leaderDrops = Math.random() < 0.7; // 編隊リーダーが落とす確率
  for(let i=0;i<n;i++) spawnEnemy('fan', W+24+i*24, y, {dropPower:(i===n-1 && leaderDrops), diff:d});
}

// =========================================================================
// 難易度カーブ（経過時間で連続的に難化）
//   序盤：敵は少なく・ゆっくり・撃ってこない
//   徐々に：出現が増え、速くなり、弾を撃つようになる
// =========================================================================
let gameTime = 0;        // プレイ開始からの累計秒（ボス戦中は加算停止）
let spawnTimer = 0;
let waveCount = 0;       // これまでに出した編隊数（ボス出現判定に使用）

function diff(){
  const x = Math.min(1, gameTime/180);
  const e = x*x; // ease-in
  return {
    spawnInterval: 2.8 - 1.7*e,
    enemySpeedMul: 0.55 + 0.85*e,
    enemyShootProb: Math.min(0.55, Math.max(0, (gameTime-15)/75) * (0.5+0.5*e)), // 15秒まで撃たない。立ち上がり緩やか・上限55%
    enemyBulletSpeed: 90 + 110*e,
    squadSize: Math.round(3 + 2*e),
    hpBonus: Math.floor(2*e),
    diverEnable: gameTime>25,    // 突っ込み型は25秒以降
    turretEnable: gameTime>18,   // 砲台は18秒以降
    carrierEnable: gameTime>70,  // 空母は70秒以降
  };
}

// 出現パターン（難易度に応じてランダム選択）
function spawnWave(){
  const d = diff();
  waveCount++;
  const r = Math.random();
  // 序盤は編隊中心。難易度が上がると種類が増える
  if(r < 0.42){
    // 編隊（パワーアップ持ち）
    spawnSquad(rndi(70, H-120), d);
  } else if(r < 0.62){
    // 波打ち
    const n = 2 + (gameTime>40?1:0);
    for(let i=0;i<n;i++) spawnEnemy('wave', W+20+i*16, rnd(100, H-160), {diff:d});
  } else if(r < 0.78 && d.turretEnable){
    spawnEnemy('turret', W+20, H-26, {diff:d});
    if(gameTime>50) spawnEnemy('turret', W+60, 30, {diff:d});
  } else if(r < 0.9 && d.diverEnable){
    const n = 2 + Math.round(2*Math.min(1,gameTime/120));
    for(let i=0;i<n;i++) spawnEnemy('diver', W+20+i*28, rndi(60, H-80), {diff:d});
  } else if(d.carrierEnable){
    spawnEnemy('carrier', W+30, rnd(120, H-160), {diff:d});
  } else {
    // フォールバック：バット群（弱い）
    for(let i=0;i<3;i++) spawnEnemy('bat', W+20+i*20, rnd(80,H-100), {diff:d});
  }
  // たまにパワーアップ持ちの単機を出す（取り損ねた人の救済）。頻度を下げる
  if(waveCount%6===0){ spawnEnemy('fan', W+20, rnd(80,H-100), {dropPower:true, diff:d}); }
  // まれにライフ回復を持つ特別な敵（光る空母）。ステージ中ごく稀
  if(waveCount%14===0 && gameTime>40){ spawnEnemy('carrier', W+30, rnd(120,H-160), {dropPower:true, dropLife:true, diff:d}); }
}

function startStage(s){ stage=s; bossActive=false; boss=null; state='playing'; stateT=0; }

// =========================================================================
// ボス
// =========================================================================
// =========================================================================
// ボス（ステージごとに姿と攻撃が変わる3体）
//   stage1: 機械要塞「カイガ」  — 砲台2基＋拡散弾／コアは普段閉じている
//   stage2: 生体兵器「モリガミ」 — 触手状の弾＋追尾弾、素早く動く
//   stage3: 殲滅兵器「ヒガ」     — 全部入り。レーザー薙ぎ払い＋全方位リング
// =========================================================================
const BOSS_DEF = {
  1:{ name:'機械要塞 カイガ', col1:'#8a9ab0', col2:'#3a4a60', core:'#ff6644', w:78, h:104 },
  2:{ name:'生体兵器 モリガミ', col1:'#7ac090', col2:'#2a6a3a', core:'#aaff66', w:84, h:112 },
  3:{ name:'重砲要塞 ドウゼン', col1:'#b09a6a', col2:'#5a4a20', core:'#ffaa44', w:88, h:118 },
  4:{ name:'変異獣 オロチ', col1:'#a070c0', col2:'#4a2a6a', core:'#dd66ff', w:92, h:126 },
  5:{ name:'侵食中枢 ゲンカク', col1:'#b83a4a', col2:'#3a0810', core:'#ff2255', w:230, h:440, FINAL:true },
};
function spawnBoss(s){
  bossActive=true; sfx.boss();
  const type = clamp(s,1,5);
  const def = BOSS_DEF[type];
  const isFinal = !!def.FINAL;
  const hp = isFinal ? 2800 : (150 + s*90);
  const H2v = def.h/2;
  let parts;
  if(isFinal){
    // 超巨大最終ボス：砲台6基。全部破壊すると怒りモードでコア露出
    parts=[];
    for(const dy of [-0.78,-0.47,-0.16,0.16,0.47,0.78]){
      parts.push({dx:-def.w*0.12, dy:H2v*dy, hp:45, max:45, dead:false, fireCd:rnd(0.8,2.2)});
    }
  } else {
    parts=[
      {dx:-6, dy:-H2v*0.62, hp:14+s*2, max:14+s*2, dead:false, fireCd:rnd(1,2)},
      {dx:-6, dy: H2v*0.62, hp:14+s*2, max:14+s*2, dead:false, fireCd:rnd(1,2)},
    ];
  }
  boss={
    x:W+(isFinal?260:100), y:H/2, w:def.w, h:def.h,
    hp, maxhp:hp, t:0, phase:0, enterDone:false,
    moveT:0, baseX: isFinal ? W-def.w*0.42 : W-def.w*0.62,
    def, type, stage:s, isFinal,
    fireCd:1.4, sweepCd:3.0, ringCd:3.5, laserCd:isFinal?2.5:5.0, laserOn:0, flash:0,
    coreOpen:0, coreTimer:rnd(2,3),
    intro:isFinal?3.0:1.2,
    rageMode:false,
    parts,
  };
}
function h2(def){ return def.h/2; }

function bossUpdate(dt){
  const b=boss; b.t+=dt;
  // 登場演出
  if(!b.enterDone){ b.x-=70*dt; if(b.x<=b.baseX){ b.x=b.baseX; b.enterDone=true;} if(b.intro>0)b.intro-=dt; return; }
  if(b.intro>0) b.intro-=dt;

  // ゆったり上下＋わずかに前後（生体型は速い、最終ボスは巨大なので中央付近で微動）
  b.moveT += dt*(b.type===2?1.4:(b.isFinal?0.5:0.9));
  const ampY = b.isFinal ? Math.max(8, (H - b.h)/2 + 30) : (H*0.26);
  b.y = H/2 + Math.sin(b.moveT)*ampY;
  b.x = b.baseX + Math.sin(b.moveT*0.7)*(b.isFinal?5:10);

  const ratio=b.hp/b.maxhp;
  // 最終ボスは4フェーズ、通常ボスは3フェーズ
  const newPhase = b.isFinal
    ? (ratio>0.7?0:(ratio>0.45?1:(ratio>0.2?2:3)))
    : (ratio>0.6?0:(ratio>0.3?1:2));
  if(newPhase>b.phase){ b.phase=newPhase; b.flash=0.35; sfx.hit(); }

  // コアの開閉。フェーズが上がるほど開いている時間が長い
  b.coreTimer -= dt;
  if(b.coreTimer<=0){
    if(b.coreOpen>0){ b.coreOpen=0; b.coreTimer=rnd(2.2-b.phase*0.5, 3-b.phase*0.5); }
    else { b.coreOpen=1; b.coreTimer=rnd(1.5+b.phase*0.6, 2.2+b.phase*0.8); }
  }
  const partsAllDead = b.parts.every(p=>p.dead);
  if(partsAllDead){ b.coreOpen=1; if(b.isFinal) b.rageMode=true; } // 砲台全破壊でコア露出（最終ボスは怒り）

  // 砲台の攻撃（生きているパーツのみ）
  for(const p of b.parts){ if(p.dead) continue;
    p.fireCd -= dt;
    if(p.fireCd<=0){
      p.fireCd = b.isFinal ? (1.4-b.phase*0.25) : (b.phase===0?1.8:(b.phase===1?1.3:0.95));
      const px=b.x+p.dx, py=b.y+p.dy;
      const a=Math.atan2(player.y-py,player.x-px);
      const sp=130+b.phase*25;
      const arc = b.isFinal ? 2 : 1; // 最終ボスは5発拡散
      for(let k=-arc;k<=arc;k++){ const aa=a+k*0.15; eBullets.push({x:px,y:py,vx:Math.cos(aa)*sp,vy:Math.sin(aa)*sp,w:6,h:6,col:'#ffcc55'}); }
    }
  }

  // 本体メイン砲（自機狙い拡散）
  b.fireCd-=dt;
  if(b.fireCd<=0){ b.fireCd=b.phase===0?1.3:(b.phase===1?0.95:0.7);
    const ang=Math.atan2(player.y-b.y,player.x-b.x), sp=150+b.phase*20;
    const spread = b.isFinal ? (2+b.phase) : (b.phase===2?2:1);
    for(let k=-spread;k<=spread;k++){ const a=ang+k*0.16; eBullets.push({x:b.x-b.w*0.3,y:b.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,w:7,h:7,col:b.def.core}); }
  }

  // タイプ別の必殺
  if(b.type===1){
    // 縦スイープ弾の壁
    b.sweepCd-=dt;
    if(b.sweepCd<=0){ b.sweepCd=b.phase===0?3.0:(b.phase===1?2.3:1.7);
      for(let y=20;y<H-16;y+=24){ if(Math.abs(y-player.y)>30 || b.phase>0) eBullets.push({x:b.x-b.w*0.4,y:y,vx:-150-b.phase*20,vy:0,w:7,h:7,col:'#ffaa44'}); }
    }
  } else if(b.type===2){
    // 追尾弾（ゆっくり曲がる）＋リング
    b.sweepCd-=dt;
    if(b.sweepCd<=0){ b.sweepCd=1.6;
      for(let k=0;k<3;k++){ const a=Math.atan2(player.y-b.y,player.x-b.x)+rnd(-0.4,0.4); eBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*120,vy:Math.sin(a)*120,w:6,h:6,col:'#aaff77',homing:0.6,life:4}); }
    }
    if(b.phase>=1){ b.ringCd-=dt; if(b.ringCd<=0){ b.ringCd=b.phase===2?2.0:3.0; const n=b.phase===2?18:14; for(let i=0;i<n;i++){ const a=(i/n)*Math.PI*2+b.t; eBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*110,vy:Math.sin(a)*110,w:6,h:6,col:'#88ee66'}); } } }
  } else if(b.type===3){
    // 重砲要塞：縦スイープ＋全方位リング
    b.sweepCd-=dt;
    if(b.sweepCd<=0){ b.sweepCd=b.phase===0?2.6:(b.phase===1?2.0:1.5);
      for(let y=20;y<H-16;y+=22) eBullets.push({x:b.x-b.w*0.4,y:y,vx:-160-b.phase*25,vy:0,w:7,h:7,col:'#ffaa44'});
    }
    b.ringCd-=dt;
    if(b.ringCd<=0){ b.ringCd=b.phase===2?2.2:3.2; const n=b.phase===2?16:12; for(let i=0;i<n;i++){ const a=(i/n)*Math.PI*2; eBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*120,vy:Math.sin(a)*120,w:6,h:6,col:'#ffcc55'}); } }
  } else if(b.type===4){
    // 変異獣：追尾弾＋回転リング＋たまにレーザー
    b.sweepCd-=dt;
    if(b.sweepCd<=0){ b.sweepCd=1.4;
      for(let k=0;k<4;k++){ const a=Math.atan2(player.y-b.y,player.x-b.x)+rnd(-0.5,0.5); eBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*125,vy:Math.sin(a)*125,w:6,h:6,col:'#dd88ff',homing:0.7,life:4}); }
    }
    b.ringCd-=dt;
    if(b.ringCd<=0){ b.ringCd=b.phase===2?1.8:2.6; const n=b.phase===2?20:14; for(let i=0;i<n;i++){ const a=(i/n)*Math.PI*2+b.t*1.5; eBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*115,vy:Math.sin(a)*115,w:6,h:6,col:'#cc66ff'}); } }
    if(b.phase>=2){ b.laserCd-=dt; if(b.laserCd<=0 && b.laserOn<=0){ b.laserCd=5.0; b.laserOn=1.0; b.laserAng=Math.atan2(player.y-b.y,player.x-b.x); } }
  } else {
    // 侵食中枢ゲンカク：考えられないほどの猛攻（4フェーズ）
    const ph=b.phase, rage=b.rageMode;
    // 二重の渦巻き弾（左右逆回転）。フェーズで密度増加
    b.ringCd-=dt;
    if(b.ringCd<=0){ b.ringCd=Math.max(0.5, (ph>=3?0.7:(ph>=2?1.0:(ph>=1?1.4:2.0))) - (rage?0.2:0));
      const arms = ph>=2?4:2;
      const per = ph>=3?5:3;
      for(let arm=0; arm<arms; arm++){
        for(let j=0;j<per;j++){
          const a = (arm/arms)*Math.PI*2 + b.t*1.6*(arm%2?1:-1) + j*0.12;
          const sp = 95 + j*14;
          eBullets.push({x:b.x-b.w*0.15,y:b.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,w:6,h:6,col:'#ff3366'});
        }
      }
    }
    // 高密度追尾弾
    b.sweepCd-=dt;
    if(b.sweepCd<=0){ b.sweepCd=ph>=3?0.8:(ph>=2?1.1:1.6);
      const n=ph>=2?5:3;
      for(let k=0;k<n;k++){ const a=Math.atan2(player.y-b.y,player.x-b.x)+rnd(-0.6,0.6); eBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*135,vy:Math.sin(a)*135,w:7,h:7,col:'#ff77aa',homing:0.85,life:5}); }
    }
    // 縦スイープの弾雨（フェーズ1から、隙間が自機を避けない＝避けにくい）
    if(ph>=1){
      b.fireCd2=(b.fireCd2||0)-dt;
      if(b.fireCd2<=0){ b.fireCd2=ph>=3?0.9:(ph>=2?1.2:1.8); const step=ph>=2?14:18; for(let y=10;y<H-8;y+=step) eBullets.push({x:b.x-b.w*0.4,y:y,vx:-200,vy:0,w:7,h:7,col:'#ffaa66'}); }
    }
    // 多重レーザー薙ぎ払い（フェーズ2以降は2本、フェーズ3は3本同時）
    b.laserCd-=dt;
    if(b.laserCd<=0 && b.laserOn<=0){
      b.laserCd=ph>=3?2.0:(ph>=2?2.6:3.4);
      b.laserOn=1.5; b.laserAng=Math.atan2(player.y-b.y,player.x-b.x);
      b.laserCount = ph>=3?3:(ph>=2?2:1);
    }
  }
  // レーザー照射中（薙ぎ払い）— 最終ボスは複数本
  if(b.laserOn>0){
    b.laserOn-=dt;
    b.laserAng += dt*(b.isFinal?0.5:0.6);
    if(player.alive && player.invincible<=0){
      const count = b.laserCount||1;
      for(let li=0; li<count; li++){
        const ang = b.laserAng + (li - (count-1)/2)*0.5;
        const dx=Math.cos(ang), dy=Math.sin(ang);
        const rx=player.x-b.x, ry=player.y-b.y;
        const proj=rx*dx+ry*dy;
        if(proj>0){ const perp=Math.abs(rx*dy-ry*dx); if(perp < (b.isFinal?15:8)){ killPlayer(); break; } }
      }
    }
  }
  if(b.flash>0) b.flash-=dt;
}
function drawBoss(){
  const b=boss, hit=b.flash>0, def=b.def;
  // レーザー（薙ぎ払い）— 本体描画より先に背面で。最終ボスは複数本
  if(b.laserOn>0){
    const len=800, count=b.laserCount||1;
    for(let li=0; li<count; li++){
      const ang = b.laserAng + (li - (count-1)/2)*0.5;
      const dx=Math.cos(ang), dy=Math.sin(ang);
      const grd=ctx.createLinearGradient(b.x,b.y,b.x+dx*len,b.y+dy*len);
      grd.addColorStop(0,'rgba(255,90,140,0.92)'); grd.addColorStop(1,'rgba(255,90,140,0)');
      ctx.strokeStyle=grd; ctx.lineWidth=(b.isFinal?18:6)+Math.sin(b.t*30)*2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x+dx*len,b.y+dy*len); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=b.isFinal?5:2;
      ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x+dx*len,b.y+dy*len); ctx.stroke();
    }
    ctx.lineCap='butt';
  }

  ctx.save(); ctx.translate(b.x,b.y);
  const W2=b.w/2, H2=b.h/2;

  // --- 後部スラスター光 ---
  ctx.fillStyle='rgba(120,160,255,0.3)';
  ctx.beginPath(); ctx.ellipse(W2-4,0,8,H2*0.5,0,0,Math.PI*2); ctx.fill();

  // --- 本体（タイプで形が違う） ---
  const bodyGrad=ctx.createLinearGradient(0,-H2,0,H2);
  if(hit){ bodyGrad.addColorStop(0,'#ffffff'); bodyGrad.addColorStop(1,'#ffdddd'); }
  else { bodyGrad.addColorStop(0,def.col1); bodyGrad.addColorStop(1,def.col2); }
  ctx.fillStyle=bodyGrad;

  if(b.type===1){
    // 機械要塞：角ばった装甲ブロック
    ctx.beginPath();
    ctx.moveTo(W2,-H2*0.4); ctx.lineTo(W2*0.3,-H2); ctx.lineTo(-W2*0.7,-H2);
    ctx.lineTo(-W2,-H2*0.5); ctx.lineTo(-W2,H2*0.5); ctx.lineTo(-W2*0.7,H2);
    ctx.lineTo(W2*0.3,H2); ctx.lineTo(W2,H2*0.4); ctx.closePath(); ctx.fill();
    // 装甲パネルの溝
    if(!hit){ ctx.strokeStyle='rgba(20,30,45,0.6)'; ctx.lineWidth=1.5;
      for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(-W2*0.7,i*H2*0.35); ctx.lineTo(W2*0.3,i*H2*0.35); ctx.stroke(); } }
    // 上面ハイライト
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(-W2*0.7,-H2,W2,5);
  } else if(b.type===2){
    // 生体兵器：丸みのある有機フォルム＋脈打つ表面
    ctx.beginPath();
    ctx.moveTo(W2,0);
    ctx.quadraticCurveTo(W2*0.6,-H2, -W2*0.3,-H2);
    ctx.quadraticCurveTo(-W2,-H2*0.6,-W2,0);
    ctx.quadraticCurveTo(-W2,H2*0.6,-W2*0.3,H2);
    ctx.quadraticCurveTo(W2*0.6,H2,W2,0);
    ctx.closePath(); ctx.fill();
    // 脈打つ斑点
    if(!hit){ for(let i=0;i<5;i++){ const a=b.t*1.5+i; const px=Math.cos(a)*W2*0.4, py=Math.sin(a*1.3)*H2*0.5;
      ctx.fillStyle=`rgba(150,255,120,${0.2+0.2*Math.sin(b.t*4+i)})`; ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill(); } }
  } else if(b.isFinal){
    // 侵食中枢ゲンカク：巨大な多重装甲＋中央の大コア＋複数の眼
    // 外殻
    ctx.beginPath();
    ctx.moveTo(W2,0);
    ctx.lineTo(W2*0.55,-H2*0.55); ctx.lineTo(W2*0.6,-H2);
    ctx.lineTo(-W2*0.4,-H2); ctx.lineTo(-W2,-H2*0.55);
    ctx.lineTo(-W2,H2*0.55); ctx.lineTo(-W2*0.4,H2);
    ctx.lineTo(W2*0.6,H2); ctx.lineTo(W2*0.55,H2*0.55);
    ctx.closePath(); ctx.fill();
    if(!hit){
      // 装甲の層を表す同心の縁
      ctx.strokeStyle='rgba(20,4,8,0.5)'; ctx.lineWidth=2;
      for(let k=1;k<=3;k++){ const s=1-k*0.18; ctx.beginPath(); ctx.ellipse(-W2*0.1,0,W2*0.7*s,H2*0.82*s,0,0,Math.PI*2); ctx.stroke(); }
      // 上下のハイライト
      ctx.fillStyle='rgba(255,200,200,0.18)'; ctx.fillRect(-W2*0.4,-H2,W2,8);
      // サブの眼（複数）
      for(const ey of [-H2*0.5, H2*0.5]){
        const eg=ctx.createRadialGradient(W2*0.1,ey,1,W2*0.1,ey,10);
        eg.addColorStop(0,'#fff'); eg.addColorStop(0.5,'#ff6688'); eg.addColorStop(1,'rgba(80,10,20,0)');
        ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(W2*0.1,ey,7+Math.sin(b.t*5)*2,0,Math.PI*2); ctx.fill();
      }
      // 縁のスパイク（多数）
      ctx.fillStyle=def.col2;
      for(let i=0;i<7;i++){ const sy=-H2+ (i+0.5)*(b.h/7); ctx.beginPath(); ctx.moveTo(-W2,sy-6); ctx.lineTo(-W2-12,sy); ctx.lineTo(-W2,sy+6); ctx.closePath(); ctx.fill(); }
    }
  } else {
    // 殲滅兵器系（type3,4）：鋭利な多角形＋スパイク
    ctx.beginPath();
    ctx.moveTo(W2,0); ctx.lineTo(W2*0.4,-H2*0.7); ctx.lineTo(W2*0.5,-H2);
    ctx.lineTo(-W2*0.5,-H2); ctx.lineTo(-W2,-H2*0.4); ctx.lineTo(-W2,H2*0.4);
    ctx.lineTo(-W2*0.5,H2); ctx.lineTo(W2*0.5,H2); ctx.lineTo(W2*0.4,H2*0.7); ctx.closePath(); ctx.fill();
    // スパイク
    if(!hit){ ctx.fillStyle=def.col2; for(const sy of [-H2*0.6,0,H2*0.6]){ ctx.beginPath(); ctx.moveTo(-W2,sy-5); ctx.lineTo(-W2-8,sy); ctx.lineTo(-W2,sy+5); ctx.closePath(); ctx.fill(); } }
  }
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1; ctx.stroke?0:0;

  // --- 破壊可能な砲台パーツ ---
  for(const p of b.parts){
    ctx.save(); ctx.translate(p.dx,p.dy);
    if(p.dead){
      // 破壊跡（黒い焦げ＋火花）
      ctx.fillStyle='#1a1010'; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
      if(Math.sin(b.t*20+p.dy)>0.7){ ctx.fillStyle='#ff8844'; ctx.beginPath(); ctx.arc(rnd(-3,3),rnd(-3,3),1.5,0,Math.PI*2); ctx.fill(); }
    } else {
      const hp=p.hp/p.max;
      const pg=ctx.createRadialGradient(-2,-2,1,0,0,8);
      pg.addColorStop(0,'#d8e0ea'); pg.addColorStop(1, hp>0.5?'#5a6a80':'#7a4a4a');
      ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
      // 砲身（自機方向）
      const a=Math.atan2(player.y-(b.y+p.dy),player.x-(b.x+p.dx));
      ctx.save(); ctx.rotate(a); ctx.fillStyle='#2a3242'; ctx.fillRect(0,-2,12,4); ctx.restore();
      ctx.strokeStyle='#1a2230'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.stroke();
      // ダメージ罅
      if(hp<0.5){ ctx.strokeStyle='#ff5544'; ctx.lineWidth=0.8; ctx.beginPath(); ctx.moveTo(-4,-3); ctx.lineTo(2,4); ctx.stroke(); }
    }
    ctx.restore();
  }

  // --- コア（弱点・開閉する） ---
  const cx=-W2*0.45;
  if(b.coreOpen>0){
    // 開：露出した脈動コア
    const pulse=0.6+0.4*Math.sin(b.t*8);
    // 装甲が開いた表現（上下のシャッター）
    ctx.fillStyle=def.col2;
    ctx.fillRect(cx-10,-16,20,5); ctx.fillRect(cx-10,11,20,5);
    // コア光
    const cg=ctx.createRadialGradient(cx,0,1,cx,0,12);
    cg.addColorStop(0,'#ffffff'); cg.addColorStop(0.4,def.core); cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,0,10+pulse*3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=def.core; ctx.beginPath(); ctx.arc(cx,0,6+pulse*1.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx,0,9,0,Math.PI*2); ctx.stroke();
  } else {
    // 閉：装甲ハッチ（ダメージが通りにくい表現）
    ctx.fillStyle=def.col2; ctx.beginPath(); ctx.arc(cx,0,11,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx-8,0); ctx.lineTo(cx+8,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,-8); ctx.lineTo(cx,8); ctx.stroke();
    ctx.fillStyle='rgba(255,80,60,0.5)'; ctx.beginPath(); ctx.arc(cx,0,2.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // --- HPバー＋名前 ---
  const bw=210,bh=7,bx=W/2-bw/2,by=14;
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
  ctx.fillStyle='#2a0a10';ctx.fillRect(bx,by,bw,bh);
  const grd=ctx.createLinearGradient(bx,0,bx+bw,0);
  grd.addColorStop(0,'#ff3344'); grd.addColorStop(0.5,'#ff8833'); grd.addColorStop(1,'#ffdd44');
  ctx.fillStyle=grd; ctx.fillRect(bx,by,bw*Math.max(0,b.hp/b.maxhp),bh);
  // フェーズ区切り線
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1;
  for(const r of [0.3,0.6]){ const lx=bx+bw*r; ctx.beginPath(); ctx.moveTo(lx,by); ctx.lineTo(lx,by+bh); ctx.stroke(); }
  ctx.fillStyle='#ffd0d0';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText(def.name, W/2, by+bh+11); ctx.textAlign='left';

  // --- 登場時の警告＆名前演出 ---
  if(b.intro>0){
    ctx.globalAlpha=clamp(b.intro,0,1);
    ctx.fillStyle='rgba(180,20,30,0.25)'; ctx.fillRect(0,H/2-46,W,92);
    ctx.fillStyle='#ff4455'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('━━ WARNING ━━', W/2, H/2-18);
    ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif';
    ctx.fillText(def.name, W/2, H/2+8);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  }
}

// =========================================================================
// ストーリー（オープニング／エンディング）
//   腫瘍内科医オノエタクマ。明石在住、実家は姫路。
//   増殖し人を蝕む脅威を、医師としての使命と重ねて迎え撃つ物語。
// =========================================================================
const OPENING = [
  { t:'西暦20XX年、明石。', s:'空に突如あらわれた異形の群れは、\n触れたものを侵し、増殖し、\n街をむしばみ始めた。' },
  { t:'腫瘍内科医、オノエタクマ。', s:'彼は知っていた。\n際限なく増えて宿主を蝕むものを、\n人がどう食い止めてきたかを。' },
  { t:'「これは、俺の戦ってきた病と同じだ。」', s:'姫路の実家も、明石の街も、\n侵されるのを待つしかないのか。\n——否。' },
  { t:'タクマ、出撃する。', s:'対侵食用試作機〈オノディウス〉。\nそのコックピットに身を沈め、\n彼は標的へ照準を合わせた。' },
];
const ENDING = [
  { t:'核、消失。', s:'増殖の中心〈源核〉は砕け散り、\n空をおおっていた影が晴れていく。' },
  { t:'寛解。', s:'侵食は止まり、街に光が戻った。\nタクマは静かに機体を降ろす。\nまるで、長い治療を終えたように。' },
  { t:'オノエタクマは、街を救った。', s:'明石の海も、姫路の家も、守られた。\n——病とたたかう日々は、明日も続く。\nそれでも彼は、また立ち向かう。' },
];
let storyPages=[], storyIdx=0, storyT=0, storyMode='';

function startStory(mode){
  storyMode=mode;
  storyPages = mode==='opening' ? OPENING : ENDING;
  storyIdx=0; storyT=0;
  state='story';
}
function advanceStory(){
  storyIdx++;
  storyT=0;
  if(storyIdx>=storyPages.length){
    if(storyMode==='opening'){ beginGameplay(); }
    else { state='clear'; stateT=0; }
  }
}

// =========================================================================
// パーティクル
// =========================================================================
function explode(x,y,col='#ffaa44',n=14,big=false){ sfx.explode(); for(let i=0;i<n;i++){ const a=rnd(0,Math.PI*2),sp=rnd(20,big?170:95); particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(0.3,0.7),t:0,col,sz:big?rnd(2,4):rnd(1,2)});}}

// =========================================================================
// プレイヤー状態
// =========================================================================
function resetPlayerState(full){
  player.x=70; player.y=H/2; player.alive=true; player.invincible=1.4; player.shotCd=0; player.missileCd=0; player.trail=[];
  if(full){ player.speedLv=0; player.speedMul=1; player.shotLv=0; player.missileLv=0; player.doubleShot=false; player.laser=false; player.rear=false; player.options=0; player.barrier=0; }
}
// タイトルから押されたら、まずオープニングへ
function newGame(){
  startStory('opening');
}
// オープニング後に実際のゲームを開始
function beginGameplay(){
  score=0; lives=3; stage=1;
  gameTime=0; spawnTimer=0; waveCount=0;
  bullets=[];enemies=[];eBullets=[];particles=[];powerups=[];
  resetPlayerState(true); initStars(); startStage(1);
}
function killPlayer(){
  if(player.invincible>0||!player.alive) return;
  if(player.barrier>0){ player.barrier=0; player.invincible=1.2; sfx.hit(); explode(player.x,player.y,'#66ccff',16); return; }
  player.alive=false; sfx.pdead(); explode(player.x,player.y,'#88ccff',28,true); lives--; state='dead'; stateT=0;
}

// =========================================================================
// UIタップ処理（状態に応じてスタート/リスタート）
// =========================================================================
function handleUITap(x,y,fromKey){
  if(state==='title'){ audioResume(); newGame(); }
  else if(state==='story'){ if(storyT>0.35) advanceStory(); }
  else if(state==='gameover'){ if(stateT>0.5) state='title'; }
  else if(state==='clear'){ if(stateT>0.8) state='title'; }
}

// =========================================================================
// 更新
// =========================================================================
function update(dt){
  updateStars(dt);
  if(state==='title'){ return; }
  if(state==='gameover'){ stateT+=dt; return; }
  if(state==='clear'){ stateT+=dt; return; }
  if(state==='stageclear'){ stateT+=dt; const wait=bossWasFinal?3.6:2.8; if(stateT>wait){ if(stage>=5){ startStory('ending'); } else { resetPlayerState(false); waveCount=0; spawnTimer=0; gameTime=Math.max(gameTime,(stage)*38); startStage(stage+1);} } return; }
  if(state==='story'){ storyT+=dt; return; }
  if(state==='dead'){ stateT+=dt; updateParticles(dt); updateEnemies(dt); updateEBullets(dt); if(stateT>1.4){ if(lives<0){ state='gameover'; stateT=0; if(score>hiScore)hiScore=score;} else { resetPlayerState(false); state='playing';} } return; }

  // ---- playing ----
  // 相対移動：このフレームでのポインタ移動量を機体へ加算（感度1.0=等倍）
  if(ptr.active){
    const sens = 1.05 * player.speedMul;
    player.x += ptr.dx * sens;
    player.y += ptr.dy * sens;
  }
  // キーボード補助（PC）
  const ksp = 240*player.speedMul*dt;
  if(keys['ArrowLeft'])player.x-=ksp; if(keys['ArrowRight'])player.x+=ksp;
  if(keys['ArrowUp'])player.y-=ksp; if(keys['ArrowDown'])player.y+=ksp;
  // フレームの移動量はここで消費
  ptr.dx=0; ptr.dy=0;

  player.x=clamp(player.x,8,W-30);
  player.y=clamp(player.y,12,H-12);

  player.trail.push({x:player.x+player.w*0.5,y:player.y});
  if(player.trail.length>200) player.trail.shift();

  // 自動連射：触れている間 or PCでスペース
  const firing = ptr.active || keys[' '] || keys['z'] || keys['Z'];
  player.shotCd-=dt;
  if(firing && player.shotCd<=0){ playerShoot(); const base=player.laser?0.18:0.13; player.shotCd=Math.max(0.07, base - player.shotLv*0.018); }
  if(player.missileLv>0){ player.missileCd-=dt; if(firing && player.missileCd<=0){ playerMissile(); player.missileCd=player.missileLv>=2?0.42:0.55; } }

  if(player.invincible>0) player.invincible-=dt;

  if(!bossActive){
    gameTime += dt;
    spawnTimer += dt;
    const d = diff();
    if(spawnTimer >= d.spawnInterval){ spawnTimer = 0; spawnWave(); }
    // 一定数の編隊を出したらボス（ステージ毎に必要数を増やす）
    const need = Math.min(22, 9 + stage*3);
    if(waveCount >= need && enemies.length<=2){ spawnBoss(stage); }
  }

  updateBullets(dt); updateEnemies(dt); updateEBullets(dt); updateParticles(dt); updatePowerups(dt);
  if(bossActive&&boss) bossUpdate(dt);
  collisions();
  if(lastUpgradeT>0) lastUpgradeT-=dt;
}
function updateBullets(dt){ for(const b of bullets){ if(b.grav)b.vy+=(b.up?-160:240)*dt; b.x+=b.vx*dt;b.y+=b.vy*dt; if(b.life!==undefined)b.life-=dt; } bullets=bullets.filter(b=>b.x<W+60&&b.x>-60&&b.y>-30&&b.y<H+30&&(b.life===undefined||b.life>0)); }
function updateEnemies(dt){
  for(const e of enemies){ e.t+=dt;
    const sm = e.speedMul||1, bs = e.bulletSpeed||120, sp = e.shootProb||0;
    if(e.type==='wave'){ e.x+=e.vx*sm*dt; e.y=e.baseY+Math.sin(e.t*e.freq)*e.amp; }
    else if(e.type==='diver'){ if(!e.locked&&e.x<W-50&&e.t>0.4){ e.locked=true; const a=Math.atan2(player.y-e.y,player.x-e.x); const ds=150*sm; e.vx=Math.cos(a)*ds; e.vy=Math.sin(a)*ds; } e.x+=e.vx*(e.locked?1:sm)*dt; e.y+=(e.vy||0)*dt; }
    else if(e.type==='bat'){ e.x+=e.vx*sm*dt; e.y+=Math.sin(e.t*7)*70*dt; }
    else if(e.type==='turret'){ e.x+=e.vx*sm*dt; e.shootCd-=dt; if(e.shootCd<=0&&e.x<W-10&&e.x>20&&Math.random()<sp+0.2){ e.shootCd=rnd(1.4,2.4); const a=Math.atan2(player.y-e.y,player.x-e.x); eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*bs,vy:Math.sin(a)*bs,w:6,h:6,col:'#ffcc44'});}}
    else if(e.type==='carrier'){ e.x+=e.vx*sm*dt; if(e.x<W-60){ e.shootCd-=dt; if(e.shootCd<=0){ e.shootCd=1.6; const a=Math.atan2(player.y-e.y,player.x-e.x); for(let k=-1;k<=1;k++){ const aa=a+k*0.2; eBullets.push({x:e.x-20,y:e.y,vx:Math.cos(aa)*bs,vy:Math.sin(aa)*bs,w:6,h:6,col:'#ff8844'});}} e.popCd-=dt; if(e.popCd<=0){ e.popCd=2.6; spawnEnemy('bat',e.x-10,e.y+rnd(-10,10),{diff:diff()}); }}}
    else { e.x+=e.vx*sm*dt; e.shootCd-=dt; if(e.shootCd<=0&&e.x<W-20&&Math.random()<sp){ e.shootCd=rnd(1.4,2.6); eBullets.push({x:e.x,y:e.y,vx:-bs,vy:0,w:6,h:6,col:'#ff6644'});}}
  }
  enemies=enemies.filter(e=>e.x>-50&&e.y>-40&&e.y<H+40);
}
function updateEBullets(dt){
  for(const b of eBullets){
    if(b.homing && player.alive){
      const a=Math.atan2(player.y-b.y,player.x-b.x);
      const ca=Math.atan2(b.vy,b.vx);
      const sp=Math.hypot(b.vx,b.vy);
      let na=ca + clamp(a-ca,-b.homing*dt*3,b.homing*dt*3);
      // 角度差の正規化
      let diff=a-ca; while(diff>Math.PI)diff-=2*Math.PI; while(diff<-Math.PI)diff+=2*Math.PI;
      na=ca+clamp(diff,-b.homing*dt*3,b.homing*dt*3);
      b.vx=Math.cos(na)*sp; b.vy=Math.sin(na)*sp;
    }
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.life!==undefined) b.life-=dt;
  }
  eBullets=eBullets.filter(b=>b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20&&(b.life===undefined||b.life>0));
}
function updateParticles(dt){ for(const p of particles){ p.t+=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.96;p.vy*=0.96; } particles=particles.filter(p=>p.t<p.life); }
function updatePowerups(dt){ for(const p of powerups){ p.x+=p.vx*dt; p.t+=dt; if(p.baseY!==undefined) p.y=p.baseY+Math.sin(p.t*3)*6; } powerups=powerups.filter(p=>p.x>-20); }

// =========================================================================
// 衝突判定
// =========================================================================
function aabb(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
function rectOf(e){ return {x:e.x-e.w/2,y:e.y-e.h/2,w:e.w,h:e.h}; }
function collisions(){
  for(const b of bullets){
    const bb={x:b.x,y:b.y-b.h/2,w:b.w,h:b.h};
    for(const e of enemies){ if(e.dead)continue;
      if(aabb(bb,rectOf(e))){ e.hp-=b.dmg; if(!b.pierce)b._hit=true;
        if(e.hp<=0){ e.dead=true; score+=e.score; explode(e.x,e.y,e.type==='carrier'?'#ffcc66':'#ff8844',e.type==='carrier'?22:12,e.type==='carrier'); if(e.dropPower){ let ty; if(e.dropLife) ty='LIFE'; else if(Math.random()<0.15) ty=ITEM_TYPES[rndi(0,7)]; else ty=nextNeededType(); powerups.push({x:e.x,y:e.y,vx:-50,vy:0,w:18,h:18,t:0,type:ty,baseY:e.y}); } }
        else particles.push({x:b.x,y:b.y,vx:rnd(-30,10),vy:rnd(-20,20),life:0.15,t:0,col:'#fff',sz:1});
        if(!b.pierce) break;
      }
    }
    if(bossActive&&boss&&boss.enterDone){
      let consumed=false;
      // まず破壊可能パーツ（砲台）への命中判定
      for(const p of boss.parts){ if(p.dead) continue;
        const pr2={x:boss.x+p.dx-9, y:boss.y+p.dy-9, w:18, h:18};
        if(aabb(bb,pr2)){
          p.hp-=b.dmg; boss.flash=0.04; if(!b.pierce){ b._hit=true; consumed=true; }
          particles.push({x:b.x,y:b.y,vx:rnd(-30,0),vy:rnd(-15,15),life:0.15,t:0,col:'#ffcc88',sz:1});
          if(p.hp<=0){ p.dead=true; score+=400; explode(boss.x+p.dx,boss.y+p.dy,'#ffaa55',16,true); }
          break;
        }
      }
      if(!consumed){
        const cx=boss.x-boss.w*0.45;
        const core={x:cx-8,y:boss.y-8,w:16,h:16};
        const body={x:boss.x-boss.w/2,y:boss.y-boss.h/2,w:boss.w,h:boss.h};
        if(boss.coreOpen>0 && aabb(bb,core)){
          // コアが開いている：大ダメージ
          boss.hp-=b.dmg*2.5; boss.flash=0.08; if(!b.pierce)b._hit=true;
          particles.push({x:b.x,y:b.y,vx:rnd(-40,0),vy:rnd(-25,25),life:0.25,t:0,col:'#ffee88',sz:2});
        } else if(aabb(bb,body)){
          // 装甲：わずかなダメージ＋火花（コア閉時はほぼ無効）
          boss.hp-=b.dmg*0.25; boss.flash=0.03; if(!b.pierce)b._hit=true;
          particles.push({x:b.x,y:b.y,vx:rnd(-30,0),vy:rnd(-15,15),life:0.12,t:0,col:'#cfe0ff',sz:1});
        }
      }
      if(boss.hp<=0) defeatBoss();
    }
  }
  bullets=bullets.filter(b=>!b._hit);
  enemies=enemies.filter(e=>!e.dead);
  if(!player.alive) return;
  // 当たり判定は見た目より小さいコア部分のみ（グラディウス的な被弾の緩さ）
  const hb = {w:player.w*0.5, h:player.h*0.5};
  const pr={x:player.x+player.w*0.25, y:player.y-hb.h/2, w:hb.w, h:hb.h};
  for(const b of eBullets){ const bb={x:b.x-b.w/2,y:b.y-b.h/2,w:b.w,h:b.h}; if(aabb(bb,pr)){ b._hit=true; killPlayer(); break; } }
  eBullets=eBullets.filter(b=>!b._hit);
  for(const e of enemies){ if(aabb(rectOf(e),pr)){ killPlayer(); explode(e.x,e.y,'#ff8844',10); e.dead=true; break; } }
  enemies=enemies.filter(e=>!e.dead);
  if(bossActive&&boss&&boss.enterDone){ const body={x:boss.x-boss.w/2,y:boss.y-boss.h/2,w:boss.w,h:boss.h}; if(aabb(body,pr)) killPlayer(); }
  for(const p of powerups){ if(aabb({x:p.x-p.w/2,y:p.y-p.h/2,w:p.w,h:p.h},pr)){ p._got=true; const name=applyItem(p.type); lastUpgradeMsg=name; lastUpgradeT=1.4; } }
  powerups=powerups.filter(p=>!p._got);
}
function defeatBoss(){
  const wasFinal=boss.isFinal;
  bossActive=false; const bx=boss.x,by=boss.y, bw=boss.w, bh=boss.h; boss=null;
  score+=wasFinal?30000:5000;
  if(wasFinal){
    // 巨大ボスの連鎖大爆発
    for(let i=0;i<26;i++) setTimeout(()=>explode(bx+rnd(-bw*0.4,bw*0.4), by+rnd(-bh*0.45,bh*0.45), ['#ffcc55','#ff6644','#ffffff'][i%3], 22, true), i*70);
    state='stageclear'; stateT=0; bossWasFinal=true;
  } else {
    for(let i=0;i<8;i++) setTimeout(()=>explode(bx+rnd(-30,30),by+rnd(-40,40),'#ffcc55',18,true),i*90);
    state='stageclear'; stateT=0; bossWasFinal=false;
  }
}
let bossWasFinal=false;

// =========================================================================
// 描画
// =========================================================================
function stageBgGrad(s){ const g=ctx.createLinearGradient(0,0,0,H); if(s===1){g.addColorStop(0,'#040814');g.addColorStop(1,'#081428');} else if(s===2){g.addColorStop(0,'#04120a');g.addColorStop(1,'#0a2014');} else {g.addColorStop(0,'#160408');g.addColorStop(1,'#280810');} return g; }

function drawPlayer(){
  if(!player.alive) return;
  if(player.invincible>0 && Math.floor(player.invincible*20)%2===0) return;
  const x=player.x,y=player.y;
  if(player.barrier>0){ ctx.strokeStyle='rgba(90,180,255,'+(0.4+0.3*Math.sin(performance.now()/100))+')'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x+player.w/2,y,22,0,Math.PI*2); ctx.stroke(); }
  ctx.save(); ctx.translate(x,y);
  const t=performance.now()/1000;
  // --- エンジン炎（後方・2基。ちらつき） ---
  for(const ey of [-4,4]){
    const fl=8+Math.sin(t*40+ey)*3+rnd(0,3);
    const fg=ctx.createLinearGradient(-10,0,-10-fl,0);
    fg.addColorStop(0,'rgba(255,255,255,0.95)'); fg.addColorStop(0.4,'rgba(120,200,255,0.85)'); fg.addColorStop(1,'rgba(40,90,220,0)');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.moveTo(-10,ey-2.2); ctx.lineTo(-10-fl,ey); ctx.lineTo(-10,ey+2.2); ctx.closePath(); ctx.fill();
  }
  // --- 主翼（下） 影 ---
  ctx.fillStyle='#13347a';
  ctx.beginPath(); ctx.moveTo(-6,2); ctx.lineTo(2,4); ctx.lineTo(-2,14); ctx.lineTo(-12,12); ctx.closePath(); ctx.fill();
  // --- 主翼（上） ---
  ctx.fillStyle='#2a6ad0';
  ctx.beginPath(); ctx.moveTo(-6,-2); ctx.lineTo(2,-4); ctx.lineTo(-2,-14); ctx.lineTo(-12,-12); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#6fa8f0';
  ctx.beginPath(); ctx.moveTo(-4,-4); ctx.lineTo(-1,-5); ctx.lineTo(-4,-11); ctx.lineTo(-9,-10); ctx.closePath(); ctx.fill();
  // --- 胴体（グラデーション・紡錘形） ---
  const bg=ctx.createLinearGradient(0,-7,0,7);
  bg.addColorStop(0,'#bcd8ff'); bg.addColorStop(0.5,'#5a8fe0'); bg.addColorStop(1,'#1a4090');
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.moveTo(26,0);             // 機首先端
  ctx.quadraticCurveTo(14,-6, -2,-6);
  ctx.lineTo(-12,-4);
  ctx.lineTo(-12,4);
  ctx.lineTo(-2,6);
  ctx.quadraticCurveTo(14,6, 26,0);
  ctx.closePath(); ctx.fill();
  // ハイライト（上面の照り）
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.moveTo(20,-1); ctx.quadraticCurveTo(8,-4,-6,-3.5); ctx.lineTo(-6,-2); ctx.quadraticCurveTo(8,-2,18,-0.5); ctx.closePath(); ctx.fill();
  // --- 機首の赤いライン ---
  ctx.strokeStyle='#ff5544'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(24,0); ctx.lineTo(8,0); ctx.stroke();
  // --- キャノピー（青緑のドーム） ---
  const cg=ctx.createLinearGradient(4,-3,4,3);
  cg.addColorStop(0,'#d8fff0'); cg.addColorStop(1,'#2aa0c0');

// 種類ごとの色・アイコン定義
const ITEM_STYLE = {
  SPEED:   {c1:'#44ddff', c2:'#0a6a9a', ic:'»'},
  SHOT:    {c1:'#ffe14a', c2:'#9a7a10', ic:'•'},
  MISSILE: {c1:'#ffaa44', c2:'#a05a10', ic:'▼'},
  DOUBLE:  {c1:'#66ff88', c2:'#1a8a3a', ic:'«'},
  LASER:   {c1:'#ff66dd', c2:'#a01a8a', ic:'─'},
  REAR:    {c1:'#aa88ff', c2:'#4a2a9a', ic:'«»'},
  OPTION:  {c1:'#ff9933', c2:'#a04a08', ic:'◍'},
  SHIELD:  {c1:'#88ccff', c2:'#2a6aaa', ic:'◇'},
  LIFE:    {c1:'#ff5577', c2:'#a01030', ic:'♥'},
};
function drawPowerups(){
  for(const p of powerups){
    const st = ITEM_STYLE[p.type] || ITEM_STYLE.SPEED;
    const pulse = 0.5+0.5*Math.sin(p.t*7);
    const r = p.w/2;
    ctx.save();
    ctx.translate(p.x, p.y);
    // 外側のグロー
    ctx.globalAlpha = 0.35+0.25*pulse;
    ctx.fillStyle = st.c1;
    ctx.beginPath(); ctx.arc(0,0,r+3+pulse*2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // 六角形カプセル本体（グラデーション）
    const g = ctx.createLinearGradient(0,-r,0,r);
    g.addColorStop(0, st.c1); g.addColorStop(1, st.c2);
    ctx.fillStyle = g;
    ctx.beginPath();
    for(let i=0;i<6;i++){ const a=Math.PI/6 + i*Math.PI/3; const px=Math.cos(a)*r, py=Math.sin(a)*r; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
    ctx.closePath(); ctx.fill();
    // 縁取り（点滅で目立たせる）
    ctx.strokeStyle = pulse>0.5?'#ffffff':st.c1; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<6;i++){ const a=Math.PI/6 + i*Math.PI/3; const px=Math.cos(a)*r, py=Math.sin(a)*r; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
    ctx.closePath(); ctx.stroke();
    // アイコン
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(st.ic, 0, 1);
    ctx.textBaseline='alphabetic'; ctx.textAlign='left';
    ctx.restore();
  }
}

// グラディウス式パワーメーター（画面下部）。即装備なので「点灯＝装備済み」を表示し、
// 直前に取得したセルをハイライト点滅させる
const METER = [
  {key:'SPEED',  label:'SPD'},
  {key:'SHOT',   label:'SHOT'},
  {key:'MISSILE',label:'MSL'},
  {key:'DOUBLE', label:'DBL'},
  {key:'LASER',  label:'LSR'},
  {key:'REAR',   label:'REAR'},
  {key:'OPTION', label:'OPT'},
  {key:'SHIELD', label:'?'},
];
function isOwned(key){
  if(key==='SPEED') return player.speedLv>0;
  if(key==='SHOT') return player.shotLv>0;
  if(key==='MISSILE') return player.missileLv>0;
  if(key==='DOUBLE') return player.doubleShot;
  if(key==='LASER') return player.laser;
  if(key==='REAR') return player.rear;
  if(key==='OPTION') return player.options>0;
  if(key==='SHIELD') return player.barrier>0;
  return false;
}
function drawPowerMeter(){
  const n=METER.length;
  const pad=4, gap=2;
  const cw=(W-pad*2-gap*(n-1))/n;
  const ch=16, y0=H-ch-5;
  for(let i=0;i<n;i++){
    const m=METER[i];
    const x=pad+i*(cw+gap);
    const owned=isOwned(m.key);
    const hot = lastUpgradeT>0 && lastUpgradeMsg.indexOf(m.label)===0;
    const blink = hot && Math.floor(performance.now()/100)%2===0;
    if(blink){ ctx.fillStyle='rgba(255,220,90,0.95)'; }
    else if(owned){ ctx.fillStyle='rgba(255,150,30,0.78)'; }
    else { ctx.fillStyle='rgba(18,28,55,0.78)'; }
    roundRect(x,y0,cw,ch,3); ctx.fill();
    ctx.strokeStyle = owned?'rgba(255,210,120,0.9)':'rgba(110,150,220,0.45)';
    ctx.lineWidth=1; roundRect(x+0.5,y0+0.5,cw-1,ch-1,3); ctx.stroke();
    ctx.fillStyle = (blink||owned)?'#201000':'#9fb5e0';
    ctx.font='bold 8px sans-serif'; ctx.textAlign='center';
    let lbl=m.label;
    if(m.key==='SPEED'&&player.speedLv>0) lbl=player.speedLv+'';
    else if(m.key==='SHOT'&&player.shotLv>0) lbl='SH'+player.shotLv;
    else if(m.key==='MISSILE'&&player.missileLv>0) lbl=player.missileLv>=2?'M2':'M';
    else if(m.key==='OPTION'&&player.options>0) lbl='O'+player.options;
    ctx.fillText(lbl, x+cw/2, y0+ch/2+3);
  }
  ctx.textAlign='left';
}

// タクマ機（戦闘機）のシルエットを描く（ストーリー演出用）。大きめ

function drawStory(){
  // 背景（オープニングは禍々しい赤紫、エンディングは夜明けの青）
  const g=ctx.createLinearGradient(0,0,0,H);
  if(storyMode==='opening'){ g.addColorStop(0,'#10040a'); g.addColorStop(1,'#1a0814'); }
  else { g.addColorStop(0,'#0a1024'); g.addColorStop(1,'#1a2c44'); }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  drawStars();
  if(storyMode==='ending') drawWaves();

  const page = storyPages[Math.min(storyIdx, storyPages.length-1)];
  const fade = clamp(storyT*1.4, 0, 1);

  // オープニング最終ページ：タクマが乗り込む機体を大きく表示
  const showShip = (storyMode==='opening' && storyIdx===storyPages.length-1) || (storyMode==='ending' && storyIdx>=1);
  if(showShip){
    ctx.globalAlpha=fade;
    const sx = storyMode==='ending' ? W*0.5 + Math.min(storyT*40,120) : W*0.5;
    drawHeroSilhouette(sx, H*0.42, 3.2);
    ctx.globalAlpha=1;
  }

  // 文章
  ctx.globalAlpha=fade;
  ctx.textAlign='center';
  ctx.fillStyle = storyMode==='opening' ? '#ff9aa8' : '#aad0ff';
  ctx.font='bold 18px "Hiragino Sans", sans-serif';
  // タイトル行（折り返し対応で中央に）
  wrapText(page.t, W/2, H*0.6, W-48, 24, true);
  ctx.fillStyle='#e8eef8';
  ctx.font='13px "Hiragino Sans", sans-serif';
  const lines = page.s.split('\n');
  let yy = H*0.66;
  for(const ln of lines){ ctx.fillText(ln, W/2, yy); yy+=20; }
  ctx.globalAlpha=1;

  // ページ進行ドット
  ctx.textAlign='center';
  for(let i=0;i<storyPages.length;i++){
    ctx.fillStyle = i===storyIdx ? '#ffffff' : 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(W/2 + (i-(storyPages.length-1)/2)*14, H-44, 3, 0, Math.PI*2); ctx.fill();
  }
  // タップ案内（点滅）
  if(storyT>0.4 && Math.floor(storyT*2)%2===0){
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='11px sans-serif';
    ctx.fillText(storyIdx<storyPages.length-1?'タップで次へ ▶':'タップで'+(storyMode==='opening'?'出撃':'タイトルへ')+' ▶', W/2, H-22);
  }
  ctx.textAlign='left';
}
// 簡易テキスト折り返し（中央揃え・主にタイトル用）
function wrapText(text, cx, y, maxW, lh, bold){
  const chars=[...text]; let line=''; const lines=[];
  for(const ch of chars){ const test=line+ch; if(ctx.measureText(test).width>maxW && line){ lines.push(line); line=ch; } else line=test; }
  if(line) lines.push(line);
  let yy=y - (lines.length-1)*lh/2;
  for(const ln of lines){ ctx.fillText(ln, cx, yy); yy+=lh; }
}

  ctx.fillStyle=g; ctx.fillText('ONODIUS',cx,cy);
  ctx.strokeStyle='rgba(180,220,255,0.6)';ctx.lineWidth=1; ctx.strokeText('ONODIUS',cx,cy);
  ctx.fillStyle='#8fc0ff';ctx.font='15px sans-serif'; ctx.fillText('オ ノ デ ィ ウ ス',cx,cy+28);
  ctx.fillStyle='#c88a9a';ctx.font='11px "Hiragino Sans", sans-serif'; ctx.fillText('― 増殖する脅威を断て ―',cx,cy+48);

  // スタートボタン（iPhone風）— 大きなタップ領域。状態に依らず常に光る帯
  const bw=210, bh=56, bx=cx-bw/2, by=H*0.56;
  const pulse=0.5+0.5*Math.sin(titleT*3);
  ctx.fillStyle=`rgba(40,110,240,${0.25+0.25*pulse})`;
  roundRect(bx,by,bw,bh,14); ctx.fill();
  ctx.strokeStyle=`rgba(150,200,255,${0.6+0.4*pulse})`;ctx.lineWidth=2; roundRect(bx,by,bw,bh,14); ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif'; ctx.fillText('タップしてスタート',cx,by+bh/2+7);

  // 操作説明
  ctx.fillStyle='#7fa0d0';ctx.font='12px sans-serif';
  ctx.fillText('画面をなぞって移動・触れている間は連射',cx,H*0.72);
  ctx.fillStyle='#9fb5e0';ctx.font='11px sans-serif';
  ctx.fillText('光るアイテムを取って機体を強化',cx,H*0.72+22);
  ctx.fillStyle='#ffb060';ctx.font='10px sans-serif';
  ctx.fillText('SPEED / SHOT / MISSILE / LASER / OPTION ...',cx,H*0.72+42);
  ctx.fillStyle='#5a7ab0';ctx.font='10px sans-serif';
  ctx.fillText('全5ステージ・序盤やさしく、進むほど手強い',cx,H*0.72+62);
  ctx.textAlign='left';
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawCenterMsg(title,sub){
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H/2-44,W,88);
  ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.font='bold 22px sans-serif';ctx.fillText(title,W/2,H/2);
  if(sub){ ctx.fillStyle='#aef';ctx.font='12px sans-serif';ctx.fillText(sub,W/2,H/2+24);} ctx.textAlign='left';
}

function render(){
  ctx.fillStyle=stageBgGrad(stage);ctx.fillRect(0,0,W,H);
  drawStars();
  if(stage===2){ ctx.fillStyle='rgba(20,60,30,0.5)'; ctx.beginPath();ctx.moveTo(0,H); for(let x=0;x<=W;x+=20)ctx.lineTo(x,H-10-10*Math.sin(x*0.02+waveT)); ctx.lineTo(W,H);ctx.fill(); }
  else if(stage===3){ ctx.fillStyle='rgba(120,30,20,0.4)';ctx.fillRect(0,H-12,W,12); for(let i=0;i<6;i++){ ctx.fillStyle='rgba(255,120,40,'+(0.2+0.2*Math.sin(performance.now()/300+i))+')'; ctx.fillRect((i*70+(performance.now()/40)%70)|0,H-14,28,3);} }
  drawWaves();
  drawPowerups(); drawBullets(); for(const e of enemies)drawEnemy(e); drawEBullets();
  if(bossActive&&boss)drawBoss();
  drawPlayer(); drawParticles();
  drawHUD();
  if(state==='stageclear') drawCenterMsg('STAGE '+stage+' CLEAR','次のエリアへ');
  if(state==='clear'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#aef';ctx.font='bold 24px sans-serif';ctx.fillText('ALL CLEAR!',W/2,H/2-38);
    ctx.fillStyle='#ffd070';ctx.font='12px sans-serif';ctx.fillText('全5ステージ制覇 — ゲンカク撃破',W/2,H/2-16);
    ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.fillText('SCORE '+score,W/2,H/2+6);
    ctx.fillStyle='#8fc0ff';ctx.font='11px sans-serif';ctx.fillText('街は守られた。おつかれさま。',W/2,H/2+28);
    if(Math.floor(stateT*2)%2===0){ ctx.fillStyle='#fff';ctx.font='13px sans-serif';ctx.fillText('タップでタイトルへ',W/2,H/2+54);} ctx.textAlign='left';
  }
  if(state==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#ff5566';ctx.font='bold 30px sans-serif';ctx.fillText('GAME OVER',W/2,H/2-10);
    ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.fillText('SCORE '+score,W/2,H/2+18);
    if(Math.floor(stateT*2)%2===0){ ctx.fillStyle='#aef';ctx.font='12px sans-serif';ctx.fillText('タップでタイトルへ',W/2,H/2+46);} ctx.textAlign='left';
  }
}

// =========================================================================
// メインループ
// =========================================================================
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  if(state==='title'){ drawTitle(); }
  else if(state==='story'){ update(dt); drawStory(); }
  else { update(dt); render(); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// テスト用フック（headless検証で参照。実プレイには影響なし）
window.__ONODIUS__ = {
  getState:()=>state,
  getPlayer:()=>player,
  counts:()=>({bullets:bullets.length,enemies:enemies.length,powerups:powerups.length,ebullets:eBullets.length}),
  tapStart:()=>handleUITap(W/2,H*0.58),
  step:(n,dt)=>{ for(let i=0;i<n;i++) update(dt||0.016); },
  setPointer:(active,dx,dy)=>{ ptr.active=active; ptr.dx=dx||0; ptr.dy=dy||0; },
  spawnTestEnemy:()=>spawnEnemy('fan',W-40,player.y,{dropPower:true}),
  forceUpgrade:()=>applyItem(nextNeededType()),
  getDiff:()=>diff(),
  getGameTime:()=>gameTime,
  setGameTime:(t)=>{ gameTime=t; },
  getWaveCount:()=>waveCount,
  isOwned:(k)=>isOwned(k),
  spawnBoss:(s)=>spawnBoss(s||stage),
  getBoss:()=>boss?{hp:boss.hp,maxhp:boss.maxhp,phase:boss.phase,enterDone:boss.enterDone,coreOpen:boss.coreOpen,parts:boss.parts.map(p=>({hp:p.hp,dead:p.dead})),type:boss.type,isFinal:!!boss.isFinal}:null,
  damageBossCore:(d)=>{ if(boss){ boss.coreOpen=1; boss.hp-=d; if(boss.hp<=0) defeatBoss(); } },
  nextItemType:()=>nextNeededType(),
  spawnTypedItem:(ty)=>{ powerups.push({x:player.x+5,y:player.y,vx:0,vy:0,w:18,h:18,t:0,type:ty,baseY:player.y}); },
  applyType:(ty)=>applyItem(ty),
  getStage:()=>stage,
  getLives:()=>lives,
  setStage:(s)=>{ stage=s; },
  itemTypes:()=>ITEM_TYPES.slice(),
  getStory:()=>({mode:storyMode, idx:storyIdx, total:storyPages.length}),
  setStoryT:(v)=>{ storyT=v; },
  beginGameplay:()=>beginGameplay(),
  bossName:(s)=>BOSS_DEF[clamp(s,1,5)].name,
};
</script>

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>海上 — Hai-Shang Solitaire</title>
<style>
:root {
  --bg-deep: #07151c;
  --bg-mid: #102232;
  --gold: #d4b46a;
  --gold-soft: #e3c886;
  --gold-bright: #ffd76a;
  --vermillion: #b91d36;
  --paper: #f4ead5;
  --jade: #0a6b3c;
  --ai: #1d4a78;
  --select: #ff9a3c;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
height: 100%;
font-family: “Hiragino Mincho ProN”, “YuMincho”, “Yu Mincho”, “Noto Serif JP”, serif;
background: var(–bg-deep);
color: var(–paper);
overflow: hidden;
user-select: none;
-webkit-user-select: none;
-webkit-tap-highlight-color: transparent;
}

body {
display: flex;
flex-direction: column;
background:
radial-gradient(ellipse at 50% 0%, var(–bg-mid) 0%, var(–bg-deep) 75%),
repeating-linear-gradient(45deg, transparent 0 6px, rgba(201,169,97,0.012) 6px 7px),
var(–bg-deep);
position: relative;
}

body::before {
content: “”;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse at 50% 110%, rgba(29,74,120,0.35), transparent 65%),
radial-gradient(ellipse at 80% 20%, rgba(212,180,106,0.05), transparent 50%);
pointer-events: none;
z-index: 0;
}

/* ============== ヘッダ ============== */
header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 20px;
border-bottom: 1px solid rgba(201,169,97,0.18);
background: rgba(0,0,0,0.4);
-webkit-backdrop-filter: blur(8px);
backdrop-filter: blur(8px);
position: relative;
z-index: 10;
gap: 12px;
}

.brand {
display: flex;
align-items: baseline;
gap: 10px;
flex-shrink: 0;
}

.brand h1 {
font-size: 20px;
font-weight: 600;
letter-spacing: 0.3em;
color: var(–gold);
text-shadow: 0 0 14px rgba(212,180,106,0.35);
}

.brand .sub {
font-size: 9px;
letter-spacing: 0.4em;
opacity: 0.45;
font-style: italic;
font-family: “Times New Roman”, serif;
color: var(–gold);
}

.level-badge {
display: flex;
flex-direction: column;
align-items: center;
border: 1px solid rgba(201,169,97,0.4);
padding: 4px 12px;
border-radius: 1px;
background: rgba(201,169,97,0.06);
}

.level-badge .level-num {
font-size: 9px;
letter-spacing: 0.3em;
opacity: 0.7;
}

.level-badge .level-name {
font-size: 13px;
color: var(–gold);
letter-spacing: 0.2em;
font-weight: 600;
margin-top: 1px;
}

.stats {
display: flex;
gap: 14px;
font-feature-settings: “tnum”;
flex-shrink: 0;
}

.stat { text-align: right; }
.stat .label {
opacity: 0.5;
font-size: 8px;
letter-spacing: 0.25em;
}
.stat .value {
color: var(–gold);
font-size: 15px;
font-weight: 600;
margin-top: 2px;
}

/* ============== 盤面 ============== */
main {
flex: 1;
position: relative;
overflow: hidden;
z-index: 1;
}

#board-wrapper {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
padding: 12px;
}

#board {
position: relative;
filter: drop-shadow(0 25px 50px rgba(0,0,0,0.55));
}

/* ============== 牌 ============== */
.tile {
position: absolute;
cursor: pointer;
transition:
transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
opacity 0.35s ease,
filter 0.15s ease;
will-change: transform;
}

.tile svg {
display: block;
width: 100%;
height: 100%;
pointer-events: none;
}

.tile.removed {
opacity: 0;
transform: translateY(-40px) scale(0.3) rotate(35deg);
pointer-events: none;
filter: brightness(2.2) saturate(1.6);
transition: all 0.55s cubic-bezier(0.5, -0.3, 0.7, 0.7);
}

/* ============== ペア消去エフェクト ============== */
.match-burst {
position: absolute;
pointer-events: none;
z-index: 10000;
}

.burst-flash {
position: absolute;
inset: -25%;
background: radial-gradient(circle, rgba(255,230,140,0.95) 0%, rgba(255,180,60,0.5) 35%, transparent 70%);
border-radius: 50%;
animation: burstFlash 0.55s ease-out forwards;
}

@keyframes burstFlash {
0%   { transform: scale(0.2); opacity: 1; }
60%  { transform: scale(1.3); opacity: 0.9; }
100% { transform: scale(2.0); opacity: 0; }
}

.burst-ring {
position: absolute;
inset: 0;
border: 3px solid #ffe48a;
border-radius: 50%;
box-shadow:
0 0 24px #ffd76a,
0 0 48px rgba(255,200,80,0.7),
inset 0 0 16px rgba(255,230,140,0.6);
animation: burstRing 0.8s cubic-bezier(0.16, 0.84, 0.44, 1) forwards;
}

@keyframes burstRing {
0%   { transform: scale(0.2); opacity: 1; border-width: 4px; }
60%  { opacity: 0.9; border-width: 2px; }
100% { transform: scale(2.6); opacity: 0; border-width: 1px; }
}

.burst-ring2 {
position: absolute;
inset: 0;
border: 2px solid rgba(255,255,255,0.85);
border-radius: 50%;
animation: burstRing2 0.65s ease-out 0.08s forwards;
opacity: 0;
}

@keyframes burstRing2 {
0%   { transform: scale(0.5); opacity: 0.95; }
100% { transform: scale(3.2); opacity: 0; }
}

.burst-particle {
position: absolute;
width: 9px;
height: 9px;
left: 50%;
top: 50%;
margin-left: -4.5px;
margin-top: -4.5px;
background: radial-gradient(circle, #fff8d8 0%, #ffd76a 50%, transparent 80%);
border-radius: 50%;
box-shadow: 0 0 10px #ffd76a, 0 0 18px rgba(255,200,80,0.6);
animation: burstParticle 0.9s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
}

@keyframes burstParticle {
0%   { transform: translate(0, 0) scale(0.5); opacity: 1; }
70%  { opacity: 1; }
100% { transform: translate(var(–dx), var(–dy)) scale(0.2); opacity: 0; }
}

.burst-star {
position: absolute;
left: 50%;
top: 50%;
font-size: 18px;
color: #ffe48a;
text-shadow:
0 0 10px #ffd76a,
0 0 22px rgba(255,200,80,0.85);
font-weight: 700;
animation: burstStar 1s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
}

@keyframes burstStar {
0%   { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
20%  { transform: translate(-50%, -50%) scale(1.3) rotate(90deg); opacity: 1; }
100% { transform: translate(calc(-50% + var(–dx)), calc(-50% + var(–dy))) scale(0.3) rotate(540deg); opacity: 0; }
}

/* 2牌を結ぶ光のライン */
.match-line {
position: absolute;
height: 4px;
background: linear-gradient(
to right,
transparent 0%,
rgba(255,215,100,0.9) 18%,
#fffaee 50%,
rgba(255,215,100,0.9) 82%,
transparent 100%
);
border-radius: 2px;
pointer-events: none;
z-index: 9998;
box-shadow:
0 0 14px rgba(255,215,100,1),
0 0 28px rgba(255,200,80,0.7);
scale: 0 1;
animation: matchLine 0.7s cubic-bezier(0.16, 0.84, 0.44, 1) forwards;
}

@keyframes matchLine {
0%   { scale: 0 1;   opacity: 0; }
25%  { scale: 1 2;   opacity: 1; }
60%  { scale: 1 1.5; opacity: 1; }
100% { scale: 1 0.3; opacity: 0; }
}

/* 全体の白フラッシュ(マッチ瞬間) */
.match-flash-screen {
position: absolute;
inset: 0;
background: radial-gradient(ellipse at center, rgba(255,230,140,0.18), transparent 60%);
pointer-events: none;
z-index: 9997;
animation: screenFlash 0.4s ease-out forwards;
}

@keyframes screenFlash {
0%   { opacity: 0; }
20%  { opacity: 1; }
100% { opacity: 0; }
}

.tile.locked {
filter: brightness(0.55) saturate(0.45) contrast(0.95);
cursor: default;
}

.tile.free:hover {
transform: translate(-1px, -3px);
filter: brightness(1.06);
}

/* ===== 選択状態:5重の視覚効果 ===== */
/* (1) 大きく持ち上げる + (2) 拡大 */
.tile.selected {
transform: translate(-2px, -12px) scale(1.08);
z-index: 9999 !important;
animation: selectFloat 1.4s ease-in-out infinite;
}

/* (3) 周囲に光る金色の太枠 */
.tile.selected::before {
content: “”;
position: absolute;
inset: -5px;
border: 2.5px solid var(–gold-bright);
border-radius: 9px;
background: rgba(255, 215, 100, 0.08);
box-shadow:
0 0 24px rgba(255, 180, 60, 0.85),
0 0 48px rgba(255, 180, 60, 0.4),
inset 0 0 12px rgba(255, 215, 100, 0.3);
pointer-events: none;
animation: selectPulse 1.2s ease-in-out infinite;
}

/* (4) 上部に印 ✦ */
.tile.selected::after {
content: “✦”;
position: absolute;
top: -22px;
left: 50%;
transform: translateX(-50%);
color: var(–gold-bright);
font-size: 22px;
font-weight: 600;
text-shadow:
0 0 8px rgba(255, 215, 100, 1),
0 0 16px rgba(255, 180, 60, 0.7);
pointer-events: none;
animation: selectMark 1s ease-in-out infinite;
}

/* (5) 牌そのものを暖色に染める */
.tile.selected svg {
filter:
drop-shadow(0 0 8px rgba(255, 200, 80, 0.8))
saturate(1.15)
brightness(1.05);
}

@keyframes selectFloat {
0%, 100% { transform: translate(-2px, -12px) scale(1.08); }
50%      { transform: translate(-2px, -15px) scale(1.09); }
}

@keyframes selectPulse {
0%, 100% {
box-shadow:
0 0 18px rgba(255, 180, 60, 0.7),
0 0 36px rgba(255, 180, 60, 0.3),
inset 0 0 10px rgba(255, 215, 100, 0.25);
border-color: var(–gold-bright);
}
50% {
box-shadow:
0 0 32px rgba(255, 180, 60, 1),
0 0 60px rgba(255, 180, 60, 0.55),
inset 0 0 16px rgba(255, 215, 100, 0.45);
border-color: #ffe48a;
}
}

@keyframes selectMark {
0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); opacity: 0.9; }
50%      { transform: translateX(-50%) translateY(-3px) rotate(180deg); opacity: 1; }
}

.tile.hint {
animation: hintPulse 0.6s ease-in-out 4;
}

@keyframes hintPulse {
0%, 100% { filter: none; }
50% { filter: drop-shadow(0 0 18px rgba(255,210,90,1)) brightness(1.1); }
}

/* ============== フッタ ============== */
footer {
display: flex;
gap: 8px;
justify-content: center;
flex-wrap: wrap;
padding: 12px;
background: rgba(0,0,0,0.4);
border-top: 1px solid rgba(201,169,97,0.18);
-webkit-backdrop-filter: blur(8px);
backdrop-filter: blur(8px);
position: relative;
z-index: 10;
}

button {
font-family: inherit;
background: transparent;
border: 1px solid var(–gold);
color: var(–gold);
padding: 8px 16px;
font-size: 11.5px;
letter-spacing: 0.22em;
cursor: pointer;
border-radius: 1px;
transition: all 0.2s;
position: relative;
}

button:hover {
background: var(–gold);
color: var(–bg-deep);
}
button:active { transform: scale(0.96); }

button.primary {
background: var(–gold);
color: var(–bg-deep);
font-weight: 600;
}
button.primary:hover {
background: var(–gold-soft);
}

/* ============== オーバーレイ ============== */
.overlay {
position: absolute;
inset: 0;
background: rgba(0,0,0,0.88);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 100;
opacity: 0;
pointer-events: none;
transition: opacity 0.4s;
-webkit-backdrop-filter: blur(8px);
backdrop-filter: blur(8px);
padding: 20px;
overflow: hidden;
}

.overlay.show {
opacity: 1;
pointer-events: auto;
}

/* 成功時の派手な背景 */
.overlay.success {
background:
radial-gradient(ellipse at 50% 50%, rgba(255,200,80,0.22) 0%, rgba(40,30,90,0.4) 35%, rgba(0,0,0,0.92) 75%);
}

.overlay-rays {
position: absolute;
width: 200vmax;
height: 200vmax;
left: 50%;
top: 50%;
background:
repeating-conic-gradient(
from 0deg,
transparent 0deg,
rgba(255,210,100,0.13) 2deg,
transparent 7deg,
rgba(255,200,80,0.07) 11deg,
transparent 22deg
);
transform: translate(-50%, -50%);
opacity: 0;
mix-blend-mode: screen;
pointer-events: none;
}

.overlay.success .overlay-rays {
opacity: 0.85;
animation: overlayRays 35s linear infinite, overlayRayFade 0.8s 0.2s forwards;
}

@keyframes overlayRays {
0%   { transform: translate(-50%, -50%) rotate(0deg); }
100% { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes overlayRayFade {
from { opacity: 0; }
to   { opacity: 0.85; }
}

.overlay-fx {
position: absolute;
inset: 0;
pointer-events: none;
overflow: hidden;
}

.overlay-content {
position: relative;
z-index: 5;
display: flex;
flex-direction: column;
align-items: center;
text-align: center;
}

.overlay-mark {
font-size: 70px;
margin-bottom: 8px;
font-weight: 600;
letter-spacing: 0.1em;
font-family: “Hiragino Mincho ProN”, “YuMincho”, serif;
padding-left: 0.1em;
line-height: 1;
}

.overlay.success .overlay-mark {
background: linear-gradient(
135deg,
#fff8d8 0%,
#ffe48a 25%,
#ffd76a 45%,
#c9a961 55%,
#ffd76a 65%,
#ffe48a 80%,
#fff8d8 100%
);
background-size: 250% 250%;
-webkit-background-clip: text;
background-clip: text;
-webkit-text-fill-color: transparent;
filter:
drop-shadow(0 0 18px rgba(255,200,80,0.85))
drop-shadow(0 0 36px rgba(255,180,60,0.4));
animation:
markReveal 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) both,
markShimmer 3.5s linear infinite 1.1s;
}

.overlay:not(.success) .overlay-mark {
color: var(–gold);
opacity: 0.7;
font-weight: 200;
}

@keyframes markReveal {
0%   { opacity: 0; transform: scale(0.2) rotate(-12deg); filter: drop-shadow(0 0 60px gold) blur(16px); }
60%  { opacity: 1; transform: scale(1.18) rotate(4deg); filter: drop-shadow(0 0 40px gold) blur(0); }
85%  { transform: scale(0.96) rotate(-2deg); }
100% { opacity: 1; transform: scale(1) rotate(0); filter: drop-shadow(0 0 18px rgba(255,200,80,0.85)) drop-shadow(0 0 36px rgba(255,180,60,0.4)); }
}

@keyframes markShimmer {
0%   { background-position: 0% 0%; }
100% { background-position: 250% 0%; }
}

.overlay h2 {
font-size: 34px;
letter-spacing: 0.45em;
color: var(–gold);
margin-bottom: 12px;
font-weight: 500;
text-shadow: 0 0 22px rgba(212,180,106,0.45);
text-align: center;
padding-left: 0.45em;
}

.overlay.success h2 {
opacity: 0;
animation: contentFadeUp 0.8s 1.2s forwards;
}

.overlay p {
font-size: 14px;
letter-spacing: 0.25em;
margin-bottom: 24px;
opacity: 0.75;
text-align: center;
font-feature-settings: “tnum”;
}

.overlay.success p {
opacity: 0;
animation: contentFadeUp 0.7s 1.5s forwards;
}

@keyframes contentFadeUp {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}

.overlay-buttons {
display: flex;
gap: 10px;
flex-wrap: wrap;
justify-content: center;
}

.overlay.success .overlay-buttons {
opacity: 0;
animation: contentFadeUp 0.7s 1.8s forwards;
}

.overlay-buttons button {
padding: 11px 24px;
font-size: 12px;
}

.overlay.success .overlay-buttons button.primary {
box-shadow:
0 0 22px rgba(255,200,80,0.5),
inset 0 0 10px rgba(255,255,255,0.25);
animation: primaryGlow 2.5s ease-in-out infinite 2.5s;
}

@keyframes primaryGlow {
0%, 100% { box-shadow: 0 0 22px rgba(255,200,80,0.5), inset 0 0 10px rgba(255,255,255,0.25); }
50%      { box-shadow: 0 0 38px rgba(255,200,80,0.9), inset 0 0 14px rgba(255,255,255,0.45); }
}

/* 上昇する金色粒子 */
.overlay-particle {
position: absolute;
width: 7px;
height: 7px;
background: radial-gradient(circle, #fff4c0 0%, #ffd76a 40%, transparent 75%);
border-radius: 50%;
animation: overlayParticleRise linear infinite;
filter: blur(0.4px);
}

@keyframes overlayParticleRise {
0%   { transform: translateY(110vh) scale(0.4); opacity: 0; }
10%  { opacity: 1; }
90%  { opacity: 1; }
100% { transform: translateY(-50px) scale(0.7); opacity: 0; }
}

.overlay-spark {
position: absolute;
font-size: 14px;
color: #ffe48a;
text-shadow: 0 0 8px rgba(255,200,80,0.95);
animation: sparkTwinkle ease-in-out infinite;
pointer-events: none;
}

@keyframes sparkTwinkle {
0%, 100% { opacity: 0; transform: scale(0.4) rotate(0deg); }
50%      { opacity: 1; transform: scale(1.1) rotate(180deg); }
}

/* ============== レベル選択モーダル / ホーム画面 ============== */
.level-modal {
position: absolute;
inset: 0;
background:
radial-gradient(ellipse at 50% 30%, rgba(29,74,120,0.5), transparent 60%),
rgba(0,0,0,0.94);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 200;
opacity: 0;
pointer-events: none;
transition: opacity 0.4s;
-webkit-backdrop-filter: blur(12px);
backdrop-filter: blur(12px);
padding: 20px;
overflow-y: auto;
}

.level-modal.show {
opacity: 1;
pointer-events: auto;
}

/* ホーム画面のヒーロー部分 */
.home-hero {
text-align: center;
margin-bottom: 28px;
display: none;
}

.level-modal.is-home .home-hero {
display: block;
}

.level-modal.is-home .modal-title {
display: none;
}

.home-hero .home-title {
font-size: 56px;
letter-spacing: 0.45em;
color: var(–gold);
font-weight: 600;
text-shadow:
0 0 24px rgba(212,180,106,0.5),
0 0 48px rgba(212,180,106,0.2);
margin-bottom: 6px;
padding-left: 0.45em;
}

.home-hero .home-sub {
font-size: 11px;
letter-spacing: 0.6em;
opacity: 0.55;
font-style: italic;
font-family: “Times New Roman”, serif;
color: var(–gold);
margin-bottom: 10px;
padding-left: 0.6em;
}

.home-hero .home-tagline {
font-size: 12px;
letter-spacing: 0.25em;
opacity: 0.65;
margin-top: 14px;
}

.home-hero .home-divider {
display: flex;
align-items: center;
justify-content: center;
gap: 14px;
margin: 18px auto 0;
max-width: 280px;
opacity: 0.55;
}

.home-hero .home-divider::before,
.home-hero .home-divider::after {
content: “”;
flex: 1;
height: 1px;
background: linear-gradient(to right, transparent, rgba(212,180,106,0.5), transparent);
}

.home-hero .home-divider span {
font-size: 10px;
letter-spacing: 0.5em;
color: var(–gold);
padding-left: 0.5em;
}

.modal-title {
font-size: 28px;
letter-spacing: 0.4em;
color: var(–gold);
margin-bottom: 28px;
font-weight: 500;
}

.level-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 14px;
max-width: 720px;
width: 100%;
margin-bottom: 24px;
}

.level-card {
border: 1px solid rgba(212,180,106,0.35);
background: rgba(212,180,106,0.04);
padding: 16px 12px;
cursor: pointer;
transition: all 0.2s;
text-align: center;
position: relative;
}

.level-card:hover {
background: rgba(212,180,106,0.15);
border-color: var(–gold);
transform: translateY(-2px);
}

.level-card .lv {
font-size: 9px;
letter-spacing: 0.35em;
opacity: 0.55;
}

.level-card .name {
font-size: 22px;
letter-spacing: 0.25em;
color: var(–gold);
margin: 6px 0 4px;
font-weight: 600;
padding-left: 0.25em;
}

.level-card .info {
font-size: 10px;
opacity: 0.55;
letter-spacing: 0.1em;
}

.level-card.cleared::after {
content: “✦”;
position: absolute;
top: 6px;
right: 8px;
color: var(–gold);
font-size: 14px;
}

.level-card.current {
border-color: var(–gold);
background: rgba(212,180,106,0.18);
box-shadow: 0 0 18px rgba(212,180,106,0.3);
}

#close-modal-btn {
display: block;
}

.level-modal.is-home #close-modal-btn {
display: none;
}

/* ==============================================================

- エンディング(Lv7クリア時の派手演出)
- ============================================================== */
  .ending {
  position: absolute;
  inset: 0;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s;
  overflow: hidden;
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
  }

.ending.show {
opacity: 1;
pointer-events: auto;
}

/* 背景: 深い藍 → 中央が金色に光る */
.ending-bg {
position: absolute;
inset: 0;
background:
radial-gradient(ellipse at 50% 55%, rgba(255,210,100,0.55) 0%, rgba(180,90,40,0.35) 25%, rgba(40,30,90,0.85) 60%, rgba(8,15,30,0.98) 100%);
animation: endingBgPulse 5s ease-in-out infinite alternate;
}

@keyframes endingBgPulse {
0%   { filter: brightness(0.95) hue-rotate(0deg); }
100% { filter: brightness(1.15) hue-rotate(20deg); }
}

/* 中央から放射する光線 */
.ending-rays {
position: absolute;
width: 220vmax;
height: 220vmax;
left: 50%;
top: 50%;
background:
repeating-conic-gradient(
from 0deg,
transparent 0deg,
rgba(255,210,100,0.18) 1.5deg,
transparent 5deg,
rgba(255,200,80,0.09) 9deg,
transparent 18deg
);
animation: rayRotate 40s linear infinite;
opacity: 0;
transform: translate(-50%, -50%);
mix-blend-mode: screen;
}

.ending.show .ending-rays {
opacity: 0.7;
transition: opacity 1.5s 0.3s;
}

@keyframes rayRotate {
0%   { transform: translate(-50%, -50%) rotate(0deg); }
100% { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 第二の光線レイヤー(逆回転) */
.ending-rays2 {
position: absolute;
width: 200vmax;
height: 200vmax;
left: 50%;
top: 50%;
background:
repeating-conic-gradient(
from 45deg,
transparent 0deg,
rgba(255,180,80,0.1) 2deg,
transparent 7deg
);
animation: rayRotate 60s linear infinite reverse;
opacity: 0;
transform: translate(-50%, -50%);
mix-blend-mode: screen;
}

.ending.show .ending-rays2 {
opacity: 0.6;
transition: opacity 1.5s 0.5s;
}

/* 粒子・牌・花弁・星 */
.ending-fx {
position: absolute;
inset: 0;
pointer-events: none;
overflow: hidden;
}

.ending-particle {
position: absolute;
width: 8px;
height: 8px;
background: radial-gradient(circle, #fff4c0 0%, #ffd76a 35%, transparent 70%);
border-radius: 50%;
animation: particleRise linear infinite;
filter: blur(0.5px);
}

@keyframes particleRise {
0%   { transform: translateY(110vh) scale(0.3); opacity: 0; }
10%  { opacity: 1; }
90%  { opacity: 1; }
100% { transform: translateY(-50px) scale(0.6); opacity: 0; }
}

.ending-star {
position: absolute;
font-size: 18px;
color: #ffe48a;
text-shadow:
0 0 8px rgba(255,200,80,1),
0 0 18px rgba(255,180,60,0.7);
animation: starTwinkle ease-in-out infinite;
pointer-events: none;
}

@keyframes starTwinkle {
0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
50%      { opacity: 1; transform: scale(1.2) rotate(180deg); }
}

.ending-petal {
position: absolute;
width: 14px;
height: 14px;
animation: petalFall linear infinite;
pointer-events: none;
}

@keyframes petalFall {
0%   { transform: translateY(-50px) translateX(0) rotate(0deg); opacity: 0; }
10%  { opacity: 0.9; }
90%  { opacity: 0.9; }
100% { transform: translateY(110vh) translateX(80px) rotate(720deg); opacity: 0; }
}

.ending-tile-fall {
position: absolute;
animation: tileFall linear infinite;
filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
pointer-events: none;
}

@keyframes tileFall {
0%   { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
8%   { opacity: 0.85; }
92%  { opacity: 0.85; }
100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
}

/* 中央コンテンツ */
.ending-content {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 24px;
z-index: 10;
text-align: center;
}

.ending-mark {
font-size: 110px;
letter-spacing: 0.35em;
font-weight: 800;
font-family: “Hiragino Mincho ProN”, “YuMincho”, serif;
background: linear-gradient(
135deg,
#fff8d8 0%,
#ffe48a 20%,
#ffd76a 40%,
#c9a961 50%,
#ffd76a 60%,
#ffe48a 80%,
#fff8d8 100%
);
background-size: 250% 250%;
-webkit-background-clip: text;
background-clip: text;
-webkit-text-fill-color: transparent;
filter:
drop-shadow(0 0 24px rgba(255,200,80,0.85))
drop-shadow(0 0 48px rgba(255,180,60,0.5));
animation:
titleReveal 1.6s cubic-bezier(0.34, 1.56, 0.64, 1) both,
titleShimmer 4s linear infinite 1.6s;
margin-bottom: 4px;
padding-left: 0.35em;
line-height: 1;
}

@keyframes titleReveal {
0%   { opacity: 0; transform: scale(0.2) rotate(-8deg); filter: drop-shadow(0 0 80px gold) blur(24px) saturate(2); }
50%  { opacity: 1; transform: scale(1.15) rotate(2deg); filter: drop-shadow(0 0 50px gold) blur(0) saturate(1.4); }
75%  { transform: scale(0.95) rotate(-1deg); }
100% { opacity: 1; transform: scale(1) rotate(0); filter: drop-shadow(0 0 24px rgba(255,200,80,0.85)) drop-shadow(0 0 48px rgba(255,180,60,0.5)); }
}

@keyframes titleShimmer {
0%   { background-position: 0% 0%; }
100% { background-position: 250% 0%; }
}

.ending-sub {
font-size: 14px;
letter-spacing: 0.65em;
color: var(–gold);
margin-bottom: 22px;
opacity: 0;
animation: fadeUp 1s 1.4s forwards;
padding-left: 0.65em;
text-shadow: 0 0 10px rgba(255,200,80,0.5);
}

.ending-divider {
width: 240px;
max-width: 70vw;
height: 1px;
margin: 0 auto 22px;
background: linear-gradient(to right, transparent, var(–gold), transparent);
opacity: 0;
animation: fadeUp 0.8s 1.7s forwards;
position: relative;
}

.ending-divider::after {
content: “✦”;
position: absolute;
left: 50%;
top: 50%;
transform: translate(-50%, -50%);
background: var(–bg-deep);
padding: 0 10px;
color: var(–gold);
font-size: 13px;
text-shadow: 0 0 10px rgba(255,200,80,1);
}

.ending-title {
font-size: 36px;
letter-spacing: 0.55em;
color: var(–gold);
margin-bottom: 16px;
font-weight: 600;
opacity: 0;
animation: fadeUp 1s 2s forwards;
padding-left: 0.55em;
text-shadow: 0 0 18px rgba(255,200,80,0.55);
}

.ending-msg {
font-size: 15px;
letter-spacing: 0.3em;
color: var(–gold-soft);
margin-bottom: 20px;
opacity: 0;
animation: fadeUp 0.8s 2.4s forwards;
font-feature-settings: “tnum”;
}

.ending-flavor {
font-size: 12px;
letter-spacing: 0.4em;
opacity: 0;
animation: fadeUp 0.9s 2.8s forwards;
margin-bottom: 36px;
color: rgba(244,234,213,0.85);
line-height: 2.2;
max-width: 90%;
font-style: italic;
}

.ending-buttons {
display: flex;
gap: 14px;
flex-wrap: wrap;
justify-content: center;
opacity: 0;
animation: fadeUp 0.8s 3.2s forwards;
}

.ending-buttons button {
padding: 14px 32px;
font-size: 12.5px;
letter-spacing: 0.3em;
box-shadow: 0 0 20px rgba(255,200,80,0.25);
}

.ending-buttons button.primary {
background: linear-gradient(135deg, #ffe48a, #c9a961);
color: #1a1a1a;
border-color: #ffe48a;
font-weight: 700;
box-shadow:
0 0 28px rgba(255,200,80,0.6),
inset 0 0 12px rgba(255,255,255,0.3);
animation: primaryPulse 2.5s ease-in-out infinite 4s;
}

@keyframes primaryPulse {
0%, 100% { box-shadow: 0 0 28px rgba(255,200,80,0.6), inset 0 0 12px rgba(255,255,255,0.3); }
50%      { box-shadow: 0 0 44px rgba(255,200,80,1), inset 0 0 16px rgba(255,255,255,0.5); }
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(24px); }
to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
.ending-mark { font-size: 72px; letter-spacing: 0.28em; }
.ending-sub { font-size: 11px; letter-spacing: 0.45em; margin-bottom: 18px; }
.ending-title { font-size: 24px; letter-spacing: 0.4em; margin-bottom: 14px; }
.ending-msg { font-size: 13px; letter-spacing: 0.25em; }
.ending-flavor { font-size: 11px; letter-spacing: 0.3em; line-height: 2; margin-bottom: 28px; }
.ending-buttons button { padding: 11px 22px; font-size: 11px; letter-spacing: 0.2em; }
.ending-divider { width: 180px; }
}

/* ============== レスポンシブ ============== */
@media (max-width: 600px) {
header { padding: 8px 12px; gap: 6px; }
.brand h1 { font-size: 16px; letter-spacing: 0.25em; }
.level-badge { padding: 3px 8px; }
.level-badge .level-num { font-size: 8px; }
.level-badge .level-name { font-size: 11px; letter-spacing: 0.15em; }
.stats { gap: 10px; }
.stat .value { font-size: 13px; }
.stat .label { font-size: 8px; }
button { padding: 7px 11px; font-size: 10.5px; letter-spacing: 0.13em; }
footer { padding: 9px 6px; gap: 5px; }
.overlay h2 { font-size: 26px; letter-spacing: 0.32em; }
.overlay-mark { font-size: 46px; }
.modal-title { font-size: 22px; letter-spacing: 0.3em; margin-bottom: 18px; }
.home-hero .home-title { font-size: 42px; letter-spacing: 0.4em; }
.home-hero .home-sub { font-size: 10px; letter-spacing: 0.5em; }
.home-hero .home-tagline { font-size: 11px; letter-spacing: 0.2em; }
.home-hero { margin-bottom: 20px; }
.level-grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
.level-card { padding: 12px 8px; }
.level-card .name { font-size: 18px; letter-spacing: 0.18em; }
}
</style>

</head>
<body>

<header>
  <div class="brand">
    <h1>海上</h1>
    <span class="sub">HAI-SHANG</span>
  </div>
  <div class="level-badge">
    <div class="level-num" id="level-num">LV.1</div>
    <div class="level-name" id="level-name">凪</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="label">残牌</div><div class="value" id="remaining">0</div></div>
    <div class="stat"><div class="label">手数</div><div class="value" id="moves">0</div></div>
    <div class="stat"><div class="label">時間</div><div class="value" id="time">0:00</div></div>
  </div>
</header>

<main>
  <div id="board-wrapper"><div id="board"></div></div>

  <div class="overlay" id="overlay">
    <div class="overlay-rays"></div>
    <div class="overlay-fx" id="overlay-fx"></div>
    <div class="overlay-content">
      <div class="overlay-mark" id="overlay-mark">結</div>
      <h2 id="overlay-title">結牌</h2>
      <p id="overlay-msg">すべての牌を取り払いました</p>
      <div class="overlay-buttons" id="overlay-buttons"></div>
    </div>
  </div>

  <div class="level-modal is-home" id="level-modal">
    <div class="home-hero">
      <div class="home-title">海上</div>
      <div class="home-sub">HAI-SHANG ─ MAHJONG SOLITAIRE</div>
      <div class="home-tagline">上海を裏返し、海の上を渡る</div>
      <div class="home-divider"><span>海図</span></div>
    </div>
    <h2 class="modal-title">海図 ─ KAIZU</h2>
    <div class="level-grid" id="level-grid"></div>
    <button id="close-modal-btn" onclick="closeLevelModal()">閉じる</button>
  </div>

  <!-- Lv7クリア時のエンディング演出 -->

  <div class="ending" id="ending">
    <div class="ending-bg"></div>
    <div class="ending-rays"></div>
    <div class="ending-rays2"></div>
    <div class="ending-fx" id="ending-fx-tiles"></div>
    <div class="ending-fx" id="ending-fx-petals"></div>
    <div class="ending-fx" id="ending-fx-particles"></div>
    <div class="ending-fx" id="ending-fx-stars"></div>
    <div class="ending-content">
      <div class="ending-mark">蓬萊</div>
      <div class="ending-sub">ほうらい ─ HOURAI</div>
      <div class="ending-divider"></div>
      <div class="ending-title">全 七 面 踏 破</div>
      <div class="ending-msg" id="ending-stats">─ 手 / ─</div>
      <div class="ending-flavor">
        上海(シャンハイ)を裏返し、海(ハイ)を渡り<br>
        汝、神々の島・蓬萊へ至れり
      </div>
      <div class="ending-buttons">
        <button class="primary" onclick="closeEnding(); newGame();">もう一度挑む</button>
        <button onclick="closeEnding(); openLevelModal();">海図に戻る</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <button onclick="showHint()">ヒント</button>
  <button onclick="undo()">一手戻す</button>
  <button onclick="newGame()">並べ直し</button>
  <button onclick="openLevelModal()">海図</button>
</footer>

<script>
"use strict";

/* ============================================================
 * 1. SVG麻雀牌の描画
 * ============================================================ */
const VW = 50, VH = 66;
let _svgCounter = 0;

function tileBase(content) {
  const id = ++_svgCounter;
  return `<svg viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fef6e0"/>
        <stop offset="55%" stop-color="#f0e2bb"/>
        <stop offset="100%" stop-color="#dac897"/>
      </linearGradient>
      <linearGradient id="side${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#a88a4e"/>
        <stop offset="100%" stop-color="#5e4222"/>
      </linearGradient>
      <linearGradient id="bottom${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7d5d2e"/>
        <stop offset="100%" stop-color="#4a3216"/>
      </linearGradient>
    </defs>
    <path d="M 47.5 4 L 47.5 60 L 45 62.5 L 45 6.5 Z" fill="url(#side${id})"/>
    <path d="M 4 62.5 L 47.5 62.5 L 45 60 L 6.5 60 Z" fill="url(#bottom${id})"/>
    <rect x="1" y="1" width="46" height="60" rx="4.5" ry="4.5"
          fill="url(#bg${id})" stroke="#9a7d44" stroke-width="0.5"/>
    <rect x="3.5" y="3.5" width="41" height="55" rx="2.5" ry="2.5"
          fill="none" stroke="rgba(120,90,40,0.22)" stroke-width="0.4"/>
    <path d="M 3 2.5 Q 3 1.5 4 1.5 L 44 1.5 Q 45 1.5 45 2.5"
          fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M 2.5 3 Q 1.5 3 1.5 4 L 1.5 58"
          fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="0.7"/>
    <g>${content}</g>
  </svg>`;
}

function manTile(n) {
  const k = ['一','二','三','四','五','六','七','八','九'][n-1];
  const numColor = (n === 1 || n === 9) ? '#b91d36' : '#1c1c1c';
  return tileBase(`
    <text x="24" y="26" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','YuMincho','Yu Mincho',serif"
      font-size="20" font-weight="800"
      fill="${numColor}"
      style="paint-order:stroke;stroke:${numColor};stroke-width:0.3">${k}</text>
    <line x1="9" y1="33" x2="39" y2="33" stroke="rgba(120,90,40,0.25)" stroke-width="0.4"/>
    <text x="24" y="51" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','YuMincho','Yu Mincho',serif"
      font-size="14" font-weight="800" fill="#1c1c1c"
      style="paint-order:stroke;stroke:#1c1c1c;stroke-width:0.3">萬</text>
  `);
}

function pinTile(n) {
  const layouts = {
    1: [[24, 31, 12]],
    2: [[24, 18, 7],   [24, 44, 7]],
    3: [[12, 16, 5.8], [24, 31, 5.8], [36, 46, 5.8]],
    4: [[14, 18, 6],   [34, 18, 6],   [14, 44, 6],   [34, 44, 6]],
    5: [[14, 17, 5.5], [34, 17, 5.5], [24, 31, 5.5], [14, 45, 5.5], [34, 45, 5.5]],
    6: [[14, 16, 5.3], [34, 16, 5.3], [14, 31, 5.3], [34, 31, 5.3], [14, 46, 5.3], [34, 46, 5.3]],
    7: [[24, 13, 5],   [12, 30, 4.8], [24, 30, 4.8], [36, 30, 4.8], [12, 47, 4.8], [24, 47, 4.8], [36, 47, 4.8]],
    8: [[12, 15, 4.5], [24, 15, 4.5], [36, 15, 4.5], [17, 31, 4.5], [31, 31, 4.5], [12, 47, 4.5], [24, 47, 4.5], [36, 47, 4.5]],
    9: [[12, 14, 4.3], [24, 14, 4.3], [36, 14, 4.3], [12, 31, 4.3], [24, 31, 4.3], [36, 31, 4.3], [12, 48, 4.3], [24, 48, 4.3], [36, 48, 4.3]],
  };
  const dotColor = (n, i) => {
    if (n === 1) return '#b91d36';
    if (n === 5 && i === 2) return '#b91d36';
    if (n === 7 && i === 0) return '#0a6b3c';
    if (n === 9) {
      const col = i % 3;
      if (col === 1) return '#0a6b3c';
      return '#b91d36';
    }
    return '#1a4d8c';
  };
  const dots = layouts[n].map(([cx, cy, r], i) => {
    const c = dotColor(n, i);
    return `
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="${c}"/>
      <circle cx="${cx}" cy="${cy}" r="${r * 0.62}" fill="${c}" stroke="rgba(255,255,255,0.3)" stroke-width="0.3"/>
      <circle cx="${cx - r*0.32}" cy="${cy - r*0.32}" r="${r*0.28}" fill="rgba(255,255,255,0.7)"/>
      <circle cx="${cx + r*0.4}" cy="${cy + r*0.4}" r="${r*0.15}" fill="rgba(255,255,255,0.25)"/>
    `;
  }).join('');
  return tileBase(dots);
}

function souTile(n) {
  if (n === 1) {
    return tileBase(`
      <g transform="translate(24, 31)">
        <path d="M -8 6 L -14 10 L -12 4 Z" fill="#0a6b3c"/>
        <path d="M -7 8 L -13 13 L -11 7 Z" fill="#085a32"/>
        <ellipse cx="0" cy="0" rx="11" ry="8.5" fill="#0a6b3c"/>
        <ellipse cx="0" cy="0" rx="9" ry="6" fill="#0c7a45"/>
        <path d="M -2 -3 Q 4 -8 10 -4 Q 5 0 -2 -1 Z" fill="#085a32"/>
        <circle cx="6" cy="-4" r="5" fill="#0c7a45"/>
        <circle cx="7.5" cy="-5" r="1.4" fill="#fff"/>
        <circle cx="7.8" cy="-5" r="0.7" fill="#000"/>
        <path d="M 11 -4 L 14 -3 L 11 -2 Z" fill="#b91d36"/>
        <line x1="-2" y1="8" x2="-3" y2="13" stroke="#5a3a1a" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="2" y1="8" x2="3" y2="13" stroke="#5a3a1a" stroke-width="1.2" stroke-linecap="round"/>
      </g>
    `);
  }
  const layouts = {
    2: [[24, 18], [24, 44]],
    3: [[12, 16], [24, 31], [36, 46]],
    4: [[14, 18], [34, 18], [14, 44], [34, 44]],
    5: [[14, 17], [34, 17], [24, 31], [14, 45], [34, 45]],
    6: [[14, 16], [34, 16], [14, 31], [34, 31], [14, 46], [34, 46]],
    7: [[24, 13], [12, 30], [24, 30], [36, 30], [12, 47], [24, 47], [36, 47]],
    8: [[12, 15], [24, 15], [36, 15], [17, 31], [31, 31], [12, 47], [24, 47], [36, 47]],
    9: [[12, 14], [24, 14], [36, 14], [12, 31], [24, 31], [36, 31], [12, 48], [24, 48], [36, 48]],
  };
  const stickColor = (n, i) => {
    if (n === 5 && i === 2) return '#b91d36';
    if (n === 7 && i === 0) return '#b91d36';
    if (n === 9 && i === 4) return '#b91d36';
    return '#0a6b3c';
  };
  const sticks = layouts[n].map(([cx, cy], i) => {
    const c = stickColor(n, i);
    const dark = c === '#b91d36' ? '#7a1024' : '#063e22';
    return `
      <g transform="translate(${cx}, ${cy})">
        <rect x="-1.7" y="-7.5" width="3.4" height="15" rx="1.7" fill="${dark}" opacity="0.5"/>
        <rect x="-2" y="-7" width="4" height="14" rx="2" fill="${c}"/>
        <ellipse cx="0" cy="-3" rx="2" ry="0.7" fill="${dark}" opacity="0.6"/>
        <ellipse cx="0" cy="3" rx="2" ry="0.7" fill="${dark}" opacity="0.6"/>
        <ellipse cx="0" cy="-7" rx="2" ry="0.9" fill="${dark}" opacity="0.4"/>
        <ellipse cx="0" cy="7" rx="2" ry="0.9" fill="${dark}" opacity="0.4"/>
        <rect x="-1.5" y="-6.5" width="0.8" height="13" fill="rgba(255,255,255,0.35)" rx="0.4"/>
      </g>
    `;
  }).join('');
  return tileBase(sticks);
}

function jihaiTile(char, color) {
  const dark = color === '#b91d36' ? '#7a1024'
             : color === '#0a6b3c' ? '#063e22'
             : '#000';
  return tileBase(`
    <text x="24" y="44" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','YuMincho','Yu Mincho',serif"
      font-size="34" font-weight="900"
      fill="${color}"
      style="paint-order:stroke;stroke:${dark};stroke-width:0.6">${char}</text>
  `);
}

function hakuTile() {
  return tileBase(`
    <rect x="7" y="9" width="34" height="44" rx="2" ry="2"
      fill="none" stroke="#1a4d8c" stroke-width="1.6"/>
    <rect x="9" y="11" width="30" height="40" rx="1" ry="1"
      fill="none" stroke="#1a4d8c" stroke-width="0.6"/>
  `);
}

/* ============================================================
 * 2. 牌タイプ定義
 * ============================================================ */
// 萬子1-9
const tileTypes = [];
for (let i = 1; i <= 9; i++) {
  tileTypes.push({key:'m'+i, name:i+'萬', svg: () => manTile(i)});
}
for (let i = 1; i <= 9; i++) {

function buildLayout(level) {
  const positions = [];
  for (const b of level.blocks) {
    for (let r = b.r0; r < b.r1; r++) {
      for (let c = b.c0; c < b.c1; c++) {
        positions.push({layer: b.layer, row: r, col: c});
      }
    }
  }
  return positions;
}

function buildTypePool(totalPairs) {
  // tileTypesから totalPairs 個のタイプを偏りなく選ぶ
  const pool = [];
  // タイプを使い回す(種類が多くなりすぎないよう、必要分だけ循環)
  const shuffled = shuffleArray([...tileTypes]);
  for (let i = 0; i < totalPairs; i++) {
    pool.push(shuffled[i % shuffled.length]);
  }
  return pool;
}

/* ============================================================
 * 4. 必勝レイアウト生成(逆順構築法)
 * ============================================================ */
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function isFreeInActive(idx, positions, activeSet) {
  const p = positions[idx];
  for (const i of activeSet) {
    if (i === idx) continue;
    const o = positions[i];
    if (o.layer > p.layer && o.row === p.row && o.col === p.col) return false;
  }
  let left = false, right = false;
  for (const i of activeSet) {
    if (i === idx) continue;
    const o = positions[i];
    if (o.layer !== p.layer || o.row !== p.row) continue;
    if (o.col === p.col - 1) left = true;
    if (o.col === p.col + 1) right = true;
  }
  return !(left && right);
}

function generateSolvable(positions, types) {
  const totalPairs = positions.length / 2;
  for (let attempt = 0; attempt < 800; attempt++) {
    const active = new Set();
    for (let i = 0; i < positions.length; i++) active.add(i);
    const removalOrder = [];
    let ok = true;
    while (active.size > 0) {
      const free = [];
      for (const i of active) {
        if (isFreeInActive(i, positions, active)) free.push(i);
      }
      if (free.length < 2) { ok = false; break; }
      shuffleArray(free);
      removalOrder.push([free[0], free[1]]);
      active.delete(free[0]);
      active.delete(free[1]);
    }
    if (ok && removalOrder.length === totalPairs) {
      const shuffledTypes = shuffleArray([...types]);
      const result = new Array(positions.length);
      removalOrder.forEach((pair, idx) => {
        const t = shuffledTypes[idx];
        result[pair[0]] = t;
        result[pair[1]] = t;
      });
      return result;
    }
  }
  return null;
}

/* ============================================================
 * 5. ゲーム状態
 * ============================================================ */
let currentLevel = 0;
let maxClearedLevel = -1; // クリア済みの最高レベル(-1 = 未クリア)
let layout = [];
let tiles = [];
let selectedTile = null;
let history = [];
let moves = 0;
let startTime = null;
let timerId = null;

function newGame(levelIdx) {
  if (typeof levelIdx === 'number') currentLevel = levelIdx;
  const level = LEVELS[currentLevel];
  layout = buildLayout(level);

  const totalPairs = layout.length / 2;
  const pool = buildTypePool(totalPairs);
  const assignment = generateSolvable(layout, pool);
  if (!assignment) {
    alert('レイアウトの生成に失敗しました。再度お試しください。');
    return;
  }

  tiles = layout.map((pos, i) => {
    const t = assignment[i];
    return {
      id: i,
      key: t.key,
      name: t.name,
      svg: t.svg(),
      layer: pos.layer,
      row: pos.row,
      col: pos.col,
      removed: false,
    };
  });

  selectedTile = null;
  history = [];
  moves = 0;
  startTime = Date.now();
  if (timerId) clearInterval(timerId);
  timerId = setInterval(updateTime, 1000);
  document.getElementById('overlay').classList.remove('show');

  // ゲーム開始フラグ
  gameStarted = true;

  // ヘッダのレベル表示更新
  document.getElementById('level-num').textContent = 'LV.' + (currentLevel + 1);
  document.getElementById('level-name').textContent = level.name;

  render();
  updateStats();
}

function isFree(tile) {
  if (tile.removed) return false;
  for (const o of tiles) {
    if (o.removed || o.id === tile.id) continue;
    if (o.layer > tile.layer && o.row === tile.row && o.col === tile.col) return false;
  }
  let left = false, right = false;
  for (const o of tiles) {
    if (o.removed || o.id === tile.id || o.layer !== tile.layer) continue;
    if (o.row !== tile.row) continue;
    if (o.col === tile.col - 1) left = true;
    if (o.col === tile.col + 1) right = true;
  }
  return !(left && right);
}

function getTileSize() {
  const level = LEVELS[currentLevel];
  const w = window.innerWidth;
  const h = window.innerHeight;
  const isMobile = w < 600;
  const headerH = isMobile ? 56 : 64;
  const footerH = isMobile ? 50 : 60;
  const padding = 24;
  const availW = w - padding;
  const availH = h - headerH - footerH - padding;

  const offsetRatio = 0.1;
  const factorW = level.cols + level.maxLayer * offsetRatio;
  // th = tw * 66/50。高さは offset を上方向にも使うため、行数+maxLayer*offsetRatio
  const factorH = (level.rows + level.maxLayer * offsetRatio) * (66/50);

  let tw = Math.floor(Math.min(availW / factorW, availH / factorH));
  tw = Math.max(18, Math.min(tw, 60));
  const th = Math.round(tw * 66 / 50);
  return {w: tw, h: th};
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const level = LEVELS[currentLevel];
  const {w: tw, h: th} = getTileSize();
  const offset = Math.round(tw * 0.1);
  board.style.width = (level.cols * tw + level.maxLayer * offset) + 'px';
  board.style.height = (level.rows * th + level.maxLayer * offset) + 'px';

  const sorted = [...tiles].sort((a, b) => a.layer - b.layer);

  sorted.forEach(tile => {
    const div = document.createElement('div');
    div.className = 'tile';
    if (tile.removed) div.classList.add('removed');
    div.dataset.id = tile.id;
    div.innerHTML = tile.svg;

    const ox = tile.layer * offset;
    const oy = tile.layer * -offset + level.maxLayer * offset; // 下端を揃えるため上にオフセット
    div.style.left = (tile.col * tw + ox) + 'px';
    div.style.top = (tile.row * th + oy) + 'px';
    div.style.width = tw + 'px';
    div.style.height = th + 'px';
    div.style.zIndex = tile.layer * 1000 + tile.row * 10 + tile.col;

    if (selectedTile && selectedTile.id === tile.id) div.classList.add('selected');
    if (!tile.removed) {
      if (isFree(tile)) div.classList.add('free');
      else div.classList.add('locked');
    }

    div.addEventListener('click', () => onTileClick(tile));
    board.appendChild(div);
  });
}

function onTileClick(tile) {
  if (tile.removed || !isFree(tile)) return;
  if (!selectedTile) {
    selectedTile = tile;
    render();
    return;
  }
  if (selectedTile.id === tile.id) {
    selectedTile = null;
    render();
    return;
  }
  if (selectedTile.key === tile.key) {
    const matched1 = selectedTile;
    const matched2 = tile;
    history.push([matched1.id, matched2.id]);
    matched1.removed = true;
    matched2.removed = true;
    selectedTile = null;
    moves++;
    render();
    updateStats();
    // ペア消去の派手なエフェクト発動
    fireMatchEffect(matched1, matched2);
    setTimeout(checkEnd, 600);
  } else {
    selectedTile = tile;
    render();
  }
}

/* ============================================================
 * ペア消去エフェクト
 * ============================================================ */
function tilePixelCenter(tile) {
  const level = LEVELS[currentLevel];
  const {w: tw, h: th} = getTileSize();
  const offset = Math.round(tw * 0.1);
  const x = tile.col * tw + tile.layer * offset + tw / 2;
  const y = tile.row * th + (-tile.layer * offset + level.maxLayer * offset) + th / 2;
  return {x, y, w: tw, h: th};
}

function fireMatchEffect(tile1, tile2) {
  const board = document.getElementById('board');
  if (!board) return;

  // 全体の白フラッシュ(一瞬だけ画面中央が光る)
  const screenFlash = document.createElement('div');
  screenFlash.className = 'match-flash-screen';
  document.querySelector('main').appendChild(screenFlash);
  setTimeout(() => screenFlash.remove(), 450);

  // 2牌を結ぶ光のライン
  const c1 = tilePixelCenter(tile1);
  const c2 = tilePixelCenter(tile2);
  const dx = c2.x - c1.x;
  const dy = c2.y - c1.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const angle = Math.atan2(dy, dx);
  const midX = (c1.x + c2.x) / 2;
  const midY = (c1.y + c2.y) / 2;

  const line = document.createElement('div');
  line.className = 'match-line';
  line.style.left = midX + 'px';
  line.style.top = midY + 'px';
  line.style.width = dist + 'px';
  line.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
  board.appendChild(line);
  setTimeout(() => line.remove(), 800);

  // 各タイル位置にバースト発生
  spawnBurst(c1, board);
  spawnBurst(c2, board);
}

function spawnBurst(center, board) {
  const burst = document.createElement('div');
  burst.className = 'match-burst';
  const size = Math.max(40, center.w * 0.85);
  burst.style.left = (center.x - size / 2) + 'px';
  burst.style.top = (center.y - size / 2) + 'px';
  burst.style.width = size + 'px';
  burst.style.height = size + 'px';

  // フラッシュ
  const flash = document.createElement('div');
  flash.className = 'burst-flash';
  burst.appendChild(flash);

  // 二重リング
  const ring1 = document.createElement('div');
  ring1.className = 'burst-ring';
  burst.appendChild(ring1);

  const ring2 = document.createElement('div');
  ring2.className = 'burst-ring2';
  burst.appendChild(ring2);

  // 8方向の粒子
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'burst-particle';
    const ang = (i / 8) * Math.PI * 2 + Math.random() * 0.3;
    const dist = size * 0.9 + Math.random() * size * 0.3;
    p.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(ang) * dist + 'px');
    p.style.animationDelay = (i * 0.015) + 's';
    burst.appendChild(p);
  }

  // 4つの星 ✦(ランダム方向)
  for (let i = 0; i < 4; i++) {
    const s = document.createElement('div');
    s.className = 'burst-star';
    s.textContent = '✦';
    const ang = Math.random() * Math.PI * 2;
    const dist = size * 0.6 + Math.random() * size * 0.4;
    s.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
    s.style.setProperty('--dy', Math.sin(ang) * dist + 'px');
    s.style.fontSize = (12 + Math.random() * 10) + 'px';
    s.style.animationDelay = (i * 0.04 + 0.05) + 's';
    burst.appendChild(s);
  }

  board.appendChild(burst);
  setTimeout(() => burst.remove(), 1100);
}

function updateStats() {
  document.getElementById('remaining').textContent = tiles.filter(t => !t.removed).length;
  document.getElementById('moves').textContent = moves;
}

function updateTime() {
  if (!startTime) return;
  const sec = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  document.getElementById('time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function checkEnd() {
  const remaining = tiles.filter(t => !t.removed);
  if (remaining.length === 0) {
    clearInterval(timerId);
    if (currentLevel > maxClearedLevel) maxClearedLevel = currentLevel;
    const t = document.getElementById('time').textContent;

    // Lv7「蓬萊」クリア → 派手なエンディング発動
    if (currentLevel === LEVELS.length - 1) {
      showEnding(moves, t);
      return;
    }

    const nextLv = currentLevel + 1;
    showOverlay('結', '結牌(けっぱい)', `${moves} 手 / ${t}`,
      [{label: `次へ ─ LV.${nextLv+1}「${LEVELS[nextLv].name}」`, cls: 'primary', action: () => newGame(nextLv)},
       {label: 'もう一度', action: () => newGame()},
       {label: '海図', action: openLevelModal}],
      true  // isSuccess
    );
    return;
  }
  if (!hasAvailableMove()) {
    showOverlay('澱', '澱(よどみ)', '流れが止まりました ─ 取れる組がありません',
      [{label: '一手戻す', cls: 'primary', action: () => { undo(); }},
       {label: '並べ直し', action: () => newGame()}],
      false  // isSuccess
    );
  }
}

function hasAvailableMove() {
  const free = tiles.filter(t => !t.removed && isFree(t));
  const counts = {};
  for (const t of free) counts[t.key] = (counts[t.key] || 0) + 1;
  return Object.values(counts).some(c => c >= 2);
}

function showHint() {
  const free = tiles.filter(t => !t.removed && isFree(t));
  const map = {};
  for (const t of free) {
    if (!map[t.key]) map[t.key] = [];
    map[t.key].push(t);
  }
  for (const k in map) {
    if (map[k].length >= 2) {
      const [a, b] = map[k];
      [a, b].forEach(t => {
        const el = document.querySelector(`.tile[data-id="${t.id}"]`);
        if (el) {
          el.classList.add('hint');
          setTimeout(() => el.classList.remove('hint'), 2400);
        }
      });
      return;
    }
  }
}

function undo() {
  const last = history.pop();
  if (!last) return;
  for (const id of last) {
    const t = tiles.find(t => t.id === id);
    if (t) t.removed = false;
  }
  moves = Math.max(0, moves - 1);
  selectedTile = null;
  render();
  updateStats();
  document.getElementById('overlay').classList.remove('show');
}

function showOverlay(mark, title, msg, buttons, isSuccess) {
  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-mark').textContent = mark;
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  const btnContainer = document.getElementById('overlay-buttons');
  btnContainer.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    if (b.cls) btn.className = b.cls;
    btn.textContent = b.label;
    btn.onclick = b.action;
    btnContainer.appendChild(btn);
  });

  // 成功時は派手な演出を発動
  const fxEl = document.getElementById('overlay-fx');
  fxEl.innerHTML = '';
  if (isSuccess) {
    overlay.classList.add('success');
    spawnOverlayFx(fxEl);
  } else {
    overlay.classList.remove('success');
  }
  overlay.classList.add('show');
}

function spawnOverlayFx(container) {
  // 上昇する金色粒子(35個)
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'overlay-particle';
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.animationDuration = (3 + Math.random() * 4) + 's';
    p.style.animationDelay = (Math.random() * 4) + 's';
    const size = 4 + Math.random() * 8;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    container.appendChild(p);
  }
  // きらめく星 ✦(15個)
  for (let i = 0; i < 15; i++) {
    const s = document.createElement('span');
    s.className = 'overlay-spark';
    s.textContent = '✦';
    s.style.left = (Math.random() * 95) + 'vw';
    s.style.top = (Math.random() * 90) + 'vh';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.fontSize = (10 + Math.random() * 14) + 'px';
    container.appendChild(s);
  }
}

function showEnding(movesCount, timeStr) {

  // 統計の更新
  document.getElementById('ending-stats').textContent = `${movesCount} 手 / ${timeStr}`;

  // (1) 金色粒子(60個)
  const particlesEl = document.getElementById('ending-fx-particles');
  particlesEl.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'ending-particle';
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.animationDuration = (3 + Math.random() * 5) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    const size = 4 + Math.random() * 10;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    particlesEl.appendChild(p);
  }

  // (2) 星 ✦(30個・ランダムに散らばってきらめく)
  const starsEl = document.getElementById('ending-fx-stars');
  starsEl.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('span');
    s.className = 'ending-star';
    s.textContent = '✦';
    s.style.left = (Math.random() * 95) + 'vw';
    s.style.top = (Math.random() * 90) + 'vh';
    s.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    s.style.animationDelay = (Math.random() * 4) + 's';
    s.style.fontSize = (10 + Math.random() * 16) + 'px';
    starsEl.appendChild(s);
  }

  // (3) 花弁(20個・横にも流れる)
  const petalsEl = document.getElementById('ending-fx-petals');
  petalsEl.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const pe = document.createElement('div');
    pe.className = 'ending-petal';
    pe.style.left = (Math.random() * 100) + 'vw';
    pe.style.animationDuration = (8 + Math.random() * 6) + 's';
    pe.style.animationDelay = (Math.random() * 5) + 's';
    pe.innerHTML = petalSVG();
    petalsEl.appendChild(pe);
  }

  // (4) 落下する麻雀牌(15個・ランダムな種類)
  const tilesEl = document.getElementById('ending-fx-tiles');
  tilesEl.innerHTML = '';
  for (let i = 0; i < 15; i++) {
    const t = document.createElement('div');
    t.className = 'ending-tile-fall';
    t.style.left = (Math.random() * 92) + 'vw';
    t.style.animationDuration = (7 + Math.random() * 8) + 's';
    t.style.animationDelay = (Math.random() * 6) + 's';
    const tt = tileTypes[Math.floor(Math.random() * tileTypes.length)];
    const size = 32 + Math.random() * 28;
    t.style.width = size + 'px';
    t.style.height = (size * 66 / 50) + 'px';
    t.innerHTML = tt.svg();
    tilesEl.appendChild(t);
  }

  ending.classList.add('show');
}

function closeEnding() {
  document.getElementById('ending').classList.remove('show');
  // クリーンアップ
  ['ending-fx-particles','ending-fx-stars','ending-fx-petals','ending-fx-tiles'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });
}

/* ============================================================
 * 8. レベル選択モーダル / ホーム画面
 * ============================================================ */
let gameStarted = false;

function openLevelModal() {
  document.getElementById('overlay').classList.remove('show');
  const modal = document.getElementById('level-modal');
  // ゲーム未開始ならホーム画面モード(タイトル+サブ表示、閉じるボタン非表示)
  if (!gameStarted) {
    modal.classList.add('is-home');
  } else {
    modal.classList.remove('is-home');
  }

  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, idx) => {
    const card = document.createElement('div');
    card.className = 'level-card';
    if (idx <= maxClearedLevel) card.classList.add('cleared');
    if (gameStarted && idx === currentLevel) card.classList.add('current');
    card.innerHTML = `
      <div class="lv">LV.${idx+1}</div>
      <div class="name">${lv.name}</div>
      <div class="info">${lv.desc}</div>
    `;
    card.onclick = () => {
      closeLevelModal();
      newGame(idx);
    };
    grid.appendChild(card);
  });
  modal.classList.add('show');
}

function closeLevelModal() {
  document.getElementById('level-modal').classList.remove('show');
}

window.addEventListener('resize', () => { if (gameStarted) render(); });
window.addEventListener('orientationchange', () => setTimeout(() => { if (gameStarted) render(); }, 120));

// 起動時はホーム画面を表示(自動でゲーム開始しない)
openLevelModal();
</script>

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- iOS Safari/Chromeの強力なキャッシュを完全に無効化（デプロイ後の旧バージョン表示防止） -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ゆいみお太郎伝説</title>
<style>
  :root {
    --washi: #f4ecd8;
    --washi-dark: #e3d6b0;
    --sumi: #2b1d12;
    --beni: #c93857;
    --beni-light: #e85d7a;
    --matcha: #6b8e4e;
    --matcha-dark: #4a6b35;
    --kincha: #b8860b;
    --gold: #f4d03f;
    --aozora: #6ba0d8;
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
width: 100%;
margin: 0;
padding: 0;
/* 3段フォールバック：古いブラウザにも対応 */
height: 100vh;
height: 100dvh;
height: var(–app-h, 100dvh);
overflow: hidden;
background: var(–sumi, #2b1d12);
font-family: “Yu Mincho”, “YuMincho”, “Hiragino Mincho ProN”, “游明朝”, serif;
color: var(–sumi, #2b1d12);
user-select: none;
-webkit-user-select: none;
touch-action: none;
/* iOSのオーバースクロールを完全に止める */
overscroll-behavior: none;
-webkit-overflow-scrolling: auto;
}

/* メインコンテナ：position:fixedをやめてbody内のフローに */
#game-wrapper {
position: relative;
width: 100%;
height: 100%;
display: flex;
flex-direction: column;
background: radial-gradient(ellipse at 50% 30%, #9ed078 0%, #6b8e4e 40%, #3d5825 100%);
overflow: hidden;
/* safe-areaは内側のpaddingで吸収 */
padding-top: env(safe-area-inset-top);
padding-left: env(safe-area-inset-left);
padding-right: env(safe-area-inset-right);
transition: background 0.8s ease;
}
/* ステージごとの背景 */
#game-wrapper.stage-0 { background: radial-gradient(ellipse at 50% 30%, #9ed078 0%, #6b8e4e 40%, #3d5825 100%); }
#game-wrapper.stage-1 { background: radial-gradient(ellipse at 50% 30%, #b3c870 0%, #7a9050 40%, #4f6c2a 100%); }
#game-wrapper.stage-2 { background: radial-gradient(ellipse at 50% 30%, #c5a570 0%, #8c7040 40%, #5a4a20 100%); }
#game-wrapper.stage-3 { background: radial-gradient(ellipse at 50% 30%, #a8c8d8 0%, #6c8ca0 40%, #3a5470 100%); }
#game-wrapper.stage-4 { background: radial-gradient(ellipse at 50% 30%, #9088a0 0%, #5a5070 40%, #302848 100%); }
#game-wrapper.stage-5 { background: radial-gradient(ellipse at 50% 30%, #6b3030 0%, #401818 40%, #1a0808 100%); }

/* タイトルバー：フローのヘッダー（position:absoluteをやめる） */
#titlebar {
position: relative;
flex-shrink: 0;
padding: 8px 12px;
display: flex; justify-content: space-between; align-items: flex-start;
z-index: 10;
gap: 8px;
}
#stage-info {
background: rgba(43, 29, 18, 0.95);
color: var(–washi, #f4ecd8);
padding: 8px 14px;
border: 2px solid var(–gold, #f4d03f);
box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.5);
font-size: 12px;
letter-spacing: 0.1em;
line-height: 1.3;
flex-shrink: 0;
}
#stage-info .stage-num {
color: var(–gold, #f4d03f);
font-weight: bold;
font-size: 11px;
letter-spacing: 0.2em;
}
#stage-info .stage-name {
font-size: 13px;
margin-top: 2px;
text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
}

/* HUD */
#hud {
background: rgba(43, 29, 18, 0.95);
border: 2px solid rgba(244, 208, 63, 0.6);
box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.5);
color: var(–washi, #f4ecd8);
padding: 8px 12px;
border-radius: 2px;
font-size: 11px;
letter-spacing: 0.05em;
display: flex;
gap: 10px;
align-items: center;
flex-wrap: wrap;
justify-content: flex-end;
text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
}
#hud .hud-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
#hud .icon { font-size: 14px; }

.hp-bar { display: inline-flex; gap: 3px; }
.hp-dot {
width: 12px; height: 12px;
background-color: #c93857;
background: #c93857;
background: var(–beni, #c93857);
border: 1.5px solid #f4ecd8;
border: 1.5px solid var(–washi, #f4ecd8);
border-radius: 50%;
box-shadow: inset -2px -2px 0 rgba(0,0,0,0.3);
}
.hp-dot.lost { background: rgba(244, 236, 216, 0.15); box-shadow: none; }

/* 仲間バッジ */
.comp-badges { display: inline-flex; gap: 3px; }
.comp-badge {
width: 22px; height: 22px;
border-radius: 50%;
border: 1.5px solid var(–washi, #f4ecd8);
background: rgba(255,255,255,0.1);
display: flex; align-items: center; justify-content: center;
font-size: 11px;
line-height: 1;
}
.comp-badge.active {
background: var(–gold, #f4d03f);
color: var(–sumi, #2b1d12);
border-color: var(–gold, #f4d03f);
box-shadow: 0 0 6px rgba(244, 208, 63, 0.6);
text-shadow: none;
}

/* バフアイコン */
.buff-icon {
width: 22px; height: 22px;
border-radius: 50%;
background: var(–gold, #f4d03f);
color: var(–sumi, #2b1d12);
display: inline-flex;
align-items: center; justify-content: center;
font-size: 11px;
font-weight: bold;
border: 1.5px solid var(–washi, #f4ecd8);
animation: buff-pulse 0.8s ease-in-out infinite;
}
.buff-icon.momo {
background: #ff6b9d;
color: white;
border-color: var(–gold, #f4d03f);
animation: momo-pulse 0.4s ease-in-out infinite;
}
@keyframes buff-pulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.1); }
}
@keyframes momo-pulse {
0%, 100% { transform: scale(1); box-shadow: 0 0 4px rgba(255, 107, 157, 0.5); }
50% { transform: scale(1.15); box-shadow: 0 0 12px rgba(255, 107, 157, 0.9); }
}

/* ステージ：flexの中央領域、min-height:0がないと縮まない */
#stage {
flex: 1;
min-height: 0;
position: relative;
overflow: hidden;
}
canvas {
display: block;
width: 100%; height: 100%;
image-rendering: pixelated;
image-rendering: -moz-crisp-edges;
image-rendering: crisp-edges;
}

/* コントロール：フローのフッター。絶対配置をやめ、必ず画面内に収まる */
#controls {
position: relative;
flex-shrink: 0;
display: flex;
justify-content: space-between;
align-items: flex-end;
padding: 12px 18px 16px;
/* safe-area + 最低16pxを保証。デバイス問わず必ず余白が出る */
padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
z-index: 5;
}

#dpad {
position: relative;
width: 198px; height: 198px;
}
.dpad-btn {
position: absolute;
width: 66px; height: 66px;
background: rgba(244, 236, 216, 0.88);
border: 3px solid var(–sumi, #2b1d12);
color: var(–sumi, #2b1d12);
font-size: 24px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
box-shadow: 4px 4px 0 var(–sumi, #2b1d12);
transition: transform 60ms ease, background 60ms ease;
font-weight: bold;
user-select: none;
}
.dpad-btn:active, .dpad-btn.active {
transform: translate(2px, 2px);
background-color: #c93857;
background: #c93857;
background: var(–beni, #c93857);
color: #f4ecd8;
color: var(–washi, #f4ecd8);
box-shadow: 2px 2px 0 #2b1d12;
box-shadow: 2px 2px 0 var(–sumi, #2b1d12);
}
.dpad-btn.up    { top: 0;    left: 66px; }
.dpad-btn.down  { bottom: 0; left: 66px; }
.dpad-btn.left  { top: 66px; left: 0; }
.dpad-btn.right { top: 66px; right: 0; }
.dpad-center {
position: absolute;
top: 66px; left: 66px;
width: 66px; height: 66px;
display: flex; align-items: center; justify-content: center;
pointer-events: none;
}
.dpad-center::before {
content: “”;
width: 32px; height: 32px;
border-radius: 50%;
background-color: #c93857;
background: #c93857;
background: var(–beni, #c93857);
border: 2px solid #2b1d12;
border: 2px solid var(–sumi, #2b1d12);
box-shadow: inset 0 0 0 5px #f4ecd8;
box-shadow: inset 0 0 0 5px var(–washi, #f4ecd8);
}

/* アクションボタン */
#action-btns {
display: flex;
flex-direction: column;
gap: 8px;
align-items: flex-end;
}
.action-btn {
width: 92px; height: 92px;
border-radius: 50%;
background-color: #c93857;
background: #c93857;
background: var(–beni, #c93857);
border: 4px solid #2b1d12;
border: 4px solid var(–sumi, #2b1d12);
color: #f4ecd8;
color: var(–washi, #f4ecd8);
font-size: 17px;
font-weight: bold;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
box-shadow: 4px 4px 0 var(–sumi, #2b1d12);
transition: transform 60ms ease;
letter-spacing: 0.1em;
text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
user-select: none;
position: relative;
}
.action-btn:active, .action-btn.active {
transform: translate(2px, 2px);
box-shadow: 2px 2px 0 var(–sumi, #2b1d12);
}
.action-btn .cd-overlay {
position: absolute;
inset: 0;
background: rgba(0,0,0,0.5);
border-radius: 50%;
pointer-events: none;
display: none;
}
.action-btn.on-cooldown .cd-overlay { display: block; }

/* トースト */
#toast {
position: absolute;
top: 68px;
left: 50%;
transform: translateX(-50%);
background: rgba(43, 29, 18, 0.9);
color: var(–gold, #f4d03f);
padding: 10px 18px;
border: 2px solid var(–gold, #f4d03f);
font-size: 13px;
letter-spacing: 0.15em;
z-index: 20;
opacity: 0;
transition: opacity 0.3s ease;
pointer-events: none;
max-width: 90%;
text-align: center;
}
#toast.show { opacity: 1; }

/* ステージクリア演出 */
#stage-clear {
position: absolute; inset: 0;
background: rgba(43, 29, 18, 0.88);
display: none;
align-items: center; justify-content: center;
z-index: 30;
flex-direction: column;
gap: 18px;
padding: 20px;
text-align: center;
}
#stage-clear.show { display: flex; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
#stage-clear .clear-label {
font-size: 14px;
color: var(–gold, #f4d03f);
letter-spacing: 0.5em;
text-indent: 0.5em;
}
#stage-clear .big {
font-size: 36px;
color: var(–gold, #f4d03f);
letter-spacing: 0.3em;
text-shadow: 4px 4px 0 var(–sumi, #2b1d12), 0 0 30px rgba(244, 208, 63, 0.6);
font-weight: 700;
animation: bigBounce 0.5s ease;
}
@keyframes bigBounce {
0% { transform: scale(0.5); opacity: 0; }
60% { transform: scale(1.15); }
100% { transform: scale(1); opacity: 1; }
}
#stage-clear .next-label {
font-size: 14px;
color: var(–washi, #f4ecd8);
letter-spacing: 0.2em;
line-height: 1.7;
}
#stage-clear button {
margin-top: 14px;
padding: 12px 32px;
background-color: #c93857;
background: #c93857;
background: var(–beni, #c93857);
color: #f4ecd8;
color: var(–washi, #f4ecd8);
border: 3px solid #f4ecd8;
border: 3px solid var(–washi, #f4ecd8);
font-size: 14px;
letter-spacing: 0.3em;
cursor: pointer;
font-family: inherit;
font-weight: bold;
box-shadow: 4px 4px 0 var(–washi, #f4ecd8);
transition: transform 80ms ease;
}
#stage-clear button:active {
transform: translate(2px, 2px);
box-shadow: 2px 2px 0 var(–washi, #f4ecd8);
}

/* 結果（勝利/敗北） */
#result {
position: absolute; inset: 0;
background: rgba(43, 29, 18, 0.94);
display: none;
align-items: center; justify-content: center;
z-index: 30;
flex-direction: column;
gap: 22px;
padding: 20px;
text-align: center;
}
#result.show { display: flex; }
#result .big {
font-size: 46px;
color: var(–gold, #f4d03f);
letter-spacing: 0.4em;
text-shadow: 5px 5px 0 var(–sumi, #2b1d12), 0 0 40px rgba(244, 208, 63, 0.7);
font-weight: 700;
}
#result.lose .big {
color: var(–beni-light, #e85d7a);
text-shadow: 4px 4px 0 var(–sumi, #2b1d12), 0 0 30px rgba(232, 93, 122, 0.5);
}
#result .sub {
font-size: 14px;
color: var(–washi, #f4ecd8);
letter-spacing: 0.2em;
line-height: 1.8;
}
#result button {
margin-top: 14px;
padding: 14px 36px;
background-color: #c93857;
background: #c93857;
background: var(–beni, #c93857);
color: #f4ecd8;
color: var(–washi, #f4ecd8);
border: 3px solid #f4ecd8;
border: 3px solid var(–washi, #f4ecd8);
font-size: 14px;
letter-spacing: 0.3em;
cursor: pointer;
font-family: inherit;
font-weight: bold;
box-shadow: 4px 4px 0 var(–washi, #f4ecd8);
}

/* ローディング */
#loading {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
background: var(–sumi, #2b1d12);
color: var(–washi, #f4ecd8);
font-size: 14px;
letter-spacing: 0.3em;
z-index: 100;
transition: opacity 0.4s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }

/* ===== タイトル画面 ===== */
#title-screen {
position: absolute; inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 50;
background:
radial-gradient(ellipse at 50% 30%, rgba(255, 182, 193, 0.4) 0%, transparent 50%),
radial-gradient(ellipse at 50% 70%, rgba(244, 208, 63, 0.2) 0%, transparent 60%),
linear-gradient(180deg, #2b1d12 0%, #3d2a1a 50%, #2b1d12 100%);
overflow: hidden;
padding: 20px;
transition: opacity 0.6s ease;
}
#title-screen.hidden {
opacity: 0;
pointer-events: none;
}

/* 桜の花びら（背景） */
.petal {
position: absolute;
width: 14px;
height: 14px;
background: radial-gradient(circle at 35% 35%, #ffd5e0 0%, #ff8eb1 70%, #d6688e 100%);
border-radius: 50% 0% 50% 50%;
opacity: 0.65;
animation: petal-fall linear infinite;
pointer-events: none;
}
@keyframes petal-fall {
0% {
transform: translateY(-30px) rotate(0deg) translateX(0);
opacity: 0;
}
10% { opacity: 0.65; }
50% {
transform: translateY(50vh) rotate(180deg) translateX(40px);
}
100% {
transform: translateY(110vh) rotate(360deg) translateX(-30px);
opacity: 0;
}
}

#title-content {
position: relative;
display: flex;
flex-direction: column;
align-items: center;
gap: 18px;
z-index: 2;
max-width: 500px;
width: 100%;
}

#title-frame {
position: relative;
padding: 36px 28px 30px;
background:
linear-gradient(180deg, rgba(244, 236, 216, 0.96) 0%, rgba(227, 214, 176, 0.96) 100%);
border: 4px solid var(–sumi, #2b1d12);
box-shadow:
8px 8px 0 var(–sumi, #2b1d12),
inset 0 0 0 2px var(–gold, #f4d03f),
inset 0 0 0 6px rgba(244, 236, 216, 0.5);
text-align: center;
width: 100%;
}
/* 装飾コーナー */
#title-frame::before,
#title-frame::after {
content: “❀”;
position: absolute;
color: var(–beni, #c93857);
font-size: 22px;
line-height: 1;
}
#title-frame::before { top: 8px; left: 12px; }
#title-frame::after  { bottom: 8px; right: 12px; }

.title-subtitle {
font-size: 11px;
color: var(–matcha-dark, #4a6b35);
letter-spacing: 0.6em;
margin-bottom: 14px;
text-indent: 0.6em;
}

.title-main {
font-size: clamp(34px, 9vw, 56px);
color: var(–sumi, #2b1d12);
letter-spacing: 0.12em;
font-weight: 900;
line-height: 1.1;
text-shadow:
3px 3px 0 var(–gold, #f4d03f),
6px 6px 0 var(–beni, #c93857);
margin: 0;
animation: title-glow 3s ease-in-out infinite;
}
@keyframes title-glow {
0%, 100% { text-shadow: 3px 3px 0 var(–gold, #f4d03f), 6px 6px 0 var(–beni, #c93857); }
50% { text-shadow: 3px 3px 0 var(–gold, #f4d03f), 6px 6px 0 var(–beni, #c93857), 0 0 24px rgba(244, 208, 63, 0.5); }
}

.title-tagline {
margin-top: 18px;
padding-top: 14px;
border-top: 1px solid rgba(43, 29, 18, 0.3);
font-size: 12px;
color: var(–sumi, #2b1d12);
letter-spacing: 0.3em;
line-height: 1.8;
}
.title-tagline .accent {
color: var(–beni, #c93857);
font-weight: bold;
}

#start-btn {
margin-top: 8px;
padding: 18px 56px;
background-color: #c93857;
background: #c93857;
background: var(–beni, #c93857);
color: #f4ecd8;
color: var(–washi, #f4ecd8);
border: 4px solid #2b1d12;
border: 4px solid var(–sumi, #2b1d12);
font-size: 18px;
font-weight: bold;
letter-spacing: 0.4em;
text-indent: 0.4em;
cursor: pointer;
font-family: inherit;
box-shadow: 5px 5px 0 var(–sumi, #2b1d12), inset 0 0 0 2px rgba(244, 236, 216, 0.4);
transition: transform 100ms ease, box-shadow 100ms ease;
text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
animation: start-pulse 1.6s ease-in-out infinite;
}
#start-btn:active {
transform: translate(3px, 3px);
box-shadow: 2px 2px 0 var(–sumi, #2b1d12), inset 0 0 0 2px rgba(244, 236, 216, 0.4);
animation: none;
}
@keyframes start-pulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.04); }
}

.title-credit {
font-size: 10px;
color: rgba(244, 236, 216, 0.6);
letter-spacing: 0.3em;
margin-top: 4px;
}

/* ===== エンディング画面 ===== */
#ending {
position: absolute; inset: 0;
display: none;
flex-direction: column;
align-items: center;
justify-content: space-between;
z-index: 40;
background:
radial-gradient(ellipse at 50% 35%, rgba(255, 182, 193, 0.5) 0%, transparent 55%),
radial-gradient(ellipse at 50% 100%, rgba(244, 208, 63, 0.3) 0%, transparent 60%),
linear-gradient(180deg, #2b1d12 0%, #4a2818 50%, #2b1d12 100%);
overflow: hidden;
padding: 20px 16px;
text-align: center;
}
#ending.show { display: flex; animation: endingFadeIn 1.2s ease; }
@keyframes endingFadeIn {
from { opacity: 0; }
to { opacity: 1; }
}

/* エンディング用 桜＆紅葉吹雪 */
.confetti {
position: absolute;
width: 12px;
height: 12px;
pointer-events: none;
animation: confetti-fall linear infinite;
opacity: 0.85;
}
.confetti.sakura {
background: radial-gradient(circle at 35% 35%, #ffd5e0 0%, #ff8eb1 70%, #d6688e 100%);
border-radius: 50% 0% 50% 50%;
}
.confetti.momiji {
background: #c93857;
clip-path: polygon(50% 0%, 65% 25%, 90% 25%, 70% 50%, 85% 80%, 50% 65%, 15% 80%, 30% 50%, 10% 25%, 35% 25%);
}
.confetti.gold {
background: var(–gold, #f4d03f);
clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
}
@keyframes confetti-fall {
0% {
transform: translateY(-30px) rotate(0deg) translateX(0);
opacity: 0;
}
8% { opacity: 0.85; }
50% {
transform: translateY(50vh) rotate(540deg) translateX(50px);
}
100% {
transform: translateY(110vh) rotate(1080deg) translateX(-40px);
opacity: 0;
}
}

#ending-top {
position: relative;
z-index: 3;
padding-top: env(safe-area-inset-top, 0);
margin-top: 6px;
}
.ending-prelude {
font-size: 12px;
color: var(–gold, #f4d03f);
letter-spacing: 0.6em;
text-indent: 0.6em;
margin-bottom: 8px;
opacity: 0;
animation: enterFade 0.8s ease forwards 0.4s;
}
.ending-banner {
font-size: clamp(56px, 16vw, 110px);
color: var(–gold, #f4d03f);
letter-spacing: 0.25em;
text-indent: 0.25em;
font-weight: 900;
line-height: 1;
text-shadow:
4px 4px 0 var(–beni, #c93857),
8px 8px 0 var(–sumi, #2b1d12),
0 0 30px rgba(244, 208, 63, 0.7);
opacity: 0;
transform: scale(0.5);
animation: bannerEnter 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.8s;
}
@keyframes bannerEnter {
0% { opacity: 0; transform: scale(0.3) translateY(60px); }
60% { opacity: 1; transform: scale(1.15) translateY(0); }
100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes enterFade {
to { opacity: 1; }
}

/* キャラ整列エリア */
#ending-characters {
position: relative;
flex: 1;
width: 100%;
max-width: 600px;
display: flex;
align-items: flex-end;
justify-content: center;
gap: 4px;
z-index: 2;
margin: 0 auto;
min-height: 180px;
}
.ending-char {
position: relative;
width: 22%;
aspect-ratio: 1 / 1.4;
background-repeat: no-repeat;
background-size: 100% auto;
background-position: 0% 0%;
image-rendering: pixelated;
image-rendering: -moz-crisp-edges;
image-rendering: crisp-edges;
opacity: 0;
}
.ending-char.momotaro {
background-image: var(–momotaro-img);
background-size: 400% auto; /* idle 4フレーム分 */
width: 30%;
z-index: 3;
animation:
endingCharEnter 0.8s ease forwards 1.6s,
endingCharBounce 1.4s ease-in-out infinite 2.4s,
endingMomoIdle 0.8s steps(4) infinite 2.4s;
}
.ending-char.inu {
background-image: var(–inu-img);
animation:
endingCharEnter 0.8s ease forwards 1.9s,
endingCharBounce 1.2s ease-in-out infinite 2.7s;
}
.ending-char.saru {
background-image: var(–saru-img);
animation:
endingCharEnter 0.8s ease forwards 2.1s,
endingCharBounce 1.3s ease-in-out infinite 2.9s;
}
.ending-char.kiji {
background-image: var(–kiji-img);
animation:
endingCharEnter 0.8s ease forwards 2.3s,
endingCharBounce 1.1s ease-in-out infinite 3.1s;
}
@keyframes endingCharEnter {
from { opacity: 0; transform: translateY(40px) scale(0.8); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes endingCharBounce {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-14px); }
}
@keyframes endingMomoIdle {
from { background-position: 0% 0%; }
to { background-position: 400% 0%; }
}
.ending-char .char-label {
position: absolute;
bottom: -22px;
left: 50%;
transform: translateX(-50%);
font-size: 12px;
color: var(–washi, #f4ecd8);
background: rgba(43, 29, 18, 0.85);
padding: 2px 8px;
border: 1px solid var(–gold, #f4d03f);
letter-spacing: 0.2em;
white-space: nowrap;
}

/* 中央の日章旗風背景 */
#ending-characters::before {
content: “”;
position: absolute;
top: 50%;
left: 50%;
width: 80%;
aspect-ratio: 1;
transform: translate(-50%, -45%);
background:
conic-gradient(from 0deg,
transparent 0deg, rgba(244, 208, 63, 0.15) 4deg, transparent 8deg,
transparent 22deg, rgba(244, 208, 63, 0.15) 26deg, transparent 30deg,
transparent 44deg, rgba(244, 208, 63, 0.15) 48deg, transparent 52deg,
transparent 66deg, rgba(244, 208, 63, 0.15) 70deg, transparent 74deg,
transparent 88deg, rgba(244, 208, 63, 0.15) 92deg, transparent 96deg,
transparent 110deg, rgba(244, 208, 63, 0.15) 114deg, transparent 118deg,
transparent 132deg, rgba(244, 208, 63, 0.15) 136deg, transparent 140deg,
transparent 154deg, rgba(244, 208, 63, 0.15) 158deg, transparent 162deg,
transparent 176deg, rgba(244, 208, 63, 0.15) 180deg, transparent 184deg,
transparent 198deg, rgba(244, 208, 63, 0.15) 202deg, transparent 206deg,
transparent 220deg, rgba(244, 208, 63, 0.15) 224deg, transparent 228deg,
transparent 242deg, rgba(244, 208, 63, 0.15) 246deg, transparent 250deg,
transparent 264deg, rgba(244, 208, 63, 0.15) 268deg, transparent 272deg,
transparent 286deg, rgba(244, 208, 63, 0.15) 290deg, transparent 294deg,
transparent 308deg, rgba(244, 208, 63, 0.15) 312deg, transparent 316deg,
transparent 330deg, rgba(244, 208, 63, 0.15) 334deg, transparent 338deg,
transparent 352deg, rgba(244, 208, 63, 0.15) 356deg, transparent 360deg
),
radial-gradient(circle at center, rgba(255, 107, 157, 0.25) 0%, transparent 60%);
border-radius: 50%;
z-index: 0;
animation: ray-spin 30s linear infinite;
pointer-events: none;
}
@keyframes ray-spin {
from { transform: translate(-50%, -45%) rotate(0deg); }
to { transform: translate(-50%, -45%) rotate(360deg); }
}

#ending-bottom {
position: relative;
z-index: 3;
padding-bottom: env(safe-area-inset-bottom, 0);
margin-bottom: 6px;
display: flex;
flex-direction: column;
align-items: center;
gap: 14px;
margin-top: 38px;
}
.ending-medetashi {
font-size: clamp(18px, 4.5vw, 26px);
color: var(–washi, #f4ecd8);
letter-spacing: 0.5em;
text-indent: 0.5em;
text-shadow: 2px 2px 0 var(–sumi, #2b1d12);
opacity: 0;
animation: enterFade 0.8s ease forwards 3.2s;
}
.ending-stats {
font-size: 11px;
color: var(–gold, #f4d03f);
letter-spacing: 0.2em;
line-height: 1.7;
opacity: 0;
animation: enterFade 0.8s ease forwards 3.6s;
}
#ending-btn {
padding: 14px 44px;
background-color: #c93857;
background: #c93857;
background: var(–beni, #c93857);
color: #f4ecd8;
color: var(–washi, #f4ecd8);
border: 4px solid #f4ecd8;
border: 4px solid var(–washi, #f4ecd8);
font-size: 15px;
font-weight: bold;
letter-spacing: 0.3em;
text-indent: 0.3em;
cursor: pointer;
font-family: inherit;
box-shadow: 5px 5px 0 var(–washi, #f4ecd8);
transition: transform 100ms ease, box-shadow 100ms ease;
opacity: 0;
animation: enterFade 0.8s ease forwards 4.0s;
}
#ending-btn:active {
transform: translate(3px, 3px);
box-shadow: 2px 2px 0 var(–washi, #f4ecd8);
}
</style>

      enemies: [{ type: 'ao', count: 1 }],
      companion: 'saru',
      items: [{ type: 'kibidango', count: 1 }],
      intro: '猿と出会った！\n猿は桃太郎の攻撃間隔を短くしてくれる。',
      clearText: '青鬼を撃破！\nさらに空を飛ぶ雉の力が必要だ。',
    },
    { // 3: 第四話 雉の空
      num: '第四話', name: '雉の空', bgClass: 'stage-3',
      enemies: [{ type: 'ao', count: 2 }],
      companion: 'kiji',
      items: [{ type: 'kibidango', count: 1 }],
      intro: '雉と出会った！\n雉は桃太郎の攻撃に羽根の追撃を加える。',
      clearText: '三匹の仲間が揃った！\nいよいよ鬼ヶ島へ突入だ。',
    },
    { // 4: 第五話 鬼ヶ島突入
      num: '第五話', name: '鬼ヶ島突入', bgClass: 'stage-4',
      enemies: [{ type: 'aka', count: 2 }, { type: 'ao', count: 1 }],
      companion: null,
      items: [{ type: 'kibidango', count: 2 }, { type: 'momo', count: 1 }],
      intro: '鬼ヶ島に上陸！\nきびだんごと桃を集めて戦力を増強しよう。',
      clearText: '鬼の手下を一掃した！\nいよいよ最深部、黒鬼との決戦だ。',
    },
    { // 5: 第六話 黒鬼との決戦
      num: '第六話', name: '黒鬼との決戦', bgClass: 'stage-5',
      enemies: [{ type: 'kuro', count: 1 }],
      companion: null,
      items: [{ type: 'momo', count: 3 }, { type: 'kibidango', count: 2 }],
      intro: '鬼の親玉、巨大な黒鬼が現れた…！\n桃の力を総動員して打ち倒せ！',
      clearText: null, // 最終話、勝利演出へ
    },
  ];

  // 鬼のステータス定義
  const ONI_STATS = {
    aka:  { name: '赤鬼', hp: 2, speed: 35, atk: 1, atkRange: 45, atkCD: 1.5, radius: 24 },
    ao:   { name: '青鬼', hp: 4, speed: 45, atk: 1, atkRange: 50, atkCD: 1.3, radius: 26 },
    kuro: { name: '黒鬼', hp: 25, speed: 28, atk: 3, atkRange: 90, atkCD: 1.4, radius: 55 },
  };

  // 既出仲間（プレイヤーが救出済み）
  const rescuedSet = new Set();

  // ステージ
  let currentStageIdx = 0;

  const companions = []; // 画面上の仲間（救出済みは追従、未救出はその場で待機）
  const enemies = [];    // 鬼
  const items = [];      // アイテム
  const projectiles = []; // 投射体（雉の羽根）
  const effects = [];

  // 入力
  const input = { up: false, down: false, left: false, right: false, attack: false };
  let attackPressed = false;

  // ===== スプライトシート読み込み =====
  const playerSheet = new Image();
  const oniSheet = new Image();
  let loadedSheets = 0;
  function onSheetLoaded() {
    loadedSheets++;
    if (loadedSheets >= 2) {
      startGame();
    }
  }
  playerSheet.onload = onSheetLoaded;
  oniSheet.onload = onSheetLoaded;
  playerSheet.onerror = oniSheet.onerror = () => {
    document.getElementById('loading').textContent = '読み込み失敗';
  };
  playerSheet.src = PLAYER_SHEET_DATA;
  oniSheet.src = ONI_SHEET_DATA;

  function startGame() {
    document.getElementById('loading').classList.add('hidden');
    // エンディング用のキャラ画像を準備
    setupEndingCharacters();
    // タイトル画面の桜の花びらを生成
    generatePetals();
    // スタートボタンを有効化
    document.getElementById('start-btn').addEventListener('click', beginAdventure, { once: true });
  }

  function setupEndingCharacters() {
    // 桃太郎: idle行全体(4フレーム)を切り出してエンディング用画像に
    const momoCanvas = document.createElement('canvas');
    momoCanvas.width = P_W * 4;
    momoCanvas.height = P_H;
    const mctx = momoCanvas.getContext('2d');
    mctx.imageSmoothingEnabled = false;
    mctx.drawImage(
      playerSheet,
      0, P_ROW.idle * P_H, P_W * 4, P_H,
      0, 0, P_W * 4, P_H
    );
    const momoUrl = momoCanvas.toDataURL();

    // 仲間: 各1フレーム
    const compNames = ['inu', 'saru', 'kiji'];
    const compUrls = compNames.map((name, col) => {
      const c = document.createElement('canvas');
      c.width = C_W;
      c.height = C_H;
      const cx = c.getContext('2d');
      cx.imageSmoothingEnabled = false;
      cx.drawImage(playerSheet, col * C_W, COMPANION_ROW_Y, C_W, C_H, 0, 0, C_W, C_H);
      return c.toDataURL();
    });

    const root = document.documentElement;
    root.style.setProperty('--momotaro-img', `url(${momoUrl})`);
    root.style.setProperty('--inu-img', `url(${compUrls[0]})`);
    root.style.setProperty('--saru-img', `url(${compUrls[1]})`);
    root.style.setProperty('--kiji-img', `url(${compUrls[2]})`);
  }

  function beginAdventure() {
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('ending').classList.remove('show');
    document.getElementById('result').classList.remove('show', 'lose');
    // ステートをリセット
    player.hp = player.maxHp;
    player.kibidangoTimer = 0;
    player.momoTimer = 0;
    rescuedSet.clear();
    loadStage(0);
    if (!loopRunning) {
      loopRunning = true;
      requestAnimationFrame(loop);
    }
  }

  function returnToTitle() {
    // すべての画面を閉じる
    document.getElementById('result').classList.remove('show', 'lose');
    document.getElementById('stage-clear').classList.remove('show');
    document.getElementById('ending').classList.remove('show');
    // ゲーム状態をリセット（描画を止める）
    gameState = GS.TITLE;
    // タイトル画面を再表示
    document.getElementById('title-screen').classList.remove('hidden');
    // スタートボタンに再度リスナーを設定
    document.getElementById('start-btn').addEventListener('click', beginAdventure, { once: true });
  }

  function generatePetals() {
    const titleScreen = document.getElementById('title-screen');
    const petalCount = 22;
    for (let i = 0; i < petalCount; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = (Math.random() * 100) + '%';
      petal.style.animationDuration = (6 + Math.random() * 6) + 's';
      petal.style.animationDelay = (Math.random() * 10) + 's';
      const scale = 0.7 + Math.random() * 0.8;
      petal.style.width = (14 * scale) + 'px';
      petal.style.height = (14 * scale) + 'px';
      titleScreen.appendChild(petal);
    }
  }

  function generateEndingConfetti() {
    const ending = document.getElementById('ending');
    // 既存の紙吹雪を削除
    ending.querySelectorAll('.confetti').forEach(c => c.remove());
    const count = 45;
    const types = ['sakura', 'sakura', 'sakura', 'momiji', 'gold'];
    for (let i = 0; i < count; i++) {
      const c = document.createElement('div');
      const type = types[Math.floor(Math.random() * types.length)];
      c.className = `confetti ${type}`;
      c.style.left = (Math.random() * 100) + '%';
      c.style.animationDuration = (5 + Math.random() * 6) + 's';
      c.style.animationDelay = (Math.random() * 8) + 's';
      const scale = 0.6 + Math.random() * 1.2;
      c.style.width = (12 * scale) + 'px';
      c.style.height = (12 * scale) + 'px';
      ending.appendChild(c);
    }
  }

  // ===== ステージ読み込み =====
  function loadStage(idx) {
    currentStageIdx = idx;
    const stage = STAGES[idx];

    // 背景クラス
    const wrapper = document.getElementById('game-wrapper');
    wrapper.className = stage.bgClass;

    // プレイヤー位置リセット（HP/バフは引き継ぐ）
    player.x = stageW * 0.2;
    player.y = stageH * 0.5;
    player.state = 'idle';
    player.frame = 0;
    player.direction = 'right';
    player.attackTimer = 0;
    player.invincibleTimer = 0;
    player.attackCooldown = 0;
    // ステージ間でHP回復（少しだけ）
    player.hp = Math.min(player.maxHp, player.hp + 2);

    // 既存の救出済み仲間を保持（追従位置リセット）
    companions.length = 0;
    const COMP_TYPES = [
      { type: 'inu',  name: '犬', col: 0 },
      { type: 'saru', name: '猿', col: 1 },
      { type: 'kiji', name: '雉', col: 2 },
    ];
    let followIdx = 0;
    COMP_TYPES.forEach(ct => {
      if (rescuedSet.has(ct.type)) {
        companions.push({
          ...ct, x: player.x - 30, y: player.y,
          rescued: true,
          followIdx: followIdx++,
          bob: Math.random() * Math.PI * 2,
          attackCooldown: 0, // 犬用
        });
      }
    });

    // 新規救出仲間を配置
    if (stage.companion) {
      const ct = COMP_TYPES.find(c => c.type === stage.companion);
      if (ct && !rescuedSet.has(ct.type)) {
        const pos = randomSafePos(180, 80);
        companions.push({
          ...ct, x: pos.x, y: pos.y,
          rescued: false,
          followIdx: -1,
          bob: Math.random() * Math.PI * 2,
          attackCooldown: 0,
        });
      }
    }

    // trail リセット
    trail.length = 0;
    trail.push({ x: player.x, y: player.y });

    // 敵配置
    enemies.length = 0;
    stage.enemies.forEach(spec => {
      for (let i = 0; i < spec.count; i++) {
        const pos = randomSafePos(200, 80);
        const stats = ONI_STATS[spec.type];
        enemies.push({
          type: spec.type,
          name: stats.name,
          x: pos.x, y: pos.y,
          hp: stats.hp, maxHp: stats.hp,
          atk: stats.atk,
          atkRange: stats.atkRange,
          atkCD: stats.atkCD,
          attackCooldown: 0.5 + Math.random() * 1.0,
          speed: stats.speed,
          radius: stats.radius,
          state: 'walking',
          direction: 1, // 0=down, 1=left, 2=right
          animFrame: 0,
          animTimer: 0,
          attackAnimTimer: 0,
          attackedThisAnim: false,
          damageTimer: 0,
          deadTimer: 0,
          deadFrame: 0,
          hitFlash: 0,
          bob: Math.random() * Math.PI * 2,
        });
      }
    });

    // アイテム配置
    items.length = 0;
    stage.items.forEach(spec => {
      for (let i = 0; i < spec.count; i++) {
        const pos = randomSafePos(100, 60);
        items.push({
          type: spec.type,
          x: pos.x, y: pos.y,
          bob: Math.random() * Math.PI * 2,
        });
      }
    });

    projectiles.length = 0;
    effects.length = 0;

    // UI更新
    document.getElementById('stageNum').textContent = stage.num;
    document.getElementById('stageName').textContent = stage.name;
    updateHUD();
    gameState = GS.PLAYING;
    document.getElementById('stage-clear').classList.remove('show');
    document.getElementById('result').classList.remove('show', 'lose');

    // イントロトースト
    showToast(stage.intro, 3500);
  }

  function randomSafePos(minDistFromPlayer, margin = 60) {
    for (let i = 0; i < 80; i++) {
      const x = margin + Math.random() * (stageW - margin * 2);
      const y = margin + Math.random() * (stageH - margin * 2);
      const dist = Math.hypot(x - player.x, y - player.y);
      if (dist > minDistFromPlayer) return { x, y };
    }
    return { x: stageW - margin, y: stageH - margin };
  }

  // ===== 入力 =====
  const keyMap = {
    'ArrowUp': 'up', 'KeyW': 'up',
    'ArrowDown': 'down', 'KeyS': 'down',
    'ArrowLeft': 'left', 'KeyA': 'left',
    'ArrowRight': 'right', 'KeyD': 'right',
    'Space': 'attack', 'KeyJ': 'attack', 'Enter': 'attack',
  };
  window.addEventListener('keydown', e => {
    const d = keyMap[e.code];
    if (d) {
      if (d === 'attack' && !input.attack) attackPressed = true;
      input[d] = true;
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => {
    const d = keyMap[e.code];
    if (d) { input[d] = false; e.preventDefault(); }
  });

  // D-Pad
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    const dir = btn.dataset.dir;
    const start = e => { e.preventDefault(); input[dir] = true; btn.classList.add('active'); };
    const end   = e => { e.preventDefault(); input[dir] = false; btn.classList.remove('active'); };
    btn.addEventListener('touchstart', start, { passive: false });
    btn.addEventListener('touchend', end, { passive: false });
    btn.addEventListener('touchcancel', end, { passive: false });
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', end);
    btn.addEventListener('mouseleave', end);
  });

  // 攻撃ボタン
  const attackBtn = document.getElementById('attackBtn');
  const attackStart = e => {
    e.preventDefault();
    if (!input.attack) attackPressed = true;
    input.attack = true;
    attackBtn.classList.add('active');
  };
  const attackEnd = e => {
    e.preventDefault();
    input.attack = false;
    attackBtn.classList.remove('active');
  };
  attackBtn.addEventListener('touchstart', attackStart, { passive: false });
  attackBtn.addEventListener('touchend', attackEnd, { passive: false });
  attackBtn.addEventListener('touchcancel', attackEnd, { passive: false });
  attackBtn.addEventListener('mousedown', attackStart);
  attackBtn.addEventListener('mouseup', attackEnd);
  attackBtn.addEventListener('mouseleave', attackEnd);

  // ボタン
  document.getElementById('nextBtn').addEventListener('click', () => {
    const nextIdx = currentStageIdx + 1;
    if (nextIdx >= STAGES.length) {
      onFinalWin();
    } else {
      loadStage(nextIdx);
    }
  });
  document.getElementById('restartBtn').addEventListener('click', returnToTitle);
  document.getElementById('ending-btn').addEventListener('click', returnToTitle);

  // ===== トースト =====
  let toastTimer = null;
  function showToast(text, duration = 2200) {
    const t = document.getElementById('toast');
    t.innerHTML = text.replace(/\n/g, '<br>');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), duration);
  }

  // ===== HUD更新 =====
  function updateHUD() {
    const hpBar = document.getElementById('hpBar');
    hpBar.innerHTML = '';
    for (let i = 0; i < player.maxHp; i++) {
      const dot = document.createElement('span');
      dot.className = 'hp-dot' + (i >= player.hp ? ' lost' : '');
      hpBar.appendChild(dot);
    }

    // 仲間バッジ
    const compBadges = document.getElementById('compBadges');
    compBadges.innerHTML = '';
    const compList = [
      { type: 'inu',  label: '犬' },
      { type: 'saru', label: '猿' },
      { type: 'kiji', label: '雉' },
    ];
    compList.forEach(c => {
      const badge = document.createElement('span');
      badge.className = 'comp-badge' + (rescuedSet.has(c.type) ? ' active' : '');
      badge.textContent = c.label;
      compBadges.appendChild(badge);
    });

    // 鬼カウント
    const remaining = enemies.filter(e => e.state !== 'dead').length;
    const total = enemies.length;
    document.getElementById('oniCount').textContent = `${total - remaining}/${total}`;

    // バフ
    const buffArea = document.getElementById('buffArea');
    buffArea.innerHTML = '';
    if (player.kibidangoTimer > 0) {
      const b = document.createElement('span');
      b.className = 'buff-icon';
      b.textContent = '団';
      b.title = 'きびだんご効果';
      buffArea.appendChild(b);
    }
    if (player.momoTimer > 0) {
      const b = document.createElement('span');
      b.className = 'buff-icon momo';
      b.textContent = '桃';
      b.title = '桃太郎モード';
      buffArea.appendChild(b);
    }
  }

  // ===== 装飾 =====
  const decor = [];
  function generateDecor() {
    decor.length = 0;
    const count = Math.floor((stageW * stageH) / 7500);
    for (let i = 0; i < count; i++) {
      decor.push({
        x: Math.random() * stageW,
        y: Math.random() * stageH,
        type: Math.random() < 0.85 ? 'grass' : 'flower',
        color: Math.random() < 0.5 ? '#c93857' : '#f4d03f',
        sway: Math.random() * Math.PI * 2,
      });
    }
  }
  generateDecor();
  window.addEventListener('resize', () => generateDecor());

  // ===== 描画ヘルパ =====
  function drawBackground(t) {
    for (const d of decor) {
      const offset = Math.sin(t * 0.002 + d.sway) * 1.2;
      if (d.type === 'grass') {
        ctx.strokeStyle = 'rgba(40, 60, 30, 0.45)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + offset, d.y - 6);
        ctx.stroke();
      } else {
        ctx.fillStyle = d.color;
        ctx.beginPath();
        ctx.arc(d.x + offset * 0.5, d.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(d.x + offset * 0.5, d.y, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawShadow(x, y, rx, ry) {
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    let row, col;
    if (player.state === 'attacking') {
      row = P_ROW.attack;
      col = player.frame;
    } else if (player.state === 'walking') {
      row = P_ROW[player.direction];
      col = player.frame;
    } else {
      row = P_ROW.idle;
      col = player.frame;
    }
    const sx = col * P_W;
    const sy = row * P_H;
    const dw = P_W * PLAYER_SCALE;
    const dh = P_H * PLAYER_SCALE;

    drawShadow(player.x, player.y + dh * 0.40, dw * 0.22, dw * 0.08);

    // 桃太郎モードのオーラ
    if (player.momoTimer > 0) {
      ctx.save();
      const auraT = (performance.now() / 200) % (Math.PI * 2);
      ctx.shadowColor = '#ff6b9d';
      ctx.shadowBlur = 20 + Math.sin(auraT) * 8;
      ctx.fillStyle = 'rgba(255, 107, 157, 0.0)';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 無敵時の点滅
    const visible = player.invincibleTimer <= 0 || Math.floor(player.invincibleTimer * 14) % 2 === 0;
    if (visible) {
      ctx.save();
      if (player.momoTimer > 0) {
        // 桃モードの淡いピンクオーバーレイ
        ctx.filter = 'drop-shadow(0 0 8px rgba(255, 107, 157, 0.8))';
      } else if (player.kibidangoTimer > 0) {
        ctx.filter = 'drop-shadow(0 0 4px rgba(244, 208, 63, 0.7))';
      }
      ctx.drawImage(
        playerSheet,
        sx, sy, P_W, P_H,
        Math.round(player.x - dw / 2),
        Math.round(player.y - dh / 2),
        dw, dh
      );
      ctx.restore();
    }
  }

  function drawCompanion(c) {
    const sx = c.col * C_W;
    const sy = COMPANION_ROW_Y;
    const dw = C_W * COMP_SCALE;
    const dh = C_H * COMP_SCALE;
    const bobY = Math.sin(performance.now() * 0.005 + c.bob) * 2;
    drawShadow(c.x, c.y + dh * 0.40, dw * 0.22, dw * 0.08);
    ctx.drawImage(
      playerSheet,
      sx, sy, C_W, C_H,
      Math.round(c.x - dw / 2),
      Math.round(c.y - dh / 2 + bobY),
      dw, dh
    );
    if (!c.rescued) {
      ctx.save();
      const pulse = 1 + Math.sin(performance.now() * 0.008) * 0.15;
      ctx.font = `bold ${18 * pulse}px serif`;
      ctx.fillStyle = '#f4d03f';
      ctx.strokeStyle = '#2b1d12';
      ctx.lineWidth = 3;
      ctx.textAlign = 'center';
      ctx.strokeText('！', c.x, c.y - dh / 2 + bobY - 8);
      ctx.fillText('！', c.x, c.y - dh / 2 + bobY - 8);
      ctx.restore();
    }
  }

  function drawOni(e) {
    let row, col;
    if (e.state === 'dead') {
      row = 4; col = 2; // dead_1
    } else if (e.state === 'dying') {
      row = 4; col = 1; // dead_0
    } else if (e.state === 'damaged') {
      row = 4; col = 0; // damage_0
    } else if (e.state === 'attacking') {
      row = 3; col = e.animFrame;
    } else if (e.state === 'walking') {
      row = e.direction; col = e.animFrame;
    } else {
      row = 0; col = 0;
    }
    const colOff = ONI_COLOR_OFFSETS[e.type];
    const sx = (colOff + col) * O_W;
    const sy = row * O_H;

    const baseScale = ONI_SCALE * (e.type === 'kuro' ? 2.2 : 1.0);
    const dw = O_W * baseScale;
    const dh = O_H * baseScale;

    if (e.state !== 'dead' && e.state !== 'dying') {
      const bobY = Math.sin(performance.now() * 0.004 + e.bob) * 2;
      drawShadow(e.x, e.y + dh * 0.40, dw * 0.25, dw * 0.10);
      ctx.save();
      if (e.hitFlash > 0) {
        ctx.filter = 'brightness(1.8) saturate(0.5)';
      }
      ctx.drawImage(
        oniSheet,
        sx, sy, O_W, O_H,
        Math.round(e.x - dw / 2),
        Math.round(e.y - dh / 2 + bobY),
        dw, dh
      );
      ctx.restore();
    } else {
      // 倒れた鬼は影なし、半透明気味
      ctx.save();
      ctx.globalAlpha = e.state === 'dead' ? 0.75 : 1;
      ctx.drawImage(
        oniSheet,
        sx, sy, O_W, O_H,
        Math.round(e.x - dw / 2),
        Math.round(e.y - dh / 2),
        dw, dh
      );
      ctx.restore();
    }

    // HPバー
    if (e.state !== 'dead' && e.state !== 'dying' && e.maxHp > 1 && e.hp < e.maxHp) {
      const barW = e.type === 'kuro' ? 120 : 45;
      const barH = e.type === 'kuro' ? 9 : 4;
      const bx = e.x - barW / 2;
      const by = e.y - dh / 2 - 12;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
      ctx.fillStyle = '#5a1010';
      ctx.fillRect(bx, by, barW, barH);
      const hpColor = e.type === 'kuro' ? '#9966ff' : '#e84545';
      ctx.fillStyle = hpColor;
      ctx.fillRect(bx, by, barW * (e.hp / e.maxHp), barH);
      // 黒鬼にだけBOSSラベル
      if (e.type === 'kuro') {
        ctx.save();
        ctx.font = 'bold 11px serif';
        ctx.fillStyle = '#ff6b9d';
        ctx.strokeStyle = '#2b1d12';
        ctx.lineWidth = 3;
        ctx.textAlign = 'center';
        ctx.strokeText('― 鬼の親玉 黒鬼 ―', e.x, by - 6);
        ctx.fillText('― 鬼の親玉 黒鬼 ―', e.x, by - 6);
        ctx.restore();
      }
    }
  }

  function drawItem(item) {
    const bobY = Math.sin(performance.now() * 0.005 + item.bob) * 3;
    drawShadow(item.x, item.y + 14, 10, 3);

    if (item.type === 'kibidango') {
      // 串団子
      ctx.save();
      ctx.strokeStyle = '#5a3a0a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(item.x, item.y + bobY - 14);
      ctx.lineTo(item.x, item.y + bobY + 14);
      ctx.stroke();
      [-8, 0, 8].forEach((dy, i) => {
        const colors = ['#fff5d6', '#f4d03f', '#d49858'];
        ctx.fillStyle = colors[i];
        ctx.strokeStyle = '#8b6914';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(item.x, item.y + bobY + dy, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // ハイライト
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(item.x - 2, item.y + bobY + dy - 2, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
      // 「！」マーク
      ctx.save();
      const sparkleA = (performance.now() / 100) % (Math.PI * 2);
      for (let k = 0; k < 3; k++) {
        const a = sparkleA + (k * Math.PI * 2 / 3);
        const r = 18;
        ctx.fillStyle = '#fff8d0';
        ctx.beginPath();
        ctx.arc(item.x + Math.cos(a) * r, item.y + bobY + Math.sin(a) * r, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    } else if (item.type === 'momo') {
      // 桃
      ctx.save();
      // 葉
      ctx.fillStyle = '#4a6b35';
      ctx.beginPath();
      ctx.ellipse(item.x + 5, item.y + bobY - 12, 7, 3, -0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6b8e4e';
      ctx.beginPath();
      ctx.ellipse(item.x + 5, item.y + bobY - 13, 6, 2.5, -0.6, 0, Math.PI * 2);
      ctx.fill();
      // 茎
      ctx.strokeStyle = '#4a3010';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(item.x, item.y + bobY - 8);
      ctx.lineTo(item.x + 2, item.y + bobY - 14);
      ctx.stroke();
      // 桃本体
      ctx.fillStyle = '#ff8eb1';
      ctx.beginPath();
      ctx.arc(item.x - 5, item.y + bobY - 1, 10, 0, Math.PI * 2);
      ctx.arc(item.x + 5, item.y + bobY - 1, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(item.x - 14, item.y + bobY - 1);
      ctx.quadraticCurveTo(item.x, item.y + bobY + 20, item.x + 14, item.y + bobY - 1);
      ctx.fill();
      // 中央の溝
      ctx.strokeStyle = '#d6688e';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(item.x, item.y + bobY - 8);
      ctx.lineTo(item.x, item.y + bobY + 12);
      ctx.stroke();
      // ハイライト
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.ellipse(item.x - 6, item.y + bobY - 4, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // 周りのキラキラ
      const sparkleA = (performance.now() / 80) % (Math.PI * 2);
      for (let k = 0; k < 5; k++) {
        const a = sparkleA + (k * Math.PI * 2 / 5);
        const r = 22 + Math.sin(performance.now() / 200 + k) * 3;
        ctx.fillStyle = '#ffe0f0';
        const sx = item.x + Math.cos(a) * r;
        const sy = item.y + bobY + Math.sin(a) * r;
        ctx.beginPath();
        ctx.moveTo(sx, sy - 2);
        ctx.lineTo(sx + 2, sy);
        ctx.lineTo(sx, sy + 2);
        ctx.lineTo(sx - 2, sy);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawProjectile(p) {
    ctx.save();
    if (p.type === 'feather') {
      // 雉の羽根
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = '#3a6b40';
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5a8d50';
      ctx.beginPath();
      ctx.ellipse(0, 0, 10, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // 軸
      ctx.strokeStyle = '#fff8d0';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-10, 0);
      ctx.lineTo(10, 0);
      ctx.stroke();
      // 羽の細部
      ctx.strokeStyle = 'rgba(43, 29, 18, 0.4)';
      for (let i = -8; i <= 8; i += 3) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i + 2, -3);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i + 2, 3);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawEffects() {
    const now = performance.now();
    for (let i = effects.length - 1; i >= 0; i--) {
      const ef = effects[i];
      const t = (now - ef.startTime) / ef.duration;
      if (t >= 1) { effects.splice(i, 1); continue; }
      ctx.save();
      if (ef.kind === 'slash') {
        ctx.translate(ef.x, ef.y);
        ctx.rotate(ef.angle);
        ctx.globalAlpha = 1 - t;
        const r = 30 + t * 25 + (ef.power || 0) * 10;
        ctx.strokeStyle = ef.color || '#fff';
        ctx.lineWidth = (4 + (1 - t) * 4) * (1 + (ef.power || 0) * 0.5);
        ctx.beginPath();
        ctx.arc(0, 0, r, -Math.PI / 3, Math.PI / 3);
        ctx.stroke();
        ctx.strokeStyle = ef.color2 || 'rgba(170, 220, 255, 0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, r - 6, -Math.PI / 3, Math.PI / 3);
        ctx.stroke();
      } else if (ef.kind === 'damage') {
        const y = ef.y - t * 28;
        ctx.globalAlpha = 1 - t;
        ctx.font = `bold ${ef.size || 18}px serif`;
        ctx.fillStyle = ef.color || '#fff';
        ctx.strokeStyle = '#2b1d12';
        ctx.lineWidth = 3;
        ctx.textAlign = 'center';
        ctx.strokeText(ef.text, ef.x, y);
        ctx.fillText(ef.text, ef.x, y);
      } else if (ef.kind === 'rescue') {
        ctx.globalAlpha = 1 - t;
        const r = t * 30;
        ctx.strokeStyle = '#f4d03f';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#fff8d0';
        for (let k = 0; k < 6; k++) {
          const a = (k / 6) * Math.PI * 2 + t * 2;
          const rr = r * 0.9;
          ctx.beginPath();
          ctx.arc(ef.x + Math.cos(a) * rr, ef.y + Math.sin(a) * rr, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (ef.kind === 'defeat') {
        ctx.globalAlpha = 1 - t;
        for (let k = 0; k < 5; k++) {
          const a = (k / 5) * Math.PI * 2;
          const d = t * 25;
          ctx.fillStyle = 'rgba(200, 200, 200, 0.8)';
          ctx.beginPath();
          ctx.arc(ef.x + Math.cos(a) * d, ef.y + Math.sin(a) * d, 6, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (ef.kind === 'bite') {
        // 犬の噛みつきエフェクト
        ctx.globalAlpha = 1 - t;
        ctx.translate(ef.x, ef.y);
        ctx.rotate(ef.angle || 0);
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#2b1d12';
        ctx.lineWidth = 2;
        const size = 14 + t * 8;
        // 三角の歯
        ctx.beginPath();
        ctx.moveTo(-size, -size);
        ctx.lineTo(-size + 6, -size + 8);
        ctx.lineTo(-size + 2, -size + 12);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(size, -size);
        ctx.lineTo(size - 6, -size + 8);
        ctx.lineTo(size - 2, -size + 12);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      } else if (ef.kind === 'pickup') {
        ctx.globalAlpha = 1 - t;
        const r = t * 35;
        ctx.strokeStyle = ef.color || '#f4d03f';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, r, 0, Math.PI * 2);
        ctx.stroke();
      } else if (ef.kind === 'momoBurst') {
        // 桃太郎モード発動：放射状の花びらバースト
        ctx.globalAlpha = 1 - t;
        for (let k = 0; k < 10; k++) {
          const a = (k / 10) * Math.PI * 2;
          const d = t * 80;
          ctx.fillStyle = '#ff8eb1';
          ctx.beginPath();
          ctx.arc(ef.x + Math.cos(a) * d, ef.y + Math.sin(a) * d, 8 - t * 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffd0e0';
          ctx.beginPath();
          ctx.arc(ef.x + Math.cos(a) * d * 0.8, ef.y + Math.sin(a) * d * 0.8, 4 - t * 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }
  }

  function spawnEffect(kind, x, y, opts = {}) {
    effects.push({
      kind, x, y,
      startTime: performance.now(),
      duration: opts.duration || 400,
      angle: opts.angle || 0,
      text: opts.text || '',
      color: opts.color || '#fff',
      color2: opts.color2,
      size: opts.size,
      power: opts.power || 0,
    });
  }

  // ===== プレイヤー攻撃 =====
  function getAttackPower() {
    let p = 1;
    if (player.kibidangoTimer > 0) p += 1;
    if (player.momoTimer > 0) p += 4;
    return p;
  }
  function getAttackCooldown() {
    // 猿がいるとクールダウン短縮
    let cd = 0.55;
    if (rescuedSet.has('saru')) cd = 0.32;
    if (player.momoTimer > 0) cd *= 0.7;
    return cd;
  }
  function getAttackReach() {
    let r = 52;
    if (player.momoTimer > 0) r += 20;
    if (player.kibidangoTimer > 0) r += 8;
    return r;
  }
  function getAttackHitRadius() {
    let r = 42;
    if (player.momoTimer > 0) r += 15;
    return r;
  }

  function startAttack() {
    if (player.state === 'attacking') return;
    if (gameState !== GS.PLAYING) return;
    if (player.attackCooldown > 0) return;
    player.state = 'attacking';
    player.frame = 0;
    player.attackTimer = 0;
    player.attackCooldown = getAttackCooldown();

    setTimeout(() => doAttackHit(), 130);

    // 斬撃エフェクト
    const ahead = getAttackForward();
    const ang = Math.atan2(ahead.dy, ahead.dx);
    let color = '#fff', color2 = 'rgba(170, 220, 255, 0.8)';
    if (player.momoTimer > 0) {
      color = '#ffd0e0'; color2 = '#ff6b9d';
    } else if (player.kibidangoTimer > 0) {
      color = '#fff8d0'; color2 = '#f4d03f';
    }
    spawnEffect('slash', ahead.x, ahead.y, {
      angle: ang, duration: 280,
      color, color2,
      power: (player.kibidangoTimer > 0 ? 0.5 : 0) + (player.momoTimer > 0 ? 1.2 : 0),
    });

    // 雉がいると羽根を飛ばす
    if (rescuedSet.has('kiji')) {
      const featherCount = player.momoTimer > 0 ? 3 : 1;
      for (let i = 0; i < featherCount; i++) {
        const spread = (i - (featherCount - 1) / 2) * 0.25;
        const baseAng = Math.atan2(ahead.dy, ahead.dx);
        projectiles.push({
          type: 'feather',
          x: player.x, y: player.y,
          vx: Math.cos(baseAng + spread) * 360,
          vy: Math.sin(baseAng + spread) * 360,
          angle: baseAng + spread,
          life: 0.8,
          damage: getAttackPower(),
        });
      }
    }
  }

  function getAttackForward() {
    const reach = getAttackReach();
    let dx = 0, dy = 0;
    switch (player.direction) {
      case 'up': dy = -1; break;
      case 'down': dy = 1; break;
      case 'left': dx = -1; break;
      case 'right': dx = 1; break;
    }
    return { x: player.x + dx * reach, y: player.y + dy * reach, dx, dy };
  }

  function doAttackHit() {
    if (player.state !== 'attacking') return;
    const a = getAttackForward();
    const hitRadius = getAttackHitRadius();
    let hitAny = false;
    for (const e of enemies) {
      if (e.state === 'dead' || e.state === 'dying') continue;
      const dist = Math.hypot(e.x - a.x, e.y - a.y);
      if (dist < hitRadius + e.radius) {
        const damage = getAttackPower();
        dealDamageToOni(e, damage);
        hitAny = true;
        // ノックバック
        const dx = e.x - player.x;
        const dy = e.y - player.y;
        const dlen = Math.hypot(dx, dy) || 1;
        const kb = player.momoTimer > 0 ? 28 : 16;
        e.x += (dx / dlen) * kb;
        e.y += (dy / dlen) * kb;
      }
    }
    if (hitAny) updateHUD();
  }

  function dealDamageToOni(e, damage) {
    if (e.state === 'dead' || e.state === 'dying') return;
    e.hp -= damage;
    e.hitFlash = 0.15;
    spawnEffect('damage', e.x, e.y - 30, {
      text: `-${damage}`,
      color: damage >= 4 ? '#ff6b9d' : (damage >= 2 ? '#ffd700' : '#ff8888'),
      size: damage >= 4 ? 24 : (damage >= 2 ? 20 : 18),
      duration: 700,
    });
    if (e.hp <= 0) {
      e.hp = 0;
      e.state = 'dying';
      e.deadTimer = 0;
      spawnEffect('defeat', e.x, e.y, { duration: 600 });
      spawnEffect('damage', e.x, e.y - 40, {
        text: `${e.name}撃破！`,
        color: '#f4d03f',
        duration: 1100,
      });
    } else if (e.state !== 'attacking') {
      // 攻撃中ではないときだけダメージモーション
      e.state = 'damaged';
      e.damageTimer = 0;
    }
  }

  function damagePlayer(amount) {
    if (player.invincibleTimer > 0) return;
    if (player.momoTimer > 0) return; // 桃モード中は無敵
    if (gameState !== GS.PLAYING) return;
    player.hp -= amount;
    player.invincibleTimer = 1.0;
    spawnEffect('damage', player.x, player.y - 30, {
      text: `-${amount}`,
      color: '#ff5050',
      duration: 700,
    });
    updateHUD();
    if (player.hp <= 0) {
      player.hp = 0;
      onLose();
    }
  }

  function tryRescueCompanion() {
    for (const c of companions) {
      if (c.rescued) continue;
      const dist = Math.hypot(c.x - player.x, c.y - player.y);
      if (dist < 46) {
        c.rescued = true;
        rescuedSet.add(c.type);
        c.followIdx = companions.filter(cc => cc.rescued).length - 1;
        spawnEffect('rescue', c.x, c.y, { duration: 800 });
        spawnEffect('damage', c.x, c.y - 50, {
          text: `${c.name}が仲間に！`,
          color: '#f4d03f',
          duration: 1400, size: 20,
        });
        showToast(`${c.name}が仲間になった！`, 2000);
        updateHUD();
      }
    }
  }

  function tryPickupItems() {
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (Math.hypot(it.x - player.x, it.y - player.y) < 48) {
        if (it.type === 'kibidango') {
          player.kibidangoTimer = Math.max(player.kibidangoTimer, 12);
          spawnEffect('pickup', it.x, it.y, { color: '#f4d03f', duration: 600 });
          spawnEffect('damage', it.x, it.y - 30, {
            text: 'きびだんご！攻撃力↑',
            color: '#f4d03f',
            duration: 1400, size: 16,
          });
          showToast('きびだんご GET！\n攻撃力 +1（12秒）', 2000);
        } else if (it.type === 'momo') {
          player.hp = player.maxHp;
          player.momoTimer = Math.max(player.momoTimer, 8);
          spawnEffect('momoBurst', player.x, player.y, { duration: 800 });
          spawnEffect('pickup', it.x, it.y, { color: '#ff6b9d', duration: 700 });
          spawnEffect('damage', it.x, it.y - 30, {
            text: '桃太郎モード発動！',
            color: '#ff6b9d',
            duration: 1500, size: 18,
          });
          showToast('桃を食べた！\n桃太郎モード発動（8秒）', 2200);
        }
        items.splice(i, 1);
        updateHUD();
      }
    }
  }

  // ===== 仲間追従 =====
  const trail = [];
  const TRAIL_SPACING = 36;

  function updateTrail() {
    const head = { x: player.x, y: player.y };
    if (trail.length === 0) {
      trail.push(head);
    } else {
      const last = trail[trail.length - 1];
      const d = Math.hypot(head.x - last.x, head.y - last.y);
      if (d > 2) {
        const steps = Math.ceil(d / 2);
        for (let i = 1; i <= steps; i++) {
          trail.push({
            x: last.x + (head.x - last.x) * (i / steps),
            y: last.y + (head.y - last.y) * (i / steps)
          });
        }
      }
    }
    const needed = companions.filter(c => c.rescued).length;
    const maxLen = TRAIL_SPACING * (needed + 1) * 2 + 60;
    while (trail.length > maxLen) trail.shift();
  }

  function updateCompanionPositions() {
    const followers = companions.filter(c => c.rescued).sort((a, b) => a.followIdx - b.followIdx);
    followers.forEach((c, i) => {
      const targetDist = TRAIL_SPACING * (i + 1);
      let acc = 0;
      let target = null;
      for (let k = trail.length - 1; k > 0; k--) {
        const dx = trail[k].x - trail[k-1].x;
        const dy = trail[k].y - trail[k-1].y;
        const step = Math.hypot(dx, dy);
        if (acc + step >= targetDist) {
          const remain = targetDist - acc;
          const ratio = step > 0 ? remain / step : 0;
          target = {
            x: trail[k].x - dx * ratio,
            y: trail[k].y - dy * ratio,
          };
          break;
        }
        acc += step;
      }
      if (target) {
        c.x = target.x;
        c.y = target.y;
      }
    });
  }

  // 犬の自動噛みつき
  function updateDogAttack(dt) {
    const dog = companions.find(c => c.type === 'inu' && c.rescued);
    if (!dog) return;
    dog.attackCooldown -= dt;
    if (dog.attackCooldown > 0) return;
    let best = null, bestDist = Infinity;
    for (const e of enemies) {
      if (e.state === 'dead' || e.state === 'dying') continue;
      const d = Math.hypot(e.x - dog.x, e.y - dog.y);
      if (d < 60 && d < bestDist) { best = e; bestDist = d; }
    }
    if (best) {
      dealDamageToOni(best, 1);
      dog.attackCooldown = 1.2;
      const ang = Math.atan2(best.y - dog.y, best.x - dog.x);
      spawnEffect('bite', best.x, best.y - 6, { angle: ang, duration: 350 });
      updateHUD();
    }
  }

  // ===== 鬼AI =====
  function updateEnemies(dt) {
    for (const e of enemies) {
      if (e.state === 'dead') continue;
      if (e.hitFlash > 0) e.hitFlash -= dt;

      if (e.state === 'dying') {
        e.deadTimer += dt;
        if (e.deadTimer >= 0.4) {
          e.state = 'dead';
        }
        continue;
      }
      if (e.state === 'damaged') {
        e.damageTimer += dt;
        if (e.damageTimer >= 0.25) {
          e.state = 'walking';
          e.animFrame = 0;
        }
        continue;
      }
      if (e.state === 'attacking') {
        e.attackAnimTimer += dt;
        if (e.attackAnimTimer >= 0.16) {
          e.attackAnimTimer = 0;
          e.animFrame++;
          if (e.animFrame === 1 && !e.attackedThisAnim) {
            // 振り抜きでダメージ
            const d = Math.hypot(player.x - e.x, player.y - e.y);
            if (d < e.atkRange) damagePlayer(e.atk);
            e.attackedThisAnim = true;
          }
          if (e.animFrame >= 3) {
            e.animFrame = 0;
            e.state = 'walking';
            e.attackCooldown = e.atkCD;
            e.attackedThisAnim = false;
          }
        }
        continue;
      }

      // walking - chase player
      e.attackCooldown -= dt;
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.hypot(dx, dy);

      // 攻撃判定
      if (dist < e.atkRange && e.attackCooldown <= 0) {
        e.state = 'attacking';
        e.animFrame = 0;
        e.attackAnimTimer = 0;
        e.attackedThisAnim = false;
        continue;
      }

      // 移動
      if (dist > 1) {
        const vx = (dx / dist) * e.speed;
        const vy = (dy / dist) * e.speed;
        e.x += vx * dt;
        e.y += vy * dt;
        // 方向
        if (Math.abs(vx) > Math.abs(vy)) {
          e.direction = vx < 0 ? 1 : 2;
        } else {
          e.direction = 0; // down
        }
      }

      // 接触ダメージ（攻撃モーション以外でも触れたら）
      if (dist < e.radius + player.radius - 4) {
        damagePlayer(1);
        const knock = 14;
        e.x -= (dx / dist) * knock;
        e.y -= (dy / dist) * knock;
      }

      // 歩行アニメ
      e.animTimer += dt;
      if (e.animTimer >= 0.18) {
        e.animTimer = 0;
        e.animFrame = (e.animFrame + 1) % 3;
      }
      e.state = 'walking';
    }
  }

  function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0 || p.x < -20 || p.x > stageW + 20 || p.y < -20 || p.y > stageH + 20) {
        projectiles.splice(i, 1);
        continue;
      }
      // 当たり判定
      for (const e of enemies) {
        if (e.state === 'dead' || e.state === 'dying') continue;
        const d = Math.hypot(e.x - p.x, e.y - p.y);
        if (d < e.radius + 10) {
          dealDamageToOni(e, p.damage);
          projectiles.splice(i, 1);
          updateHUD();
          break;
        }
      }
    }
  }

  // ===== ステージクリア判定 =====
  function checkStageClear() {
    if (gameState !== GS.PLAYING) return;
    const aliveCount = enemies.filter(e => e.state !== 'dead' && e.state !== 'dying').length;
    if (aliveCount === 0 && enemies.length > 0) {
      onStageClear();
    }
  }

  function onStageClear() {
    gameState = GS.STAGE_CLEAR;
    const stage = STAGES[currentStageIdx];
    setTimeout(() => {
      if (currentStageIdx >= STAGES.length - 1) {
        // 最終話：完全勝利
        onFinalWin();
      } else {
        document.getElementById('clearTitle').textContent = `${stage.num} クリア！`;
        document.getElementById('clearMessage').innerHTML =
          (stage.clearText || '').replace(/\n/g, '<br>');
        document.getElementById('stage-clear').classList.add('show');
      }
    }, 800);
  }

  function onFinalWin() {
    gameState = GS.WIN;
    // エンディング画面を表示
    const ending = document.getElementById('ending');
    // 紙吹雪を生成
    generateEndingConfetti();
    // 統計テキスト
    const comps = rescuedSet.size;
    document.getElementById('ending-stats').innerHTML =
      `― 制覇記録 ―<br>仲間 ${comps} / 3 ・ 残り体力 ${player.hp} / ${player.maxHp}`;
    ending.classList.add('show');
  }

  function onLose() {
    gameState = GS.LOSE;
    document.getElementById('resultTitle').textContent = '敗北…';
    const stage = STAGES[currentStageIdx];
    document.getElementById('resultSub').innerHTML =
      `${stage.num}「${stage.name}」<br>桃太郎は鬼に倒されてしまった…<br><br>もう一度、出立しよう。`;
    document.getElementById('result').classList.add('show', 'lose');
  }

  // ===== クールダウン表示 =====
  function updateCooldownUI() {
    if (player.attackCooldown > 0) {
      attackBtn.classList.add('on-cooldown');
    } else {
      attackBtn.classList.remove('on-cooldown');
    }
  }

  // ===== メインループ =====
  let lastTime = 0;
  let hudUpdateTimer = 0;
  function loop(time) {
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;

    // タイトル画面表示中は何もしない
    if (gameState === GS.TITLE) {
      requestAnimationFrame(loop);
      return;
    }

    if (gameState === GS.PLAYING) {
      // 攻撃入力
      if (attackPressed) {
        attackPressed = false;
        startAttack();
      }

      // バフタイマー
      let buffChanged = false;
      if (player.kibidangoTimer > 0) {
        player.kibidangoTimer -= dt;
        if (player.kibidangoTimer <= 0) { player.kibidangoTimer = 0; buffChanged = true; }
      }
      if (player.momoTimer > 0) {
        player.momoTimer -= dt;
        if (player.momoTimer <= 0) { player.momoTimer = 0; buffChanged = true; }
      }
      if (player.attackCooldown > 0) player.attackCooldown -= dt;

      // 入力 → 移動
      let dx = 0, dy = 0;
      if (input.up) dy -= 1;
      if (input.down) dy += 1;
      if (input.left) dx -= 1;
      if (input.right) dx += 1;
      const moving = (dx !== 0 || dy !== 0);

      // 桃モード中はスピードアップ
      const speedMul = player.momoTimer > 0 ? 1.4 : 1.0;

      if (player.state === 'attacking') {
        player.attackTimer += dt;
        if (player.attackTimer >= player.attackFrameInterval) {
          player.attackTimer = 0;
          player.frame++;
          if (player.frame >= 4) {
            player.state = moving ? 'walking' : 'idle';
            player.frame = 0;
          }
        }
      } else {
        if (moving) {
          const len = Math.hypot(dx, dy);
          dx /= len; dy /= len;
          player.x += dx * player.speed * speedMul * dt;
          player.y += dy * player.speed * speedMul * dt;
          if (Math.abs(dy) >= Math.abs(dx)) {
            player.direction = dy < 0 ? 'up' : 'down';
          } else {
            player.direction = dx < 0 ? 'left' : 'right';
          }
          player.state = 'walking';
          player.frameTimer += dt;
          if (player.frameTimer >= player.walkFrameInterval) {
            player.frameTimer = 0;
            player.frame = (player.frame + 1) % 4;
          }
        } else {
          player.state = 'idle';
          player.frameTimer += dt;
          if (player.frameTimer >= player.idleFrameInterval) {
            player.frameTimer = 0;
            player.frame = (player.frame + 1) % 4;
          }
        }
      }

      // 画面端
      const halfW = (P_W * PLAYER_SCALE) / 2;
      const halfH = (P_H * PLAYER_SCALE) / 2;
      player.x = Math.max(halfW, Math.min(stageW - halfW, player.x));
      player.y = Math.max(halfH, Math.min(stageH - halfH, player.y));

      if (player.invincibleTimer > 0) player.invincibleTimer -= dt;

      // 仲間
      tryRescueCompanion();
      updateTrail();
      updateCompanionPositions();
      updateDogAttack(dt);

      // 敵
      updateEnemies(dt);

      // 投射体
      updateProjectiles(dt);

      // アイテム
      tryPickupItems();

      // ステージクリア判定
      checkStageClear();

      // HUDをポーリング更新（バフタイマー表示など）
      hudUpdateTimer += dt;
      if (hudUpdateTimer >= 0.5 || buffChanged) {
        hudUpdateTimer = 0;
        updateHUD();
      }

      updateCooldownUI();
    }

    // 描画
    ctx.clearRect(0, 0, stageW, stageH);
    drawBackground(time);

    // 倒れた鬼を最初に描画（背景的に）
    for (const e of enemies) {
      if (e.state === 'dead' || e.state === 'dying') drawOni(e);
    }

    // アイテム
    for (const it of items) drawItem(it);

    // Y順ソート（プレイヤー、仲間、生きてる鬼）
    const drawables = [];
    drawables.push({ y: player.y, draw: drawPlayer });
    for (const c of companions) {
      drawables.push({ y: c.y, draw: () => drawCompanion(c) });
    }
    for (const e of enemies) {
      if (e.state !== 'dead' && e.state !== 'dying') {
        drawables.push({ y: e.y, draw: () => drawOni(e) });
      }
    }
    drawables.sort((a, b) => a.y - b.y);
    for (const d of drawables) d.draw();

    // 投射体
    for (const p of projectiles) drawProjectile(p);

    drawEffects();

    requestAnimationFrame(loop);
  }
})();
</script>

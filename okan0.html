<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>あめちゃん配り歩き ～浪速のおばちゃん、大阪を征く～</title>
<style>
  :root{
    --gold:#f5c542; --neon-magenta:#ff2d95; --neon-cyan:#20e0d6;
    --royal-purple:#5b2a86;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:"Hiragino Maru Gothic ProN","Yu Gothic","Meiryo",sans-serif;background:#000;}
  #game{position:relative;width:100vw;height:100vh;max-width:520px;margin:0 auto;overflow:hidden;user-select:none;background:#0a0a14;}

  /* ===== 背景の層 ===== */
  #sky{position:absolute;inset:0;transition:background 1.5s ease;}
  #skyGlow{position:absolute;inset:0;pointer-events:none;transition:opacity 1.5s;}
  .celestial{position:absolute;pointer-events:none;}
  .star{position:absolute;background:#fff;border-radius:50%;pointer-events:none;animation:twinkle 3s infinite;}
  @keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
  .cloud{position:absolute;border-radius:50%;filter:blur(4px);pointer-events:none;}

  #farLayer,#midLayer,#propLayer{position:absolute;left:0;will-change:transform;pointer-events:none;}
  #farLayer{bottom:23%;height:44%;}
  #midLayer{bottom:22.5%;height:66%;}
  #propLayer{bottom:22.5%;height:38%;z-index:8;}
  #farLayer svg,#midLayer svg,#propLayer svg{position:absolute;bottom:0;overflow:visible;}

  /* ===== 通り ===== */
  #ground{position:absolute;bottom:0;left:0;width:100%;height:23%;z-index:5;}
  #streetDeco{position:absolute;bottom:0;left:0;height:23%;width:100%;will-change:transform;z-index:6;pointer-events:none;}

  /* ===== おばちゃん ===== */
  #obachan{position:absolute;bottom:22%;left:50%;width:132px;height:214px;z-index:40;transform:translateX(-50%);}
  #obachan svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 12px 10px rgba(0,0,0,.5));}
  #obachan.facing-left{transform:translateX(-50%) scaleX(-1);}
  #obachan.walking{animation:bob .44s infinite;}
  #obachan.facing-left.walking{animation:bobL .44s infinite;}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
  @keyframes bobL{0%,100%{transform:translateX(-50%) scaleX(-1) translateY(0)}50%{transform:translateX(-50%) scaleX(-1) translateY(-6px)}}
  #obachan.walking .leg-l{animation:stepL .44s infinite;transform-origin:top center;}
  #obachan.walking .leg-r{animation:stepR .44s infinite;transform-origin:top center;}
  @keyframes stepL{0%,100%{transform:rotate(17deg)}50%{transform:rotate(-17deg)}}
  @keyframes stepR{0%,100%{transform:rotate(-17deg)}50%{transform:rotate(17deg)}}
  #obachan.walking .arm-bag{animation:swing .44s infinite;transform-origin:top center;}
  @keyframes swing{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(9deg)}}

  /* ===== NPC ===== */
  .npc{position:absolute;bottom:22%;width:80px;height:154px;z-index:35;will-change:transform;}
  .npc svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 7px 6px rgba(0,0,0,.45));}
  .npc .marker{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:25px;animation:hop .8s infinite;filter:drop-shadow(0 2px 2px rgba(0,0,0,.4));}
  @keyframes hop{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

  .candy-fly{position:absolute;z-index:60;font-size:30px;pointer-events:none;filter:drop-shadow(0 0 6px var(--gold));}
  .pop{position:absolute;z-index:70;pointer-events:none;font-weight:900;animation:popup 1.1s ease-out forwards;}
  @keyframes popup{0%{transform:translateY(0) scale(.5);opacity:0}20%{opacity:1;transform:translateY(-8px) scale(1.15)}100%{transform:translateY(-64px) scale(1);opacity:0}}

  /* ===== HUD ===== */
  #hud{position:absolute;top:0;left:0;width:100%;z-index:100;display:flex;justify-content:space-between;padding:12px;pointer-events:none;}
  .panel{background:linear-gradient(135deg,rgba(91,42,134,.94),rgba(40,15,55,.94));border:2px solid var(--gold);border-radius:14px;padding:7px 14px;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.5);backdrop-filter:blur(4px);}
  .panel .label{font-size:10px;color:var(--gold);letter-spacing:.1em;font-weight:700;}
  .panel .val{font-size:23px;font-weight:900;line-height:1;text-shadow:0 0 10px var(--neon-magenta);}
  #placeName{position:absolute;top:68px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(20,12,28,.9);border:2px solid var(--neon-cyan);border-radius:30px;color:var(--neon-cyan);font-weight:900;font-size:14px;padding:5px 22px;text-shadow:0 0 8px var(--neon-cyan);white-space:nowrap;transition:opacity .5s;letter-spacing:.1em;}

  #bubble{position:absolute;left:50%;bottom:50%;transform:translateX(-50%);z-index:80;background:#fff;color:#2c1e10;border-radius:20px;padding:11px 18px;max-width:72%;font-weight:800;font-size:15px;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.4);opacity:0;transition:opacity .25s,transform .25s;border:3px solid var(--neon-magenta);}
  #bubble.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  #bubble::after{content:"";position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);border:12px solid transparent;border-top-color:#fff;}

  /* ===== 操作 ===== */
  #controls{position:absolute;bottom:14px;width:100%;z-index:100;display:flex;justify-content:space-between;align-items:flex-end;padding:0 18px;}
  .dpad{display:flex;gap:14px;}
  .btn{width:64px;height:64px;border-radius:50%;border:3px solid var(--gold);background:radial-gradient(circle at 35% 30%,#7b3aa6,#3a1a4a);color:#fff;font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 #2a1240,0 8px 14px rgba(0,0,0,.4);cursor:pointer;transition:transform .07s,box-shadow .07s;}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #2a1240,0 3px 8px rgba(0,0,0,.4);}
  #candyBtn{width:94px;height:94px;font-size:14px;font-weight:900;flex-direction:column;line-height:1.1;background:radial-gradient(circle at 35% 30%,var(--neon-magenta),#8a1454);border-color:#fff;text-shadow:0 0 8px #fff;box-shadow:0 5px 0 #5a0e38,0 8px 18px rgba(255,45,149,.5);}
  #candyBtn:active{box-shadow:0 1px 0 #5a0e38,0 3px 10px rgba(255,45,149,.5);}
  #candyBtn .emoji{font-size:28px;}
  #candyBtn.pulse{animation:pulse .6s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

  /* 駅アクションボタン */
  #trainBtn{position:absolute;left:50%;bottom:30%;transform:translateX(-50%);z-index:90;
    background:linear-gradient(#20a0d8,#1060a0);border:3px solid #fff;border-radius:16px;
    color:#fff;font-weight:900;font-size:16px;padding:12px 24px;box-shadow:0 6px 20px rgba(32,160,216,.6);
    cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s;text-shadow:0 0 6px rgba(0,0,0,.4);animation:pulse 1s infinite;}
  #trainBtn.show{opacity:1;pointer-events:auto;}
  #trainBtn .sub{font-size:11px;font-weight:700;opacity:.9;}

  /* ===== 電車移動オーバーレイ ===== */
  #trainScreen{position:absolute;inset:0;z-index:300;background:#0a0a14;opacity:0;pointer-events:none;transition:opacity .4s;overflow:hidden;}
  #trainScreen.show{opacity:1;pointer-events:auto;}
  #trainWindow{position:absolute;top:14%;left:8%;width:84%;height:52%;background:linear-gradient(#0a1428,#1a2a4a);border:8px solid #2a3548;border-radius:18px;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.6),0 10px 30px rgba(0,0,0,.5);}
  #trainScenery{position:absolute;bottom:0;left:0;height:100%;display:flex;align-items:flex-end;}
  #trainScreen .frame{position:absolute;top:12%;left:6%;width:88%;height:56%;border:3px solid #4a5568;border-radius:22px;pointer-events:none;box-shadow:0 0 0 6px #1a2028;}
  #trainInfo{position:absolute;top:72%;left:0;width:100%;text-align:center;color:#fff;}
  #trainRoute{font-size:15px;color:var(--neon-cyan);font-weight:700;margin-bottom:8px;text-shadow:0 0 8px var(--neon-cyan);}
  #trainProgress{width:70%;max-width:340px;height:8px;background:rgba(255,255,255,.15);border-radius:4px;margin:10px auto;overflow:hidden;}
  #trainProgressBar{height:100%;width:0;background:linear-gradient(90deg,var(--neon-cyan),var(--gold));border-radius:4px;transition:width .1s linear;}
  #trainStations{display:flex;justify-content:space-between;width:80%;max-width:380px;margin:16px auto 0;position:relative;}
  .stationDot{display:flex;flex-direction:column;align-items:center;gap:4px;z-index:2;}
  .stationDot .dot{width:12px;height:12px;border-radius:50%;background:#3a4558;border:2px solid #5a6578;transition:.3s;}
  .stationDot.active .dot{background:var(--gold);border-color:#fff;box-shadow:0 0 10px var(--gold);transform:scale(1.4);}
  .stationDot.passed .dot{background:var(--neon-cyan);border-color:var(--neon-cyan);}
  .stationDot .nm{font-size:10px;color:#aab;font-weight:700;}
  .stationDot.active .nm{color:var(--gold);}
  #trainLine{position:absolute;top:5px;left:0;width:100%;height:3px;background:#3a4558;z-index:1;}
  #trainHint{margin-top:22px;font-size:12px;color:#8899aa;}
  .train-car{font-size:40px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));animation:trainShake .3s infinite;}
  @keyframes trainShake{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}

  /* ===== 路線マップ（俯瞰） ===== */
  #mapBtn{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:100;background:linear-gradient(135deg,rgba(32,160,216,.9),rgba(16,80,140,.9));border:2px solid #fff;border-radius:20px;color:#fff;font-weight:800;font-size:12px;padding:6px 14px;cursor:pointer;pointer-events:auto;box-shadow:0 3px 10px rgba(0,0,0,.4);}
  #mapOverlay{position:absolute;inset:0;z-index:250;background:rgba(10,8,16,.96);opacity:0;pointer-events:none;transition:opacity .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  #mapOverlay.show{opacity:1;pointer-events:auto;}
  #mapOverlay h2{color:var(--gold);font-size:20px;margin-bottom:6px;text-shadow:0 0 10px var(--gold);}
  #mapOverlay .mapSub{color:#99a;font-size:12px;margin-bottom:20px;}
  #mapClose{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid #fff;color:#fff;font-size:22px;cursor:pointer;}

  /* ===== タイトル ===== */
  #title{position:absolute;inset:0;z-index:200;background:radial-gradient(circle at 50% 28%,#5b2a86,#0a0818);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  #title h1{color:#fff;font-size:clamp(25px,7.2vw,38px);font-weight:900;line-height:1.15;text-shadow:0 0 18px var(--neon-magenta),3px 3px 0 #3a2410;}
  #title .leopard-word{color:var(--gold);text-shadow:0 0 16px var(--gold),3px 3px 0 #3a2410;}
  #title .sub{color:var(--neon-cyan);margin-top:12px;font-size:15px;font-weight:700;text-shadow:0 0 8px var(--neon-cyan);}
  #title .hint{color:#e7d6f5;margin-top:22px;font-size:12.5px;line-height:1.9;max-width:350px;}
  #title .hint b{color:var(--gold);}
  #startBtn{margin-top:24px;padding:15px 42px;border-radius:40px;border:3px solid #fff;background:linear-gradient(var(--neon-magenta),#8a1454);color:#fff;font-size:21px;font-weight:900;text-shadow:0 0 8px #fff;box-shadow:0 6px 20px rgba(255,45,149,.5);cursor:pointer;animation:pulse 1.4s infinite;}
  #titleGirl{width:118px;height:188px;margin-bottom:2px;}
  #titleGirl svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 8px 12px rgba(0,0,0,.5));}
  .fade-hidden{opacity:0!important;pointer-events:none;transition:opacity .4s;}

  #toast{position:absolute;top:112px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:150;background:var(--gold);color:#3a2410;font-weight:900;padding:8px 20px;border-radius:20px;opacity:0;transition:.4s;box-shadow:0 4px 14px rgba(0,0,0,.4);font-size:13.5px;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="game">
  <div id="sky"></div>
  <div id="skyGlow"></div>
  <div id="farLayer"></div>
  <div id="midLayer"></div>
  <div id="propLayer"></div>
  <div id="ground"></div>
  <div id="streetDeco"></div>
  <div id="obachan"></div>
  <div id="bubble"></div>

  <button id="mapBtn">🗺 路線図</button>
  <div id="hud">
    <div class="panel"><div class="label">🍬 あめちゃん</div><div class="val" id="candyCount">30</div></div>
    <div class="panel" style="text-align:right"><div class="label">よろこんだ人</div><div class="val" id="scoreCount">0</div></div>
  </div>
  <div id="placeName">道頓堀</div>
  <div id="toast"></div>

  <button id="trainBtn">🚇 電車にのる<br><span class="sub" id="trainBtnSub">次は 新世界</span></button>

  <div id="controls">
    <div class="dpad"><div class="btn" id="leftBtn">◀</div><div class="btn" id="rightBtn">▶</div></div>
    <div class="btn" id="candyBtn"><span class="emoji">🍬</span>あめちゃん<br>あげる</div>
  </div>

  <!-- 電車移動画面 -->
  <div id="trainScreen">
    <div id="trainWindow"><div id="trainScenery"></div></div>
    <div class="frame"></div>
    <div id="trainInfo">
      <div id="trainRoute">🚇 御堂筋線・なかもず行</div>
      <div class="train-car" id="trainCar">🚃🚃🚃</div>
      <div id="trainProgress"><div id="trainProgressBar"></div></div>
      <div id="trainStations"><div id="trainLine"></div></div>
      <div id="trainHint">まもなく発車します…</div>
    </div>
  </div>

  <!-- 路線マップ -->
  <div id="mapOverlay">
    <button id="mapClose">✕</button>
    <h2>大阪 あめちゃんマップ</h2>
    <div class="mapSub">行きたい駅をタップして移動できるで</div>
    <div id="mapContent"></div>
  </div>

  <!-- タイトル -->
  <div id="title">
    <div id="titleGirl"></div>
    <h1>あめちゃん配り歩き<br><span class="leopard-word">～浪速のおばちゃん、大阪を征く～</span></h1>
    <div class="sub">道頓堀・新世界・鶴橋・梅田…電車で大阪縦断</div>
    <div class="hint"><b>◀ ▶</b> で街を歩く／人に会たら <b>🍬</b>／駅で <b>🚇電車</b> に乗って次の街へ<br>本物そっくりの大阪をめぐって、ぎょうさん配ってな！</div>
    <button id="startBtn">歩きはじめる</button>
  </div>
</div>
<script>
/* ============================================================
   あめちゃん配り歩き ～浪速のおばちゃん、大阪を征く～
   最高品質版
   ============================================================ */
const gameEl = document.getElementById('game');
const W = () => gameEl.clientWidth;

/* =========================================================
   おばちゃん SVG（アップロード画像を精密再現・陰影/質感/発光）
   ========================================================= */
function obachanSVG(){
  return `<svg viewBox="0 0 132 214">
    <defs>
      <pattern id="leo" width="16" height="16" patternUnits="userSpaceOnUse">
        <rect width="16" height="16" fill="#c9a24f"/>
        <rect width="16" height="16" fill="url(#leoShade)"/>
        <path d="M3 3 Q7 1.5 6.5 5 Q5.5 7.5 3 6.5 Q1 5.5 3 3Z" fill="#3a2410"/>
        <path d="M11 10 Q15 8.5 14.5 12 Q13.5 14.5 11 13.5 Q9 12.5 11 10Z" fill="#3a2410"/>
        <circle cx="4.3" cy="4.3" r="1.2" fill="#7a5220"/><circle cx="12.3" cy="11.3" r="1.2" fill="#7a5220"/>
        <circle cx="13" cy="3" r="0.9" fill="#2a1808"/><circle cx="2" cy="12" r="0.9" fill="#2a1808"/>
        <path d="M8 8 Q9 7 9.5 8.2" stroke="#2a1808" stroke-width="0.4" fill="none" opacity="0.5"/>
      </pattern>
      <linearGradient id="leoShade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8c878" stop-opacity="0.5"/><stop offset="100%" stop-color="#8a6828" stop-opacity="0.3"/></linearGradient>
      <linearGradient id="purpleSatin" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#9a4ac8"/><stop offset="35%" stop-color="#5a1a8a"/><stop offset="60%" stop-color="#7a2aa8"/><stop offset="100%" stop-color="#4a1470"/>
      </linearGradient>
      <radialGradient id="gem" cx="35%" cy="28%" r="75%"><stop offset="0%" stop-color="#eeb0ff"/><stop offset="45%" stop-color="#b040ff"/><stop offset="100%" stop-color="#5a1a8a"/></radialGradient>
      <radialGradient id="skinFace" cx="42%" cy="35%" r="72%"><stop offset="0%" stop-color="#ffd9ad"/><stop offset="70%" stop-color="#f0c48a"/><stop offset="100%" stop-color="#e0b078"/></radialGradient>
      <radialGradient id="hairPurple" cx="40%" cy="30%" r="75%"><stop offset="0%" stop-color="#c060ff"/><stop offset="60%" stop-color="#9b30ff"/><stop offset="100%" stop-color="#6a18b0"/></radialGradient>
      <linearGradient id="goldBand" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe680"/><stop offset="50%" stop-color="#f5c542"/><stop offset="100%" stop-color="#c89818"/></linearGradient>
      <filter id="obShadow"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/></filter>
    </defs>

    <!-- 脚・サンダル -->
    <g>
      <rect class="leg-l" x="55" y="160" width="9" height="35" rx="4" fill="#e8b96f"/>
      <rect class="leg-r" x="67" y="160" width="9" height="35" rx="4" fill="#dcab61"/>
      <g class="foot"><path d="M49 192 L67 192 L66 199 L50 199 Z" fill="url(#goldBand)" stroke="#8a1454" stroke-width="1"/>
        <path d="M52 189 Q58 186 64 189 L64 192 L52 192 Z" fill="#d8a838"/>
        <circle cx="55" cy="191" r="2" fill="url(#gem)"/><circle cx="61" cy="191" r="2" fill="url(#gem)"/></g>
      <g class="foot"><path d="M63 192 L81 192 L80 199 L64 199 Z" fill="url(#goldBand)" stroke="#8a1454" stroke-width="1"/>
        <path d="M66 189 Q72 186 78 189 L78 192 L66 192 Z" fill="#d8a838"/>
        <circle cx="69" cy="191" r="2" fill="url(#gem)"/><circle cx="75" cy="191" r="2" fill="url(#gem)"/></g>
    </g>

    <!-- 紫サテンのガウン裏地 -->
    <path d="M22 84 Q5 152 19 196 L40 194 Q34 130 45 98 Z" fill="url(#purpleSatin)" stroke="#3a1050" stroke-width="1.5"/>
    <path d="M110 84 Q127 152 113 196 L92 194 Q98 130 87 98 Z" fill="url(#purpleSatin)" stroke="#3a1050" stroke-width="1.5"/>
    <!-- サテンのハイライト -->
    <path d="M26 92 Q16 150 24 190" stroke="#c880ff" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M106 92 Q116 150 108 190" stroke="#c880ff" stroke-width="2" fill="none" opacity="0.4"/>

    <!-- レオ柄ガウン外側 -->
    <path d="M26 78 Q12 150 26 194 L43 192 Q37 128 47 94 Z" fill="url(#leo)" stroke="#3a2410" stroke-width="1.5"/>
    <path d="M106 78 Q120 150 106 194 L89 192 Q95 128 85 94 Z" fill="url(#leo)" stroke="#3a2410" stroke-width="1.5"/>
    <!-- ガウンの宝石帯（縁取り） -->
    <path d="M47 94 L43 192" stroke="#5b2a86" stroke-width="5" fill="none"/>
    <path d="M47 94 L43 192" stroke="url(#goldBand)" stroke-width="2" fill="none"/>
    <g fill="url(#gem)">${[0,1,2,3,4,5,6].map(i=>`<circle cx="${45.5-i*0.4}" cy="${104+i*13}" r="1.6"/>`).join('')}</g>
    <path d="M85 94 L89 192" stroke="#5b2a86" stroke-width="5" fill="none"/>
    <path d="M85 94 L89 192" stroke="url(#goldBand)" stroke-width="2" fill="none"/>
    <g fill="url(#gem)">${[0,1,2,3,4,5,6].map(i=>`<circle cx="${86.5+i*0.4}" cy="${104+i*13}" r="1.6"/>`).join('')}</g>

    <!-- 胴（ヒョウ柄ワンピース） -->
    <path d="M40 86 Q37 150 46 194 L86 194 Q95 150 92 86 Q66 76 40 86 Z" fill="url(#leo)" stroke="#3a2410" stroke-width="1.5"/>
    <!-- 裾の宝石ボーダー -->
    <path d="M46 186 Q66 192 86 186 L88 194 L44 194 Z" fill="url(#goldBand)"/>
    <g fill="url(#gem)">${[0,1,2,3,4,5].map(i=>`<circle cx="${50+i*7.5}" cy="190" r="2"/>`).join('')}</g>

    <!-- ヒョウの顔プリント（胸〜腹・写実的） -->
    <g transform="translate(66 134)">
      <ellipse cx="0" cy="0" rx="25" ry="31" fill="#a67c44" opacity="0.55"/>
      <ellipse cx="0" cy="-4" rx="20" ry="24" fill="#8a6438" opacity="0.4"/>

/* 灯りのついたビル窓を生成するヘルパー */
function litWindows(x,y,cols,rows,w,h,gx,gy,litProb=0.6,onCol='#ffdc6a',offCol='#0a1220'){
  let s='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const lit=Math.random()<litProb;
    s+=`<rect x="${x+c*gx}" y="${y+r*gy}" width="${w}" height="${h}" rx="1" fill="${lit?onCol:offCol}" opacity="${lit?0.9:0.55}"/>`;
  }
  return s;
}

/* ===== エリア構築 ===== */
function buildArea(idx){
  if(idx<0||idx>=areas.length||state.builtAreas.has(idx))return;
  state.builtAreas.add(idx);
  const area=areas[idx];
  const baseX=idx*AREA_W;

  for(let i=0;i<7;i++){
    const fh=130+Math.random()*110;
    const wrap=document.createElement('div');
    wrap.innerHTML=farBuildingSVG(fh, area.far[i%3], '#ffdc6a');
    const svg=wrap.firstChild;
    svg.style.left=((baseX+i*150+Math.random()*40)*0.25)+'px';
    farLayer.appendChild(svg);
  }

  const bldgs=area.buildings.slice();
  const items=[...bldgs.map(b=>({fn:b,type:'bldg'}))];
  const lineC=LINE[area.line];
  items.push({fn:()=>bldStation(lineC.color, area.station+'駅'), type:'station'});

  const gap=AREA_W/(items.length+0.3);
  for(let i=0;i<items.length;i++){
    const wrap=document.createElement('div');
    wrap.innerHTML=items[i].fn();
    const svg=wrap.firstChild;
    const bw=parseFloat(svg.getAttribute('width'))||140;
    const localCenter=gap*(i+0.65);
    svg.style.left=(((baseX+localCenter)*0.62)-bw/2)+'px';
    svg.dataset.centerWorld=baseX+localCenter;
    if(items[i].type==='station'){svg.dataset.station='1';state.stationWorld[idx]=baseX+localCenter;}
    midLayer.appendChild(svg);
  }

  const propPlan=[propTakoyaki];
  const others=[propSignal,propPole,propVending,propGuardrail,propPole,propTree];
  for(let k=0;k<3;k++)propPlan.push(others[Math.floor(Math.random()*others.length)]);
  for(let i=propPlan.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[propPlan[i],propPlan[j]]=[propPlan[j],propPlan[i]];}
  for(let i=0;i<propPlan.length;i++){
    const wrap=document.createElement('div');wrap.innerHTML=propPlan[i]();const svg=wrap.firstChild;
    svg.style.left=((baseX+100+i*(AREA_W/propPlan.length)+Math.random()*60)*0.85)+'px';
    propLayer.appendChild(svg);
  }
}

function spawnNpcIfNeeded(){
  while(state.worldX+W()+220>state.nextNpcAt){

function nearestNpc(){
  const obX=state.worldX+W()/2;let best=null,bestD=9999;
  for(const n of state.npcs){if(n.given)continue;const d=Math.abs(n.worldX-obX);if(d<bestD){bestD=d;best=n;}}
  return (best&&bestD<115)?best:null;
}

/* ===== エリア切替＆駅判定 ===== */
function updateArea(){
  const centerWorld=state.worldX+W()/2;
  const idx=areaIndexAt(centerWorld);
  buildArea(idx);buildArea(idx+1);buildArea(idx-1);
  if(idx!==state.areaIdx){
    state.areaIdx=idx;const a=areas[idx];
    placeNameEl.textContent=a.name;placeNameEl.style.opacity=0;
    setTimeout(()=>placeNameEl.style.opacity=1,200);
    sky.style.background=`linear-gradient(${a.sky[0]},${a.sky[1]} 55%,${a.sky[2]})`;
    showToast(`📍 ${a.name} に来たで！`);
  }
  const stnWorld=state.stationWorld[idx];
  let atStn=false;
  if(stnWorld!=null && Math.abs(centerWorld-stnWorld)<130) atStn=true;
  if(atStn!==state.atStation){
    state.atStation=atStn;
    if(atStn){
      const nextIdx=idx+1<areas.length?idx+1:0;
      trainBtnSub.textContent = idx+1<areas.length ? `次は ${areas[nextIdx].name.split('（')[0]}` : 'ぐるっと梅田へ';
      trainBtn.classList.add('show');
    } else trainBtn.classList.remove('show');
  }
}

/* ===== 電車移動システム ===== */
const routes = {
  'umeda->namba':    {line:'midosuji', dir:'なかもず行', stations:['梅田','淀屋橋','本町','心斎橋','なんば'], mins:7},
  'namba->dotonbori':{line:'walk',     dir:'徒歩', stations:['なんば','道頓堀'], mins:3},
  'dotonbori->shinsekai':{line:'midosuji',dir:'なかもず行', stations:['なんば','動物園前'], mins:5},
  'shinsekai->tsuruhashi':{line:'loop',dir:'環状線・外回り', stations:['新今宮','寺田町','桃谷','鶴橋'], mins:8},
  'tsuruhashi->umeda':{line:'loop',    dir:'環状線・内回り', stations:['鶴橋','京橋','大阪城公園','大阪'], mins:12},
};
function routeKey(from,to){return `${areas[from].id}->${areas[to].id}`;}

function trainScenerySVG(lineType){
  const palettes={midosuji:['#2a3a5a','#3a4a6a','#1a2a4a'],loop:['#3a2a4a','#4a3a5a','#2a1a3a'],walk:['#3a2a1a','#4a3a2a','#2a1a10']};
  const pal=palettes[lineType]||palettes.midosuji;
  let bldgs='';
  for(let i=0;i<30;i++){
    const h=60+Math.random()*120,w=40+Math.random()*30,x=i*70,col=pal[i%3];
    let win='';const rows=Math.floor(h/20);
    for(let r=0;r<rows;r++)for(let c=0;c<3;c++){if(Math.random()<0.55)win+=`<rect x="${x+8+c*11}" y="${200-h+8+r*20}" width="7" height="10" fill="#ffdc6a" opacity="0.7"/>`;}
    bldgs+=`<rect x="${x}" y="${200-h}" width="${w}" height="${h}" fill="${col}" rx="2"/>${win}`;
  }
  return `<svg width="2100" height="200" viewBox="0 0 2100 200" style="height:100%">
    <defs><linearGradient id="trainSkyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a1430"/><stop offset="100%" stop-color="#2a2050"/></linearGradient></defs>
    <rect width="2100" height="200" fill="url(#trainSkyG)"/>
    ${bldgs}
    <g stroke="#555" stroke-width="2" opacity="0.5">${[...Array(15)].map((_,i)=>`<line x1="${i*140+40}" y1="30" x2="${i*140+40}" y2="200"/>`).join('')}</g>
  </svg>`;
}

function doTravel(fromIdx,toIdx){
  if(state.traveling)return;
  state.traveling=true;moveDir=0;setWalking(false);trainBtn.classList.remove('show');
  const rk=routeKey(fromIdx,toIdx);
  const route=routes[rk]||{line:'midosuji',dir:'なかもず行',stations:[areas[fromIdx].station,areas[toIdx].station],mins:5};
  const isWalk=route.line==='walk';
  const lineInfo=LINE[route.line]||{color:'#888',name:'徒歩'};

  document.getElementById('trainRoute').textContent=isWalk?`🚶 ${route.dir}で移動中…`:`🚇 ${lineInfo.name}・${route.dir}`;
  document.getElementById('trainCar').textContent=isWalk?'🚶‍♀️💨':'🚃🚃🚃';
  document.getElementById('trainScenery').innerHTML=trainScenerySVG(route.line);
  document.getElementById('trainHint').textContent=isWalk?'すぐそこやで…':'まもなく発車します…';

  const stnEl=document.getElementById('trainStations');
  stnEl.querySelectorAll('.stationDot').forEach(e=>e.remove());
  route.stations.forEach((nm,i)=>{
    const d=document.createElement('div');d.className='stationDot';
    d.innerHTML=`<div class="dot"></div><div class="nm">${nm}</div>`;
    if(i===0)d.classList.add('passed');
    stnEl.appendChild(d);
  });

  trainScreen.classList.add('show');

  const scenery=document.getElementById('trainScenery');
  const bar=document.getElementById('trainProgressBar');
  const dots=[...stnEl.querySelectorAll('.stationDot')];
  const duration=isWalk?2000:3600;
  const sceneryDist=1400;
  let start=null;
  function step(ts){
    if(!start)start=ts;
    const t=Math.min(1,(ts-start)/duration);
    scenery.style.transform=`translateX(${-sceneryDist*t}px)`;
    bar.style.width=(t*100)+'%';
    const stnProgress=t*(route.stations.length-1);
    dots.forEach((d,i)=>{
      if(i<=stnProgress)d.classList.add('passed');
      if(Math.abs(i-stnProgress)<0.5)d.classList.add('active');else d.classList.remove('active');
    });
    if(t<1)requestAnimationFrame(step);
    else{
      dots.forEach(d=>{d.classList.remove('active');d.classList.add('passed');});
      dots[dots.length-1].classList.add('active');
      document.getElementById('trainHint').textContent=`まもなく ${route.stations[route.stations.length-1]} に到着します`;
      setTimeout(()=>{
        state.worldX=toIdx*AREA_W+120;
        state.npcs.forEach(n=>n.el.remove());state.npcs=[];
        state.nextNpcAt=state.worldX+400;
        state.areaIdx=-1;
        buildArea(toIdx);buildArea(toIdx+1);
        render();updateArea();
        trainScreen.classList.remove('show');
        state.traveling=false;state.atStation=false;
        const a=areas[toIdx];
        speak(`${a.name.split('（')[0]}に着いたで！`);
      },700);
    }
  }
  setTimeout(()=>requestAnimationFrame(step),500);
}

trainBtn.addEventListener('click',e=>{
  e.preventDefault();
  if(state.traveling)return;
  const from=state.areaIdx;
  const to=from+1<areas.length?from+1:0;
  doTravel(from,to);
});

/* ===== 路線マップ ===== */
function buildMap(){
  const mc=document.getElementById('mapContent');
  const nodes={
    umeda:{x:90,y:50,label:'梅田',line:'midosuji'},
    namba:{x:90,y:170,label:'なんば',line:'midosuji'},
    dotonbori:{x:90,y:230,label:'道頓堀',line:'midosuji'},
    shinsekai:{x:90,y:320,label:'新世界',line:'midosuji'},
    tsuruhashi:{x:230,y:230,label:'鶴橋',line:'loop'},
  };
  let html=`<svg width="320" height="410" viewBox="0 0 320 410">
    <defs><filter id="mapGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
  html+=`<path d="M90 50 L90 320" stroke="${LINE.midosuji.color}" stroke-width="6" fill="none" opacity="0.85"/>`;
  html+=`<path d="M90 320 Q170 360 230 300 L230 230 L230 130 Q230 60 90 50" stroke="${LINE.loop.color}" stroke-width="6" fill="none" opacity="0.85"/>`;
  html+=`<rect x="12" y="384" width="14" height="6" fill="${LINE.midosuji.color}"/><text x="30" y="390" font-size="11" fill="#ccc">御堂筋線</text>`;
  html+=`<rect x="120" y="384" width="14" height="6" fill="${LINE.loop.color}"/><text x="138" y="390" font-size="11" fill="#ccc">大阪環状線</text>`;
  Object.entries(nodes).forEach(([id,n],i)=>{
    const isCur=areas[state.areaIdx]&&areas[state.areaIdx].id===id;
    html+=`<g class="mapNode" data-area="${i}" style="cursor:pointer">
      <circle cx="${n.x}" cy="${n.y}" r="${isCur?11:8}" fill="${isCur?'#f5c542':'#fff'}" stroke="${LINE[n.line].color}" stroke-width="3" ${isCur?'filter="url(#mapGlow)"':''}/>
      ${isCur?`<circle cx="${n.x}" cy="${n.y}" r="16" fill="none" stroke="#f5c542" stroke-width="1.5" opacity="0.6"/>`:''}
      <text x="${n.x+18}" y="${n.y+4}" font-size="14" fill="${isCur?'#f5c542':'#fff'}" font-weight="bold">${n.label}${isCur?' ●いまここ':''}</text>
    </g>`;
  });
  html+=`</svg>`;
  mc.innerHTML=html;
  mc.querySelectorAll('.mapNode').forEach(node=>{
    node.addEventListener('click',()=>{
      const to=parseInt(node.dataset.area);
      if(to===state.areaIdx){closeMap();return;}
      closeMap();doTravel(state.areaIdx,to);
    });
  });
}
function openMap(){buildMap();document.getElementById('mapOverlay').classList.add('show');}
function closeMap(){document.getElementById('mapOverlay').classList.remove('show');}
document.getElementById('mapBtn').addEventListener('click',openMap);
document.getElementById('mapClose').addEventListener('click',closeMap);

/* ===== あめちゃんを配る ===== */
const reactions=['おおきに！','ありがとうな〜','うれしいわ！','元気でるわ〜','いただきます！','めっちゃ嬉しい！','あめちゃん大好き！','おおきに、おばちゃん！','ごちそうさん！','ええ人やな〜','たすかるわ〜'];
const obaLines=['あめちゃん、いる？','はい、あめちゃん！','食べや〜','元気出しや！','持ってき〜','ええ子やね〜','遠慮せんと！','ぎょうさん食べや！'];
function giveCandy(){
  if(!state.running||state.traveling)return;
  const target=nearestNpc();
  if(!target){speak('だれもおらんな…もっと歩こか');return;}
  if(state.candy<=0){speak('あめちゃん、もう無いわ！');showToast('🍬 歩いてたらまた湧いてくるで');return;}
  state.candy--;candyCountEl.textContent=state.candy;target.given=true;
  const obX=state.worldX+W()/2;state.facing=(target.worldX>obX)?1:-1;applyFacing();
  const fly=document.createElement('div');fly.className='candy-fly';fly.textContent='🍬';
  const startX=W()/2+(state.facing>0?18:-18),startY=gameEl.clientHeight*0.56;
  const endX=target.worldX-state.worldX,endY=gameEl.clientHeight*0.62;
  fly.style.left=startX+'px';fly.style.top=startY+'px';gameEl.appendChild(fly);
  fly.animate([{left:startX+'px',top:startY+'px',transform:'rotate(0) scale(1)'},{left:(startX+endX)/2+'px',top:(startY-64)+'px',transform:'rotate(360deg) scale(1.3)',offset:.5},{left:endX+'px',top:endY+'px',transform:'rotate(720deg) scale(.8)'}],{duration:580,easing:'ease-in-out'}).onfinish=()=>{
    fly.remove();target.marker.textContent='💛';
    const m=target.el.querySelector('.mouth');if(m)m.setAttribute('d','M33 48 q7 8 14 0');
    popText(endX,endY,['💛','✨','❤️','🌸'][Math.floor(Math.random()*4)]);
    npcSpeak(endX,reactions[Math.floor(Math.random()*reactions.length)]);
    state.score++;scoreCountEl.textContent=state.score;
    if(state.score%5===0)showToast(`🎉 ${state.score}人をよろこばせた！`);
    setTimeout(()=>{target.marker.style.opacity=0;},900);
  };
  speak(obaLines[Math.floor(Math.random()*obaLines.length)]);
}

/* ===== セリフ・エフェクト ===== */
let bubbleTimer;
function speak(txt){bubble.textContent=txt;bubble.classList.add('show');clearTimeout(bubbleTimer);bubbleTimer=setTimeout(()=>bubble.classList.remove('show'),1400);}
function npcSpeak(x,txt){const b=document.createElement('div');b.className='pop';b.style.left=x+'px';b.style.top=(gameEl.clientHeight*0.44)+'px';b.style.color='#fff';b.style.background='rgba(91,42,134,.92)';b.style.padding='4px 10px';b.style.borderRadius='12px';b.style.fontSize='13px';b.style.whiteSpace='nowrap';b.textContent=txt;gameEl.appendChild(b);setTimeout(()=>b.remove(),1100);}
function popText(x,y,txt){const p=document.createElement('div');p.className='pop';p.textContent=txt;p.style.left=x+'px';p.style.top=y+'px';p.style.fontSize='26px';gameEl.appendChild(p);setTimeout(()=>p.remove(),1100);}
let toastTimer;
function showToast(txt){toast.textContent=txt;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),1800);}

function applyFacing(){obachan.classList.toggle('facing-left',state.facing<0);}
let moveDir=0;
function setWalking(on){state.walking=on;obachan.classList.toggle('walking',on);}

/* ===== メインループ ===== */
function loop(){
  if(state.running&&!state.traveling){
    if(moveDir!==0){
      state.facing=moveDir;applyFacing();
      const maxX=(areas.length-1)*AREA_W+AREA_W-W()*0.4;
      state.worldX=Math.max(0,Math.min(maxX,state.worldX+moveDir*SPEED));
      if(!state.walking)setWalking(true);
    } else if(state.walking)setWalking(false);
    spawnNpcIfNeeded();updateArea();render();
    candyBtn.classList.toggle('pulse',!!nearestNpc()&&state.candy>0);
    if(state.walking&&Math.random()<0.004&&state.candy<99){state.candy++;candyCountEl.textContent=state.candy;}
  }
  requestAnimationFrame(loop);
}

/* ===== 入力 ===== */
function bindHold(btn,dir){
  const s=e=>{e.preventDefault();moveDir=dir;};
  const en=e=>{e.preventDefault();if(moveDir===dir)moveDir=0;};
  btn.addEventListener('touchstart',s,{passive:false});btn.addEventListener('touchend',en);btn.addEventListener('touchcancel',en);
  btn.addEventListener('mousedown',s);btn.addEventListener('mouseup',en);btn.addEventListener('mouseleave',en);
}
bindHold(document.getElementById('leftBtn'),-1);
bindHold(document.getElementById('rightBtn'),1);
candyBtn.addEventListener('click',e=>{e.preventDefault();giveCandy();});
document.addEventListener('keydown',e=>{if(e.repeat)return;if(e.key==='ArrowLeft'||e.key==='a')moveDir=-1;if(e.key==='ArrowRight'||e.key==='d')moveDir=1;if(e.key===' '||e.key==='ArrowUp'||e.key==='Enter'){e.preventDefault();giveCandy();}});
document.addEventListener('keyup',e=>{if((e.key==='ArrowLeft'||e.key==='a')&&moveDir===-1)moveDir=0;if((e.key==='ArrowRight'||e.key==='d')&&moveDir===1)moveDir=0;});

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('title').classList.add('fade-hidden');
  setTimeout(()=>document.getElementById('title').style.display='none',400);
  state.running=true;
  speak('さぁ、あめちゃん配りにいこか！');
});

/* ===== かにアニメCSS ===== */
const kaniStyle=document.createElement('style');
kaniStyle.textContent=`
  .kani-claw-l{animation:clawL 1.6s ease-in-out infinite;transform-origin:-30px 4px;}
  .kani-claw-r{animation:clawR 1.9s ease-in-out infinite;transform-origin:30px 4px;}
  .kani-legs{animation:legWave 1.2s ease-in-out infinite;}
  @keyframes clawL{0%,100%{transform:rotate(0)}50%{transform:rotate(-13deg)}}
  @keyframes clawR{0%,100%{transform:rotate(0)}50%{transform:rotate(11deg)}}
  @keyframes legWave{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
`;
document.head.appendChild(kaniStyle);

/* ===== 初期化 ===== */
buildGround();buildStreetDeco();buildSky();
sky.style.background=`linear-gradient(${areas[0].sky[0]},${areas[0].sky[1]} 55%,${areas[0].sky[2]})`;
buildArea(0);buildArea(1);
applyFacing();render();loop();

</script>

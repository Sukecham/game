<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>パンスイカゲーム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Mochiy+Pop+One&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    height:100%; overflow:hidden; font-family:'Kosugi Maru',sans-serif;
    background:#3a2415;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,200,120,0.15), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(220,140,80,0.15), transparent 40%),
      linear-gradient(160deg, #4a2e18 0%, #2e1c0f 100%);
    user-select:none; touch-action:none;
  }
  #app { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:8px; gap:6px; }
  #header { width:100%; max-width:440px; display:flex; align-items:center; justify-content:space-between; padding:4px 8px; }
  #title { font-family:'Mochiy Pop One',sans-serif; font-size:clamp(18px,5vw,26px); color:#ffe0a3;
    text-shadow:2px 2px 0 #6b3a1a,-1px -1px 0 #8a4d20; letter-spacing:1px; display:flex; align-items:center; gap:4px; }
  #score-box { background:rgba(255,240,210,0.95); border:3px solid #b5703a; border-radius:14px; padding:4px 14px;
    text-align:center; box-shadow:0 3px 0 #8a4d20, 0 4px 8px rgba(0,0,0,0.3); }
  #score-label { font-size:10px; color:#8a4d20; font-weight:bold; }
  #score-val { font-family:'Mochiy Pop One',sans-serif; font-size:22px; color:#5a3414; line-height:1; }
  #game-wrap { position:relative; width:100%; max-width:440px; flex:1; display:flex; align-items:center; justify-content:center; }
  #canvas-frame { position:relative; border-radius:18px; overflow:hidden;
    box-shadow:0 8px 0 #6b3a1a, 0 12px 24px rgba(0,0,0,0.45); border:5px solid #b5703a; }
  canvas { display:block; background:linear-gradient(180deg,#fff8ec 0%,#fbedd2 100%); }
  #danger-line { position:absolute; left:0; right:0; height:2px;
    background:repeating-linear-gradient(90deg,#e84c3d 0 12px,transparent 12px 24px); pointer-events:none; opacity:0.55; }
  #next-box { width:100%; max-width:440px; display:flex; align-items:center; justify-content:center; gap:10px;
    background:rgba(255,240,210,0.9); border:3px solid #b5703a; border-radius:14px; padding:4px 12px; box-shadow:0 3px 0 #8a4d20; }
  #next-box .label { font-size:12px; color:#8a4d20; font-weight:bold; }
  #next-canvas { width:44px; height:34px; }
  #next-name { font-size:14px; color:#5a3414; font-weight:bold; }
  #evo-bar { width:100%; max-width:440px; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:1px; padding:2px; }
  .evo-canvas { width:24px; height:20px; }
  .evo-arrow { font-size:9px; color:#c08a50; }
  #overlay { position:absolute; inset:0; background:rgba(40,22,10,0.88); display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; z-index:10; border-radius:14px; backdrop-filter:blur(3px); }
  #overlay.show { display:flex; animation:fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  #overlay h2 { font-family:'Mochiy Pop One',sans-serif; font-size:30px; color:#ffd98a; text-shadow:2px 2px 0 #6b3a1a; }
  #overlay .final-score { font-size:18px; color:#fff; text-align:center; }
  #overlay .final-score b { font-size:40px; color:#ffe0a3; display:block; }
  .btn { font-family:'Mochiy Pop One',sans-serif; font-size:18px; color:#fff;
    background:linear-gradient(180deg,#f0a050,#d97a2a); border:none; border-radius:30px; padding:14px 40px; cursor:pointer;
    box-shadow:0 5px 0 #a8551a, 0 6px 12px rgba(0,0,0,0.3); transition:transform 0.1s, box-shadow 0.1s; }
  .btn:active { transform:translateY(4px); box-shadow:0 1px 0 #a8551a; }
  #hint { font-size:11px; color:#c9a878; text-align:center; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">パンスイカ</div>
    <div id="score-box"><div id="score-label">スコア</div><div id="score-val">0</div></div>
  </div>
  <div id="next-box">
    <span class="label">つぎ:</span>
    <canvas id="next-canvas" width="88" height="68"></canvas>
    <span id="next-name">ミニあんぱん</span>
  </div>
  <div id="game-wrap">
    <div id="canvas-frame">
      <canvas id="game"></canvas>
      <div id="danger-line"></div>
      <div id="overlay">
        <h2>こねこね終了！</h2>
        <div class="final-score">パン職人スコア<b id="final-score">0</b></div>
        <button class="btn" id="restart-btn">もう一度こねる</button>
      </div>
    </div>
  </div>
  <div id="evo-bar"></div>
  <div id="hint">タップ／クリックでパンを落とす・横にドラッグで移動</div>
</div>

<script>
const { Engine, Runner, Bodies, Body, Composite, Events } = Matter;

const BREADS = [
  { name:'ミニあんぱん', shape:'circle',   r:18,            color:'#c98a4a', dark:'#a86a2f', score:1 },
  { name:'コッペパン',   shape:'capsule',  r:22, ratio:2.4, color:'#d9a766', dark:'#b8843f', score:3 },
  { name:'クリームパン', shape:'glove',    r:28,            color:'#e8c987', dark:'#c9a45f', score:6 },
  { name:'あんぱん',     shape:'circle',   r:36,            color:'#b06a32', dark:'#8a4d20', score:10 },
  { name:'メロンパン',   shape:'circle',   r:45,            color:'#cdd96a', dark:'#a8b545', score:15 },
  { name:'食パン',       shape:'round',    r:52, ratio:1.15,color:'#f0dca8', dark:'#d4bd82', score:21 },
  { name:'カレーパン',   shape:'capsule',  r:50, ratio:1.7, color:'#c8853f', dark:'#a3631f', score:28 },
  { name:'クロワッサン', shape:'crescent', r:60,            color:'#e0a85a', dark:'#bd8534', score:36 },
  { name:'バゲット',     shape:'capsule',  r:42, ratio:3.6, color:'#d4a05a', dark:'#b07e34', score:45 },
  { name:'山型食パン',   shape:'mountain', r:78, ratio:1.1, color:'#f5e0b0', dark:'#d9c088', score:55 },
  { name:'巨大バゲット', shape:'capsule',  r:60, ratio:3.8, color:'#caa15a', dark:'#a87e34', score:66 },
];

function occupyR(idx){
  const b=BREADS[idx];
  if(b.shape==='circle') return b.r;
  if(b.shape==='capsule') return b.r*b.ratio*0.5;
  if(b.shape==='round'||b.shape==='mountain') return b.r*1.1;
  if(b.shape==='crescent') return b.r*0.95;
  if(b.shape==='glove') return b.r*1.05;
  return b.r;
}

const wrap=document.getElementById('game-wrap');
let W,H;
function calcSize(){
  const maxW=Math.min(window.innerWidth-16,440);
  const availH=wrap.clientHeight-10;
  W=Math.floor(maxW);
  H=Math.floor(Math.min(availH,W*1.35));
  if(H<380) H=Math.max(380,availH);
}
calcSize();
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

const WALL=14, DROP_Y=52, DANGER_Y=DROP_Y+35;
document.getElementById('danger-line').style.top=DANGER_Y+'px';

const engine=Engine.create();
engine.gravity.y=1.1;
const world=engine.world;
const wallOpts={isStatic:true,render:{visible:false},friction:0.5};
Composite.add(world,[
  Bodies.rectangle(W/2,H+WALL/2-2,W,WALL,wallOpts),
  Bodies.rectangle(WALL/2,H/2,WALL,H,wallOpts),
  Bodies.rectangle(W-WALL/2,H/2,WALL,H,wallOpts),
]);

let score=0,currentIdx=0,nextIdx=randIdx(),dropX=W/2,canDrop=true,gameOver=false,dangerTimer=0,preview=null;

function randIdx(){
  const r=Math.random();
  if(r<0.32) return 0;
  if(r<0.60) return 1;
  if(r<0.80) return 2;
  if(r<0.93) return 3;
  return 4;
}

function makeBread(x,y,idx,isStatic=false){
  const b=BREADS[idx];
  const opts={restitution:0.15,friction:0.7,frictionStatic:0.9,density:0.0011,isStatic,label:'bread'};
  let body;
  if(b.shape==='circle'){
    body=Bodies.circle(x,y,b.r,opts);
  } else if(b.shape==='capsule'){
    const w=b.r*b.ratio,h=b.r;
    body=Bodies.rectangle(x,y,w,h,{...opts,chamfer:{radius:h*0.45}});
  } else if(b.shape==='round'){
    const w=b.r*1.7,h=b.r*1.7*b.ratio;
    body=Bodies.rectangle(x,y,w,h,{...opts,chamfer:{radius:Math.min(w,h)*0.2}});
  } else if(b.shape==='mountain'){
    const w=b.r*1.75,h=b.r*1.7*b.ratio;
    body=Bodies.rectangle(x,y,w,h,{...opts,chamfer:{radius:Math.min(w,h)*0.22}});
  } else if(b.shape==='crescent'){
    const w=b.r*1.9,h=b.r*1.1;
    body=Bodies.rectangle(x,y,w,h,{...opts,chamfer:{radius:h*0.45},angle:-0.25});
  } else if(b.shape==='glove'){
    const w=b.r*2.0,h=b.r*1.3;
    body=Bodies.rectangle(x,y,w,h,{...opts,chamfer:{radius:h*0.4}});
  } else {
    body=Bodies.circle(x,y,b.r,opts);
  }
  body.breadIdx=idx; body.justMerged=false; body.spawnTime=Date.now();
  return body;
}

function spawnPreview(){
  currentIdx=nextIdx; nextIdx=randIdx(); updateNextUI();
  preview=makeBread(dropX,DROP_Y,currentIdx,true);
  Composite.add(world,preview);
  canDrop=true;
}

function clampX(x){
  const r=occupyR(currentIdx);
  return Math.max(WALL+r,Math.min(W-WALL-r,x));
}
function moveTo(clientX){
  if(!preview||!canDrop) return;
  const rect=canvas.getBoundingClientRect();
  dropX=clampX((clientX-rect.left)*(W/rect.width));
  Body.setPosition(preview,{x:dropX,y:DROP_Y});
  Body.setAngle(preview,BREADS[currentIdx].shape==='crescent'?-0.25:0);
}
function drop(){
  if(!preview||!canDrop||gameOver) return;
  canDrop=false;
  Body.setStatic(preview,false);
  preview=null;
  setTimeout(()=>{ if(!gameOver) spawnPreview(); },550);
}

let pointerDown=false;
canvas.addEventListener('pointerdown',e=>{pointerDown=true;moveTo(e.clientX);});
canvas.addEventListener('pointermove',e=>{if(pointerDown)moveTo(e.clientX);});
canvas.addEventListener('pointerup',e=>{if(pointerDown){moveTo(e.clientX);drop();}pointerDown=false;});
canvas.addEventListener('pointerleave',()=>{pointerDown=false;});

Events.on(engine,'collisionStart',evt=>{
  for(const pair of evt.pairs){
    const a=pair.bodyA,b=pair.bodyB;
    if(a.label!=='bread'||b.label!=='bread') continue;
    if(a.justMerged||b.justMerged) continue;
    if(a.breadIdx!==b.breadIdx) continue;
    if(a.breadIdx>=BREADS.length-1) continue;
    a.justMerged=true; b.justMerged=true;
    const newIdx=a.breadIdx+1;
    const nx=(a.position.x+b.position.x)/2, ny=(a.position.y+b.position.y)/2;
    Composite.remove(world,a); Composite.remove(world,b);
    const merged=makeBread(nx,ny,newIdx);
    Composite.add(world,merged);
    Body.setVelocity(merged,{x:0,y:-2});
    score+=BREADS[newIdx].score;
    document.getElementById('score-val').textContent=score;
    spawnPop(nx,ny,BREADS[newIdx].color);
    if(newIdx===BREADS.length-1){
      score+=100;
      document.getElementById('score-val').textContent=score;
      spawnPop(nx,ny,'#fff',true);
    }
  }
});

let pops=[];
function spawnPop(x,y,color,big=false){
  const n=big?22:10;
  for(let i=0;i<n;i++){
    const ang=(Math.PI*2*i)/n+Math.random();
    const sp=(big?4:2.5)+Math.random()*2;
    pops.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-1,life:1,color,size:(big?6:4)+Math.random()*3});
  }
}

function lighten(hex,amt){
  const num=parseInt(hex.slice(1),16);
  let r=Math.min(255,(num>>16)+amt),g=Math.min(255,((num>>8)&0xff)+amt),b=Math.min(255,(num&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}

function roundRectPath(g,w,h,r){
  const x=-w/2,y=-h/2;
  g.beginPath();
  g.moveTo(x+r,y);
  g.arcTo(x+w,y,x+w,y+h,r);
  g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r);
  g.arcTo(x,y,x+w,y,r);
  g.closePath();
}
function linGrad(g,b,ref){
  const grad=g.createLinearGradient(-ref*0.4,-ref*0.5,ref*0.3,ref*0.5);
  grad.addColorStop(0,lighten(b.color,30)); grad.addColorStop(0.55,b.color); grad.addColorStop(1,b.dark);
  g.fillStyle=grad;
}

// ===== 形ごとの本体描画（g=context, b=bread, withDetail=模様つけるか） =====
function shapeCircle(g,b,detail){
  const r=b.r;
  const grad=g.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r);
  grad.addColorStop(0,lighten(b.color,30)); grad.addColorStop(0.6,b.color); grad.addColorStop(1,b.dark);
  g.beginPath(); g.arc(0,0,r,0,Math.PI*2); g.fillStyle=grad; g.fill();
  g.lineWidth=Math.max(2,r*0.05); g.stroke();
  if(detail){
    g.save(); g.globalAlpha=0.45; g.fillStyle=b.dark;
    if(b.name.includes('あんぱん')){
      for(let i=0;i<7;i++){const a=(Math.PI*2*i)/7+0.3,rr=r*0.42;
        g.beginPath(); g.ellipse(Math.cos(a)*rr,Math.sin(a)*rr-r*0.12,r*0.05,r*0.09,a,0,Math.PI*2); g.fill();}
    } else if(b.name.includes('メロン')){
      g.globalAlpha=0.4; g.strokeStyle=b.dark; g.lineWidth=Math.max(1.5,r*0.05);
      for(let i=-2;i<=2;i++){
        g.beginPath(); g.moveTo(-r*0.75,i*r*0.3-r*0.1); g.lineTo(r*0.75,i*r*0.3-r*0.1); g.stroke();
        g.beginPath(); g.moveTo(i*r*0.3,-r*0.75-r*0.1); g.lineTo(i*r*0.3,r*0.75-r*0.1); g.stroke();
      }
    }
    g.restore();
  }
  g.beginPath(); g.ellipse(-r*0.32,-r*0.4,r*0.26,r*0.15,-0.5,0,Math.PI*2); g.fillStyle='rgba(255,255,255,0.35)'; g.fill();
}
function shapeCapsule(g,b,detail){
  const w=b.r*b.ratio,h=b.r;
  linGrad(g,b,w); roundRectPath(g,w,h,h*0.48); g.fill();
  g.lineWidth=Math.max(2,h*0.07); g.stroke();
  if(detail){
    g.save(); roundRectPath(g,w,h,h*0.48); g.clip();
    if(b.name.includes('バゲット')){
      g.strokeStyle=b.dark; g.globalAlpha=0.5; g.lineWidth=Math.max(2,h*0.1);
      const n=b.name.includes('巨大')?5:4;
      for(let i=0;i<n;i++){const cx=-w*0.35+(w*0.7/(n-1))*i;
        g.beginPath(); g.moveTo(cx-h*0.18,-h*0.28); g.lineTo(cx+h*0.18,h*0.18); g.stroke();}
    } else if(b.name.includes('カレー')){
      g.fillStyle=b.dark; g.globalAlpha=0.22;
      for(let i=0;i<40;i++){const px=(Math.random()-0.5)*w*0.85,py=(Math.random()-0.5)*h*0.7;
        g.beginPath(); g.arc(px,py,h*0.03,0,Math.PI*2); g.fill();}
      g.strokeStyle=b.dark; g.globalAlpha=0.4; g.lineWidth=Math.max(1.5,h*0.05);
      g.beginPath();
      for(let i=-3;i<=3;i++){g.moveTo(i*w*0.1,-h*0.05);g.lineTo(i*w*0.1+w*0.03,h*0.02);}
      g.stroke();
    } else if(b.name.includes('コッペ')){
      g.strokeStyle=b.dark; g.globalAlpha=0.4; g.lineWidth=Math.max(1.5,h*0.08);
      g.beginPath(); g.moveTo(-w*0.35,-h*0.05); g.lineTo(w*0.35,-h*0.05); g.stroke();
    }
    g.restore();
  }
  g.beginPath(); g.ellipse(-w*0.25,-h*0.28,w*0.18,h*0.13,-0.2,0,Math.PI*2); g.fillStyle='rgba(255,255,255,0.3)'; g.fill();
}
function shapeRound(g,b,detail){
  const w=b.r*1.7,h=b.r*1.7*b.ratio;
  linGrad(g,b,w); roundRectPath(g,w,h,Math.min(w,h)*0.2); g.fill();
  g.lineWidth=Math.max(2,w*0.04); g.stroke();
  if(detail){
    g.save(); roundRectPath(g,w,h,Math.min(w,h)*0.2); g.clip();
    g.strokeStyle=b.dark; g.globalAlpha=0.3; g.lineWidth=Math.max(1.5,w*0.03);
    g.beginPath(); g.moveTo(-w*0.35,-h*0.28); g.lineTo(w*0.35,-h*0.28); g.stroke();
    g.globalAlpha=0.16; g.lineWidth=Math.max(4,w*0.1);
    roundRectPath(g,w*0.97,h*0.97,Math.min(w,h)*0.19); g.stroke();
    g.restore();
  }
  g.beginPath(); g.ellipse(-w*0.2,-h*0.3,w*0.18,h*0.1,0,0,Math.PI*2); g.fillStyle='rgba(255,255,255,0.32)'; g.fill();
}
function shapeMountain(g,b,detail){
  const w=b.r*1.75,h=b.r*1.7*b.ratio,x=-w/2,y=-h/2,r=Math.min(w,h)*0.16,humpR=w/6;
  linGrad(g,b,w);
  g.beginPath();
  g.moveTo(x,y+h-r);
  g.arcTo(x,y+h,x+r,y+h,r);
  g.arcTo(x+w,y+h,x+w,y+h-r,r);
  g.lineTo(x+w,y+humpR*0.8);
  g.arc(x+w-humpR,y+humpR*0.8,humpR,0,Math.PI,true);
  g.arc(x+w/2,y+humpR*0.8,humpR,0,Math.PI,true);
  g.arc(x+humpR,y+humpR*0.8,humpR,0,Math.PI,true);
  g.lineTo(x,y+h-r);
  g.closePath(); g.fill();
  g.lineWidth=Math.max(2,w*0.035); g.stroke();
  if(detail){
    g.save();
    g.beginPath();
    g.moveTo(x,y+h-r); g.arcTo(x,y+h,x+r,y+h,r); g.arcTo(x+w,y+h,x+w,y+h-r,r);
    g.lineTo(x+w,y+humpR*0.8);
    g.arc(x+w-humpR,y+humpR*0.8,humpR,0,Math.PI,true);
    g.arc(x+w/2,y+humpR*0.8,humpR,0,Math.PI,true);
    g.arc(x+humpR,y+humpR*0.8,humpR,0,Math.PI,true);
    g.lineTo(x,y+h-r); g.closePath(); g.clip();
    g.globalAlpha=0.15; g.fillStyle=b.dark;
    g.fillRect(x,y+h*0.55,w,h*0.45);
    g.restore();
  }
  g.beginPath(); g.ellipse(x+humpR,y+humpR*0.6,humpR*0.5,humpR*0.3,0,0,Math.PI*2); g.fillStyle='rgba(255,255,255,0.3)'; g.fill();
}
function shapeCrescent(g,b,detail){
  const R=b.r;
  linGrad(g,b,R*1.5);
  g.save();
  g.beginPath();
  g.arc(0,0,R,Math.PI*0.15,Math.PI*1.85,false);
  g.arc(R*0.55,0,R*0.95,Math.PI*1.55,Math.PI*0.45,true);
  g.closePath();
  g.fill();
  g.lineWidth=Math.max(2,R*0.05); g.stroke();
  if(detail){
    g.clip();
    g.strokeStyle=b.dark; g.globalAlpha=0.35; g.lineWidth=Math.max(1.5,R*0.04);
    for(let i=-3;i<=3;i++){
      g.beginPath();
      g.arc(-R*0.1,0,R*0.55+i*R*0.04,Math.PI*1.7,Math.PI*0.3,false);
      g.stroke();
    }
  }
  g.restore();
  g.beginPath(); g.ellipse(-R*0.2,-R*0.4,R*0.2,R*0.1,-0.3,0,Math.PI*2); g.fillStyle='rgba(255,255,255,0.3)'; g.fill();
}
function shapeGlove(g,b,detail){
  const R=b.r;
  linGrad(g,b,R*1.5);
  g.beginPath(); g.ellipse(0,0,R,R*0.7,0,0,Math.PI*2); g.fill();
  g.lineWidth=Math.max(2,R*0.05); g.stroke();
  if(detail){
    g.save();
    g.beginPath(); g.ellipse(0,0,R,R*0.7,0,0,Math.PI*2); g.clip();
    g.strokeStyle=b.dark; g.globalAlpha=0.4; g.lineWidth=Math.max(2,R*0.07);
    for(let i=-1;i<=2;i++){const cx=i*R*0.42-R*0.2;
      g.beginPath(); g.moveTo(cx,R*0.05); g.lineTo(cx,R*0.7); g.stroke();}
    g.restore();
  }
  g.beginPath(); g.ellipse(-R*0.3,-R*0.3,R*0.25,R*0.13,-0.2,0,Math.PI*2); g.fillStyle='rgba(255,255,255,0.32)'; g.fill();
}

function drawShape(g,b,detail){
  g.lineJoin='round'; g.strokeStyle=b.dark;
  if(b.shape==='circle') shapeCircle(g,b,detail);
  else if(b.shape==='capsule') shapeCapsule(g,b,detail);
  else if(b.shape==='round') shapeRound(g,b,detail);
  else if(b.shape==='mountain') shapeMountain(g,b,detail);
  else if(b.shape==='crescent') shapeCrescent(g,b,detail);
  else if(b.shape==='glove') shapeGlove(g,b,detail);
}

function drawFace(g,scale){
  const r=30*scale;
  const eyeR=Math.max(2,r*0.1), eyeX=r*0.3;
  g.fillStyle='#3a2410';
  g.beginPath(); g.arc(-eyeX,-r*0.02,eyeR,0,Math.PI*2); g.fill();
  g.beginPath(); g.arc(eyeX,-r*0.02,eyeR,0,Math.PI*2); g.fill();
  g.fillStyle='#fff';
  g.beginPath(); g.arc(-eyeX+eyeR*0.3,-r*0.02-eyeR*0.3,eyeR*0.35,0,Math.PI*2); g.fill();
  g.beginPath(); g.arc(eyeX+eyeR*0.3,-r*0.02-eyeR*0.3,eyeR*0.35,0,Math.PI*2); g.fill();
  g.fillStyle='rgba(255,150,150,0.45)';
  g.beginPath(); g.arc(-r*0.45,r*0.2,r*0.14,0,Math.PI*2); g.fill();
  g.beginPath(); g.arc(r*0.45,r*0.2,r*0.14,0,Math.PI*2); g.fill();
  g.strokeStyle='#3a2410'; g.lineWidth=Math.max(1.5,r*0.045);
  g.beginPath(); g.arc(0,r*0.1,r*0.13,0.15*Math.PI,0.85*Math.PI); g.stroke();
}

function drawBread(body){
  const b=BREADS[body.breadIdx];
  const {x,y}=body.position;
  const ang=body.angle;
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(ang);
  let scale=1;
  const age=Date.now()-body.spawnTime;
  if(age<220) scale=1+Math.sin((age/220)*Math.PI)*0.14;
  ctx.scale(scale,scale);
  drawShape(ctx,b,true);
  ctx.rotate(-ang);
  drawFace(ctx,b.r/30*(b.shape==='capsule'?0.95:1));
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#fff8ec'); bg.addColorStop(1,'#fbedd2');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  for(const body of Composite.allBodies(world)){
    if(body.label==='bread') drawBread(body);
  }
  if(preview&&canDrop&&!gameOver){
    ctx.save();
    ctx.strokeStyle='rgba(180,112,58,0.35)'; ctx.lineWidth=2; ctx.setLineDash([6,6]);
    ctx.beginPath(); ctx.moveTo(dropX,DROP_Y+occupyR(currentIdx)); ctx.lineTo(dropX,H); ctx.stroke();
    ctx.restore();
  }
  for(let i=pops.length-1;i>=0;i--){
    const p=pops[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03;
    if(p.life<=0){pops.splice(i,1);continue;}
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  checkGameOver();
  requestAnimationFrame(render);
}

function checkGameOver(){
  if(gameOver) return;
  let over=false;
  for(const body of Composite.allBodies(world)){
    if(body.label!=='bread'||body.isStatic) continue;
    if(Date.now()-body.spawnTime<1500) continue;
    const topY=body.position.y-occupyR(body.breadIdx);
    const speed=Math.hypot(body.velocity.x,body.velocity.y);
    if(topY<DANGER_Y&&speed<0.4){over=true;break;}
  }
  if(over){dangerTimer++; if(dangerTimer>70) endGame();}
  else{dangerTimer=Math.max(0,dangerTimer-2);}
}

function endGame(){
  gameOver=true;
  document.getElementById('final-score').textContent=score;
  document.getElementById('overlay').classList.add('show');
}
function restart(){
  for(const body of Composite.allBodies(world)){
    if(body.label==='bread') Composite.remove(world,body);
  }
  score=0; document.getElementById('score-val').textContent='0';
  gameOver=false; dangerTimer=0; pops=[];
  nextIdx=randIdx(); dropX=W/2;
  document.getElementById('overlay').classList.remove('show');
  spawnPreview();
}
document.getElementById('restart-btn').addEventListener('click',restart);

function drawIcon(el,idx){
  const g=el.getContext('2d');
  const cw=el.width,ch=el.height;
  g.clearRect(0,0,cw,ch);
  const b=BREADS[idx];
  g.save();
  g.translate(cw/2,ch/2);
  const targetR=Math.min(cw,ch)*0.42;
  const sc=targetR/occupyR(idx);
  g.scale(sc,sc);
  drawShape(g,b,false);
  g.restore();
}
function updateNextUI(){
  document.getElementById('next-name').textContent=BREADS[nextIdx].name;
  drawIcon(document.getElementById('next-canvas'),nextIdx);
}
function buildEvoBar(){
  const bar=document.getElementById('evo-bar');
  bar.innerHTML='';
  BREADS.forEach((b,i)=>{
    const cv=document.createElement('canvas');
    cv.className='evo-canvas'; cv.width=48; cv.height=40; cv.title=b.name;
    bar.appendChild(cv);
    drawIcon(cv,i);
    if(i<BREADS.length-1){const ar=document.createElement('span');ar.className='evo-arrow';ar.textContent='▸';bar.appendChild(ar);}
  });
}

let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>location.reload(),300);});

buildEvoBar();
const runner=Runner.create();
Runner.run(runner,engine);
spawnPreview();
render();
</script>
</body>

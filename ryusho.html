<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>龍翔 RYŪSHŌ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Yuji+Boku&family=Cinzel:wght@500;700&display=swap');
:root{--ink:#0a0810;--crimson:#c8161d;--vermilion:#ff3a3a;--gold:#d4af37;--gold-l:#f0d77a;--ivory:#f5e6d3;--sakura:#ffb7c5;--indigo:#1a1d3a;--jade:#4ab37b;--violet:#6b2c8c}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:var(--ink);overflow:hidden;touch-action:none;overscroll-behavior:none}
body{font-family:'Shippori Mincho B1',serif;color:var(--ivory)}
#wrap{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(200,22,29,0.18) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(107,44,140,0.18) 0%,transparent 55%),linear-gradient(180deg,#0a0810 0%,#050308 100%)}
canvas{display:block;touch-action:none;position:absolute;inset:0}
#hud{position:fixed;top:env(safe-area-inset-top,0);left:0;right:0;padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:6px}
.hud-right{align-items:flex-end}
.stat{position:relative;background:rgba(10,8,16,0.65);border:1px solid var(--gold);padding:5px 12px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;display:flex;align-items:center;gap:8px;box-shadow:0 0 8px rgba(212,175,55,0.3),inset 0 0 8px rgba(0,0,0,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.stat::before{content:'';position:absolute;top:-1px;left:-1px;width:6px;height:6px;border-top:1px solid var(--gold);border-left:1px solid var(--gold)}
.stat::after{content:'';position:absolute;bottom:-1px;right:-1px;width:6px;height:6px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold)}
.stat .lab{font-size:9px;color:var(--gold);opacity:0.85}
.stat .val{font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:14px;color:var(--ivory)}
.stat.crimson{border-color:var(--vermilion);box-shadow:0 0 8px rgba(255,58,58,0.3),inset 0 0 8px rgba(0,0,0,0.4)}
.stat.crimson .lab{color:var(--vermilion)}
.stat.crimson::before,.stat.crimson::after{border-color:var(--vermilion)}
#bossbar{position:fixed;top:calc(env(safe-area-inset-top,0) + 70px);left:8%;right:8%;height:8px;border:1px solid var(--vermilion);background:rgba(20,5,8,0.7);box-shadow:0 0 12px rgba(255,58,58,0.5),inset 0 0 6px rgba(0,0,0,0.6);display:none;z-index:9;overflow:hidden}
#bossbar .fill{height:100%;background:linear-gradient(90deg,var(--gold-l),var(--vermilion),var(--crimson));box-shadow:0 0 10px var(--vermilion);transition:width 0.15s ease}
#bossbar .lbl{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-family:'Yuji Boku',serif;font-size:14px;letter-spacing:8px;color:var(--vermilion);text-shadow:0 0 8px rgba(255,58,58,0.7);white-space:nowrap}
#powers{position:fixed;bottom:calc(env(safe-area-inset-bottom,0) + 14px);left:12px;display:flex;gap:5px;flex-wrap:wrap;max-width:60vw;z-index:10;pointer-events:none}
.pchip{background:rgba(10,8,16,0.7);border:1px solid currentColor;padding:3px 8px;font-family:'Shippori Mincho B1',serif;font-size:10px;font-weight:700;letter-spacing:1px;text-shadow:0 0 4px currentColor;box-shadow:0 0 6px currentColor;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
#bombBtn{position:fixed;bottom:calc(env(safe-area-inset-bottom,0) + 12px);right:12px;width:62px;height:74px;background:linear-gradient(180deg,#f5e6d3 0%,#e8d4b8 100%);border:none;color:var(--crimson);box-shadow:0 0 16px rgba(255,58,58,0.55),inset 0 0 10px rgba(200,22,29,0.15),0 4px 0 rgba(0,0,0,0.4);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Yuji Boku',serif;font-size:24px;z-index:10;cursor:pointer;transition:transform 0.1s ease;clip-path:polygon(20% 0%,80% 0%,100% 8%,100% 100%,0% 100%,0% 8%)}
#bombBtn::before{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:18px;height:3px;background:var(--crimson);box-shadow:0 0 4px var(--crimson)}
#bombBtn:active{transform:scale(0.92)}
#bombBtn.empty{background:linear-gradient(180deg,#4a4248 0%,#2a2530 100%);color:#666;box-shadow:none}
#bombBtn.empty::before{background:#666;box-shadow:none}
#bombBtn .count{position:absolute;top:-6px;right:-6px;background:var(--crimson);color:var(--ivory);width:22px;height:22px;border-radius:50%;font-family:'Cinzel',serif;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--ink);box-shadow:0 0 6px var(--crimson)}
#topbtns{position:fixed;top:calc(env(safe-area-inset-top,0) + 14px);left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:11}
.tbtn{width:36px;height:36px;border-radius:50%;background:rgba(10,8,16,0.6);border:1px solid var(--gold);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;cursor:pointer;transition:transform 0.1s ease;box-shadow:0 0 6px rgba(212,175,55,0.4)}
.tbtn:active{transform:scale(0.92)}
.tbtn.muted{color:#666;border-color:#666;box-shadow:none}
#combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Yuji Boku',serif;font-size:80px;letter-spacing:6px;color:var(--gold-l);text-shadow:0 0 8px var(--gold),0 0 24px var(--vermilion),0 0 48px var(--crimson);opacity:0;pointer-events:none;z-index:8;white-space:nowrap}
.flash-in{animation:flashin 0.7s ease-out forwards}
@keyframes flashin{0%{opacity:0;transform:translate(-50%,-50%) scale(0.4) rotate(-8deg)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05) rotate(0deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5) rotate(4deg)}}
#wave-announce{position:fixed;top:35%;left:0;right:0;pointer-events:none;text-align:center;z-index:8;opacity:0}
#wave-announce .kanji{font-family:'Yuji Boku',serif;font-size:96px;letter-spacing:12px;color:var(--ivory);text-shadow:0 0 14px var(--gold),0 0 32px var(--gold),0 0 60px rgba(212,175,55,0.6)}
#wave-announce .lat{font-family:'Cinzel',serif;font-size:13px;letter-spacing:14px;color:var(--gold);text-shadow:0 0 6px var(--gold);margin-top:-4px}
#wave-announce.show{animation:waveann 2.4s ease-out forwards}
@keyframes waveann{0%{opacity:0;transform:translateY(40px) scale(0.6)}15%{opacity:1;transform:translateY(0) scale(1)}78%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-30px) scale(1.06)}}
#wave-announce.boss .kanji,#wave-announce.boss .lat{color:var(--vermilion);text-shadow:0 0 14px var(--vermilion),0 0 36px var(--crimson),0 0 60px rgba(200,22,29,0.6)}
#title,#gameover,#pause{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;z-index:20;background:radial-gradient(ellipse at 50% 30%,rgba(40,10,15,0.7) 0%,transparent 60%),radial-gradient(ellipse at center,rgba(10,8,16,0.92) 0%,rgba(0,0,0,0.97) 70%);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#title h1{font-family:'Yuji Boku',serif;font-size:88px;letter-spacing:20px;padding-left:20px;color:var(--ivory);text-shadow:0 0 8px var(--gold),0 0 24px var(--vermilion),0 0 48px var(--crimson);margin-bottom:8px;animation:titleglow 3s ease-in-out infinite}
@keyframes titleglow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
#title .romaji{font-family:'Cinzel',serif;font-size:13px;letter-spacing:14px;color:var(--gold);text-shadow:0 0 6px var(--gold);margin-bottom:6px}
#title .tag{font-family:'Shippori Mincho B1',serif;font-size:11px;letter-spacing:6px;color:var(--sakura);opacity:0.85;margin-bottom:36px}
#title .icons-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:32px;max-width:340px}
.kic{display:flex;flex-direction:column;align-items:center;gap:5px;font-family:'Shippori Mincho B1',serif;font-size:9px;letter-spacing:1px;color:rgba(245,230,211,0.55)}
.kic .ic{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid currentColor;border-radius:50%;font-family:'Yuji Boku',serif;font-size:18px;box-shadow:0 0 8px currentColor}
.btn{padding:14px 48px 14px 62px;border:1px solid var(--gold);background:linear-gradient(180deg,rgba(200,22,29,0.5),rgba(120,12,18,0.5));color:var(--ivory);font-family:'Yuji Boku',serif;font-size:18px;letter-spacing:14px;cursor:pointer;box-shadow:0 0 14px rgba(255,58,58,0.5),inset 0 0 12px rgba(200,22,29,0.3);text-shadow:0 0 6px rgba(255,180,180,0.4);margin-top:6px;position:relative}
.btn::before,.btn::after{content:'';position:absolute;width:8px;height:8px;border:1px solid var(--gold)}
.btn::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.btn::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.btn:active{transform:scale(0.97)}
#title .help{margin-top:36px;font-family:'Shippori Mincho B1',serif;font-size:12px;color:rgba(245,230,211,0.65);letter-spacing:1px;line-height:2;max-width:300px}
#title .help b{color:var(--gold-l);font-weight:700}
#gameover{display:none}
#gameover h2{font-family:'Yuji Boku',serif;font-size:56px;letter-spacing:8px;color:var(--vermilion);text-shadow:0 0 12px var(--crimson),0 0 32px rgba(200,22,29,0.6);margin-bottom:6px}
#gameover .tag{font-family:'Cinzel',serif;font-size:11px;letter-spacing:8px;color:var(--gold);margin-bottom:30px;text-shadow:0 0 6px var(--gold)}
#gameover .score-big{font-family:'Shippori Mincho B1',serif;font-size:54px;font-weight:800;color:var(--gold-l);text-shadow:0 0 10px var(--gold);margin-bottom:2px}
#gameover .lbl-l{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:rgba(245,230,211,0.5);margin-bottom:24px}
#gameover .row{display:flex;gap:24px;margin-bottom:32px}
#gameover .stat-go{text-align:center}
#gameover .stat-go .v{font-family:'Shippori Mincho B1',serif;font-size:22px;font-weight:800;color:var(--ivory);text-shadow:0 0 6px var(--gold)}
#gameover .stat-go .l{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:rgba(245,230,211,0.55)}
#pause{display:none}
#pause h3{font-family:'Yuji Boku',serif;font-size:64px;letter-spacing:12px;color:var(--gold-l);text-shadow:0 0 12px var(--gold),0 0 32px rgba(212,175,55,0.5);margin-bottom:36px}
#pause .pbtn{padding:12px 36px;background:transparent;border:1px solid var(--gold);color:var(--ivory);font-family:'Yuji Boku',serif;font-size:16px;letter-spacing:8px;margin:5px;cursor:pointer;box-shadow:0 0 8px rgba(212,175,55,0.4)}
#pause .pbtn.danger{border-color:var(--vermilion);box-shadow:0 0 8px rgba(255,58,58,0.4)}
#flash{position:fixed;inset:0;pointer-events:none;background:var(--gold-l);opacity:0;z-index:7;mix-blend-mode:screen}
@media (max-width:380px){#title h1{font-size:64px;letter-spacing:14px;padding-left:14px}#wave-announce .kanji{font-size:72px}#combo{font-size:64px}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="cv"></canvas>
<div id="hud">
<div class="hud-left">
<div class="stat"><span class="lab">SCORE</span><span class="val" id="vScore">0</span></div>
<div class="stat"><span class="lab">WAVE</span><span class="val" id="vWave">1</span></div>
</div>
<div class="hud-right">
<div class="stat"><span class="lab">×</span><span class="val" id="vCoin">0</span></div>
<div class="stat crimson"><span class="lab">SHIPS</span><span class="val" id="vLives">3</span></div>
</div>
</div>
<div id="bossbar"><div class="lbl">大龍 BOSS</div><div class="fill" style="width:100%"></div></div>
<div id="powers"></div>
<div id="bombBtn" class="empty">札<div class="count" id="bombCount">0</div></div>
<div id="topbtns"><button class="tbtn" id="pauseBtn">⏸</button><button class="tbtn" id="soundBtn">🔊</button></div>
<div id="combo"></div>
<div id="wave-announce"><div class="kanji">壱</div><div class="lat">WAVE I</div></div>
<div id="flash"></div>
<div id="pause"><h3>休</h3><button class="pbtn" id="resumeBtn">続 RESUME</button><button class="pbtn danger" id="quitBtn">終 QUIT</button></div>
<div id="title">
<h1>龍翔</h1>
<div class="romaji">RYŪSHŌ</div>
<div class="tag">— 神 話 の 空 を 翔 け よ —</div>
<div class="icons-row">
<div class="kic" style="color:var(--gold-l)"><div class="ic">矢</div>YA</div>
<div class="kic" style="color:var(--jade)"><div class="ic">翼</div>TSUBASA</div>
<div class="kic" style="color:var(--violet)"><div class="ic">雷</div>IKAZUCHI</div>
<div class="kic" style="color:var(--gold)"><div class="ic">穿</div>UGATSU</div>
<div class="kic" style="color:var(--sakura)"><div class="ic">守</div>MAMORI</div>
<div class="kic" style="color:var(--vermilion)"><div class="ic">札</div>FUDA</div>
</div>
<button class="btn" id="startBtn">出陣</button>
<div class="help">画面を<b>指でなぞって</b>機を操る<br>矢は自動で放たれる<br>右下の<b>御札</b>で全画面を浄化</div>
</div>
<div id="gameover">
<h2>無念</h2>
<div class="tag">MUNEN — DEFEAT</div>
<div class="score-big" id="goScore">0</div>
<div class="lbl-l">FINAL SCORE</div>
<div class="row">
<div class="stat-go"><div class="v" id="goWave">1</div><div class="l">WAVE</div></div>
<div class="stat-go"><div class="v" id="goKill">0</div><div class="l">SLAIN</div></div>
<div class="stat-go"><div class="v" id="goBest">0</div><div class="l">BEST</div></div>
</div>
<button class="btn" id="retryBtn">再戦</button>
</div>
</div>
<script>
'use strict';

const cv = document.getElementById(‘cv’);
const ctx = cv.getContext(‘2d’, { alpha:false });
let W=0, H=0, DPR=1;
function resize(){
DPR = Math.min(window.devicePixelRatio || 1, 2);
W = window.innerWidth; H = window.innerHeight;
cv.width = W*DPR; cv.height = H*DPR;
cv.style.width = W+‘px’; cv.style.height = H+‘px’;
ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener(‘resize’, resize);
resize();

let AC = null;
function ac(){ if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } return AC; }
const _last = {};
function throttle(name, gap, fn){
const n = performance.now();
if (!_last[name] || n - _last[name] >= gap){ _last[name]=n; fn(); }
}
function tone(freq, dur, type=‘sine’, vol=0.06, slide=0){
if (!G.soundOn) return;
const c = ac(); if (!c) return;
const t = c.currentTime;
const o = c.createOscillator(), g = c.createGain();
o.type = type; o.frequency.value = freq;
if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq+slide), t+dur);
g.gain.value = vol;
g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
o.connect(g); g.connect(c.destination);
o.start(t); o.stop(t+dur+0.02);
}
function noise(dur, vol=0.18, lp=800){
if (!G.soundOn) return;
const c = ac(); if (!c) return;
const t = c.currentTime;
const buf = c.createBuffer(1, c.sampleRate*dur, c.sampleRate);
const d = buf.getChannelData(0);
for (let i=0; i<d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 2);
const s = c.createBufferSource(); s.buffer = buf;
const f = c.createBiquadFilter(); f.type=‘lowpass’; f.frequency.value = lp;
const g = c.createGain(); g.gain.value = vol;
g.gain.exponentialRampToValueAtTime(0.001, t+dur);
s.connect(f); f.connect(g); g.connect(c.destination); s.start(t);
}
const sfxShoot = ()=> throttle(‘s’, 50, ()=> tone(1100, 0.05, ‘triangle’, 0.025, -700));
const sfxHit   = ()=> throttle(‘h’, 22, ()=> tone(420, 0.06, ‘square’, 0.04, -160));
const sfxBoom  = ()=> { noise(0.4, 0.22, 600); tone(80, 0.4, ‘sawtooth’, 0.08, -40); };
const sfxPower = ()=> { tone(660, 0.08, ‘sine’, 0.06, 600); setTimeout(()=> tone(990, 0.1, ‘sine’, 0.05, 400), 60); };
const sfxBomb  = ()=> { noise(0.7, 0.22, 400); for (let i=0; i<4; i++) setTimeout(()=> tone(180-i*30, 0.5, ‘sawtooth’, 0.07, -80), i*50); };
const sfxLose  = ()=> tone(440, 1.2, ‘sawtooth’, 0.1, -380);
const sfxBoss  = ()=> { for (let i=0; i<3; i++) setTimeout(()=> { noise(0.18, 0.18, 300); tone(120, 0.18, ‘square’, 0.07); }, i*220); };
const sfxWave  = ()=> { tone(880, 0.08, ‘sine’, 0.05, 400); setTimeout(()=> tone(1320, 0.12, ‘sine’, 0.04, 300), 80); };
const sfxBell  = ()=> tone(1760, 0.4, ‘sine’, 0.04, -1200);

const G = {
state:‘title’, prev:null, t:0,
score:0, best: parseInt(localStorage.getItem(‘ryusho_best’)||‘0’, 10),
wave:1, lives:3, coin:0, kills:0,
shake:0, combo:0, comboT:0, bombs:1,
soundOn: localStorage.getItem(‘ryusho_snd’) !== ‘0’,
arrowLv:1, fireRate:1, wing:0, thunder:0, pierce:0,
shield:0, laser:0, homing:0,
player:null,
bullets:[], ebullets:[], enemies:[], pickups:[], parts:[], stars:[], trails:[], dmgTexts:[], petals:[],
bossActive:false, flashA:0,
};
let waveT = 1.5;

function initStars(){
G.stars = [];
for (let i=0; i<120; i++){
G.stars.push({ x:Math.random()*W, y:Math.random()*H, z:Math.random()*0.85+0.15, gold:Math.random()<0.08 });
}
G.petals = [];
for (let i=0; i<14; i++) G.petals.push(makePetal(true));
}
function makePetal(initial){
return {
x: Math.random()*W,
y: initial ? Math.random()*H : -10,
vy: 0.3 + Math.random()*0.5,
vx: (Math.random()-0.5)*0.3,
rot: Math.random()*Math.PI*2,
rotV: (Math.random()-0.5)*0.4,
size: 2.5 + Math.random()*2.5,
sw: 0.4 + Math.random()*0.3,
swp: Math.random()*Math.PI*2,
};
}
function makePlayer(){ return { x:W/2, y:H-110, tx:W/2, ty:H-110, r:18, cooldown:0, inv:1.5, flash:0 }; }

const ENEMY_COLORS = [
{ hue:0, sat:0 }, { hue:350, sat:80 }, { hue:45, sat:90 },
{ hue:280, sat:70 }, { hue:200, sat:70 }, { hue:140, sat:60 },
];

function makeFoe(x, y, hp, vx, vy, opts={}){
return {
type:‘foe’, shape: opts.shape || ‘scale’,
x, y, vx, vy, r: opts.r || 26,
hp, maxHp: hp,
hue: opts.hue ?? 0, sat: opts.sat ?? 0,
rot: Math.random()*Math.PI*2,
rotSpd: (Math.random()-0.5)*0.5,
hit: 0,
fireT: opts.fireT || 0,
pattern: opts.pattern || ‘none’,
rare: opts.rare || false,
isMini: opts.isMini || false,
baseX: opts.baseX ?? x,
phase: opts.phase ?? 0,
};
}
function makeMini(){
// 後半は指数的に強化（wave 10以降は急激に）
const w = G.wave;
const lateBonus = Math.pow(Math.max(0, w - 10), 1.8) * 25;
const hp = 100 + w*35 + lateBonus;
return makeFoe(W/2, -80, hp, 0, 0.45, {
r:50, hue:350, sat:90, shape:‘mask’,
rare:true, isMini:true, fireT:2.2, pattern:‘sine’,
baseX:W/2, phase:0,
});
}
function makeBoss(variantOverride){
const variant = variantOverride ?? Math.floor((G.wave/5 - 1) % 3);
const baseHp = variant === 0 ? 600 : variant === 1 ? 500 : 580;
// 後半は指数的に強化
const lateBonus = Math.pow(Math.max(0, G.wave - 10), 1.7) * 80;
const hp = baseHp + G.wave*150 + lateBonus;
return {
type:‘boss’, variant,
x: W/2, y: -160,
targetY: variant === 0 ? 150 : variant === 1 ? 130 : 140,
vx: variant === 1 ? 1.6 : 1.0,
r: variant === 0 ? 100 : variant === 1 ? 80 : 90,
hp, maxHp: hp,
rot: 0, fireT: 2.5,
hit: 0, enrage: false, headPhase: 0,
};
}

const PICKS = {

const KANJI_NUM = [’’,‘壱’,‘弐’,‘参’,‘肆’,‘伍’,‘陸’,‘漆’,‘捌’,‘玖’,‘拾’,‘拾壱’,‘拾弐’,‘拾参’,‘拾肆’,‘拾伍’,‘拾陸’,‘拾漆’,‘拾捌’,‘拾玖’,‘弐拾’];

function spawnWave(){
const w = G.wave;
if (w % 5 === 0){
G.enemies.push(makeBoss());
G.bossActive = true;
document.getElementById(‘bossbar’).style.display = ‘block’;
sfxBoss(); showAnnounce(true);
return;
}
// ミニボスは4面ごと（4,8,12…）に出現。序盤の3面までは出ない
const hasMini = (w >= 4 && w % 4 === 0);
if (hasMini) G.enemies.push(makeMini());
showAnnounce(false); sfxWave();

// 行数: 1面=1, 4面=2, 7面=3, 10面=4, 13面=5, 16面=6（後半は密集）
const rows = 1 + Math.min(5, Math.floor((w-1)/3));
// 列数: 1面=4, 3面=5, 5面=6, 11面=9, 15面=11（後半は横にも増える）
const cols = 4 + Math.min(7, Math.floor((w-1)/2));
const spacingX = Math.min(W*0.86, 320) / Math.max(1, cols-1);
const startX = W/2 - (cols-1)*spacingX/2;
// 形状解禁: 1-2面=鱗のみ, 3-4面=+鬼火, 5-7面=+刃, 8面+=全種
const shapes = w<3 ? [‘scale’]
: w<5 ? [‘scale’,‘wisp’]
: w<8 ? [‘scale’,‘wisp’,‘blade’]
: [‘scale’,‘wisp’,‘blade’,‘talisman’,‘mask’];
// パワーアップ持ち（rare）の出現率: 序盤32%、中盤22%、後半16%
const powerRate = w<5 ? 0.32 : w<10 ? 0.22 : 0.16;
// 雑魚射撃確率: 7面で8%、12面で14%、18面で26%（後半急増）
const shootRate = w < 7 ? 0 : 0.08 + Math.max(0, w-10)*0.02;
// 雑魚HPの後半指数加算（wave 10以降）
const lateHpBonus = Math.pow(Math.max(0, w-10), 1.8) * 0.6;
for (let r=0; r<rows; r++){
for (let c=0; c<cols; c++){
if (hasMini && r === 0 && Math.abs(c - (cols-1)/2) < 1.5) continue;
const baseHp = 3 + Math.floor(w*2.2) + r*2 + lateHpBonus;
const isPower = Math.random() < powerRate;
const colorIdx = Math.random() < 0.45 ? Math.floor(Math.random()*ENEMY_COLORS.length) : 0;
const col = ENEMY_COLORS[colorIdx];
const shape = shapes[Math.floor(Math.random()*shapes.length)];
const shapeMul = shape===‘mask’?1.6 : shape===‘blade’?0.7 : shape===‘talisman’?1.1 : 1;
const x = startX + c*spacingX, y = -50 - r*54;
const e = makeFoe(x, y,
Math.round(baseHp*(1+colorIdx*0.2)*(isPower?1.8:1)*shapeMul),
0, 0.5 + w*0.04,
{ hue: col.hue, sat: col.sat, rare: isPower, r: shape===‘blade’?22:26, shape, baseX: x }
);
if (w > 3 && Math.random() < 0.25) e.vx = (c < cols/2 ? 1 : -1) * (0.4 + Math.random()*0.5);
if (w > 4 && Math.random() < 0.18){ e.pattern = ‘sine’; e.phase = Math.random()*Math.PI*2; }
if (shape === ‘blade’) e.vy *= 1.5;
if (shootRate > 0 && Math.random() < shootRate) e.fireT = 1.5 + Math.random()*2.5;
G.enemies.push(e);
}
}
}
function showAnnounce(isBoss){
const el = document.getElementById(‘wave-announce’);
const k = G.wave <= 20 ? KANJI_NUM[G.wave] : G.wave;
el.querySelector(’.kanji’).textContent = isBoss ? ‘大龍’ : k;
el.querySelector(’.lat’).textContent = isBoss ? `BOSS · WAVE ${G.wave}` : `WAVE ${G.wave}`;
el.classList.toggle(‘boss’, isBoss);
el.classList.remove(‘show’); void el.offsetWidth; el.classList.add(‘show’);
}

let dragging=false, dragOff={x:0,y:0};

function pMove(x, y){ if (!dragging || G.state !== ‘play’) return; const p = G.player; p.tx = clamp(x + dragOff.x, 30, W-30); p.ty = clamp(y + dragOff.y, 80, H-30); }
function pUp(){ dragging = false; }

function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function rand(a,b){ return a + Math.random()*(b-a); }
function dist2(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }

function playerFire(p){
const baseRate = 0.13 / G.fireRate;

// レーザー中も矢を発射（レーザーは追加の強化ビーム）

G.bullets.push({

for (let w=0; w<G.wing; w++){

let last = performance.now();
function loop(now){
try {
const dt = Math.min(0.05, (now-last)/1000);
last = now;
if (G.state === ‘play’) update(dt);
render(dt);
} catch(e){
console.error(‘loop error:’, e);
last = performance.now();
}
requestAnimationFrame(loop);
}

function update(dt){
G.t += dt;
if (G.shake > 0) G.shake = Math.max(0, G.shake - dt*60);
if (G.comboT > 0){ G.comboT -= dt; if (G.comboT <= 0) G.combo = 0; }

for (const s of G.stars){
s.y += (10 + s.z*60) * dt;
if (s.y > H){ s.y = -2; s.x = Math.random()*W; }
}
for (const pt of G.petals){
pt.y += pt.vy;
pt.x += pt.vx + Math.sin(G.t*1.2 + pt.swp) * pt.sw;
pt.rot += pt.rotV * dt;
if (pt.y > H + 10){ pt.y = -10; pt.x = Math.random()*W; }
}

const p = G.player;
p.x += (p.tx - p.x) * Math.min(1, dt*18);
p.y += (p.ty - p.y) * Math.min(1, dt*18);
p.cooldown = Math.max(0, p.cooldown - dt);
if (p.inv > 0) p.inv -= dt;
if (p.flash > 0) p.flash -= dt;
if (G.shield > 0) G.shield -= dt;
if (G.laser > 0) G.laser -= dt;
if (G.homing > 0) G.homing -= dt;
playerFire(p);

if (Math.random() < 0.55){
G.parts.push({ x: p.x + rand(-3,3), y: p.y + 16,
vx: rand(-0.3,0.3), vy: rand(2,4),
life:0.35, max:0.35, size: rand(1.5,3),
color:’#f0d77a’, glow:true });
}
for (let w=0; w<G.wing; w++){
const sign = w === 0 ? -1 : 1;
if (Math.random() < 0.4){
G.parts.push({ x: p.x+sign*32+rand(-2,2), y: p.y+14,
vx: rand(-0.2,0.2), vy: rand(2,3),
life:0.25, max:0.25, size: rand(1,2),
color:’#4ab37b’, glow:true });
}
}

for (const b of G.bullets){
if (b.kind === ‘homing’ && (!b.target || b.target.hp<=0)){
let best=null, bd=200*200;
for (const e of G.enemies){
if (e.hp <= 0) continue;
const d = dist2(b.x,b.y,e.x,e.y);
if (d < bd){ bd = d; best = e; }
}
b.target = best;
}
if (b.kind === ‘homing’ && b.target){
const dx = b.target.x - b.x, dy = b.target.y - b.y;
const a = Math.atan2(dy, dx);
const cur = Math.atan2(b.vy, b.vx);
let da = a - cur;
while (da > Math.PI) da -= Math.PI*2;
while (da < -Math.PI) da += Math.PI*2;
const turn = clamp(da, -3*dt, 3*dt);
const newA = cur + turn;
const sp = Math.hypot(b.vx, b.vy);
b.vx = Math.cos(newA)*sp; b.vy = Math.sin(newA)*sp;
}
b.x += b.vx; b.y += b.vy;
b.life -= dt;
}
G.bullets = G.bullets.filter(b => b.life > 0 && b.y > -20 && b.y < H+20 && b.x > -20 && b.x < W+20);

for (const eb of G.ebullets){ eb.x += eb.vx; eb.y += eb.vy; eb.life -= dt; }
G.ebullets = G.ebullets.filter(b => b.life > 0 && b.y < H+30 && b.y > -50 && b.x > -50 && b.x < W+50);
if (G.ebullets.length > 220) G.ebullets.splice(0, G.ebullets.length - 220);

for (const e of G.enemies){
if (e.type === ‘boss’) updateBoss(e, dt);
else updateFoe(e, dt);
}
G.enemies = G.enemies.filter(e =>
!e.dead && Number.isFinite(e.x) && Number.isFinite(e.y) && e.y < H+120
);

for (const b of G.bullets){
if (b.life <= 0) continue;
const piercing = b.pierce && b.pierce > 0;
for (const e of G.enemies){
if (e.hp <= 0) continue;
if (piercing && b.hitSet && b.hitSet.has(e)) continue;
const rr = b.r + e.r;
if (dist2(b.x,b.y,e.x,e.y) < rr*rr){
e.hp -= b.dmg; e.hit = 0.15;
spawnDmg(e.x, e.y - e.r*0.5, b.dmg);
let done=false;
if (piercing){
if (!b.hitSet) b.hitSet = new Set();
b.hitSet.add(e);
b.pierce–;
if (b.pierce <= 0){ b.life = 0; done = true; }
} else { b.life = 0; done = true; }
spawnSpark(b.x, b.y, ‘#fff8d6’);
if (G.thunder > 0){
let from = e;
for (let n=0; n<G.thunder; n++){
let nxt=null, bd=180*180;
for (const e2 of G.enemies){
if (e2 === from || e2.hp <= 0) continue;
const d = dist2(from.x, from.y, e2.x, e2.y);
if (d < bd){ bd = d; nxt = e2; }
}
if (!nxt) break;
G.trails.push({ ax:from.x, ay:from.y, bx:nxt.x, by:nxt.y, life:0.18, max:0.18, color:’#a875e6’ });
const cdmg = Math.round(b.dmg*0.6);
nxt.hp -= cdmg; nxt.hit = 0.15;
spawnDmg(nxt.x, nxt.y - nxt.r*0.5, cdmg, ‘#a875e6’);
from = nxt;
}
}
sfxHit();
if (done) break;
}
}
}

for (const d of G.dmgTexts){ d.y -= 35*dt; d.life -= dt; }
G.dmgTexts = G.dmgTexts.filter(d => d.life > 0);
if (G.dmgTexts.length > 60) G.dmgTexts.splice(0, G.dmgTexts.length - 60);

if (G.laser > 0){
// 矢のレベルに応じて、メインレーザー＋左右にサブレーザー
const lanes = [{ x: p.x, mul: 1.4 }];
for (let i=1; i<G.arrowLv; i++){
const off = i * 18;
const mul = Math.max(0.5, 1.1 - i*0.15);
lanes.push({ x: p.x + off, mul });
lanes.push({ x: p.x - off, mul });
}
for (const lane of lanes){
const lx = lane.x;
for (const e of G.enemies){
if (Math.abs(e.x - lx) < e.r + 12 && e.y < p.y){
e.hp -= (95 + G.pierce*35) * lane.mul * dt; e.hit = 0.1;
if (Math.random() < 0.3) spawnSpark(e.x, e.y+e.r, ‘#ff6e7e’);
}
}
}
}

for (const e of G.enemies){
if (e.hp <= 0 && !e.dead){
e.dead = true;
const big = e.type === ‘boss’;
const col = e.type === ‘boss’ ? ‘#ff5544’ : `hsl(${e.hue||0}, ${e.sat||0}%, 70%)`;
spawnExplosion(e.x, e.y, col, big?70:18, big);
sfxBoom();
G.shake = big ? 30 : 8;
const pts = big ? 5000 : (e.maxHp * 5);
G.score += Math.round(pts * (1 + G.combo*0.1));
G.kills++; G.combo++; G.comboT = 1.6;
if (G.combo >= 5 && G.combo % 5 === 0) showCombo();
if (big){
document.getElementById(‘bossbar’).style.display = ‘none’;
G.bossActive = false; G.flashA = 1;
for (let i=0; i<6; i++){
const pool = [‘arrow’,‘wing’,‘thunder’,‘pierce’,‘shield’,‘laser’,‘homing’,‘fuda’,‘speed’,‘life’];
G.pickups.push(makePick(e.x + rand(-60,60), e.y + rand(-20,20), pool[Math.floor(Math.random()*pool.length)]));
}
} else if (e.isMini){
for (let i=0; i<3; i++){
const pool = [‘arrow’,‘wing’,‘thunder’,‘pierce’,‘shield’,‘laser’,‘homing’,‘fuda’,‘speed’,‘life’];
G.pickups.push(makePick(e.x + rand(-30,30), e.y, pool[Math.floor(Math.random()*pool.length)]));
}
} else {
// 序盤(wave<5)はドロップ率高め、後半は標準
const dropChance = e.rare ? 0.90 : (G.wave < 5 ? 0.32 : G.wave < 10 ? 0.20 : 0.14);
if (Math.random() < dropChance){
let kind;
if (e.rare){
const pool = [‘arrow’,‘wing’,‘thunder’,‘pierce’,‘shield’,‘laser’,‘homing’,‘fuda’,‘speed’];
kind = pool[Math.floor(Math.random()*pool.length)];
// ライフ補充の確率も上げる
if (G.lives < 5 && Math.random() < 0.18) kind = ‘life’;
} else {
// 通常ドロップは銭メイン、たまにパワーアップも
if (Math.random() < 0.18){
const pool = [‘arrow’,‘fuda’,‘speed’,‘coin’];
kind = pool[Math.floor(Math.random()*pool.length)];
} else {
kind = ‘coin’;
}
}
G.pickups.push(makePick(e.x, e.y, kind));
}
}
}
}
G.enemies = G.enemies.filter(e => !e.dead);

for (const pk of G.pickups){
pk.y += pk.vy; pk.rot += dt*2; pk.pulse += dt*4;
const d = dist2(pk.x, pk.y, p.x, p.y);
if (d < 180*180){
const dx = p.x - pk.x, dy = p.y - pk.y;
const dd = Math.sqrt(d) || 1;
pk.x += (dx/dd)*5; pk.y += (dy/dd)*5;
}
}
for (const pk of G.pickups){
if (pk.dead) continue;
if (dist2(pk.x, pk.y, p.x, p.y) < (pk.r+p.r)*(pk.r+p.r)){
pk.dead = true; applyPickup(pk.kind);
}
}
G.pickups = G.pickups.filter(pk => !pk.dead && pk.y < H+30);

if (p.inv <= 0 && G.shield <= 0){
for (const eb of G.ebullets){
if (eb.life <= 0) continue;
const rr = eb.r + p.r*0.7;
if (dist2(eb.x, eb.y, p.x, p.y) < rr*rr){
eb.life = 0; hitPlayer(); break;
}
}
for (const e of G.enemies){
if (e.hp <= 0) continue;
const rr = e.r + p.r*0.7;
if (dist2(e.x, e.y, p.x, p.y) < rr*rr){
if (e.type !== ‘boss’){ e.hp -= 9999; spawnExplosion(e.x, e.y, ‘#ff5544’, 12); }
hitPlayer(); break;
}
}
} else if (G.shield > 0){
for (const eb of G.ebullets){
if (eb.life <= 0) continue;
const rr = eb.r + p.r;
if (dist2(eb.x, eb.y, p.x, p.y) < rr*rr){
eb.life = 0; spawnSpark(eb.x, eb.y, ‘#7ec8e3’);
}
}
}

for (const pa of G.parts){
if (pa.ring){ const k = 1 - pa.life/pa.max; pa.size = k * pa.maxSize; }
else { pa.x += pa.vx; pa.y += pa.vy; pa.vx *= 0.94; pa.vy *= 0.94; }
pa.life -= dt;
}
G.parts = G.parts.filter(pa => pa.life > 0);
if (G.parts.length > 600) G.parts.splice(0, G.parts.length - 600);

for (const tr of G.trails) tr.life -= dt;
G.trails = G.trails.filter(t => t.life > 0);

if (G.enemies.length === 0){
if (G.bossActive){ G.bossActive = false; document.getElementById(‘bossbar’).style.display = ‘none’; }
waveT -= dt;

}
if (G.bossActive){
const boss = G.enemies.find(e => e.type === ‘boss’);
if (boss){
document.querySelector(’#bossbar .fill’).style.width = (Math.max(0, boss.hp)/boss.maxHp*100) + ‘%’;
} else {
G.bossActive = false; document.getElementById(‘bossbar’).style.display = ‘none’;
}
}
updateHUD();
}

function updateFoe(e, dt){
if (e.pattern === ‘sine’ && !Number.isFinite(e.baseX)) e.baseX = e.x;
e.x += e.vx; e.y += e.vy;
if (e.pattern === ‘sine’){
e.x = e.baseX + Math.sin(G.t*1.5 + e.phase) * 40;
}
if (e.x < e.r+5 || e.x > W-e.r-5) e.vx *= -1;
e.rot += e.rotSpd * dt;
if (e.hit > 0) e.hit -= dt;
if (e.fireT > 0){
e.fireT -= dt;
if (e.fireT <= 0){
const dx = G.player.x - e.x, dy = G.player.y - e.y;
const a = Math.atan2(dy, dx);
// ミニボスの弾密度をwave依存に。4面=1発、8面=3発、12+面=3発
const burst = e.isMini ? (G.wave < 6 ? 1 : G.wave < 10 ? 2 : 3) : 1;
const spread = e.isMini ? 0.2 : 0;
for (let i=0; i<burst; i++){
const aa = a + (i - (burst-1)/2)*spread;
G.ebullets.push({ x: e.x, y: e.y + e.r,
vx: Math.cos(aa)*3.5, vy: Math.sin(aa)*3.5,
r: 4, life: 5, color: e.isMini ? ‘#ff8855’ : ‘#ff66aa’ });
}
e.fireT = e.isMini ? (G.wave < 6 ? 2.2 : 1.5) : (2 + Math.random()*2);
}
}
}

function updateBoss(e, dt){
if (e.y < e.targetY) e.y += 1.0;
else { e.x += e.vx; if (e.x < e.r+10 || e.x > W-e.r-10) e.vx *= -1; }
e.rot += dt*0.5;
e.fireT -= dt;
if (e.hit > 0) e.hit -= dt;
e.enrage = e.hp < e.maxHp*0.4;

if (e.fireT <= 0){
const rateMul = e.enrage ? 0.6 : 1;
// wave依存の難易度補正：5面=1.35、10面=1.0、15面=0.7、20面=0.4 (cap)
const waveMul = Math.max(0.4, 1.6 - G.wave*0.06);
if (e.variant === 0){
// 八岐大蛇
e.fireT = 0.5 * rateMul * waveMul;
e.headPhase = (e.headPhase + 1) % 8;
const a0 = (e.headPhase / 8) * Math.PI*2 - Math.PI/2;
const headX = e.x + Math.cos(a0) * (e.r * 0.85);
const headY = e.y + Math.sin(a0) * (e.r * 0.85);
const dx = G.player.x - headX, dy = G.player.y - headY;
const a = Math.atan2(dy, dx);
// 弾数: 8面未満=1、8-14面=3、15+面=5
const burst = G.wave < 8 ? 1 : G.wave < 15 ? 3 : 5;
const spread = 0.18;
for (let i=0; i<burst; i++){
const aa = a + (i - (burst-1)/2)*spread;
G.ebullets.push({ x: headX, y: headY,
vx: Math.cos(aa)*4.2, vy: Math.sin(aa)*4.2,
r: 5, life: 6, color:’#ff5544’ });
}
} else if (e.variant === 1){
// 雷神
e.fireT = 0.20 * rateMul * waveMul;
const N = G.wave < 12 ? 3 : G.wave < 18 ? 4 : 6;
for (let i=0; i<N; i++){
const a = G.t*4 + (i/N)*Math.PI*2;
G.ebullets.push({ x: e.x, y: e.y,
vx: Math.cos(a)*3.6, vy: Math.sin(a)*3.6,
r: 4, life: 7, color:’#a875e6’ });
}
// 15面以降は逆回転の追加リング
if (G.wave >= 15){
for (let i=0; i<N; i++){
const a = -G.t*4 + (i/N)*Math.PI*2;
G.ebullets.push({ x: e.x, y: e.y,
vx: Math.cos(a)*2.8, vy: Math.sin(a)*2.8,
r: 4, life: 7, color:’#cc88ff’ });
}
}
} else {
// 龍神
e.fireT = 1.6 * rateMul * waveMul;
const N = e.enrage ? (G.wave < 12 ? 16 : G.wave < 18 ? 22 : 30) : (G.wave < 12 ? 12 : G.wave < 18 ? 18 : 24);
const off = G.t;
for (let i=0; i<N; i++){
const a = (i/N)*Math.PI*2 + off;
G.ebullets.push({ x: e.x, y: e.y,
vx: Math.cos(a)*2.4, vy: Math.sin(a)*2.4,
r: 5, life: 8, color:’#f0d77a’ });
}
// 狙い撃ち弾は8面以降
if (G.wave >= 8){
const dx = G.player.x - e.x, dy = G.player.y - e.y;
const aa = Math.atan2(dy, dx);
// 後半は3連狙い撃ち
const aimedBurst = G.wave < 15 ? 1 : 3;
for (let i=0; i<aimedBurst; i++){
const sp = 0.12;
G.ebullets.push({ x: e.x, y: e.y,
vx: Math.cos(aa + (i-(aimedBurst-1)/2)*sp)*7,
vy: Math.sin(aa + (i-(aimedBurst-1)/2)*sp)*7,
r: 6, life: 4, color:’#ffe080’ });
}
}
}
}
}

function hitPlayer(){
const p = G.player;
G.lives–;
p.inv = 2.0; p.flash = 0.4;
G.shake = 24;
spawnExplosion(p.x, p.y, ‘#f0d77a’, 30);
sfxBoom();
G.arrowLv = Math.max(1, G.arrowLv-1);
if (G.wing > 0 && Math.random() < 0.5) G.wing–;
if (G.thunder > 0 && Math.random() < 0.5) G.thunder–;
G.combo = 0;
if (G.lives <= 0) gameOver();
updateHUD();
}

function applyPickup(kind){
sfxPower();
const col = PICKS[kind].color;
for (let i=0; i<14; i++){
const a = Math.random()*Math.PI*2;
G.parts.push({ x: G.player.x, y: G.player.y,
vx: Math.cos(a)*3, vy: Math.sin(a)*3,
life:0.5, max:0.5, size:2.5, color: col, glow:true });
}
switch(kind){
case ‘arrow’:   G.arrowLv = Math.min(5, G.arrowLv+1); break;
case ‘wing’:    G.wing = Math.min(2, G.wing+1); break;
case ‘thunder’: G.thunder = Math.min(3, G.thunder+1); break;
case ‘pierce’:  G.pierce = Math.min(3, G.pierce+1); break;
case ‘shield’:  G.shield = 8; break;
case ‘laser’:   G.laser = 6; break;
case ‘homing’:  G.homing = 8; break;
case ‘fuda’:    G.bombs = Math.min(5, G.bombs+1); sfxBell(); break;
case ‘speed’:   G.fireRate = Math.min(2.5, G.fireRate*1.18); break;
case ‘life’:    G.lives = Math.min(5, G.lives+1); sfxBell(); break;
case ‘coin’:    G.coin++; G.score += 50; break;
}
updateHUD();
}

function showCombo(){
const el = document.getElementById(‘combo’);
el.textContent = G.combo + ‘連’;
el.classList.remove(‘flash-in’); void el.offsetWidth; el.classList.add(‘flash-in’);
}
// ========== Rendering ==========
function render(dt){
ctx.fillStyle = ‘#050308’;
ctx.fillRect(0, 0, W, H);

let sx=0, sy=0;
if (G.shake > 0){ sx=(Math.random()-0.5)*G.shake*0.4; sy=(Math.random()-0.5)*G.shake*0.4; }
ctx.save();
ctx.translate(sx, sy);

drawMoon();
drawClouds();

ctx.save();
for (const s of G.stars){
if (s.gold){
ctx.fillStyle = `rgba(240,215,122,${s.z})`;
ctx.shadowColor = ‘#f0d77a’; ctx.shadowBlur = 6;
} else {
ctx.fillStyle = `rgba(245,230,211,${s.z*0.7})`;
ctx.shadowBlur = 0;
}
ctx.fillRect(s.x, s.y, s.z*1.6, s.z*1.6);
}
ctx.shadowBlur = 0;
ctx.restore();

for (const pt of G.petals) drawPetal(pt);
for (const tr of G.trails) drawThunder(tr);

for (const e of G.enemies){
if (e.type === ‘boss’) drawBoss(e);
else drawFoe(e);
}
for (const pk of G.pickups) drawPick(pk);
for (const b of G.bullets) drawBullet(b);
for (const eb of G.ebullets) drawEBullet(eb);
if (G.state === ‘play’ || G.state === ‘over’) drawPlayer(G.player);
for (const pa of G.parts) drawPart(pa);

for (const d of G.dmgTexts){
const a = Math.min(1, d.life/d.max * 1.5);
ctx.save();
ctx.globalAlpha = a;
ctx.font = `700 ${d.size}px "Shippori Mincho B1", serif`;
ctx.textAlign = ‘center’;
ctx.fillStyle = d.color;
ctx.shadowColor = d.color; ctx.shadowBlur = 6;
ctx.fillText(d.text, d.x, d.y);
ctx.restore();
}

if (G.laser > 0 && G.state === ‘play’){
const p = G.player;
ctx.save();
// メインビーム＋矢のレベル分の左右サブビーム
const beams = [{ x: p.x, sc: 1.0 }];
for (let i=1; i<G.arrowLv; i++){
const off = i * 18;
const sc = Math.max(0.45, 1.0 - i*0.15);
beams.push({ x: p.x + off, sc });
beams.push({ x: p.x - off, sc });
}
for (const beam of beams){
const x = beam.x, sc = beam.sc;
const grad = ctx.createLinearGradient(x, p.y, x, 0);
grad.addColorStop(0, ‘rgba(255,110,126,1)’);
grad.addColorStop(1, ‘rgba(255,110,126,0)’);
ctx.strokeStyle = grad;
ctx.shadowColor = ‘#ff6e7e’; ctx.shadowBlur = 18 * sc;
ctx.lineWidth = (18 + Math.sin(G.t*30)*4) * sc;
ctx.globalAlpha = 0.35 * sc;
ctx.beginPath(); ctx.moveTo(x, p.y-12); ctx.lineTo(x, 0); ctx.stroke();
ctx.lineWidth = 8 * sc; ctx.globalAlpha = 0.7 * sc;
ctx.beginPath(); ctx.moveTo(x, p.y-12); ctx.lineTo(x, 0); ctx.stroke();
ctx.strokeStyle = ‘#fff8d6’; ctx.lineWidth = 3 * sc; ctx.globalAlpha = sc;
ctx.beginPath(); ctx.moveTo(x, p.y-12); ctx.lineTo(x, 0); ctx.stroke();
}
ctx.restore();
}

if (G.combo >= 3 && G.state === ‘play’){
ctx.save();
ctx.font = ‘700 14px “Shippori Mincho B1”, serif’;
ctx.textAlign = ‘center’;
ctx.fillStyle = ‘#f0d77a’;
ctx.shadowColor = ‘#f0d77a’; ctx.shadowBlur = 8;
ctx.fillText(`連 ${G.combo}`, W/2, 110);
ctx.restore();
}

ctx.restore();

if (G.flashA > 0){
G.flashA = Math.max(0, G.flashA - dt*2);
document.getElementById(‘flash’).style.opacity = G.flashA*0.55;
} else {
const fl = document.getElementById(‘flash’);
if (parseFloat(fl.style.opacity || 0) > 0) fl.style.opacity = 0;
}
}

function drawMoon(){
ctx.save();
const mx = W*0.78, my = 110;
ctx.shadowColor = ‘#f0d77a’; ctx.shadowBlur = 40;
ctx.fillStyle = ‘rgba(245,230,211,0.04)’;
ctx.beginPath(); ctx.arc(mx, my, 80, 0, Math.PI*2); ctx.fill();
ctx.shadowBlur = 24;
ctx.fillStyle = ‘rgba(245,230,211,0.18)’;
ctx.beginPath(); ctx.arc(mx, my, 36, 0, Math.PI*2); ctx.fill();
ctx.restore();
}
function drawClouds(){
ctx.save();
ctx.globalAlpha = 0.12;
ctx.fillStyle = ‘#1a1d3a’;
for (let row=0; row<2; row++){
const y = row===0 ? H*0.7 : H*0.85;
for (let i=0; i<5; i++){
const x = ((G.t*8 + i*180 + row*90) % (W+200)) - 100;
ctx.beginPath();
ctx.ellipse(x, y, 70, 12, 0, 0, Math.PI*2);
ctx.fill();
}
}
ctx.restore();
}
function drawPetal(pt){
ctx.save();
ctx.translate(pt.x, pt.y);
ctx.rotate(pt.rot);
ctx.globalAlpha = 0.35;
ctx.fillStyle = ‘rgba(255,183,197,0.6)’;
ctx.beginPath();
ctx.moveTo(0, -pt.size);
ctx.quadraticCurveTo(pt.size*0.7, -pt.size*0.3, pt.size*0.4, pt.size*0.7);
ctx.quadraticCurveTo(0, pt.size*0.3, -pt.size*0.4, pt.size*0.7);
ctx.quadraticCurveTo(-pt.size*0.7, -pt.size*0.3, 0, -pt.size);
ctx.fill();
ctx.restore();
}

// ========== Player (origami crane / 神鳥) ==========
function drawPlayer(p){
const flicker = p.inv > 0 && Math.floor(p.inv*20)%2===0;
if (flicker) return;
ctx.save();
ctx.translate(p.x, p.y);

if (G.shield > 0){
ctx.save();
const a = 0.7 + Math.sin(G.t*8)*0.15;
ctx.strokeStyle = ‘#7ec8e3’;
ctx.shadowColor = ‘#7ec8e3’; ctx.shadowBlur = 18;
ctx.lineWidth = 2; ctx.globalAlpha = a;
ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI*2); ctx.stroke();
ctx.lineWidth = 1; ctx.globalAlpha = a*0.6;
ctx.setLineDash([4, 6]);
ctx.beginPath(); ctx.arc(0, 0, 38, 0, Math.PI*2); ctx.stroke();
ctx.setLineDash([]);
ctx.restore();
}

ctx.shadowColor = ‘#f0d77a’; ctx.shadowBlur = 14;
ctx.strokeStyle = ‘#fff8d6’;
ctx.fillStyle = ‘rgba(245,230,211,0.08)’;
ctx.lineWidth = 1.6; ctx.lineJoin = ‘round’;

ctx.beginPath();
ctx.moveTo(0, -22);
ctx.lineTo(5, -10);
ctx.lineTo(28, 4);
ctx.lineTo(20, 8);
ctx.lineTo(8, 6);
ctx.lineTo(10, 18);
ctx.lineTo(0, 14);
ctx.lineTo(-10, 18);
ctx.lineTo(-8, 6);
ctx.lineTo(-20, 8);
ctx.lineTo(-28, 4);
ctx.lineTo(-5, -10);
ctx.closePath();
ctx.fill(); ctx.stroke();

ctx.beginPath();
ctx.moveTo(0, -22); ctx.lineTo(0, 14);
ctx.stroke();

ctx.fillStyle = ‘#d4af37’;
ctx.shadowColor = ‘#d4af37’; ctx.shadowBlur = 8;
ctx.beginPath();
ctx.moveTo(0, -8); ctx.lineTo(4, -2); ctx.lineTo(0, 4); ctx.lineTo(-4, -2);
ctx.closePath(); ctx.fill();

ctx.shadowBlur = 10;
ctx.beginPath(); ctx.arc(-3, 14, 1.6, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(3, 14, 1.6, 0, Math.PI*2); ctx.fill();

ctx.restore();

for (let w=0; w<G.wing; w++){
const sign = w === 0 ? -1 : 1;
drawWingman(p.x + sign*32, p.y + 4);
}
}
function drawWingman(x, y){
ctx.save();
ctx.translate(x, y);
ctx.shadowColor = ‘#4ab37b’; ctx.shadowBlur = 10;
ctx.strokeStyle = ‘#aaffcc’;
ctx.fillStyle = ‘rgba(74,179,123,0.18)’;
ctx.lineWidth = 1.4; ctx.lineJoin = ‘round’;
ctx.beginPath();
ctx.moveTo(0, -10);
ctx.lineTo(3, -3); ctx.lineTo(10, 2); ctx.lineTo(4, 4); ctx.lineTo(5, 9);
ctx.lineTo(0, 6);
ctx.lineTo(-5, 9); ctx.lineTo(-4, 4); ctx.lineTo(-10, 2); ctx.lineTo(-3, -3);
ctx.closePath();
ctx.fill(); ctx.stroke();
ctx.shadowBlur = 6;
ctx.fillStyle = ‘#4ab37b’;
ctx.beginPath(); ctx.arc(0, 4, 1, 0, Math.PI*2); ctx.fill();
ctx.restore();
}

// ========== Foes ==========
function drawFoe(e){
switch (e.shape){
case ‘mask’:     return drawOniMask(e);
case ‘blade’:    return drawBlade(e);
case ‘wisp’:     return drawWisp(e);
case ‘talisman’: return drawTalisman(e);
default:         return drawScale(e);
}
}

// 鱗 SCALE - dragon scale
function drawScale(e){
const lit = e.hit > 0;
const baseColor = e.sat ? `hsl(${e.hue}, ${e.sat}%, 62%)` : ‘#e8d4b8’;
ctx.save();
ctx.translate(e.x, e.y);
ctx.rotate(e.rot * 0.3);
ctx.shadowColor = baseColor;
ctx.shadowBlur = lit ? 24 : 12;
ctx.strokeStyle = lit ? ‘#fff8d6’ : baseColor;
ctx.lineWidth = e.rare ? 2.2 : 1.6;
ctx.lineJoin = ‘round’;

ctx.beginPath();
ctx.moveTo(0, -e.r);
ctx.bezierCurveTo(e.r*0.9, -e.r*0.6, e.r*0.85, e.r*0.5, 0, e.r);
ctx.bezierCurveTo(-e.r*0.85, e.r*0.5, -e.r*0.9, -e.r*0.6, 0, -e.r);
ctx.fillStyle = `hsla(${e.hue}, ${e.sat}%, 30%, 0.25)`;
ctx.fill(); ctx.stroke();

ctx.beginPath();
ctx.moveTo(0, -e.r*0.7);
ctx.bezierCurveTo(e.r*0.4, -e.r*0.3, e.r*0.4, e.r*0.3, 0, e.r*0.7);
ctx.lineWidth = 1; ctx.globalAlpha = 0.55;
ctx.stroke();
ctx.globalAlpha = 1;

if (e.rare){
ctx.beginPath();
ctx.moveTo(0, -e.r*0.85);
ctx.bezierCurveTo(e.r*0.75, -e.r*0.5, e.r*0.7, e.r*0.4, 0, e.r*0.85);
ctx.bezierCurveTo(-e.r*0.7, e.r*0.4, -e.r*0.75, -e.r*0.5, 0, -e.r*0.85);
ctx.globalAlpha = 0.4; ctx.stroke(); ctx.globalAlpha = 1;
}

ctx.rotate(-e.rot * 0.3);
ctx.font = `700 ${Math.max(11, e.r*0.5)}px "Shippori Mincho B1", serif`;
ctx.textAlign = ‘center’; ctx.textBaseline = ‘middle’;
ctx.fillStyle = lit ? ‘#fff8d6’ : baseColor;
ctx.shadowBlur = lit ? 14 : 6;
ctx.fillText(Math.max(0, Math.ceil(e.hp)), 0, 1);
ctx.restore();
}

// 鬼面 ONI MASK
function drawOniMask(e){
const lit = e.hit > 0;
const baseColor = e.sat ? `hsl(${e.hue}, ${e.sat}%, 60%)` : ‘#c8161d’;
ctx.save();
ctx.translate(e.x, e.y);
ctx.shadowColor = baseColor;
ctx.shadowBlur = lit ? 28 : 18;
ctx.strokeStyle = lit ? ‘#fff8d6’ : baseColor;
ctx.fillStyle = `hsla(${e.hue}, ${e.sat}%, 25%, 0.65)`;
ctx.lineWidth = e.isMini ? 2.6 : 2;
ctx.lineJoin = ‘round’;

const r = e.r;
ctx.beginPath();
ctx.moveTo(-r*0.55, -r*0.7);
ctx.lineTo(-r*0.85, -r*1.05);
ctx.lineTo(-r*0.45, -r*0.55);
ctx.bezierCurveTo(-r*0.95, -r*0.3, -r*0.95, r*0.5, -r*0.4, r*0.95);
ctx.lineTo(0, r*0.85);
ctx.lineTo(r*0.4, r*0.95);
ctx.bezierCurveTo(r*0.95, r*0.5, r*0.95, -r*0.3, r*0.45, -r*0.55);
ctx.lineTo(r*0.85, -r*1.05);
ctx.lineTo(r*0.55, -r*0.7);
ctx.bezierCurveTo(r*0.3, -r*0.5, -r*0.3, -r*0.5, -r*0.55, -r*0.7);
ctx.closePath();
ctx.fill(); ctx.stroke();

ctx.fillStyle = ‘#fff8d6’;
ctx.shadowColor = ‘#fff8d6’; ctx.shadowBlur = 10;
ctx.beginPath();
ctx.ellipse(-r*0.32, -r*0.22, r*0.18, r*0.10, -0.4, 0, Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.ellipse(r*0.32, -r*0.22, r*0.18, r*0.10, 0.4, 0, Math.PI*2);
ctx.fill();
ctx.fillStyle = ‘#1a1d3a’;
ctx.beginPath(); ctx.arc(-r*0.32, -r*0.22, r*0.05, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(r*0.32, -r*0.22, r*0.05, 0, Math.PI*2); ctx.fill();

ctx.shadowColor = baseColor; ctx.shadowBlur = lit?20:10;
ctx.strokeStyle = lit ? ‘#fff8d6’ : baseColor;
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(-r*0.35, r*0.3);
ctx.quadraticCurveTo(0, r*0.55, r*0.35, r*0.3);
ctx.stroke();
ctx.fillStyle = ‘#fff8d6’;
ctx.beginPath();
ctx.moveTo(-r*0.18, r*0.35); ctx.lineTo(-r*0.10, r*0.5); ctx.lineTo(-r*0.22, r*0.42);
ctx.fill();
ctx.beginPath();
ctx.moveTo(r*0.18, r*0.35); ctx.lineTo(r*0.10, r*0.5); ctx.lineTo(r*0.22, r*0.42);
ctx.fill();

ctx.font = `700 ${Math.max(13, r*0.42)}px "Shippori Mincho B1", serif`;
ctx.textAlign = ‘center’; ctx.textBaseline = ‘middle’;
ctx.fillStyle = ‘#fff8d6’; ctx.shadowBlur = 8;
ctx.fillText(Math.max(0, Math.ceil(e.hp)), 0, r*0.05);
ctx.restore();
}

// 刃 BLADE
function drawBlade(e){
const lit = e.hit > 0;
const baseColor = e.sat ? `hsl(${e.hue}, ${e.sat}%, 65%)` : ‘#9be0ff’;

ctx.translate(e.x, e.y);
ctx.rotate(e.rot);

ctx.shadowBlur = lit ? 22 : 12;
ctx.strokeStyle = lit ? ‘#fff8d6’ : baseColor;

ctx.shadowBlur = lit ? 12 : 6;
ctx.fillText(Math.max(0, Math.ceil(e.hp)), 0, 1);

}

// 鬼火 WISP
function drawWisp(e){
const lit = e.hit > 0;
const baseColor = e.sat ? `hsl(${e.hue}, ${e.sat}%, 65%)` : ‘#a875e6’;
ctx.save();
ctx.translate(e.x, e.y);
ctx.shadowColor = baseColor;
ctx.shadowBlur = lit ? 30 : 18;
ctx.strokeStyle = lit ? ‘#fff8d6’ : baseColor;
ctx.lineWidth = 1.6; ctx.lineJoin = ‘round’;

ctx.beginPath();
const wob = Math.sin(G.t*3 + e.phase)*2;
ctx.arc(0, 0, e.r + wob, 0, Math.PI*2);
ctx.fillStyle = `hsla(${e.hue}, ${e.sat}%, 30%, 0.35)`;
ctx.fill(); ctx.stroke();
for (let i=1; i<=3; i++){
ctx.beginPath();
ctx.arc(0, e.r*0.5 + i*5, Math.max(1, e.r*0.18 - i*1.5), 0, Math.PI*2);
ctx.globalAlpha = 0.5 - i*0.12;
ctx.fillStyle = baseColor;
ctx.fill();
}
ctx.globalAlpha = 1;

ctx.font = `700 ${Math.max(11, e.r*0.5)}px "Shippori Mincho B1", serif`;
ctx.textAlign = ‘center’; ctx.textBaseline = ‘middle’;
ctx.fillStyle = lit ? ‘#fff8d6’ : ‘#fff’;
ctx.shadowBlur = 8;
ctx.fillText(Math.max(0, Math.ceil(e.hp)), 0, 1);
ctx.restore();
}

// 護符 TALISMAN
function drawTalisman(e){
const lit = e.hit > 0;
const baseColor = e.sat ? `hsl(${e.hue}, ${e.sat}%, 60%)` : ‘#d4af37’;
ctx.save();
ctx.translate(e.x, e.y);
ctx.rotate(e.rot * 0.15);
ctx.shadowColor = baseColor;
ctx.shadowBlur = lit ? 22 : 14;

const w = e.r*1.05, h = e.r*1.4;
ctx.fillStyle = ‘#f5e6d3’;
ctx.strokeStyle = lit ? ‘#fff8d6’ : baseColor;
ctx.lineWidth = e.rare ? 2.2 : 1.6;
ctx.beginPath();
ctx.moveTo(-w*0.4, -h*0.5);
ctx.lineTo(w*0.4, -h*0.5);
ctx.lineTo(w*0.5, -h*0.4);
ctx.lineTo(w*0.5, h*0.5);
ctx.lineTo(-w*0.5, h*0.5);
ctx.lineTo(-w*0.5, -h*0.4);
ctx.closePath();
ctx.fill(); ctx.stroke();

ctx.fillStyle = ‘#c8161d’;
ctx.fillRect(-w*0.2, -h*0.42, w*0.4, h*0.08);

ctx.rotate(-e.rot * 0.15);
ctx.fillStyle = ‘#1a1d3a’;
ctx.font = `800 ${e.r*0.85}px "Yuji Boku", serif`;
ctx.textAlign = ‘center’; ctx.textBaseline = ‘middle’;
ctx.shadowBlur = 0;
ctx.fillText(‘呪’, 0, -h*0.05);

ctx.font = `700 ${Math.max(10, e.r*0.45)}px "Shippori Mincho B1", serif`;
ctx.fillStyle = ‘#c8161d’;
ctx.fillText(Math.max(0, Math.ceil(e.hp)), 0, h*0.3);
ctx.restore();
}

// ========== Bosses ==========
function drawBoss(e){
if (e.variant === 0) return drawYamata(e);
if (e.variant === 1) return drawRaijin(e);
return drawRyujin(e);
}

// 八岐大蛇 YAMATA NO OROCHI
function drawYamata(e){
const lit = e.hit > 0;
const main = e.enrage ? ‘#ff2233’ : ‘#c8161d’;
ctx.save();
ctx.translate(e.x, e.y);

// 8 dragon heads
for (let i=0; i<8; i++){
const a = (i/8)*Math.PI*2 - Math.PI/2 + e.rot*0.2;
const len = e.r*0.95 + Math.sin(G.t*2 + i)*4;
drawDragonHead(Math.cos(a)*len, Math.sin(a)*len, a + Math.PI/2, e.r*0.32, main, lit, i === e.headPhase);
}

// Center coiled body
ctx.shadowColor = main; ctx.shadowBlur = 36;
ctx.strokeStyle = lit ? ‘#fff8d6’ : main;
ctx.fillStyle = `rgba(40, 5, 8, 0.85)`;
ctx.lineWidth = 2.4; ctx.lineJoin = ‘round’;
ctx.beginPath();
const N = 12;
for (let i=0; i<N; i++){
const a = (i/N)*Math.PI*2;
const r = e.r*0.55 + Math.sin(a*4 + G.t*2)*4;
if (i===0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
}
ctx.closePath(); ctx.fill(); ctx.stroke();

// Inner 八-star
ctx.save();
ctx.rotate(-e.rot*0.3);
ctx.strokeStyle = ‘#d4af37’;
ctx.shadowColor = ‘#d4af37’; ctx.shadowBlur = 12;
ctx.lineWidth = 1.5;
ctx.beginPath();
for (let i=0; i<8; i++){
const a = (i/8)*Math.PI*2;
ctx.moveTo(0, 0);
ctx.lineTo(Math.cos(a)*e.r*0.4, Math.sin(a)*e.r*0.4);
}
ctx.stroke();
ctx.restore();

ctx.fillStyle = ‘#fff8d6’;
ctx.font = `900 22px "Shippori Mincho B1", serif`;
ctx.textAlign = ‘center’; ctx.textBaseline = ‘middle’;
ctx.shadowBlur = 12;
ctx.fillText(Math.max(0, Math.ceil(e.hp)), 0, 0);

ctx.restore();
}

function drawDragonHead(x, y, ang, size, color, lit, glow){
ctx.save();
ctx.translate(x, y);
ctx.rotate(ang);
ctx.shadowColor = color;
ctx.shadowBlur = glow ? 28 : 14;
ctx.strokeStyle = lit ? ‘#fff8d6’ : color;
ctx.fillStyle = ‘rgba(40, 5, 8, 0.7)’;
ctx.lineWidth = 1.8; ctx.lineJoin = ‘round’;

// Head profile (snout pointing in +y direction)
ctx.beginPath();
ctx.moveTo(0, size*1.4);
ctx.lineTo(size*0.5, size*0.7);
ctx.lineTo(size*0.45, size*0.1);
ctx.lineTo(size*0.7, -size*0.4);
ctx.lineTo(size*0.2, -size*0.2);
ctx.lineTo(0, -size*0.5);
ctx.lineTo(-size*0.2, -size*0.2);
ctx.lineTo(-size*0.7, -size*0.4);
ctx.lineTo(-size*0.45, size*0.1);
ctx.lineTo(-size*0.5, size*0.7);
ctx.closePath();
ctx.fill(); ctx.stroke();

// Eye
ctx.fillStyle = ‘#f0d77a’;
ctx.shadowColor = ‘#f0d77a’; ctx.shadowBlur = glow?14:8;
ctx.beginPath();
ctx.arc(size*0.18, size*0.3, size*0.12, 0, Math.PI*2);
ctx.fill();

ctx.restore();
}

// 雷神 RAIJIN
function drawRaijin(e){
const lit = e.hit > 0;
const main = e.enrage ? ‘#cc66ff’ : ‘#a875e6’;
ctx.save();
ctx.translate(e.x, e.y);
ctx.rotate(e.rot * 0.5);

// Outer drum ring
ctx.shadowColor = main; ctx.shadowBlur = 36;
ctx.strokeStyle = lit ? ‘#fff8d6’ : main;
ctx.fillStyle = ‘rgba(20, 5, 30, 0.85)’;
ctx.lineWidth = 2.6;
ctx.beginPath(); ctx.arc(0, 0, e.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();

// 8 small drums around
for (let i=0; i<8; i++){
const a = (i/8)*Math.PI*2;
ctx.beginPath();
ctx.arc(Math.cos(a)*e.r*0.85, Math.sin(a)*e.r*0.85, e.r*0.18, 0, Math.PI*2);
ctx.fillStyle = main;
ctx.globalAlpha = 0.7;
ctx.fill();
ctx.globalAlpha = 1;
ctx.strokeStyle = lit ? ‘#fff8d6’ : ‘#f5e6d3’;
ctx.lineWidth = 1.2;
ctx.stroke();
}

// Tomoe (三つ巴)
ctx.rotate(G.t*2);
ctx.fillStyle = ‘#fff8d6’;
ctx.shadowColor = ‘#fff8d6’; ctx.shadowBlur = 14;
for (let i=0; i<3; i++){
ctx.save();
ctx.rotate(i*Math.PI*2/3);
ctx.beginPath();
ctx.arc(0, -e.r*0.25, e.r*0.18, 0, Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.moveTo(e.r*0.18, -e.r*0.25);
ctx.quadraticCurveTo(e.r*0.4, -e.r*0.05, 0, e.r*0.1);
ctx.lineTo(0, -e.r*0.07);
ctx.quadraticCurveTo(e.r*0.18, -e.r*0.1, 0, -e.r*0.25);
ctx.fill();
ctx.restore();
}
ctx.rotate(-G.t*2);

ctx.rotate(-e.rot*0.5);
ctx.fillStyle = ‘#fff8d6’;
ctx.font = `900 20px "Shippori Mincho B1", serif`;
ctx.textAlign = ‘center’; ctx.textBaseline = ‘middle’;
ctx.shadowBlur = 10;
ctx.fillText(Math.max(0, Math.ceil(e.hp)), 0, e.r*0.85 + 2);
ctx.restore();
}

// 龍神 RYUJIN
function drawRyujin(e){
const lit = e.hit > 0;
const main = e.enrage ? ‘#ffaa22’ : ‘#d4af37’;
ctx.save();
ctx.translate(e.x, e.y);
ctx.rotate(e.rot);

// Sun-disc backdrop
ctx.shadowColor = main; ctx.shadowBlur = 50;
ctx.fillStyle = ‘rgba(40, 25, 5, 0.6)’;
ctx.beginPath(); ctx.arc(0, 0, e.r, 0, Math.PI*2); ctx.fill();

// Solar rays
ctx.strokeStyle = main;
ctx.lineWidth = 2;
ctx.globalAlpha = 0.6;
for (let i=0; i<16; i++){
const a = (i/16)*Math.PI*2;
const r1 = e.r*0.95;
const r2 = e.r * (1.25 + Math.sin(G.t*2 + i)*0.08);
ctx.beginPath();
ctx.moveTo(Math.cos(a)*r1, Math.sin(a)*r1);
ctx.lineTo(Math.cos(a)*r2, Math.sin(a)*r2);
ctx.stroke();
}
ctx.globalAlpha = 1;

// Dragon coil
ctx.rotate(-e.rot*1.6);
ctx.strokeStyle = lit ? ‘#fff8d6’ : main;
ctx.shadowColor = main; ctx.shadowBlur = 16;
ctx.lineWidth = 2.4;
const segs = 14;
for (let i=0; i<segs; i++){
const a = (i/segs)*Math.PI*2;
const x = Math.cos(a) * e.r*0.65;
const y = Math.sin(a) * e.r*0.65;
ctx.save();
ctx.translate(x, y);
ctx.rotate(a + Math.PI/2);
ctx.beginPath();
ctx.moveTo(0, -e.r*0.12);
ctx.bezierCurveTo(e.r*0.10, -e.r*0.06, e.r*0.10, e.r*0.06, 0, e.r*0.12);
ctx.bezierCurveTo(-e.r*0.10, e.r*0.06, -e.r*0.10, -e.r*0.06, 0, -e.r*0.12);
ctx.fillStyle = `rgba(212, 175, 55, 0.3)`;
ctx.fill(); ctx.stroke();
ctx.restore();
}

// Dragon head
const headAng = e.rot * 1.6 + Math.PI*0.1;
const hx = Math.cos(headAng) * e.r*0.65;
const hy = Math.sin(headAng) * e.r*0.65;
drawDragonHead(hx, hy, headAng + Math.PI/2, e.r*0.28, main, lit, true);

// Center pearl
ctx.rotate(e.rot*1.6);
ctx.fillStyle = ‘#fff8d6’;
ctx.shadowColor = ‘#fff8d6’; ctx.shadowBlur = 24;
ctx.beginPath();
ctx.arc(0, 0, 10 + Math.sin(G.t*4)*2, 0, Math.PI*2);
ctx.fill();

ctx.rotate(-e.rot);
ctx.fillStyle = ‘#1a1d3a’;
ctx.font = `900 18px "Shippori Mincho B1", serif`;
ctx.textAlign = ‘center’; ctx.textBaseline = ‘middle’;
ctx.shadowBlur = 0;
ctx.fillText(Math.max(0, Math.ceil(e.hp)), 0, 1);
ctx.restore();
}

// ========== Bullets, Pickups, Particles ==========
function drawBullet(b){
ctx.save();
if (b.kind === ‘homing’){
ctx.shadowColor = ‘#c490ee’; ctx.shadowBlur = 12;
ctx.fillStyle = ‘#c490ee’;
ctx.beginPath(); ctx.arc(b.x, b.y, b.r+1, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = ‘#fff8d6’;
ctx.beginPath(); ctx.arc(b.x, b.y, b.r*0.55, 0, Math.PI*2); ctx.fill();
} else if (b.kind === ‘wing’){
ctx.shadowColor = ‘#4ab37b’; ctx.shadowBlur = 10;
ctx.fillStyle = ‘#aaffcc’;
ctx.beginPath();
ctx.moveTo(b.x, b.y - 6);
ctx.lineTo(b.x + 2, b.y + 3);
ctx.lineTo(b.x, b.y + 5);
ctx.lineTo(b.x - 2, b.y + 3);
ctx.closePath(); ctx.fill();
} else {
// Arrow
ctx.shadowColor = ‘#f0d77a’; ctx.shadowBlur = 12;
ctx.fillStyle = ‘#f0d77a’;
ctx.fillRect(b.x-1, b.y-9, 2, 12);
ctx.beginPath();
ctx.moveTo(b.x, b.y - 12);
ctx.lineTo(b.x + 3.5, b.y - 6);
ctx.lineTo(b.x - 3.5, b.y - 6);
ctx.closePath(); ctx.fill();
ctx.fillStyle = ‘#c8161d’;
ctx.fillRect(b.x-2.5, b.y+1, 1.2, 4);
ctx.fillRect(b.x+1.3, b.y+1, 1.2, 4);
}
ctx.restore();
}
function drawEBullet(eb){
ctx.save();
ctx.shadowColor = eb.color; ctx.shadowBlur = 14;
ctx.fillStyle = eb.color;
ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.r, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = ‘#fff8d6’;
ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.r*0.4, 0, Math.PI*2); ctx.fill();
ctx.restore();
}

function drawPick(pk){
const meta = PICKS[pk.kind];
const c = meta.color;
ctx.save();
ctx.translate(pk.x, pk.y);

if (pk.kind === ‘coin’){
ctx.rotate(pk.rot * 0.5);
ctx.shadowColor = c; ctx.shadowBlur = 12 + Math.sin(pk.pulse)*4;
ctx.fillStyle = c;
ctx.strokeStyle = ‘#1a1d3a’;
ctx.lineWidth = 1;
ctx.beginPath(); ctx.arc(0, 0, pk.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
ctx.fillStyle = ‘#1a1d3a’;
ctx.fillRect(-pk.r*0.22, -pk.r*0.22, pk.r*0.44, pk.r*0.44);
} else {
ctx.rotate(pk.rot);
ctx.shadowColor = c; ctx.shadowBlur = 14 + Math.sin(pk.pulse)*4;
ctx.fillStyle = `rgba(10, 8, 16, 0.85)`;
ctx.strokeStyle = c;
ctx.lineWidth = 2;
ctx.beginPath(); ctx.arc(0, 0, pk.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
ctx.beginPath();
ctx.arc(pk.r*0.5, pk.r*0.3, pk.r*0.45, 0, Math.PI*2);
ctx.fillStyle = `rgba(10, 8, 16, 0.95)`;
ctx.fill();

```
ctx.rotate(-pk.rot);
ctx.fillStyle = c;
ctx.font = `800 ${pk.r*0.95}px "Yuji Boku", serif`;
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.shadowBlur = 6;
ctx.fillText(meta.kanji, -pk.r*0.15, 1);
```

}
ctx.restore();
}

function drawPart(pa){
if (pa.ring){
ctx.save();
const a = pa.life/pa.max;
ctx.strokeStyle = pa.color;
ctx.shadowColor = pa.color; ctx.shadowBlur = 16;
ctx.lineWidth = 2; ctx.globalAlpha = a;
ctx.beginPath(); ctx.arc(pa.x, pa.y, pa.size, 0, Math.PI*2); ctx.stroke();
ctx.restore();
return;
}
ctx.save();
const a = pa.life/pa.max;
ctx.globalAlpha = a;
if (pa.glow){ ctx.shadowColor = pa.color; ctx.shadowBlur = 12; }
ctx.fillStyle = pa.color;
ctx.beginPath(); ctx.arc(pa.x, pa.y, pa.size, 0, Math.PI*2); ctx.fill();
ctx.restore();
}

function drawThunder(tr){
const a = tr.life/tr.max;
ctx.save();
ctx.strokeStyle = tr.color;
ctx.shadowColor = tr.color; ctx.shadowBlur = 14;
ctx.lineWidth = 2; ctx.globalAlpha = a;
ctx.beginPath();
const segs = 6;
ctx.moveTo(tr.ax, tr.ay);
for (let i=1; i<segs; i++){
const t = i/segs;
const mx = tr.ax + (tr.bx-tr.ax)*t + (Math.random()-0.5)*16;
const my = tr.ay + (tr.by-tr.ay)*t + (Math.random()-0.5)*16;
ctx.lineTo(mx, my);
}
ctx.lineTo(tr.bx, tr.by);
ctx.stroke();
ctx.restore();
}

// ========== HUD & Flow ==========
function updateHUD(){
document.getElementById(‘vScore’).textContent = G.score.toLocaleString();
document.getElementById(‘vWave’).textContent = G.wave;
document.getElementById(‘vCoin’).textContent = G.coin;
document.getElementById(‘vLives’).textContent = G.lives;
const bb = document.getElementById(‘bombBtn’);
document.getElementById(‘bombCount’).textContent = G.bombs;
bb.classList.toggle(‘empty’, G.bombs <= 0);

const pc = document.getElementById(‘powers’);
const chips = [];
if (G.arrowLv > 1) chips.push({label:`矢×${G.arrowLv}`, col:’#f0d77a’});
if (G.wing > 0)    chips.push({label:`翼×${G.wing}`,    col:’#4ab37b’});
if (G.thunder > 0) chips.push({label:`雷×${G.thunder}`, col:’#a875e6’});
if (G.pierce > 0)  chips.push({label:`穿×${G.pierce}`,  col:’#d4af37’});
if (G.shield > 0)  chips.push({label:`守 ${G.shield.toFixed(1)}`,  col:’#7ec8e3’});
if (G.laser > 0)   chips.push({label:`光 ${G.laser.toFixed(1)}`,   col:’#ff6e7e’});
if (G.homing > 0)  chips.push({label:`追 ${G.homing.toFixed(1)}`,  col:’#c490ee’});
if (G.fireRate > 1.05) chips.push({label:`疾 ${G.fireRate.toFixed(1)}×`, col:’#9be0ff’});
pc.innerHTML = chips.map(c => `<div class="pchip" style="color:${c.col}">${c.label}</div>`).join(’’);
}

function startGame(){
ac();
G.state = ‘play’;
G.score = 0; G.wave = 1; G.lives = 3; G.coin = 0; G.kills = 0;
G.arrowLv = 1; G.fireRate = 1; G.wing = 0; G.thunder = 0; G.pierce = 0;
G.shield = 0; G.laser = 0; G.homing = 0;
G.combo = 0; G.bombs = 2;
G.player = makePlayer();
G.bullets = []; G.ebullets = []; G.enemies = []; G.pickups = []; G.parts = []; G.trails = [];
G.dmgTexts = [];
G.bossActive = false; G.flashA = 0;
waveT = 1.5;
last = performance.now();
document.getElementById(‘bossbar’).style.display = ‘none’;
initStars();
spawnWave();
document.getElementById(‘title’).style.display = ‘none’;
document.getElementById(‘gameover’).style.display = ‘none’;
document.getElementById(‘pause’).style.display = ‘none’;
updateHUD();
}

function gameOver(){
G.state = ‘over’;
if (G.score > G.best){ G.best = G.score; localStorage.setItem(‘ryusho_best’, G.best); }
document.getElementById(‘goScore’).textContent = G.score.toLocaleString();
document.getElementById(‘goWave’).textContent = G.wave;
document.getElementById(‘goKill’).textContent = G.kills;
document.getElementById(‘goBest’).textContent = G.best.toLocaleString();
setTimeout(()=>{ document.getElementById(‘gameover’).style.display = ‘flex’; }, 800);
sfxLose();
}

function togglePause(){
if (G.state === ‘play’){
G.prev = G.state; G.state = ‘paused’;
document.getElementById(‘pause’).style.display = ‘flex’;
} else if (G.state === ‘paused’){
G.state = G.prev || ‘play’;
document.getElementById(‘pause’).style.display = ‘none’;
last = performance.now();
}
}

function bindBtn(id, fn){
const el = document.getElementById(id);
if (!el) return;
el.addEventListener(‘click’, fn);
el.addEventListener(‘touchend’, e => { e.preventDefault(); fn(e); }, {passive:false});
}
bindBtn(‘startBtn’, startGame);
bindBtn(‘retryBtn’, startGame);
bindBtn(‘pauseBtn’, togglePause);
bindBtn(‘resumeBtn’, togglePause);
bindBtn(‘quitBtn’, ()=>{
document.getElementById(‘pause’).style.display = ‘none’;
document.getElementById(‘gameover’).style.display = ‘none’;
document.getElementById(‘title’).style.display = ‘flex’;
document.getElementById(‘bossbar’).style.display = ‘none’;
G.state = ‘title’;
});
bindBtn(‘soundBtn’, ()=>{
G.soundOn = !G.soundOn;
localStorage.setItem(‘ryusho_snd’, G.soundOn ? ‘1’ : ‘0’);
const sb = document.getElementById(‘soundBtn’);
sb.textContent = G.soundOn ? ‘🔊’ : ‘🔇’;
sb.classList.toggle(‘muted’, !G.soundOn);
});
(function(){
const sb = document.getElementById(‘soundBtn’);
sb.textContent = G.soundOn ? ‘🔊’ : ‘🔇’;
sb.classList.toggle(‘muted’, !G.soundOn);
})();
window.addEventListener(‘blur’, ()=>{
if (G.state === ‘play’) togglePause();
});

initStars();
G.player = makePlayer();
updateHUD();
requestAnimationFrame(loop);

document.addEventListener(‘touchmove’, e => {
// プレイ中のみスクロール抑制（タイトル/ゲームオーバー画面ではボタン操作を妨げない）
if (G.state === ‘play’) e.preventDefault();
}, {passive:false});
document.addEventListener(‘gesturestart’, e => e.preventDefault());

</script>

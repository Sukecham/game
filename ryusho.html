;border-left:none;border-top:none}.btn:active{transform:scale(.97)}#title .help{margin-top:36px;font-family:'Shippori Mincho B1',serif;font-size:12px;color:rgba(245,230,211,.65);letter-spacing:1px;line-height:2;max-width:300px}#title .help b{color:var(--gold-l);font-weight:700}#gameover{display:none}#gameover h2{font-family:'Yuji Boku',serif;font-size:56px;letter-spacing:8px;color:var(--vermilion);text-shadow:0 0 12px var(--crimson),0 0 32px rgba(200,22,29,.6);margin-bottom:6px}#gameover .tag{font-family:'Cinzel',serif;font-size:11px;letter-spacing:8px;color:var(--gold);margin-bottom:30px;text-shadow:0 0 6px var(--gold)}#gameover .score-big{font-family:'Shippori Mincho B1',serif;font-size:54px;font-weight:800;color:var(--gold-l);text-shadow:0 0 10px var(--gold);margin-bottom:2px}#gameover .lbl-l{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:rgba(245,230,211,.5);margin-bottom:24px}#gameover .row{display:flex;gap:24px;margin-bottom:32px}#gameover .stat-go{text-align:center}#gameover .stat-go .v{font-family:'Shippori Mincho B1',serif;font-size:22px;font-weight:800;color:var(--ivory);text-shadow:0 0 6px var(--gold)}#gameover .stat-go .l{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:rgba(245,230,211,.55)}#pause{display:none}#pause h3{font-family:'Yuji Boku',serif;font-size:64px;letter-spacing:12px;color:var(--gold-l);text-shadow:0 0 12px var(--gold),0 0 32px rgba(212,175,55,.5);margin-bottom:36px}#pause .pbtn{padding:12px 36px;background:transparent;border:1px solid var(--gold);color:var(--ivory);font-family:'Yuji Boku',serif;font-size:16px;letter-spacing:8px;margin:5px;cursor:pointer;box-shadow:0 0 8px rgba(212,175,55,.4)}#pause .pbtn.danger{border-color:var(--vermilion);box-shadow:0 0 8px rgba(255,58,58,.4)}#flash{position:fixed;inset:0;pointer-events:none;background:var(--gold-l);opacity:0;z-index:7;mix-blend-mode:screen}#errorBox{position:fixed;left:8px;right:8px;bottom:8px;z-index:5000;display:none;padding:10px;background:rgba "score-big" id="goScore">0</div><div class="lbl-l">FINAL SCORE</div><div class="row"><div class="stat-go"><div class="v" id="goWave">1</div><div class="l">WAVE</div></div><div class="stat-go"><div class="v" id="goKill">0</div><div class="l">SLAIN</div></div><div class="stat-go"><div class="v" id="goBest">0</div><div class="l">BEST</div></div></div><button class="btn" id="retryBtn" type="button">再戦</button></div></div>
<script>
'use strict';
const $=(id)=>document.getElementById(id);const cv=$('cv');const ctx=cv.getContext('2d',{alpha:false});let W=0,H=0,DPR=1,AC=null,waveT=1.5,dragging=false,last=performance.now();
function showError(err){const b=$('errorBox');if(!b)return;b.style.display='block';b.textContent=String(err&&err.stack?err.stack:err)}window.addEventListener('error',e=>showError(e.error||e.message));window.addEventListener('unhandledrejection',e=>showError(e.reason));
function safeInt(v,f){const n=parseInt(v,10);return Number.isFinite(n)?n:f}function clamp(v,a,b){return v<a?a:v>b?b:v}function rand(a,b){return a+Math.random()*(b-a)}function dist2(ax,ay,bx,by){const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy}
const G={state:'title',prev:null,t:0,score:0,best:safeInt(localStorage.getItem('ryusho_best'),0),wave:1,lives:3,coin:0,kills:0,shake:0,combo:0,comboT:0,bombs:1,soundOn:localStorage.getItem('ryusho_snd')!=='0',arrowLv:1,fireRate:1,wing:0,thunder:0,pierce:0,shield:0,laser:0,homing:0,player:null,bullets:[],ebullets:[],enemies:[],pickups:[],parts:[],stars:[],trails:[],dmgTexts:[],petals:[],bossActive:false,flashA:0};
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;cv.width=Math.floor(W*DPR);cv.height=Math.floor(H*DPR);cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);if(G.player){G.player.x=clamp(G.player.x,30,W-30);G.player.y=clamp(G.player.y,80,H-30);G.player.tx=clamp(G.player.tx,30,W-30);G.player.ty=clamp(G.player.ty,80,H-30)}}
function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){AC=null}}if(AC&&AC.state==='suspended')AC.resume().catch(()=>{});return AC}const _last=Object.create(null);function throttle(n,g,fn){const p=performance.now();if(!_last[n]||p-_last[n]>=g){_last[n]=p;fn()}}
function tone(freq,dur,type='sine',vol=.06,slide=0){if(!G.soundOn)return;const c=ac();if(!c)return;const t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.setValueAtTime(freq,t);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide),t+dur);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur+.02)}
function noise(dur,vol=.18,lp=800){if(!G.soundOn)return;const c=ac();if(!c)return;const t=c.currentTime,len=Math.max(1,Math.floor(c.sampleRate*dur)),buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const s=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();s.buffer=buf;f.type='lowpass';f.frequency.value=lp;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);s.connect(f);f.connect(g);g.connect(c.destination);s.start(t)}
const sfxShoot=()=>throttle('s',50,()=>tone(1100,.05,'triangle',.025,-700)),sfxHit=()=>throttle('h',22,()=>tone(420,.06,'square',.04,-160)),sfxBoom=()=>{noise(.4,.22,600);tone(80,.4,'sawtooth',.08,-40)},sfxPower=()=>{tone(660,.08,'sine',.06,600);setTimeout(()=>tone(990,.1,'sine',.05,400),60)},sfxBomb=()=>{noise(.7,.22,400);for(let i=0;i<4;i++)setTimeout(()=>tone(180-i*30,.5,'sawtooth',.07,-80),i*50)},sfxLose=()=>tone(440,1.2,'sawtooth',.1,-380),sfxBoss=()=>{for(let i=0;i<3;i++)setTimeout(()=>{noise(.18,.18,300);tone(120,.18,'square',.07)},i*220)},sfxWave=()=>{tone(880,.08,'sine',.05,400);setTimeout(()=>tone(1320,.12,'sine',.04,300),80)},sfxBell=()=>tone(1760,.4,'sine',.04,-1200);

function handleBulletHits(){for(const b of G.bullets){if(b.life<=0)continue;const piercing=b.pierce&&b.pierce>0;for(const e of G.enemies){if(e.hp<=0)continue;if(piercing&&b.hitSet&&b.hitSet.has(e))continue;const rr=b.r+e.r;if(dist2(b.x,b.y,e.x,e.y)<rr*rr){e.hp-=b.dmg;e.hit=.15;spawnDmg(e.x,e.y-e.r*.5,b.dmg);let done=false;if(piercing){if(!b.hitSet)b.hitSet=new Set();b.hitSet.add(e);b.pierce--;if(b.pierce<=0){b.life=0;done=true}}else{b.life=0;done=true}spawnSpark(b.x,b.y,'#fff8d6');chainThunder(e,b.dmg);sfxHit();if(done)break}}}}

function updatePickups(dt){const p=G.player;for(const pk of G.pickups){pk.y+=pk.vy;pk.rot+=dt*2;pk.pulse+=dt*4;const d=dist2(pk.x,pk.y,p.x,p.y);if(d<180*180){const dx=p.x-pk.x,dy=p.y-pk.y,dd=Math.sqrt(d)||1;pk.x+=(dx/dd)*5;pk.y+=(dy/dd)*5}}for(const pk of G.pickups){if(pk.dead)continue;if(dist2(pk.x,pk.y,p.x,p.y)<(pk.r+p.r)*(pk.r+p.r)){pk.dead=true;applyPickup(pk.kind)}}G.pickups=G.pickups.filter(pk=>!pk.dead&&pk.y<H+30)}

function hitPlayer(){const p=G.player;G.lives--;p.inv=2;p.flash=.4;G.shake=24;spawnExplosion(p.x,p.y,'#f0d77a',30);sfxBoom();G.arrowLv=Math.max(1,G.arrowLv-1);if(G.wing>0&&Math.random()<.5)G.wing--;if(G.thunder>0&&Math.random()<.5)G.thunder--;G.combo=0;if(G.lives<=0)gameOver();updateHUD()}

function updateEffects(dt){for(const d of G.dmgTexts){d.y-=35*dt;d.life-=dt}G.dmgTexts=G.dmgTexts.filter(d=>d.life>0);if(G.dmgTexts.length>60)G.dmgTexts.splice(0,G.dmgTexts.length-60);for(const pa of G.parts){if(pa.ring){const k=1-pa.life/pa.max;pa.size=k*pa.maxSize}else{pa.x+=pa.vx;pa.y+=pa.vy;pa.vx*=.94;pa.vy*=.94}pa.life-=dt}G.parts=G.parts.filter(pa=>pa.life>0);if(G.parts.length>600)G.parts.splice(0,G.parts.length-600);for(const tr of G.trails)tr.life-=dt;G.trails=G.trails.filter(t=>t.life>0)}function updateWaveProgress(dt){if(G.enemies.length===0){if(G.bossActive){G.bossActive=false;$('bossbar').style.display='none'}waveT-=dt;if(waveT<=0){G.wave++;spawnWave();waveT=1.5;updateHUD()}}if(G.bossActive){const boss=G.enemies.find(e=>e.type==='boss');if(boss)document.querySelector('#bossbar .fill').style.width=Math.max(0,boss.hp)/boss.maxHp*100+'%';else{G.bossActive=false;$('bossbar').style.display='none'}}}
function showCombo(){const el=$('combo');el.textContent=G.combo+'連';el.classList.remove('flash-in');void el.offsetWidth;el.classList.add('flash-in')}
function render(dt){ctx.fillStyle='#050308';ctx.fillRect(0,0,W,H);let sx=0,sy=0;if(G.shake>0){sx=(Math.random()-.5)*G.shake*.4;sy=(Math.random()-.5)*G.shake*.4}ctx.save();ctx.translate(sx,sy);drawMoon();drawClouds();drawStars();for(const pt of G.petals)drawPetal(pt);for(const tr of G.trails)drawThunder(tr);for(const e of G.enemies)e.type==='boss'?drawBoss(e):drawFoe(e);for(const pk of G.pickups)drawPick(pk);for(const b of G.bullets)drawBullet(b);for(const eb of G.ebullets)drawEBullet(eb);if((G.state==='play'||G.state==='over')&&G.player)drawPlayer(G.player);for(const pa of G.parts)drawPart(pa);drawDamageTexts();if(G.laser>0&&G.state==='play')drawLaser();if(G.combo>=3&&G.state==='play')drawComboSmall();ctx.restore();if(G.flashA>0){G.flashA=Math.max(0,G.flashA-dt*2);$('flash').style.opacity=String(G.flashA*.55)}else{const fl=$('flash');if(parseFloat(fl.style.opacity||'0')>0)fl.style.opacity='0'}}
function drawMoon(){ctx.save();const mx=W*.78,my=110;ctx.shadowColor='#f0d77a';ctx.shadowBlur=40;ctx.fillStyle='rgba(245,230,211,.04)';ctx.beginPath();ctx.arc(mx,my,80,0,Math.PI*2);ctx.fill();ctx.shadowBlur=24;ctx.fillStyle='rgba(245,230,211,.18)';ctx.beginPath();ctx.arc(mx,my,36,0,Math.PI*2);ctx.fill();ctx.restore()}function drawClouds(){ctx.save();ctx.globalAlpha=.12;ctx.fillStyle='#1a1d3a';for(let row=0;row<2;row++){const y=row===0?H*.7:H*.85;for(let i=0;i<5;i++){const x=(G.t*8+i*180+row*90)%(W+200)-100;ctx.beginPath();ctx.ellipse(x,y,70,12,0,0,Math.PI*2);ctx.fill()}}ctx.restore()}function drawStars(){ctx.save();for(const s of G.stars){if(s.gold){ctx.fillStyle=`rgba(240,215,122,${s.z})`;ctx.shadowColor='#f0d77a';ctx.shadowBlur=6}else{ctx.fillStyle=`rgba(245,230,211,${s.z*.7})`;ctx.shadowBlur=0}ctx.fillRect(s.x,s.y,s.z*1.6,s.z*1.6)}ctx.shadowBlur=0;ctx.restore()}function drawPetal(pt){ctx.save();ctx.translate(pt.x,pt.y);ctx.rotate(pt.rot);ctx.globalAlpha=.35;ctx.fillStyle='rgba(255,183,197,.6)';ctx.beginPath();ctx.moveTo(0,-pt.size);ctx.quadraticCurveTo(pt.size*.7,-pt.size*.3,pt.size*.4,pt.size*.7);ctx.quadraticCurveTo(0,pt.size*.3,-pt.size*.4,pt.size*.7);ctx.quadraticCurveTo(-pt.size*.7,-pt.size*.3,0,-pt.size);ctx.fill();ctx.restore()}
function drawPlayer(p){const flicker=p.inv>0&&Math.floor(p.inv*20)%2===0;if(flicker)return;ctx.save();ctx.translate(p.x,p.y);if(G.shield>0)drawShield();ctx.shadowColor='#f0d77a';ctx.shadowBlur=14;ctx.strokeStyle='#fff8d6';ctx.fillStyle='rgba(245,230,211,.08)';ctx.lineWidth=1.6;ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(5,-10);ctx.lineTo(28,4);ctx.lineTo(20,8);ctx.lineTo(8,6);ctx.lineTo(10,18);ctx.lineTo(0,14);ctx.lineTo(-10,18);ctx.lineTo(-8,6);ctx.lineTo(-20,8);ctx.lineTo(-28,4);ctx.lineTo(-5,-10);ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(0,14);ctx.stroke();ctx.fillStyle='#d4af37';ctx.shadowColor='#d4af37';ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(4,-2);ctx.lineTo(0,4);ctx.lineTo(-4,-2);ctx.closePath();ctx.fill();ctx.beginPath();ctx.arc(-3,14,1.6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,14,1.6,0,Math.PI*2);ctx.fill();ctx.restore();for(let w=0;w<G.wing;w++){const sign=w===0?-1:1;drawWingman(p.x+sign*32,p.y+4)}}function drawShield(){ctx.save();const a=.7+Math.sin(G.t*8)*.15;ctx.strokeStyle='#7ec8e3';ctx.shadowColor='#7ec8e3';ctx.shadowBlur=18;ctx.lineWidth=2;ctx.globalAlpha=a;ctx.beginPath();ctx.arc(0,0,32,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;ctx.globalAlpha=a*.6;ctx.setLineDash([4,6]);ctx.beginPath();ctx.arc(0,0,38,0,Math.PI*2);ctx.stroke();ctx.restore()}function drawWingman(x,y){ctx.save();ctx.translate(x,y);ctx.shadowColor='#4ab37b';ctx.shadowBlur=10;ctx.strokeStyle='#aaffcc';ctx.fillStyle='rgba(74,179,123,.18)';ctx.lineWidth=1.4;ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(3,-3);ctx.lineTo(10,2);ctx.lineTo(4,4);ctx.lineTo(5,9);ctx.lineTo(0,6);ctx.lineTo(-5,9);ctx.lineTo(-4,4);ctx.lineTo(-10,2);ctx.lineTo(-3,-3);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#4ab37b';ctx.beginPath();ctx.arc(0,4,1,0,Math.PI*2);ctx.fill();ctx.restore()}
function enemyBase(e,f){return e.sat?`hsl(${e.hue}, ${e.sat}%, 62%)`:f}function drawFoe(e){switch(e.shape){case'mask':return drawOniMask(e);case'blade':return drawBlade(e);case'wisp':return drawWisp(e);case'talisman':return drawTalisman(e);default:return drawScale(e)}}function drawEnemyHp(e,lit,base,y=1){ctx.font=`700 ${Math.max(11,e.r*.5)}px "Shippori Mincho B1", serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=lit?'#fff8d6':base;ctx.shadowBlur=lit?14:6;ctx.fillText(Math.max(0,Math.ceil(e.hp)),0,y)}function drawScale(e){const lit=e.hit>0,base=enemyBase(e,'#e8d4b8');ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.rot*.3);ctx.shadowColor=base;ctx.shadowBlur=lit?24:12;ctx.strokeStyle=lit?'#fff8d6':base;ctx.lineWidth=e.rare?2.2:1.6;ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(0,-e.r);ctx.bezierCurveTo(e.r*.9,-e.r*.6,e.r*.85,e.r*.5,0,e.r);ctx.bezierCurveTo(-e.r*.85,e.r*.5,-e.r*.9,-e.r*.6,0,-e.r);ctx.fillStyle=`hsla(${e.hue}, ${e.sat}%, 30%, .25)`;ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo(0,-e.r*.7);ctx.bezierCurveTo(e.r*.4,-e.r*.3,e.r*.4,e.r*.3,0,e.r*.7);ctx.lineWidth=1;ctx.globalAlpha=.55;ctx.stroke();ctx.globalAlpha=1;ctx.rotate(-e.rot*.3);drawEnemyHp(e,lit,base);ctx.restore()}function drawOniMask(e){const lit=e.hit>0,base=e.sat?`hsl(${e.hue}, ${e.sat}%, 60%)`:'#c8161d',r=e.r;ctx.save();ctx.translate(e.x,e.y);ctx.shadowColor=base;ctx.shadowBlur=lit?28:18;ctx.strokeStyle=lit?'#fff8d6':base;ctx.fillStyle=`hsla(${e.hue}, ${e.sat}%, 25%, .65)`;ctx.lineWidth=e.isMini?2.6:2;ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(-r*.55,-r*.7);ctx.lineTo(-r*.85,-r*1.05);ctx.lineTo(-r*.45,-r*.55);ctx.bezierCurveTo(-r*.95,-r*.3,-r*.95,r*.5,-r*.4,r*.95);ctx.lineTo(0,r*.85);ctx.lineTo(r*.4,r*.95);ctx.bezierCurveTo(r*.95,r*.5,r*.95,-r*.3,r*.45,-r*.55);ctx.lineTo(r*.85,-r*1.05);ctx.lineTo(r*.55,-r*.7);ctx.bezierCurveTo(r*.3,-r*.5,-r*.3,-r*.5,-r*.55,-r*.7);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#fff8d6';ctx.shadowColor='#fff8d6';ctx.shadowBlur=10;ctx.beginPath();ctx.ellipse(-r*.32,-r*.22,r*.18,r*.10,-.4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(r*.32,-r*.22,r*.18,r*.10,.4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1d3a';ctx.beginPath();ctx.arc(-r*.32,-r*.22,r*.05,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(r*.32,-r*.22,r*.05,0,Math.PI*2);ctx.fill();drawEnemyHp(e,lit,'#fff8d6',r*.05);ctx.restore()}function drawBlade(e){const lit=e.hit>0,base=enemyBase(e,'#9be0ff');ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.rot);ctx.shadowColor=base;ctx.shadowBlur=lit?22:12;ctx.strokeStyle=lit?'#fff8d6':base;ctx.lineWidth=1.6;ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(0,-e.r);ctx.lineTo(e.r*.6,0);ctx.lineTo(0,e.r);ctx.lineTo(-e.r*.6,0);ctx.closePath();ctx.fillStyle=`hsla(${e.hue}, ${e.sat}%, 30%, .3)`;ctx.fill();ctx.stroke();ctx.rotate(-e.rot);drawEnemyHp(e,lit,base);ctx.restore()}function drawWisp(e){const lit=e.hit>0,base=enemyBase(e,'#a875e6');ctx.save();ctx.translate(e.x,e.y);ctx.shadowColor=base;ctx.shadowBlur=lit?30:18;ctx.strokeStyle=lit?'#fff8d6':base;ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(0,0,e.r+Math.sin(G.t*3+e.phase)*2,0,Math.PI*2);ctx.fillStyle=`hsla(${e.hue}, ${e.sat}%, 30%, .35)`;ctx.fill();ctx.stroke();drawEnemyHp(e,lit,'#fff');ctx.restore()}function drawTalisman(e){const lit=e.hit>0,base=enemyBase(e,'#d4af37'),w=e.r*1.05,h=e.r*1.4;ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.rot*.15);ctx.shadowColor=base;ctx.shadowBlur=lit?22:14;ctx.fillStyle='#f5e6d3';ctx.strokeStyle=lit?'#fff8d6':base;ctx.lineWidth=e.rare?2.2:1.6;ctx.beginPath();ctx.rect(-w*.5,-h*.5,w,h);ctx.fill();ctx.stroke();ctx.fillStyle='#c8161d';ctx.fillRect(-w*.2,-h*.42,w*.4,h*.08);ctx.rotate(-e.rot*.15);ctx.fillStyle='#1a1d3a';ctx.font=`800 ${e.r*.85}px "Yuji Boku", serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=0;ctx.fillText('呪',0,-h*.05);ctx.font=`700 ${Math.max(10,e.r*.45)}px "Shippori Mincho B1", serif`;ctx.fillStyle='#c8161d';ctx.fillText(Math.max(0,Math.ceil(e.hp)),0,h*.3);ctx.restore()}
function drawBoss(e){if(e.variant===0)return drawYamata(e);if(e.variant===1)return drawRaijin(e);return drawRyujin(e)}function drawYamata(e){const lit=e.hit>0,main=e.enrage?'#ff2233':'#c8161d';ctx.save();ctx.translate(e.x,e.y);for(let i=0;i<8;i++){const a=i/8*Math.PI*2-Math.PI/2+e.rot*.2,len=e.r*.95+Math.sin(G.t*2+i)*4;drawDragonHead(Math.cos(a)*len,Math.sin(a)*len,a+Math.PI/2,e.r*.32,main,lit,i===e.headPhase)}ctx.shadowColor=main;ctx.shadowBlur=36;ctx.strokeStyle=lit?'#fff8d6':main;ctx.fillStyle='rgba(40,5,8,.85)';ctx.lineWidth=2.4;ctx.lineJoin='round';ctx.beginPath();for(let i=0;i<12;i++){const a=i/12*Math.PI*2,r=e.r*.55+Math.sin(a*4+G.t*2)*4;if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#fff8d6';ctx.font='900 22px "Shippori Mincho B1", serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=12;ctx.fillText(Math.max(0,Math.ceil(e.hp)),0,0);ctx.restore()}function drawDragonHead(x,y,ang,size,color,lit,glow){ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.shadowColor=color;ctx.shadowBlur=glow?28:14;ctx.strokeStyle=lit?'#fff8d6':color;ctx.fillStyle='rgba(40,5,8,.7)';ctx.lineWidth=1.8;ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(0,size*1.4);ctx.lineTo(size*.5,size*.7);ctx.lineTo(size*.45,size*.1);ctx.lineTo(size*.7,-size*.4);ctx.lineTo(size*.2,-size*.2);ctx.lineTo(0,-size*.5);ctx.lineTo(-size*.2,-size*.2);ctx.lineTo(-size*.7,-size*.4);ctx.lineTo(-size*.45,size*.1);ctx.lineTo(-size*.5,size*.7);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#f0d77a';ctx.shadowColor='#f0d77a';ctx.shadowBlur=glow?14:8;ctx.beginPath();ctx.arc(size*.18,size*.3,size*.12,0,Math.PI*2);ctx.fill();ctx.restore()}function drawRaijin(e){const lit=e.hit>0,main=e.enrage?'#cc66ff':'#a875e6';ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.rot*.5);ctx.shadowColor=main;ctx.shadowBlur=36;ctx.strokeStyle=lit?'#fff8d6':main;ctx.fillStyle='rgba(20,5,30,.85)';ctx.lineWidth=2.6;ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();ctx.stroke();for(let i=0;i<8;i++){const a=i/8*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*e.r*.85,Math.sin(a)*e.r*.85,e.r*.18,0,Math.PI*2);ctx.fillStyle=main;ctx.globalAlpha=.7;ctx.fill();ctx.globalAlpha=1;ctx.strokeStyle=lit?'#fff8d6':'#f5e6d3';ctx.lineWidth=1.2;ctx.stroke()}ctx.rotate(-e.rot*.5);ctx.fillStyle='#fff8d6';ctx.font='900 20px "Shippori Mincho B1", serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=10;ctx.fillText(Math.max(0,Math.ceil(e.hp)),0,e.r*.85+2);ctx.restore()}function drawRyujin(e){const lit=e.hit>0,main=e.enrage?'#ffaa22':'#d4af37';ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.rot);ctx.shadowColor=main;ctx.shadowBlur=50;ctx.fillStyle='rgba(40,25,5,.6)';ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle=lit?'#fff8d6':main;ctx.shadowBlur=16;ctx.lineWidth=2.4;for(let i=0;i<14;i++){const a=i/14*Math.PI*2,x=Math.cos(a)*e.r*.65,y=Math.sin(a)*e.r*.65;ctx.save();ctx.translate(x,y);ctx.rotate(a+Math.PI/2);ctx.beginPath();ctx.moveTo(0,-e.r*.12);ctx.bezierCurveTo(e.r*.1,-e.r*.06,e.r*.1,e.r*.06,0,e.r*.12);ctx.bezierCurveTo(-e.r*.1,e.r*.06,-e.r*.1,-e.r*.06,0,-e.r*.12);ctx.fillStyle='rgba(212,175,55,.3)';ctx.fill();ctx.stroke();ctx.restore()}const headAng=e.rot*1.6;drawDragonHead(Math.cos(headAng)*e.r*.65,Math.sin(headAng)*e.r*.65,headAng+Math.PI/2,e.r*.28,main,lit,true);ctx.rotate(-e.rot);ctx.fillStyle='#1a1d3a';ctx.font='900 18px "Shippori Mincho B1", serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=0;ctx.fillText(Math.max(0,Math.ceil(e.hp)),0,1);ctx.restore()}
function drawBullet(b){ctx.save();if(b.kind==='homing'){ctx.shadowColor='#c490ee';ctx.shadowBlur=12;ctx.fillStyle='#c490ee';ctx.beginPath();ctx.arc(b.x,b.y,b.r+1,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff8d6';ctx.beginPath();ctx.arc(b.x,b.y,b.r*.55,0,Math.PI*2);ctx.fill()}else if(b.kind==='wing'){ctx.shadowColor='#4ab37b';ctx.shadowBlur=10;ctx.fillStyle='#aaffcc';ctx.beginPath();ctx.moveTo(b.x,b.y-6);ctx.lineTo(b.x+2,b.y+3);ctx.lineTo(b.x,b.y+5);ctx.lineTo(b.x-2,b.y+3);ctx.closePath();ctx.fill()}else{ctx.shadowColor='#f0d77a';ctx.shadowBlur=12;ctx.fillStyle='#f0d77a';ctx.fillRect(b.x-1,b.y-9,2,12);ctx.beginPath();ctx.moveTo(b.x,b.y-12);ctx.lineTo(b.x+3.5,b.y-6);ctx.lineTo(b.x-3.5,b.y-6);ctx.closePath();ctx.fill();ctx.fillStyle='#c8161d';ctx.fillRect(b.x-2.5,b.y+1,1.2,4);ctx.fillRect(b.x+1.3,b.y+1,1.2,4)}ctx.restore()}function drawEBullet(eb){ctx.save();ctx.shadowColor=eb.color;ctx.shadowBlur=14;ctx.fillStyle=eb.color;ctx.beginPath();ctx.arc(eb.x,eb.y,eb.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff8d6';ctx.beginPath();ctx.arc(eb.x,eb.y,eb.r*.4,0,Math.PI*2);ctx.fill();ctx.restore()}function drawPick(pk){const meta=PICKS[pk.kind];if(!meta)return;const c=meta.color;ctx.save();ctx.translate(pk.x,pk.y);if(pk.kind==='coin'){ctx.rotate(pk.rot*.5);ctx.shadowColor=c;ctx.shadowBlur=12+Math.sin(pk.pulse)*4;ctx.fillStyle=c;ctx.strokeStyle='#1a1d3a';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,pk.r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#1a1d3a';ctx.fillRect(-pk.r*.22,-pk.r*.22,pk.r*.44,pk.r*.44)}else{ctx.rotate(pk.rot);ctx.shadowColor=c;ctx.shadowBlur=14+Math.sin(pk.pulse)*4;ctx.fillStyle='rgba(10,8,16,.85)';ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,pk.r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.rotate(-pk.rot);ctx.fillStyle=c;ctx.font=`800 ${pk.r*.95}px "Yuji Boku", serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=6;ctx.fillText(meta.kanji,-pk.r*.15,1)}ctx.restore()}function drawPart(pa){ctx.save();const a=pa.life/pa.max;if(pa.ring){ctx.strokeStyle=pa.color;ctx.shadowColor=pa.color;ctx.shadowBlur=16;ctx.lineWidth=2;ctx.globalAlpha=a;ctx.beginPath();ctx.arc(pa.x,pa.y,pa.size,0,Math.PI*2);ctx.stroke()}else{ctx.globalAlpha=a;if(pa.glow){ctx.shadowColor=pa.color;ctx.shadowBlur=12}ctx.fillStyle=pa.color;ctx.beginPath();ctx.arc(pa.x,pa.y,pa.size,0,Math.PI*2);ctx.fill()}ctx.restore()}function drawThunder(tr){const a=tr.life/tr.max;ctx.save();ctx.strokeStyle=tr.color;ctx.shadowColor=tr.color;ctx.shadowBlur=14;ctx.lineWidth=2;ctx.globalAlpha=a;ctx.beginPath();ctx.moveTo(tr.ax,tr.ay);for(let i=1;i<6;i++){const t=i/6,mx=tr.ax+(tr.bx-tr.ax)*t+(Math.random()-.5)*16,my=tr.ay+(tr.by-tr.ay)*t+(Math.random()-.5)*16;ctx.lineTo(mx,my)}ctx.lineTo(tr.bx,tr.by);ctx.stroke();ctx.restore()}function drawDamageTexts(){for(const d of G.dmgTexts){const a=Math.min(1,d.life/d.max*1.5);ctx.save();ctx.globalAlpha=a;ctx.font=`700 ${d.size}px "Shippori Mincho B1", serif`;ctx.textAlign='center';ctx.fillStyle=d.color;ctx.shadowColor=d.color;ctx.shadowBlur=6;ctx.fillText(d.text,d.x,d.y);ctx.restore()}}function drawLaser(){const p=G.player,beams=[{x:p.x,sc:1}];for(let i=1;i<G.arrowLv;i++){const off=i*18,sc=Math.max(.45,1-i*.15);beams.push({x:p.x+off,sc},{x:p.x-off,sc})}ctx.save();for(const beam of beams){const x=beam.x,sc=beam.sc,grad=ctx.createLinearGradient(x,p.y,x,0);grad.addColorStop(0,'rgba(255,110,126,1)');grad.addColorStop(1,'rgba(255,110,126,0)');ctx.strokeStyle=grad;ctx.shadowColor='#ff6e7e';ctx.shadowBlur=18*sc;ctx.lineWidth=(18+Math.sin(G.t*30)*4)*sc;ctx.globalAlpha=.35*sc;ctx.beginPath();ctx.moveTo(x,p.y-12);ctx.lineTo(x,0);ctx.stroke();ctx.lineWidth=8*sc;ctx.globalAlpha=.7*sc;ctx.beginPath();ctx.moveTo(x,p.y-12);ctx.lineTo(x,0);ctx.stroke();ctx.strokeStyle='#fff8d6';ctx.lineWidth=3*sc;ctx.globalAlpha=sc;ctx.beginPath();ctx.moveTo(x,p.y-12);ctx.lineTo(x,0);ctx.stroke()}ctx.restore()}function drawComboSmall(){ctx.save();ctx.font='700 14px "Shippori Mincho B1", serif';ctx.textAlign='center';ctx.fillStyle='#f0d77a';ctx.shadowColor='#f0d77a';ctx.shadowBlur=8;ctx.fillText(`連 ${G.combo}`,W/2,110);ctx.restore()}
function updateHUD(){$('vScore').textContent=G.score.toLocaleString();$('vWave').textContent=G.wave;$('vCoin').textContent=G.coin;$('vLives').textContent=G.lives;$('bombCount').textContent=G.bombs;$('bombBtn').classList.toggle('empty',G.bombs<=0);const chips=[];if(G.arrowLv>1)chips.push({label:`矢×${G.arrowLv}`,col:'#f0d77a'});if(G.wing>0)chips.push({label:`翼×${G.wing}`,col:'#4ab37b'});if(G.thunder>0)chips.push({label:`雷×${G.thunder}`,col:'#a875e6'});if(G.pierce>0)chips.push({label:`穿×${G.pierce}`,col:'#d4af37'});if(G.shield>0)chips.push({label:`守 ${G.shield.toFixed(1)}`,col:'#7ec8e3'});if(G.laser>0)chips.push({label:`光 ${G.laser.toFixed(1)}`,col:'#ff6e7e'});if(G.homing>0)chips.push({label:`追 ${G.homing.toFixed(1)}`,col:'#c490ee'});if(G.fireRate>1.05)chips.push({label:`疾 ${G.fireRate.toFixed(1)}×`,col:'#9be0ff'});$('powers').innerHTML=chips.map(c=>`<div class="pchip" style="color:${c.col}">${c.label}</div>`).join('')}
function startGame(){ac();G.state='play';G.score=0;G.wave=1;G.lives=3;G.coin=0;G.kills=0;G.arrowLv=1;G.fireRate=1;G.wing=0;G.thunder=0;G.pierce=0;G.shield=0;G.laser=0;G.homing=0;G.combo=0;G.bombs=2;G.player=makePlayer();G.bullets=[];G.ebullets=[];G.enemies=[];G.pickups=[];G.parts=[];G.trails=[];G.dmgTexts=[];G.bossActive=false;G.flashA=0;waveT=1.5;last=performance.now();$('bossbar').style.display='none';initStars();spawnWave();$('title').style.display='none';$('gameover').style.display='none';$('pause').style.display='none';document.body.classList.remove('modal-open');updateHUD()}
function gameOver(){G.state='over';if(G.score>G.best){G.best=G.score;localStorage.setItem('ryusho_best',String(G.best))}$('goScore').textContent=G.score.toLocaleString();$('goWave').textContent=G.wave;$('goKill').textContent=G.kills;$('goBest').textContent=G.best.toLocaleString();setTimeout(()=>{$('gameover').style.display='flex';document.body.classList.add('modal-open')},800);sfxLose()}function togglePause(){if(G.state==='play'){G.prev=G.state;G.state='paused';$('pause').style.display='flex';document.body.classList.add('modal-open')}else if(G.state==='paused'){G.state=G.prev||'play';$('pause').style.display='none';document.body.classList.remove('modal-open');last=performance.now()}}function quitToTitle(){$('pause').style.display='none';$('gameover').style.display='none';$('title').style.display='flex';$('bossbar').style.display='none';document.body.classList.add('modal-open');G.state='title'}function setSoundButton(){const sb=$('soundBtn');sb.textContent=G.soundOn?'🔊':'🔇';sb.classList.toggle('muted',!G.soundOn)}function bindBtn(id,fn){const el=$(id);if(!el)return;const handler=e=>{e.preventDefault();e.stopPropagation();try{fn(e)}catch(err){console.error(err);showError(err)}};el.addEventListener('click',handler);el.addEventListener('touchend',handler,{passive:false})}function loop(now){try{const dt=Math.min(.05,(now-last)/1000);last=now;if(G.state==='play')update(dt);render(dt)}catch(e){console.error('loop error:',e);showError(e);last=performance.now()}requestAnimationFrame(loop)}
cv.addEventListener('pointerdown',e=>{e.preventDefault();try{cv.setPointerCapture(e.pointerId)}catch(_){}pDown(e.clientX,e.clientY);ac()},{passive:false});cv.addEventListener('pointermove',e=>{e.preventDefault();pMove(e.clientX,e.clientY)},{passive:false});cv.addEventListener('pointerup',e=>{e.preventDefault();pUp()},{passive:false});cv.addEventListener('pointercancel',pUp);bindBtn('startBtn',startGame);bindBtn('retryBtn',startGame);bindBtn('pauseBtn',togglePause);bindBtn('resumeBtn',togglePause);bindBtn('quitBtn',quitToTitle);bindBtn('bombBtn',useFuda);bindBtn('soundBtn',()=>{G.soundOn=!G.soundOn;localStorage.setItem('ryusho_snd',G.soundOn?'1':'0');setSoundButton()});window.addEventListener('resize',resize,{passive:true});window.addEventListener('orientationchange',()=>setTimeout(resize,100),{passive:true});window.addEventListener('blur',()=>{if(G.state==='play')togglePause()});document.addEventListener('touchmove',e=>{if(G.state==='play')e.preventDefault()},{passive:false});document.addEventListener('gesturestart',e=>e.preventDefault());resize();initStars();G.player=makePlayer();updateHUD();setSoundButton();document.body.classList.add('modal-open');requestAnimationFrame(loop);
</script>

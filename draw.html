<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>おえかき</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overscroll-behavior: none; }
  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(160deg,#FFF7E6 0%,#FFEFD6 100%);
    font-family: 'Hiragino Maru Gothic ProN','M PLUS Rounded 1c',system-ui,sans-serif;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }

  /* ヘッダー */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; gap: 10px;
  }
  .title { display: flex; align-items: center; gap: 8px; }
  .title .emoji { font-size: 30px; }
  .title .text { font-size: 24px; font-weight: 800; color: #E8742A; }
  .tools { display: flex; gap: 8px; }

  .round-btn {
    width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 0 rgba(216,150,80,.25);
    transition: transform .1s;
  }
  .round-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(216,150,80,.25); }

  /* キャンバス */
  .canvas-area { flex: 1; padding: 0 14px; min-height: 0; }
  .canvas-wrap {
    width: 100%; height: 100%; border-radius: 28px; overflow: hidden;
    box-shadow: 0 10px 0 rgba(216,150,80,.25), 0 14px 30px rgba(180,120,50,.18);
    border: 6px solid #FFFFFF; background: #FFFFFF;
  }
  canvas { display: block; touch-action: none; cursor: crosshair; }

  /* 太さ */
  .sizes { display: flex; justify-content: center; gap: 12px; padding: 12px 14px 4px; }
  .size-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer;
    background: rgba(255,255,255,.45); transition: all .12s;
  }
  .size-btn.active {
    background: #FFFFFF; box-shadow: 0 4px 0 rgba(216,150,80,.4); transform: translateY(-2px);
  }
  .size-dot-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
  .size-dot { border-radius: 50%; background: #B7A98F; }
  .size-label { font-size: 13px; font-weight: 700; color: #8A7A60; }

  /* 色パレット */
  .palette {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; padding: 8px 14px 16px;
  }
  .color-btn {
    aspect-ratio: 1 / 1; border-radius: 50%; cursor: pointer;
    border: 3px solid rgba(255,255,255,.85);
    box-shadow: 0 3px 6px rgba(0,0,0,.14);
    transition: transform .12s, box-shadow .12s;
    padding: 0;
  }
  .color-btn.white { border: 3px solid #DDD; }
  .color-btn.active { transform: scale(1.12); box-shadow: 0 0 0 4px #FF8A1E, 0 4px 8px rgba(0,0,0,.18); }

  /* 確認モーダル */
  .overlay {
    position: fixed; inset: 0; background: rgba(60,40,20,.45);
    display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .overlay.show { display: flex; }
  .dialog {
    background: #fff; border-radius: 28px; padding: 28px 24px; text-align: center;
    max-width: 320px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,.3);
  }
  .dialog .dlg-emoji { font-size: 44px; margin-bottom: 6px; }
  .dialog .dlg-text { font-size: 22px; font-weight: 800; color: #5A4A34; margin-bottom: 20px; }
  .choices { display: flex; gap: 12px; }
  .choice {
    flex: 1; padding: 14px 0; border-radius: 18px; border: none; cursor: pointer;
    font-size: 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  svg { display: block; }
</style>
</head>
<body>
  <header>
    <div class="title">
      <span class="emoji">🖍️</span>
      <span class="text">おえかき</span>
    </div>
    <div class="tools">
      <button class="round-btn" id="undoBtn" style="background:#fff" title="ひとつもどす">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7A6A55" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
      </button>
      <button class="round-btn" id="saveBtn" style="background:#fff" title="ほぞん">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7A6A55" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="round-btn" id="clearBtn" style="background:#FFE3E0" title="ぜんぶけす">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#E0463B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </button>
    </div>
  </header>

  <div class="canvas-area">
    <div class="canvas-wrap" id="wrap">
      <canvas id="board"></canvas>
    </div>
  </div>

  <div class="sizes" id="sizes"></div>
  <div class="palette" id="palette"></div>

  <div class="overlay" id="overlay">
    <div class="dialog">
      <div class="dlg-emoji">🗑️</div>
      <div class="dlg-text">ぜんぶ けす？</div>
      <div class="choices">
        <button class="choice" id="cancelClear" style="background:#EFEFEF;color:#6A6A6A">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          やめる
        </button>
        <button class="choice" id="doClear" style="background:#FF6B5E;color:#fff">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          けす
        </button>
      </div>
    </div>
  </div>

<script>
(function () {
  var COLORS = [
    { name: "あか", hex: "#FF3B3B" },
    { name: "だいだい", hex: "#FF8A1E" },
    { name: "やまぶき", hex: "#FFB300" },
    { name: "きいろ", hex: "#FFE034" },
    { name: "きみどり", hex: "#A0D911" },
    { name: "みどり", hex: "#2ECC71" },
    { name: "みずいろ", hex: "#4FC3F7" },
    { name: "あお", hex: "#2D7FF9" },
    { name: "こん", hex: "#1A3A8F" },
    { name: "むらさき", hex: "#A24BD6" },
    { name: "もも", hex: "#FF7BB0" },
    { name: "ちゃいろ", hex: "#9C5A2C" },
    { name: "はいいろ", hex: "#9AA0A6" },
    { name: "くろ", hex: "#2B2B2B" },
    { name: "しろ（けしゴム）", hex: "#FFFFFF" }
  ];
  var SIZES = [
    { label: "ほそい", value: 8 },
    { label: "ふつう", value: 18 },
    { label: "ふとい", value: 34 }
  ];
  var BG = "#FFFFFF";

  var canvas = document.getElementById("board");
  var wrap = document.getElementById("wrap");
  var ctx = canvas.getContext("2d");

  var color = COLORS[0].hex;
  var size = SIZES[1].value;
  var drawing = false;
  var last = { x: 0, y: 0 };
  var history = [];

  // 太さボタン生成
  var sizesEl = document.getElementById("sizes");
  SIZES.forEach(function (s) {
    var btn = document.createElement("button");
    btn.className = "size-btn" + (s.value === size ? " active" : "");
    btn.dataset.value = s.value;
    var box = document.createElement("span");
    box.className = "size-dot-box";
    var dot = document.createElement("span");
    dot.className = "size-dot";
    dot.style.width = s.value + "px";
    dot.style.height = s.value + "px";
    box.appendChild(dot);
    var label = document.createElement("span");
    label.className = "size-label";
    label.textContent = s.label;
    btn.appendChild(box);
    btn.appendChild(label);
    btn.addEventListener("click", function () {
      size = s.value;
      updateSizeUI();
    });
    sizesEl.appendChild(btn);
  });

  function updateSizeUI() {
    var btns = sizesEl.querySelectorAll(".size-btn");
    btns.forEach(function (b) {
      var active = Number(b.dataset.value) === size;
      b.classList.toggle("active", active);
      var dot = b.querySelector(".size-dot");
      dot.style.background = active ? color : "#B7A98F";
    });
  }

  // 色ボタン生成
  var paletteEl = document.getElementById("palette");
  COLORS.forEach(function (c) {
    var btn = document.createElement("button");
    var isWhite = c.hex === "#FFFFFF";
    btn.className = "color-btn" + (isWhite ? " white" : "") + (c.hex === color ? " active" : "");
    btn.style.background = c.hex;
    btn.title = c.name;
    btn.dataset.hex = c.hex;
    btn.addEventListener("click", function () {
      color = c.hex;
      updateColorUI();
      updateSizeUI();
    });
    paletteEl.appendChild(btn);
  });

  function updateColorUI() {
    var btns = paletteEl.querySelectorAll(".color-btn");
    btns.forEach(function (b) {
      b.classList.toggle("active", b.dataset.hex === color);
    });
  }

  // キャンバス初期化（解像度対応・絵を保持してリサイズ）
  function setupCanvas(preserve) {
    var snapshot = null;
    if (preserve && canvas.width > 0) {
      snapshot = document.createElement("canvas");
      snapshot.width = canvas.width;
      snapshot.height = canvas.height;
      snapshot.getContext("2d").drawImage(canvas, 0, 0);
    }
    var dpr = window.devicePixelRatio || 1;
    var w = wrap.clientWidth;
    var h = wrap.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, w, h);
    if (snapshot) ctx.drawImage(snapshot, 0, 0, w, h);
  }

  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    var p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  }

  function pushHistory() {
    try {
      history.push(canvas.toDataURL());
      if (history.length > 12) history.shift();
    } catch (err) {}
  }

  function start(e) {
    e.preventDefault();
    pushHistory();
    drawing = true;
    last = getPos(e);
    ctx.beginPath();
    ctx.fillStyle = color;
    ctx.arc(last.x, last.y, size / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    var pos = getPos(e);
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    last = pos;
  }

  function end() { drawing = false; }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mouseleave", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);

  // もどす
  document.getElementById("undoBtn").addEventListener("click", function () {
    var prev = history.pop();
    var w = canvas.clientWidth, h = canvas.clientHeight;
    if (!prev) {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, w, h);
      return;
    }
    var img = new Image();
    img.onload = function () {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
    };
    img.src = prev;
  });

  // ほぞん
  document.getElementById("saveBtn").addEventListener("click", function () {
    var link = document.createElement("a");
    link.download = "oekaki.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });

  // ぜんぶけす（確認）
  var overlay = document.getElementById("overlay");
  document.getElementById("clearBtn").addEventListener("click", function () {
    overlay.classList.add("show");
  });
  document.getElementById("cancelClear").addEventListener("click", function () {
    overlay.classList.remove("show");
  });
  document.getElementById("doClear").addEventListener("click", function () {
    pushHistory();
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);
    overlay.classList.remove("show");
  });

  // 初期化・リサイズ
  setupCanvas(false);
  window.addEventListener("resize", function () { setupCanvas(true); });
})();
</script>
</body>
</html>

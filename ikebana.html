<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#EEEAE0">
<title>花あわせ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --vh: 100vh;
  --bg:#EEEAE0; --bg-warm:#E5DDC9; --kinari:#F5F0E5;
  --ink:#1F1B16; --ink-soft:#5A4F45; --ink-faint:#8C7E6F;
  --line:#C9BFAE; --gold:#9F7E3A; --gold-soft:#C9A85E; --shu:#B8442E;
}

*{margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;
  -webkit-user-select:none;user-select:none}

html,body{
  width:100%; height:100%;
  background:var(--bg); color:var(--ink);
  font-family:"Shippori Mincho B1","Hiragino Mincho ProN","YuMincho",serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  overscroll-behavior:none;
}

#app{
  width:100%;
  height: var(--vh);
  position:relative;
  overflow:hidden;
}

/* ── screen base ───────────────────────────── */
.screen{
  width:100%; height:100%;
  display:none;
  flex-direction:column;
  position:absolute; inset:0;
  background:var(--bg);
}
.screen.active{ display:flex }

/* subtle washi noise */
.screen::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.35  0 0 0 0 0.30  0 0 0 0 0.22  0 0 0 0.5 0'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.12'/></svg>");
  mix-blend-mode:multiply; opacity:.7;
}
.screen > *{position:relative; z-index:1}

/* ── typography ───────────────────────────── */
.kana-spaced{letter-spacing:.3em}

/* ═══════════ TITLE ═══════════ */
#screen-title{
  align-items:center; justify-content:center;
  padding: 24px;
}
.title-mark{
  width:30px; height:30px;
  border:1.5px solid var(--gold);
  transform:rotate(45deg);
  margin-bottom: clamp(16px, 3vh, 28px);
}
.title-en{
  font-size:10px; letter-spacing:.5em; color:var(--ink-faint);
  margin-bottom: clamp(12px, 2vh, 20px);
}
.title-main{
  font-size: clamp(48px, 16vw, 80px);
  font-weight:700;
  line-height:1; letter-spacing:.06em;
  white-space:nowrap;
  color:var(--ink);
}
.title-sub{
  font-size:12px; letter-spacing:.4em; color:var(--ink-soft);
  margin-top: clamp(18px, 3vh, 28px);
  padding-top:18px; position:relative;
}
.title-sub::before{
  content:""; position:absolute; top:0; left:50%;
  transform:translateX(-50%);
  width:22px; height:.5px; background:var(--gold);
}
.title-buttons{
  margin-top: clamp(28px, 6vh, 60px);
  display:flex; flex-direction:column; gap:14px; align-items:center;
}
.start-btn{
  padding:16px 48px;
  background:var(--ink); color:var(--kinari);
  border:none; font-family:inherit;
  font-size:16px; letter-spacing:.35em; font-weight:500;
  cursor:pointer; position:relative;
}
.start-btn::after{
  content:""; position:absolute; inset:-4px;
  border:.5px solid var(--ink); pointer-events:none;
}
.start-btn:active{transform:translateY(1px)}
.gallery-link{
  background:none; border:none;
  font-family:inherit; font-size:12px;
  letter-spacing:.3em; color:var(--ink-soft);
  cursor:pointer; padding:8px;
  text-decoration:underline;
  text-decoration-color:var(--line);
  text-underline-offset:5px;
}

/* ═══════════ HEADER ═══════════ */
.head{
  display:flex; align-items:center; justify-content:space-between;
  padding: max(env(safe-area-inset-top),14px) 18px 12px;
  flex-shrink:0;
}
.icon-btn{
  width:38px; height:38px;
  background:none; border:none;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--ink);
}
.step-dots{display:flex; gap:5px; align-items:center}
.dot{width:5px; height:5px; border-radius:50%; background:var(--line)}
.dot.on{width:18px; border-radius:3px; background:var(--ink)}
.head-spacer{width:38px}

.prompt{
  text-align:center; padding: 0 24px 16px; flex-shrink:0;
}
.prompt h2{
  font-size: clamp(20px, 5vw, 24px);
  font-weight:600; letter-spacing:.3em;
}
.prompt small{
  display:block; font-size:11px;
  letter-spacing:.3em; color:var(--ink-soft);
  margin-top:6px;
}

/* ═══════════ GRID (vessel/season) ═══════════ */
.grid2{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:12px;
  padding: 0 18px 18px;
  min-height:0;
}
.card{
  background:var(--kinari);
  border:.5px solid var(--line);
  position:relative;
  cursor:pointer;
  overflow:hidden;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-end;
  padding: 8px 8px 12px;
  min-height:0;
  transition: transform .2s;
}
.card:active{transform:scale(.96); background:var(--bg-warm)}
.card::before, .card::after{
  content:""; position:absolute; background:var(--gold);
}
.card::before{top:10px; left:10px; width:7px; height:.5px}
.card::after{top:10px; left:10px; width:.5px; height:7px}
.card .ill{
  flex:1; width:100%; min-height:0;
  display:flex; align-items:center; justify-content:center;
}
.card .ill svg{max-width:80%; max-height:100%}
.card .name{
  font-size: clamp(13px, 3.5vw, 15px);
  font-weight:600; letter-spacing:.3em;
  flex-shrink:0; margin-top: 4px;
}
.card .yomi{
  font-size: 9px; letter-spacing:.25em;
  color:var(--ink-faint); flex-shrink:0; margin-top:2px;
}

.season-card{padding:14px}
.season-card.spring{background:linear-gradient(160deg,#F2E4DC,#EBD4D0)}
.season-card.summer{background:linear-gradient(160deg,#DCE5E4,#C8D8DA)}
.season-card.autumn{background:linear-gradient(160deg,#E8D9C0,#DDC49A)}
.season-card.winter{background:linear-gradient(160deg,#E5E5E2,#D8DAD3)}
.season-card{justify-content:space-between; align-items:stretch}
.season-card .s-row{display:flex; justify-content:space-between; align-items:flex-end}
.season-card .s-kanji{
  font-size: clamp(28px, 8vw, 38px);
  font-weight:700; line-height:1;
}
.season-card .s-en{
  font-size:9px; letter-spacing:.3em;
  color:var(--ink-faint); writing-mode:horizontal-tb;
}
.season-card .s-yomi{
  font-size:9px; letter-spacing:.3em;
  color:var(--ink-soft); margin-top:2px;
}
.season-card .s-bottom{
  display:flex; align-items:flex-end; justify-content:space-between;
}
.season-card .s-ill{width:42px; height:42px; opacity:.7}

/* ═══════════ ARRANGE ═══════════ */
#screen-arrange{display:none}
#screen-arrange.active{display:flex}
.arrange-stage{
  flex:1; position:relative; min-height:0;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg) 55%,var(--bg-warm) 100%);
  overflow:hidden;
}
.arrange-stage.spring{background:linear-gradient(180deg,#F4EAE3 0%,#F4EAE3 55%,#E8CFCE 100%)}
.arrange-stage.summer{background:linear-gradient(180deg,#E4ECEB 0%,#E4ECEB 55%,#C5D7D7 100%)}
.arrange-stage.autumn{background:linear-gradient(180deg,#EFE2CC 0%,#EFE2CC 55%,#DCBE92 100%)}
.arrange-stage.winter{background:linear-gradient(180deg,#E8E8E4 0%,#E8E8E4 55%,#D2D4CD 100%)}

.stage-canvas{
  position:absolute; inset:0;
  touch-action:none;
}
.stage-canvas svg{width:100%; height:100%; display:block}

.arrange-top{
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding: max(env(safe-area-inset-top),12px) 14px 8px;
  z-index:5;
}
.arrange-tools{display:flex; gap:8px}
.tool-btn{
  height:34px; min-width:54px; padding: 0 10px;
  background: rgba(245,240,229,.85);
  backdrop-filter: blur(4px);
  border:.5px solid var(--line);
  font-family:inherit; font-size:11px; letter-spacing:.2em;
  color:var(--ink); cursor:pointer;
}
.tool-btn:active{background:var(--bg-warm)}

.hint{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:11px; letter-spacing:.35em;
  color:var(--ink-faint); opacity:0;
  pointer-events:none; transition:opacity .3s;
  white-space:nowrap;
}
.hint.show{opacity:.7}

.palette{
  flex-shrink:0;
  background:var(--kinari);
  border-top:.5px solid var(--line);
  padding: 12px 12px max(env(safe-area-inset-bottom),12px);
  position:relative;
}
.palette::before{
  content:""; position:absolute;
  top:-1px; left:50%; transform:translateX(-50%);
  width:36px; height:2px; background:var(--gold);
}

.done-btn{
  position:absolute; left:50%; top:-22px;
  transform:translate(-50%,-100%);
  padding: 12px 32px;
  background:var(--ink); color:var(--kinari);
  border:none; font-family:inherit;
  font-size:13px; letter-spacing:.35em; font-weight:500;
  cursor:pointer;
  opacity:0; pointer-events:none;
  transition: opacity .3s, transform .3s;
}
.done-btn::after{
  content:""; position:absolute; inset:-3px;
  border:.5px solid var(--ink); pointer-events:none;
}
.done-btn.show{
  opacity:1; pointer-events:auto;
  transform:translate(-50%,-100%) translateY(-2px);
}

.palette-label{
  font-size:9px; letter-spacing:.4em;
  color:var(--ink-faint); text-align:center;
  margin-bottom:8px;
}

.palette-tiles{
  display:flex; gap:8px; justify-content:center;
}
.f-tile{
  flex:1; max-width:74px;
  aspect-ratio:.85;
  background:var(--bg);
  border:.5px solid var(--line);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer; padding:4px;
  position:relative;
  transition: all .2s;
}
.f-tile:active{transform:scale(.94)}
.f-tile.selected{
  background:var(--ink);
  border-color:var(--ink);
  transform:translateY(-4px);
}
.f-tile.selected .f-name{color:var(--kinari)}
.f-tile.selected::after{
  content:""; position:absolute; bottom:-5px; left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:var(--ink);
}
.f-tile .f-ill{
  flex:1; width:100%; min-height:0;
  display:flex; align-items:center; justify-content:center;
}
.f-tile .f-ill svg{max-width:100%; max-height:100%}
.f-tile .f-name{
  font-size:9px; letter-spacing:.1em;
  color:var(--ink);
  flex-shrink:0; margin-top:2px;
}

/* ═══════════ COMPLETE ═══════════ */
#screen-complete{
  align-items:center; padding: 0;
}
.complete-head{
  text-align:center; flex-shrink:0; width:100%;
  padding: max(env(safe-area-inset-top),16px) 0 8px;
}
.seal{
  display:inline-flex; align-items:center; justify-content:center;
  width:38px; height:38px; border-radius:50%;
  background:var(--shu); color:var(--kinari);
  font-size:13px; font-weight:600;
  transform:rotate(-6deg);
  margin-bottom:8px;
  box-shadow: 0 2px 4px rgba(184,68,46,.25);
}
.complete-head h2{
  font-size: clamp(18px, 5vw, 22px);
  letter-spacing:.4em; font-weight:600;
}
.date-tag{
  font-size:10px; letter-spacing:.3em;
  color:var(--ink-faint); margin-top:6px;
}
.complete-canvas{
  flex:1; width:100%; min-height:0;
  position:relative;
  padding: 6px 16px;
}
.complete-canvas svg{
  position:absolute;
  top:6px; left:16px; right:16px; bottom:6px;
  width: calc(100% - 32px);
  height: calc(100% - 12px);
  display:block;
}
.celebration{position:absolute; inset:0; pointer-events:none; overflow:hidden}

.complete-actions{
  flex-shrink:0; width:100%;
  display:flex; gap:12px; justify-content:center;
  padding: 12px 20px max(env(safe-area-inset-bottom),16px);
}
.action-btn{
  flex:1; max-width:150px;
  padding:13px; font-family:inherit; font-size:12px;
  letter-spacing:.3em; cursor:pointer;
  border:.5px solid var(--ink);
  background:transparent; color:var(--ink);
}
.action-btn.primary{background:var(--ink); color:var(--kinari)}
.action-btn:active{transform:translateY(1px)}

.particle{
  position:absolute; opacity:0;
  animation: rise 3s ease-out forwards;
}
@keyframes rise{
  0%{opacity:0; transform:translateY(20px) rotate(0)}
  20%{opacity:1}
  100%{opacity:0; transform:translateY(-70vh) rotate(360deg)}
}

/* ═══════════ GALLERY ═══════════ */
.gallery-head h2{
  font-size:14px; letter-spacing:.4em; font-weight:600;
}
.gallery-head small{
  display:block; font-size:9px; letter-spacing:.3em;
  color:var(--ink-faint); margin-top:3px;
}
.gallery-grid{
  flex:1; min-height:0;
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; padding: 0 18px 18px;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.g-card{
  aspect-ratio:.85;
  background:var(--kinari);
  border:.5px solid var(--line);
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
  cursor:pointer;
}
.g-card svg{width:100%; height:100%; flex:1; min-height:0}
.g-info{
  position:absolute; bottom:5px; left:7px; right:7px;
  display:flex; justify-content:space-between;
  font-size:9px; letter-spacing:.2em;
  color:var(--ink-faint);
}
.g-empty{
  grid-column:1/-1; text-align:center;
  padding: 60px 20px;
  color:var(--ink-faint); font-size:12px;
  letter-spacing:.3em; line-height:2;
}
</style>
</head>
<body>
<div id="app">

  <!-- TITLE -->
  <div id="screen-title" class="screen active">
    <div class="title-mark"></div>
    <div class="title-en">OHANA AWASE</div>
    <h1 class="title-main">花あわせ</h1>
    <div class="title-sub kana-spaced">はなあわせ</div>
    <div class="title-buttons">
      <button class="start-btn" onclick="goTo('vessel')">はじめる</button>
      <button class="gallery-link" onclick="goTo('gallery')">はなにっきを見る</button>
    </div>
  </div>

  <!-- VESSEL -->
  <div id="screen-vessel" class="screen">
    <div class="head">
      <button class="icon-btn" onclick="goTo('title')" aria-label="戻る"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M15 4 L7 12 L15 20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></button>
      <div class="step-dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="head-spacer"></div>
    </div>
    <div class="prompt"><h2>うつわを えらぶ</h2><small>その一</small></div>
    <div class="grid2" id="grid-vessel"></div>
  </div>

  <!-- SEASON -->
  <div id="screen-season" class="screen">
    <div class="head">
      <button class="icon-btn" onclick="goTo('vessel')" aria-label="戻る"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M15 4 L7 12 L15 20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></button>
      <div class="step-dots"><span class="dot"></span><span class="dot on"></span><span class="dot"></span></div>
      <div class="head-spacer"></div>
    </div>
    <div class="prompt"><h2>きせつを えらぶ</h2><small>その二</small></div>
    <div class="grid2" id="grid-season"></div>
  </div>

  <!-- ARRANGE -->
  <div id="screen-arrange" class="screen">
    <div class="arrange-stage" id="arrange-stage">
      <div class="arrange-top">
        <button class="icon-btn" onclick="goTo('season')" aria-label="戻る"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M15 4 L7 12 L15 20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></button>
        <div class="arrange-tools">
          <button class="tool-btn" onclick="undoLast()">もどす</button>
          <button class="tool-btn" onclick="resetArrange()">けす</button>
        </div>
      </div>
      <div class="stage-canvas" id="stage-canvas"><svg id="stage-svg" preserveAspectRatio="xMidYMid meet"></svg></div>
      <div class="hint" id="hint">いけたい ところを タップ</div>
    </div>
    <div class="palette">
      <button class="done-btn" id="done-btn" onclick="completeArrange()">できた</button>
      <div class="palette-label" id="palette-label">はる の はなざい</div>
      <div class="palette-tiles" id="palette-tiles"></div>
    </div>
  </div>

  <!-- COMPLETE -->
  <div id="screen-complete" class="screen">
    <div class="complete-head">
      <div class="seal">花</div>
      <h2>できあがり</h2>
      <div class="date-tag" id="date-tag"></div>
    </div>
    <div class="complete-canvas">
      <svg id="complete-svg" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="celebration" id="celebration"></div>
    </div>
    <div class="complete-actions">
      <button class="action-btn primary" onclick="saveToGallery()">のこす</button>
      <button class="action-btn" onclick="resetAndStart()">あたらしく</button>
    </div>
  </div>

  <!-- GALLERY -->
  <div id="screen-gallery" class="screen">
    <div class="head gallery-head">
      <button class="icon-btn" onclick="goTo('title')" aria-label="戻る"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M15 4 L7 12 L15 20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></button>
      <div><h2>はなにっき</h2><small>HANA NIKKI</small></div>
      <div class="head-spacer"></div>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>

</div>

<script>
"use strict";

/* ═══════════════════════════════════════════════
   花あわせ — Ohana Awase  (rebuild)
   ═══════════════════════════════════════════════ */

/* ── viewport height fix for iOS ─────────── */
function fixVH(){
  document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
}
fixVH();
window.addEventListener('resize', fixVH);
window.addEventListener('orientationchange', ()=>setTimeout(fixVH, 200));

/* ── STATE ──────────────────────────────── */
const state = {
  vessel: null,        // 'tsubo' | 'suiban' | 'chikutsu' | 'glass'
  season: null,        // 'spring' | 'summer' | 'autumn' | 'winter'
  palette: [],         // [{id, flower}] — available materials at hand
  placed: [],          // [{id, flower, x, y, rot}] — placed in arrangement
  selectedId: null,    // id of currently-selected palette item
  completedAt: null,
  canvasW: 0,          // arrange canvas width at time of completion
  canvasH: 0,          // arrange canvas height at time of completion
};

/* ── DATA ───────────────────────────────── */
const VESSELS = {
  tsubo:    {name:'壺',   yomi:'つ ぼ'},
  suiban:   {name:'水盤', yomi:'すいばん'},
  chikutsu: {name:'竹筒', yomi:'たけづつ'},
  glass:    {name:'瓶',   yomi:'びん'},
};

const SEASONS = {
  spring: {name:'春', yomi:'は る', en:'HARU',
    materials: ['sakura','sakura','ume','nanohana','wakaba','momo']},
  summer: {name:'夏', yomi:'な つ', en:'NATSU',
    materials: ['ajisai','himawari','aoba','aoba','sasa','asagao']},
  autumn: {name:'秋', yomi:'あ き', en:'AKI',
    materials: ['momiji','susuki','susuki','kiku','rindou','hoozuki']},
  winter: {name:'冬', yomi:'ふ ゆ', en:'FUYU',
    materials: ['tsubaki','matsu','matsu','nanten','suisen','roubai']},
};

const FLOWERS = {
  sakura:   {name:'さくら',   stem:'#7A5747', kind:'branch'},
  ume:      {name:'うめ',     stem:'#5C4030', kind:'branch'},
  nanohana: {name:'なのはな', stem:'#5A7A3A', kind:'soft'},
  wakaba:   {name:'わかば',   stem:'#658E4A', kind:'branch'},
  momo:     {name:'もも',     stem:'#7A4A40', kind:'branch'},
  ajisai:   {name:'あじさい', stem:'#5A7A3A', kind:'soft'},
  himawari: {name:'ひまわり', stem:'#4A6038', kind:'soft'},
  aoba:     {name:'あおば',   stem:'#3D5A2E', kind:'branch'},
  sasa:     {name:'ささ',     stem:'#7A8A4A', kind:'soft'},
  asagao:   {name:'あさがお', stem:'#5A7A4A', kind:'soft'},
  momiji:   {name:'もみじ',   stem:'#7A4A30', kind:'branch'},
  susuki:   {name:'すすき',   stem:'#A89870', kind:'grass'},
  kiku:     {name:'きく',     stem:'#5A7A3A', kind:'soft'},
  rindou:   {name:'りんどう', stem:'#5A6A3A', kind:'soft'},
  hoozuki:  {name:'ほおずき', stem:'#7A6A3A', kind:'branch'},
  tsubaki:  {name:'つばき',   stem:'#3D5A3D', kind:'branch'},
  matsu:    {name:'まつ',     stem:'#4A3A2A', kind:'branch'},
  nanten:   {name:'なんてん', stem:'#5A4A2A', kind:'branch'},
  suisen:   {name:'すいせん', stem:'#5A7A4A', kind:'soft'},

};

/* ── VESSEL SVG ─────────────────────────── */

function vesselMouthY(type){
  return {tsubo:-130, suiban:-54, chikutsu:-150, glass:-120}[type] || -100;
}

function flowerScale(name){
  return ({sakura:1, ume:1, nanohana:1.1, wakaba:1.2, momo:1.05,
           ajisai:1.3, himawari:1.4, aoba:1.3, sasa:1.5, asagao:1.2,
           momiji:1.2, susuki:1.8, kiku:1.3, rindou:1, hoozuki:1.1,
           tsubaki:1.4, matsu:1.5, nanten:1.2, suisen:1.2, roubai:1})[name] || 1;
}

function flowerThumb(name){
  return `<svg viewBox="-20 -28 40 38">${flower(name,0,-6,1.3,0)}</svg>`;
}

/* ── NAVIGATION ─────────────────────────── */
function goTo(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const target = document.getElementById('screen-'+screen);
  if(!target){ console.warn('No screen:', screen); return; }
  target.classList.add('active');
  if(screen==='vessel') renderVesselGrid();
  else if(screen==='season') renderSeasonGrid();
  else if(screen==='arrange') initArrange();
  else if(screen==='complete') renderComplete();
  else if(screen==='gallery') renderGallery();
}

function resetAndStart(){
  state.vessel = null;
  state.season = null;
  state.palette = [];
  state.placed = [];
  state.selectedId = null;
  state.completedAt = null;
  state.canvasW = 0;
  state.canvasH = 0;
  // Restore save button if disabled
  const btn = document.querySelector('#screen-complete .action-btn.primary');
  if(btn){ btn.textContent = 'のこす'; btn.disabled = false; }
  goTo('vessel');
}

/* ── VESSEL GRID ────────────────────────── */
function renderVesselGrid(){
  const grid = document.getElementById('grid-vessel');
  grid.innerHTML = Object.entries(VESSELS).map(([key,v])=>`
    <div class="card" onclick="pickVessel('${key}')">
      <div class="ill">${vesselThumb(key)}</div>
      <div class="name">${v.name}</div>
      <div class="yomi">${v.yomi}</div>
    </div>`).join('');
}

function pickVessel(key){
  state.vessel = key;
  chime(440);
  setTimeout(()=>goTo('season'), 150);
}

/* ── SEASON GRID ────────────────────────── */
function renderSeasonGrid(){
  const grid = document.getElementById('grid-season');
  const ill = { spring:'sakura', summer:'ajisai', autumn:'momiji', winter:'tsubaki' };
  grid.innerHTML = Object.entries(SEASONS).map(([key,s])=>`
    <div class="card season-card ${key}" onclick="pickSeason('${key}')">
      <div class="s-row">
        <div>
          <div class="s-kanji">${s.name}</div>
          <div class="s-yomi">${s.yomi}</div>
        </div>
        <div class="s-en">${s.en}</div>
      </div>
      <div class="s-bottom">
        <span></span>
        <svg class="s-ill" viewBox="-22 -28 44 36">${flower(ill[key],0,-6,1.6,key==='autumn'?15:0)}</svg>
      </div>
    </div>`).join('');
}

function pickSeason(key){
  state.season = key;
  chime(523);
  setTimeout(()=>goTo('arrange'), 150);
}

/* ── ARRANGE ────────────────────────────── */
function initArrange(){
  // Build palette with unique ids per material
  state.palette = SEASONS[state.season].materials.map((f, i) => ({
    id: i + 1,
    flower: f,
  }));
  state.placed = [];
  state.selectedId = null;

  const stage = document.getElementById('arrange-stage');
  stage.className = 'arrange-stage ' + state.season;
  document.getElementById('palette-label').textContent =
    ({spring:'はる',summer:'なつ',autumn:'あき',winter:'ふゆ'}[state.season]) + ' の はなざい';
  renderPalette();
  requestAnimationFrame(()=>{
    requestAnimationFrame(renderCanvas);
  });
  const canvas = document.getElementById('stage-canvas');
  canvas.onclick = handleCanvasTap;
}

function renderPalette(){
  const tiles = document.getElementById('palette-tiles');
  if(state.palette.length === 0){
    tiles.innerHTML = `<div style="font-size:11px;letter-spacing:.3em;color:var(--ink-faint);padding:18px 8px;">ぜんぶ いけました</div>`;
    return;
  }
  tiles.innerHTML = state.palette.map(item => `
    <div class="f-tile" data-id="${item.id}" onclick="selectMaterial(${item.id})">
      <div class="f-ill">${flowerThumb(item.flower)}</div>
      <div class="f-name">${FLOWERS[item.flower].name}</div>
    </div>`).join('');
}

function selectMaterial(id){
  state.selectedId = (state.selectedId === id) ? null : id;
  document.querySelectorAll('.f-tile').forEach(t=>{
    t.classList.toggle('selected', Number(t.dataset.id) === state.selectedId);
  });
  document.getElementById('hint').classList.toggle('show', !!state.selectedId);
  if(state.selectedId) chime(660);
}

function getCanvasSize(){
  const canvas = document.getElementById('stage-canvas');
  const rect = canvas.getBoundingClientRect();
  return { W: rect.width || window.innerWidth, H: rect.height || 400 };
}

function renderCanvas(){
  const svg = document.getElementById('stage-svg');
  const { W, H } = getCanvasSize();
  if(W < 10 || H < 10){
    // Layout not ready yet; retry
    setTimeout(renderCanvas, 100);
    return;
  }
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Vessel sits at center bottom
  const scale = Math.min(W, H) * 0.0028;
  const vCX = W / 2;
  const vCY = H * 0.85;
  const mouthY = vCY + vesselMouthY(state.vessel) * scale;

  // Rendering order: vessel (back), then each placed item as a stem+head pair
  // in placement order. Later placements appear on top (painter's order).
  // Stems are drawn IN FRONT of the vessel so cascading compositions work.
  const items = state.placed.map(p =>
    stemPath(p, vCX, mouthY) + placedFlowerSVG(p, W, H)
  ).join('');

  svg.innerHTML = `
    ${canvasDefs()}
    ${vesselInCanvas(state.vessel, vCX, vCY, scale)}
    ${items}
  `;

  // Done button visibility
  document.getElementById('done-btn').classList.toggle('show', state.placed.length >= 1);
}

function stemPath(p, mX, mY){
  const dx = p.x - mX, dy = p.y - mY;
  const seed = p.id * 0.001;
  const cx1 = mX + dx*0.2 + Math.sin(seed)*8;
  const cy1 = mY + dy*0.3;
  const cx2 = mX + dx*0.6 + Math.cos(seed)*5;
  const cy2 = mY + dy*0.8;
  const f = FLOWERS[p.flower];
  const width = f.kind==='branch' ? 2.5 : f.kind==='grass' ? 1.2 : 1.8;
  return `<path d="M ${mX} ${mY} C ${cx1} ${cy1},${cx2} ${cy2},${p.x} ${p.y}" fill="none" stroke="${f.stem}" stroke-width="${width}" stroke-linecap="round" opacity=".9"/>`;
}

function placedFlowerSVG(p, W, H){
  const sc = Math.min(W, H) * 0.014 * flowerScale(p.flower);
  // No onclick: placed flowers are permanent until reset
  return `<g class="placed">
    ${flower(p.flower, p.x, p.y, sc, p.rot||0)}
  </g>`;
}

function handleCanvasTap(e){
  if(!state.selectedId) return;
  const item = state.palette.find(p => p.id === state.selectedId);
  if(!item) return;

  const canvas = document.getElementById('stage-canvas');
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX);
  const cy = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY);
  if(cx === undefined) return;

  const x = cx - rect.left;
  const y = cy - rect.top;
  const { W, H } = getCanvasSize();

  // Allow placement anywhere within the canvas except very close to edges.
  // Later placements stack on top of earlier ones (painter's order).
  // Stems may cross the vessel body visually — this is acceptable for
  // cascading-style ikebana compositions.
  if(y < 8) return;            // top margin only
  if(y > H * 0.93) return;     // keep above the floor line
  if(x < 0 || x > W) return;   // within canvas width

  // Move the item from palette to placed
  state.placed.push({
    id: item.id,
    flower: item.flower,
    x, y,
    rot: (Math.random() - 0.5) * 30,
  });
  state.palette = state.palette.filter(p => p.id !== item.id);
  state.selectedId = null;
  document.getElementById('hint').classList.remove('show');

  chime(784);
  renderPalette();
  renderCanvas();
  if(navigator.vibrate) navigator.vibrate(15);
}

function undoLast(){
  if(!state.placed.length) return;
  // Last placed flower returns to palette
  const last = state.placed.pop();
  state.palette.push({ id: last.id, flower: last.flower });
  // Maintain order by id
  state.palette.sort((a, b) => a.id - b.id);
  state.selectedId = null;
  chime(330);
  renderPalette();
  renderCanvas();
}

function resetArrange(){
  // Restore everything to initial state
  state.palette = SEASONS[state.season].materials.map((f, i) => ({
    id: i + 1,
    flower: f,
  }));
  state.placed = [];
  state.selectedId = null;
  document.getElementById('hint').classList.remove('show');
  chime(294);
  renderPalette();
  renderCanvas();
}

/* ── COMPLETE ───────────────────────────── */
function completeArrange(){
  state.completedAt = Date.now();
  const { W, H } = getCanvasSize();
  state.canvasW = W;
  state.canvasH = H;
  goTo('complete');
}

function seasonBg(season){
  return ({ spring:['#F4EAE3','#E8CFCE'], summer:['#E4ECEB','#C5D7D7'],
           autumn:['#EFE2CC','#DCBE92'], winter:['#E8E8E4','#D2D4CD'] })[season] || ['#EEEAE0','#E5DDC9'];
}

function renderComplete(){
  // Use the EXACT same coordinate system as the arrange canvas,
  // so the saved arrangement is rendered identically. preserveAspectRatio
  // ensures the entire viewBox (vessel included) fits the visible SVG.
  const svg = document.getElementById('complete-svg');
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');

  const W = state.canvasW || 390;
  const H = state.canvasH || 500;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const scale = Math.min(W, H) * 0.0028;
  const vCX = W / 2;
  const vCY = H * 0.85;
  const mouthY = vCY + vesselMouthY(state.vessel) * scale;

  const items = state.placed.map(p => {
    const sc = Math.min(W,H) * 0.014 * flowerScale(p.flower);
    return stemPath(p, vCX, mouthY) + flower(p.flower, p.x, p.y, sc, p.rot||0);
  }).join('');

  const bg = seasonBg(state.season);
  svg.innerHTML = `
    <defs>
      ${canvasDefs().replace(/<\/?defs>/g,'')}
      <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="${bg[0]}"/>
        <stop offset="100%" stop-color="${bg[1]}"/>
      </linearGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#bg)"/>
    <line x1="${W*0.1}" y1="${H*0.93}" x2="${W*0.9}" y2="${H*0.93}" stroke="#C9BFAE" stroke-width=".5"/>
    ${vesselInCanvas(state.vessel, vCX, vCY, scale)}
    ${items}
  `;

  const d = new Date(state.completedAt || Date.now());
  document.getElementById('date-tag').textContent =
    `${d.getFullYear()}・${String(d.getMonth()+1).padStart(2,'0')}・${String(d.getDate()).padStart(2,'0')}`;

  spawnCelebration();
  chime(880);
}

function spawnCelebration(){
  const el = document.getElementById('celebration');
  el.innerHTML = '';
  const colors = ({
    spring:['#F5BCC4','#FBE8E8','#F4D04C'],
    summer:['#9DB4D8','#F0B82E','#6A9D4E'],
    autumn:['#B84230','#D8C8A0','#F0EAD8'],
    winter:['#C42E40','#E85A5A','#F5F0E0'],
  })[state.season] || ['#F5BCC4'];
  for(let i = 0; i < 12; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (Math.random()*100) + '%';
    p.style.bottom = '0';
    p.style.animationDelay = (Math.random() * 1.5) + 's';
    const c = colors[i % colors.length];
    p.innerHTML = `<svg width="12" height="12" viewBox="-6 -6 12 12"><path d="M 0,-4 Q 2.5,-2.5 2.5,1 Q 0,2.5 -2.5,1 Q -2.5,-2.5 0,-4 Z" fill="${c}" opacity=".8"/></svg>`;
    el.appendChild(p);
  }
}

/* ── GALLERY ────────────────────────────── */
const STORAGE_KEY = 'ohanaike_v2';

function loadGallery(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e){ return []; }
}

function saveGalleryItems(items){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items.slice(-20))); }
  catch(e){ console.warn('save failed', e); }
}

function saveToGallery(){
  const items = loadGallery();
  items.push({
    date: state.completedAt || Date.now(),
    vessel: state.vessel,
    season: state.season,
    placed: state.placed.map(p => ({...p})),
    canvasW: state.canvasW,
    canvasH: state.canvasH,
  });
  saveGalleryItems(items);
  const btn = document.querySelector('#screen-complete .action-btn.primary');
  if(btn){
    btn.textContent = 'のこしました';
    btn.disabled = true;
  }
  setTimeout(()=>{ goTo('gallery'); }, 700);
}

function renderGallery(){
  const grid = document.getElementById('gallery-grid');
  const items = loadGallery().slice().reverse();
  if(items.length === 0){
    grid.innerHTML = `<div class="g-empty">まだ なにも ないよ<br>はなを いけて<br>のこしてみよう</div>`;
    return;
  }
  grid.innerHTML = items.map((item, i) => {
    // Use the saved canvas dimensions as viewBox so the entire
    // arrangement (vessel + flowers) appears identically to the complete view
    const W = item.canvasW || 390;
    const H = item.canvasH || 500;
    const scale = Math.min(W,H) * 0.0028;
    const vCX = W/2;
    const vCY = H * 0.85;
    const mouthY = vCY + vesselMouthY(item.vessel) * scale;
    const placed = item.placed || [];
    const itemsSVG = placed.map(p => {
      const sc = Math.min(W,H) * 0.014 * flowerScale(p.flower);
      return stemPath(p, vCX, mouthY) + flower(p.flower, p.x, p.y, sc, p.rot||0);
    }).join('');
    const bg = seasonBg(item.season);
    const d = new Date(item.date);
    return `<div class="g-card">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        <defs>
          ${canvasDefs().replace(/<\/?defs>/g,'')}
          <linearGradient id="bg${i}" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="${bg[0]}"/>
            <stop offset="100%" stop-color="${bg[1]}"/>
          </linearGradient>
        </defs>
        <rect width="${W}" height="${H}" fill="url(#bg${i})"/>
        ${vesselInCanvas(item.vessel, vCX, vCY, scale)}
        ${itemsSVG}
      </svg>
      <div class="g-info"><span>${SEASONS[item.season]?.name || ''}</span><span>${d.getMonth()+1}/${d.getDate()}</span></div>
    </div>`;
  }).join('');
}

/* ── AUDIO ──────────────────────────────── */
let audioCtx = null;
function getAudio(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  return audioCtx;
}

function chime(freq){
  const ctx = getAudio();
  if(!ctx) return;
  try {
    if(ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.1, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.85);
  } catch(e){}
}

document.addEventListener('touchstart', ()=>{
  const ctx = getAudio();
  if(ctx && ctx.state === 'suspended') ctx.resume();
}, {once:true, passive:true});

/* ── INIT ───────────────────────────────── */
// Refresh canvas on viewport change
window.addEventListener('resize', ()=>{
  if(document.getElementById('screen-arrange').classList.contains('active')){
    renderCanvas();
  }
});
</script>
